<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>  
  <title>Liminal🫒Loop</title>  
  <style>  
    body {  
      font-family: Arial, sans-serif;  
      display: flex;  
      justify-content: flex-end;  
      margin: 0;  
    }  
  
    .tabs-container {  
      display: flex;  
      flex-direction: row-reverse;  
      height: 100vh;  
      width: 100%;  
    }  
  
    .tab-icons {  
      display: flex;  
      flex-direction: column;  
      justify-content: center;  
      border-left: 2px solid black;  
    }  
  
    .tab-icons button {  
      background: none;  
      border: none;  
      padding: 20px;  
      cursor: pointer;  
      border-bottom: 1px solid #000;  
      display: flex;  
      align-items: center;  
      justify-content: center;  
      width: 60px;  
    }  
  
    .tab-icons button.active {  
      background-color: #eee;  
    }  
  
    .tab-content {  
      flex: 1;  
      padding: 40px;  
      display: flex;
      align-items: center;      /* Vertically center content */
      justify-content: flex-start; /* Align content left horizontally */
      overflow: hidden;          /* Hide overflow during animation */
      position: relative;
    }  
  
    .tab-content > div {  
      display: none;  
      opacity: 0;
      transform: translateX(-30px);
      position: absolute;
      width: 100%;
      transition: none;
    }  
  
    .tab-content > div.active {  
      display: block;
      animation: fadeInLeft 0.5s forwards;
      position: relative;
    }

    @keyframes fadeInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }
  </style>  
</head>  
<body>  
  
<div class="tabs-container">  
  <div class="tab-icons">  
    <button class="tab-btn active" onclick="openTab(0)">👤</button>  
    <button class="tab-btn" onclick="openTab(1)">🛠️</button>  
    <button class="tab-btn" onclick="openTab(2)">🌐</button>  
    <button class="tab-btn" onclick="openTab(3)">✈️</button>  
  </div>  
  <div class="tab-content">  
    <div class="tab active">Here is content for tab 1</div>  
    <div class="tab">Here is content for tab 2</div>  
    <div class="tab">Here is content for tab 3</div>  
    <div class="tab">Here is content for tab 4</div>  
  </div>  
</div>  
  
<script>  
  function openTab(index) {  
    const tabs = document.querySelectorAll('.tab');  
    const buttons = document.querySelectorAll('.tab-btn');  

    tabs.forEach((tab, i) => {  
      tab.classList.remove('active');  
      tab.style.animation = 'none'; // Reset animation
      tab.offsetHeight; // Trigger reflow to restart animation
      if (i === index) {
        tab.classList.add('active');  
        tab.style.animation = null; // Start animation again
      }
    });  

    buttons.forEach(btn => btn.classList.remove('active'));  
    buttons[index].classList.add('active');  
  }  
</script>  
</body>  
</html>
