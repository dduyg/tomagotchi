<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 - Page Not Found</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff6fd8 0%, #3813c2 100%);
    font-family: 'Orbitron', monospace, 'Courier New', monospace;
    color: #00fff7;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    user-select: none;
  }
  .container {
    text-align: center;
    max-width: 600px;
    padding: 20px;
    border: 2px solid #00fff7;
    box-shadow:
      0 0 10px #ff6fd8,
      0 0 20px #3813c2,
      0 0 40px #ff6fd8;
    backdrop-filter: blur(6px);
    background: rgba(0, 0, 0, 0.15);
    position: relative;
  }

  h1 {
    font-size: 8rem;
    letter-spacing: 0.2em;
    margin: 0 0 20px;
    text-shadow:
      2px 0 #ff6fd8,
      -2px 0 #3813c2,
      0 2px #ff6fd8,
      0 -2px #3813c2;
    animation: glitch 2s infinite;
  }

  @keyframes glitch {
    0%, 100% {
      text-shadow:
        2px 0 #ff6fd8,
        -2px 0 #3813c2,
        0 2px #ff6fd8,
        0 -2px #3813c2;
    }
    20% {
      text-shadow:
        2px 2px #ff6fd8,
        -2px -2px #3813c2,
        2px -2px #ff6fd8,
        -2px 2px #3813c2;
    }
    40% {
      text-shadow:
        -2px 0 #ff6fd8,
        2px 0 #3813c2,
        0 -2px #ff6fd8,
        0 2px #3813c2;
    }
    60% {
      text-shadow:
        3px 1px #ff6fd8,
        -1px -3px #3813c2,
        1px -1px #ff6fd8,
        -3px 3px #3813c2;
    }
    80% {
      text-shadow:
        -1px 3px #ff6fd8,
        3px -1px #3813c2,
        -3px 1px #ff6fd8,
        1px -3px #3813c2;
    }
  }

  p {
    font-size: 1.5rem;
    margin-bottom: 30px;
    line-height: 1.4;
    text-shadow: 1px 1px #000000aa;
  }

  a {
    display: inline-block;
    font-weight: 700;
    color: #ff6fd8;
    text-decoration: none;
    border: 2px solid #ff6fd8;
    padding: 12px 30px;
    border-radius: 30px;
    transition: all 0.3s ease;
    letter-spacing: 0.1em;
    background: rgba(0, 0, 0, 0.3);
    box-shadow: 0 0 10px #ff6fd8;
  }
  a:hover {
    background: #ff6fd8;
    color: #3813c2;
    box-shadow: 0 0 20px #ff6fd8;
  }

  /* Glitch scanlines */
  .container::before,
  .container::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0) 0,
      rgba(0,0,0,0) 2px,
      rgba(255,255,255,0.05) 3px,
      rgba(0,0,0,0) 4px
    );
    mix-blend-mode: screen;
    animation: scanlines 4s linear infinite;
    z-index: 10;
  }
  .container::after {
    animation-delay: 2s;
  }
  @keyframes scanlines {
    0% { background-position: 0 0; }
    100% { background-position: 0 20px; }
  }

</style>
</head>
<body>
  <div class="container" role="main">
    <h1>404</h1>
    <p>Whoa, looks like this data stream got lost in the glitch matrix.<br>But don't worry, the coder in you knows the way back.</p>
    <a href="/" aria-label="Go back to Home page">Return to Home</a>
  </div>
</body>
</html>
