<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>LiminalLoop</title>
  <style>
@import url("https://fonts.googleapis.com/css2?family=IBM+Plex+Mono&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap");
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --color--background--100: rgb(236, 225, 208);
  --color--foreground--100: rgb(240, 240, 240);
  --color--accent--100: rgb(255, 94, 58);
  --font-primary: "Inter", system-ui, sans-serif;
  --font-mono: "IBM Plex Mono", monospace;
  --gutter: 1rem; /* 16px */
  --margin: 2rem; /* 32px */
}
body {
  margin: 0;
  padding: 0;
  font-family: var(--font-primary);
  background: radial-gradient(circle at 10% 50%, rgb(5, 5, 5) 0%, rgb(30, 30, 30) 90%);
  color: var(--color--foreground--100);
  font-size: 16px; /* Base font size */
  letter-spacing: -0.02em;
}

.layout {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  width: 100%;
  height: 100vh;
  position: relative;
  padding: 6rem 2rem;
  pointer-events: auto;
}
.layout__middle {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
  font-size: 0.75rem;
  text-transform: uppercase;
}
.middle {
  text-align: right;
  transform: rotate3d(0, 0, 1, 90deg) translate3d(100%, 10px, 0);
  transform-origin: right;
  white-space: nowrap;
  font-family: var(--font-mono);
  text-transform: uppercase;
}

section {
  position: absolute;
  font-size: 0.75rem;
  line-height: 1;
  text-transform: uppercase;
}

.top-left {
  top: var(--margin);
  left: var(--margin);
  text-align: left;
  z-index: 20;
}
.top-right {
  top: var(--margin);
  right: var(--margin);
  text-align: right;
  font-family: var(--font-mono);
}
.bottom-left {
  bottom: var(--margin);
  left: var(--margin);
  text-align: left;
}
.bottom-right {
  bottom: var(--margin);
  right: var(--margin);
  text-align: right;
  font-family: var(--font-mono);
}

    .statement {
      display: flex;
  flex-direction: column;
  gap: 1rem;
  text-align: center;
  font-size: 3rem;
  font-weight: 200;
  z-index: 1;
  max-width: 440px;
  mix-blend-mode: screen;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}
.statement h2 {
  color: var(--color--accent--100);
  font-size: 1rem;
  letter-spacing: 0.2em;
  margin-top: 1rem;
  text-transform: uppercase;
  font-weight: 400;
  font-family: var(--font-primary);
  }
  </style>
</head>
<body>
<div class="layout">
  <div class="layout__middle">
    <p>|</p>
    <p class="middle">Scanning Coordinates:<br> Uncharted Zone ✶</p>
  </div>

  <section class="top-left">Vessel<br>Oblivion Horizon</section>
  <section class="top-right">🏛</section>
  <section class="bottom-left">Core<br> Anomaly Drive<br> Status: Unknown</section>
  <section class="bottom-right">Alert<br>Dimensional Rift<br> Imminent</section>

  <div class="statement">
    <h2>BEYOND THE VEIL, ALL SIGNALS FADE</h2>
  </div>
</div>
</body>
</html>
