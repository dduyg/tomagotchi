<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiltier Display Serif</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');

body {
    font-family: 'Playfair Display', serif;
    background-color: #f9f8f3;
    text-align: center;
    margin: 0;
    padding: 0;
}

header {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    font-size: 14px;
    font-weight: bold;
    color: #111;
}

.title {
    font-size: 150px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
    margin: 50px 0;
}

.rose-container {
    display: inline-block;
    position: relative;
}

.rose-container img {
    height: 120px;
    position: absolute;
    top: -50px;
}

.sub-title {
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 30px;
    border: 2px solid black;
    padding: 20px;
    width: fit-content;
    margin: auto;
    border-radius: 30px;
}

.decorative-symbol {
    font-size: 40px;
    margin: 0 20px;
}
    </style>
</head>
<body>
    <header>
        <div class="top-left">14 STYLES</div>
        <div class="top-right">2 VARIABLE FONTS</div>
    </header>

    <main>
        <h1 class="title">
            Kilt<span class="rose-container">
                <img src="rose.png" alt="Red Rose">
            </span>ier
        </h1>
        <div class="sub-title">
            <div class="decorative-symbol">&#10038;</div>
            <span>DISPLAY SERIF</span>
            <div class="decorative-symbol">&#10038;</div>
        </div>
    </main>
</body>
</html>
