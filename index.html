<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        /* Slide-in animation */
        .slide-in {
            opacity: 0;
            transform: translateY(-96px); /* Start above the normal position */
            animation: slideIn 0.6s ease-in-out forwards; /* Slide in with ease-in-out */
        }
        @keyframes slideIn { 
            from { 
                transform: translateY(-96px); /* Start slightly above */
                opacity: 0; /* Fully transparent */
            }
            to { 
                transform: translateY(0); /* End at the normal position */
                opacity: 1; /* Fully visible */
            }
        }

        body {
            font-family: sans-serif;
            background: LemonChiffon;
            color: #888;
            line-height: 1.6;
            padding: 0;
            margin: 0;
        }
        main {
            max-width: 800px;
            margin: 40% auto 0;
            width: 90%;
        }
        header {
            margin-bottom: 10px;
        }

        .work-list {
            list-style: none;
        }
        .work-item {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid currentColor;
            padding: 10px 0;
            font-size: 1.2rem;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <main>
        <header>
            <h1>Synthwave🩸🪝</h1>
        </header>

        <ul class="work-list">
            <li class="work-item slide-in"> <span>sharlee</span> <span>Branding</span> </li>
            <li class="work-item slide-in"> <span>dua lipa</span> <span>Portrait</span> </li>
            <li class="work-item slide-in"> <span>cocolyze</span> <span>UX/UI Design</span> </li>
            <li class="work-item slide-in"> <span>les indécis</span> <span>Branding</span> </li>
            <li class="work-item slide-in"> <span>game of the goose</span> <span>Game Design</span> </li>
        </ul>

        <footer>
            <p>&copy;Synthwave Inc.</p>
        </footer>
    </main>

    <script>
        // Create an array with the elements to animate (header, work-item, footer, etc.)
        const elementsToAnimate = [
            'header',
            '.work-item',
            'footer'
        ];

        // Get all elements based on the selectors in the array
        const elements = elementsToAnimate.flatMap(selector => {
            return Array.from(document.querySelectorAll(selector)); // Select all elements matching the selector
        });

        // Apply the slide-in animation with staggered delays
        elements.forEach((el, index) => {
            el.style.animationDelay = `${index * 0.1}s`; // Adjust delay (0.1s)
            el.classList.add('slide-in'); // Apply slide-in class for animation
        });
    </script>
</body>
</html>
