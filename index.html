<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu Arrow Effect</title>
    <style>
        :root {
            --white: #ffffff;
            --primary: #ff0; /* Highlight color */
            --background: #010111;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: var(--background);
            color: var(--white);
        }

        .menu {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin: 2rem;
        }

        .menu-item {
            position: relative;
            display: inline-flex;
            align-items: center;
            text-decoration: none;
            color: var(--white);
            font-size: 1.25rem;
            transition: color 0.3s ease;
        }

        .menu-item:hover,
        .menu-item:focus {
            color: var(--primary);
        }

        .arrow {
            content: '';
            display: inline-block;
            position: absolute;
            left: -20px;
            width: 0;
            height: 0;
            border-top: 5px solid transparent;
            border-bottom: 5px solid transparent;
            border-left: 10px solid var(--primary);
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        .menu-item:hover .arrow,
        .menu-item:focus .arrow {
            opacity: 1;
            transform: translateX(-5px);
        }
    </style>
</head>
<body>
    <nav class="menu">
        <a href="#home" class="menu-item">
            <span class="arrow"></span>Home
        </a>
        <a href="#about" class="menu-item">
            <span class="arrow"></span>About
        </a>
        <a href="#services" class="menu-item">
            <span class="arrow"></span>Services
        </a>
        <a href="#contact" class="menu-item">
            <span class="arrow"></span>Contact
        </a>
    </nav>
</body>
</html>
