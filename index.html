<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiminalLoop🩻</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      color: white;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 10px 20px;
      z-index: 1000;
    }
    nav {
      display: flex;
      justify-content: space-around;
    }
    nav a {
      color: inherit;
      text-decoration: none;
      padding: 10px 15px;
    }
    nav a:hover {
      background: #555;
      border-radius: 5px;
    }
    section {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 2em;
    }

    #RGBsplit {
      background: #000;
    }    
    #section2 {
      background: #3498db;
    }
    #section3 {
      background: #e74c3c;
    }
    #section4 {
      background: #9b59b6;
    }

    .rgb-split {
      font-size: 5rem;
      position: relative;
      text-transform: uppercase;
      color: white;
    }
    .rgb-split::before, .rgb-split::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      color: #ff0000;
      overflow: hidden;
      clip-path: inset(0); /* Ensures proper rendering */
    }
    .rgb-split::before {
      transform: translate(-4px, 4px);
      color: #ff0000;
    }
    .rgb-split::after {
      transform: translate(4px, -4px);
      color: #00ffea;
    }
  </style>
</head>
<body>
<header>
  <nav>
    <a href="#RGBsplit">■</a>
    <a href="#section2">Se2</a>
    <a href="#section3">Se3</a>
    <a href="#section4">Se4</a>
  </nav>
</header>

<section id="RGBsplit">
  <h1 class="rgb-split" data-text="Glitch">Glitch</h1>
</section>
<section id="section2">
  Section 2
</section>
<section id="section3">
  Section 3
</section>
<section id="section4">
  Section 4
</section>
</body>
</html>
