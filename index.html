<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaporwave Link Grid</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-transform: uppercase;
            color: #ff6ec7;
            text-shadow: 2px 2px 5px #ff6ec7, 4px 4px 10px #ff9d9d;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 800px;
        }
        .button {
            text-decoration: none;
            text-align: center;
            font-size: 1.2rem;
            color: #ffffff;
            padding: 15px;
            border-radius: 10px;
            background: linear-gradient(45deg, #ff6ec7, #ffc93c);
            box-shadow: 0 5px 15px rgba(255, 110, 199, 0.5);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .button:hover {
            transform: scale(1.1);
            box-shadow: 0 10px 20px rgba(255, 110, 199, 0.8);
        }
        .footer {
            position: absolute;
            bottom: 10px;
            font-size: 0.9rem;
            text-align: center;
            color: rgba(255, 255, 255, 0.6);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div>
        <h1>Vaporwave Links</h1>
        <div class="grid">
            <a href="https://example.com" class="button">Link 1</a>
            <a href="https://example.com" class="button">Link 2</a>
            <a href="https://example.com" class="button">Link 3</a>
            <a href="https://example.com" class="button">Link 4</a>
            <a href="https://example.com" class="button">Link 5</a>
            <a href="https://example.com" class="button">Link 6</a>
        </div>
        <div class="footer">Inspired by Vaporwave Aesthetics</div>
    </div>
</body>
</html>
