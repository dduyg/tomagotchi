<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Seapunk Video Embed</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #7af9c4, #a0f0ed, #b29fff);
      background-size: 400% 400%;
      animation: flow 20s ease infinite;
      font-family: 'Press Start 2P', cursive;
      color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    @keyframes flow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .video-container {
      background: rgba(255, 255, 255, 0.1);
      border: 4px solid #00ffd5;
      border-radius: 20px;
      box-shadow: 0 0 25px #00ffd5, 0 0 50px #b29fff;
      max-width: 800px;
      width: 90%;
      padding: 25px;
      backdrop-filter: blur(10px);
    }

    h2 {
      text-align: center;
      font-size: 20px;
      color: #00ffe7;
      text-shadow: 1px 1px #b29fff;
      margin-bottom: 20px;
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 aspect ratio */
      height: 0;
      overflow: hidden;
      border-radius: 12px;
      border: 2px solid #b29fff;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div class="video-container">
    <h2>Seapunk Splash Zone</h2>
    <div class="video-wrapper">
      <iframe 
        src="https://www.youtube.com/embed/dQw4w9WgXcQ"
        title="YouTube video player"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>

</body>
</html>
