<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 - Not Found</title>
    <style>
        /* General Reset */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Courier New', monospace;
            background-color: #0f0f0f;
            color: #ff0080;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 5rem;
            text-transform: uppercase;
            text-shadow: 0 0 5px rgba(255, 0, 128, 0.8), 0 0 10px rgba(255, 0, 128, 0.7);
            margin-bottom: 1rem;
        }

        p {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            color: #a8ff00;
        }

        .links {
            display: flex;
            gap: 2rem;
            margin-top: 2rem;
        }

        .links a {
            color: #00c8ff;
            text-decoration: none;
            font-size: 1.2rem;
            text-shadow: 0 0 3px rgba(0, 200, 255, 0.7);
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .links a:hover {
            color: #ff00c8;
            text-shadow: 0 0 10px rgba(255, 0, 200, 0.8);
        }

        .logo {
            width: 200px;
            margin-bottom: 3rem;
        }

        .footer {
            position: absolute;
            bottom: 10px;
            font-size: 1rem;
            color: #ff0080;
            opacity: 0.5;
        }

        /* Adding Vaporwave Style to the Background */
        .background {
            background: linear-gradient(45deg, #ff0080, #00c8ff, #a8ff00, #ff00c8);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
</head>
<body>

    <!-- Background Animation -->
    <div class="background"></div>

    <!-- Logo -->
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="40" stroke="black" stroke-width="3" fill="transparent"/>
        <text x="50" y="55" font-size="12" text-anchor="middle" fill="#ff0080">404</text>
    </svg>

    <!-- Main Content -->
    <h1>404 - Page Not Found</h1>
    <p>Oops, it seems like you have entered a dead-end.</p>

    <!-- Links Menu -->
    <div class="links">
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
        <a href="/blog">Blog</a>
    </div>

    <!-- Footer -->
    <div class="footer">
        <p>&copy; 2024 Vaporwave Web. All Rights Reserved.</p>
    </div>

</body>
</html>
