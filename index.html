<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liminal🪩Loop</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      line-height: 1.7;
      background: #f5f5f5;
    }

    header {
      background: #1e293b;
      color: white;
      padding: 2rem 1rem;
    }
    header ul {
      list-style: none;
      padding: 0;
    }
    header li {
      margin-bottom: 1rem;
      cursor: pointer;
      color: white;
    }
    header li:hover {
      color: pink;
    }

    .item {
      margin-bottom: 1.5rem;
      font-size: 1.25rem;
      transition: transform 0.3s ease;
      text-decoration: none;
      color: inherit;
      padding: 0.5rem 1rem;
    }
    .item:hover {
      transform: translateX(10px);
    }
  </style>
</head>
<body>
  <header>
    <ul>
      <li onclick="filterItems('all')">All</li>
      <li onclick="filterItems('post')">Post</li>
      <li onclick="filterItems('project')">Project</li>
      <li onclick="filterItems('product')">Product</li>
    </ul>
  </header>

  <main>
    <a href="#" class="item" data-type="post">Sentiment Analyzer</a>
    <a href="#" class="item" data-type="product">Image Classifier</a>
    <a href="#" class="item" data-type="project">Topic Modeling</a>
    <a href="#" class="item" data-type="post">Object Detection</a>
  </main>

  <script>
    function filterItems(type) {
      const items = document.querySelectorAll('.item');
      items.forEach(item => {
        if (type === 'all' || item.dataset.type === type) {
          item.style.display = 'block';
        } else {
          item.style.display = 'none';
        }
      });
    }
  </script>
</body>
</html>
