<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Always Two Columns Side-by-Side</title>
  <style>
    #container {
      display: flex;
      flex-wrap: nowrap; /* prevent wrapping */
      border: 1px solid;
      width: 100%;
      box-sizing: border-box;
    }

    .column {
      box-sizing: border-box;
      padding: 15px;
      border: 1px solid;
      width: 50%;
      overflow-wrap: break-word;
    }
  </style>
</head>
<body>
  <div id="container">
    <div class="column">Content 1: Lorem ipsum dolor sit amet, consectetur adipiscing elit.</div>
    <div class="column">Content 2: Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua.</div>
  </div>

  <script>
    // No JS needed here for layout because CSS fixes columns at 50% always
  </script>
</body>
</html>
