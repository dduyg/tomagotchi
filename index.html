<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        /* Hide Scrollbars */
        html {
            scrollbar-width: none;
        }
        ::-webkit-scrollbar {
            display: none;
        }     
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Slide and Fade-In Animation */
        .slide-and-fade {
            opacity: 0;
            transform: translateY(30px); /* Start below the normal position */
            animation: slideAndFade 1s ease-in-out forwards; /* Slide and fade in */
        }

        /* Keyframes for the slide-and-fade effect */
        @keyframes slideAndFade { 
            0% { 
                transform: translateY(30px); /* Start below */
                opacity: 0; /* Fully transparent */
            }
            50% { 
                transform: translateY(15px); /* Midway position */
                opacity: 0.5; /* Semi-transparent */
            }
            100% { 
                transform: translateY(0); /* Final position */
                opacity: 1; /* Fully visible */
            }
        }

        /* Body and Layout Styling */
        body {
            font-family: sans-serif;
            background: #F8F8F8; /* Whitish background */
            color: #888;
            line-height: 1.6;
            padding: 0;
            margin: 0;
        }
        .gradient-overlay {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 1000px;
            height: 100%;
            background: linear-gradient(to bottom, #F8F8F8 10%, #C7F6C2 30%, #F8F8F8 90%);
            z-index: -1;
        }
        main {
            max-width: 800px;
            margin: 40% auto 0;
            width: 90%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .synth {
            font-size: 1.2rem;
        }

        .work-list {
            list-style: none;
        }
        .work-item {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid currentColor;
            padding: 10px 0;
            font-size: 1.2rem;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <div class="gradient-overlay"></div>

    <main>
        <header>
            <h1 class="title">Synthwave</h1>
            <div class="synth">🩸🪝</div>
        </header>

        <ul class="work-list">
            <li class="work-item"> <span>sharlee</span> <span>Branding</span> </li>
            <li class="work-item"> <span>dua lipa</span> <span>Portrait</span> </li>
            <li class="work-item"> <span>cocolyze</span> <span>UX/UI Design</span> </li>
            <li class="work-item"> <span>les indécis</span> <span>Branding</span> </li>
            <li class="work-item"> <span>game of the goose</span> <span>Game Design</span> </li>
        </ul>

        <footer>
            <p>&copy; 2024 Synthwave Inc.</p>
        </footer>
    </main>

    <script>
        // Create an array with the elements to animate (header, work-item, footer, etc.)
        const elementsToAnimate = [
            'header', // Select header
            '.work-item', // Select all work items
            'footer' // Select footer
        ];

        // Get all elements based on the selectors in the array
        const elements = elementsToAnimate.flatMap(selector => {
            return Array.from(document.querySelectorAll(selector)); // Select all elements matching the selector
        });

        // Apply the slide-and-fade animation with staggered delays
        elements.forEach((el, index) => {
            el.style.animationDelay = `${index * 0.15}s`; // Adjust delay (0.15s per element)
            el.classList.add('slide-and-fade'); // Dynamically add slide-and-fade class
        });
    </script>
</body>
</html>
