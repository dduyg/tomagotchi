<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mace</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&display=swap');

body {
    font-family: 'Roboto Mono', monospace;
    background-color: #F4F4F4;
    color: #222;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
    max-width: 800px;
}

/* HEADER STYLING */
header {
    text-align: left;
    margin-bottom: 20px;
}

.full-header {
    width: 100%;
    font-size: 12px;
    font-weight: bold;
    padding-bottom: 5px;
}

.header-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: bold;
}

/* MAIN TYPOGRAPHY */
h1 {
    font-size: 64px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 8px;
}

.highlight {
    border: 2px solid black;
    padding: 5px;
}

/* SS05 SPECIAL BOX */
.ss05-container {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    margin: 0 5px;
}

.ss05-box {
    border: 2px solid black;
    padding: 5px 10px;
    font-size: 64px;
    line-height: 1;
}

.ss05-label {
    font-size: 12px;
    border: 1px solid black;
    padding: 2px 6px;
    margin-top: 2px;
    background: white;
}

/* TAGLINE */
.tagline {
    font-size: 14px;
    margin: 10px 0;
    font-weight: bold;
}

.description {
    font-size: 14px;
    max-width: 600px;
    margin: 0 auto;
}

/* BADGE IN TOP RIGHT */
.badge {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 80px;
    height: 80px;
    background: #E54E26;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 14px;
    font-weight: bold;
}

.circle {
    font-size: 16px;
    font-weight: bold;
}

.text {
    font-size: 10px;
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="full-header">PART-NUMBER MRKL-V01-JLCTYP</div>
            <div class="header-row">
                <div class="styles">7 STYLE</div>
                <div class="weight-range">LIGHT → HEAVY</div>
            </div>
        </header>

        <main>
            <h1>
                <span class="highlight">M</span>arkl 
                <span class="ss05-container">
                    <span class="ss05-box">o</span>
                    <span class="ss05-label">SS05</span>
                </span>
                mono
            </h1>
            <div class="tagline">NEW-2025-MONO</div>
            <p class="description">
                Non-proportional typeface designed for optimal readability at small sizes. 
                With its clean & structured letterforms.
            </p>
        </main>

        <div class="badge">
            <div class="circle">V.1</div>
            <div class="text">MARKL MONO</div>
        </div>
    </div>
</body>
</html>
