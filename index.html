<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle Shape ❍</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0; /* Light background for contrast */
    }

    .circle {
      width: 100px; /* Circle width */
      height: 100px; /* Circle height */
      border-radius: 50%; /* Makes it a perfect circle */
      border: 5px solid black; /* Base border */
      border-right-width: 10px; /* Thicker right border */
      box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.3); /* Light offset shadow */
      background-color: white; /* Background color of the circle */
    }

    h1 {
      font-size: 3rem;
      text-align: center;
      margin-top: 50px;
    }
  </style>
</head>
<body>
  <div class="circle"></div>

  <h1>❍</h1>
</body>
</html>
