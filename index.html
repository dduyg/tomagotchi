<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        body {
            background: linear-gradient(135deg, #1b1b1b, #3d3d5c);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background-size: cover;
            flex-direction: column;
        }
        
        .links {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }
        .links a {
            color: #00ffff;
            font-size: 1.2em;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s ease, transform 0.3s ease;
        }
        .links a:hover {
            color: #ff00ff;
            transform: scale(1.1);
        }

        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
            animation: rotateLogo 4s infinite linear;
        }
        @keyframes rotateLogo {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }   
        svg path {
            fill: #ffcc00;
            transition: fill 0.3s ease;
        }

        svg path:hover {
            fill: #ff00ff;
        }
    </style>
</head>
<body>
    <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M20,10 C40,5, 60,5, 80,20 C70,40, 60,80, 40,90 C20,80, 15,60, 20,40 C25,30, 35,20, 20,10 Z"/>
    </svg>

    <p>Oops! The page you're looking for doesn't exist.</p>
    
    <div class="links">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="#">Blog</a>
    </div>
</body>
</html>
