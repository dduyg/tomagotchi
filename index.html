<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Lost in the Code</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #f8f8f2;
      font-family: 'Orbitron', monospace;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    h1 {
      font-size: 6rem;
      margin: 0;
      color: #ff6ec7;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #ff6ec7;
      animation: glitch 2s infinite;
    }

    p {
      font-size: 1.5rem;
      color: #f8f8f2;
      max-width: 80%;
      text-align: center;
      margin: 1.5rem 0;
    }

    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #00ffff;
      color: #1a1a1a;
      text-decoration: none;
      font-weight: bold;
      border-radius: 5px;
      box-shadow: 0 0 10px #00ffff;
      transition: background 0.3s ease;
    }

    a:hover {
      background: #ff6ec7;
      box-shadow: 0 0 15px #ff6ec7;
    }

    @keyframes glitch {
      0% {
        transform: translate(0);
      }
      20% {
        transform: translate(-2px, 2px);
      }
      40% {
        transform: translate(2px, -2px);
      }
      60% {
        transform: translate(-1px, 1px);
      }
      80% {
        transform: translate(1px, -1px);
      }
      100% {
        transform: translate(0);
      }
    }

    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(255, 255, 255, 0.03),
        rgba(255, 255, 255, 0.03) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="scanlines"></div>
  <h1>404</h1>
  <p>You're adrift in the datastream.<br />The file you seek is lost in the void, maybe it never existed...</p>
  <a href="/">Return to Reality (Home)</a>
</body>
</html>
