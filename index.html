<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404: Lost in the CyberSea</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0ff 0%, #00f 100%);
      color: #fff;
      font-family: 'Courier New', Courier, monospace;
      background-image: repeating-linear-gradient(
        45deg,
        rgba(255, 255, 255, 0.02) 0px,
        rgba(255, 255, 255, 0.02) 2px,
        transparent 2px,
        transparent 4px
      );
      overflow: hidden;
      animation: glitch-bg 10s infinite alternate;
    }

    @keyframes glitch-bg {
      0% { filter: hue-rotate(0deg); }
      100% { filter: hue-rotate(360deg); }
    }

    .glitch {
      position: absolute;
      top: 20%;
      width: 100%;
      text-align: center;
      font-size: 4rem;
      font-weight: bold;
      text-shadow:
        2px 2px #0ff,
        -2px -2px #f0f,
        0 0 10px #fff;
      animation: glitch 1.5s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -1px); }
      60% { transform: translate(-1px, 1px); }
      80% { transform: translate(1px, -2px); }
      100% { transform: translate(0, 0); }
    }

    .message {
      position: absolute;
      top: 50%;
      width: 100%;
      text-align: center;
      font-size: 1.2rem;
      padding: 0 1rem;
    }

    .home-link {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 2rem;
      background-color: #000;
      color: #0ff;
      text-decoration: none;
      border: 2px solid #0ff;
      border-radius: 8px;
      box-shadow: 0 0 15px #0ff;
      transition: all 0.3s ease;
    }

    .home-link:hover {
      background-color: #0ff;
      color: #000;
      box-shadow: 0 0 30px #0ff;
    }
  </style>
</head>
<body>
  <div class="glitch">404: Signal Lost</div>
  <div class="message">
    <p>
      The page you're looking for drifted into the deep net. It's floating somewhere beyond the data reef... or maybe it never existed.
    </p>
    <p>
      Plug back into the mainframe:
    </p>
    <a href="/" class="home-link">Return to Home Base</a>
  </div>
</body>
</html>
