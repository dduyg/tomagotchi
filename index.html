<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Columns</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: gray;
            margin: 0;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            align-items: start;
        }

        .property-info {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 10px;
            margin-bottom: 10px;
        }

        .property {
            font-weight: bold;
        }

        .info {
            margin-bottom: 10px;
        }

        h3 {
            margin-top: 0;
        }

        .column:nth-child(3) {
            grid-column: span 2;
        }

        @media screen and (min-width: 30em) {
            .container {
                grid-template-columns: 1fr 1fr 1fr;
                grid-template-rows: auto auto auto;
            }

            .column:nth-child(3) {
                grid-column: span 1;
            }

            .column:nth-child(1), .column:nth-child(2) {
                grid-column: span 1;
            }

            .column:nth-child(3) {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="column">
            <div class="property-info">
                <div class="property">CATEGORY:</div>
                <div class="info">Branding, Design, Web Development</div>
            </div>
            <div class="property-info">
                <div class="property">YEAR:</div>
                <div class="info">2024</div>
            </div>
            <div class="property-info">
                <div class="property">CLIENT:</div>
                <div class="info">LiminalLoop</div>
            </div>
        </div>
        <div class="column"></div> <!-- Empty column for spacing -->
        <div class="column">
            <h3>Summary</h3>
            <p>ACT Responsable is a French association created to identify and collect the best communications campaigns around the world in order to raise awareness on social and environmental issues...</p>
        </div>
    </div>
</body>
</html>
