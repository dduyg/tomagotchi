<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiminalLoop</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
      color: black;
    }

    .circle {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      background-color: transparent;
      box-shadow: 0 0 0 3px black, 5px 0 0 5px black; /* Outer "border" and inner shadow */
    }
  </style>
</head>
<body>
  <div class="circle"></div>
</body>
</html>
