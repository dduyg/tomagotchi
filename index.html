<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        body {
            background: linear-gradient(to left, #243b55, #7289da);
            color: #e0e0e0; /* Light gray text */
            font-family: 'Courier New', Courier, monospace; /* Futuristic font */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .container {
            border: 3px solid #ff0000;
            border-radius: 5px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.4);
            width: 80%;
            margin-bottom: 20px;
            text-align: center;
        }
        video {
            width: 100%; /* Makes the video fill the container width */
            height: auto;
        }
        h3 {
            margin-top: 10px;
            color: #ff0000; /* Red text for emphasis */
            font-size: 1.8em;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7); /* Shadow for a more rugged look */
        }
    </style>
</head>
<body>      
    <div class="container">    
        <video controls>      
            <source src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/04/FadedEchoes.mp4" type="video/mp4">     
            Your browser does not support the video tag.
        </video>  
        <h3>Cyberpunk Video</h3>
    </div>
</body>
</html>
