<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulsing Circle</title>
    <style>
      body {
          background-image: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/detail-11.jpg');
          background-size: cover;
          background-position: center;     
  font-family: 'Authenticsans 60', sans-serif;
  font-size: 2rem;
        color: #FBFBFB;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chromaticPulseCircle {
    width: 0.5em;
    height: 0.5em;
    border-radius: 50%;
    background-color: red;
    animation: chromaticPulse 10s infinite ease-in-out;
}

@keyframes chromaticPulse {
    0% {
        transform: scale(1);
        background-color: red;
        opacity: 1;
    }
    20% {
        transform: scale(1.3);
        background-color: orange;
        opacity: 0.9;
    }
    40% {
        transform: scale(1);
        background-color: yellow;
        opacity: 1;
    }
    60% {
        transform: scale(1.3);
        background-color: green;
        opacity: 0.9;
    }
    80% {
        transform: scale(1);
        background-color: blue;
        opacity: 1;
    }
    100% {
        transform: scale(1.3);
        background-color: red;
        opacity: 0.9;
    }
}
    </style>
</head>
<body>
    <p>And what if these<br>poor letters dream</p>
    <p>Of freedom from<br>the page & screen?</p>
    <div class="chromaticPulseCircle"></div>
    <p>Perhaps they long<br>to love or kill</p>
    <p>Or rearange<br>themselves at will</p>
</body>
</html>
