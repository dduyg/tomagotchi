<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff00f7, #00ff99);
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            flex-direction: column;
            overflow: hidden;
        }

        .container {
            transform: scale(1.2);
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 100px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7), 0 0 20px rgba(255, 255, 255, 0.7), 0 0 30px rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
        }

        p {
            font-size: 24px;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.7), 0 0 10px rgba(255, 255, 255, 0.7);
            margin-bottom: 40px;
        }

        .back-link {
            color: #ff00f7;
            text-decoration: none;
            font-size: 18px;
            border: 1px solid #ff00f7;
            padding: 10px 20px;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .back-link:hover {
            background-color: #ff00f7;
            color: #fff;
            box-shadow: 0 0 10px #ff00f7, 0 0 20px #ff00f7;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .neon-effect {
            font-size: 30px;
            color: #00ff99;
            text-shadow: 0 0 10px rgba(0, 255, 153, 0.8), 0 0 20px rgba(0, 255, 153, 0.8), 0 0 30px rgba(0, 255, 153, 0.8);
        }

        .vaporwave-bg {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 300px;
            height: 300px;
            background-image: url('https://cdn.pixabay.com/photo/2020/09/19/19/43/vaporwave-5588683_960_720.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 50%;
            opacity: 0.3;
            transform: translate(-50%, -50%);
            animation: pulse 5s infinite ease-in-out;
        }

        @keyframes pulse {
            0% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.3;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.2);
                opacity: 0.5;
            }
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.3;
            }
        }
    </style>
</head>
<body>
    <div class="vaporwave-bg"></div>
    <div class="container">
        <h1>404</h1>
        <p class="neon-effect">Page Not Found</p>
        <p>Looks like the page you're looking for doesn't exist.</p>
        <a href="/" class="back-link">Back to Home</a>
    </div>
</body>
</html>
