<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 Not Found</title>
    <style>
        body {
            background-color: #F598FF;
            font-family: monospace;
            color: #a8a8a8;
            text-align: center;
            line-height: 1.5;
            margin: 0;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            overflow: hidden;
        }

        h1 {
            font-size: 6rem;
            position: relative;
            animation: static-noise 0.3s infinite;
        }
        @keyframes static-noise {
  0%, 100% { opacity: 1; }
  10% { opacity: 0.6; }
  20% { opacity: 1.2; }
  30% { opacity: 0.8; }
  40% { opacity: 1.1; }
  50% { opacity: 0.7; }
  60% { opacity: 1.3; }
  70% { opacity: 0.5; }
} 

        p {
            font-size: 1.4rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>    
    <h1>404</h1>
    <p>We couldn't find the page you're looking for. It might have been moved, deleted, or never existed.</p>
</body>
</html>
