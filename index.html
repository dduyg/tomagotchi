<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Not Found</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: radial-gradient(ellipse at center, #0f0f0f 0%, #000000 100%);
      color: #00ffea;
      font-family: 'Share Tech Mono', monospace;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      overflow: hidden;
    }

    .glitch {
      font-size: 3rem;
      color: #00ffea;
      position: relative;
      animation: glitch 1s infinite;
    }

    @keyframes glitch {
      0% {text-shadow: 2px 0 red, -2px 0 cyan;}
      20% {text-shadow: -2px -1px red, 2px 1px cyan;}
      40% {text-shadow: 2px 1px red, -2px -1px cyan;}
      60% {text-shadow: -2px 0 red, 2px 0 cyan;}
      80% {text-shadow: 2px -1px red, -2px 1px cyan;}
      100% {text-shadow: -2px 1px red, 2px -1px cyan;}
    }

    h1 {
      font-size: 8rem;
      margin: 1rem 0;
    }

    p {
      font-size: 1.5rem;
      margin-bottom: 2rem;
      color: #ccc;
    }

    a {
      font-size: 1.2rem;
      color: #00ffea;
      text-decoration: none;
      border: 2px solid #00ffea;
      padding: 0.5rem 1.2rem;
      border-radius: 4px;
      transition: background 0.3s, color 0.3s;
    }

    a:hover {
      background: #00ffea;
      color: #000;
    }

    .scanlines::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        rgba(0, 255, 234, 0.03),
        rgba(0, 255, 234, 0.03) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
    }
  </style>
</head>
<body class="scanlines">
  <div class="glitch">NEURAL INTERFERENCE</div>
  <h1>404</h1>
  <p>The data stream you were tracing has vanished into the void.</p>
  <a href="/">Return to Home Node</a>
</body>
</html>
