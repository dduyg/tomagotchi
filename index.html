<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liminal🫒Loop</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .main-content {
      flex: 1;
      padding: 40px;
      padding-right: 100px; /* spacing for tabs */
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .tab-menu {
      width: 80px;
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      background: #fff;
      border-left: 2px solid #000;
    }

    .tab-button {
      width: 80px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #000;
      border-left: none;
      border-radius: 30px 0 0 30px;
      margin-bottom: 10px;
      background: #fff;
      cursor: pointer;
      transition: background 0.3s;
    }

    .tab-button.active {
      background: #ddd;
    }

    .tab-button i {
      font-size: 20px;
    }
  </style>

  <!-- Icons via Font Awesome (Optional) -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

  <div class="main-content">
    <div id="tab1" class="tab-content active">
      <p>Profile section content here...</p>
    </div>
    <div id="tab2" class="tab-content">
      <p>Tools/settings section content here...</p>
    </div>
    <div id="tab3" class="tab-content">
      <p>Web/network section content here...</p>
    </div>
    <div id="tab4" class="tab-content">
      <p>Telegram/Send section content here...</p>
    </div>
  </div>

  <div class="tab-menu">
    <button class="tab-button active" onclick="switchTab('tab1', this)">
      <i class="fas fa-user"></i>
    </button>
    <button class="tab-button" onclick="switchTab('tab2', this)">
      <i class="fas fa-tools"></i>
    </button>
    <button class="tab-button" onclick="switchTab('tab3', this)">
      <i class="fas fa-globe"></i>
    </button>
    <button class="tab-button" onclick="switchTab('tab4', this)">
      <i class="fab fa-telegram-plane"></i>
    </button>
  </div>

  <script>
    function switchTab(tabId, button) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');

      document.querySelectorAll('.tab-button').forEach(btn => btn.classList.remove('active'));
      button.classList.add('active');
    }
  </script>
</body>
</html>
