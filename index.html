<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiminalLoop</title>
  <link href="https://fonts.googleapis.com/css2?family=Bruno+Ace+SC&display=swap" rel="stylesheet">
  <style>
    @font-face {
      font-family: 'Grotta';
      src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Grotta-Regular.woff2') format('woff2');
      font-style: normal;
      font-weight: normal;
      font-display: swap;
    }
    body {
      font-family: 'Grotta', sans-serif;
      background: #E5C7BC;
      color: #1E1E1E;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    main {
      max-width: 600px;
      padding: 0 20px;
    }
    
    h1 {
      font-size: 9rem;
      margin: 0;
      position: relative;
      animation: glitch 2s infinite;
    }
    @keyframes glitch {
      0% {transform: translate(0);}
      20% {transform: translate(-2px, -2px);}
      40% {transform: translate(2px, 2px);}
      60% {transform: translate(-2px, 2px);}
      80% {transform: translate(2px, -2px);}
      100% {transform: translate(0);}
    }
    h1::before,
    h1::after {
      content: "404";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: inherit;
      overflow: hidden;
      clip-path: inset(0 0 50% 0);
      animation: glitch-lines 2s infinite;
    }
    h1::after {
      clip-path: inset(50% 0 0 0);
      animation-delay: 1s;
    }
    @keyframes glitch-lines {
      0%, 100% {transform: translateX(0);}
      50% {transform: translateX(-10px);}
    }

    p {
      font-size: 1.4rem;
      margin: 0 0 20px;
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      font-size: 1.2rem;
      font-family: "Bruno Ace SC", serif;
      padding: 10px 20px;
      background: #FBDFD4;
      color: #B17E6D;
      border-radius: 25px;
      transition: 0.3s ease;
    }
    a:hover {
      background: #B17E6D;
      color: #FBDFD4;
      transform: scale(1.1);
    }

    header {
      position: fixed;
      top: 0
      left: 0;
      width: 100%;
      padding: 40px 20px 0;
      display: flex;
      justify-content: space-between;
    }

    .typewriter {
      display: block;
      font-size: 15px;
      margin: 0;
      overflow: hidden;
      white-space: nowrap;
      border-right: 4px solid white;
      animation: typing 2s steps(10, end), blink 0.5s step-end infinite alternate;
    }
    @keyframes typing {
      from {width: 0;}
      to {width: 100%;}
    }
    @keyframes blink {
      from {border-color: transparent;}
      to {border-color: white;}
    }

    .bouncing {
      display: block;
      font-size: 15px;
      margin: 0;
      animation: bounce 1.5s infinite;
    }
    @keyframes bounce {
      0%, 100% {transform: translateY(0);}
      50% {transform: translateY(-30px);}
    }
  </style>
</head>
<body>
<main>
  <header>
    <div class="typewriter">Aquatic Algorithms</div>
    <div class="bouncing">Matrix of the Machine</div>
  </header>
  <h1>404</h1>  
  <p>Waves of code crash on digital shores. Digital currents flow, coding in the sea. Neon code streams ignite. Aquatic algorithms rule here. Oceanic data, digital depths. Sailing through algorithms, navigating currents of code.</p>
  <a href="#">⌬Digital Architects</a>
</main>
</body>
</html>
