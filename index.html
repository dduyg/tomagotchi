<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 4em;
            margin-bottom: 20px;
            color: #2c3e50;
        }
        p {
            font-size: 1.2em;
            margin-bottom: 30px;
        }
        a {
            text-decoration: none;
            color: #fff;
            background-color: #3498db;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        a:hover {
            background-color: #2980b9;
        }
        .graphic {
            margin-bottom: 20px;
        }
        .graphic img {
            max-width: 100%;
            height: auto;
        }
        .code {
            background-color: #ecf0f1;
            padding: 15px;
            border-radius: 5px;
            display: inline-block;
            margin-top: 15px;
            font-family: monospace;
            font-size: 1em;
            color: #34495e;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="graphic">
            <img src="https://via.placeholder.com/400x200?text=Data+Not+Found" alt="404 graphic">
        </div>
        <h1>404: Page Not Found</h1>
        <p>Oops! The page you are looking for doesn't exist.</p>
        <p>It seems like you're exploring data that doesn't add up!</p>
        <p class="code">Error Code: 404_NOT_FOUND</p>
        <a href="/">Back to Homepage</a>
    </div>
</body>
</html>
