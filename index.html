<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Quicksand", sans-serif;
      margin: 0;
      padding: 30% 5% 40%;
      background-color: #F3F7F0;
      color: black;
    }

    header {
      font-size: 3rem;
      text-align: center;
      margin: 0 auto;
      padding-bottom: 10%;
    }
    main {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
    }
    section {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 250px;
      height: 125px;
      border: 1px ridge #000;
    }
    h2 {
      font-weight: 550;
    }

    /* 1. Distorted Vertical Wave */
    .wave {
      animation: wave 0.2s infinite ease-in-out;
    }
    @keyframes wave {
      0%, 100% { transform: scaleY(1); }
      25% { transform: scaleY(1.2); }
      50% { transform: scaleY(0.8); }
    }

    /* 2. Horizontal Scanlines */
    .scanlines {
      position: relative;
    }
    .scanlines::before {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #DFE0DC;
      clip-path: polygon(0 10%, 100% 10%, 100% 20%, 0 20%);
      animation: scanlines 0.2s infinite;
    }
    @keyframes scanlines {
      0%, 100% { clip-path: polygon(0 10%, 100% 10%, 100% 20%, 0 20%); }
      50% { clip-path: polygon(0 50%, 100% 50%, 100% 60%, 0 60%); }
    }    

    /* 3. Text Distortion */
    .distort span {
      display: inline-block;
      animation: distort 0.3s infinite;
    }
    @keyframes distort {
      0%, 100% { transform: scale(1, 1); }
      50% { transform: scale(1.2, 0.8); }
    }

    /* 4. Split Displacement */
    .split {
      position: relative;
      overflow: hidden;
      color: #E9EDE6;
    }
    .split::before,
    .split::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      color: black;
    }
    .split::before {
      clip-path: inset(0 0 50% 0);
      transform: translateX(-2px);
      animation: slice 0.9s infinite;
    }
    .split::after {
      clip-path: inset(50% 0 0 0);
      transform: translateX(2px);
      animation: slice 0.9s infinite reverse;
    }
    @keyframes slice {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(5px); }
    }
    
    /* 5. Static Interference */
    .static {
      animation: static 0.2s infinite;
    }
    @keyframes static {
      0%, 100% { filter: none; }
      25% { filter: blur(1px) contrast(150%); }
      50% { filter: brightness(150%) contrast(200%); }
      75% { filter: blur(0.5px) brightness(100%) contrast(100%); }
    }

    /* 6. Randomized Vertical Glitch */
    .vertical-glitch {
      display: inline-block;
      animation: verticalGlitch 0.3s infinite;
    }
    @keyframes verticalGlitch {
      0%, 100% { transform: translateY(0); }
      20% { transform: translateY(-5px); }
      40% { transform: translateY(5px); }
      60% { transform: translateY(-3px); }
      80% { transform: translateY(3px); }
    }

    /* 7. Data Corruption */
    .corruption {
      position: relative;
      animation: corruption 0.4s infinite;
    }
    @keyframes corruption {
      0%, 100% { clip-path: inset(0 0 0 0); }
      50% { clip-path: inset(0 0 0 50%); }
    }

    /* 8. Glitch Flash */
    .glitch-flash {
      animation: glitch-flash 0.4s infinite;
    }
    @keyframes glitch-flash {
      0%, 100% { transform: scale(1, 1); opacity: 1; }
      25% { transform: scale(1.2, 0.8); opacity: 0.5; }
      50% { transform: scale(0.8, 1.2); opacity: 0.2; }
      75% { transform: scale(1, 1); opacity: 1; }
    }

    /* 9. Scanline Interference */
    .scanline-interference {
      display: inline-block;
      position: relative;
      color: #DFE3DC;
    }
    .scanline-interference::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: black;
      animation: scanline-interference 0.5s infinite;
    }
    @keyframes scanline-interference {
      0%, 100% { clip-path: inset(0 0 100% 0); }
      25% { clip-path: inset(0 0 10% 0); }
      50% { clip-path: inset(0 0 50% 0); }
      75% { clip-path: inset(0 0 30% 0); }
    }

    /* 10. Vertical Distortion */
    .vertical-distort {
      animation: vertical-distort 0.4s infinite ease-in-out;
    }
    @keyframes vertical-distort {
      0%, 100% { transform: scaleY(1); }
      25% { transform: scaleY(1.5); }
      50% { transform: scaleY(0.5); }
      75% { transform: scaleY(1.2); }
    }

    /* 11. Digital Stretch */
    .stretch {
      animation: stretch 0.5s infinite alternate;
    }
    @keyframes stretch {
      0%, 100% { transform: none; }
      50% { transform: scale(1.1) skew(5deg, 5deg); }
    }

    /* 12. Text Break */
    .text-break {
      display: inline-block;
      animation: text-break 2s infinite;
    }     
    @keyframes text-break {
      0% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { transform: translateX(0); }
    }
    
    /* 13. Matrix Fall */
    .matrix-fall {
      letter-spacing: 2px;
      animation: matrix-fall 3s infinite linear;
    }
    @keyframes matrix-fall {
      0% {opacity: 0.1; transform: translateY(-20px);}
      50% {opacity: 1; transform: translateY(0);}
      100% {opacity: 0.1; transform: translateY(20px);}
    }

    /* 14. Vertical Line Glitch */
    .vertical-line-glitch {
      position: relative;
      display: inline-block;
      animation: vertical-glitch 1s infinite alternate;
    }
    .vertical-line-glitch::before {
      content: '|';
      position: absolute;
      top: 0;
      left: 0;
      color: #00ff00;
      animation: vertical-line-animation 0.2s infinite;
    }
    @keyframes vertical-glitch {
      0% { transform: skewY(0deg); }
      50% { transform: skewY(10deg); }
      100% { transform: skewY(-10deg); }
    }
    @keyframes vertical-line-animation {
      0% { top: 0; left: 0; }
      25% { top: -10px; left: 5px; }
      50% { top: 10px; left: -5px; }
      75% { top: 0; left: 5px; }
      100% { top: -5px; left: -5px; }
    }

    /* 15. Pixelated Text Flicker */
    .pixel-flicker { 
      font-size: 2em;
      color: #E1D9D1;
      animation: pixelFlicker 0.1s infinite;
    }
    @keyframes pixelFlicker {
      0% { text-shadow: 1px 1px 0 #0f0, -1px -1px 0 #ff00ff; }
      50% { text-shadow: 1px -1px 0 #ff00ff, -1px 1px 0 #0f0; }
      100% { text-shadow: 1px 1px 0 #ff00ff, -1px -1px 0 #0f0; }
    }

    /* 16. Pixelated Breakdown */
    .pixel-breakdown {
      position: relative;
      display: inline-block;
      animation: pixelBreakdown 1.5s infinite;
    }
    @keyframes pixelBreakdown {
      0% { letter-spacing: normal; }
      25% { letter-spacing: 5px; }
      50% { letter-spacing: 10px; }
      75% { letter-spacing: 5px; }
      100% { letter-spacing: normal; }
    }

    /* 17. Pixel Data Corruption */
    .pixel-corruption {
      position: relative;
      animation: pixelCorruption 1s infinite alternate;
    }
    @keyframes pixelCorruption {
      0% { letter-spacing: 0; }
      50% { letter-spacing: 10px; transform: scale(1.1); }
      100% { letter-spacing: 0; transform: scale(1); }
    }

    /* 18. Terminal Typing Effect */
    .terminal-typing {
      overflow: hidden;
      white-space: nowrap;
      animation: terminal-typing 2s steps(15, end) infinite, blink 0.5s step-end infinite;
    }
    @keyframes terminal-typing {
      from { width: 0; }
      to { width: 100%; }
    }
    @keyframes blink {
      50% { border-right: 2px solid #00ff99; }
    }

    /* 19. Digital Scramble */
    .digital-scramble {
      display: inline-block;
      animation: digital-scramble 1s infinite;
    }
    @keyframes digital-scramble {
      0% { transform: scale(1); }
      30% { transform: translateY(-10px) rotate(10deg); }
      50% { transform: scale(1.2) rotate(30deg); }
      70% { transform: translateY(10px) rotate(-15deg); }
      100% { transform: scale(1); }
    }

    /* 20. Terminal Glitch */
    .terminal-glitch {
      color: white;
      position: relative;
      overflow: hidden;
    }
    .terminal-glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      font-size: 0.6em;
      color: rgba(255, 255, 255, 0.3);
      animation: terminal-glitch 0.15s infinite alternate;
    }
    @keyframes terminal-glitch {
      0% { opacity: 0; }
      25% { opacity: 1; }
      50% { opacity: 0; }
      75% { opacity: 0.5; }
      100% { opacity: 0; }
    }

    /* 21. Matrix Stream Glitch */
    .matrix-stream {
      color: #0f0;
      position: relative;
      overflow: hidden;
    }
    .matrix-stream::before {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      animation: matrix-stream 1s infinite;
    }
    @keyframes matrix-stream {
      0% { transform: translateY(0); opacity: 1; }
      25% { transform: translateY(5px); opacity: 0.5; }
      50% { transform: translateY(-5px); opacity: 0.2; }
      75% { transform: translateY(5px); opacity: 0.5; }
      100% { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <header>🩹🎱🎣🎮🏮</header>
  <main>
    <section>
      <h2 class="wave">echochamber</h2>
    </section>
    <section>
      <h2 class="scanlines" data-text="hypnagogic">hypnagogic</h2>
    </section>
    <section>
      <h2 class="distort"><span>o</span><span>b</span><span>s</span><span>i</span><span>d</span><span>i</span><span>a</span><span>n</span></h2>
    </section>
    <section>
      <h2 class="split" data-text="monochrome">monochrome</h2>
    </section>
    <section>
      <h2 class="static">oscillation</h2>
    </section>
    <section>
       <h2 class="vertical-glitch">fragmented</h2>
    </section>
    <section>
      <h2 class="corruption">paradigm</h2>
    </section>
    <section>
      <h2 class="glitch-flash">kaleidoscope</h2>
    </section>
    <section>
      <h2 class="scanline-interference" data-text="halcyon">halcyon</h2>
    </section>
    <section>
      <h2 class="vertical-distort">iridescent</h2>
    </section>
    <section>
      <h2 class="stretch">resonance</h2>
    </section>
    <section>
      <h2 class="text-break">therefore</h2>
    </section>
    <section>
      <h2 class="matrix-fall">System Error.<br>Rebooting...</h2>
    </section>
    <section>
      <h2 class="vertical-line-glitch">vertical line</h2>
    </section>
    <section>
      <h2 class="pixel-flicker">gradual</h2>
    </section>
    <section>
      <h2 class="pixel-breakdown">encryption</h2>
    </section>
    <section>
      <h2 class="pixel-corruption">renderer</h2>
    </section>
    <section>
      <h2 class="terminal-typing" data-text="Terminal Typing Glitch">Terminal Typing Glitch</h2>
    </section>
    <section>
      <h2 class="digital-scramble">Digital Scramble</h2>
    </section>
    <section>
      <h2 class="terminal-glitch" data-text="Loading... | Error: 404 | Connection Lost">Terminal Glitch</h2>
    </section>
    <section>
      <h2 class="matrix-stream" data-text="Matrix Stream Glitch">Matrix Stream Glitch</h2>
    </section>
  </main>
</body>
</html>
