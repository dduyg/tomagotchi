<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🧫Loop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
            text-align: center;
        }

        .header {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
        }

        .header span {
            color: green;
            font-size: 28px;
        }

        .sub-text {
            color: gray;
            font-style: italic;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0;
        }

        .gallery img {
            width: 200px;
            height: auto;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        .footer {
            margin-top: 20px;
            padding: 20px;
        }

        .like-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: blue;
            color: white;
            padding: 15px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>

    <div class="header">
        Refraction <span>*</span> <span style="color: blue;">(Shape)(Color)</span>
    </div>
    <p class="sub-text">--- Some test exercises for form and color ---</p>

    <div class="gallery">
        <img src="https://via.placeholder.com/200" alt="Artwork 1">
        <img src="https://via.placeholder.com/200" alt="Artwork 2">
        <img src="https://via.placeholder.com/200" alt="Artwork 3">
        <img src="https://via.placeholder.com/200" alt="Artwork 4">
        <img src="https://via.placeholder.com/200" alt="Artwork 5">
        <img src="https://via.placeholder.com/200" alt="Artwork 6">
    </div>

    <div class="like-button" onclick="like()">
        👍
    </div>

    <script>
        function like() {
            alert("You liked this!");
        }
    </script>

</body>
</html>
