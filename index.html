<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>LiminalLoop</title>
  <style>
@import url("https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300&family=Space+Mono&display=swap");
*, *::after, *::before { box-sizing: border-box; }
:root {
  --color-background: rgb(20, 24, 30);
  --color-foreground: rgb(230, 230, 230);
  --color-accent: rgb(100, 200, 255);
  --font-primary: "Cormorant", serif;
  --font-mono: "Space Mono", monospace;
  --margin: 32px;
  --gutter: 16px;
}
body {
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  margin: 0;
  padding: 0;
  font-family: var(--font-primary);
  background: radial-gradient(circle at 10% 20%, rgb(0, 0, 0) 0%, rgb(10, 10, 20) 90%);
  color: var(--color-foreground);
  letter-spacing: -0.03em;
  position: relative;
  text-align: center;
}

canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100vw;
  height: 100vh;
}

.layout {
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  width: 100%;
  height: 100vh;
  position: relative;
  padding: 6rem 2rem;
  z-index: 100;
  pointer-events: none;
}

.layout__header,
.layout__footer,
.layout__middle,
.layout__bottom {
  display: flex;
  justify-content: space-between;
  align-items: center;
  width: 100%;
}

.layout__header-text,
.layout__footer-text {
  font-family: var(--font-mono);
}

.layout__header-text {
  font-size: 2rem;
  font-weight: 700;
  line-height: 30px;
}

.layout__middle-text {
  font-size: 0.75rem;
  text-transform: uppercase;
}

.layout__middle-text--right {
  text-align: right;
  transform: rotate3d(0, 0, 1, 90deg) translate3d(100%, 10px, 0);
  transform-origin: right;
  white-space: nowrap;
  font-family: var(--font-mono);
  text-transform: uppercase;
}

.layout__footer-text {
  font-size: 15rem;
  line-height: 1em;
  letter-spacing: -0.05em;
  margin: 0;
}

.layout__label {
  position: absolute;
  font-size: 0.75rem;
  line-height: 1;
  text-transform: uppercase;
}

.layout__label--top-left {
  top: var(--margin);
  left: var(--margin);
  text-align: left;
}

.layout__label--top-right {
  top: var(--margin);
  right: var(--margin);
  text-align: right;
  font-family: var(--font-mono);
}

.layout__label--bottom-left {
  bottom: var(--margin);
  left: var(--margin);
  text-align: left;
}

.layout__label--bottom-right {
  bottom: var(--margin);
  right: var(--margin);
  text-align: right;
  font-family: var(--font-mono);
}

.layout__text-wrapper {
  display: flex;
  flex-direction: column;
  gap: 1rem;
  text-align: center;
  font-size: 3rem;
  font-weight: 200;
  z-index: 100;
  max-width: 440px;
  mix-blend-mode: screen;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

.layout__text-wrapper h1 {
  font-size: 5rem;
  font-weight: 300;
  line-height: 1.1;
  margin: 0;
  letter-spacing: 0.02em;
  text-transform: uppercase;
}

.layout__text-wrapper h1 span {
  display: block;
  font-size: 1.5rem;
}

.layout__text-wrapper h1::after {
  content: "";
  display: block;
  width: 50%;
  height: 1px;
  background: var(--color-foreground);
  margin: 1rem auto;
  opacity: 0.2;
}

.layout__text-wrapper h2 {
  font-size: 1rem;
  letter-spacing: 0.2em;
  margin-top: 1rem;
  text-transform: uppercase;
}

.dg.ac {
  z-index: 9999 !important;
}
  </style>
</head>
<body>
<div id="canvas-container"></div>

<div class="layout">
  <div class="layout__middle">
    <p class="layout__middle-text layout__middle-text--left">|</p>
    <p class="layout__middle-text layout__middle-text--right">Scanning Coordinates:<br> Uncharted Zone ✶</p>
  </div>

  <div class="layout__label layout__label--top-left">
    <span class="layout__label-text">Vessel<br>Oblivion Horizon</span>
  </div>
  <div class="layout__label layout__label--top-right">
    <span class="layout__label-text">Objective<br>Lost Signal Retrieval</span>
  </div>
  <div class="layout__label layout__label--bottom-left">
    Core<br> Anomaly Drive<br> Status: Unknown
  </div>
  <div class="layout__label layout__label--bottom-right">
    <span class="layout__label-text">Alert<br>Dimensional Rift<br> Imminent</span>
  </div>

  <div class="layout__text-wrapper">
    <h2 style="margin-top:200px;">BEYOND THE VEIL, ALL SIGNALS FADE</h2>
  </div>
</div>
  
<script src='https://d3js.org/d3-delaunay.v6.min.js'></script>
<script src='https://unpkg.com/three@0.126.0/examples/js/loaders/OBJLoader.js'></script>
<script type="module">
  import * as THREE from "https://cdn.skypack.dev/three@0.136.0";
  import { OrbitControls } from "https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js";
  import { MarchingCubes } from "https://cdn.skypack.dev/three@0.136.0/examples/jsm/objects/MarchingCubes.js";
  import RAPIER from "https://cdn.skypack.dev/@dimforge/rapier3d-compat@0.11.2";
  import { EffectComposer } from "https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/EffectComposer.js";
  import { RenderPass } from "https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/RenderPass.js";
  import { ShaderPass } from "https://cdn.skypack.dev/three@0.136.0/examples/jsm/postprocessing/ShaderPass.js";
  import { ShaderMaterial } from "https://cdn.skypack.dev/three@0.136.0";

  const w = window.innerWidth;
  const h = window.innerHeight;
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(25, w / h, 0.1, 1000);
  camera.position.z = 10;

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(w, h);
  document.body.appendChild(renderer.domElement);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;

  await RAPIER.init();
  let gravity = { x: 1, y: 3, z: 5 };
  let world = new RAPIER.World(gravity);

  let mousePos = new THREE.Vector2();
  let mouseX = 0;
  let mouseY = 0;

  const settings = {
    parallaxStrength: 0.1,
    metaballDepth: 0.1,
    textDepth: 0.1,
    backgroundColor: "#000000",
    textColor: "#0019ff"
  };

  scene.background = new THREE.Color(settings.backgroundColor);

  const textureLoader = new THREE.TextureLoader();
  const matcap = textureLoader.load("https://pbs.twimg.com/media/EQVip4yU4AENYb3.png");

  const backgroundRenderTarget = new THREE.WebGLRenderTarget(w, h);

  const metaballsShader = {
    uniforms: {
      tBackground: { value: null },
      tMatcap: { value: null },
      resolution: { value: new THREE.Vector2(w, h) },
      refractionRatio: { value: 0.8 },
      distortionAmount: { value: 0.1 }
    },
    vertexShader: `varying vec3 vNormal;
varying vec3 vViewPosition;
varying vec2 vUv;
varying vec3 vColor;
attribute vec3 color;
void main() {
  vUv = uv;
  vNormal = normalize(normalMatrix * normal);
  vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
  vViewPosition = -mvPosition.xyz;
  vColor = color;
  gl_Position = projectionMatrix * mvPosition;
}
`,
    fragmentShader: `uniform sampler2D tBackground;
uniform sampler2D tMatcap;
uniform vec2 resolution;
uniform float refractionRatio;
uniform float distortionAmount;
varying vec3 vNormal;
varying vec3 vViewPosition;
varying vec2 vUv;
varying vec3 vColor;
void main() {
  vec3 normal = normalize(vNormal);
  vec3 viewDir = normalize(vViewPosition);
  vec3 refracted = refract(viewDir, normal, refractionRatio);
  vec2 uv = gl_FragCoord.xy / resolution;
  vec2 offset = refracted.xy * distortionAmount;
  vec4 backgroundColor = texture2D(tBackground, uv + offset);
  vec3 r = reflect(-viewDir, normal);
  float m = 2.0 * sqrt(r.x * r.x + r.y * r.y + (r.z + 1.0) * (r.z + 1.0));
  vec2 matcapUv = r.xy / m + 0.5;
  vec4 matcapColor = texture2D(tMatcap, matcapUv);
  vec4 finalColor = mix(backgroundColor, matcapColor, 0.5);
  finalColor.rgb *= vColor;
  gl_FragColor = finalColor;
}
`
  };

  const metaMat = new ShaderMaterial(metaballsShader);
  metaMat.uniforms.tMatcap.value = matcap;

  const metaballs = new MarchingCubes(96, metaMat, true, true, 90000);
  metaballs.scale.setScalar(8);
  metaballs.isolation = 1000;
  scene.add(metaballs);

  const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(ambientLight);

  function create2DTextTexture(text, fontSize, color) {
    const canvas = document.createElement("canvas");
    const ctx = canvas.getContext("2d");
    canvas.width = 2048;
    canvas.height = 1024;
    ctx.font = `${fontSize}px Arial`;
    ctx.fillStyle = color;
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";
    const lines = text.split(" ");
    const lineHeight = fontSize * 0.7;
    ctx.fillText(lines[0], canvas.width / 2, canvas.height / 2 - lineHeight / 2);
    ctx.fillText(lines[1], canvas.width / 2, canvas.height / 2 + lineHeight / 2);
    return new THREE.CanvasTexture(canvas);
  }

  let textTexture = create2DTextTexture("The Descent", 180, settings.textColor);
  const aspectRatio = 2048 / 1024;
  const planeWidth = 20;
  const planeHeight = planeWidth / aspectRatio;
  const textGeometry = new THREE.PlaneGeometry(planeWidth, planeHeight);
  const textMaterial = new THREE.MeshBasicMaterial({
    map: textTexture,
    transparent: true,
    opacity: 0.8
  });
  const textMesh = new THREE.Mesh(textGeometry, textMaterial);
  textMesh.position.set(0, 0, -8);
  scene.add(textMesh);

  function updateTextColor() {
    textTexture = create2DTextTexture("The Descent", 180, settings.textColor);
    textMaterial.map = textTexture;
    textMaterial.needsUpdate = true;
  }

  function getBody({ RAPIER, world }) {
    const size = 0.2;
    const range = 3;
    const density = 0.5;
    let x = Math.random() * range - range * 0.5;
    let y = Math.random() * range - range * 0.5 + 3;
    let z = Math.random() * range - range * 0.5;
    let rigidBodyDesc = RAPIER.RigidBodyDesc.dynamic().setTranslation(x, y, z).setLinearDamping(2);
    let rigid = world.createRigidBody(rigidBodyDesc);
    let colliderDesc = RAPIER.ColliderDesc.ball(size).setDensity(density);
    world.createCollider(colliderDesc, rigid);
    const color = new THREE.Color().setHSL(Math.random(), 1, 0.5);
    function update() {
      rigid.resetForces(true);
      let position = rigid.translation();
      let pos = new THREE.Vector3(position.x, position.y, position.z);
      let dir = pos.clone().sub(new THREE.Vector3(0, 0, 0)).normalize();
      rigid.addForce(dir.multiplyScalar(-0.5), true);
      pos.multiplyScalar(0.1).add(new THREE.Vector3(0.5, 0.5, 0.5));
      return { pos, color };
    }
    return { update };
  }

  const bodies = [];
  const numBodies = 10;
  for (let i = 0; i < numBodies; i++) {
    bodies.push(getBody({ RAPIER, world }));
  }

  let mouseRigid = world.createRigidBody(
    RAPIER.RigidBodyDesc.kinematicPositionBased().setTranslation(0, 0, 0)
  );
  world.createCollider(RAPIER.ColliderDesc.ball(0.5), mouseRigid);

  const composer = new EffectComposer(renderer);
  const renderPass = new RenderPass(scene, camera);
  composer.addPass(renderPass);

  const customShader = {
    uniforms: {
      tDiffuse: { value: null },
      grainSize: { value: 1 },
      grainIntensity: { value: 0.15 },
      blackAndWhite: { value: true }
    },
    vertexShader: `varying vec2 vUv;
void main() {
  vUv = uv;
  gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
}
`,
    fragmentShader: `uniform sampler2D tDiffuse;
uniform float grainSize;
uniform float grainIntensity;
uniform bool blackAndWhite;
varying vec2 vUv;
float random(vec2 p) {
  return fract(sin(dot(p.xy, vec2(12.9898,78.233))) * 43758.5453);
}
void main() {
  vec4 color = texture2D(tDiffuse, vUv);
  vec2 grainUv = vUv * grainSize;
  float grain = random(grainUv) * grainIntensity;
  color.rgb += vec3(grain);
  if (blackAndWhite) {
    float gray = dot(color.rgb, vec3(0.299, 0.587, 0.114));
    color.rgb = vec3(gray);
  }
  gl_FragColor = color;
}
`
  };

  const customPass = new ShaderPass(customShader);
  composer.addPass(customPass);

  function applyParallaxEffect(object, depth, baseStrength, depthMultiplier = 1) {
    const normalizedX = mouseX * depth;
    const normalizedY = mouseY * depth;
    object.position.x += (normalizedX - object.position.x) * baseStrength;
    object.position.y += (normalizedY - object.position.y) * baseStrength;
    object.position.z = -0.3 * (normalizedY + normalizedX) * depthMultiplier;
    const maxRotation = 0.1;
    object.rotation.y = THREE.MathUtils.clamp(
      THREE.MathUtils.degToRad(normalizedX * 3),
      -maxRotation,
      maxRotation
    );
    object.rotation.x = THREE.MathUtils.clamp(
      THREE.MathUtils.degToRad(normalizedY * 3),
      -maxRotation,
      maxRotation
    );
  }

  function animate() {
    requestAnimationFrame(animate);
    controls.update();
    world.step();
    mouseRigid.setTranslation({ x: mousePos.x * 4, y: mousePos.y * 4, z: 0 });
    metaballs.visible = false;
    renderer.setRenderTarget(backgroundRenderTarget);
    renderer.render(scene, camera);
    renderer.setRenderTarget(null);
    metaMat.uniforms.tBackground.value = backgroundRenderTarget.texture;
    metaballs.visible = true;
    metaballs.reset();
    bodies.forEach((b) => {
      const { pos, color } = b.update();
      metaballs.addBall(pos.x, pos.y, pos.z, 0.5, 10, color.getHex());
    });
    applyParallaxEffect(metaballs, settings.metaballDepth, settings.parallaxStrength * 0.5, 0.3);
    applyParallaxEffect(textMesh, settings.textDepth, settings.parallaxStrength, 0.5);
    composer.render();
  }

  animate();

  window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    composer.setSize(window.innerWidth, window.innerHeight);
    backgroundRenderTarget.setSize(window.innerWidth, window.innerHeight);
    metaMat.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
  });

  window.addEventListener("mousemove", (evt) => {
    mouseX = (evt.clientX / window.innerWidth) * 2 - 1;
    mouseY = -(evt.clientY / window.innerHeight) * 2 + 1;
    mousePos.x = mouseX;
    mousePos.y = mouseY;
  });
</script>
</body>
</html>
