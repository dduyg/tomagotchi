<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #1c1c1c;
            color: #ffffff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        main {
            max-width: 800px;
            width: 90%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
        }
        section {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two equal columns */
            padding-top: 20px;
            gap: 2rem 30px;
        }
        section:first-of-type {
            border-top: 2px solid currentColor;
        }
        @media (max-width: 768px) {
            section {
                grid-template-columns: 1fr 2fr; /* second column takes up more space */
            }
            section:first-of-type {
                border-top: 1.5px solid currentColor;
            }
        }

        .label {
            font-size: 1rem;
            text-transform: uppercase;
            color: #d0d0d0; /* Light gray */
            font-weight: bold;
    align-self: start; /* Ensures labels align at the top */
        }
        .details {
            display: flex;
            flex-direction: column;
            gap: 10px;
    align-items: flex-start; /* Aligns the details content to the left */
   }

        a {
            color: inherit;
            text-decoration: none;
            padding-bottom: 3px;
            display: inline-block;
            position: relative;
        }
        a::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 2px;
            background-color: white;
            transform: scaleX(0);
            transition: transform 0.6s;
        }
        @media (max-width: 768px) {
            a::before {
                height: 1.5px;
            }
         }
        a:hover::before {
            transform: scaleX(1);
        }
    </style>
</head>
<body>
    <main>
        <h1>Send a Byte</h1>
        <section>
            <div class="label">Envelope</div>
            <div class="details">
                <a href="#">wavelength@holo.meltdown</a>
            </div>
        </section>
        <section>
            <div class="label">Social Subspace</div>
            <div class="details">
                <a href="#">↗ pixelmessage</a>
                <a href="#">↗ neongrid</a>
                <a href="#">↗ datarepository</a>
            </div>
        </section>
    </main>
</body>
</html>
