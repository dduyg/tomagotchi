<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Lost in the Code</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      background: linear-gradient(135deg, #2c003e, #000000);
      color: #00fff9;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      text-align: center;
      animation: flicker 3s infinite alternate;
    }

    @keyframes flicker {
      0% { opacity: 1; }
      50% { opacity: 0.85; }
      100% { opacity: 1; }
    }

    h1 {
      font-size: 3rem;
      text-shadow: 0 0 10px #ff00ff, 0 0 20px #00fff9;
      margin: 0;
    }

    p {
      font-size: 1rem;
      max-width: 600px;
      margin: 20px auto;
      text-shadow: 0 0 5px #00fff9;
    }

    .glitch {
      position: relative;
      color: #fff;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      width: 100%;
      overflow: hidden;
    }

    .glitch::before {
      animation: glitchTop 1s infinite linear;
      color: #ff00ff;
      top: -2px;
    }

    .glitch::after {
      animation: glitchBottom 1s infinite linear;
      color: #00fff9;
      top: 2px;
    }

    @keyframes glitchTop {
      0% { clip: rect(0, 9999px, 0, 0); }
      5% { clip: rect(0, 9999px, 10px, 0); }
      10% { clip: rect(0, 9999px, 0, 0); }
    }

    @keyframes glitchBottom {
      0% { clip: rect(0, 9999px, 0, 0); }
      5% { clip: rect(5px, 9999px, 15px, 0); }
      10% { clip: rect(0, 9999px, 0, 0); }
    }

    a {
      margin-top: 30px;
      display: inline-block;
      padding: 10px 20px;
      background: #ff00ff;
      color: #000;
      text-decoration: none;
      font-weight: bold;
      border-radius: 8px;
      box-shadow: 0 0 10px #ff00ff;
      transition: all 0.3s ease-in-out;
    }

    a:hover {
      background: #00fff9;
      color: #000;
      box-shadow: 0 0 15px #00fff9;
    }
  </style>
</head>
<body>
  <h1 class="glitch" data-text="404: LOST SIGNAL">404: LOST SIGNAL</h1>
  <p>
    The page you're looking for fell through a digital wormhole. <br>
    Maybe it's hiding in the back of your code editor, or <br>
    maybe it just ascended to the vaporwave dimension.
  </p>
  <a href="/">Return to Reality (Home)</a>
</body>
</html>
