<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Liminal Loop - A stylish outlined text example with modern CSS" />
  <title>LiminalLoop</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora&display=swap" rel="stylesheet">
  <style>	  
    @font-face {
      font-family: 'BandeinsStrange';  
      src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/BandeinsStrangeVariable.woff2') format('woff2');
      font-weight: 1 1000; /* for variable font support */
      font-style: normal;
      font-display: swap;
    } 
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(to bottom right, lime, lightblue);
      color: black;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-family: 'BandeinsStrange', sans-serif;
      font-variation-settings: "wght" 400; 
      line-height: 1.4;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 2px;
    }

    /* Fallback outline using shadows */
    .outline {
      color: white;
      text-shadow:
        -1px -1px 0 #000,
         1px -1px 0 #000,
        -1px  1px 0 #000,
         1px  1px 0 #000;
    }

    /* True text-stroke for modern browsers */
    @supports ((-webkit-text-stroke: 2px black) or (text-stroke: 2px black)) {
      .outline {
        color: transparent;
        -webkit-text-stroke: 2px black;
        text-stroke: 2px black;
        text-shadow: none;
      }
    }

    .text-block {
      font-size: 16px;
      line-height: 1.5;
      text-align: left;
      max-width: 600px;
      width: calc(100% - (20px * 2));
      padding-bottom: 65px;
    }
  </style>
</head>
<body>
  <h1 class="outline">I AM THE<br>OUTLINED<br>TEXT</h1>

  <div class="text-block">
    Türk milleti, tarih boyunca hür yaşamış ve hür yaşayacaktır. Hürriyet ve istiklâl benim karakterimdir. Milletin istiklâlini yine milletin azim ve kararı kurtaracaktır. İnançla yürüyenler, en karanlık yolları aydınlığa çevirir.
  </div>                  
</body>
</html>
