<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error 404 - Page Not Found</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #ff77ff, #8f58ff);
            color: #fff;
            text-align: center;
            padding: 100px 0;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 100px;
            letter-spacing: 5px;
            margin: 0;
            font-family: 'Arial', sans-serif;
        }

        .glitch {
            position: relative;
            display: inline-block;
            font-size: 100px;
            letter-spacing: 5px;
            color: #fff;
        }

        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            color: #ff0055;
            z-index: -1;
            animation: glitch-animation 1s infinite;
        }

        .glitch::after {
            left: 2px;
            top: 2px;
            color: #00ffcc;
            animation: glitch-animation 2s infinite;
        }

        @keyframes glitch-animation {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-10px, -10px); }
            50% { transform: translate(10px, 10px); }
            75% { transform: translate(-5px, 5px); }
            100% { transform: translate(5px, -5px); }
        }

        p {
            font-size: 18px;
            margin-top: 20px;
            font-family: 'Arial', sans-serif;
        }

        .neon-button {
            background-color: #ff77ff;
            color: white;
            font-size: 16px;
            padding: 15px 30px;
            border-radius: 25px;
            border: none;
            cursor: pointer;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(255, 119, 255, 0.5);
            transition: transform 0.2s ease-in-out;
        }

        .neon-button:hover {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 119, 255, 0.8);
        }

        footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }

        footer a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
        }

        footer a:hover {
            color: white;
        }
    </style>
</head>
<body>

    <div class="glitch" data-text="404">404</div>
    <p>Oops! The page you are looking for cannot be found.</p>
    <a href="/" class="neon-button">Go Home</a>

    <footer>
        <p>Made with <span style="color: #ff0055;">&#10084;</span> in the digital void. <a href="https://www.example.com" target="_blank">Vaporwave 404 Theme</a></p>
    </footer>

</body>
</html>
