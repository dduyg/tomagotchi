<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ygineer</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

body {
    margin: 0;
    padding: 0;
    background: black;
    color: white;
    font-family: 'Orbitron', sans-serif;
}

.container {
    text-align: center;
    position: relative;
    height: 100vh;
}

header h1 {
    font-size: 48px;
    font-weight: bold;
    margin-top: 20px;
}

.local-time {
    font-size: 12px;
    margin-top: 20px;
    opacity: 0.7;
}

.time-section {
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 48px;
    margin-top: 10px;
}

.time {
    font-weight: bold;
}

.am-pm {
    display: flex;
    flex-direction: column;
    margin-left: 10px;
    font-size: 14px;
}

.circle {
    color: red;
}

.inactive {
    color: gray;
}

.description {
    font-size: 18px;
    max-width: 80%;
    margin: 20px auto;
    line-height: 1.4;
}

.specs, .location {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 10px;
}

.social-links {
    margin-top: 20px;
}

.social-links button {
    background: none;
    color: white;
    border: 1px solid white;
    padding: 5px 10px;
    margin: 5px;
    cursor: pointer;
    font-size: 14px;
}

.social-links button:hover {
    background: red;
    border-color: red;
}

/* 3D Background Effect */
.background {
    position: absolute;
    bottom: 0;
    width: 100%;
    height: 40vh;
    background: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-8.gif') no-repeat center;
    background-size: cover;
    opacity: 0.8;
}
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>YINGER</h1>
        </header>

        <div class="content">
            <p class="local-time">LOCAL TIME (UTC -6:00)</p>
            
            <div class="time-section">
                <span class="time">01:05</span>
                <div class="am-pm">
                    <span class="circle">◉</span> am
                    <span class="circle inactive">○</span> pm
                </div>
            </div>

            <p class="description">
                <strong>UI Engineer</strong> who dips his toes in Realtime 3D ° Interaction ° Perf
            </p>

            <p class="specs">
                0360 x 0647 <br>
                ⬊043 FPS
            </p>

            <p class="location">
                FORT COLLINS, COLORADO → US OF A <br>
                DESIGN ENGINEER @HEX
            </p>

            <div class="social-links">
                <button>Gh</button>
                <button>Li</button>
                <button>X</button>
                <button>Email</button>
            </div>
        </div>
        
        <div class="background">
            <!-- 3D cubes effect will be done in CSS -->
        </div>
    </div>

</body>
</html>
