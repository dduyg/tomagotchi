<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
	@font-face {
	   font-family: 'Test Domaine Text';
	   src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/test-domaine-text-light.woff2') format('woff2');
	   font-weight: 300;
	   font-style: normal;
	}
	@font-face {
            font-family: 'Chemre';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Chemre.woff2') format('woff2');
            font-weight: normal;
	    font-style: normal;
	}
        /* Reset and General Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Test Domaine Text', serif;
            background-color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        /* Container for center alignment */
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 1rem;
        }

        /* Text Box Styling */
        .text-box {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Main Heading */
        h1 {
            font-size: 8vw;
            font-family: 'Chemre', sans-serif;
            padding: 0.5em;
            background-color: #000;
            color: #fff;
            position: relative;
            z-index: 1;
        }

        /* Overlapping Text with Clipping Effect */
        h1:nth-child(2) {
            position: absolute;
            background-color: #fff;
            color: #000;
            clip-path: inset(0 0 50% 0);
            z-index: 2;
        }

        /* Paragraph Styling */
        p {
            font-size: 1.2rem;
            margin-top: 1em;
            line-height: 1.4;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="text-box">
            <h1>desolation</h1>
            <h1>desolation</h1>
        </div>
        <p>Step by step, day by day.<br>
           There is no one giant step that does it.<br>
           It's a lot of little steps.
        </p>
    </div>
</body>
</html>
