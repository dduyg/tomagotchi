<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@300..800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Host Grotesk", sans-serif;
      margin: 0;
      padding: 0;
      background-color: LemonChiffon;
      color: black;
    }
    
    main {
      display: flex;
      justify-content: space-between;
      gap: 20px; /* Optional space between columns */
    }
    section {
      flex: 1; /* Ensures columns are evenly spaced */
      padding: 20px;
      border: 1px solid;
    }
    @media (max-width: 768px) {
      main {
        flex-direction: column; /* Stack columns on mobile */
      }
    }

    
    h2 { font-weight: normal; }

    .split {
      position: relative;
      overflow: hidden;
      color: rgba(0, 0, 0, 0.8);
    }
    .split::before,
    .split::after {
      content: 'monochrome';
      position: absolute;
      top: 0;
      left: 0;
      color: black;
    }
    .split::before {clip-path: inset(0 0 50% 0); transform: translateX(-2px); animation: slice 1.2s infinite;}
    .split::after {clip-path: inset(50% 0 0 0); transform: translateX(2px); animation: slice 1.2s infinite reverse;}
    @keyframes slice { 0%, 100% {transform: translateX(0);} 50% {transform: translateX(5px);} }
  </style>
</head>
<body>
  <main>
    <section>
      <h2 class="split">monochrome</h2>
    </section>
    <section>
      🪅❤️❤️
    </section>
  </main>
</body>
</html>
