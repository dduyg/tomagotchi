<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404notfound</title>
    <link href="https://fonts.googleapis.com/css2?family=Alegreya+Sans&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: "Alegreya Sans", sans-serif;
            background-color: darkgray;
            color: #353839;
            font-size: 1.4rem;
            line-height: 1.5;     
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
        }
        main {
            max-width: 600px;
            margin: 0 auto;
            padding: 0 2em;
            text-align: center;
        }

        h1 {
            font-size: 5rem;
            color: #7F7F7F;
            letter-spacing: 4px;
            font-family: "Fira Code", monospace;
            position: relative;
            display: inline-block;
            margin-top: 0;
            margin-bottom: 1rem;
            padding-top: 0;
            animation: glitch 1s infinite;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
        }
        @keyframes glitch {
            2%, 64% {transform: translate(2px,0) skew(0deg);}
            4%, 60% {transform: translate(-2px,0) skew(0deg);}
            62% {transform: translate(0,0) skew(5deg);}
        }

        .vaporwave {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        .vaporwave img {
            display: block;
            width: 10rem;
            margin: 0 auto;
            padding: 0;
            opacity: 0.5;
        }

        p {
            letter-spacing: 0.02em;
            margin-bottom: 20px;
            animation: floatText 4s infinite ease-in-out;
        }
        @keyframes floatText { 
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
<main>
    <div class="vaporwave">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/aquaticSculpt.gif" alt="Vaporwave Logo">
    </div>
    
    <h1 class="glitch" data-text="404">404</h1>
    <p class="message">Looks like you've stumbled upon a void in the digital matrix.</p>
</main>
</body>
</html>
