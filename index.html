<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle Shape ❍</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
      color: black;
    }

    .circle {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 5px solid;
      border-right: 15px solid; /* Much thicker right border */
      box-shadow: 5px 5px 10px rgba(0, 0, 0, 0.3); /* Light offset shadow */ 
    }

    h1 {
      font-size: 7rem;
      text-align: center;
      margin-top: 50px;
    }
  </style>
</head>
<body>
  <div class="circle"></div>

  <h1>❍</h1>
</body>
</html>
