<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal Loop</title>
  <style>
    body {
      font-family: sans-serif;
      margin: 0;
      padding: 0;
      background-color: #ddd;
      color: black;
    }

    header {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
    }    
    main {
      padding: 30% 1rem 0;
      display: flex;
      justify-content: space-between;
      gap: 5%;
    }
    section {
      flex: 1; /* Ensures evenly spaced columns */
      border: 1px solid;
    }
    @media (max-width: 768px) {
      main {
        flex-direction: column; /* Stack columns on mobile */
      }
    }

.split {
  position: relative;
  overflow: hidden;
  width: fit-content; /* Adjust to fit text */
  height: 1em; /* Match font size */
  font-size: 2rem; /* Set font size */
  text-transform: uppercase;
}

.split::before,
.split::after {
  content: 'monochrome'; /* The text to animate */
  position: absolute;
  top: 0;
  left: 0;
  width: 100%; /* Ensure it spans the full width */
  height: 100%; /* Ensure it spans the full height */
  color: black; /* Text color */
}

.split::before {
  clip-path: inset(0 0 50% 0); /* Show the top half */
  transform: translateX(-2px); /* Initial offset */
  animation: slice 1.2s infinite; /* Animate offset */
}

.split::after {
  clip-path: inset(50% 0 0 0); /* Show the bottom half */
  transform: translateX(2px); /* Initial offset */
  animation: slice 1.2s infinite reverse; /* Animate offset */
}

@keyframes slice {
  0%, 100% { transform: translateX(0); }
  50% { transform: translateX(5px); }
}
</head>
<body>
<main>  
    <h2 class="split"></h2>
</main>      
</body>
</html>
