<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Side by Side</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #678c66; /* Approximated green background */
      color: #1a1a1a; /* Dark text color */
      font-family: 'Arial', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      flex-direction: column;
      text-align: center;
    }
    .container {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    .header {
      position: absolute;
      top: 10px;
      left: 10px;
      font-size: 14px;
    }
    .email {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 14px;
    }
    .main-logo {
      font-size: 48px;
      font-weight: bold;
      line-height: 1;
    }
    .link {
      font-size: 14px;
      margin: 10px 0;
      cursor: pointer;
    }
    .link a {
      color: #1a1a1a;
      text-decoration: none;
    }
    .footer {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">3701 N Ravenswood Ave, Chicago</div>
    <div class="email">hi@sideby.space</div>

    <div class="main-content">
      <div class="link"><a href="#">STOP BY FOR A BEER ↗</a></div>
      <div class="main-logo">side<br>by<br>side</div>
      <div class="link"><a href="#">CHECK OUT THE INSTAGRAM ↗</a></div>
      <div class="link"><a href="#">LEARN MORE ABOUT US ↗</a></div>
    </div>

    <div class="footer">SIDE BY SIDE BY SIDE BY SIDE BY SIDE BY SIDE BY SIDE BY SIDE BY SIDE</div>
  </div>
</body>
</html>
