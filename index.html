<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiminalLoop</title>
  <style>
    body {
      margin: 0;
      padding: 5em 1em;
      background: #c5c6f9;
      color: black;
      -webkit-tap-highlight-color: transparent;
    }

    nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .nav-item {
      display: block;
      font-family: var(--font-serif);
      font-size: 3.5rem;
      line-height: 1;
      letter-spacing: -0.1em;
      text-transform: uppercase;
      margin: -0.24em 0;
      padding-right: 1.1em;
      overflow: hidden;
    }

    .nav-item a {
      outline: 0;
      text-decoration: none;
      touch-action: manipulation;
      display: block;
    }

    .nav-item .holder {
      position: relative;
      transform-origin: 0 0;
    }

    .nav-item .holder,
    .nav-item .holder svg {
      transition: transform 1s cubic-bezier(0.165, 0.875, 0.02, 1);
    }

    .nav-item .holder svg {
      position: absolute;
      top: 20%;
      left: 0;
      height: 60%;
      transform: translateX(-120%);
    }

    .nav-item a:hover .holder {
      transform: translateX(1em);
    }

    .nav-item a:hover .holder svg {
      transform: translateX(-100%);
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-item">
      <a href="#home">
        <div class="holder">
          <svg viewBox="0 0 542 62">
            <use href="#svg-icon"></use>
          </svg>
          Home
        </div>
      </a>
    </div>
    <div class="nav-item">
      <a href="#badass">
        <div class="holder">
          <svg viewBox="0 0 542 62">
            <use href="#svg-icon"></use>
          </svg>
          Badass
        </div>
      </a>
    </div>
    <div class="nav-item">
      <a href="#photo">
        <div class="holder">
          <svg viewBox="0 0 542 62">
            <use href="#svg-icon"></use>
          </svg>
          Photo
        </div>
      </a>
    </div>
    <div class="nav-item">
      <a href="#film">
        <div class="holder">
          <svg viewBox="0 0 542 62">
            <use href="#svg-icon"></use>
          </svg>
          Film
        </div>
      </a>
    </div>
    <div class="nav-item">
      <a href="#blog">
        <div class="holder">
          <svg viewBox="0 0 542 62">
            <use href="#svg-icon"></use>
          </svg>
          Blog
        </div>
      </a>
    </div>
    <div class="nav-item">
      <a href="#contact">
        <div class="holder">
          <svg viewBox="0 0 542 62">
            <use href="#svg-icon"></use>
          </svg>
          Contact
        </div>
      </a>
    </div>
  </nav>

  <!-- Define the reusable SVG icon once -->
  <svg id="svg-icon" viewBox="0 0 542 62" style="display: none;">
    <path d="M510.2 61.1l-2.1-2.2 27.3-26.4H.7v-3h534.8L508.1 3.1l2.1-2.2L541.3 31l-31.1 30.1z"></path>
  </svg>
</body>
</html>
