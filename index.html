<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #999;
            color: rgba(0, 0, 0, 0.87);
            font-family: Arial, sans-serif;
        }     
        main {
            width: 90%;
            max-width: 800px;
        }      
        header {
            position: fixed;
            z-index: 10;
            top: 0;
            left: 0;
            width: 95%;
            padding: 1.2rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .title {
            display: block;
            font-size: 1.6rem;
            letter-spacing: 2px;
        }
        .logo { 
            position: relative;
            width: 43px; 
            height: 27.5px;
            margin-right: 10px;
        }
        .logo .ring {
            position: absolute;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 1.5px solid currentColor;
            transition: transform 0.6s ease, border-color 0.6s ease;
            pointer-events: none;
            transform: scaleY(0.5);
            transform-origin: center top;
        }
        .ring .ring1 {top: 6px;}
        .ring .ring2 {top: 11px;}
        .ring .ring3 {top: 16px;}
    </style>
</head>
<body>
  <header>
    <div class="title">/dyyg</div>
    <div class="logo">
        <div class="ring ring1"></div>
        <div class="ring ring2"></div>
        <div class="ring ring3"></div>
    </div>     
  </header>

  <main></main>
</body>
</html>
