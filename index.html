<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RGB Glitch Effect</title>
<style>
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    color: #fff;
    margin: 0;
  }
  h1 {
    font-size: 5rem;
    position: relative;
    color: #fff;
    text-transform: uppercase;
  }
  h1::before, h1::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    color: #ff0000; /* Red */
    z-index: -1;
  }
  h1::after {
    color: #00ffea; /* Cyan */
    transform: translate(4px, -4px);
  }
  h1::before {
    transform: translate(-4px, 4px);
  }
</style>
</head>
<body>
  <h1 data-text="Glitch">Glitch</h1>
</body>
</html>
