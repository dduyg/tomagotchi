<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulsing Circle</title>
    <style>
      body {
          background-color: #d8d5f1;
  font-family: 'Authenticsans 60', sans-serif;
  color: #140024;
  font-size: 14px;
  line-height: 20px;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.circle {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background-color: red;
    animation: pulse 10s infinite ease-in-out;
}

@keyframes pulse {
    0% {
        transform: scale(1);
        background-color: red;
        opacity: 1;
    }
    20% {
        transform: scale(1.3);
        background-color: orange;
        opacity: 0.9;
    }
    40% {
        transform: scale(1);
        background-color: yellow;
        opacity: 1;
    }
    60% {
        transform: scale(1.3);
        background-color: green;
        opacity: 0.9;
    }
    80% {
        transform: scale(1);
        background-color: blue;
        opacity: 1;
    }
    100% {
        transform: scale(1.3);
        background-color: red;
        opacity: 0.9;
    }
}
    </style>
</head>
<body>
    <div class="circle"></div>
</body>
</html>
