<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LiminalLoop</title>
<style>
  body {
    margin: 0;
    background: radial-gradient(ellipse at center, #0f0f1a 0%, #000000 100%);
    font-family: 'Orbitron', monospace;
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
    color: #ffffffcc;

    flex-direction: column;
  }

  h2 {
    font-size: 1.6rem;
    margin: 0.2em 0 1.5em;
    color: #00fff7;
    text-shadow: 2px 0 #ff0055, -2px 0 #00eaff;
  }

  p {
    max-width: 450px;
    margin: 0 1em 2em;
    font-size: 0.85rem;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
  <h2>Lost in the Void</h2>
  <p>
    Özgürlük ve bağımsızlık benim karakterimdir.
    Milletimizin onurunu korumak, bağımsız yaşamakla mümkündür. 
    Hiçbir zorluk, inançla çalışan bir milleti yolundan döndüremez.
    Unutmayın, umut varsa mücadele vardır; mücadele varsa zafer kaçınılmazdır.
  </p>
</body>
</html>
