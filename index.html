<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(135deg, #ff8efb, #9069ff);
            color: #fff;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        h1 {
            font-size: 10rem;
            text-shadow: 0 0 10px #ff8efb, 0 0 20px #9069ff, 0 0 40px #d649ff;
        }

        p {
            font-size: 1.5rem;
            margin: 1rem 0;
            text-shadow: 0 0 5px #ff8efb, 0 0 10px #9069ff;
        }

        .glitch {
            position: relative;
            display: inline-block;
        }

        .glitch::before,
        .glitch::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            right: 0;
            color: #ff8efb;
            background: inherit;
            overflow: hidden;
            clip: rect(0, 900px, 0, 0);
            animation: glitch 3s infinite linear alternate;
        }

        .glitch::after {
            color: #9069ff;
            clip: rect(5px, 900px, 40px, 0);
            animation: glitch 2.5s infinite linear alternate-reverse;
        }

        @keyframes glitch {
            0% {
                clip: rect(0, 999px, 44px, 0);
                transform: translate(2px, -3px);
            }
            50% {
                clip: rect(0, 999px, 44px, 0);
                transform: translate(-2px, 3px);
            }
            100% {
                clip: rect(0, 999px, 44px, 0);
                transform: translate(2px, -3px);
            }
        }

        .neon-border {
            display: inline-block;
            padding: 10px 20px;
            margin-top: 20px;
            font-size: 1.2rem;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 3px;
            border: 2px solid #fff;
            border-radius: 5px;
            text-shadow: 0 0 5px #ff8efb, 0 0 10px #9069ff, 0 0 20px #d649ff;
            box-shadow: 0 0 10px #ff8efb, 0 0 20px #9069ff, 0 0 40px #d649ff;
            transition: all 0.3s ease-in-out;
        }

        .neon-border:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px #ff8efb, 0 0 40px #9069ff, 0 0 60px #d649ff;
        }

        .background-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0.2;
            background-image: url("https://upload.wikimedia.org/wikipedia/commons/thumb/6/6a/Vaporwave-retro.png/1280px-Vaporwave-retro.png");
            background-size: cover;
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="background-grid"></div>
    <h1 class="glitch" data-text="404">404</h1>
    <p class="glitch" data-text="Page Not Found">Page Not Found</p>
    <a href="/" class="neon-border">Return to Home</a>
</body>
</html>
