<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fonts&Footer</title>
    <style>
@font-face {
  font-family: 'Ppneuebit';
  src: url('https://cdn.prod.website-files.com/64e0fbec5077f653e248ab5e/64e0fbec5077f653e248abc8_PPNeueBit-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Ppneuebit';
  src: url('https://cdn.prod.website-files.com/64e0fbec5077f653e248ab5e/64e0fbec5077f653e248abc9_PPNeueBit-Bold.ttf') format('truetype');
  font-weight: 700;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Untitledsans';
  src: url('https://cdn.prod.website-files.com/64e0fbec5077f653e248ab5e/652e5e15d5f974cc9fdd0630_UntitledSans-MediumItalic.ttf') format('truetype'), url('https://cdn.prod.website-files.com/64e0fbec5077f653e248ab5e/652e5e1577e85d8f2f015df9_UntitledSans-MediumItalic.otf') format('opentype');
  font-weight: 500;
  font-style: italic;
  font-display: swap;
}
@font-face {
  font-family: 'Untitledsans';
  src: url('https://cdn.prod.website-files.com/64e0fbec5077f653e248ab5e/652e5e153007651868c54007_UntitledSans-RegularItalic.ttf') format('truetype'), url('https://cdn.prod.website-files.com/64e0fbec5077f653e248ab5e/652e5e159bdb18a8a511761a_UntitledSans-RegularItalic.otf') format('opentype');
  font-weight: 400;
  font-style: italic;
  font-display: swap;
}
@font-face {
  font-family: 'Untitledsans';
  src: url('https://cdn.prod.website-files.com/64e0fbec5077f653e248ab5e/652e5e1577e85d8f2f015dfc_UntitledSans-Medium.ttf') format('truetype'), url('https://cdn.prod.website-files.com/64e0fbec5077f653e248ab5e/652e5e150591c7106e4d1277_UntitledSans-Medium.otf') format('opentype');
  font-weight: 500;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Whyte Inktrap Light';
  src: url('https://cdn.prod.website-files.com/64e0fbec5077f653e248ab5e/64e0fbec5077f653e248ab91_Whyte-Inktrap-Light.otf') format('opentype');
  font-weight: 300;
  font-style: normal;
  font-display: swap;
}
@font-face {
  font-family: 'Untitledsans';
  src: url('https://cdn.prod.website-files.com/64e0fbec5077f653e248ab5e/652e5e1523e23cbe05e98e25_UntitledSans-Regular.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}
        body {
            font-family: 'Untitledsans', sans-serif;
            margin: 30px;
            padding: 0;
            line-height: 1.4;
            font-size: 14px;
            background-image: radial-gradient(circle farthest-corner at 100% 0%, #8af38a, hsla(0, 0%, 100%, 0) 50%);
        }
        
        footer {
            max-width: 900px;
            margin: auto;
        }

        .titles, .contents {
            display: flex;
            justify-content: space-between;
            gap: 6%;
        }
        .titles {
            margin-top: 1%;
            font-size: 12px;
            text-transform: uppercase;
            border-bottom: 0.075rem solid;
            padding-bottom: 20px;
        }
        .contents {
            margin-top: 20px;
            font-size: 15px;
            text-align: justify;
        }
        .contents h3 {      
            display: none;
        }
        .column {
            width: 30%;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }

        @media (max-width: 768px) {
            .titles {
                display: none;
            }
            .contents {
                flex-direction: column;
            }
            .contents h3 {
                display: block;
                font-weight: normal;
                line-height: 90%;
                font-size: 28px;
                letter-spacing: -.04em;
                font-style: italic;
                border-bottom: 0.075rem solid;
                padding-bottom: 10px;
            }
            .column {
                width: 100%;
                margin-bottom: 15px;
            }
        }
    </style>
</head>
<body>
<footer>
    <div class="titles">
        <div class="column">ParallaxLayers</div>
        <div class="column">Connect</div>
        <div class="column">Site</div>
    </div>
    <div class="contents">
        <div class="column">
            <h3>ParallaxLayers</h3>
            <p>ParallaxLayers™ is the creative practice of Hong Kong-based data strategist & creative developer Duygu Dağdelen</p>
        </div>
        <div class="column">
            <h3>Connect</h3>
            <ul>
                <li>Data Aggregation</li>
                <li>ETL</li>
                <li>Cl Development</li>
            </ul>
        </div>
        <div class="column">
            <h3>Site</h3>
            <ul>
                <li>Works</li>
                <li>Archive</li>
                <li>Inspo</li>
                <li>About</li>
                <li>Play</li>
            </ul>
        </div>
    </div>
</footer>
</body>
</html>
