<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M5e</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap');

body {
    font-family: 'Inter', sans-serif;
    background-color: #f5f5f5;
    color: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    width: 80%;
    max-width: 800px;
    text-align: center;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 12px;
    margin-bottom: 20px;
}

.part-number {
    text-align: left;
}

.light-heavy {
    font-weight: bold;
}

.version-badge {
    background-color: #f04e30;
    color: white;
    padding: 8px 15px;
    border-radius: 50px;
    font-weight: bold;
    font-size: 12px;
}

.main-content {
    text-align: center;
    margin-bottom: 20px;
}

.title {
    font-size: 64px;
    font-weight: bold;
}

.boxed {
    display: inline-block;
    border: 2px solid #222;
    padding: 5px 10px;
    margin-right: 5px;
}

.special-o {
    display: inline-block;
    border: 2px solid #222;
    padding: 5px 10px;
    border-radius: 50%;
}

.subtitle {
    font-size: 14px;
    color: #666;
    margin-top: 5px;
}

.description {
    font-size: 14px;
    color: #444;
    max-width: 600px;
    margin: auto;
}

</head>
<body>
    <div class="container">
        <div class="header">
            <div class="part-number">

        <div class="main-content">
            <div class="title">
                <span class="boxed">M</span>arkl
                <span class="special-o">o</span>no
            </div>
            <p class="subtitle">NEW-2025-MONO</p>
        </div>

        <p class="description">
            Non-proportional typeface designed for optimal readability at small sizes. 
            With its clean & structured letterforms.
        </p>
    </div>
</body>
</html>
