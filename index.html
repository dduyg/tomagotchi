<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Lost in the Code</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      background: linear-gradient(135deg, #ff00cc 0%, #333399 100%);
      font-family: 'Press Start 2P', monospace;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      text-align: center;
      animation: glitch-bg 3s infinite alternate;
    }

    h1 {
      font-size: 3rem;
      position: relative;
      animation: glitch-text 1s infinite;
    }

    p {
      margin: 1rem;
      font-size: 1rem;
      max-width: 600px;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      color: #fff;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid #fff;
      text-decoration: none;
      transition: 0.3s;
    }

    a:hover {
      background: #fff;
      color: #000;
    }

    @keyframes glitch-text {
      0% {
        text-shadow: 2px 0 red, -2px 0 blue;
      }
      20% {
        text-shadow: -2px 0 red, 2px 0 blue;
      }
      40% {
        text-shadow: 2px 2px red, -2px -2px blue;
      }
      60% {
        text-shadow: -2px 2px red, 2px -2px blue;
      }
      80% {
        text-shadow: 0 0 red, 0 0 blue;
      }
      100% {
        text-shadow: 2px 0 red, -2px 0 blue;
      }
    }

    @keyframes glitch-bg {
      from {
        background-position: 0 0;
      }
      to {
        background-position: 100% 100%;
      }
    }
  </style>
</head>
<body>
  <h1>404: SYSTEM ERROR</h1>
  <p>You’ve wandered into a corrupted node of the cyberscape.<br>
  This page doesn't exist—or maybe it escaped into the matrix.<br>
  Recompile your coordinates and head back before the glitch consumes you.</p>
  <a href="/">Back to Home</a>
</body>
</html>
