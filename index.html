<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 Not Found</title>
    <style>
        body {
            background: linear-gradient(45deg, #2c3e50, #34495e);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: 6rem;
            font-weight: bold;
            text-transform: uppercase;
            color: #ff00ff;
            text-shadow: 0 0 15px rgba(255, 0, 255, 0.8), 0 0 30px rgba(255, 0, 255, 0.6);
            margin: 0;
        }

        p {
            font-size: 2rem;
            margin-top: 20px;
            color: #00ffcc;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.8), 0 0 20px rgba(0, 255, 204, 0.6);
        }

        .message {
            font-size: 2rem;
            color: #ff0099;
            margin-top: 40px;
            text-shadow: 0 0 10px rgba(255, 0, 153, 0.6), 0 0 20px rgba(255, 0, 153, 0.4);
        }

        .home-link {
            font-size: 1.5rem;
            color: #00ccff;
            text-decoration: none;
            border: 2px solid #00ccff;
            padding: 10px 20px;
            border-radius: 5px;
            margin-top: 30px;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background-color: #00ccff;
            color: #2c3e50;
            box-shadow: 0 0 15px rgba(0, 204, 255, 0.8);
        }

        .glitch {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 8rem;
            font-family: 'Courier New', Courier, monospace;
            color: rgba(255, 0, 255, 0.8);
            z-index: -1;
            animation: glitch 1s infinite linear alternate-reverse;
        }

        @keyframes glitch {
            0% {
                transform: translate(-50%, -50%) skew(0.1deg);
            }
            25% {
                transform: translate(-50%, -50%) skew(0.3deg);
            }
            50% {
                transform: translate(-50%, -50%) skew(-0.3deg);
            }
            75% {
                transform: translate(-50%, -50%) skew(0.2deg);
            }
            100% {
                transform: translate(-50%, -50%) skew(-0.1deg);
            }
        }
    </style>
</head>
<body>
    <div class="glitch">404</div>
    <h1>Page Not Found</h1>
    <p>Oops, something went wrong!</p>
    <div class="message">
        This page doesn't exist, but our data science team can still help!
    </div>
    <a href="/" class="home-link">Go Back Home</a>
</body>
</html>
