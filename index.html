<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 | Data Corrupted</title>
  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #0f0c29, #302b63, #24243e);
      font-family: 'Courier New', Courier, monospace;
      color: #00ffea;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
      max-width: 600px;
      padding: 20px;
      border: 2px solid #00ffea;
      border-radius: 15px;
      box-shadow: 0 0 30px #00ffea;
      background-color: rgba(0, 0, 0, 0.6);
    }
    .logo {
      font-size: 2.5rem;
      font-weight: bold;
      color: #ff007c;
      text-shadow: 0 0 10px #ff007c;
      margin-bottom: 20px;
    }
    h1 {
      font-size: 3rem;
      margin: 10px 0;
      color: #00ffea;
      text-shadow: 0 0 5px #00ffea;
    }
    p {
      font-size: 1.2rem;
      margin-bottom: 30px;
      color: #aaffff;
    }
    a {
      color: #ff007c;
      text-decoration: none;
      font-weight: bold;
      border: 2px solid #ff007c;
      padding: 10px 20px;
      border-radius: 10px;
      transition: all 0.3s ease;
    }
    a:hover {
      background: #ff007c;
      color: #000;
      box-shadow: 0 0 10px #ff007c;
    }
    .glitch {
      color: #00ffea;
      font-size: 4rem;
      animation: glitch 1s infinite;
    }
    @keyframes glitch {
      0% { text-shadow: 2px 2px #ff007c; }
      20% { text-shadow: -2px -2px #00ffea; }
      40% { text-shadow: 2px -2px #ff007c; }
      60% { text-shadow: -2px 2px #00ffea; }
      80% { text-shadow: 2px 2px #ff007c; }
      100% { text-shadow: -2px -2px #00ffea; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">[404 C0D3R]</div>
    <div class="glitch">404</div>
    <h1>Data Not Found</h1>
    <p>The signal's lost. Whatever you were searching for doesn't exist in this sector.</p>
    <a href="/">Jack back to Home</a>
  </div>
</body>
</html>
