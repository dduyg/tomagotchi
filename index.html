<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #A9A9A9;
            color: black;
            font-family: Arial, sans-serif;
        }     
        main {
            width: 90%;
            max-width: 800px;
            margin: 50% auto 0;
        }
       
        .page-head{display:flex;align-items:baseline}
        .page-head .page-title{width:100%;text-align:left;margin:0;text-overflow:ellipsis;overflow-x:hidden}
        
        @media(min-width:36em)and (max-width:61.99em){.page-head .page-title{font-size:3rem}}
        @media(max-width:35.99em){.page-head .page-title{font-size:2rem}}
        .page-head .elements-number{font-family:studiofeixen-writer,studiofeixen,Arial,Helvetica,sans-serif;letter-spacing:-.1em}
        .head-separator{width:100%;margin-top:12px;margin-bottom:0}

        .projects{display:flex;flex-direction:row;height:100vh;padding:var(--top-margin) 0 0 0}
        @media(max-width:47.99em){.projects{padding:calc(var(--innerVh, 1vh)*40) 0 0;flex-direction:column;height:auto}}
        @media(max-width:61.99em)and (orientation:portrait){.projects{padding:calc(var(--innerVh, 1vh)*40) 0 0;flex-direction:column;height:auto}}
        .projects-left{position:relative;width:50%;height:100%;padding-right:var(--left-right-internal-margin)}
        @media(max-width:47.99em){.projects-left{display:none}}
        @media(max-width:61.99em)and (orientation:portrait){.projects-left{display:none}}
        .projects-left-inside{position:absolute;height:100%;width:calc(100% - var(--left-right-internal-margin));overflow:hidden}
        .projects-left-inside .projects-image-wrapper{position:absolute;width:100%;height:100%;overflow:hidden;border-radius:0 var(--border-radius) 0 0;transform:translateZ(0)}
        .projects-left-inside .projects-image-wrapper .projects-image-scale{position:relative;width:100%;height:100%}
        .projects-left-inside .projects-image-wrapper .projects-image-scale .projects-image{border-radius:0 var(--border-radius) 0 0;-o-object-position:50% 50%;object-position:50% 50%;-o-object-fit:cover;object-fit:cover}
        .projects-right{padding:0 var(--left-right-margin) 0 var(--left-right-internal-margin);display:flex;flex-direction:column;width:50%;height:100%}
        @media(max-width:47.99em){.projects-right{width:100%;margin:0;padding:0 var(--left-right-margin)}}
        @media(max-width:61.99em)and (orientation:portrait){.projects-right{width:100%;margin:0;padding:0 var(--left-right-margin)}}.projects-right ul{overflow-y:auto;height:100%;scrollbar-width:none}
        .projects-right ul::-webkit-scrollbar{display:none}
        .projects-right ul li:last-child .projects-row{border-bottom:none!important}.projects-right ul .projects-row{position:relative;height:100%;width:100%;display:flex;flex-direction:row;justify-content:space-between;align-items:center;padding:1.5rem 0;border-bottom:var(--border) solid #606887}.projects-right ul .projects-row-left{display:flex;align-items:center;width:100%;text-overflow:ellipsis}
        .projects-right ul .projects-row-left .projects-selected-wrapper{position:absolute;overflow:hidden}
        .projects-right ul .projects-row-left .projects-selected-wrapper .projects-selected{padding-right:12px;position:relative}
        .projects-right ul .projects-row-left .projects-title{margin-right:var(--left-right-internal-margin);text-overflow:ellipsis;white-space:nowrap;overflow:hidden}
        .projects-right ul .projects-row-left .projects-is-new{margin-right:var(--left-right-internal-margin);padding:1.5px 6px 3px;border:var(--border) solid #78ffd1;border-radius:24px;width:-webkit-fit-content;width:-moz-fit-content;width:fit-content;font-size:12px;text-transform:lowercase;font-variation-settings:"wght" 600,"wdth" 125;color:#606887;background-color:#78ffd1}
        .projects-right ul .projects-row-right{width:100%;text-align:right}
        .projects-right ul .projects-row-right,.projects-right ul .projects-row-right .projects-category{text-overflow:ellipsis;overflow:hidden;white-space:nowrap}
        
        :root{
            --left-right-margin:240px;
            --left-right-internal-margin:24px;
            --top-margin:240px;
            --top-margin-mobile:40vh;
            --top-internal-margin:24px;
            --border-radius:48px;
            --border:2px;
            --border-radius-content:0;
        }
        @media(min-width:62em)and (max-width:74.99em){:root{--left-right-margin:96px}}
        @media(min-width:36em)and (max-width:61.99em){:root{--left-right-margin:48px;--top-margin:132px;--border:1.5px;--border-radius:24px}}
        @media(max-width:35.99em){:root{--left-right-margin:24px;--top-margin:84px;--border:1.5px;--border-radius:24px}}
        
        body,html{background-color:#f3f2f9;background-color:var(--background-color);color:var(--color);width:100%;height:auto;font-family:studiofeixen-variable,studiofeixen,Arial,Helvetica,sans-serif;letter-spacing:-.015em;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;font-variation-settings:"wght" 500,"wdth" 100;font-weight:unset;font-size:1em;transition:.25s}
        hr{border-style:none;border-bottom:0;border-top:var(--border) solid #606887}
        ol,ul{margin:0;padding:0;list-style:none}
    </style>
</head>
<body>
<main>
<div class="projects-right">
    
<div style="opacity:0;transform:translateY(-96px) translateZ(0)">
    <div class="page-head">
        <h2 class="page-title">Work</h2>
        <h5 class="elements-number">9</h5>
    </div>
    <hr class="head-separator"/>
</div>
    
<ul>
    <li style="opacity:0;transform:translateY(-96px) translateZ(0)">
        <a href="/work/sharlee">
            <div class="projects-row">
                <div class="projects-row-left">
                    <div class="projects-selected-wrapper">
                        <h4 class="projects-selected" style="transform:translateX(-100%) translateZ(0)">→</h4>
                    </div>
                    <h4 class="projects-title" style="transform:none">Sharlee</h4>
                </div>
                <div class="projects-row-right">
                    <p class="projects-category">Branding</p>
                </div>
            </div>
        </a>
    </li>
    <li style="opacity:0;transform:translateY(-96px) translateZ(0)">
        <a href="/work/act-responsable">
            <div class="projects-row">
                <div class="projects-row-left">
                    <div class="projects-selected-wrapper">
                        <h4 class="projects-selected" style="transform:translateX(-100%) translateZ(0)">→</h4>
                    </div>
                    <h4 class="projects-title" style="transform:none">ACT Responsable</h4>
                </div>
                <div class="projects-row-right">
                    <p class="projects-category">Web Development</p>
                </div>
            </div>
        </a>
    </li>
    <li style="opacity:0;transform:translateY(-96px) translateZ(0)">
        <a href="/work/dua-lipa">
            <div class="projects-row">
                <div class="projects-row-left">
                    <div class="projects-selected-wrapper">
                        <h4 class="projects-selected" style="transform:translateX(-100%) translateZ(0)">→</h4>
                    </div>
                    <h4 class="projects-title" style="transform:none">Dua Lipa</h4>
                </div>
                <div class="projects-row-right">
                    <p class="projects-category">Portrait</p>
                </div>
            </div>
        </a>
    </li>
    <li style="opacity:0;transform:translateY(-96px) translateZ(0)">
        <a href="/work/portraits">
            <div class="projects-row">
                <div class="projects-row-left">
                    <div class="projects-selected-wrapper">
                        <h4 class="projects-selected" style="transform:translateX(-100%) translateZ(0)">→</h4>
                    </div>
                    <h4 class="projects-title" style="transform:none">Portraits</h4>
                </div>
                <div class="projects-row-right">
                    <p class="projects-category">Portrait</p>
                </div>
            </div>
        </a>
    </li>
</ul>
    
</div> 
</main>
</body>
</html>
