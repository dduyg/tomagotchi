<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stacked Animation</title>
  <style>
    /* Base styles */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      color: #333;
      text-align: center;
      line-height: 1.5;
    }
    h1 {
      text-align: center;
      margin: 20px 0;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    .container div, h1, footer {
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    /* Initial animation state */
    .animate-in {
      opacity: 0;
      transform: translateY(-96px);
      transition: opacity 0.5s ease, transform 0.5s ease; /* Shortened duration */
    }

    /* Final animation state */
    .animate-in.active {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <main>
    <h1>Stacked Animation</h1>
    <div class="container">
      <div>Elementum</div>
      <div>Elementum</div>
      <div>Elementum</div>
      <div>Elementum</div>
      <div>Elementum</div>
    </div>

    <footer>Footer Element</footer>
  </main>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Select all elements within <main>
      const allElements = document.querySelectorAll('main *'); // Select all elements inside the <main> tag

      // Add the `animate-in` class to all elements (except for the ones that should not be animated)
      allElements.forEach((el) => {
        if (!el.classList.contains('no-animate')) { // Add a class check if needed
          el.classList.add('animate-in');
        }
      });

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              // Add the `active` class with a staggered delay (reverse order)
              setTimeout(() => {
                entry.target.classList.add('active');
              }, (allElements.length - entry.target.dataset.index) * 100); // Reduced stagger delay
            }
          });
        },
        { threshold: 0.1 }
      );

      // Assign a unique index to each element for reverse staggering
      allElements.forEach((el, index) => {
        el.dataset.index = index;
        observer.observe(el);
      });
    });
  </script>
</body>
</html>
