<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Animation Example</title>
    <style>
        /* Desktop Animation */
        @keyframes show-confirmation {
            from {
                opacity: 0;
                transform: scale(0.96);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Mobile Animation */
        @keyframes show-confirmation-mobile {
            from {
                transform: translateY(-50%);
            }
            to {
                transform: translateY(0);
            }
        }

        /* Styling the Confirmation Box */
        .confirmation-box {
            width: 300px;
            padding: 20px;
            background-color: #4CAF50;
            color: white;
            text-align: center;
            border-radius: 5px;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0; /* Initially hidden */
        }

        /* Apply animation for larger screens */
        @media (min-width: 600px) {
            .confirmation-box {
                animation: show-confirmation 0.3s ease-out forwards;
            }
        }

        /* Apply animation for mobile screens */
        @media (max-width: 599px) {
            .confirmation-box {
                animation: show-confirmation-mobile 0.3s ease-out forwards;
            }
        }
    </style>
</head>
<body>

    <div class="confirmation-box">
        Confirmation Message!
    </div>

</body>
</html>
