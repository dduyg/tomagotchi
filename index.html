<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 Not Found</title>
    <style>
        /* Global Styles */
        body {
            margin: 0;
            font-family: 'Courier New', Courier, monospace;
            color: white;
            background-color: #1b1b1b;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Vaporwave Neon Effect */
        .neon-text {
            font-size: 4em;
            color: #ff0099;
            text-shadow: 0 0 5px #ff0099, 0 0 10px #ff0099, 0 0 20px #ff0099, 0 0 40px #ff0099, 0 0 80px #ff0099;
            animation: glitch 1s infinite alternate;
        }

        .neon-text2 {
            font-size: 4em;
            color: #00ffff;
            text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 80px #00ffff;
            animation: glitch2 1s infinite alternate;
        }

        /* Background Gradient and Animation */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff00ff, #00ffff, #ff6600);
            background-size: 600% 600%;
            animation: gradientBackground 10s ease infinite;
            z-index: -1;
        }

        /* Glitch Effect */
        @keyframes glitch {
            0% {
                text-shadow: 0 0 5px #ff0099, 0 0 10px #ff0099, 0 0 20px #ff0099, 0 0 40px #ff0099, 0 0 80px #ff0099;
            }
            50% {
                text-shadow: -10px -10px 10px #ff0099, 10px 10px 10px #ff0099, -15px 15px 10px #ff0099;
            }
            100% {
                text-shadow: 0 0 5px #ff0099, 0 0 10px #ff0099, 0 0 20px #ff0099, 0 0 40px #ff0099, 0 0 80px #ff0099;
            }
        }

        @keyframes glitch2 {
            0% {
                text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 80px #00ffff;
            }
            50% {
                text-shadow: -10px -10px 10px #00ffff, 10px 10px 10px #00ffff, -15px 15px 10px #00ffff;
            }
            100% {
                text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff, 0 0 20px #00ffff, 0 0 40px #00ffff, 0 0 80px #00ffff;
            }
        }

        /* Background Gradient Animation */
        @keyframes gradientBackground {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        /* Link Styles */
        a {
            color: #ff0099;
            text-decoration: none;
            font-size: 1.5em;
            text-shadow: 0 0 10px #ff0099, 0 0 20px #ff0099;
            margin-top: 20px;
            display: inline-block;
            animation: glitch 1s infinite alternate;
        }

        a:hover {
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
        }

        /* Centering and Layout */
        .container {
            text-align: center;
            z-index: 1;
        }

        .message {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="container">
        <div class="message">404 - Page Not Found</div>
        <div class="neon-text">Welcome to the Digital Void</div>
        <div class="neon-text2">Something went wrong...</div>
        <a href="/">Back to the Future</a>
    </div>
</body>
</html>
