<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Error 404 - Page Not Found</title>
    <style>
        body {
            background-color: #2b003d;
            font-family: 'Arial', sans-serif;
            color: white;
            text-align: center;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            background-image: url('https://i.imgur.com/PFJ3jIo.jpg');
            background-size: cover;
            background-position: center;
        }
        
        h1 {
            font-size: 120px;
            margin: 0;
            color: #ff66b2;
            text-shadow: 0px 0px 20px #ff66b2, 0px 0px 40px #ff66b2;
        }

        h2 {
            font-size: 40px;
            margin-top: 20px;
            font-weight: lighter;
            text-shadow: 0px 0px 10px #ff66b2;
        }

        p {
            font-size: 18px;
            font-style: italic;
            margin-top: 10px;
            text-shadow: 0px 0px 10px #ff66b2;
        }

        .neon {
            font-size: 30px;
            color: #00ffcc;
            text-shadow: 0px 0px 10px #00ffcc, 0px 0px 20px #00ffcc;
        }

        a {
            text-decoration: none;
            color: #ff66b2;
            font-size: 18px;
            margin-top: 30px;
            border: 2px solid #ff66b2;
            padding: 10px 20px;
            border-radius: 30px;
            transition: all 0.3s ease;
        }

        a:hover {
            background-color: #ff66b2;
            color: white;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div>
        <h1>Error 404</h1>
        <h2>Page Not Found</h2>
        <p>It seems like you're lost in the void...</p>
        <p class="neon">Don't worry, we'll take you back!</p>
        <a href="/">Go to Home</a>
    </div>
</body>
</html>
