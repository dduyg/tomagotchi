<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 - Page Not Found</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff77ff, #00ffff);
    font-family: 'VT323', monospace;
    color: #00ffe7;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  .glitch {
    font-size: 5rem;
    position: relative;
    color: #00ffe7;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    animation: flicker 3s infinite;
  }

  .glitch::before,
  .glitch::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    right: 0;
    opacity: 0.7;
    clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
  }

  .glitch::before {
    left: 2px;
    text-shadow: -2px 0 #ff00c8;
    animation: glitchTop 2s infinite;
  }

  .glitch::after {
    left: -2px;
    text-shadow: -2px 0 #00fff7;
    clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%);
    animation: glitchBottom 2s infinite;
  }

  @keyframes glitchTop {
    0% {
      clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
      transform: translate(0);
    }
    20% {
      clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
      transform: translate(-2px, -2px);
    }
    40% {
      clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
      transform: translate(2px, 2px);
    }
    60% {
      clip-path: polygon(0 0, 100% 0, 100% 40%, 0 40%);
      transform: translate(-2px, -2px);
    }
    80%, 100% {
      clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
      transform: translate(0);
    }
  }

  @keyframes glitchBottom {
    0% {
      clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
      transform: translate(0);
    }
    20% {
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
      transform: translate(2px, 2px);
    }
    40% {
      clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
      transform: translate(-2px, -2px);
    }
    60% {
      clip-path: polygon(0 60%, 100% 60%, 100% 100%, 0 100%);
      transform: translate(2px, 2px);
    }
    80%, 100% {
      clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
      transform: translate(0);
    }
  }

  @keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
      opacity: 1;
    }
    20%, 22%, 24%, 55% {
      opacity: 0.4;
    }
  }

  .container {
    text-align: center;
    max-width: 600px;
    padding: 20px;
    background: rgba(0, 0, 0, 0.4);
    border: 2px solid #00ffe7;
    box-shadow: 0 0 20px #00ffe7;
    border-radius: 12px;
  }

  .message {
    font-size: 1.25rem;
    margin: 20px 0 40px;
    line-height: 1.5;
    color: #ff77ff;
    text-shadow:
      0 0 5px #ff77ff,
      0 0 10px #ff77ff,
      0 0 20px #ff77ff;
  }

  a.home-link {
    display: inline-block;
    font-family: 'VT323', monospace;
    font-size: 1.2rem;
    color: #00ffe7;
    border: 2px solid #00ffe7;
    padding: 12px 28px;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    border-radius: 8px;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  a.home-link:hover {
    background-color: #00ffe7;
    color: #000;
    box-shadow: 0 0 15px #00ffe7;
  }

  /* Background glitch lines */
  .glitch-lines {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(
        0deg,
        rgba(0,255,231,0.07),
        rgba(0,255,231,0.07) 2px,
        transparent 3px,
        transparent 6px
      ),
      repeating-linear-gradient(
        90deg,
        rgba(255,119,255,0.07),
        rgba(255,119,255,0.07) 1px,
        transparent 2px,
        transparent 4px
      );
    animation: glitchLinesMove 5s linear infinite;
    mix-blend-mode: screen;
  }

  @keyframes glitchLinesMove {
    0% {background-position: 0 0, 0 0;}
    100% {background-position: 100% 100%, 100% 100%;}
  }
</style>
</head>
<body>
  <div class="glitch-lines"></div>
  <div class="container">
    <div class="glitch" data-text="404 ERROR">404 ERROR</div>
    <div class="message">
      Whoops, you just hit a glitch in the matrix.<br />
      This page is lost in cyberspace.<br />
      But don’t worry, the data streams back home...
    </div>
    <a class="home-link" href="/">RETURN TO HOME</a>
  </div>
</body>
</html>
