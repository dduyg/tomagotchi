<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found</title>
  <style>
    body {
      margin: 0;
      font-family: 'Courier New', Courier, monospace;
      background: linear-gradient(135deg, #ff6ec7, #6e45e2);
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .container {
      text-align: center;
      animation: glitch-animation 1s infinite alternate;
    }
    .title {
      font-size: 6rem;
      font-weight: bold;
      text-shadow: 
        0 0 5px #ff6ec7, 
        0 0 10px #ff6ec7, 
        0 0 15px #6e45e2, 
        0 0 20px #6e45e2;
    }
    .subtitle {
      font-size: 1.5rem;
      margin-top: 10px;
      opacity: 0.8;
    }
    .link {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1.2rem;
      text-decoration: none;
      color: #fff;
      border: 2px solid #ff6ec7;
      border-radius: 5px;
      background: rgba(255, 255, 255, 0.1);
      transition: 0.3s;
    }
    .link:hover {
      background: #ff6ec7;
      color: #000;
      border: 2px solid #fff;
    }
    .glitch {
      position: relative;
      display: inline-block;
    }
    .glitch:before,
    .glitch:after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      right: 0;
      opacity: 0.8;
      clip: rect(0, 900px, 0, 0);
    }
    .glitch:before {
      top: -2px;
      text-shadow: -2px 0 #00ffea;
      animation: glitch-top 2s infinite linear;
    }
    .glitch:after {
      bottom: -2px;
      text-shadow: -2px 0 #ff00ff;
      animation: glitch-bottom 2s infinite linear;
    }
    @keyframes glitch-animation {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(-2px); }
    }
    @keyframes glitch-top {
      0%, 100% { clip: rect(0, 900px, 0, 0); }
      50% { clip: rect(30px, 900px, 60px, 0); }
    }
    @keyframes glitch-bottom {
      0%, 100% { clip: rect(0, 900px, 0, 0); }
      50% { clip: rect(70px, 900px, 100px, 0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="title glitch" data-text="404">404</h1>
    <p class="subtitle glitch" data-text="Page Not Found">Page Not Found</p>
    <a href="/" class="link">Go Back to Homepage</a>
  </div>
</body>
</html>
