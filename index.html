<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🫧Liminal Loop</title>
  <style>
    .hidden {
      opacity: 0; transform: translateY(50px); transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }
    .visible {
      opacity: 1; transform: translateY(0);
    }
    * {  /* General Reset */
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: sans-serif;
      background: red;
      color: black;
      line-height: 1.6;
      margin: 0;
      padding: 0;
    }
        
    main {
      padding: 30% 1rem 0;
      display: flex;
      justify-content: space-between;
      gap: 5%;
    }
    section {
      flex: 1; /* Ensures evenly spaced columns */
      border: 1px solid;
    }
    @media (max-width: 768px) {
      main {
        flex-direction: column; /* Stack columns on mobile */
      }
    }
  </style>
</head>
<body>
  <main>
      <section>
        ● elementum n (genitive elementī); second declension. (chemistry, physics) one of four elements that composed the world. basic principle, rudiment.
      </section>

      <section>
        ● elementi (n class, plural elementi) element (simplest or essential part or principle of anything)
      </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const elements = document.querySelectorAll('main > *'); // Select all direct children of <main>

      // Add the hidden class to all elements
      elements.forEach(element => element.classList.add('hidden'));

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });

      elements.forEach(element => observer.observe(element));
    });
  </script>
</body>
</html>
