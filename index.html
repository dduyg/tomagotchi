<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-family: 'Courier New', Courier, monospace;
            background-color: #ffccff;
            color: #ffffff;
            background-image: linear-gradient(135deg, #cc99ff 25%, transparent 25%), 
                              linear-gradient(225deg, #cc99ff 25%, transparent 25%), 
                              linear-gradient(45deg, #cc99ff 25%, transparent 25%), 
                              linear-gradient(315deg, #cc99ff 25%, #ffccff 25%);
            background-position: 10px 0, 10px 0, 0 0, 0 0;
            background-size: 20px 20px;
        }
        .container {
            text-align: center;
        }
        h1 {
            font-size: 4rem;
        }
        p {
            font-size: 1.5rem;
            margin-bottom: 20px;
        }
        a {
            color: #ffffff;
            text-decoration: none;
            border: 2px solid #ffffff;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        a:hover {
            background-color: #ffffff;
            color: #cc99ff;
        }
        .image-container {
            margin-top: 30px;
        }
        .image-container img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404: Page Not Found</h1>
        <p>Whoops! Looks like you took a wrong turn in the cyberpunk alley.</p>
        <a href="/">Take me back home</a>
        <div class="image-container">
            <img src="https://i.imgur.com/Fz9V9Zq.jpg" alt="Vaporwave Aesthetic">
        </div>
    </div>
</body>
</html>
