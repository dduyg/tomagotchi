<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 | Lost in the Code</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #ff8de3, #8de3ff);
      background-size: 400% 400%;
      animation: gradientShift 10s ease infinite;
      font-family: 'Press Start 2P', monospace;
      color: #fff;
      text-align: center;
      overflow: hidden;
    }

    @keyframes gradientShift {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .glitch {
      font-size: 4rem;
      position: relative;
      display: inline-block;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      top: 0;
      opacity: 0.8;
    }

    .glitch::before {
      color: #ff00c8;
      animation: glitch1 2s infinite;
    }

    .glitch::after {
      color: #00fff7;
      animation: glitch2 2s infinite;
    }

    @keyframes glitch1 {
      0% {transform: translate(0, 0);}
      20% {transform: translate(-3px, 2px);}
      40% {transform: translate(-1px, -3px);}
      60% {transform: translate(2px, 0);}
      80% {transform: translate(1px, 2px);}
      100% {transform: translate(0, 0);}
    }

    @keyframes glitch2 {
      0% {transform: translate(0, 0);}
      20% {transform: translate(2px, -1px);}
      40% {transform: translate(-2px, 1px);}
      60% {transform: translate(0, 3px);}
      80% {transform: translate(-1px, -2px);}
      100% {transform: translate(0, 0);}
    }

    .message {
      margin-top: 20px;
      font-size: 1rem;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.6;
    }

    a {
      display: inline-block;
      margin-top: 30px;
      padding: 10px 20px;
      background: #000;
      color: #fff;
      text-decoration: none;
      border: 2px solid #fff;
      transition: background 0.3s, color 0.3s;
    }

    a:hover {
      background: #fff;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="glitch" data-text="404">404</div>
  <div class="message">
    <p>You’ve reached the end of the digital highway, a broken byte in the matrix, a misplaced semicolon in the code of reality.</p>
    <p>This page doesn’t exist — or maybe it transcended. Either way, it’s not here.</p>
  </div>
  <a href="/">Return to Mainframe</a>
</body>
</html>
