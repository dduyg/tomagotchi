<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Lost in the Code</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
      color: #f8f8f8;
      font-family: 'Press Start 2P', monospace;
      overflow: hidden;
    }

    .glitch {
      font-size: 3em;
      color: #ff00ff;
      position: relative;
      animation: flicker 2s infinite;
      text-align: center;
      margin-top: 100px;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      width: 100%;
      overflow: hidden;
    }

    .glitch::before {
      top: -2px;
      left: 2px;
      color: #00fff7;
      animation: glitchTop 1.5s infinite linear;
    }

    .glitch::after {
      top: 2px;
      left: -2px;
      color: #ff004f;
      animation: glitchBottom 1.5s infinite linear;
    }

    @keyframes glitchTop {
      0% { clip-path: inset(0 0 85% 0); }
      50% { clip-path: inset(10% 0 60% 0); }
      100% { clip-path: inset(5% 0 70% 0); }
    }

    @keyframes glitchBottom {
      0% { clip-path: inset(90% 0 0 0); }
      50% { clip-path: inset(40% 0 20% 0); }
      100% { clip-path: inset(60% 0 10% 0); }
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
        opacity: 1;
      }
      20%, 24%, 55% {
        opacity: 0.2;
      }
    }

    .message {
      text-align: center;
      font-size: 1.1em;
      margin: 30px auto;
      max-width: 600px;
      padding: 0 20px;
      color: #ffffffcc;
    }

    .home-link {
      display: block;
      text-align: center;
      margin-top: 40px;
      font-family: 'Orbitron', sans-serif;
      font-size: 1em;
      color: #00fff7;
      text-decoration: none;
      transition: transform 0.2s ease-in-out;
    }

    .home-link:hover {
      color: #ff00ff;
      transform: scale(1.1);
    }

    .scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="glitch" data-text="404 ERROR">404 ERROR</div>
  <div class="message">
    You just hit a digital dead-end, traveler.<br><br>
    The code ran into the void, and this page doesn't exist—or maybe it never did. <br>
    Reality is bending, pixels are glitching... but don't worry, the mainframe still holds.
  </div>
  <a class="home-link" href="/">RETURN TO THE MAINFRAME</a>
  <div class="scanlines"></div>
</body>
</html>
