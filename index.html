<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🗿Loop</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: sans-serif;
            background: #EDE8EC;
            color: #262626;
            overflow-y: auto; /* Prevent cutting off content */
        }

        main {
            max-width: 800px;
            width: 100%;
            margin: 15vh auto 0;
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
        }

        .badge {
            display: inline-block;
            width: 45px;
            height: 45px;
            margin-right: 10px;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Background images for badges */
        .badge.forming-kin {
            background-image: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/af238fe353b4600c25752fc2aa9d628c68074742/04/memory01.svg');
            background-size: cover;
        }
        .badge.moi {
            background-image: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/af238fe353b4600c25752fc2aa9d628c68074742/04/memory02.svg');
            background-size: cover;
        }
        /* Add remaining badge styles... */

        /* Hover Backgrounds */
        .badge.forming-kin:hover,
        article input:checked ~ label.forming-kin {
            background-color: #f886ff;
        }
        .badge.moi:hover,
        article input:checked ~ label.moi {
            background-color: #71c6ff;
        }
        /* Add hover colors for other badges */

        /* Hide radio inputs */
        input {
            display: none;
        }

        label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            height: 50px;
            padding: 10px;
            cursor: pointer;
            border: 3px solid;
            user-select: none;
            transition: background-color 0.3s ease;
        }

        .content {
            box-sizing: border-box;
            padding: 10px;
            font-size: 0.9em;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-in-out;
        }

        /* Open state for accordion */
        input:checked ~ .content {
            max-height: 400px;
        }

        /* Paragraphs in two columns */
        .content p {
            display: inline-block;
            width: 100%;
            margin-bottom: 10px;
        }

        .content p + p {
            margin-left: 10px;
        }

        @media (min-width: 768px) {
            .content {
                display: flex;
                flex-wrap: wrap;
                gap: 15px;
            }
            .content p {
                width: calc(50% - 10px); /* Two columns */
            }
        }

        /* Tooltip styles */
        .tip {
            color: #f03768;
            cursor: help;
            position: relative;
            font-family: monospace;
            font-size: 1.3em;
        }

        .tip::after {
            content: attr(data-tip);
            position: absolute;
            background: #3E474F;
            color: white;
            padding: 8px;
            font-size: 0.8em;
            width: 150px;
            opacity: 0;
            transition: opacity 0.3s;
            bottom: 150%;
            left: 0;
        }

        .tip:hover::after {
            opacity: 1;
        }

    </style>
</head>
<body>
<main>
    <header>
        <h1>Memory Work</h1>
        <nav>
            <span class="badge forming-kin" data-target="tab-1"></span>
            <span class="badge moi" data-target="tab-2"></span>
            <!-- Add other badges -->
        </nav>
    </header>

    <article id="formingkin">
        <input type="radio" id="tab-1" name="tabs">
        <label for="tab-1" class="forming-kin"><div>Forming Kin</div></label>
        <div class="content">
            <p class="dropcap">A call for people to be with and of nature...</p>
            <p>Like mushrooms springing from disseminated spores...</p>
        </div>
    </article>

    <article id="mothers-of-invention">
        <input type="radio" id="tab-2" name="tabs">
        <label for="tab-2" class="moi"><div>Mothers of Invention</div></label>
        <div class="content">
            <p class="dropcap">Referring to a loosely knit movement...</p>
            <p>In response to the clumsy and ineffectual Climate Imperative...</p>
        </div>
    </article>

    <!-- More articles -->

</main>

<script>
    document.addEventListener("DOMContentLoaded", function () {
        const badges = document.querySelectorAll(".badge");

        badges.forEach((badge) => {
            badge.addEventListener("click", function () {
                const targetId = this.getAttribute("data-target");
                const targetInput = document.getElementById(targetId);

                if (targetInput) {
                    targetInput.checked = true;
                }
            });
        });
    });
</script>
</body>
</html>
