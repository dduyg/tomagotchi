<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <style>
        /* Global styles */
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background-color: #222;
            color: #f5f5f5;
        }

        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 0 20px;
        }

        .content {
            width: 100%;
            max-width: 800px;
            display: grid;
            grid-template-columns: 50% 50%;
            gap: 20px;
            line-height: 1.6;
            border-top: 1px solid #777;
            padding-top: 40px;
        }

        .left-column {
            text-align: left;
            font-weight: bold;
            text-transform: uppercase;
            color: #ccc;
        }

        .right-column a {
            color: #f5f5f5;
            text-decoration: none;
            font-weight: normal;
            transition: color 0.3s ease;
        }

        .right-column a:hover {
            color: #bbb;
        }

        h1 {
            font-size: 2rem;
            text-transform: uppercase;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <div class="left-column">
                <h1>Contact</h1>
                <p>Mail</p>
                <p>Social Medias</p>
            </div>
            <div class="right-column">
                <p><a href="#">↗ hello@itsshar.lee</a></p>
                <p><a href="#">↗ instagram</a></p>
                <p><a href="#">↗ behance</a></p>
            </div>
        </div>
    </div>
</body>
</html>
