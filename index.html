<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Lost in the Code</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #00ffd5;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      text-align: center;
    }

    h1 {
      font-size: 4rem;
      margin: 0.5em 0;
      text-shadow: 0 0 5px #ff00c8, 0 0 10px #00ffd5;
      animation: glitch 1.5s infinite;
    }

    p {
      font-size: 1rem;
      max-width: 600px;
      margin: 1em;
      line-height: 1.6;
      color: #e0e0e0;
    }

    a {
      display: inline-block;
      margin-top: 1.5em;
      padding: 0.75em 2em;
      color: #0ff;
      border: 2px solid #0ff;
      text-decoration: none;
      text-transform: uppercase;
      transition: background 0.3s, color 0.3s;
    }

    a:hover {
      background: #0ff;
      color: #000;
    }

    @keyframes glitch {
      0% { transform: none; opacity: 1; }
      20% { transform: skew(-5deg); opacity: 0.9; }
      40% { transform: skew(5deg); opacity: 1; }
      60% { transform: translateX(2px); opacity: 0.95; }
      80% { transform: translateX(-2px); opacity: 1; }
      100% { transform: none; opacity: 1; }
    }

    .glitch-bg {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0; left: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(255, 255, 255, 0.02),
        rgba(255, 255, 255, 0.02) 1px,
        transparent 1px,
        transparent 4px
      );
      z-index: -1;
    }
  </style>
</head>
<body>
  <div class="glitch-bg"></div>
  <h1>404</h1>
  <p>You've gone off-grid, hacker.<br>  
  This page doesn't exist in our timeline or any alternate reality.</p>
  <p>Maybe a rogue semicolon or a miswired redirect brought you here.<br>
  Either way, you're staring into the void of cyberspace.</p>
  <a href="/">Jack Out & Return Home</a>
</body>
</html>
