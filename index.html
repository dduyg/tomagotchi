<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Liminal🧊Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@450&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: #040205;
      color: #B504F3;
      font-family: "Manrope", sans-serif;
      overflow: hidden;
    }

    .index {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .item {
      flex: 1 1 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border-right: 1px dotted;
      cursor: pointer;
    }

    .item_inner {
      position: relative;
      z-index: 3;
      text-align: center;
      padding: 10px;
    }

    .item_inner h3 {
      font-size: clamp(1rem, 2vw, 1.5rem);
      margin: 0 0 8px;
    }

    .item_inner p {
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      margin: 0;
    }

    .item-bg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 2;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .bg-fill {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .bg-path {
      fill: var(--base-color-neutral--white, #1203F6);
    }

    .item.active .item-bg {
      opacity: 1;
    }
  </style>
</head>
<body>
  <nav class="index">
    <div class="item" data-bg-type="color" data-bg-src="#1203F6">
      <div class="item-bg"></div>
      <div class="item_inner">
        <h3>Solid Color</h3>
        <p>Click to apply color</p>
      </div>
    </div>
    <div class="item" data-bg-type="image" data-bg-src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/dead-reckoning.gif">
      <div class="item-bg"></div>
      <div class="item_inner">
        <h3>GIF</h3>
        <p>Click to apply gif</p>
      </div>
    </div>
    <div class="item" data-bg-type="image" data-bg-src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/dead-reckoning.gif">
      <div class="item-bg"></div>
      <div class="item_inner">
        <h3>PNG</h3>
        <p>Click to apply PNG</p>
      </div>
    </div>
    <div class="item" data-bg-type="none">
      <div class="item-bg"></div>
      <div class="item_inner">
        <h3>Clear</h3>
        <p>Click to remove background</p>
      </div>
    </div>
    <svg viewBox="0 0 100 100" preserveAspectRatio="none" class="bg-fill">
      <path d="M 0 0 H 0 Q 0 50 0 100 H 0 V 0 z" class="bg-path"></path>
    </svg>
  </nav>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    const index = document.querySelector(".index");
    const bgPath = document.querySelector(".bg-path");
    let currentItem = null;
    let animation = null;

    function getItemDimensions(item) {
      const rect = item.getBoundingClientRect();
      const navRect = index.getBoundingClientRect();
      return {
        left: ((rect.left - navRect.left) / navRect.width) * 100,
        right: ((rect.right - navRect.left) / navRect.width) * 100,
      };
    }

    function createPath(left, right, curveStrength = 0) {
      return `M ${left} 0 H ${right} Q ${right + curveStrength} 50 ${right} 100 H ${left} V 0 Z`;
    }

    function animateHover(item) {
      if (animation) animation.kill();
      const { left, right } = getItemDimensions(item);
      const initialPath = createPath(left, left);
      const midPath = createPath(left, right, 10);
      const finalPath = createPath(left, right);

      animation = gsap.timeline()
        .set(bgPath, { attr: { d: initialPath } })
        .to(bgPath, {
          attr: { d: midPath },
          duration: 0.2,
          ease: "power2.out",
        })
        .to(bgPath, {
          attr: { d: finalPath },
          duration: 0.3,
          ease: "elastic.out(1, 0.3)",
        });
    }

    function animateTransition(fromItem, toItem) {
      if (animation) animation.kill();
      const fromDim = getItemDimensions(fromItem);
      const toDim = getItemDimensions(toItem);
      const direction = toDim.left > fromDim.left ? 1 : -1;

      const midPath = createPath(
        Math.min(fromDim.left, toDim.left),
        Math.max(fromDim.right, toDim.right),
        15 * direction
      );
      const finalPath = createPath(toDim.left, toDim.right);

      animation = gsap.timeline()
        .to(bgPath, {
          attr: { d: midPath },
          duration: 0.2,
          ease: "power2.out",
        })
        .to(bgPath, {
          attr: { d: finalPath },
          duration: 0.3,
          ease: "elastic.out(1, 0.3)",
        });
    }

    function animateHoverOut(item) {
      if (animation) animation.kill();
      const { left, right } = getItemDimensions(item);
      const midPath = createPath(left, right, 10);
      const finalPath = createPath(left, left);

      animation = gsap.timeline()
        .to(bgPath, {
          attr: { d: midPath },
          duration: 0.2,
          ease: "power2.in",
        })
        .to(bgPath, {
          attr: { d: finalPath },
          duration: 0.3,
          ease: "power2.inOut",
        });
    }

    index.addEventListener("mouseover", (e) => {
      const item = e.target.closest(".item");
      if (item && item !== currentItem) {
        if (currentItem) {
          animateTransition(currentItem, item);
        } else {
          animateHover(item);
        }
        currentItem = item;
      }
    });

    index.addEventListener("mouseleave", () => {
      if (currentItem) {
        animateHoverOut(currentItem);
        currentItem = null;
      }
    });

    document.querySelectorAll('.item').forEach(item => {
      item.addEventListener('click', () => {
        const type = item.dataset.bgType;
        const src = item.dataset.bgSrc;
        const bg = item.querySelector('.item-bg');

        // Clear all item backgrounds
        document.querySelectorAll('.item').forEach(i => i.classList.remove('active'));

        if (type === "image") {
          bg.style.backgroundImage = `url('${src}')`;
          bg.style.backgroundColor = "";
          item.classList.add("active");
        } else if (type === "color") {
          bg.style.backgroundImage = "";
          bg.style.backgroundColor = src;
          item.classList.add("active");
        } else {
          bg.style.backgroundImage = "";
          bg.style.backgroundColor = "transparent";
        }
      });
    });
  </script>
</body>
</html>
