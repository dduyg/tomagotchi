<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 - Page Not Found</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

  /* Reset */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: linear-gradient(135deg, #2b0e7e, #ff43a4);
    color: #00fff7;
    font-family: 'VT323', monospace, monospace;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    user-select: none;
  }

  .container {
    text-align: center;
    max-width: 600px;
    padding: 2rem;
    position: relative;
  }

  h1 {
    font-size: 12rem;
    line-height: 1;
    color: #00fff7;
    text-shadow:
      1px 0 #ff43a4,
      -1px 0 #ff43a4,
      0 1px #ff43a4,
      0 -1px #ff43a4;
    animation: glitch 2s infinite;
    user-select: none;
  }

  @keyframes glitch {
    0% {
      text-shadow:
        2px 0 #ff43a4,
        -2px 0 #00fff7,
        0 2px #ff43a4,
        0 -2px #00fff7;
      transform: skew(0deg);
    }
    20% {
      text-shadow:
        3px 0 #00fff7,
        -3px 0 #ff43a4,
        0 3px #00fff7,
        0 -3px #ff43a4;
      transform: skew(-5deg);
    }
    40% {
      text-shadow:
        1px 0 #ff43a4,
        -1px 0 #00fff7,
        0 1px #ff43a4,
        0 -1px #00fff7;
      transform: skew(3deg);
    }
    60% {
      text-shadow:
        2px 0 #00fff7,
        -2px 0 #ff43a4,
        0 2px #00fff7,
        0 -2px #ff43a4;
      transform: skew(-2deg);
    }
    80% {
      text-shadow:
        3px 0 #ff43a4,
        -3px 0 #00fff7,
        0 3px #ff43a4,
        0 -3px #00fff7;
      transform: skew(4deg);
    }
    100% {
      text-shadow:
        2px 0 #ff43a4,
        -2px 0 #00fff7,
        0 2px #ff43a4,
        0 -2px #00fff7;
      transform: skew(0deg);
    }
  }

  p {
    font-size: 1.5rem;
    margin: 1rem 0 2rem;
    letter-spacing: 0.05em;
    text-shadow: 0 0 5px #ff43a4, 0 0 10px #00fff7;
  }

  a {
    display: inline-block;
    padding: 1rem 3rem;
    border: 2px solid #00fff7;
    color: #00fff7;
    text-decoration: none;
    font-weight: bold;
    font-size: 1.2rem;
    border-radius: 6px;
    position: relative;
    overflow: hidden;
    transition: background-color 0.3s ease, color 0.3s ease;
  }

  a::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(120deg, #ff43a4, #00fff7, #ff43a4);
    transition: left 0.5s ease;
    z-index: -1;
  }

  a:hover::before {
    left: 0;
  }

  a:hover {
    color: #000;
    background-color: #00fff7;
  }

  /* Glitch scanline effect */
  .scanlines {
    pointer-events: none;
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    background: repeating-linear-gradient(
      180deg,
      rgba(0,255,247,0.07) 0,
      rgba(0,255,247,0.07) 1px,
      transparent 2px,
      transparent 4px
    );
    mix-blend-mode: screen;
    animation: scan 0.3s linear infinite;
  }

  @keyframes scan {
    0% {background-position: 0 0;}
    100% {background-position: 0 4px;}
  }

  /* Glitch flicker bars */
  .glitch-bar {
    position: fixed;
    width: 100%;
    height: 3px;
    background: #ff43a4;
    opacity: 0.2;
    animation: flicker 0.15s infinite alternate;
  }
  .glitch-bar:nth-child(2) {
    top: 25vh;
    animation-delay: 0.1s;
  }
  .glitch-bar:nth-child(3) {
    top: 60vh;
    animation-delay: 0.05s;
  }
  @keyframes flicker {
    0% {opacity: 0.2;}
    100% {opacity: 0.6;}
  }
</style>
</head>
<body>
  <div class="container" role="main">
    <h1>404</h1>
    <p>ERROR: DATA CORRUPTED.<br>THE PAGE YOU SEEK IS LOST IN THE GLITCHES OF CYBERSPACE.</p>
    <a href="/" aria-label="Return to homepage">REBOOT TO HOME</a>
  </div>

  <div class="scanlines"></div>
  <div class="glitch-bar"></div>
  <div class="glitch-bar"></div>
</body>
</html>
