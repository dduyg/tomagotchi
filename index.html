<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide In Animation</title>
  <style>
    /* Starting invisible and above the view */
    .slide-in {
      opacity: 0;
      transform: translateY(-96px);
      transition: transform 0.5s ease-out, opacity 0.5s ease-out;
    }

    /* When the 'visible' class is added */
    .slide-in.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div id="myDiv" class="slide-in">Hello, I will slide in!</div>

  <script>
    // Simulate a delay to trigger the slide-in
    setTimeout(() => {
      document.getElementById('myDiv').classList.add('visible');
    }, 1000); // Trigger after 1 second
  </script>
</body>
</html>
