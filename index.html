<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #121212; /* Dark background for cyberpunk theme */
            color: #e0e0e0;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        .video-container {
            border: 3px solid #00ff00; /* Neon green border */
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.6); /* Neon glow effect */
            background-color: rgba(0, 0, 0, 0.7); /* Semi-transparent black background */
            width: 80%;
            max-width: 800px;
            text-align: center;
            position: relative;
            border-radius: 10px;
        }

        video {
            width: 100%; 
            height: auto;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.6);
        }

        h3 {
            margin-top: 20px;
            font-size: 24px;
            color: #ff00ff; /* Neon pink text */
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 30px #ff00ff; /* Glowing text */
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 2px;
        }

        /* Glitch effect for title */
        h3.glitch {
            position: relative;
            display: inline-block;
            color: #ff00ff;
        }

        h3.glitch::before,
        h3.glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            color: #00ff00;
            z-index: -1;
            animation: glitch 2s infinite;
        }

        h3.glitch::after {
            animation-delay: 1s;
        }

        @keyframes glitch {
            0% {
                transform: translate(-2px, 2px);
            }
            10% {
                transform: translate(2px, -2px);
            }
            20% {
                transform: translate(-2px, 2px);
            }
            30% {
                transform: translate(2px, -2px);
            }
            40% {
                transform: translate(-2px, 2px);
            }
            50% {
                transform: translate(2px, -2px);
            }
            60% {
                transform: translate(-2px, 2px);
            }
            70% {
                transform: translate(2px, -2px);
            }
            80% {
                transform: translate(-2px, 2px);
            }
            90% {
                transform: translate(2px, -2px);
            }
            100% {
                transform: translate(0);
            }
        }

        /* Faded background effect */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/subtle-grunge.png') no-repeat center center;
            background-size: cover;
            filter: blur(5px);
            z-index: -2;
            opacity: 0.4;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="video-container">
        <video controls>
            <source src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/04/FadedEchoes.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <h3 class="glitch" data-text="Cyberpunk Video">Cyberpunk Video</h3>
    </div>
</body>
</html>
