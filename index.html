<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Lost in the Code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      font-family: 'Share Tech Mono', monospace;
      color: #f8f8f2;
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      animation: bgShift 10s infinite alternate;
    }

    @keyframes bgShift {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    .glitch {
      font-size: 4rem;
      position: relative;
      color: #fff;
      text-shadow: 2px 2px 0 #ff00c8, -2px -2px 0 #00fff9;
      animation: glitch 1.5s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 2px #ff00c8, -2px -2px #00fff9; }
      20% { text-shadow: -2px 0 #00fff9, 2px 2px #ff00c8; }
      40% { text-shadow: 2px -2px #ff00c8, -2px 2px #00fff9; }
      60% { text-shadow: -2px -2px #ff00c8, 2px 0 #00fff9; }
      80% { text-shadow: 2px 2px #ff00c8, -2px -2px #00fff9; }
      100% { text-shadow: -2px 2px #00fff9, 2px -2px #ff00c8; }
    }

    .message {
      margin-top: 20px;
      font-size: 1.2rem;
      text-align: center;
      max-width: 600px;
      color: #dcdcdc;
    }

    a.home-link {
      display: inline-block;
      margin-top: 30px;
      padding: 10px 20px;
      background: #00fff9;
      color: #0f0c29;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
      transition: background 0.3s;
    }

    a.home-link:hover {
      background: #ff00c8;
      color: #fff;
    }

    .scanlines {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.02),
        rgba(255,255,255,0.02) 1px,
        transparent 1px,
        transparent 2px
      );
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="glitch">404 - PAGE NOT FOUND</div>
  <div class="message">
    The code broke, reality fractured, and now you're floating in the digital void.<br>
    But don't panic — you're still in the matrix.<br><br>
    Let's jack you back into the mainframe.
  </div>
  <a class="home-link" href="/">Return to Home</a>
  <div class="scanlines"></div>
</body>
</html>
