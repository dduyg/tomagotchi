<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Liminal🧊Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@450&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: #040205;
      color: #B504F3;
      font-family: "Manrope", sans-serif;
      overflow: hidden;
    }

    .index {
      display: flex;
      flex-direction: row;
      width: 100vw;
      height: 100vh;
    }

    .item {
      flex: 1 1 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      border-right: 1px dotted;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: background 0.4s ease;
    }

    .item_inner {
      position: relative;
      z-index: 2;
      text-align: center;
      background-color: rgba(0, 0, 0, 0.5); /* optional overlay for readability */
      padding: 10px;
      border-radius: 10px;
    }

    .item_inner h3 {
      font-size: clamp(1rem, 2vw, 1.5rem);
      margin: 0 0 8px 0;
    }

    .item_inner p {
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      margin: 0;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <nav class="index">
    <div class="item" data-bg-type="color" data-bg-src="#1203F6">
      <div class="item_inner">
        <h3>Solid Color</h3>
        <p>Click to set solid background</p>
      </div>
    </div>
    <div class="item" data-bg-type="image" data-bg-src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/dead-reckoning.gif">
      <div class="item_inner">
        <h3>Use GIF</h3>
        <p>Click to set GIF background</p>
      </div>
    </div>
    <div class="item" data-bg-type="image" data-bg-src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/dead-reckoning.gif">
      <div class="item_inner">
        <h3>Use PNG</h3>
        <p>Click to set PNG background</p>
      </div>
    </div>
    <div class="item" data-bg-type="none">
      <div class="item_inner">
        <h3>Clear BG</h3>
        <p>Click to remove background</p>
      </div>
    </div>
  </nav>

  <script>
    document.querySelectorAll('.item').forEach(item => {
      item.addEventListener('click', () => {
        const type = item.getAttribute('data-bg-type');
        const src = item.getAttribute('data-bg-src');

        if (type === 'image') {
          item.style.backgroundImage = `url('${src}')`;
          item.style.backgroundColor = '';
        } else if (type === 'color') {
          item.style.backgroundColor = src;
          item.style.backgroundImage = '';
        } else {
          item.style.backgroundColor = 'transparent';
          item.style.backgroundImage = '';
        }
      });
    });
  </script>
</body>
</html>
