<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Right Vertical Tabs</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .content {
      flex: 1;
      padding: 40px;
    }

    .tab-panel {
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .vertical-tabs {
      width: 60px;
      background-color: #fff;
      border-left: 2px solid #000;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
    }

    .tab-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      margin: 20px 0;
      border: none;
      background-color: #000;
      cursor: pointer;
      outline: none;
    }

    .tab-btn.active {
      background-color: #444;
    }

    .main-content {
      flex-grow: 1;
      padding-right: 80px; /* space for vertical tabs */
    }
  </style>
</head>
<body>

  <div class="main-content">
    <div id="tab1" class="tab-panel active">
      <p>Here section content here section content here section content...</p>
    </div>
    <div id="tab2" class="tab-panel">
      <p>Another section content here...</p>
    </div>
    <div id="tab3" class="tab-panel">
      <p>Final section content here...</p>
    </div>
  </div>

  <div class="vertical-tabs">
    <button class="tab-btn active" onclick="switchTab('tab1', this)"></button>
    <button class="tab-btn" onclick="switchTab('tab2', this)"></button>
    <button class="tab-btn" onclick="switchTab('tab3', this)"></button>
  </div>

  <script>
    function switchTab(tabId, btn) {
      document.querySelectorAll('.tab-panel').forEach(tab => tab.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');

      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>

</body>
</html>
