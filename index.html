<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liminal🥟Loop</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(135deg, #ff00c8, #00ffe7);
      color: #fff;
    }

    .tab-container {
      display: flex;
      flex-direction: row;
      width: 100%;
      backdrop-filter: blur(8px);
    }

    .tab-content-area {
      flex: 1;
      padding: 40px;
      background: rgba(0, 0, 0, 0.5);
      border-right: 2px solid #ff00c8;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
      animation: fadeIn 0.5s ease-in-out;
    }

    .tab-buttons {
      display: flex;
      flex-direction: column;
      background: rgba(0, 0, 0, 0.7);
      border-left: 2px solid #00ffe7;
    }

    .tab-button {
      width: 60px;
      height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      cursor: pointer;
      background: transparent;
      color: #fff;
      transition: all 0.3s ease;
      text-shadow: 0 0 5px #00ffe7, 0 0 10px #ff00c8;
    }

    .tab-button:hover {
      background: #ff00c844;
    }

    .tab-button.active {
      background: #00ffe744;
      box-shadow: 0 0 10px #ff00c8, inset 0 0 5px #00ffe7;
    }

    .icon {
      font-size: 24px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="tab-container">
    <div class="tab-content-area">
      <div class="tab-content active" id="content1">Profile section content goes here.</div>
      <div class="tab-content" id="content2">Settings section content goes here.</div>
      <div class="tab-content" id="content3">Web section content goes here.</div>
      <div class="tab-content" id="content4">Message section content goes here.</div>
    </div>

    <div class="tab-buttons">
      <div class="tab-button active" data-target="content1">👤</div>
      <div class="tab-button" data-target="content2">🛠️</div>
      <div class="tab-button" data-target="content3">🌐</div>
      <div class="tab-button" data-target="content4">✈️</div>
    </div>
  </div>

  <script>
    const buttons = document.querySelectorAll('.tab-button');
    const contents = document.querySelectorAll('.tab-content');

    buttons.forEach(button => {
      button.addEventListener('click', () => {
        buttons.forEach(btn => btn.classList.remove('active'));
        contents.forEach(content => content.classList.remove('active'));

        button.classList.add('active');
        const target = document.getElementById(button.dataset.target);
        target.classList.add('active');
      });
    });
  </script>
</body>
</html>
