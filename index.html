<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadpool Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Ewert&display=swap" rel="stylesheet">
    <style>
        .deadpools-surprise {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 16px;
            font-family: "Ewert", serif;
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        .deadpools-surprise span {
            font-size: 1.2em;
            margin-right: 10px;
        }
        .deadpools-surprise.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="deadpools-surprise">
        <span>🦸‍♂️</span> Surprise! <em>Deadpool is here!</em>
    </div>
    <script>
        const dpSurprise = document.querySelector('.deadpools-surprise');

        if (dpSurprise) {
            setTimeout(() => {
                dpSurprise.classList.add('visible');
            }, 10000); // 10 seconds delay
        }
    </script>
</body>
</html>
