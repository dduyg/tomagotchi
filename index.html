<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadpool Surprise</title>
    <style>
        @font-face {
            font-family: 'Dodopop';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Dodopop-Regular.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Dodopop';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Dodopop-Italic.woff2') format('woff2');
            font-weight: normal;
            font-style: italic;
        }       
        .deadpools-surprise {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 16px;
            font-family: 'Dodopop', sans-serif;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transition: opacity 0.5s ease-in-out;
        }
        .deadpools-surprise.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="deadpools-surprise">
        🦸‍♂️ Surprise! Deadpool is here!
    </div>
    <script>
        const dpSurprise = document.querySelector('.deadpools-surprise');

        if (dpSurprise) {
            setTimeout(() => {
                dpSurprise.classList.add('visible');
            }, 10000); // 10 seconds delay
        }
    </script>
</body>
</html>
