<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vaporwave Contact Page</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #222; /* Dark background color */
            color: #ffffff; /* White text color */
            font-family: Helvetica, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            padding: 0;
            margin: 0;
        }
        main {
            max-width: 800px;
            width: 100%;
        }

        h1 {
            font-size: 2rem;
            text-transform: uppercase;
            margin-bottom: 10px;
        }
        
        section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-top: 1px solid #ffffff;
            padding-top: 20px;
            gap: 10px;
        }
        .left {
            display: flex;
            flex-direction: column;
            gap: 20px;
            font-weight: bold;
        }
        .right {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        a {
            color: inherit;
            text-decoration: none;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main>
        <h1>Contact</h1>
        <section>
            <div class="left">
                <div>CYBER MAIL</div>
                <div>SOCIAL DREAMS</div>
            </div>
            <div class="right">
                <a href="#">↗ future@vaporwa.ve</a>
                <a href="#">↗ aesthetic</a>
                <a href="#">↗ neon grid</a>
            </div>
        </section>
    </main>
</body>
</html>
