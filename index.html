<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Marquee Animation</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      padding: 0;
      margin: 0;
      background: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      font-family: Arial, sans-serif;
    }
    .marquee {
      position: relative;
      display: flex;
      gap: 10px;
      overflow: hidden;
      width: 100%;
      max-width: 800px;
      height: 150px;
      background: #fff;
      border: 1px solid #ddd;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    .marquee-item {
      width: auto;
      height: 100%;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <section class="marquee" data-reversed="false">
    <img class="marquee-item" src="https://media0.giphy.com/media/l0O9xVx5v3YHYjGgM/giphy.gif" alt="Image 1">
    <img class="marquee-item" src="https://media1.giphy.com/media/cpO6VvIo0mW9q/giphy.gif" alt="Image 2">
    <img class="marquee-item" src="https://media3.giphy.com/media/3o6EhE8pukIRNaPyOQ/giphy.gif" alt="Image 3">
    <img class="marquee-item" src="https://media3.giphy.com/media/ldKjshoVdTNgblMuLs/giphy.gif" alt="Image 4">
  </section>

  <section class="marquee" data-reversed="true">
    <img class="marquee-item" src="https://media2.giphy.com/media/JDXuoS4eWlYAEHyL7G/giphy.gif" alt="Image 5">
    <img class="marquee-item" src="https://media4.giphy.com/media/a2vstZP9SvLA4/giphy.gif" alt="Image 6">
    <img class="marquee-item" src="https://media3.giphy.com/media/kesNMJU1kLFJdc7FcB/giphy.gif" alt="Image 7">
    <img class="marquee-item" src="https://media1.giphy.com/media/VoVQ6zWVMjUuGUz8bu/giphy.gif" alt="Image 8">
  </section>

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const marquees = document.querySelectorAll(".marquee");

      marquees.forEach((marquee) => {
        const items = gsap.utils.toArray(marquee.querySelectorAll(".marquee-item"));
        const reversed = marquee.getAttribute("data-reversed") === "true";
        
        gsap.timeline({ repeat: -1, defaults: { ease: "none" } })
          .to(items, {
            xPercent: -100 * (items.length - 1),
            duration: items.length * 2,
            repeat: -1,
            modifiers: {
              xPercent: gsap.utils.wrap(-100, 0)
            }
          })
          .set(items, { xPercent: reversed ? 100 : 0 });
      });
    });
  </script>
</body>
</html>
