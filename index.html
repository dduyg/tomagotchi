<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 - Lost in the Void</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap');
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: linear-gradient(135deg, #ff00cc, #333399);
      color: #ffffff;
      font-family: 'Orbitron', monospace;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .logo {
      width: 100px;
      height: 100px;
      background: url('your-logo.png') no-repeat center/contain;
      margin-bottom: 30px;
      filter: drop-shadow(0 0 10px #fff);
    }
    h1 {
      font-size: 5em;
      text-shadow: 2px 2px #000, 0 0 5px #0ff;
      animation: glitch 1s infinite;
    }
    p {
      font-size: 1.5em;
      margin: 20px;
      color: #fffb;
    }
    a {
      color: #0ff;
      text-decoration: none;
      padding: 10px 20px;
      border: 2px solid #0ff;
      border-radius: 10px;
      transition: 0.3s;
    }
    a:hover {
      background: #0ff;
      color: #000;
    }
    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -2px); }
      60% { transform: translate(-1px, 1px); }
      80% { transform: translate(1px, -1px); }
      100% { transform: translate(0); }
    }
    .scanlines {
      position: absolute;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.05) 0, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 2px);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="logo"></div>
  <h1>404</h1>
  <p>You’ve entered the <strong>glitch zone</strong>.<br>The page you’re looking for doesn't exist.</p>
  <a href="/">Go Back Home</a>
  <div class="scanlines"></div>
</body>
</html>
