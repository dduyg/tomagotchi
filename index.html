<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 - Lost in the Code</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Press Start 2P', monospace;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #f5f5f5;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100vh;
      background-image: url('https://media.giphy.com/media/jpbnoe3UIa8TU8LM13/giphy.gif');
      background-size: cover;
      background-position: center;
    }

    .overlay {
      background: rgba(0, 0, 0, 0.65);
      padding: 2rem;
      border-radius: 12px;
      margin: 2rem;
      box-shadow: 0 0 20px #ff00c8, 0 0 30px #00ffff;
    }

    h1 {
      font-size: 3rem;
      color: #00ffff;
      text-shadow: 2px 2px #ff00c8;
      margin-bottom: 1rem;
    }

    p {
      font-size: 1rem;
      margin-bottom: 2rem;
    }

    a {
      text-decoration: none;
      color: #ff00c8;
      border: 2px solid #00ffff;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      transition: all 0.3s ease;
    }

    a:hover {
      background-color: #00ffff;
      color: #0f0c29;
    }
  </style>
</head>
<body>
  <div class="overlay">
    <h1>404: SYSTEM MALFUNCTION</h1>
    <p>You’ve jacked into a node that doesn’t exist.<br>
    This path echoes through the datastream, but there's nothing here... yet.</p>
    <a href="/">Return to Mainframe</a>
  </div>
</body>
</html>
