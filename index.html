<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiminalLoop🩻</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      color: white;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 10px 20px;
      z-index: 1000;
    }
    nav {
      display: flex;
      justify-content: space-around;
    }
    nav a {
      color: inherit;
      text-decoration: none;
      padding: 10px 15px;
    }
    nav a:hover {
      background: #555;
      border-radius: 5px;
    }
    section {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 2em;
    }

    #scanGlitch {
      background: #0f0f0f;
    }
    .scan-glitch {
      font-size: 5rem;
      text-transform: uppercase;
      position: relative;
      color: #fff;
    }
    .scan-glitch:before, .scan-glitch:after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      color: #ff0055;
      overflow: hidden;
      clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
      animation: scan-glitch 2s infinite;
    }
    .scan-glitch:after {
      color: #00ffff;
      clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%);
      animation: scan-glitch 2s infinite reverse;
    }
    @keyframes scan-glitch {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-5px, -5px); }
      40% { transform: translate(5px, -5px); }
      60% { transform: translate(-5px, 5px); }
      80% { transform: translate(5px, 5px); }
      100% { transform: translate(0, 0); }
    }
  
    #section2 {
      background: #3498db;
    }
    #section3 {
      background: #e74c3c;
    }
    #section4 {
      background: #9b59b6;
    }
  </style>
</head>
<body>
<header>
  <nav>
    <a href="#scanGlitch">■</a>
    <a href="#section2">Se2</a>
    <a href="#section3">Se3</a>
    <a href="#section4">Se4</a>
  </nav>
</header>

<section id="scanGlitch">
  <h1 class="scan-glitch" data-text="Arrays">Arrays</h1>
</section>
<section id="section2">
  Section 2
</section>
<section id="section3">
  Section 3
</section>
<section id="section4">
  Section 4
</section>
</body>
</html>
