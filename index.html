<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Marquee</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .marquee-container {
      width: 80%;
      overflow: hidden;
      border: 1px solid #ccc;
      background: #fff;
      position: relative;
      height: 150px;
    }
    .marquee {
      display: flex;
      position: absolute;
      white-space: nowrap;
      animation: scroll 10s linear infinite;
    }
    .marquee.reverse {
      animation-direction: reverse;
    }
    .marquee-item {
      flex-shrink: 0;
      height: 100%;
      margin-right: 10px;
    }
    @keyframes scroll {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-100%);
      }
    }
  </style>
</head>
<body>
  <div class="marquee-container">
    <div class="marquee">
      <img class="marquee-item" src="https://media0.giphy.com/media/l0O9xVx5v3YHYjGgM/giphy.gif" alt="Image 1">
      <img class="marquee-item" src="https://media1.giphy.com/media/cpO6VvIo0mW9q/giphy.gif" alt="Image 2">
      <img class="marquee-item" src="https://media3.giphy.com/media/3o6EhE8pukIRNaPyOQ/giphy.gif" alt="Image 3">
      <img class="marquee-item" src="https://media3.giphy.com/media/ldKjshoVdTNgblMuLs/giphy.gif" alt="Image 4">
    </div>
  </div>

  <div class="marquee-container">
    <div class="marquee reverse">
      <img class="marquee-item" src="https://media2.giphy.com/media/JDXuoS4eWlYAEHyL7G/giphy.gif" alt="Image 5">
      <img class="marquee-item" src="https://media4.giphy.com/media/a2vstZP9SvLA4/giphy.gif" alt="Image 6">
      <img class="marquee-item" src="https://media3.giphy.com/media/kesNMJU1kLFJdc7FcB/giphy.gif" alt="Image 7">
      <img class="marquee-item" src="https://media1.giphy.com/media/VoVQ6zWVMjUuGUz8bu/giphy.gif" alt="Image 8">
    </div>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const marquees = document.querySelectorAll('.marquee');

      marquees.forEach((marquee) => {
        const container = marquee.parentElement;
        const items = Array.from(marquee.children);
        let totalWidth = 0;

        // Clone items until they fill the container
        while (totalWidth < container.offsetWidth * 2) {
          items.forEach(item => {
            const clone = item.cloneNode(true);
            marquee.appendChild(clone);
            totalWidth += item.offsetWidth;
          });
        }
      });
    });
  </script>
</body>
</html>
