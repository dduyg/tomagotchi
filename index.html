<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Lost in the Code</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600&family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #ff00cc, #3333ff);
      font-family: 'Orbitron', sans-serif;
      color: #ffffff;
      text-align: center;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-image: url('https://www.transparenttextures.com/patterns/dark-mosaic.png');
    }

    .logo {
      font-family: 'Press Start 2P', cursive;
      font-size: 2.5rem;
      background: linear-gradient(90deg, #00fff7, #ff00e0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2rem;
      animation: glitch 1.5s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -2px); }
      60% { transform: translate(-2px, -2px); }
      80% { transform: translate(2px, 2px); }
      100% { transform: translate(0); }
    }

    h1 {
      font-size: 4rem;
      margin: 0;
    }

    p {
      font-size: 1.2rem;
      margin: 1rem 0 2rem;
    }

    a {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background-color: rgba(255, 255, 255, 0.1);
      border: 2px solid #fff;
      color: #fff;
      text-decoration: none;
      text-transform: uppercase;
      font-weight: bold;
      transition: background-color 0.3s ease;
    }

    a:hover {
      background-color: rgba(255, 255, 255, 0.3);
    }
  </style>
</head>
<body>
  <div class="logo">DATA.WAV</div>
  <h1>404: SIGNAL LOST</h1>
  <p>You’ve gone off-grid. The code you’re looking for isn’t here.</p>
  <a href="/">Return to Home Base</a>
</body>
</html>
