<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refraction*</title>
    <style>
        /* General Styles */
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Header */
        .header {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
        }

        .header .star {
            color: green;
            font-size: 28px;
        }

        .header .shape {
            color: blue;
        }

        .header .color {
            color: purple;
        }

        .subtext {
            font-style: italic;
            color: #999;
        }

        /* Grid Layout */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .gallery img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        /* Like Button */
        .like-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
        }

        .like-btn {
            background-color: blue;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
        }

        .like-btn:hover {
            background-color: darkblue;
        }
    </style>
</head>
<body>

    <div class="header">
        Refraction<span class="star">*</span> <span class="shape">(Shape)</span><span class="color">(Color)</span>
    </div>
    <p class="subtext">--- Some test exercises for form and color ---</p>

    <div class="gallery">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="Abstract Art">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="Abstract Art">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="Abstract Art">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="Abstract Art">
    </div>

    <div class="like-container">
        <button class="like-btn" onclick="likePost()">👍</button>
    </div>

    <script>
        function likePost() {
            alert("You liked this post!");
        }
    </script>

</body>
</html>
