<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        body {
            background-color: #2b2b2b;
            background-image: url("https://www.transparenttextures.com/patterns/basketball.png");      
            color: #f5f5f5;
            font-family: 'Courier New', Courier, monospace; /* Punk-inspired font */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .container {
            border: 3px solid #ff0000; /* Neon green border */
            border-radius: 5px;
            padding: 20px;
            background-color: rgba(0, 0, 0, 0.7);
            width: 80%;
            max-width: 800px;
            text-align: center;
        }      

        video {
            width: 100%; /* Full width video */
            height: auto;
            border: 1px solid #ff0000; /* Border around the video */
        }

        h3 {
            margin-top: 20px;
            color: #ff0000; /* Red text for emphasis */
            font-size: 1.8em;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7); /* Shadow for a more rugged look */
        }
    </style>
</head>
<body>
    <div class="container">
        <video controls>
            <source src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/04/FadedEchoes.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <h3>Apocalyptic Video</h3>
    </div>
</body>
</html>
