<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        body {
            background: linear-gradient(135deg, #ff0066, #6600ff, #00ccff);
            background-size: 400% 400%;
            animation: gradient-animation 10s ease infinite;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animation for the background gradient */
        @keyframes gradient-animation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Video container styling with neon borders */
        .video-container {
            border: 3px solid #00ffcc;
            padding: 20px;
            background: rgba(0, 0, 0, 0.7); /* Dark background inside the container */
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
            width: 80%;
            max-width: 900px;
            text-align: center;
            border-radius: 10px;
        }

        /* Styling for video */
        video {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }

        /* Title styling */
        h3 {
            margin-top: 15px;
            font-size: 2rem;
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
            letter-spacing: 1px;
        }

        /* Additional styling for the body to give a vaporwave feel */
        .vaporwave {
            font-size: 2rem;
            color: #ffccff;
            text-align: center;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.7), 0 0 30px rgba(255, 0, 255, 0.5);
        }
        
        /* Cyberpunk neon border effect on the page title */
        h1 {
            color: #ff33cc;
            font-size: 3rem;
            text-shadow: 0 0 15px #ff33cc, 0 0 30px #ff33cc, 0 0 45px #ff33cc;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <h1>Vaporwave Video</h1>
        <video controls>
            <source src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/04/FadedEchoes.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <h3>Chillwave Dreams</h3>
    </div>
</body>
</html>
