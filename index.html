<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: #0f0c29;
            background: linear-gradient(to right, #0f0c29, #302b63, #24243e);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            padding: 20px;
            border: 2px solid #ff6ec7;
            box-shadow: 0 0 20px #ff6ec7;
        }
        h1 {
            font-size: 4em;
            color: #ff6ec7;
            margin: 0;
        }
        p {
            font-size: 1.5em;
        }
        .glitch {
            color: #00ffea;
            text-shadow: 2px 2px 0 #ff00f4, -2px -2px 0 #00ffea;
            animation: glitch 1s infinite;
        }
        @keyframes glitch {
            0% {
                text-shadow: 2px 2px 0 #ff00f4, -2px -2px 0 #00ffea;
            }
            20% {
                text-shadow: 2px -2px 0 #ff00f4, -2px 2px 0 #00ffea;
            }
            40% {
                text-shadow: -2px 2px 0 #ff00f4, 2px -2px 0 #00ffea;
            }
            60% {
                text-shadow: -2px -2px 0 #ff00f4, 2px 2px 0 #00ffea;
            }
            80% {
                text-shadow: 2px 2px 0 #ff00f4, -2px -2px 0 #00ffea;
            }
            100% {
                text-shadow: -2px -2px 0 #ff00f4, 2px 2px 0 #00ffea;
            }
        }
        .vaporwave-image {
            width: 100%;
            max-width: 400px;
            margin-top: 20px;
            border: 2px solid #ff6ec7;
        }
        a {
            color: #ff6ec7;
            text-decoration: none;
            font-size: 1.2em;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="glitch">404</h1>
        <p>Oops! This page is lost in the vaporwave universe.</p>
        <img src="https://i.imgur.com/V8IWu4E.png" alt="Vaporwave" class="vaporwave-image">
        <p><a href="/">Take me home</a></p>
    </div>
</body>
</html>
