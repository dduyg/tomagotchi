<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        body {
    margin: 0;
    padding: 0;
    background-color: #E6F1F5;
    font-family: 'Arial', sans-serif;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    text-align: center;
}

.container p {
    font-size: 24px;
    color: #000;
    margin: 10px 0;
    position: relative;
}

.container p::before {
    content: '⦿';
    font-size: 24px;
    position: absolute;
    left: -30px;
    top: 0;
    color: #000;
}
    </style>
</head>
<body>
    <div class="container">
        <p>PIANO ENTHUSIAST</p>
        <p>PLANT LOVER</p>
        <p>ANALOG-FILM WASTER</p>
        <p>RETRO PATTERNS SPOTTER</p>
        <p>AVID TRAVELER</p>
        <p>MUSIC NOMAD</p>
    </div>
</body>
</html>
