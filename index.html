<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markl Mono Typeface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: #f4f4f4;
            color: #222;
            text-align: center;
            padding: 40px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: left;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            border: 1px solid #000;
            padding: 10px;
            max-width: 300px;
        }

        .header div {
            margin-right: 10px;
        }

        .title {
            font-size: 48px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 40px;
        }

        .title span {
            background: #fff;
            border: 1px solid #000;
            padding: 5px;
        }

        .badge {
            font-size: 14px;
            font-weight: bold;
            background: #ff5722;
            color: #fff;
            border-radius: 50%;
            padding: 15px;
            display: inline-block;
            position: absolute;
            right: 20px;
            top: 20px;
        }

        .description {
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div>PART-NUMBER MRKL-V01-JLCTYP</div>
            <div>7 STYLE LIGHT → HEAVY</div>
        </div>

        <div class="title">
            <span>M</span>arkl <span>mono</span>
        </div>

        <div class="badge">V.1 MARKL MONO</div>

        <p class="description">
            Non-proportional typeface designed for optimal readability at small sizes. 
            With its clean & structured letterforms.
        </p>
    </div>

</body>
</html>
