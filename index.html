<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markl Mono Typeface</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="part-number">
                <p>PART-NUMBER MRKL-V01-JLCTYP</p>
                <p>7 STYLE <span class="light-heavy">LIGHT → HEAVY</span></p>
            </div>
            <div class="version-badge">V.1 MARKL MONO</div>
        </div>

        <div class="main-content">
            <div class="title">
                <span class="boxed">M</span>arkl
                <span class="special-o">o</span>no
            </div>
            <p class="subtitle">NEW-2025-MONO</p>
        </div>

        <p class="description">
            Non-proportional typeface designed for optimal readability at small sizes. 
            With its clean & structured letterforms.
        </p>
    </div>

</html>
