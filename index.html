<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monólisplay</title>
    <style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #fff;
    color: #000;
    font-family: 'Orbitron', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
    flex-direction: column;
}

.container {
    position: relative;
    width: 80%;
    max-width: 600px;
}

.title {
    font-size: 3rem;
    font-weight: 400;
    text-transform: lowercase;
    letter-spacing: 2px;
    border-bottom: 1px solid #000;
    display: inline-block;
    padding-bottom: 10px;
}

.footer {
    display: flex;
    justify-content: space-between;
    font-size: 0.9rem;
    margin-top: 20px;
    width: 100%;
}

.font-display, .version {
    font-weight: 400;
}
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">monólita</h1>
        <div class="footer">
            <span class="font-display">FONTE DISPLAY</span>
            <span class="version">V0.1</span>
        </div>
    </div>
</body>
</html>
