<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta http-equiv="X-UA-Compatible" content="IE=edge"/>
  <title>LiminalLoop</title>
  <link href="https://fonts.cdnfonts.com/css/pp-neue-montreal" rel="stylesheet"/>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --accent-color: yellow;
      --blue-color: #0000ff;
    }
    html {
      font-size: calc(100vw / 1512 * 10);
      overflow-x: hidden;
      scrollbar-color: var(--accent-color) transparent;
      scrollbar-width: thin;
    }
    body {
      font-family: 'PP Neue Montreal', sans-serif;
      font-weight: 700;
      font-size: 1.8rem;
      background-color: white;
      color: #000;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    h2 {
      font-size: clamp(2rem, 5vw, 6rem);
      line-height: 0.85;
      text-wrap: balance;
      text-transform: none;
      margin-bottom: 1rem;
      max-width: 100%;
    }

    ul {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.2rem;
    }
    li {
      font-size: 2rem;
      color: white;
      cursor: pointer;
      position: relative;
      z-index: 1;
    }
    li::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 100%;
      background-color: white;
      z-index: -1;
      transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    li:hover::after {
      width: 100%;
    }
    li:hover {
      color: black;
      mix-blend-mode: difference;
    }

    button {
      background: black;
      color: white;
      border: none;
      padding: 0.5rem 1rem;
      text-transform: uppercase;
    }

    /* === Header === */
    header {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 1rem;
      padding: 1rem 2rem;
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 10;
      mix-blend-mode: difference;
      color: white;
      text-transform: uppercase;
    }

    .logo {
      grid-column: 1 / 3;
      font-size: 2rem;
      display: flex;
      align-items: flex-start;
    }
    .logo span {
      background-color: var(--blue-color);
      padding: 0.2rem 0.5rem;
      color: white;
    }

    .nav-menu {
      grid-column: 4 / 10;
    }

    .cta {
      grid-column: 10 / 13;
      display: flex;
      justify-content: flex-end;
      font-size: 2rem;
    }

    /* === Main Content === */
    main {
      padding-top: 100px;
    }

    section {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 80px 0;
    }

    section:nth-of-type(even) {
      background: black;
      color: white;
    }

    .grid-cards-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.25rem;
      padding: 0.25rem 2rem;
      width: 100%;
      height: calc(100vh - 160px);
    }

    .grid-card {
      background-color: #f5f5f5;
      border-radius: 8px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
    }

    .grid-card:nth-child(5) {
      background-color: var(--accent-color);
      cursor: pointer;
    }

    .card-title {
      font-size: 2rem;
      text-transform: uppercase;
    }

    .card-number, .circle-container {
      position: absolute;
      top: 20px;
      right: 20px;
      font-size: 1.4rem;
      opacity: 0.7;
    }

    .circle-svg {
      width: 8px;
      height: 8px;
    }

    .card-content {
      margin-top: auto;
    }

    .small-text {
      font-size: 2rem;
      line-height: 1.4;
      color: #333;
      text-transform: uppercase;
    }

    .grid-card:nth-child(5) .small-text,
    .grid-card:nth-child(5) a {
      color: #000;
    }

    .grid-card:nth-child(5) a {
      text-decoration: none;
      border-bottom: 1px solid rgba(0, 0, 0, 0.3);
    }

    .grid-card:nth-child(5) a:hover {
      border-bottom-color: #000;
    }

    .minimalist-content {
      text-align: center;
      padding: 0 2rem;
    }

    .minimalist-content p {
      font-size: 2.2rem;
      max-width: 30ch;
      margin: 0 auto;
      color: inherit;
    }

    @media (max-width: 768px) {
      .grid-cards-container {
        grid-template-columns: 1fr;
        height: auto;
      }

      header {
        grid-template-columns: 1fr;
        grid-template-rows: repeat(3, auto);
        gap: 1rem;
      }

      .logo, .nav-menu, .cta {
        grid-column: 1;
      }

      .small-text {
        font-size: 1.6rem;
      }

      html {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="logo"><span>REDUCE</span></div>
    <nav class="nav-menu">
      <ul>
        <li>LISTEN</li>
        <li>SPACE</li>
        <li>SILENCE</li>
        <li>ESSENCE</li>
      </ul>
    </nav>
    <div class="cta"><span>OBSERVE+</span></div>
  </header>

  <main>
    <section>
      <div class="grid-cards-container">
        <!-- Sample grid card -->
        <div class="grid-card">
          <div class="card-title">SILENCE</div>
          <div class="card-number">01</div>
          <div class="card-content">
            <p class="small-text">THE SPACE BETWEEN THOUGHTS</p>
            <p class="small-text">IS WHERE CREATIVITY LIVES</p>
            <p class="small-text">FIND THE QUIET</p>
          </div>
        </div>
        <!-- Additional cards omitted for brevity... -->
        <div class="grid-card" id="middle-box">
          <div class="card-title">GRATITUDE</div>
          <div class="circle-container">
            <svg class="circle-svg" viewBox="0 0 8 8">
              <circle cx="4" cy="4" r="4" fill="black" />
            </svg>
          </div>
          <div class="card-content">
            <p class="small-text">WHEN WE ACKNOWLEDGE THOSE</p>
            <p class="small-text">WHO INSPIRE OUR WORK</p>
            <p class="small-text">THANK YOU <a href="https://codepen.io/jh3y" target="_blank">JHEY</a></p>
          </div>
        </div>
      </div>
    </section>

    <section>
      <div class="minimalist-content">
        <h2>Subtract.</h2>
        <p>Remove everything that isn't essential. What's left will shine.</p>
      </div>
    </section>
  </main>

  <script>
    const middleBox = document.getElementById('middle-box');
    const circleContainer = document.querySelector('.circle-container');
    const svg = document.querySelector('.circle-svg');

    middleBox.addEventListener('mouseenter', () => {
      middleBox.style.padding = '30px';
      svg.style.transform = 'scale(1.5)';
    });

    middleBox.addEventListener('mouseleave', () => {
      middleBox.style.padding = '';
      svg.style.transform = 'scale(1)';
    });
  </script>
</body>
</html>
