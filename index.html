<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🕶Loop</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap');
        body {
            font-family: 'Orbitron', sans-serif;
            background-color: #ffffff;
            color: #000000;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .title {
            font-size: 4rem;
            font-weight: normal;
            text-transform: lowercase;
            letter-spacing: 2px;
        }
        footer {
            position: absolute;
            bottom: 15vh;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 750px;
            border-top: 1px solid black;
            padding-top: 10px;
        }
        footer span {
            text-transform: uppercase;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="title">MONÓLITA</div>
    
    <footer>
        <span>// no added sugar</span>
        <span>V0.1</span>
    </footer>
</body>
</html>
