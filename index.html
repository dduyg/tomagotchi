<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🗝Loop</title>
    <style>
        body {
            font-family: 'Playfair Display', serif;
            background-color: #f9f8f3;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        
        header {
            display: flex;
            justify-content: space-between;
            padding: 20px;
            font-size: 14px;
            color: #111;
        }
        
        .title {
            font-size: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 50px 0;
        }
        .rose {
            display: inline-block;
            position: relative;
        }
        .rose img {
            height: 120px;
            position: absolute;
            top: -50px;
        }
        
        .sub-title {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            border: 2px solid black;
            padding: 10px 20px;
            width: fit-content;
            margin: auto;
            border-radius: 50px;
        }
        .symbols {
            font-size: 40px;
            margin: 0 20px;
        }
        
        @media (max-width: 768px) {
            .title {font-size: 55px;}
        }
    </style>
</head>
<body>
    <header>
        <span><b>Symbolizing</b></span>
        <span>Sad Love</span>
        <span><b>Stories</b></span>
    </header>

    <main>
        <h1 class="title">
            Kilt<span class="rose">
                <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/BLOBs/blob-16.gif" alt="🌹">
            </span>ier
        </h1>
        <div class="sub-title">
            <div class="symbols">✺✷</div>
            <span>FINAL STRETCH</span>
            <div class="symbols">✷✺</div>
        </div>
    </main>
</body>
</html>
