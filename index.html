<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leeya - Data & Coding</title>
    <style>
        /* General Reset */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            color: #fff;
            background: linear-gradient(135deg, #50c9c3, #96deda);
            height: 100%;
            overflow-x: hidden;
        }

        /* Seapunk Theme Elements */
        body {
            background: radial-gradient(circle, #96f6ff 0%, #30b6c9 50%, #1e3a5f 100%);
            animation: moveBg 15s linear infinite;
        }

        @keyframes moveBg {
            0% { background-position: 0 0; }
            100% { background-position: 1000px 1000px; }
        }

        h1, h2 {
            text-align: center;
            margin: 0;
        }

        h1 {
            font-size: 3.5rem;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 30px #50e5ff;
        }

        h2 {
            font-size: 1.5rem;
            color: #d2f7ff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
        }

        /* Main Container */
        .container {
            text-align: center;
            padding: 20px;
            margin-top: 15vh;
        }

        /* Seapunk Bubble Effect */
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5);
            animation: float 10s infinite ease-in-out;
        }

        @keyframes float {
            0% { transform: translateY(100vh); opacity: 1; }
            100% { transform: translateY(-10vh); opacity: 0; }
        }

        /* Randomly Placed Bubbles */
        .bubble:nth-child(1) {
            width: 80px;
            height: 80px;
            left: 10%;
            animation-duration: 12s;
        }
        .bubble:nth-child(2) {
            width: 50px;
            height: 50px;
            left: 30%;
            animation-duration: 8s;
        }
        .bubble:nth-child(3) {
            width: 100px;
            height: 100px;
            left: 50%;
            animation-duration: 14s;
        }
        .bubble:nth-child(4) {
            width: 60px;
            height: 60px;
            left: 70%;
            animation-duration: 9s;
        }
        .bubble:nth-child(5) {
            width: 40px;
            height: 40px;
            left: 90%;
            animation-duration: 7s;
        }

        /* Buttons for Interaction */
        .buttons {
            margin-top: 30px;
        }

        .buttons a {
            display: inline-block;
            margin: 10px;
            padding: 15px 30px;
            font-size: 1rem;
            color: #fff;
            text-decoration: none;
            border: 2px solid #50e5ff;
            border-radius: 30px;
            transition: all 0.3s ease;
            background: transparent;
        }

        .buttons a:hover {
            background: #50e5ff;
            color: #00384d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Leeya's World</h1>
        <h2>Data Enthusiast & Coding Explorer</h2>
        <div class="buttons">
            <a href="#about">Learn More</a>
            <a href="#contact">Get in Touch</a>
        </div>
    </div>

    <!-- Bubble Decorations -->
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
</body>
</html>
