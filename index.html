<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 Not Found</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@700&display=swap');

    body {
      margin: 0;
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(135deg, #ff00cc 0%, #3333ff 100%);
      color: #ffffff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
      text-align: center;
    }

    .logo {
      font-family: 'Press Start 2P', cursive;
      font-size: 2.5rem;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #ff00cc;
      margin-bottom: 20px;
      animation: glitch 1s infinite;
    }

    @keyframes glitch {
      0% { transform: translate(0); }
      20% { transform: translate(-2px, 2px); }
      40% { transform: translate(2px, -2px); }
      60% { transform: translate(-1px, 1px); }
      80% { transform: translate(1px, -1px); }
      100% { transform: translate(0); }
    }

    h1 {
      font-size: 5rem;
      margin: 0;
      color: #ffffff;
      text-shadow: 0 0 5px #ff00cc, 0 0 15px #00ffff;
    }

    p {
      font-size: 1.2rem;
      margin: 20px 0;
      color: #e0e0ff;
    }

    a {
      color: #00ffff;
      font-weight: bold;
      text-decoration: none;
      border: 2px solid #00ffff;
      padding: 10px 20px;
      border-radius: 8px;
      transition: background 0.3s, color 0.3s;
    }

    a:hover {
      background: #00ffff;
      color: #000000;
    }
  </style>
</head>
<body>
  <div class="logo">CYBERWAVE404</div>
  <h1>404</h1>
  <p>Looks like you've slipped into the datastream void.</p>
  <a href="/">Return to Reality (Home)</a>
</body>
</html>
