<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Scrolling Images Animation Example</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background-color: #f0f0f0;
    }
    main {
      display: flex;
      overflow: hidden;
      width: 80vw; /* Adjust the width of the container */
      height: 300px; /* Fixed height for the images */
      background: #333;
    }
    main img {
      height: 100%;
      object-fit: cover;
      border: 2px solid white;
      box-sizing: border-box;
      transition: opacity 0.2s;
    }
    main:hover img {
      opacity: 0.5;
    }
    main img:hover {
      opacity: 1;
    }
    main .single-row {
      animation: scroll-images 20s infinite linear; /* Set the scrolling animation */
      display: flex;
      gap: 0;
    }
    main .single-row:hover {
      animation-play-state: paused; /* Pause the animation on hover */
    }
    /* Animation Keyframes for horizontal scrolling */
    @keyframes scroll-images {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-100%);
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="single-row">
      <a href="#"><img src="https://picsum.photos/300/300?random=1" alt="Image 1"></a>
      <a href="#"><img src="https://picsum.photos/300/300?random=2" alt="Image 2"></a>
      <a href="#"><img src="https://picsum.photos/300/300?random=3" alt="Image 3"></a>
      <a href="#"><img src="https://picsum.photos/300/300?random=4" alt="Image 4"></a>
      <a href="#"><img src="https://picsum.photos/300/300?random=5" alt="Image 5"></a>
      <a href="#"><img src="https://picsum.photos/300/300?random=6" alt="Image 6"></a>
      <a href="#"><img src="https://picsum.photos/300/300?random=7" alt="Image 7"></a>
      <a href="#"><img src="https://picsum.photos/300/300?random=8" alt="Image 8"></a>
    </div>
  </main>

  <script>
    // Clone the row to create the seamless scrolling effect
    const row = document.querySelector(".single-row");
    row.innerHTML = row.innerHTML + row.innerHTML; // Duplicate the images in the row
  </script>
</body>
</html>
