<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🧫Loop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f8f8;
            text-align: center;
        }

        .header {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
        }
        .header span {
            color: green;
            font-size: 28px;
        }
        .sub-text {
            color: gray;
            font-style: italic;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 20px 0;
        }
        .gallery img {
            width: 200px;
            height: auto;
            margin: 10px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1);
        }

        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #777;
        }

        .like-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }
        .like-button.liked {
            background-color: red;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="header">
        Refraction <span>*</span> <span style="color: blue;">(Shape)(Color)</span>
    </div>
    <p class="sub-text">--- Some test exercises for form and color ---</p>

    <div class="gallery">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="🔘">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="🔘">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="🔘">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="🔘">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="🔘">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="🔘">
    </div>

    <p class="footer">Refraction* (TEST) - Shape(Color)</p>

    <!-- Like Button -->
    <button class="like-button" onclick="toggleLike()">👍</button>

    <script>
        function toggleLike() {
            let button = document.querySelector('.like-button');
            button.classList.toggle('liked');
        }
    </script>
</body>
</html>
