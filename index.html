<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <style>
.sidemenu__nav {
  position: relative;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

.sidemenu__nav > ul {
  list-style: none;
  margin: 0;
  padding: 0;
}

.sidemenu__nav > ul li {
  display: block;
  font-family: var(--font-serif);
  font-size: 8.75rem;
  font-weight: 400;
  line-height: 1;
  letter-spacing: -0.1em;
  text-transform: uppercase;
  margin: -0.24em 0;
  padding-right: 1.1em;
  overflow: hidden;
}

.sidemenu__nav > ul a {
  outline: 0;
  text-decoration: none;
  touch-action: manipulation;
  display: block;
}

.sidemenu__nav > ul a > .holder {
  position: relative;
  transform-origin: 0 0;
}

.sidemenu__nav > ul a > .holder,
.sidemenu__nav > ul a > .holder > svg {
  transition: transform 1s cubic-bezier(0.165, 0.875, 0.02, 1);
}

.sidemenu__nav > ul a > .holder > svg {
  position: absolute;
  top: 20%;
  left: 0;
  height: 60%;
  transform: translateX(-120%);
}

.sidemenu__nav > ul a:hover > .holder {
  transform: translateX(1em);
}

.sidemenu__nav > ul a:hover > .holder > svg {
  transform: translateX(-100%);
}
  </style>
</head>
<body>
<nav class="sidemenu__nav">
  <ul>
    <li>
      <a href="#home" aria-label="Home">
        <div class="holder">
          <svg viewBox="0 0 542 62">
            <path d="M510.2 61.1l-2.1-2.2 27.3-26.4H.7v-3h534.8L508.1 3.1l2.1-2.2L541.3 31l-31.1 30.1z"></path>
          </svg>
          Home
        </div>
      </a>
    </li>
    <li>
      <a href="#badass" aria-label="Badass">
        <div class="holder">
          <svg viewBox="0 0 542 62">
            <path d="M510.2 61.1l-2.1-2.2 27.3-26.4H.7v-3h534.8L508.1 3.1l2.1-2.2L541.3 31l-31.1 30.1z"></path>
          </svg>
          Badass
        </div>
      </a>
    </li>
    <li>
      <a href="#photo" aria-label="photo">
        <div class="holder">
          <svg viewBox="0 0 542 62">
            <path d="M510.2 61.1l-2.1-2.2 27.3-26.4H.7v-3h534.8L508.1 3.1l2.1-2.2L541.3 31l-31.1 30.1z"></path>
          </svg>
          photo
        </div>
      </a>
    </li>
    <li>
      <a href="#film" aria-label="film">
        <div class="holder">
          <svg viewBox="0 0 542 62">
            <path d="M510.2 61.1l-2.1-2.2 27.3-26.4H.7v-3h534.8L508.1 3.1l2.1-2.2L541.3 31l-31.1 30.1z"></path>
          </svg>
          film
        </div>
      </a>
    </li>
  </ul>
</nav>
</body>
</html>
