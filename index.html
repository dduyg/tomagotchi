<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Work Page</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom, #E8E8E8, #C7F6C2, #E8E8E8); /* Gradient effect */
            background-repeat: no-repeat;
            color: #333;
            min-height: 100vh;
            line-height: 1.6;
            padding: 20px;
        }

        /* Page Layout */
        .container {
            max-width: 800px;
            margin: 0 auto;
            text-align: left;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
        }

        .menu-icon {
            font-size: 1.2rem;
            letter-spacing: 5px;
        }

        /* Work Section */
        .work-title {
            font-size: 2.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #444;
        }

        .work-list {
            list-style: none;
            margin-top: 20px;
        }

        .work-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #ddd;
            padding: 10px 0;
            font-size: 1.2rem;
        }

        .work-item a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            transition: color 0.3s;
        }

        .work-item a:hover {
            color: #888;
        }

        /* Footer */
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 0.9rem;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div class="logo">S</div>
            <div class="menu-icon">•••</div>
        </div>

        <!-- Work Section -->
        <h1 class="work-title">WORK</h1>
        <ul class="work-list">
            <li class="work-item">
                <a href="#">sharlee</a>
                <span>Branding</span>
            </li>
            <li class="work-item">
                <a href="#">act responsable</a>
                <span>Web Development</span>
            </li>
            <li class="work-item">
                <a href="#">dua lipa</a>
                <span>Portrait</span>
            </li>
            <li class="work-item">
                <a href="#">cocolyze</a>
                <span>UX/UI Design</span>
            </li>
            <li class="work-item">
                <a href="#">les indécis</a>
                <span>Branding</span>
            </li>
            <li class="work-item">
                <a href="#">game of the goose</a>
                <span>Game Design</span>
            </li>
        </ul>

        <!-- Footer -->
        <div class="footer">
            <p>itssharl.ee</p>
        </div>
    </div>
</body>
</html>
