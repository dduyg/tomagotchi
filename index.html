<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal Loop</title>
  <style>
    body {
      font-family: "Quicksand", sans-serif;
      margin: 0;
      padding: 30% 5% 40%;
      background-color: LemonChiffon;
      color: black;
    }
    main {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 40px;
    }
    section {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 250px;
      height: 125px;
      border: 1.5px ridge;
    }

    /* 1. Distorted Vertical Wave */
    .wave {
      animation: wave 1s infinite ease-in-out;
    }
    @keyframes wave {
      0%, 100% { transform: scaleY(1); }
      25% { transform: scaleY(1.2); }
      50% { transform: scaleY(0.8); }
    }

    /* 4. Split Displacement */
    .split {
      position: relative;
      overflow: hidden;
      color: LemonChiffon;
    }
    .split::before,
    .split::after {
      content: 'monochrome';
      position: absolute;
      top: 0;
      left: 0;
      color: black;
    }
    .split::before {
      clip-path: inset(0 0 50% 0);
      transform: translateX(-2px);
      animation: slice 1.2s infinite;
    }
    .split::after {
      clip-path: inset(50% 0 0 0);
      transform: translateX(2px);
      animation: slice 1.2s infinite reverse;
    }
    @keyframes slice {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(5px); }
    }

    /* 10. Vertical Distortion */
    .vertical-distort {
      animation: vertical-distort 1s infinite ease-in-out;
    }
    @keyframes vertical-distort {
      0%, 100% { transform: scaleY(1); }
      25% { transform: scaleY(1.5); }
      50% { transform: scaleY(0.5); }
      75% { transform: scaleY(1.2); }
    } 
  </style>
</head>
<body>
  <main>
    <section>
      <h2 class="wave">echochamber</h2>
    </section>
    <section>
      <h2 class="split">monochrome</h2>
    </section>
    <section>
      <h2 class="vertical-distort">iridescent</h2>
    </section>
  </main>
</body>
</html>
