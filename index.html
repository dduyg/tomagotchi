<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Circle ❍</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
      color: black;
    }

    .circle {
      width: 36px;
      height: 35px;
      border-radius: 50%;
      border: 4px solid;
      box-shadow: 3px 0 0 2px currentColor; /* Simulates thicker right border */
    }

    h1 {
      font-size: 2rem;
      text-align: center;
      margin: 50px 0;
    }
  </style>
</head>
<body>
  <div class="circle"></div>

  <h1>❍</h1>
</body>
</html>
