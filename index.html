<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>LiminalLoop</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #2f1c53;
            color: #f8f8f8;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            flex-direction: column;
            overflow: hidden;
        }

        h1 {
            font-size: 100px;
            font-weight: bold;
            text-shadow: 3px 3px 5px rgba(0, 0, 0, 0.7);
            margin: 0;
        }
        p {
            font-size: 24px;
            color: #b3b3b3;
            margin-top: 10px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 3px rgba(0, 0, 0, 0.7);
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/morphology.jpg') no-repeat center center fixed;
            background-size: cover;
            filter: blur(5px);
            z-index: -1;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <h1>Morphology</h1>
    <p>—the study of the internal structure of words and forms a core part of linguistic study today. The term morphology is Greek and is a makeup of morph- meaning 'shape, form', and -ology which means 'the study of something'.</p>
</body>
</html>
