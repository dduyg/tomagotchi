<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiminalLoop</title>
  <style>
    :root {
      --svg-arrow: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 542 62"><path d="M510.2 61.1l-2.1-2.2 27.3-26.4H.7v-3h534.8L508.1 3.1l2.1-2.2L541.3 31l-31.1 30.1z"></path></svg>');
    }

    body {
      margin: 0;
      padding: 5em 1em;
      background: #c5c6f9;
      color: black;
      -webkit-tap-highlight-color: transparent;
    }

    nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .item {
      font-family: var(--font-serif);
      font-size: 3.5rem;
      line-height: 1;
      letter-spacing: -0.1em;
      text-transform: uppercase;
      margin: -0.24em 0;
      padding-right: 1.1em;
      overflow: hidden;
      text-decoration: none;
      color: black;
      display: flex;
      align-items: center;
      position: relative;
      transition: transform 1s cubic-bezier(0.165, 0.875, 0.02, 1);
    }

    .item::before {
      content: '';
      display: block;
      position: absolute;
      top: 20%;
      left: 0;
      height: 60%;
      width: 60px; /* Adjust size as needed */
      background: var(--svg-arrow) no-repeat center;
      background-size: contain;
      transform: translateX(-120%);
      transition: transform 1s cubic-bezier(0.165, 0.875, 0.02, 1);
    }

    .item:hover {
      transform: translateX(1em);
    }

    .item:hover::before {
      transform: translateX(-100%);
    }
  </style>
</head>
<body>
  <nav>
    <a href="#home" class="item">Home</a>
    <a href="#badass" class="item">Badass</a>
    <a href="#photo" class="item">Photo</a>
    <a href="#film" class="item">Film</a>
    <a href="#blog" class="item">Blog</a>
    <a href="#contact" class="item">Contact</a>
  </nav>
</body>
</html>
