<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Seapunk Vibes</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Monoton&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(145deg, #00ffd0, #b2aaff, #00f7ff);
      background-size: 300% 300%;
      animation: waveflow 25s ease infinite;
      font-family: 'Monoton', cursive;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      color: #ffffff;
    }

    @keyframes waveflow {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .video-frame {
      max-width: 850px;
      width: 90%;
      background: rgba(255, 255, 255, 0.1);
      border: 3px dashed #00ffe7;
      border-radius: 24px;
      padding: 30px;
      box-shadow: 0 0 20px #00ffe7, 0 0 60px #b2aaff;
      backdrop-filter: blur(10px);
    }

    h2 {
      text-align: center;
      font-size: 30px;
      margin-bottom: 20px;
      color: #ffffff;
      text-shadow: 2px 2px #00f0ff;
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%; /* 16:9 ratio */
      height: 0;
      border-radius: 16px;
      overflow: hidden;
      border: 2px solid #00f7ff;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>

  <div class="video-frame">
    <h2>Seapunk Splash Zone</h2>
    <div class="video-wrapper">
      <iframe 
        src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
        title="Seapunk Video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
      </iframe>
    </div>
  </div>

</body>
</html>
