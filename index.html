<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body, html {
    height: 100%;
    font-family: Arial, sans-serif;
}

.hero {
    background-image: url('https://media0.giphy.com/media/Y0Q0sOrQwKdMj74244/giphy.gif');
    background-size: cover;
    background-position: center;
    height: 40vh;
    display: flex;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
    position: relative;
}

.hero-content {
    max-width: 80%;
    margin: 0 auto;
}

.hero h1 {
    font-size: 3rem;
    margin-bottom: 1rem;
}

.hero p {
    font-size: 1.25rem;
    margin-bottom: 2rem;
}

.cta-button {
    background-color: #ff4500; /* Replace with your desired color */
    color: white;
    padding: 0.75rem 1.5rem;
    text-decoration: none;
    font-size: 1.25rem;
    border-radius: 5px;
    transition: background-color 0.3s;
}

.cta-button:hover {
    background-color: #e03e00; /* Replace with your desired hover color */
}
    </style>
</head>
<body>
    <section class="hero">
        <div class="hero-content">
            <h1>We help businesses extract beauty from noise.</h1>
            <p>Orchidea® is a full-service branding agency working with companies in the beauty, fashion, and consumer goods industries.</p>
            <a href="#contact" class="cta-button">Let's Talk</a>
        </div>
    </section>
</body>
</html>
