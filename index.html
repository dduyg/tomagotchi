<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 - Page Not Found</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

  /* Colors */
  :root {
    --neon-pink: #ff3c96;
    --neon-cyan: #00fff7;
    --neon-purple: #ae00ff;
    --bg-dark: #0a0a23;
    --glitch-red: #ff005c;
    --glitch-blue: #00eaff;
  }

  /* Reset */
  * {
    margin: 0; padding: 0; box-sizing: border-box;
  }

  body {
    background: var(--bg-dark);
    color: var(--neon-cyan);
    font-family: 'VT323', monospace, monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    user-select: none;
  }

  h1 {
    font-size: 10vw;
    position: relative;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    animation: glitch 2s infinite;
  }

  /* Glitch text effect */
  h1::before, h1::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    right: 0;
    opacity: 0.8;
  }

  h1::before {
    animation: glitchTop 2s infinite;
    clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
    color: var(--glitch-red);
    z-index: -1;
  }

  h1::after {
    animation: glitchBottom 2s infinite;
    clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
    color: var(--glitch-blue);
    z-index: -1;
  }

  @keyframes glitch {
    0%, 100% { text-shadow: 2px 0 var(--neon-pink), -2px 0 var(--neon-cyan); }
    50% { text-shadow: 5px 0 var(--neon-purple), -5px 0 var(--neon-pink); }
  }

  @keyframes glitchTop {
    0%, 100% { transform: translate(0); }
    20% { transform: translate(-2px, -2px); }
    40% { transform: translate(-2px, 0); }
    60% { transform: translate(2px, -2px); }
    80% { transform: translate(2px, 0); }
  }

  @keyframes glitchBottom {
    0%, 100% { transform: translate(0); }
    20% { transform: translate(2px, 2px); }
    40% { transform: translate(2px, 0); }
    60% { transform: translate(-2px, 2px); }
    80% { transform: translate(-2px, 0); }
  }

  p {
    margin-top: 1rem;
    font-size: 1.5rem;
    max-width: 600px;
    text-align: center;
    color: var(--neon-pink);
    text-shadow: 0 0 8px var(--neon-pink);
    line-height: 1.4;
  }

  a.home-link {
    margin-top: 2rem;
    font-size: 1.3rem;
    color: var(--neon-cyan);
    text-decoration: none;
    border: 2px solid var(--neon-cyan);
    padding: 0.5rem 1.5rem;
    border-radius: 0.3rem;
    transition: all 0.3s ease;
    box-shadow: 0 0 8px var(--neon-cyan);
  }

  a.home-link:hover {
    background-color: var(--neon-cyan);
    color: var(--bg-dark);
    box-shadow: 0 0 15px var(--neon-cyan);
  }

  /* Glitch background scanlines */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(255, 255, 255, 0.03),
      rgba(255, 255, 255, 0.03) 1px,
      transparent 2px,
      transparent 4px
    );
    z-index: 10;
  }
</style>
</head>
<body>
  <h1 data-text="404 ERROR">404 ERROR</h1>
  <p>Oops... looks like this digital wave crashed into an unknown glitch.<br>
  The page you’re surfing on is lost in the neon depths.</p>
  <a href="/" class="home-link">Surf Back Home</a>
</body>
</html>
