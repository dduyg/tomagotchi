<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Source Sans Pro', sans-serif;
            background: #DAD5D1;
        }
        .container {
            text-align: center;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            width: 100%;
        }
        .container span {
            text-transform: uppercase;
            display: block;
        }
        .maintext {
color: #0F693E;
font-size: 60px;    
  font-weight: 700;    
  letter-spacing: 8px;    
  margin-bottom: 20px;    
  background: #DAD5D1;    
  position: relative;    
  animation: text 4s 1;    
}    
.subtext {    
  font-size: 30px;    
  color: #0F693E;
}    
    
@keyframes text {    
  0%{    
    color: #DAD5D1;    
    margin-bottom: -40px;    
  }    
  30%{    
    letter-spacing: 25px;    
    margin-bottom: -40px;    
  }    
  85%{    
    letter-spacing: 8px;    
    margin-bottom: -40px;    
  }    
}    
    </style>    
</head>    
<body>    
  <div class="container">    
    <span class="maintext">Moon Ga-young</span>    
    <span class="subtext">Welcomes You</span>    
  </div>     
</body>    
</html>
