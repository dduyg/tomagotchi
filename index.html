<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>👝LiminalLoop</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fad0c4, #fbc2eb, #a18cd1, #fbc2eb);
      animation: gradient 10s infinite alternate;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    @keyframes gradient {
      0% { background-position: 0% 50%; }
      100% { background-position: 100% 50%; }
    }

    .container {
      width: 80%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
      gap: 20px;
    }

    .link-button {
      text-decoration: none;
      color: #fff;
      font-size: 1.4rem;
      font-weight: bold;
      padding: 10px;
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
      transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
    }
    .link-button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
    }
    .link-button:active {
      transform: translateY(2px);
    }

    .badge {
      position: fixed;
      bottom: 0;
      right: 0;
      width: 80px;
      height: 80px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="#link1" class="link-button">웃</a>
    <a href="#link2" class="link-button">유</a>
    <a href="#link3" class="link-button">♅</a>
    <a href="#link4" class="link-button">♄</a>
    <a href="#link5" class="link-button">♃</a>
    <a href="#link6" class="link-button">웃</a>
    <a href="#link7" class="link-button">유</a>
    <a href="#link8" class="link-button">♅</a>
  </div>

  <img src="https://media4.giphy.com/media/3o752bwmVR1cXw8cwM/giphy.gif" class="badge">
</body>
</html>
