<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JoliciaType</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inconsolata:wght@400;700&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inconsolata', monospace;
            background-color: black;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            width: 80%;
            max-width: 800px;
            border: 2px solid white;
            padding: 20px;
        }

        h1, h2, h3 {
            font-weight: bold;
        }

        .glitch {
            font-size: 2rem;
            line-height: 1.5;
            white-space: pre-wrap;
            border-bottom: 1px solid white;
            padding-bottom: 10px;
        }

        .footer {
            border-top: 1px solid white;
            padding-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 20px;
        }

        .button {
            display: inline-block;
            padding: 10px 20px;
            border: 2px solid white;
            text-decoration: none;
            color: white;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="glitch">
            {JoliciaType} <br>
            @markl0 mono <br>
            (v.1) & weight
        </div>

        <div class="grid">
            <div>7 ▶</div>
            <div>QR CODE</div>
        </div>

        <div class="footer">
            JoliciaType - All rights reserved.
        </div>
    </div>
</body>
</html>
