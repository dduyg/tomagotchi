<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

.glitch {
  position: relative;
  font-size: 4rem;
  font-weight: bold;
  color: black;
  text-transform: uppercase;
  overflow: hidden;
}

.glitch::before,
.glitch::after {
  content: '/dygg';
  position: absolute;
  top: 0;
  left: 0;
  color: black;
  background: transparent;
  clip-path: inset(0 0 50% 0);
}

.glitch::before {
  z-index: -1;
  transform: translate(2px, 0);
  opacity: 0.8;
  animation: glitch 2s infinite;
}

.glitch::after {
  z-index: -1;
  transform: translate(-2px, 0);
  opacity: 0.5;
  animation: glitch 2s infinite reverse;
}

@keyframes glitch {
  0% {
    clip-path: inset(10% 0 50% 0);
    transform: translate(2px, 0);
  }
  50% {
    clip-path: inset(30% 0 20% 0);
    transform: translate(-2px, 0);
  }
  100% {
    clip-path: inset(10% 0 50% 0);
    transform: translate(2px, 0);
  }
}

.glitch::after:hover {
    transition: opacity 0.3s linear;
}
    </style>
</head>
<body>
    <h2 class="glitch">/dygg</h2>
</body>
</html>
