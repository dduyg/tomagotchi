<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Liminal🪢Loop</title>
    <style>
        @font-face {
            font-family: 'GoodGlyphs No 1';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/GoodGlyphs-No1.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'Canela';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Canela-Thin.woff2') format('woff2');
            font-weight: 100;
            font-style: normal;
        }
        @font-face {
            font-family: 'Canela';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Canela-ThinItalic.woff2') format('woff2');
            font-weight: 100;
            font-style: italic;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }

        html, body { height: 100%; }

        body {
            font-family: 'Canela', serif;
            color: #ede3e0;
            padding-top: 70px;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        /* Background Layers for Crossfade Effect */
        body::before, body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-attachment: fixed;
            transition: opacity 3s ease-in-out;
        }

        /* First background */
        body::before {
            background-image: linear-gradient(#000, #8a93a8);
            animation: fadeLoop 15s infinite linear;
        }

        /* Second background */
        body::after {
            background-image: linear-gradient(#000, #a0a2ca);
            animation: fadeLoopReverse 15s infinite linear;
            opacity: 0;
        }

        /* Animation Keyframes */
        @keyframes fadeLoop {
            0%, 100% { opacity: 1; }
            20% { opacity: 1; }
            40% { opacity: 0; }
            60% { opacity: 0; }
            80% { opacity: 1; }
        }

        @keyframes fadeLoopReverse {
            0%, 100% { opacity: 0; }
            20% { opacity: 0; }
            40% { opacity: 1; }
            60% { opacity: 1; }
            80% { opacity: 0; }
        }

        header {
            border-bottom: 1px solid #fff;
            padding: 100px 20px;
            position: relative;
            z-index: 2;
        }

        .title {
            max-width: 100%;
            letter-spacing: -2px;
            font-size: 72px;
            line-height: 100%;
        }

        a { 
            color: inherit;
            text-decoration: none;
            margin-left: 100px;
        }

        .symbol {
            margin-right: 20px;
            font-family: 'GoodGlyphs No 1', sans-serif;
            line-height: 72%;
        }

        @media screen and (max-width: 767px) { 
            header {
                padding-top: 40px;
                padding-bottom: 40px;
            }
            .title {
                font-size: 48px;
                margin-bottom: 30%;
            }
            a { margin-left: 40px; }
        }
    </style>
</head>
<body>  
    <header>
        <div class="title">
            We help businesses extract beauty from noise. Synthesis<sup>®</sup> is a full-service data agency working with companies in the<br/>‍     
            <span class="superspan"> </span>
            <a href="#🚪"><span class="symbol">c</span>beauty<br/>‍</a>
            <span class="superspan _2"> </span>
            <a href="#🚪"><span class="symbol">C</span>fashion<br/>‍</a>
            <span class="superspan _3"> </span>
            <a href="#🚪"><span class="symbol">c </span> consumer goods</a>
            <br/>industries.<br/>
        </div>
    </header>
</body>
</html>
