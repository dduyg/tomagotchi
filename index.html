<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🎮Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=Ruda:wght@535&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@505&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Jura:wght@520&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body, html {
            font-family: "Archivo Narrow", sans-serif;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #5a5a5a; /* from Semantic UI_/techfolios  */
            background: rgba(255, 255, 255, 0.1);
            padding: 10%;
            border-radius: 10px;
        }

        h1 {
            font-size: 2.5em;
        }
        p {
            font-size: 1.2em;
        }
        .btn {
            display: inline-block;
            margin-top: 15px;
            padding: 10px 20px;
            background: #ff6600;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        .btn:hover {
            background: #ff4500;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video autoplay loop muted playsinline>
            <source src="wouldyousong.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <div class="content">
        <h1>Welcome to My Website</h1>
        <p>Aşk şarabı içmesi hoştur, şaşkın<br>
           Şarap peşinden koşmak boştur, şaşkın<br>
           Bir o yana bir bu yana yatma, şaşkın<br>
           Tenhalarda menhalarda bitmiş aşkınere
        </p>
        <a href="#🎞" class="btn">Learn More</a>
    </div>
</body>
</html>
