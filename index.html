<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(45deg, #ff77ff, #00bfff);
            font-family: 'Arial', sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
            flex-direction: column;
            background-size: 400% 400%;
            animation: gradientAnimation 10s ease infinite;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 10em;
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 30px rgba(255, 255, 255, 0.8);
            animation: glow 1.5s ease-in-out infinite alternate;
        }

        h2 {
            font-size: 2em;
            font-weight: 300;
            color: #e0e0e0;
            margin-top: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.6);
        }

        .vaporwave-icon {
            margin-top: 40px;
            font-size: 3em;
            color: #ff77ff;
        }

        .button {
            margin-top: 50px;
            padding: 15px 30px;
            font-size: 1.2em;
            background-color: #00bfff;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: transform 0.2s;
        }

        .button:hover {
            transform: scale(1.1);
        }

        @keyframes glow {
            0% {
                text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 30px rgba(255, 255, 255, 0.8);
            }
            100% {
                text-shadow: 0 0 30px rgba(255, 255, 255, 1), 0 0 40px rgba(255, 255, 255, 1);
            }
        }
    </style>
</head>
<body>

    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p class="vaporwave-icon">🌴</p>
    <a href="/" class="button">Take Me Home</a>

</body>
</html>
