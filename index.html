<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            background: #2a2a2a;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            text-align: center;
        }
        .error-container {
            animation: neon 1.5s ease-in-out infinite alternate;
        }
        h1 {
            font-size: 5rem;
            margin-bottom: 0;
        }
        h2 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 2rem;
        }
        .links {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
        .link {
            text-decoration: none;
            color: #ff007f;
            font-size: 1.2rem;
            padding: 10px;
            transition: transform 0.3s ease-in-out;
        }
        .link:hover {
            transform: scale(1.2);
            color: #00ffff;
        }
        @keyframes neon {
            0% {
                text-shadow: 0 0 5px #ff007f, 0 0 10px #ff007f, 0 0 15px #ff007f, 0 0 20px #ff007f, 0 0 25px #ff007f;
            }
            100% {
                text-shadow: 0 0 5px #00ffff, 0 0 10px #00ffff, 0 0 15px #00ffff, 0 0 20px #00ffff, 0 0 25px #00ffff;
            }
        }
        .logo {
            margin-bottom: 1.5rem;
            width: 100px;
            height: auto;
        }
    </style>
</head>
<body>
    <!-- Logo Section -->
    <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" preserveaspectratio="xMidYMid meet" width="100" height="100">
        <!-- D-shaped logo -->
        <path fill="none" stroke="#ff007f" stroke-width="5" d="M10,20 Q40,10 60,40 Q80,70 40,90 Q10,80 10,50 Q30,30 10,20 Z"/>
    </svg>

    <div class="error-container">
        <h1>404</h1>
        <h2>Oops! The page you're looking for isn't here.</h2>
    </div>

    <!-- Links Section -->
    <div class="links">
        <a href="/" class="link">Home</a>
        <a href="/about" class="link">About</a>
        <a href="/contact" class="link">Contact</a>
        <a href="/faq" class="link">FAQ</a>
    </div>
</body>
</html>
