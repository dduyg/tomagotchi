<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>LiminalLoop</title>
  <style>
@font-face {
  src: url("https://fonts.cdnfonts.com/css/pp-neue-montreal") format("woff2");
  font-family: "PP Neue Montreal", sans-serif;
  font-weight: 400;
}

*, *:before, *:after { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: calc(100vw / 1512 * 10); }
body {
  font-family: "PP Neue Montreal", sans-serif;
  font-weight: 500;
  font-size: 1.8rem;
  text-rendering: optimizeLegibility;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  background-color: black;
  color: white;
  position: relative;
  overflow: hidden;
}
canvas {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1; /* Behind content but still interactive */
}

/* dat.GUI styling */
.dg.ac {
  z-index: 1000 !important; /* Ensure GUI is on top */
}

/* Stats.js styling */
#stats {
  position: fixed !important;
  top: 0 !important;
  left: 0 !important;
  z-index: 1000 !important; /* Ensure stats is on top */
}

/* Background noise effect */
body::before {
  content: "";
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: transparent
    url("http://assets.iceable.com/img/noise-transparent.png") repeat 0 0;
  background-size: 300px 300px;
  -webkit-animation: noise-animation 0.3s steps(5) infinite;
          animation: noise-animation 0.3s steps(5) infinite;
  opacity: 0.05; /* Reduced opacity for subtlety */
  will-change: transform;
  z-index: 2; /* Above canvas but below content */
  pointer-events: none;
}

@-webkit-keyframes noise-animation {
  0% {
    transform: translate(0, 0);
  }

  10% {
    transform: translate(-2%, -3%);
  }

  20% {
    transform: translate(-4%, 2%);
  }

  30% {
    transform: translate(2%, -4%);
  }

  40% {
    transform: translate(-2%, 5%);
  }

  50% {
    transform: translate(-4%, 2%);
  }

  60% {
    transform: translate(3%, 0);
  }

  70% {
    transform: translate(0, 3%);
  }

  80% {
    transform: translate(-3%, 0);
  }

  90% {
    transform: translate(2%, 2%);
  }

  100% {
    transform: translate(1%, 0);
  }
}

@keyframes noise-animation {
  0% {
    transform: translate(0, 0);
  }

  10% {
    transform: translate(-2%, -3%);
  }

  20% {
    transform: translate(-4%, 2%);
  }

  30% {
    transform: translate(2%, -4%);
  }

  40% {
    transform: translate(-2%, 5%);
  }

  50% {
    transform: translate(-4%, 2%);
  }

  60% {
    transform: translate(3%, 0);
  }

  70% {
    transform: translate(0, 3%);
  }

  80% {
    transform: translate(-3%, 0);
  }

  90% {
    transform: translate(2%, 2%);
  }

  100% {
    transform: translate(1%, 0);
  }
}

img {
  max-width: 100%;
  height: auto;
  -o-object-fit: cover;
     object-fit: cover;
}

h1 {
  font-size: 18rem;
  font-weight: 700;
  color: white;
  letter-spacing: -0.05em;
  text-align: center;
  line-height: 0.85;
}

p {
  font-size: 2rem;
  line-height: 1.3;
  max-width: 46rem;
}

a {
  display: inline-block;
  color: white;
  text-decoration: none;
}

[data-hidden] {
  opacity: 0;
  filter: blur(15px);
}

[data-animation="text-reveal"] {
  display: block;
  overflow: hidden;
}

[data-animation="text-reveal"] > * {
  display: block;
  line-height: 1;
  transform: translateY(100%);
}

.header {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 10; /* Ensure header is above canvas and noise */
  padding: 1.6rem 3.2rem;
}
.header__nav {
  display: flex;
  justify-content: space-between;
}

.intro {
  position: relative;
  min-height: 100vh;
  overflow: hidden;
  z-index: 5; /* Above canvas */
}
.intro__text {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10; /* Ensure text is above everything */
  width: 100%;
  text-align: center;
}
.intro__title {
  padding: 0 3.2rem;
  line-height: 1;
}

.bottom-content {
  position: absolute;
  bottom: 3.2rem;
  width: 100%;
  padding: 0 3.2rem;
  display: flex;
  justify-content: center;
  z-index: 10; /* Ensure bottom content is above everything */
  text-align: center;
}

.bottom-text {
  font-size: 1.4rem;
  opacity: 0.8;
  letter-spacing: 0.05em;
}

/* Animation for text reveal */
@-webkit-keyframes revealText {
  0% {
    transform: translateY(100%);
  }
  100% {
    transform: translateY(0);
  }
}
@keyframes revealText {
  0% {
    transform: translateY(100%);
  }
  100% {
    transform: translateY(0);
  }
}

/* Apply animation to text elements */
.header__nav [data-animation="text-reveal"] > *,
.intro__title [data-animation="text-reveal"] > * {
  -webkit-animation: revealText 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards;
          animation: revealText 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards;
}

/* Stagger animation for header items */
.header__nav div:nth-child(1) [data-animation="text-reveal"] > * {
  -webkit-animation-delay: 0.2s;
          animation-delay: 0.2s;
}
.header__nav div:nth-child(2) [data-animation="text-reveal"] > * {
  -webkit-animation-delay: 0.3s;
          animation-delay: 0.3s;
}
.header__nav div:nth-child(3) [data-animation="text-reveal"] > * {
  -webkit-animation-delay: 0.4s;
          animation-delay: 0.4s;
}
.header__nav div:nth-child(4) [data-animation="text-reveal"] > * {
  -webkit-animation-delay: 0.5s;
          animation-delay: 0.5s;
}

/* Stagger animation for title */
.intro__title span:nth-child(1) [data-animation="text-reveal"] > * {
  -webkit-animation-delay: 0.7s;
          animation-delay: 0.7s;
}
.intro__title span:nth-child(2) [data-animation="text-reveal"] > * {
  -webkit-animation-delay: 0.8s;
          animation-delay: 0.8s;
}
.intro__title span:nth-child(3) [data-animation="text-reveal"] > * {
  -webkit-animation-delay: 0.9s;
          animation-delay: 0.9s;
}

/* Animation for bottom text */
.bottom-text {
  -webkit-animation: fadeIn 1.5s ease-out 1.2s forwards;
          animation: fadeIn 1.5s ease-out 1.2s forwards;
  opacity: 0;
}

@-webkit-keyframes fadeIn {
  0% {
    opacity: 0;
  }
  100% {
    opacity: 0.8;
  }
}

@keyframes fadeIn {
  0% {
    opacity: 0;
  }
  100% {
    opacity: 0.8;
  }
}

/* Media queries for responsiveness */
@media (max-width: 768px) {
  html {
    font-size: calc(100vw / 768 * 10);
  }

  h1 {
    font-size: 12rem;
  }

  .header__nav {
    flex-wrap: wrap;
    gap: 1rem;
  }

  .header__nav div {
    margin-right: 1rem;
  }
}

@media (max-width: 480px) {
  html {
    font-size: calc(100vw / 480 * 10);
  }

  h1 {
    font-size: 8rem;
  }

  .header {
    padding: 1rem;
  }

  .intro__title {
    padding: 0 1rem;
  }

  .bottom-content {
    bottom: 2rem;
  }
}
  </style>
</head>
<body>
<header class="header">
  <nav class="header__nav">
    <div data-animation="text-reveal">
      <a href="">Emptiness</a>
    </div>
    <div data-animation="text-reveal">
      <a href="">Stillness</a>
    </div>
    <div data-animation="text-reveal">
      <a href="">Surrender</a>
    </div>
    <div data-animation="text-reveal">
      <a href="">Becoming</a>
    </div>
  </nav>
</header>

<section class="intro">
  <div class="intro__text">
    <h1 class="intro__title">
      <span data-animation="text-reveal">
        <span>LISTEN</span>
      </span>
      <span data-animation="text-reveal">
        <span>TO THE</span>
      </span>
      <span data-animation="text-reveal">
        <span>NOTHING</span>
      </span>
    </h1>
  </div>
  <div class="bottom-content">
    <p class="bottom-text">What happens in the void between thoughts is where truth emerges</p>
  </div>
</section>

<script type="module">
import * as THREE from 'three';

const vertexShader = `
  varying vec2 vUv;
  void main() {
    vUv = uv;
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

const fragmentShader = `
  uniform sampler2D uTexture;
  uniform float uTime;
  uniform vec2 uResolution;
  uniform vec2 uRipplePos[10];
  uniform float uRippleIntensity[10];
  uniform float uRippleStartTime[10];
  uniform float uRippleCount;
  varying vec2 vUv;

  float ripple(vec2 uv, vec2 center, float time, float intensity) {
    float dist = distance(uv, center);
    float wave = sin(20.0 * dist - time * 6.0);
    float attenuation = 1.0 / (1.0 + 30.0 * dist * dist);
    return wave * attenuation * intensity;
  }

  void main() {
    vec2 uv = vUv;
    float rippleEffect = 0.0;

    for (int i = 0; i < 10; i++) {
      if (i >= int(uRippleCount)) break;
      float elapsed = uTime - uRippleStartTime[i];
      if (elapsed > 0.0 && elapsed < 1.5) {
        rippleEffect += ripple(uv, uRipplePos[i], elapsed, uRippleIntensity[i] * (1.0 - elapsed / 1.5));
      }
    }

    vec2 rippleUV = uv + vec2(rippleEffect, rippleEffect);
    vec4 color = texture2D(uTexture, rippleUV);
    gl_FragColor = color;
  }
`;

class RippleCanvas {
  constructor(container) {
    this.container = container;
    this.width = window.innerWidth;
    this.height = window.innerHeight;

    this.ripplesMax = 10;

    this.mouseThrottleTime = 0;

    this.ripples = [];
    this.timeStart = performance.now();

    this.init();
    this.addListeners();
    this.animate();
  }

  init() {
    this.renderer = new THREE.WebGLRenderer({ antialias: true });
    this.renderer.setSize(this.width, this.height);
    this.container.appendChild(this.renderer.domElement);

    this.scene = new THREE.Scene();

    this.camera = new THREE.OrthographicCamera(0, this.width, this.height, 0, -1000, 1000);

    this.texture = new THREE.TextureLoader().load('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=800&q=80');
    this.texture.minFilter = THREE.LinearFilter;

    this.uniforms = {
      uTexture: { value: this.texture },
      uTime: { value: 0 },
      uResolution: { value: new THREE.Vector2(this.width, this.height) },
      uRipplePos: { value: new Array(this.ripplesMax).fill(new THREE.Vector2(0, 0)) },
      uRippleIntensity: { value: new Array(this.ripplesMax).fill(0) },
      uRippleStartTime: { value: new Array(this.ripplesMax).fill(0) },
      uRippleCount: { value: 0 }
    };

    this.geometry = new THREE.PlaneGeometry(this.width, this.height);
    this.material = new THREE.ShaderMaterial({
      vertexShader,
      fragmentShader,
      uniforms: this.uniforms
    });

    this.mesh = new THREE.Mesh(this.geometry, this.material);
    this.mesh.position.set(this.width / 2, this.height / 2, 0);
    this.scene.add(this.mesh);
  }

  addListeners() {
    window.addEventListener('resize', () => this.onResize());
    window.addEventListener('mousemove', (e) => this.onPointerMove(e));
    window.addEventListener('touchmove', (e) => this.onPointerMove(e));
  }

  onResize() {
    this.width = window.innerWidth;
    this.height = window.innerHeight;

    this.renderer.setSize(this.width, this.height);

    this.camera.right = this.width;
    this.camera.bottom = this.height;
    this.camera.updateProjectionMatrix();

    this.uniforms.uResolution.value.set(this.width, this.height);
  }

  onPointerMove(event) {
    event.preventDefault();

    let x, y;

    if (event.touches && event.touches.length > 0) {
      x = event.touches[0].clientX;
      y = event.touches[0].clientY;
    } else {
      x = event.clientX;
      y = event.clientY;
    }

    // Throttle ripples to ~60fps
    const now = performance.now();
    if (now - this.mouseThrottleTime > 16) {
      this.addRipple(x, this.height - y); // invert Y because of orthographic camera
      this.mouseThrottleTime = now;
    }
  }

  addRipple(x, y) {
    if (this.ripples.length >= this.ripplesMax) {
      this.ripples.shift();
    }

    this.ripples.push({
      pos: new THREE.Vector2(x, y),
      intensity: 0.4,
      startTime: (performance.now() - this.timeStart) / 1000
    });

    this.updateUniforms();
  }

  updateUniforms() {
    const positions = [];
    const intensities = [];
    const startTimes = [];

    for (let i = 0; i < this.ripplesMax; i++) {
      if (i < this.ripples.length) {
        positions[i] = this.ripples[i].pos;
        intensities[i] = this.ripples[i].intensity;
        startTimes[i] = this.ripples[i].startTime;
      } else {
        positions[i] = new THREE.Vector2(0, 0);
        intensities[i] = 0;
        startTimes[i] = 0;
      }
    }

    this.uniforms.uRipplePos.value = positions;
    this.uniforms.uRippleIntensity.value = intensities;
    this.uniforms.uRippleStartTime.value = startTimes;
    this.uniforms.uRippleCount.value = this.ripples.length;
  }

  animate() {
    requestAnimationFrame(() => this.animate());

    this.uniforms.uTime.value = (performance.now() - this.timeStart) / 1000;

    this.updateUniforms();

    this.renderer.render(this.scene, this.camera);
  }
}

const container = document.body;
new RippleCanvas(container);
</script>
</body>
</html>
