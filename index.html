<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Liminal⚾️Loop</title>
<style>
  body, html {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    font-family: Arial, sans-serif;
    color: white;
  }
  #bg-video {
    position: fixed;
    right: 0;
    bottom: 0;
    min-width: 100%;
    min-height: 100%;
    object-fit: cover;
    z-index: -1;
  }

  main {
    display: flex;
    height: 100vh;
    gap: 20px;
    padding: 10px;
    position: relative;
    z-index: 1; /* ensure it’s above the video */
  }

  #left {
    width: 50%;
    height: 100vh;
    overflow-y: auto;
    box-sizing: border-box;
  }
  #right {
    width: 50%;
    position: fixed;
    right: 10px;
    top: 0;
    bottom: 0;
    box-sizing: border-box;
    padding: 20px;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    overflow-y: auto;
  }
</style>
</head>
<body>
  <video autoplay muted loop playsinline id="bg-video">
    <source src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/CyberCupcake.mp4" type="video/mp4" />
    <!-- You can add additional formats for better browser support -->
    Your browser does not support the video tag.
  </video>

  <main>
    <div id="left">
      <p>Left column content scrolls vertically.</p>
      <!-- your existing content -->
    </div>
    <div id="right">
      <h2>Fixed Right Column</h2>
      <p>This column stays fixed and its content is centered vertically and horizontally.</p>
    </div>
  </main>
</body>
</html>
