<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🗿Loop</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: Arial, sans-serif;
            background: #EDE8EC;
            color: #262626;
        }
        main {
            max-width: 800px;
            width: 100%;
            margin: 10vh auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
        }
        .badge {
            display: inline-block;
            width: 45px;
            height: 45px;
            margin-right: 10px;
            border-radius: 50%;
            cursor: pointer;
        }
        .badge.forming-kin { background-color: #f886ff; }
        .badge.moi { background-color: #71c6ff; }
        .badge.cosmetic-healing { background-color: #8af38a; }
        .badge.ai { background-color: #f2fc72; }
        .badge.living-tools { background-color: #c6aeff; }

        .accordion {
            margin-bottom: 10px;
            border: 2px solid #262626;
        }
        .accordion label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            cursor: pointer;
            font-size: 1.2em;
            background-color: #ffffff;
            transition: background-color 0.3s;
        }
        .accordion.open label {
            background-color: var(--bg-color);
        }
        .cross {
            width: 15px;
            height: 15px;
            position: relative;
        }
        .cross::before, .cross::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 2px;
            background-color: #262626;
            top: 50%;
            left: 0;
            transition: transform 0.3s;
        }
        .cross::after {
            transform: rotate(90deg);
        }
        .accordion.open .cross::after {
            transform: rotate(0deg);
        }

        .content {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-in-out;
            padding: 0 15px;
        }
        .accordion.open .content {
            max-height: 1000px;
            padding: 15px;
        }

        /* Two-column paragraph layout */
        .content p {
            width: 48%;
        }
        .content p + p {
            margin-left: 4%;
        }
        .content div {
            display: flex;
            flex-wrap: wrap;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: left;
            }
            .content p {
                width: 100%;
                margin-left: 0;
            }
            .content div {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<main>
    <header>
        <h1>Memory Work</h1>
        <nav>
            <div class="badge forming-kin" data-target="formingkin"></div>
            <div class="badge moi" data-target="mothers-of-invention"></div>
            <div class="badge cosmetic-healing" data-target="cosmetic-healing"></div>
            <div class="badge ai" data-target="ancestral-intelligence"></div>
            <div class="badge living-tools" data-target="almanac"></div>
        </nav>
    </header>

    <section class="accordion" id="formingkin" style="--bg-color: #f886ff;">
        <label>
            <div>Forming Kin</div>
            <div class="cross"></div>
        </label>
        <div class="content">
            <div>
                <p>A call for people to be with and of nature...</p>
                <p>Like mushrooms springing from disseminated spores...</p>
            </div>
        </div>
    </section>

    <section class="accordion" id="mothers-of-invention" style="--bg-color: #71c6ff;">
        <label>
            <div>Mothers of Invention</div>
            <div class="cross"></div>
        </label>
        <div class="content">
            <div>
                <p>Referring to a loosely knit movement...</p>
                <p>In response to the clumsy and ineffectual...</p>
            </div>
        </div>
    </section>

    <section class="accordion" id="cosmetic-healing" style="--bg-color: #8af38a;">
        <label>
            <div>Cosmetic Healing</div>
            <div class="cross"></div>
        </label>
        <div class="content">
            <div>
                <p>Healing rituals were rediscovered...</p>
                <p>Communities used biomimicry...</p>
            </div>
        </div>
    </section>

</main>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const accordions = document.querySelectorAll(".accordion");
        const badges = document.querySelectorAll(".badge");

        // Toggle accordion on label click
        accordions.forEach(accordion => {
            accordion.querySelector("label").addEventListener("click", () => {
                const isOpen = accordion.classList.contains("open");
                accordions.forEach(a => a.classList.remove("open"));
                if (!isOpen) {
                    accordion.classList.add("open");
                }
            });
        });

        // Open corresponding accordion when clicking a badge
        badges.forEach(badge => {
            badge.addEventListener("click", () => {
                const targetId = badge.getAttribute("data-target");
                const targetAccordion = document.getElementById(targetId);
                if (targetAccordion) {
                    accordions.forEach(a => a.classList.remove("open"));
                    targetAccordion.classList.add("open");
                }
            });
        });
    });
</script>
</body>
</html>
