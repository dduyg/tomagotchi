<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body {
            background: linear-gradient(135deg, #ff77ff, #00ffff);
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            max-width: 800px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.8);
        }

        h1 {
            font-size: 100px;
            margin-bottom: 20px;
            color: #ff00ff;
            text-shadow: 3px 3px 6px rgba(0, 0, 0, 0.7);
        }

        p {
            font-size: 24px;
            margin-bottom: 40px;
            color: #00ffcc;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.6);
        }

        .links a {
            text-decoration: none;
            color: #ffcc00;
            font-size: 18px;
            margin: 10px;
            padding: 10px 20px;
            background-color: rgba(0, 0, 0, 0.6);
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }

        .links a:hover {
            background-color: #ff00ff;
        }

        .logo {
            width: 150px;
            height: auto;
            margin-bottom: 30px;
        }

        /* SVG styles for the logo */
        svg path {
            fill: #ffcc00;
            transition: fill 0.3s ease;
        }

        svg path:hover {
            fill: #ff00ff;
        }

    </style>
</head>
<body>
    <div class="container">
        <!-- SVG Logo -->
        <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 10 L50 10 L50 50 L10 50 Z M50 10 L90 50 L50 90 Z" />
        </svg>

        <h1>404</h1>
        <p>Oops! The page you're looking for doesn't exist.</p>
        <div class="links">
            <a href="/">Go Home</a>
            <a href="/about">About Us</a>
            <a href="/contact">Contact</a>
            <a href="/blog">Blog</a>
        </div>
    </div>
</body>
</html>
