<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            color: #FFF;
            background-color: #2E2A5A;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }
        h1 {
            font-size: 6rem;
            margin: 0;
            color: #FF77FF;
        }
        p {
            font-size: 1.5rem;
            color: #00FFFF;
        }
        .image {
            margin-top: 20px;
            width: 80%;
            max-width: 600px;
        }
        a {
            color: #FF77FF;
            text-decoration: none;
            font-weight: bold;
            margin-top: 20px;
            display: inline-block;
            font-size: 1.2rem;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>Oops! Looks like this page got lost in the digital void.</p>
    <img src="https://example.com/vaporwave-image.jpg" alt="Vaporwave Art" class="image">
    <a href="/">Go Back Home</a>
</body>
</html>
