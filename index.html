<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🎎Loop</title>
    <style>
        /* Global Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        html, body {
            background: #5F11E8;
            color: white;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        /* Animated Title */
        .animated-title {
            position: relative;
            font-size: 20vmin;
            font-family: sans-serif;
            text-transform: uppercase;
        }

        /* Layered Rows */
        .title-row {
            display: block;
        }
        .title-layer {
            position: absolute;
            top: 0;
            left: 0;
            user-select: none;
        }

        /* Text Styling with Animation */
        .title-text {
            display: block;
            transform-origin: bottom left;
            animation: moveIn 2s cubic-bezier(.36,0,.06,1) alternate infinite;
        }

        /* Distorted Effect */
        .title-row:nth-child(1) .title-text { transform: translateY(-0.1em); }
        .title-row:nth-child(2) .title-text { transform: translateY(-0.3em) scaleY(1.1); }
        .title-row:nth-child(3) .title-text { transform: translateY(-0.5em) scaleY(1.2) rotate(-1deg); }
        .title-row:nth-child(4) .title-text { transform: translateY(-0.7em) scaleY(1.3) rotate(-2deg); }
        .title-row:nth-child(5) .title-text { transform: translateY(-0.9em) scaleY(1.4) rotate(-3deg); }
        .title-row:nth-child(6) .title-text { transform: translateY(-1.1em) scaleY(1.5) rotate(-4deg); }

        /* Animation */
        @keyframes moveIn {
            80%, 100% { transform: translateY(0); }
        }

        /* Debug Mode */
        .debug .title-row:nth-child(even) {
            color: black;
            background: white;
        }
        .debug .title-row:nth-child(odd) {
            color: white;
            background: black;
        }
    </style>
</head>
<body>
    <h1 class="animated-title">
        <span class="title-row"><span class="title-text">Title</span></span>
        <span class="title-row title-layer"><span class="title-text">Title</span></span>
        <span class="title-row title-layer"><span class="title-text">Title</span></span>
        <span class="title-row title-layer"><span class="title-text">Title</span></span>
        <span class="title-row title-layer"><span class="title-text">Title</span></span>
        <span class="title-row title-layer"><span class="title-text">Title</span></span>
    </h1>
</body>
</html>
