<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 - Page Not Found</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

  /* Seapunk colors and aesthetic */
  :root {
    --neon-cyan: #00ffe7;
    --neon-pink: #ff6fff;
    --dark-bg: #0a0f21;
    --glitch-pink: #ff33cc;
    --glitch-cyan: #00ffff;
    --text-shadow-glitch: 2px 0 var(--glitch-pink), -2px 0 var(--glitch-cyan);
  }

  body {
    margin: 0;
    background: linear-gradient(135deg, #031f2e 0%, #071425 100%);
    color: var(--neon-cyan);
    font-family: 'Orbitron', monospace, sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    overflow: hidden;
  }

  h1 {
    font-size: 10rem;
    margin: 0;
    position: relative;
    animation: glitch 1.5s infinite;
  }

  @keyframes glitch {
    0% {
      text-shadow: 2px 0 var(--glitch-pink), -2px 0 var(--glitch-cyan);
      transform: translate(0);
    }
    20% {
      text-shadow: 2px 2px var(--glitch-pink), -2px -2px var(--glitch-cyan);
      transform: translate(-2px, 2px);
    }
    40% {
      text-shadow: -2px 0 var(--glitch-pink), 2px 0 var(--glitch-cyan);
      transform: translate(2px, -2px);
    }
    60% {
      text-shadow: 2px -2px var(--glitch-pink), -2px 2px var(--glitch-cyan);
      transform: translate(-1px, 1px);
    }
    80% {
      text-shadow: -2px 2px var(--glitch-pink), 2px -2px var(--glitch-cyan);
      transform: translate(1px, -1px);
    }
    100% {
      text-shadow: 2px 0 var(--glitch-pink), -2px 0 var(--glitch-cyan);
      transform: translate(0);
    }
  }

  p {
    font-size: 1.8rem;
    max-width: 600px;
    margin: 20px auto 40px;
    color: #a0f0f8;
    text-shadow: 0 0 5px #00ffe7;
    line-height: 1.4;
  }

  a.home-link {
    color: var(--neon-pink);
    text-decoration: none;
    font-weight: bold;
    font-size: 1.6rem;
    border: 2px solid var(--neon-pink);
    padding: 10px 25px;
    border-radius: 30px;
    transition: background-color 0.3s ease, color 0.3s ease;
    box-shadow: 0 0 10px var(--neon-pink);
  }

  a.home-link:hover {
    background-color: var(--neon-pink);
    color: var(--dark-bg);
    box-shadow: 0 0 30px var(--neon-pink);
  }

  /* subtle underwater animation */
  .background-bubbles {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }

  .bubble {
    position: absolute;
    bottom: -50px;
    background: radial-gradient(circle at center, #00ffe7 0%, transparent 70%);
    border-radius: 50%;
    opacity: 0.3;
    animation: rise 8s linear infinite;
  }

  .bubble:nth-child(1) {
    width: 40px; height: 40px;
    left: 20%;
    animation-delay: 0s;
  }

  .bubble:nth-child(2) {
    width: 25px; height: 25px;
    left: 50%;
    animation-delay: 2.5s;
    animation-duration: 6s;
  }

  .bubble:nth-child(3) {
    width: 15px; height: 15px;
    left: 80%;
    animation-delay: 1s;
    animation-duration: 7s;
  }

  @keyframes rise {
    0% {
      transform: translateY(0) scale(1);
      opacity: 0.3;
    }
    100% {
      transform: translateY(-110vh) scale(1.3);
      opacity: 0;
    }
  }

</style>
</head>
<body>
  <div class="background-bubbles">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>
  
  <h1>404</h1>
  <p>Whoa, you've drifted into the data void — this page doesn't exist in our neon ocean of code.</p>
  <a href="/" class="home-link">Surf back to Home</a>
</body>
</html>
