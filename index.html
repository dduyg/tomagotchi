<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #2d2d2d;
            color: #fff;
            font-family: 'Arial', sans-serif;
            text-align: center;
            overflow: hidden;
        }
        .container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        h1 {
            font-size: 5em;
            color: #ff77ff;
            text-shadow: 0 0 10px #ff77ff;
        }
        p {
            font-size: 1.5em;
            color: #00ffff;
            text-shadow: 0 0 10px #00ffff;
        }
        .image {
            width: 200px;
            margin-top: 20px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
            100% { transform: translateY(0); }
        }
        a {
            color: #ff77ff;
            text-decoration: none;
            font-size: 1.2em;
            border: 2px solid #ff77ff;
            padding: 10px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        a:hover {
            background-color: #ff77ff;
            color: #2d2d2d;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Oops! This page is lost in the digital cosmos.</p>
        <img src="https://via.placeholder.com/200x200.png?text=Vaporwave" alt="Vaporwave" class="image">
        <p><a href="/">Return to Homepage</a></p>
    </div>
</body>
</html>
