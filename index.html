<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liminal🥟Loop</title>
  <style>
    body {
      margin: 0;
      font-family: 'Courier New', monospace;
      display: flex;
      height: 100vh;
      overflow: hidden;
      background: linear-gradient(to right, #ff8bd3, #8be9fd, #d6a2e8);
      color: #fff;
    }

    .tab-container {
      display: flex;
      flex-direction: row;
      width: 100%;
    }

    .tab-content-area {
      flex: 1;
      padding: 30px;
      position: relative;
    }

    .tab-content {
      display: none;
      opacity: 0;
      transform: translateX(-40px);
      transition: opacity 0.6s ease, transform 0.6s ease;
      position: absolute;
      width: 100%;
      height: 100%;
    }

    .tab-content.active {
      display: block;
      opacity: 1;
      transform: translateX(0);
    }

    .tab-buttons {
      display: flex;
      flex-direction: column;
      background: rgba(255, 255, 255, 0.1);
      border-left: 2px solid #ffffff44;
      backdrop-filter: blur(10px);
    }

    .tab-button {
      width: 60px;
      height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 1px solid #ffffff33;
      cursor: pointer;
      background: transparent;
      transition: background 0.3s, transform 0.2s;
      font-size: 24px;
      color: #fff;
      text-shadow: 0 0 5px #fff, 0 0 10px #ff00ff, 0 0 20px #00ffff;
    }

    .tab-button:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: scale(1.05);
    }

    .tab-button.active {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="tab-container">
    <div class="tab-content-area">
      <div class="tab-content active" id="content1">Profile section content goes here.</div>
      <div class="tab-content" id="content2">Settings section content goes here.</div>
      <div class="tab-content" id="content3">Web section content goes here.</div>
      <div class="tab-content" id="content4">Message section content goes here.</div>
    </div>

    <div class="tab-buttons">
      <div class="tab-button active" data-target="content1">👤</div>
      <div class="tab-button" data-target="content2">🛠️</div>
      <div class="tab-button" data-target="content3">🌐</div>
      <div class="tab-button" data-target="content4">✈️</div>
    </div>
  </div>

  <script>
    const buttons = document.querySelectorAll('.tab-button');
    const contents = document.querySelectorAll('.tab-content');

    buttons.forEach(button => {
      button.addEventListener('click', () => {
        buttons.forEach(btn => btn.classList.remove('active'));
        contents.forEach(content => {
          content.classList.remove('active');
          content.style.display = 'none';
        });

        button.classList.add('active');
        const target = document.getElementById(button.dataset.target);
        target.style.display = 'block';

        // Trigger reflow for transition
        void target.offsetWidth;

        target.classList.add('active');
      });
    });
  </script>
</body>
</html>
