<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        /* General page styling */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #0f0f0f;
            color: #fff;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        /* Vaporwave theme with neon gradient */
        .vaporwave-background {
            background: linear-gradient(to top right, #ff00ff, #00ffff, #ff5dff, #5dfffd);
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            animation: gradientMotion 5s ease-in-out infinite;
        }
        @keyframes gradientMotion {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        h1 {
            font-size: 4em;
            text-align: center;
            color: #ff5dff;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.6), 0 0 25px #ff00ff, 0 0 5px #ff00ff;
            margin-bottom: 30px;
        }

        .menu {
            list-style: none;
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .menu a {
            text-decoration: none;
            font-size: 1.5em;
            color: #ffffff;
            text-transform: uppercase;
            transition: transform 0.3s ease;
        }

        .menu a:hover {
            color: #ff00ff;
            transform: scale(1.1);
        }

        /* SVG logo styling */
        .logo {
            width: 120px;
            height: 120px;
            fill: #ff5dff;
            margin-bottom: 20px;
            animation: rotateLogo 4s infinite linear;
        }
        @keyframes rotateLogo {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="vaporwave-background"></div>

    <!-- SVG Logo: Creative Letter D -->
    <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <path d="M20,10 C40,5, 60,5, 80,20 C70,40, 60,80, 40,90 C20,80, 15,60, 20,40 C25,30, 35,20, 20,10 Z"/>
    </svg>

    <h1>404 - Page Not Found</h1>

    <p>Oops! Looks like you've landed on a page that doesn't exist. Here's some stuff you can do:</p>

    <ul class="menu">
        <li><a href="/">Home</a></li>
        <li><a href="/about">About</a></li>
        <li><a href="/contact">Contact</a></li>
        <li><a href="/blog">Blog</a></li>
    </ul>
</body>
</html>
