<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Columns</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: gray;
            margin: 0;
            padding: 20px;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
            align-items: start;
        }

        .properties-info {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .property, .info {
            display: flex;
        }

        .property {
            font-weight: bold;
            margin-bottom: 0;
        }

        .info {
            margin-bottom: 0;
        }

        .column h3 {
            margin-top: 0;
        }

        @media screen and (min-width: 30em) {
            .container {
                grid-template-columns: 1fr 1fr;
                grid-template-rows: auto;
            }

            .properties-info {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                align-items: start;
            }

            .properties-info .property {
                grid-column: 1;
            }

            .properties-info .info {
                grid-column: 2;
            }

            .column:nth-child(3) {
                grid-column: span 2;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="properties-info">
            <div class="property">CATEGORY:</div>
            <div class="info">Branding, Design, Web Development</div>
            <div class="property">YEAR:</div>
            <div class="info">2024</div>
            <div class="property">CLIENT:</div>
            <div class="info">LiminalLoop</div>
        </div>
        <div class="column">
            <h3>Summary</h3>
            <p>ACT Responsable is a French association created to identify and collect the best communications campaigns around the world in order to raise awareness on social and environmental issues...</p>
        </div>
    </div>
</body>
</html>
