<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🗿Loop</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: sans-serif;
            background: #EDE8EC;
            color: #262626;
            overflow-x: hidden; /* Allow content to be scrollable */
        }
        main {
            max-width: 800px;
            width: 100%;
            margin: 15vh auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
        }
        .badge {
            display: inline-block;
            width: 45px;
            height: 45px;
            margin-right: 10px;
            border-radius: 50%;
            cursor: pointer;
        }
        /* Badge Styles */
        .badge.forming-kin { background-image: url('memory01.svg'); }
        .badge.forming-kin:hover, .badge.active.forming-kin { background-color: #f886ff; }
        .badge.moi { background-image: url('memory02.svg'); }
        .badge.moi:hover, .badge.active.moi { background-color: #71c6ff; }
        .badge.cosmetic-healing { background-image: url('memory03.svg'); }
        .badge.cosmetic-healing:hover, .badge.active.cosmetic-healing { background-color: #8af38a; }
        .badge.ai { background-image: url('memory04.svg'); }
        .badge.ai:hover, .badge.active.ai { background-color: #f2fc72; }
        .badge.living-tools { background-image: url('memory05.svg'); }
        .badge.living-tools:hover, .badge.active.living-tools { background-color: #c6aeff; }
        
        input { display: none; }

        label {
            display: flex;
            width: 100%;
            height: 50px;
            cursor: pointer;
            border: 3px solid;
            padding: 10px;
            transition: background-color 0.3s ease;
        }
        label div:first-child {
            width: 100%;
            line-height: 30px;
            font-size: 1.2em;
        }
        .cross {
            margin-right: 15px;
            margin-top: 3px;
        }
        .cross:before, .cross:after {
            content: '';
            border-top: 2px solid #3E474F;
            width: 15px;
            display: block;
            margin-top: 18px;
            transition: 0.3s;
        }
        .cross:after {
            transform: rotate(90deg);
            margin-top: -2px;
        }
        
        /* Content & Accordion */
        .content {
            font-size: 0.9em;
            margin: 10px 10px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .content p {
            flex: 1 1 48%;
            margin-bottom: 10px;
        }
        input:checked ~ .content {
            max-height: 400px;
            transition: max-height 1s;
        }
        input:checked ~ label {
            background-color: var(--active-bg);
        }
        input:checked ~ label .cross:before {
            transform: rotate(180deg);
        }
        input:checked ~ label .cross:after {
            transform: rotate(0deg);
        }
        
        /* Tooltip */
        .tip {
            color: #f03768;
            cursor: help;
            position: relative;
            font-family: monospace;
            font-size: 1.3em;
        }
        .tip:before, .tip:after {
            position: absolute;
            opacity: 0;
            z-index: -100;
            transition: .4s;
        }
        .tip:before {
            content: '';
            border-style: solid;
            border-width: 0.8em 0.5em 0 0.5em;
            border-color: #3E474F transparent transparent transparent;
            transform: translateY(-200%);
            bottom: 90%;
            left: 50%;
        }
        .tip:after {
            content: attr(data-tip);
            background: #3E474F;
            color: white;
            width: 150px;
            padding: 10px;
            font-size: 0.8em;
            bottom: 150%;
            left: -50%;
        }
        .tip:hover:before, .tip:hover:after {
            opacity: 1;
            z-index: 100;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: left;
            }
            header h1 {
                align-self: flex-start;
                margin-bottom: 40px;
            }
            header nav {
                align-self: flex-end;
                text-align: right;
            }
            .content {
                flex-direction: column;
            }
            .content p {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>

<main>
    <header>
        <h1>Memory Work</h1>
        <nav>
            <a href="#formingkin" class="badge forming-kin" data-target="tab-1"></a>
            <a href="#mothers-of-invention" class="badge moi" data-target="tab-2"></a>
            <a href="#cosmetic-healing" class="badge cosmetic-healing" data-target="tab-3"></a>
            <a href="#ancestral-intelligence" class="badge ai" data-target="tab-4"></a>
            <a href="#almanac" class="badge living-tools" data-target="tab-5"></a>
        </nav>
    </header>

    <article id="formingkin">
        <input type="radio" id="tab-1" name="tabs">
        <label for="tab-1"><div>Forming Kin</div><div class="cross"></div></label>
        <div class="content">
            <p>A call for people to be with and of nature...</p>
            <p>Like mushrooms springing from disseminated spores...</p>
        </div>
    </article>

    <article id="mothers-of-invention">
        <input type="radio" id="tab-2" name="tabs">
        <label for="tab-2"><div>Mothers of Invention</div><div class="cross"></div></label>
        <div class="content">
            <p>Referring to a loosely knit movement...</p>
            <p>In response to the clumsy and ineffectual...</p>
        </div>
    </article>
</main>

<script>
    document.querySelectorAll(".badge").forEach(badge => {
        badge.addEventListener("click", function (e) {
            e.preventDefault();
            document.getElementById(this.dataset.target).checked = true;
            document.querySelectorAll(".badge").forEach(b => b.classList.remove("active"));
            this.classList.add("active");
        });
    });
</script>
</body>
</html>
