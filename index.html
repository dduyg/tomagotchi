<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Marquee</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      flex-direction: column;
      gap: 20px;
      padding: 20px;
    }

    .marquee-container {
      overflow: hidden;
      position: relative;
      width: 100%;
      height: 150px;
      background: #fff;
      border: 1px solid #ddd;
    }

    .marquee {
      display: flex;
      position: absolute;
      animation-timing-function: linear;
      will-change: transform;
    }

    .marquee img {
      height: 150px;
      margin-right: 10px;
      flex-shrink: 0;
    }

    /* Animations */
    @keyframes marquee-left {
      0% {
        transform: translateX(100%);
      }
      100% {
        transform: translateX(-100%);
      }
    }

    @keyframes marquee-right {
      0% {
        transform: translateX(-100%);
      }
      100% {
        transform: translateX(100%);
      }
    }
  </style>
</head>
<body>

  <!-- Marquee moving left -->
  <div class="marquee-container">
    <div class="marquee marquee-left">
      <img src="https://media0.giphy.com/media/l0O9xVx5v3YHYjGgM/giphy.gif" alt="1">
      <img src="https://media1.giphy.com/media/cpO6VvIo0mW9q/giphy.gif" alt="2">
      <img src="https://media3.giphy.com/media/3o6EhE8pukIRNaPyOQ/giphy.gif" alt="3">
      <img src="https://media3.giphy.com/media/ldKjshoVdTNgblMuLs/giphy.gif" alt="4">
    </div>
  </div>

  <!-- Marquee moving right -->
  <div class="marquee-container">
    <div class="marquee marquee-right">
      <img src="https://media2.giphy.com/media/JDXuoS4eWlYAEHyL7G/giphy.gif" alt="1">
      <img src="https://media4.giphy.com/media/a2vstZP9SvLA4/giphy.gif" alt="2">
      <img src="https://media3.giphy.com/media/kesNMJU1kLFJdc7FcB/giphy.gif" alt="3">
      <img src="https://media1.giphy.com/media/VoVQ6zWVMjUuGUz8bu/giphy.gif" alt="4">
    </div>
  </div>

  <script>
    // Configure marquee speed and direction
    document.querySelectorAll('.marquee').forEach((marquee) => {
      const container = marquee.parentElement;
      const clonedMarquee = marquee.cloneNode(true);
      container.appendChild(clonedMarquee);

      const direction = marquee.classList.contains('marquee-left') ? 'marquee-left' : 'marquee-right';
      const duration = 10; // Adjust duration for speed (lower = faster)

      marquee.style.animation = `${direction} ${duration}s infinite`;
      clonedMarquee.style.animation = `${direction} ${duration}s infinite`;
      clonedMarquee.style.animationDelay = `${duration / 2}s`;
    });
  </script>
</body>
</html>
