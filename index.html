<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Liminal🔘Loop</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      height: 100vh;
    }

    .content {
      flex-grow: 1;
      padding: 20px;
    }

    .tabs {
      width: 80px;
      background: #2c3e50;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 0;
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
    }

    .tab {
      background: none;
      border: none;
      color: white;
      padding: 20px 0;
      font-size: 24px;
      cursor: pointer;
      transition: background 0.3s;
    }

    .tab.active {
      background: #34495e;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .main {
      margin-right: 80px;
      flex: 1;
    }
  </style>
</head>
<body>

  <div class="main">
    <div id="tab1" class="tab-content active">
      <h1>Home</h1>
      <p>Welcome to the home tab.</p>
    </div>
    <div id="tab2" class="tab-content">
      <h1>Settings</h1>
      <p>Change your settings here.</p>
    </div>
    <div id="tab3" class="tab-content">
      <h1>Profile</h1>
      <p>Your profile info.</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showTab('tab1', this)">🏠</button>
    <button class="tab" onclick="showTab('tab2', this)">⚙️</button>
    <button class="tab" onclick="showTab('tab3', this)">👤</button>
  </div>

  <script>
    function showTab(tabId, el) {
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');

      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }
  </script>
</body>
</html>
