<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Homepage</title>
    <style>
        /* General Reset */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            background: linear-gradient(135deg, #ff8ceb, #8b88ff);
            overflow-x: hidden;
        }

        /* Vaporwave Grid Background */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 10%, transparent 70%), 
                        repeating-linear-gradient(90deg, rgba(255,255,255,0.05) 0px, transparent 1px);
            z-index: 0;
        }

        /* Main content wrapper */
        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        /* Welcome Section */
        h1 {
            font-size: 3rem;
            text-transform: uppercase;
            text-shadow: 2px 2px 10px #000;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            max-width: 600px;
            line-height: 1.6;
            text-shadow: 1px 1px 5px #000;
        }

        /* Animated Pulsating Effect */
        .welcome {
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                text-shadow: 0 0 10px #ff8ceb, 0 0 20px #8b88ff, 0 0 30px #ff8ceb;
            }
            50% {
                text-shadow: 0 0 20px #ff8ceb, 0 0 40px #8b88ff, 0 0 60px #ff8ceb;
            }
        }

        /* Footer */
        footer {
            position: relative;
            z-index: 1;
            margin-top: 20px;
            font-size: 0.9rem;
            text-shadow: 1px 1px 5px #000;
        }

        footer a {
            color: #8b88ff;
            text-decoration: none;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="welcome">Welcome to My Vaporwave World</h1>
        <p>
            Explore a blend of nostalgia and futurism. This is your digital sanctuary, 
            where aesthetics meet simplicity. Enjoy the ride!
        </p>
    </div>
    <footer>
        Made with <span style="color: #ff8ceb;">❤</span> | <a href="#">Contact Me</a>
    </footer>
</body>
</html>
