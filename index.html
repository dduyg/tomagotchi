<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Signal Lost</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&display=swap');

    body {
      margin: 0;
      background: radial-gradient(ellipse at center, #0f0f1a 0%, #000000 100%);
      color: #00ffff;
      font-family: 'Orbitron', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 20px;
    }

    .logo {
      font-size: 2.5rem;
      font-weight: 700;
      color: #ff00ff;
      text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 20px #ff00ff;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 6rem;
      margin: 0;
      color: #00ffff;
      text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
    }

    p {
      font-size: 1.25rem;
      color: #ffffffcc;
      margin: 20px 0;
    }

    a {
      color: #00ffcc;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.1rem;
      border: 1px solid #00ffcc;
      padding: 10px 20px;
      border-radius: 5px;
      transition: all 0.3s ease;
    }

    a:hover {
      background: #00ffcc;
      color: #000;
    }

    .glitch {
      position: relative;
      display: inline-block;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      width: 100%;
      overflow: hidden;
      color: #ff00ff;
      z-index: -1;
    }

    .glitch::before {
      top: -2px;
      text-shadow: 2px 0 red;
      animation: glitch 2s infinite linear alternate-reverse;
    }

    .glitch::after {
      top: 2px;
      text-shadow: -2px 0 blue;
      animation: glitch 1.5s infinite linear alternate-reverse;
    }

    @keyframes glitch {
      0% { clip-path: inset(0 0 90% 0); }
      10% { clip-path: inset(10% 0 85% 0); }
      20% { clip-path: inset(15% 0 70% 0); }
      30% { clip-path: inset(30% 0 50% 0); }
      40% { clip-path: inset(50% 0 30% 0); }
      50% { clip-path: inset(70% 0 20% 0); }
      60% { clip-path: inset(90% 0 0 0); }
      100% { clip-path: inset(0 0 90% 0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo glitch" data-text="DATA//BREACH">DATA//BREACH</div>
    <h1>404</h1>
    <p>Signal Lost. The path you're coding through doesn't exist.</p>
    <a href="/">Return to Home Terminal</a>
  </div>
</body>
</html>
