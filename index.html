<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🍋Loop</title>
    <style>
        @font-face {
            font-family: 'Fliege Mono';
            src: url('FliegeMono.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Fliege Mono';
            src: url('FliegeMono-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
        }
        @font-face {
            font-family: 'Laginchy';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Laginchy.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }       
        @font-face {
            font-family: 'Shinko Sans';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/ShinkoSans.woff2') format('woff2'),
                 url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/ShinkoSans.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Lo', monospace;
            background: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/floppyDisk.png') no-repeat center center/cover;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        main {
            width: 95%;
            max-width: 900px;
            backdrop-filter: blur(3px);
        }
        .component {
            font-size: 100%;
            font-weight: 700;
            padding: 10px 0;
            border-top: 2px solid white;
        }
        .component:last-child {
            border-bottom: 2px solid white;
        }
        .component:nth-child(1) {font-family: 'Laginchy', serif;}
        .component:nth-child(2) {font-family: 'Fliege Mono', monospace;}
        .component:nth-child(3) {font-family: 'Shinko Sans', sans-serif;}
        .component:nth-child(4) {font-family: 'Bo', monospace;}
        .component:nth-child(5) {font-family: 'FliegeMono', monospace; font-weight: 500;}

        em {font-style: normal;}
        .component:nth-child(4) em {font-family: 'in', sans-serif;}
    </style>
</head>
<body>
    <main>
        <div class="component">{ Monocity }</div>
        <div class="component">@floating lantern</div>
        <div class="component">V.1(Detective Searching Clues)</div>
        <div class="component">0430 <em>& Sad Moments</em></div>
        <div class="component">rested against the wall 'qr-code'</div>
    </main>
</body>
</html>
