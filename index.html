<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulsing Circle</title>
    <style>
          @font-face {
            font-family: "ABC Favorit";
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/ABCfavorit.woff2') format('woff2');  
            font-style: normal;
            font-weight: normal;
            font-display: swap;
        }
        @font-face {
            font-family: "ABC Favorit";
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/ABCfavorit-Italic.woff2') format('woff2');  
            font-style: italic;
            font-display: swap;  
        }
body {
    background-image: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/detail-11.jpg');
    background-size: cover;     
    background-position: center;     
    font-family: "ABC Favorit", sans-serif;
    font-size: 1.8rem;
    line-height: 1;
    color: #FBFBFB;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chromaticPulseCircle {
    width: 0.5em;
    height: 0.5em;
    border-radius: 50%;
    background-color: #FF0101;
    animation: chromaticPulse 12s infinite ease-in-out;
}
@keyframes chromaticPulse {
    0% {
        transform: scale(1);
        background-color: #FF0101;
        opacity: 1;
    }
    20% {
        transform: scale(1.3);
        background-color: #873381;
        opacity: 0.9;
    }
    40% {
        transform: scale(1);
        background-color: #6046A1;
        opacity: 1;
    }
    60% {
        transform: scale(1.3);
        background-color: #3354BE;
        opacity: 0.9;
    }
    80% {
        transform: scale(1);
        background-color: #009E01;
        opacity: 1;
    }
    100% {
        transform: scale(1.3);
        background-color: #FF0101;
        opacity: 0.9;
    }
}
    </style>
</head>
<body>
    <p>And what if these<br>poor letters dream</p>
    <p>Of freedom from<br>the page & screen?</p>
    <div class="chromaticPulseCircle"></div>
    <p>Perhaps they long<br>to love or kill</p>
    <p>Or rearange<br>themselves at will</p>
</body>
</html>
