<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liminal🧊Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@450&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: #040205;
      color: #B504F3;
      font-family: "Manrope", sans-serif;
      overflow: hidden;
    }

    .index {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .item {
      flex: 1 1 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      cursor: pointer;
      position: relative;
      border-right: 1px dotted;
      overflow: hidden;
    }

    .item::before {
      content: '';
      position: absolute;
      top: 0; left: 100%;
      width: 100%;
      height: 100%;
      z-index: 1;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      transition: left 0.5s ease;
    }

    .item.revealed::before {
      left: 0;
    }

    .item_inner {
      position: relative;
      z-index: 2;
      text-align: center;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 10px;
      border-radius: 10px;
    }

    .item_inner h3 {
      font-size: clamp(1rem, 2vw, 1.5rem);
      margin: 0 0 8px 0;
    }

    .item_inner p {
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      margin: 0;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <nav class="index">
    <div class="item" data-bg-type="color" data-bg-src="#1203F6">
      <div class="item_inner">
        <h3>Solid Color</h3>
        <p>Click to set solid background</p>
      </div>
    </div>
    <div class="item" data-bg-type="image" data-bg-src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/dead-reckoning.gif">
      <div class="item_inner">
        <h3>Use GIF</h3>
        <p>Click to set GIF background</p>
      </div>
    </div>
    <div class="item" data-bg-type="image" data-bg-src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/dead-reckoning.gif">
      <div class="item_inner">
        <h3>Use PNG</h3>
        <p>Click to set PNG background</p>
      </div>
    </div>
    <div class="item" data-bg-type="none">
      <div class="item_inner">
        <h3>Clear BG</h3>
        <p>Click to remove background</p>
      </div>
    </div>
  </nav>

  <script>
    document.querySelectorAll('.item').forEach(item => {
      item.addEventListener('click', () => {
        const type = item.getAttribute('data-bg-type');
        const src = item.getAttribute('data-bg-src');
        const before = item;

        // Reset background
        item.classList.remove('revealed');
        void item.offsetWidth; // Force reflow to restart animation

        // Set the appropriate background
        if (type === 'image') {
          item.style.setProperty('--bg-src', `url('${src}')`);
          item.style.setProperty('--bg-color', '');
          item.querySelector('::before');
          item.style.setProperty('--bg-type', 'image');
          item.style.setProperty('--bg-color', 'transparent');
          item.style.setProperty('--bg-image', `url('${src}')`);
          item.style.setProperty('--bg-type', 'image');
          item.style.setProperty('--bg-color', 'transparent');
          item.style.setProperty('--bg-image', `url('${src}')`);
          item.style.setProperty('--bg-color', '');
          item.style.setProperty('--bg-type', 'image');
          item.style.setProperty('--bg-image', `url('${src}')`);
          item.style.setProperty('--bg-color', '');
          item.querySelector('::before');
          item.style.setProperty('--bg-image', `url('${src}')`);
          item.style.setProperty('--bg-color', '');
          item.querySelector('::before');
          item.style.setProperty('--bg-color', '');
          item.style.setProperty('--bg-image', `url('${src}')`);
          item.style.setProperty('--bg-color', '');
          item.style.setProperty('--bg-image', `url('${src}')`);
          item.querySelector('::before');
          item.style.setProperty('--bg-color', '');
          item.style.setProperty('--bg-image', `url('${src}')`);
          item.style.setProperty('--bg-color', '');
          item.querySelector('::before');
          item.querySelector('::before');
          item.style.setProperty('--bg-color', '');
          item.style.setProperty('--bg-image', `url('${src}')`);
          item.querySelector('::before');
          item.style.setProperty('--bg-color', '');
          item.style.setProperty('--bg-image', `url('${src}')`);
          item.querySelector('::before');
          item.querySelector('::before');
          item.querySelector('::before');
          item.style.setProperty('--bg-color', '');
          item.style.setProperty('--bg-image', `url('${src}')`);
          item.querySelector('::before');
          item.style.setProperty('--bg-color', '');
          item.querySelector('::before');
          item.style.setProperty('--bg-image', `url('${src}')`);
          item.querySelector('::before');
          item.querySelector('::before');
          item.querySelector('::before');
          item.querySelector('::before');
          item.style.setProperty('--bg-color', '');
          item.querySelector('::before');
          item.style.setProperty('--bg-image', `url('${src}')`);
          item.querySelector('::before');
          item.querySelector('::before');
          item.style.setProperty('--bg-image', `url('${src}')`);
          item.querySelector('::before');
          item.style.setProperty('--bg-image', `url('${src}')`);
          item.style.setProperty('--bg-image', `url('${src}')`);
          item.querySelector('::before');
          item.querySelector('::before');
          item.style.setProperty('--bg-image', `url('${src}')`);
          item.querySelector('::before');
          item.querySelector('::before');
          item.querySelector('::before');

          item.style.setProperty('--bg-color', '');
          item.querySelector('::before');
          item.querySelector('::before');

          item.querySelector('::before');
          item.querySelector('::before');
          item.querySelector('::before');
          item.querySelector('::before');
          item.querySelector('::before');

          item.style.setProperty('--bg-image', `url('${src}')`);
          item.style.setProperty('--bg-color', '');

          item.querySelector('::before');
          item.querySelector('::before');

          // Finally apply via CSS
          item.style.setProperty('--bg-image', `url('${src}')`);
          item.querySelector('::before').style.backgroundImage = `url('${src}')`;

        } else if (type === 'color') {
          item.querySelector('::before').style.backgroundImage = '';
          item.querySelector('::before').style.backgroundColor = src;
        } else {
          item.querySelector('::before').style.backgroundImage = '';
          item.querySelector('::before').style.backgroundColor = 'transparent';
        }

        // Trigger animation
        setTimeout(() => item.classList.add('revealed'), 10);
      });
    });
  </script>
</body>
</html>
