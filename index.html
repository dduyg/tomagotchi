<html lang="en">
<head>

    <style>
        @font-face {

}
@font-face {

  src: url('https://memory-work.com/fonts/GlyphWorld-AirLand.otf') format('opentype');

  font-display: auto;
}
@font-face {

  src: url('https://memory-work.com/fonts/GlyphWorld-AnimalSoul.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
  font-display: auto;
}
@font-face {
  font-family: 'Glyphworld flower';
  src: url('https://memory-work.com/fonts/GlyphWorld-Flower.otf') format('opentype');
  font-weight: 400;
  font-style: normal;
  font-display: auto;
}
@font-face {
  font-family: 'Glyphworld forest';
  src: url('https://memory-work.com/fonts/GlyphWorld-Forest.otf') format('opentype');
  font-weight: 400;
  font-style: normal;

}


@font-face {
  font-family: 'Glyphworld meadow'; 
  src: url('GlyphWorld-Meadow.woff') format('woff'),
       url('GlyphWorld-Meadow.woff2') format('woff2');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
} 
@font-face {
  font-family: 'Gallique';
  src: url('Gallique-Light.woff2') format('woff2'),
       url('Gallique-Light.woff') format('woff');
  font-weight: 300;
  font-style: normal;
  font-display: swap;
}
      body {
          background-image: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/detail-11.jpg');
          background-size: cover;
          background-position: center;     
  font-family: 'Glyphworld meadow', sans-serif;
  font-size: 2rem;
        color: #FBFBFB;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.chromaticPulseCircle {
    width: 0.5em;
    height: 0.5em;
    border-radius: 50%;
    background-color: red;
    animation: chromaticPulse 12s infinite ease-in-out;
}
@keyframes chromaticPulse {
    0% {
        transform: scale(1);
        background-color: red;
        opacity: 1;
    }
    20% {
        transform: scale(1.3);
        background-color: orange;
        opacity: 0.9;
    }
    40% {
        transform: scale(1);
        background-color: yellow;
        opacity: 1;
    }
    60% {
        transform: scale(1.3);
        background-color: green;
        opacity: 0.9;
    }
    80% {
        transform: scale(1);
        background-color: blue;
        opacity: 1;
    }
    100% {
        transform: scale(1.3);
        background-color: red;
        opacity: 0.9;
    }
}
    </style>
</head>
<body>
    <p>And what if these<br>poor letters dream</p>
    <p>Of freedom from<br>the page & screen?</p>
    <div class="chromaticPulseCircle"></div>
    <p>Perhaps they long<br>to love or kill</p>
    <p>Or rearange<br>themselves at will</p>
</body>
</html>
