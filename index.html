<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@1,600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
body{    
  font-family: 'Source Sans Pro', sans-serif;    
  background: #000;    
}    
.container{    
  text-align: center;    
  position: absolute;    
  top: 50%;    
  left: 50%;    
  transform: translate(-50%,-50%);    
  width: 100%;    
}    
.container span{    
  text-transform: uppercase;    
  display: block;    
}    
.text1{    
  color: white;    
  font-size: 60px;    
  font-weight: 700;    
  letter-spacing: 8px;    
  margin-bottom: 20px;    
  background: black;    
  position: relative;    
  animation: text 4s 1;    
}    
.text2{    
  font-size: 30px;    
  color: #6ab04c;    
}    
    
@keyframes text {    
  0%{    
    color: black;    
    margin-bottom: -40px;    
  }    
  30%{    
    letter-spacing: 25px;    
    margin-bottom: -40px;    
  }    
  85%{    
    letter-spacing: 8px;    
    margin-bottom: -40px;    
  }    
}    
    </style>    
</head>    
<body>    
  <div class="container">    
    <span class="text1">Moon Ga-young</span>    
    <span class="text2">Welcomes You</span>    
  </div>     
</body>    
</html>
