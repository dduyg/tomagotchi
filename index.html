<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        body {
            background-color: #2b2b2b;
            color: #f5f5f5;
            font-family: 'Courier New', Courier, monospace; /* Punk-inspired font */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .video-container {
            border: 5px solid #ff0000; /* Red, to add a rebellious tone */
            padding: 15px;
            width: 80%;
            background: linear-gradient(135deg, #444, #111); /* Grungy background */
            box-shadow: 0px 0px 10px rgba(255, 0, 0, 0.6); /* Glowing red shadow */
            margin: 20px;
        }

        video {
            width: 100%; /* Full width video */
            height: auto;
            border: 2px solid #ff0000; /* Border around the video */
        }

        h3 {
            margin-top: 20px;
            color: #ff0000; /* Red text for emphasis */
            font-size: 1.8em;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7); /* Shadow for a more rugged look */
        }

        body::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/green-dust-and-scratches.png');
            z-index: -1;
            opacity: 0.1;
        }

        /* Adding a distressed look to the container */
        .video-container {
            border-radius: 5px;
            background: rgba(0, 0, 0, 0.7);
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video controls>
            <source src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/04/FadedEchoes.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <h3>Apocalyptic Video</h3>
    </div>
</body>
</html>
