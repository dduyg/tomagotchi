<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal Loop</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    :root {
      --color-main: rgba(0, 0, 0, 0.87);
      --color-light-main: #292721; 
      --marker: #C9C9BF;
      --back: #9e9e9e;
      --main-font: "Fira Sans", sans-serif;
      --mono-font: "Source Code Pro", monospace;
    }
    html, body {
      height: 100%;
      background-color: var(--back);
      color: var(--color-main);
      font-family: var(--main-font);
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;

      font-feature-settings: "palt";
      font-synthesis: none;
      -moz-osx-font-smoothing: grayscale;
       margin: 0;
       padding: 0;
    }
    a {
      color: inherit;
      text-decoration: none;
    }

    .siteHeader {
      position: fixed;
      z-index: 10;
      top: 0;
      left: 0;
      width: 100%;
      padding: 1.2rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .siteHeader_title {
      display: block;
      font-size: 1.5rem;
      letter-spacing: 3px;
      cursor: pointer;
      animation: stretch 1s infinite alternate;
    }
    @keyframes stretch {
      0% { transform: scaleY(1); }
      50% { transform: scaleY(1.2); }
      100% { transform: scaleY(1); }
    }
    
    #aside-menu {
      display: none; /* Hide this by default for smaller screens */
    }

    .siteHeader_menuBtn {
      position: relative;
      width: 43px;
      height: 28.5px;
      cursor: pointer;
    }
    .siteHeader_menuBtn .ring {
      position: absolute;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      border: 1.5px solid currentColor;
      transition: transform 0.3s ease;
      pointer-events: none;
      transform: scaleY(0.5);
      transform-origin: center top;
    }
    .siteHeader_menuBtn .ring1 { top: 3px; }
    .siteHeader_menuBtn .ring2 { top: 8px; }
    .siteHeader_menuBtn .ring3 { top: 13px; }

    .siteHeader_menuBtn.active .ring {
      transform: translateY(6px) scaleY(0.8);
      border-color: white;
    }

    .dropNav {
      position: fixed;
      top: 6rem;
      right: 2rem;
      width: 85%;
      max-width: 550px;
      visibility: hidden;
      z-index: 11;
    }
    .dropNav .item {
      display: block;
      border: solid var(--color-main);
      border-width: 2px 1px 1px 2px;
      border-radius: 50%;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      padding: .5rem 1rem;
      margin-bottom: .5rem;
      background: #898989;
      text-align: center;
      font-size: 1.8em;
      font-family: "Syncopate", sans-serif;
      cursor: pointer;
      transition: transform 0.5s ease, opacity 0.5s ease;
      transform: translateX(100%); /* Initially out of screen on the right */
      opacity: 0;
    }
    
    .dropNav .item.active {
      opacity: 1;
      transform: translateX(0); /* Move into view */
    }
    /* Apply staggered delay animation */
    .dropNav .item:nth-child(1) { transition-delay: 0.2s; }
    .dropNav .item:nth-child(2) { transition-delay: 0.4s; }
    .dropNav .item:nth-child(3) { transition-delay: 0.6s; }
    .dropNav .item:nth-child(4) { transition-delay: 0.8s; }
    .dropNav .item:nth-child(5) { transition-delay: 1s; }

    @media screen and (min-width: 30em) {  /* Navigation for larger screens */
      .siteHeader {
        padding: 1.5rem 4rem;
      }
      #aside-menu {
        display: block;
        text-align: right;
        font-family: var(--mono-font);
      }
      #aside-menu .item {
        display: inline-block;
        font-size: 1.1em;
        margin-right: 1.2rem;
        cursor: pointer;
      }
      .item.active {
        font-weight: bold;
      }
      #drop-menu {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="siteHeader">
    <a class="siteHeader_title" href="{{ site.baseurl }}/">/dduyg</a>
    <nav id="aside-menu"> 
      <a class="item {% if page.url contains '/posts/' %}active{% endif %}" href="{{ site.baseurl }}/posts">posts</a>
      <a class="item {% if page.url == '/about.html' %}active{% endif %}" href="{{ site.baseurl }}/about">about</a>
      <a class="item {% if page.url contains '/works/' %}active{% endif %}" href="{{ site.baseurl }}/works">works</a>
      <a class="item {% if page.url == '/contact.html' %}active{% endif %}" href="{{ site.baseurl }}/contact">contact</a>
    </nav>
    <nav id="drop-menu">
      <div class="siteHeader_menuBtn" id="menuBtn">
        <div class="ring ring1"></div>
        <div class="ring ring2"></div>
        <div class="ring ring3"></div>
      </div>
      <div class="dropNav">
        <a class="item {% if page.url == '/' %}active{% endif %}" href="{{ site.baseurl }}/">home</a>
        <a class="item {% if page.url contains '/posts/' %}active{% endif %}" href="{{ site.baseurl }}/posts">posts</a>
        <a class="item {% if page.url == '/about.html' %}active{% endif %}" href="{{ site.baseurl }}/about">about</a>
        <a class="item {% if page.url contains '/works/' %}active{% endif %}" href="{{ site.baseurl }}/works">works</a>
        <a class="item {% if page.url == '/contact.html' %}active{% endif %}" href="{{ site.baseurl }}/contact">contact</a>
      </div>
    </nav>
  </div>

  <script>
    const menuBtn = document.getElementById('menuBtn');
    const dropContent = document.querySelector('.dropNav');

    menuBtn.addEventListener('click', () => {
      // Toggle the 'active' class on the menu button and toggle visibility of drop content
      menuBtn.classList.toggle('active');
      dropContent.style.visibility = 
        dropContent.style.visibility === 'visible' ? 'hidden' : 'visible';

      // Add 'active' to each drop item for the staggered transition
      const items = dropContent.querySelectorAll('.item');
      items.forEach(item => item.classList.toggle('active'));
    });
  </script>
</body>
</html>
