<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiminalLoop</title>
  <style>
    /* Global Styles */
    body {
      margin: 0;
      padding: 5em 1em;
      background: #c5c6f9;
      color: black;
      font-family: Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    /* Navigation Styles */
    nav {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .nav-item {
      display: block;
      font-size: 3.5rem;
      line-height: 1;
      letter-spacing: -0.1em;
      text-transform: uppercase;
      margin: 0.5em 0;
      position: relative;
      overflow: hidden;
    }

    .nav-item a {
      display: block;
      text-decoration: none;
      color: inherit;
      transition: color 0.3s ease;
    }

    .nav-item a:hover {
      color: #ff4c00;
    }

    .holder {
      display: flex;
      align-items: center;
      position: relative;
      transition: transform 1s cubic-bezier(0.165, 0.875, 0.02, 1);
    }

    .holder svg {
      position: absolute;
      top: 50%;
      left: 0;
      height: 60%;
      transform: translateX(-120%) translateY(-50%);
      transition: transform 1s cubic-bezier(0.165, 0.875, 0.02, 1);
    }

    .nav-item a:hover .holder {
      transform: translateX(1em);
    }

    .nav-item a:hover .holder svg {
      transform: translateX(-100%) translateY(-50%);
    }
  </style>
</head>
<body>
  <nav>
    <div class="nav-item"><a href="#home"><div class="holder"><svg class="icon" viewBox="0 0 542 62"><use href="#icon-path"></use></svg>Home</div></a></div>
    <div class="nav-item"><a href="#badass"><div class="holder"><svg class="icon" viewBox="0 0 542 62"><use href="#icon-path"></use></svg>Badass</div></a></div>
    <div class="nav-item"><a href="#photo"><div class="holder"><svg class="icon" viewBox="0 0 542 62"><use href="#icon-path"></use></svg>Photo</div></a></div>
    <div class="nav-item"><a href="#film"><div class="holder"><svg class="icon" viewBox="0 0 542 62"><use href="#icon-path"></use></svg>Film</div></a></div>
    <div class="nav-item"><a href="#blog"><div class="holder"><svg class="icon" viewBox="0 0 542 62"><use href="#icon-path"></use></svg>Blog</div></a></div>
    <div class="nav-item"><a href="#contact"><div class="holder"><svg class="icon" viewBox="0 0 542 62"><use href="#icon-path"></use></svg>Contact</div></a></div>
  </nav>

  <!-- Define the reusable SVG -->
  <svg id="icon-path" viewBox="0 0 542 62" style="display:none;">
    <path d="M510.2 61.1l-2.1-2.2 27.3-26.4H.7v-3h534.8L508.1 3.1l2.1-2.2L541.3 31l-31.1 30.1z"></path>
  </svg>
</body>
</html>
