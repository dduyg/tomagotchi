<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>LiminalLoop</title>
  <style>
@font-face {
  font-family: "PPSupplyMono";
  src: url("https://assets.codepen.io/7558/PPSupplyMono-Regular.ttf")
    format("truetype");
  font-weight: normal;
  font-style: normal;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #fafafa;
  font-family: "PPSupplyMono", "Courier New", monospace;
  width: 100vw;
  min-height: 100vh;
  overflow-x: hidden;
  text-transform: uppercase;
  font-size: 12px;
  color: #1a1a1a;
}

.container {
  width: 100vw;
  padding: 2rem;
}

/* Email hover effect */
a {
  position: relative;
  cursor: pointer;
  color: #1a1a1a;
  padding: 0;
  display: inline-block;
  text-decoration: none;
  opacity: 1;
  transition: color 0.3s ease;
}
a::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 100%;
  background-color: #1a1a1a;
  z-index: -1;
  transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
a:hover::after {
  width: 100%;
}
a:hover {
  color: #fafafa;
  mix-blend-mode: difference;
  opacity: 1;
}

.image-title {
  margin-top: 8px;
  font-size: 10px;
  color: #1a1a1a;
  transform: translateX(0px);
  will-change: transform, color;
  position: relative;
  display: inline-block;
  transition: color 0.2s cubic-bezier(0.23, 1, 0.32, 1),
    transform 0.2s cubic-bezier(0.23, 1, 0.32, 1);
}

.image-title::before {
  content: "•";
  position: absolute;
  left: -12px;
  top: 0;
  opacity: var(--before-opacity, 0);
  transform: translateX(var(--before-x, -8px));
  color: #666;
  transition: opacity 0.2s cubic-bezier(0.23, 1, 0.32, 1),
    transform 0.2s cubic-bezier(0.23, 1, 0.32, 1);
}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
      <div>∞.Cycles</div>
      <div>[analog.mystic]</div>
      <div>
        <a href="#" class="email-link">hi@filip.fyi</a>
        <span> — 2024.25</span>
      </div>
  </div>

  <div class="image-box">   
      <div class="image-title">Deep Focus</div>
      <div class="image-title">Process Work</div>
      <div class="image-title">Raw Energy</div>
      <div class="image-title">Final Take</div>
  </div>
</div>
</body>
</html>
