<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>  
  <title>Liminal🥟Loop</title>  
  <style>  
    body {  
      margin: 0;  
      font-family: Arial, sans-serif;  
      height: 100vh;  
      overflow: hidden;  
      background: #00ffc8; /* bright aqua background */  
      color: #1a0033; /* dark purple text */  
    }  
  
    .tab-container {  
      display: flex;  
      flex-direction: row;  
      width: 100%;  
      height: 100%;  
    }  
  
    .tab-content-area {  
      flex: 1;  
      display: flex;  
      align-items: center;  
      justify-content: center;  
      position: relative;  
      overflow: hidden;  
      background: #70e1f5; /* soft cyan background */  
      color: #1a0033;  
    }  
  
    .tab-content {  
      display: none;  
      position: absolute;  
      top: 0;  
      left: 0;  
      right: 0;  
      bottom: 0;  
      padding: 40px;  
      background: rgba(156, 39, 176, 0.8); /* semi-transparent purple */  
      opacity: 0;  
      transform: translateX(-30px);  
      transition: opacity 0.3s ease, transform 0.3s ease;  
      display: flex;  
      align-items: center;  
      justify-content: center;  
      font-size: 1.1rem;  
      color: #fff;  
      text-shadow: 0 0 5px #ff00ff, 0 0 10px #00ffff;  
      border-radius: 10px;
    }  
  
    .tab-content.active {  
      display: flex;  
      animation: fadeInLeft 0.6s ease forwards;  
    }  
  
    @keyframes fadeInLeft {  
      from {  
        opacity: 0;  
        transform: translateX(-30px);  
      }  
      to {  
        opacity: 1;  
        transform: translateX(0);  
      }  
    }  
  
    .tab-buttons {  
      display: flex;  
      flex-direction: column;  
      justify-content: center;  
      align-items: center;  
      background: #ff6eff; /* neon pink */  
      border-left: 2px solid #00fff7; /* bright aqua */  
      padding: 10px 0;  
    }  
  
    .tab-button {  
      width: 60px;  
      height: 60px;  
      display: flex;  
      justify-content: center;  
      align-items: center;  
      border-bottom: 2px solid #00fff7;  
      cursor: pointer;  
      background: #7d00ff; /* deep violet */  
      transition: background 0.3s, color 0.3s;  
      font-size: 24px;  
      color: #00fff7;  
      text-shadow: 0 0 5px #00fff7;  
      border-radius: 8px 8px 0 0;
      user-select: none;
    }  
  
    .tab-button:hover {  
      background: #00fff7;  
      color: #7d00ff;  
      text-shadow: 0 0 10px #7d00ff;  
    }  
  
    .tab-button.active {  
      background: #00fff7;  
      color: #7d00ff;  
      box-shadow: 0 0 15px #ff6eff;  
      text-shadow: 0 0 15px #7d00ff;  
    }  
  </style>  
</head>  
<body>  
  <div class="tab-container">  
    <div class="tab-content-area">  
      <div class="tab-content active" id="content1">Profile section content goes here.</div>  
      <div class="tab-content" id="content2">Settings section content goes here.</div>  
      <div class="tab-content" id="content3">Web section content goes here.</div>  
      <div class="tab-content" id="content4">Message section content goes here.</div>  
    </div>  
  
    <div class="tab-buttons">  
      <div class="tab-button active" data-target="content1">👤</div>  
      <div class="tab-button" data-target="content2">🛠️</div>  
      <div class="tab-button" data-target="content3">🌐</div>  
      <div class="tab-button" data-target="content4">✈️</div>  
    </div>  
  </div>  
  
  <script>  
    const buttons = document.querySelectorAll('.tab-button');  
    const contents = document.querySelectorAll('.tab-content');  
  
    buttons.forEach(button => {  
      button.addEventListener('click', () => {  
        buttons.forEach(btn => btn.classList.remove('active'));  
        contents.forEach(content => {  
          content.classList.remove('active');  
          content.style.display = 'none';  
        });  
  
        button.classList.add('active');  
        const target = document.getElementById(button.dataset.target);  
        target.style.display = 'flex'; // needed to trigger animation  
        setTimeout(() => {  
          target.classList.add('active');  
        }, 10); // slight delay ensures animation works  
      });  
    });  
  </script>  
</body>  
</html>
