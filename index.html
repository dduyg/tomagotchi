<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            background: #2e1a47;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }

        h1 {
            font-size: 6rem;
            letter-spacing: 5px;
            color: #ff00ff;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.7), 0 0 20px rgba(255, 0, 255, 0.5);

        h2 {

            margin-top: -20px;
            color: #ffb6c1;
            text-shadow: 0 0 8px rgba(255, 182, 193, 0.7);
        }

        .links {
            margin-top: 50px;
            display: flex;
            gap: 30px;
        }

        .link {
            font-size: 1.5rem;
            color: #00ffcc;
            text-decoration: none;
            transition: color 0.3s ease-in-out;
        }

        .link:hover {
            color: #ff00ff;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.7);
        }

        .logo {
            width: 150px;
            margin-bottom: 40px;
            fill: #ff00ff;
            transition: fill 0.3s ease;
        }

        .logo:hover {
            fill: #00ffcc;
        }

        .footer {
            position: fixed;
            bottom: 10px;
            font-size: 1rem;
            color: #ffb6c1;
            text-shadow: 0 0 5px rgba(255, 182, 193, 0.7);
        }

    </style>
</head>
