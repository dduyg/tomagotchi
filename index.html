<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Fountain</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: monospace;
            text-align: center;
            overflow: hidden;
        }
        pre {
            font-size: 12px;
            line-height: 12px;
            white-space: pre;
            display: inline-block;
        }
    </style>
</head>
<body>
    <pre id="fountain"></pre>

    <script>
        function generateFountain(width, height) {
            let fountain = [];
            let center = Math.floor(width / 2);

            for (let y = 0; y < height; y++) {
                let row = "";
                for (let x = 0; x < width; x++) {
                    let distance = Math.abs(center - x) + y;
                    if (distance % 6 === 0) {
                        row += "V"; // Water droplet character
                    } else {
                        row += " ";
                    }
                }
                fountain.push(row);
            }
            return fountain.join("\n");
        }

        function animateFountain() {
            let width = 60;
            let height = 20;
            let fountainElement = document.getElementById("fountain");

            function update() {
                fountainElement.textContent = generateFountain(width, height);
                setTimeout(update, 200);
            }
            update();
        }

        animateFountain();
    </script>
</body>
