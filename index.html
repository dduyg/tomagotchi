<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Audiowide", sans-serif;
      background: #010111;
      color: #fff;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Menu styles */
    .menu {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }

    .menu-link {
      position: relative;
      text-decoration: none;
      font-size: 1.5rem;
      text-transform: uppercase;
      display: inline-flex;
      align-items: center; /* Align text and arrow */
      gap: 0.2rem; /* Small gap between arrow and text */
      transition: transform 0.3s ease, color 0.3s ease;
      -webkit-text-stroke: 0px transparent; /* No stroke by default */
      text-stroke: 0px transparent; /* Fallback for non-webkit browsers */
    }

    .menu-link:hover {
      color: #010111; 
      transform: translateX(10px); /* Moves the entire link (arrow + text) */  
      -webkit-text-stroke: 1px #c5c6f9;
      text-stroke: 1px #c5c6f9; /* Fallback for non-webkit browsers */
    }

    /* Arrow animation */
    .menu-link::before {
      content: '⌲';
      opacity: 0;
      transform: translateX(-10px); /* Initially offset to the left */
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .menu-link:hover::before {
      opacity: 1;
      transform: translateX(0); /* Moves into place */
    }
  </style>
</head>
<body>
  <ul class="menu">
    <li><a href="#badass" class="menu-link">Badass</a></li>
    <li><a href="#cool" class="menu-link">Cool</a></li>
    <li><a href="#awesome" class="menu-link">Awesome</a></li>
  </ul>
</body>
</html>
