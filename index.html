<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>LiminalLoop</title>
  <style>
    @font-face {
      font-family: "PPSupplyMono";
      src: url("https://assets.codepen.io/7558/PPSupplyMono-Regular.ttf") format("truetype");
      font-weight: normal;
      font-style: normal;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }
    body {
      display: grid;
      grid-template-rows: auto 1fr auto; /* header | main | footer */
      font-family: "PPSupplyMono", monospace;
      background: #fafafa;
      text-transform: uppercase;
      font-size: 12px;
      color: #1a1a1a;
    }
    
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 3rem 1rem;
      z-index: 2;
    }
    header a {
      position: relative;
      color: inherit;
      text-decoration: none;
      font-weight: 700;
      transition: color 0.3s ease;
    }
    header a::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 0;
      height: 100%;
      background-color: #1a1a1a;
      z-index: -1;
      transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    header a:hover::after {
      width: 100%;
    }
    header a:hover {
      color: #fafafa;
      mix-blend-mode: difference;
    }
    
    main {
      position: relative;
      overflow-y: auto;
    }
    #bg {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 1rem;
      z-index: 0;
    }
    #bg .column {
      background: rgba(255, 0, 0, 0.2);
      border: 1px solid red;
      min-height: 100%;
      position: relative;
    }
    #bg .column::before {
      content: attr(data-col);
      position: absolute;
      top: 8px;
      left: 8px;
      font-size: 10px;
      color: red;
      background: white;
      padding: 2px 4px;
    }

    section {
      position: relative;
      padding: 2rem;
      z-index: 1;
    }
    
    footer {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      padding: 1rem;
      text-align: center;
      z-index: 2;
    }
    .title {
      font-size: 10px;
      position: relative;
      transition: color 0.2s ease, transform 0.2s ease;
    }
    .title::before {
      content: "•";
      position: absolute;
      left: -12px;
      opacity: var(--before-opacity, 0);
      transform: translateX(var(--before-x, -8px));
      color: #666;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }
  </style>
</head>
<body>
  <header>
    <div>∞.Cycles</div>
    <div>
      <a href="#">[analog.mystic]</a>
      <span> — 2024.25</span>
    </div>
  </header>

  <main>
    <div id="bg">
      <div class="column" data-col="1"></div>
      <div class="column" data-col="2"></div>
      <div class="column" data-col="3"></div>
      <div class="column" data-col="4"></div>
      <div class="column" data-col="5"></div>
      <div class="column" data-col="6"></div>
      <div class="column" data-col="7"></div>
      <div class="column" data-col="8"></div>
      <div class="column" data-col="9"></div>
      <div class="column" data-col="10"></div>
      <div class="column" data-col="11"></div>
      <div class="column" data-col="12"></div>
    </div>

    <section>
      <!-- Your main content goes here -->
      content main ....
    </section>
  </main>

  <footer>
    <a href="#" class="title">Movement Study</a>
    <a href="#" class="title">Process Work</a>
    <a href="#" class="title">Raw Energy</a>
  </footer>
</body>
</html>
