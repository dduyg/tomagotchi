<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liminal🏁Loop</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html { font-size: calc(100vw / 1512 * 10); }
    body {
      margin: 0;
      padding: 0;
      font-family: serif;
      background: radial-gradient(circle at 10% 20%, #000 0%, #0a0a14 90%);
      color: #e6e6e6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
      width: 100vw;
      height: 100vh;
    }

    /* Header Navigation */
    .header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 1.6rem 3.2rem;
      z-index: 10;
    }
    .header__nav {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 1rem;
    }
    .nav-item {
      display: inline-block;
    }
    .nav-item a {
      color: inherit;
      text-decoration: none;
      font-size: 1.6rem;
    }

    /* Hero Section */
    .hero {
      position: relative;
      z-index: 5;
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
    }
    .hero__content {
      z-index: 10;
    }
    .hero__title {
      font-size: 18rem;
      font-weight: 700;
      letter-spacing: -0.05em;
      line-height: 0.85;
      padding: 0 3.2rem;
    }
    .hero__line {
      display: block;
    }

    /* Bottom Text */
    .hero__bottom {
      position: absolute;
      bottom: 3.2rem;
      width: 100%;
      padding: 0 3.2rem;
      text-align: center;
      z-index: 10;
    }
    .bottom-text {
      font-size: 1.4rem;
      opacity: 0.8;
      letter-spacing: 0.05em;
      animation: fadeIn 1.5s ease-out 1.2s forwards;
      opacity: 0;
    }

    /* Text Reveal Animation */
    [data-animation="text-reveal"] {
      display: block;
      overflow: hidden;
    }
    [data-animation="text-reveal"] > * {
      display: block;
      transform: translateY(100%);
      animation: revealText 1.2s cubic-bezier(0.77, 0, 0.175, 1) forwards;
    }

    .header__nav .nav-item:nth-child(1) [data-animation="text-reveal"] > * { animation-delay: 0.2s; }
    .header__nav .nav-item:nth-child(2) [data-animation="text-reveal"] > * { animation-delay: 0.3s; }
    .header__nav .nav-item:nth-child(3) [data-animation="text-reveal"] > * { animation-delay: 0.4s; }
    .header__nav .nav-item:nth-child(4) [data-animation="text-reveal"] > * { animation-delay: 0.5s; }

    .hero__title span:nth-child(1) [data-animation="text-reveal"] > * { animation-delay: 0.7s; }
    .hero__title span:nth-child(2) [data-animation="text-reveal"] > * { animation-delay: 0.8s; }
    .hero__title span:nth-child(3) [data-animation="text-reveal"] > * { animation-delay: 0.9s; }

    @keyframes revealText {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 0.8; }
    }

    /* Responsive Typography */
    @media (max-width: 768px) {
      html { font-size: calc(100vw / 768 * 10); }
      .hero__title { font-size: 12rem; }
    }

    @media (max-width: 480px) {
      html { font-size: calc(100vw / 480 * 10); }
      .hero__title { font-size: 8rem; }
      .header { padding: 1rem; }
      .hero__title { padding: 0 1rem; }
      .hero__bottom { bottom: 2rem; }
    }
  </style>
</head>
<body>
  <header class="header">
    <nav class="header__nav">
      <div class="nav-item" data-animation="text-reveal"><a href="#">Emptiness</a></div>
      <div class="nav-item" data-animation="text-reveal"><a href="#">Stillness</a></div>
      <div class="nav-item" data-animation="text-reveal"><a href="#">Surrender</a></div>
      <div class="nav-item" data-animation="text-reveal"><a href="#">Becoming</a></div>
    </nav>
  </header>

  <section class="hero">
    <div class="hero__content">
      <h1 class="hero__title">
        <span data-animation="text-reveal"><span class="hero__line">LISTEN</span></span>
        <span data-animation="text-reveal"><span class="hero__line">TO THE</span></span>
        <span data-animation="text-reveal"><span class="hero__line">NOTHING</span></span>
      </h1>
    </div>
    <div class="hero__bottom">
      <p class="bottom-text">What happens in the void between thoughts is where truth emerges</p>
    </div>
  </section>

  <script type="module">
    import * as THREE from "https://cdn.skypack.dev/three@0.136.0";
    import { OrbitControls } from "https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls.js";

    const raycaster = new THREE.Raycaster();
    const mouse = new THREE.Vector2();
    let lastMouseMoveTime = 0;
    let lastMousePosition = new THREE.Vector2();
    let mouseSpeed = 0;
    let lastMouseSpeed = 0;

    const loader = new THREE.TextureLoader();
    const matcapTexture = loader.load("https://raw.githubusercontent.com/nidorx/matcaps/master/1024/0A0A0A_A9A9A9_525252_747474.png");

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x000000);

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.body.appendChild(renderer.domElement);

    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
    camera.position.set(-30, 15, 30);
    camera.lookAt(0, 0, 0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.1;

    const matcapMaterial = new THREE.MeshMatcapMaterial({ matcap: matcapTexture });

    const gridSize = 80;
    const spacing = 0.4;
    const geometry = new THREE.SphereGeometry(0.15, 32, 32);

    const spheres = [];
    const originalPositions = [];

    for (let i = -gridSize / 2; i < gridSize / 2; i++) {
      for (let j = -gridSize / 2; j < gridSize / 2; j++) {
        const sphere = new THREE.Mesh(geometry, matcapMaterial);
        const position = new THREE.Vector3(i * spacing, 0, j * spacing);
        sphere.position.copy(position);
        scene.add(sphere);
        spheres.push(sphere);
        originalPositions.push(position.clone());
      }
    }

    window.addEventListener("mousemove", onMouseMove);

    function onMouseMove(event) {
      const currentTime = performance.now();
      const deltaTime = (currentTime - lastMouseMoveTime) / 1000;
      lastMouseMoveTime = currentTime;

      const rect = renderer.domElement.getBoundingClientRect();

      if (
        event.clientX >= rect.left &&
        event.clientX <= rect.right &&
        event.clientY >= rect.top &&
        event.clientY <= rect.bottom
      ) {
        const newMouseX = ((event.clientX - rect.left) / rect.width) * 2 - 1;
        const newMouseY = -((event.clientY - rect.top) / rect.height) * 2 + 1;

        const dx = newMouseX - lastMousePosition.x;
        const dy = newMouseY - lastMousePosition.y;
        mouseSpeed = Math.sqrt(dx * dx + dy * dy) / deltaTime;

        mouse.set(newMouseX, newMouseY);
        lastMousePosition.set(newMouseX, newMouseY);
      } else {
        mouse.x = -9999;
      }
    }

    function getMouseWorldPosition() {
      raycaster.setFromCamera(mouse, camera);
      const intersects = raycaster.intersectObject(plane);
      return intersects.length > 0 ? intersects[0].point : null;
    }

    const planeGeometry = new THREE.PlaneGeometry(500, 500);
    const planeMaterial = new THREE.MeshBasicMaterial({ visible: false });
    const plane = new THREE.Mesh(planeGeometry, planeMaterial);
    plane.rotation.x = -Math.PI / 2;
    scene.add(plane);

    const guiParams = {
      rippleSpeed: 1.5,
      rippleFrequency: 0.95,
      rippleAmplitude: 0.5,
      attenuation: 0.15,
      interactionRadius: 8.0,
      waveLifetime: 2.0,
      minSpeed: 0.5,
      maxSpeed: 10,
      minRippleDistance: 0.5,
      maxRippleHeight: 1.0,
      maxRipples: 15,
      velocityFactor: 0.7,
      transitionSpeed: 0.05,
      returnSpeed: 0.02
    };

    let rippleOrigins = [];
    let rippleStartTimes = [];
    let rippleStrengths = [];
    let lastRippleOrigin = new THREE.Vector3();
    let movingState = 0;

    function calculateRipple(distance, time, strength) {
      const waveLength = (2 * Math.PI) / guiParams.rippleFrequency;
      const phase = time * guiParams.rippleSpeed;
      const amplitude = guiParams.rippleAmplitude * strength * Math.exp(-guiParams.attenuation * distance);
      return amplitude * Math.sin(2 * Math.PI * (distance / waveLength - phase));
    }

    function animate() {
      requestAnimationFrame(animate);
      const time = performance.now() * 0.001;

      lastMouseSpeed = THREE.MathUtils.lerp(lastMouseSpeed, mouseSpeed, 0.1);

      const velocityFactor = THREE.MathUtils.clamp(
        (lastMouseSpeed - guiParams.minSpeed) /
        (guiParams.maxSpeed - guiParams.minSpeed),
        0, 1
      );

      const isMouseMoving = performance.now() - lastMouseMoveTime < 16;

      movingState = THREE.MathUtils.lerp(
        movingState,
        isMouseMoving ? 1 : 0,
        guiParams.transitionSpeed
      );

      const mouseWorldPos = getMouseWorldPosition();

      if (
        movingState > 0.1 &&
        mouseWorldPos &&
        (!lastRippleOrigin || mouseWorldPos.distanceTo(lastRippleOrigin) > guiParams.minRippleDistance)
      ) {
        rippleOrigins.push(mouseWorldPos.clone());
        rippleStartTimes.push(time);
        rippleStrengths.push(1.0 + velocityFactor * guiParams.velocityFactor);
        lastRippleOrigin.copy(mouseWorldPos);

        if (rippleOrigins.length > guiParams.maxRipples) {
          rippleOrigins.shift();
          rippleStartTimes.shift();
          rippleStrengths.shift();
        }
      }

      for (let i = 0; i < spheres.length; i++) {
        const sphere = spheres[i];
        const originalPos = originalPositions[i];
        const position = sphere.position;

        let rippleY = 0;

        for (let j = 0; j < rippleOrigins.length; j++) {
          const origin = rippleOrigins[j];
          const elapsedTime = time - rippleStartTimes[j];
          const distance = position.distanceTo(origin);

          if (elapsedTime < guiParams.waveLifetime) {
            rippleY += calculateRipple(distance, elapsedTime, rippleStrengths[j]);
          }
        }

        rippleY = THREE.MathUtils.clamp(rippleY, -guiParams.maxRippleHeight, guiParams.maxRippleHeight);
        const transitionFactor = movingState > 0.1 ? guiParams.transitionSpeed : guiParams.returnSpeed;

        sphere.position.y = THREE.MathUtils.lerp(sphere.position.y, originalPos.y + rippleY * movingState, transitionFactor);

        const horizontalOffset = rippleY * 0.1 * movingState;
        sphere.position.x = THREE.MathUtils.lerp(sphere.position.x, originalPos.x + horizontalOffset, transitionFactor);
        sphere.position.z = THREE.MathUtils.lerp(sphere.position.z, originalPos.z + horizontalOffset, transitionFactor);
      }

      const currentTime = time;
      rippleOrigins = rippleOrigins.filter((_, i) => currentTime - rippleStartTimes[i] < guiParams.waveLifetime);
      rippleStartTimes = rippleStartTimes.filter((startTime) => currentTime - startTime < guiParams.waveLifetime);
      rippleStrengths = rippleStrengths.filter((_, i) => currentTime - rippleStartTimes[i] < guiParams.waveLifetime);

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    window.addEventListener("resize", () => {
      renderer.setSize(window.innerWidth, window.innerHeight);
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
    });
  </script>
</body>
</html>
