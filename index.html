<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🫧Liminal Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Wire+One&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@400..700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Kode Mono", monospace;
      background: #f0f0f0;
      color: #282c34;
      line-height: 1.6;
      margin: 0;
      padding: 0;
    }
    main {
      width: 95%;
      margin: 0 auto 20%;
      padding: 30% 5% 1rem;
    }


    .link {
      color: inherit;
      text-decoration: none;
      font-weight: bold;
      padding: 2px 0;
      display: inline-block;
      position: relative;
      transition: color 0.6s;
      outline: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      cursor: pointer;
    }
    .link:hover {
      color: white;
    }
    .link::before {
      content: "";
      position: absolute;
      display: block;
      z-index: -1;
      bottom: 0;
      left: 0;
      height: 3px;
      width: 100%;
      background-color: blue;
      transition: height 0.6s, width 0.6s, transform 0.6s;
    }
    .link:hover::before {
      height: 100%;
      width: calc(100% + 0.5em);
      transform: translateX(-0.25em) skew(-7deg);
    }
  </style>
</head>
<body>
  <main> 
    culture waveform syntax ▪ oceanic <a href="#" class="link">data</a> flow
  </main>
</body>
</html>
