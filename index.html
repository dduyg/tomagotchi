<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔦LiminalLoop</title>
  <link href="https://fonts.googleapis.com/css2?family=Alegreya+Sans:ital,wght@0,100;0,300;0,400;0,500;0,700;0,800;0,900;1,100;1,300;1,400;1,500;1,700;1,800;1,900&family=Fira+Code:wght@300..700&display=swap" rel="stylesheet">
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      scroll-behavior: smooth;
    }
    nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      z-index: 1000;
      padding: 10px 0;
    }
    nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-size: 12px;
    }
    nav a:hover {
      text-decoration: underline;
    }
    section {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    } 
    #void404 {
      font-family: "Alegreya Sans", sans-serif;
      background-color: darkgray;
      color: #353839;
      font-size: 1.4rem;
      line-height: 1.5;
      flex-direction: column;
      overflow: hidden;
    }
    #void404 main {
      max-width: 600px;
      margin: 0 auto;
      padding: 0 2em;
      text-align: center;
    }
    #void404 h1 {
      font-size: 5rem;
      color: #7F7F7F;
      letter-spacing: 4px;
      font-family: "Fira Code", monospace;
      position: relative;
      display: inline-block;
      margin-top: 0;
      margin-bottom: 1rem;
      padding-top: 0;
      animation: glitch 1s infinite;
    }
    #void404 h1::before, #void404 h1::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
    }
    @keyframes glitch {
      2%, 64% {transform: translate(2px,0) skew(0deg);}
      4%, 60% {transform: translate(-2px,0) skew(0deg);}
      62% {transform: translate(0,0) skew(5deg);}
    }
    .vaporwave {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .vaporwave img {
      display: block;
      width: 10rem;
      margin: 0 auto;
      padding: 0;
      opacity: 0.4;
    }
    #void404 p {
      letter-spacing: 0.02em;
      margin-bottom: 20px;
      animation: floatText 4s infinite ease-in-out;
    }
    @keyframes floatText { 
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
      
    #section2 {
      background-color: #3498db;
    }
  </style>
</head>
<body>
  <nav>
    <a href="#void404">◔</a>
    <a href="#sec2">◓</a>
    <a href="#sec3">◍</a>    
    <a href="#sec4">◗</a>
    <a href="#sec">◉</a>
    <a href="#sec">◑</a>
    <a href="#sec">◌</a>
    <a href="#sec">◐</a>
    <a href="#sec">◎</a>
    <a href="#sec">●</a>
    <a href="#sec">◒</a>
    <a href="#sec">◖</a>
    <a href="#sec">○</a>
    <a href="#sec">◕</a>
  </nav>
  
  <section id="void404">
    <main>
      <div class="vaporwave"><img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/aquaticSculpt.gif" alt="■"></div>    
      <h1 class="glitch" data-text="404">404</h1>
      <p class="message">Looks like you've stumbled upon a void in the digital matrix.</p>
    </main>
  </section>
  
  <section id="section2">
    Welcome to Section 2
  </section>
</body>
</html>
