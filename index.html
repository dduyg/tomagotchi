<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🍋Loop</title>
    <style>
        @font-face {
            font-family: 'Shinko Sans';
            src: url('ShinkoSans.woff2') format('woff2'),
                 url('ShinkoSans.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Algeron';
            src: url('Algeron.woff2') format('woff2'),
                 url('Algeron.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'LT Superior Mono', monospace;
            background: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/floppyDisk.png') no-repeat center center/cover;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        main {
            width: 95%;
            max-width: 900px;
            backdrop-filter: blur(3px);
        }
        .component {
            font-size: 100%;
            font-weight: 700;
            padding: 10px 0;
            border-top: 2px solid white;
        }
        .component:last-child {
            border-bottom: 2px solid white;
        }
        .component:nth-child(1) {font-family: 'Algeron', serif;}
        .component:nth-child(2) {font-family: 'Shinko Sans', sans-serif;}
        .component:nth-child(3) {font-family: 'Inconsolata', monospace;}
        .component:nth-child(4) {font-family: 'Inconsolata', monospace;}
        .component:nth-child(5) {font-family: 'Inconsolata', monospace;}    
    </style>
</head>
<body>
    <main>
        <div class="component">{ Monocity }</div>
        <div class="component">@floating lantern</div>
        <div class="component">(v.1)</div>
        <div class="component">0430 weight</div>
        <div class="component">qr-code </div>
    </main>
</body>
</html>
