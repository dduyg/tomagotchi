<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        body {
            background-color: #2c2c2c;
            font-family: 'Courier New', Courier, monospace;
            color: #f5f5f5;
            margin: 0;
            padding: 0;
        }
        .page-container {
            background: url('https://www.transparenttextures.com/patterns/dirty-window.png'), linear-gradient(45deg, #3e3e3e, #2c2c2c); 
            background-blend-mode: multiply;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* Styling the video container */
        .video-container {
            border: 3px solid #444; /* Dark border with a weathered feel */
            padding: 15px;
            width: 80%;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
            background-color: #1e1e1e; /* Dark background inside the container */
            box-shadow: 0px 0px 15px rgba(0, 0, 0, 0.6); /* Adding shadow for depth */
            border-radius: 5px;
            background-image: url('https://www.transparenttextures.com/patterns/dark-mosaic.png'); /* Texture for grunge feel */
        }

        /* Video element styling */
        video {
            width: 100%;
            height: auto;
            border-radius: 5px;
            border: 2px solid #333; /* Border for the video */
        }

        /* Title below the video */
        h3 {
            margin-top: 10px;
            font-size: 22px;
            font-family: 'Courier New', Courier, monospace;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #e6e6e6;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
        }

        /* Adding some faded, apocalyptic effect on the page */
        .fade-effect {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Subtle dark overlay */
            pointer-events: none;
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background-color: #555;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background-color: #888;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <!-- Dark overlay to add a post-apocalyptic effect -->
        <div class="fade-effect"></div>

        <div class="video-container">
            <video controls>
                <source src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/04/FadedEchoes.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
            <h3>Apocalyptic Video</h3>
        </div>
    </div>
</body>
</html>
