<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        /* General Reset */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', Courier, monospace;
        }

        /* Vaporwave Styling */
        body {
            background: linear-gradient(135deg, #ff71ce, #01cdfe, #05ffa1);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: 5rem;
            text-shadow: 0 0 10px #ff71ce, 0 0 20px #01cdfe;
        }

        p {
            font-size: 1.5rem;
            text-shadow: 0 0 5px #05ffa1;
        }

        a {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 1.2rem;
            color: #000;
            background-color: #ffffff;
            border-radius: 5px;
            text-decoration: none;
            box-shadow: 0 0 10px #ff71ce;
            transition: all 0.3s ease;
        }

        a:hover {
            color: #ffffff;
            background-color: #ff71ce;
            text-shadow: 0 0 10px #ffffff;
            box-shadow: 0 0 20px #01cdfe;
        }

        .neon-grid {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 200px;
            background: repeating-linear-gradient(
                #ffffff40 1px,
                transparent 2px,
                transparent 20px
            );
            transform: perspective(500px) rotateX(75deg);
            transform-origin: center bottom;
            animation: pulse 3s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                background-position: 0 0;
            }
            50% {
                background-position: 0 20px;
            }
        }
    </style>
</head>
<body>
    <div>
        <h1>404</h1>
        <p>Oops! It seems you've coded yourself into a corner.</p>
        <p>The page you're looking for is either missing or trapped in a while loop.</p>
        <a href="/">Return to Safety</a>
    </div>
    <div class="neon-grid"></div>
</body>
</html>
