<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiminalLoop</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      flex-direction:column;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
      color: black;
    }

    .circle {
      width: 32px;
      height: 30px;
      border-radius: 50%;
      background-color: transparent;
      box-shadow: 0 0 0 2px currentColor, 3px 0 0 3px currentColor; /* Outer "border" and inner shadow */
    }

    .circle2 {
      width: 33px;
      height: 32px;
      border-radius: 50%;
      border: 3px solid;
      box-shadow: 2px 0 0 2px currentColor; /* Simulates thicker right border */
    }
  </style>
</head>
<body>
  <div class="circle"></div>

  <br><hr>

  <div class="circle2"></div>
</body>
</html>
