<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LiminalLoop</title>
<style>
  body {
    margin: 0;
    background: #0a0a23;
    color: #00fff7;
    font-family: 'VT323', monospace, monospace;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    user-select: none;
  }
  h1 {
    font-size: 10vw;
    position: relative;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    animation: glitch 2s infinite;
  }

  /* Glitch background scanlines */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(255, 255, 255, 0.03),
      rgba(255, 255, 255, 0.03) 1px,
      transparent 2px,
      transparent 4px
    );
    z-index: 10;
    mix-blend-mode: screen;
    animation: scan 0.3s linear infinite;
  }
  @keyframes scan {
    0% {background-position: 0 0;}
    100% {background-position: 0 4px;}
  }
  
  h2 {
    font-size: 1.6rem;
    margin: 0.2em 0 1.5em;
    color: #00fff7;
    text-shadow: 2px 0 #ff0055, -2px 0 #00eaff;
  }

  p {
    max-width: 450px;
    margin: 0 1em 2em;
    font-size: 0.85rem;
    letter-spacing: 0.04em;
  }
</style>
</head>
<body>
  <div class="scanlines"></div>
  <h2>Lost in the Void</h2>
  <p>
    Özgürlük ve bağımsızlık benim karakterimdir.
    Milletimizin onurunu korumak, bağımsız yaşamakla mümkündür. 
    Hiçbir zorluk, inançla çalışan bir milleti yolundan döndüremez.
    Unutmayın, umut varsa mücadele vardır; mücadele varsa zafer kaçınılmazdır.
  </p>
</body>
</html>
