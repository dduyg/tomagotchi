<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiminalLoop</title>
  <link href="https://fonts.googleapis.com/css2?family=Stalinist+One&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Offside&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Dots&display=swap" rel="stylesheet">
  <style>
    * {   /* Reset to ensure a clean slate */
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Offside", sans-serif;
      background: #B2B2B2;
      color: #383838;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      overflow: hidden;
    }
    main {
      max-width: 600px;
      padding: 0 20px;
    }

    #dduyg { 
      position: absolute;
      top: 4%;
      left: 5%;
      letter-spacing: .1em;
      font-size: 1.2em;
      font-weight: bold;
      color: #7A7A7A;
      cursor: pointer;
    }
    @media only screen and (max-width: 768px) { 
      #dduyg {font-size: 1em;}
    }
    a {
      color: inherit;
      text-decoration: none;
    }
 
    h1 {
      font-size: 8rem;
      font-family: "Zen Dots", monospace;
      background: url("https://media3.giphy.com/media/wsLkjgj5Rsehq/giphy.gif");
      background-size: cover;
      background-position: center;
      -webkit-background-clip: text;
      color: transparent; /* Required for background-clip to work */
      -webkit-text-stroke: 1px black;
      text-stroke: 1px black; /* Non-prefixed version for wider support */
      user-select: none;
      position: relative;
      animation: glitch 2s infinite;
    }
    @keyframes glitch {
      0% {transform: translate(0);}
      20% {transform: translate(-2px, -2px);}
      40% {transform: translate(2px, 2px);}
      60% {transform: translate(-2px, 2px);}
      80% {transform: translate(2px, -2px);}
      100% {transform: translate(0);}
    }
    h1::before,
    h1::after {
      content: "404";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: inherit;
      overflow: hidden;
      clip-path: inset(0 0 50% 0);
      animation: glitch-lines 2s infinite;
    }
    h1::after {
      clip-path: inset(50% 0 0 0);
      animation-delay: 1s;
    }
    @keyframes glitch-lines {
      0%, 100% {transform: translateX(0);}
      50% {transform: translateX(-10px);}
    }

    h3 {
      font-size: 2rem;
    }
    p {
      font-size: 1.2rem;
      line-height: 1.5;
      margin-bottom: 20px;
      animation: floatText 4s infinite ease-in-out;
    }
    @keyframes floatText { 
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

     .glitch {
            font-size: 2rem;
            color: #7F7F7F;
            letter-spacing: 4px;
            position: relative;
            display: inline-block;
            margin-top: 0;
            margin-bottom: 1rem;
            padding-top: 0;
            animation: glitch 1s infinite;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
        }
        @keyframes glitch {
            2%, 64% {transform: translate(2px,0) skew(0deg);}
            4%, 60% {transform: translate(-2px,0) skew(0deg);}
            62% {transform: translate(0,0) skew(5deg);}
        }
        .btn {
            display: inline-block;
            font-size: .875rem;
            -moz-osx-font-smoothing: grayscale;
            backface-visibility: hidden;
            transform: translateZ(0);
            transition: transform .25s ease-out;
            text-decoration: none;
            border-radius: 9999px;
            border: 1px solid;
            border-width: .125rem;  
            padding: .5rem 1.25rem;
            margin-top: .5rem;
            color: #111;
            cursor: pointer;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-family: "Fira Code", monospace;
        }
        .btn:hover, .btn:focus {
            transform: scale(1.05);
        }
        .btn:active {
            transform: scale(.9);
        }
        #dduyg, .btn {
            outline: none;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
  </style>
</head>
<body>
<div id="dduyg"><a href="/">/dduyg</a></div>
<main>
  <h1>404</h1>
  <h3 class="glitch" data-text="Page Not Found">Page Not Found</h3>
  <p><em>Whoops!</em>&nbsp; Looks like this page has vanished into the cyber void. But don't worry, every glitch is just a feature waiting to be found.</p>
  <a href="{{ site.baseurl }}/" class="btn">Return To Home</a>
</main>
</body>
</html>
