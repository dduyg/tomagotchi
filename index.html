<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seamless Marquee Rows</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #f0f0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .marquee {
      width: 100%;
      max-width: 1000px;
      overflow: hidden;
      white-space: nowrap;
      position: relative;
      margin: 30px 0;
    }

    .marquee-content {
      display: inline-flex;
      gap: 0;
      animation: scroll-left 10s linear infinite;
    }

    .marquee[data-direction="right"] .marquee-content {
      animation: scroll-right 10s linear infinite;
    }

    .marquee-item {
      height: 150px;
      width: auto;
      border: 1px solid black;
      margin-right: 10px;
    }

    /* Animation for left-scrolling marquee */
    @keyframes scroll-left {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-100%);
      }
    }

    /* Animation for right-scrolling marquee */
    @keyframes scroll-right {
      0% {
        transform: translateX(-100%);
      }
      100% {
        transform: translateX(0);
      }
    }
  </style>
</head>
<body>
  <section class="marquee" data-direction="left">
    <div class="marquee-content">
      <img class="marquee-item" src="https://media0.giphy.com/media/l0O9xVx5v3YHYjGgM/giphy.gif" alt="■1">
      <img class="marquee-item" src="https://media1.giphy.com/media/cpO6VvIo0mW9q/giphy.gif" alt="■2">
      <img class="marquee-item" src="https://media3.giphy.com/media/3o6EhE8pukIRNaPyOQ/giphy.gif" alt="■3">
      <img class="marquee-item" src="https://media3.giphy.com/media/ldKjshoVdTNgblMuLs/giphy.gif" alt="■4">
      <img class="marquee-item" src="https://media0.giphy.com/media/LpBKayD38zvwKx1qz8/giphy.gif" alt="■5">
    </div>
  </section>

  <section class="marquee" data-direction="right">
    <div class="marquee-content">
      <img class="marquee-item" src="https://media2.giphy.com/media/JDXuoS4eWlYAEHyL7G/giphy.gif" alt="■1">
      <img class="marquee-item" src="https://media4.giphy.com/media/a2vstZP9SvLA4/giphy.gif" alt="■2">
      <img class="marquee-item" src="https://media3.giphy.com/media/kesNMJU1kLFJdc7FcB/giphy.gif" alt="■3">
      <img class="marquee-item" src="https://media1.giphy.com/media/VoVQ6zWVMjUuGUz8bu/giphy.gif" alt="■4">
      <img class="marquee-item" src="https://media3.giphy.com/media/d3JtHt5NsKmvqcJa/giphy.gif" alt="■5">
    </div>
  </section>

  <script>
    document.querySelectorAll('.marquee').forEach((marquee) => {
      const content = marquee.querySelector('.marquee-content');
      const clonedContent = content.cloneNode(true);
      content.parentElement.appendChild(clonedContent);

      // The key trick to fix the jankiness
      content.style.animationPlayState = 'running';
      clonedContent.style.animationPlayState = 'running';
    });
  </script>
</body>
</html>
