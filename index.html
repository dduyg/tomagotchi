<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>LiminalLoop</title>
  <style>
:root {
  --warm-off-white: #f5f5f0;
  --warm-off-white-dim: #d9d9d0;
  --text-primary: #f5f5f0;
  --text-secondary: #d9d9d0;
  --background-dark: #050505;
  --background-gradient-1: #1a1a1a;
  --background-gradient-2: #0a0a0a;

  /* Typography */
  --font-primary: "PP Neue Montreal", sans-serif;
  --font-secondary: "TheGoodMonolith", sans-serif;
  --font-size-small: 0.825rem;
  --font-size-regular: 1rem;
  --font-size-medium: 1.5rem;
  --font-size-large: 4rem;

  /* Layout */
  --spacing-small: 0.5rem;
  --spacing-medium: 1rem;
  --spacing-large: 2rem;

  /* Transitions */
  --transition-fast: 0.3s ease;
  --transition-medium: 0.5s cubic-bezier(0.445, 0.05, 0.55, 0.95);
}

*, *:before, *:after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  color: var(--text-primary);
  background-color: var(--background-dark);
  padding: var(--spacing-large);
}
/* Dust/Scratches background effect for the entire site */
body::after {
  content: "";
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background-image: url("https://img.freepik.com/premium-photo/white-dust-scratches-black-background_279525-2.jpg?w=640");
  background-repeat: repeat;
  opacity: 0.05;
  mix-blend-mode: screen;
  pointer-events: none;
  z-index: 1;
}

.logo-container {
  position: fixed;
  left: var(--spacing-large);
  top: 0;
  display: flex;
  align-items: center;
  height: 2rem;
  z-index: 10;
}
/* Logo circles */
.logo-circles {
  position: relative;
  width: 100%;
  height: 100%;
}
.circle {
  position: absolute;
  border-radius: 50%;
  transition: transform var(--transition-medium);
  width: 1.4rem;
  height: 1.4rem;
  background-color: var(--warm-off-white);
  top: 50%;
}
.circle-1 {
  left: 0;
  transform: translate(0, -50%);
}
.circle-2 {
  left: 0.8rem;
  transform: translate(0, -50%);
  mix-blend-mode: exclusion;
}
.logo-container:hover .circle-1 {
  transform: translate(-0.5rem, -50%);
}
.logo-container:hover .circle-2 {
  transform: translate(0.5rem, -50%);
}

/* Footer */
.footer-links {
  position: fixed;
  bottom: var(--spacing-large);
  left: var(--spacing-large);
  z-index: 10;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  gap: 0.25rem;
  font-family: var(--font-primary);
  font-weight: 400;
  font-size: var(--font-size-regular);
}
.footer-link {
  color: var(--warm-off-white-dim);
  text-decoration: none;
  transition: all var(--transition-fast);
  position: relative;
  padding-left: 0;
}
.footer-link::before {
  content: "";
  position: absolute;
  left: 0;
  top: 50%;
  width: 0;
  height: 1px;
  background-color: var(--warm-off-white);
  transform: translateY(-50%);
  transition: width var(--transition-fast), opacity var(--transition-fast);
  opacity: 0;
}
.footer-link:hover {
  color: var(--warm-off-white);
  padding-left: 1.2rem;
}
.footer-link:hover::before {
  width: 0.8rem;
  opacity: 1;
}

/* Coordinates */
.coordinates {
  position: fixed;
  bottom: var(--spacing-large);
  right: var(--spacing-large);
  text-align: right;
  z-index: 10;
  font-family: var(--font-secondary);
  font-size: var(--font-size-small);
  color: var(--text-secondary);
}

/* Responsive adjustments */
@media (max-width: 768px) {
  .footer-links {
    gap: 0.4rem;
  }
  .coordinates {
    font-size: 0.7rem;
  }
}
  </style>
</head>
<body>
  <div class="logo-container" id="theme-toggle">
    <div class="logo-circles">
      <div class="circle circle-1"></div>
      <div class="circle circle-2"></div>
    </div>
  </div>

<!-- Hero Content (Center) -->
<div class="hero">
  <h1>Find clarity<br>in cosmic<br>silence</h1>
  <p>( the art of mental spaciousness )</p>
</div>

<!-- Footer Links (Bottom Left) -->
<div class="footer-links">
  <a href="#" class="footer-link">Visual Work</a>
  <a href="#" class="footer-link">Photography</a>
  <a href="#" class="footer-link">Bio</a>
  <a href="#" class="footer-link">Journal</a>
  <a href="#" class="footer-link">Contact</a>
</div>

<!-- Coordinates (Bottom Right) -->
<div class="coordinates">
  <p>34°05'24.0"N 118°24'39.6"W</p>
  <p>the space between thoughts</p>
</div>
</body>
</html>
