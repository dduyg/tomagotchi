<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizontal Scrolling Images Animation</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #333;
    }

    .image-container {
      width: 80%;
      overflow: hidden;
      position: relative;
      display: flex;
      background: #444;
      border: 2px solid white;
    }

    .image-row {
      display: flex;
      animation: scroll-row 16s linear infinite;
    }

    .image-row img {
      height: 200px; /* Set consistent height for images */
      width: auto; /* Maintain aspect ratio */
      margin-right: 10px; /* Optional spacing between images */
      border: 2px solid white;
      box-sizing: border-box;
      transition: opacity 0.2s;
    }

    .image-row:hover img {
      opacity: 0.5;
    }

    .image-row img:hover {
      opacity: 1;
    }

    @keyframes scroll-row {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-100%);
      }
    }
  </style>
</head>
<body>
  <div class="image-container">
    <div class="image-row">
      <img src="https://picsum.photos/300/200?random=1" alt="Image 1">
      <img src="https://picsum.photos/300/200?random=2" alt="Image 2">
      <img src="https://picsum.photos/300/200?random=3" alt="Image 3">
      <img src="https://picsum.photos/300/200?random=4" alt="Image 4">
      <img src="https://picsum.photos/300/200?random=5" alt="Image 5">
    </div>
  </div>
  
  <script>
    // Duplicate the image row to create a seamless loop
    const imageRow = document.querySelector('.image-row');
    imageRow.innerHTML += imageRow.innerHTML;
  </script>
</body>
</html>
