<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body {
            background: linear-gradient(to right, #2a2a72, #009ffd);
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            text-align: center;
            padding: 0;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            font-size: 10rem;
            text-shadow: 0 0 10px rgba(255, 0, 255, 0.7), 0 0 20px rgba(255, 0, 255, 0.5);
            margin-top: 20%;
            letter-spacing: 5px;
        }

        p {
            font-size: 2rem;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.7), 0 0 15px rgba(255, 255, 255, 0.5);
            margin: 20px 0;
        }

        .glitch {
            position: relative;
            display: inline-block;
            color: #ff0066;
            font-size: 2rem;
        }

        .glitch:after {
            content: "Page Not Found";
            position: absolute;
            top: 0;
            left: 0;
            background: #fff;
            color: #ff0066;
            clip: rect(0, 900px, 0, 0);
            animation: glitch-animation 1s infinite;
        }

        .grid {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            width: 100vw;
            height: 100vh;
            background: url('https://media4.giphy.com/media/hloAIyC5MPhMQwBe19/giphy.gif');
            background-size: cover;
            opacity: 0.4;
        }

        @keyframes glitch-animation {
            0% {
                clip: rect(45px, 9999px, 44px, 0);
                transform: skew(0.39deg);
            }
            10% {
                clip: rect(85px, 9999px, 87px, 0);
                transform: skew(0.44deg);
            }
            20% {
                clip: rect(35px, 9999px, 28px, 0);
                transform: skew(0.41deg);
            }
            30% {
                clip: rect(48px, 9999px, 48px, 0);
                transform: skew(0.42deg);
            }
            40% {
                clip: rect(12px, 9999px, 60px, 0);
                transform: skew(0.48deg);
            }
            50% {
                clip: rect(55px, 9999px, 68px, 0);
                transform: skew(0.39deg);
            }
            60% {
                clip: rect(23px, 9999px, 43px, 0);
                transform: skew(0.43deg);
            }
            70% {
                clip: rect(75px, 9999px, 36px, 0);
                transform: skew(0.40deg);
            }
            80% {
                clip: rect(32px, 9999px, 39px, 0);
                transform: skew(0.46deg);
            }
            90% {
                clip: rect(41px, 9999px, 77px, 0);
                transform: skew(0.45deg);
            }
            100% {
                clip: rect(80px, 9999px, 64px, 0);
                transform: skew(0.47deg);
            }
        }

        a {
            color: #ff0066;
            text-decoration: none;
            font-size: 1.5rem;
            padding: 10px 20px;
            border: 2px solid #ff0066;
            margin-top: 30px;
            display: inline-block;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        a:hover {
            background: #ff0066;
            color: #fff;
            border-color: #fff;
        }
    </style>
</head>
<body>

    <div class="grid"></div>
    
    <h1>404</h1>
    <p class="glitch">Page Not Found</p>
    
    <a href="/">Go Back to Home</a>
    
</body>
</html>
