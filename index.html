<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiminalLoop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: white;
      color: black;
      padding: 20px;
      margin: 0;
      text-align: center;
    }
    h2 {
      font-size: 4rem;
      font-weight: bold;
    }

    /* 1. Text Shifting (Horizontal Distortion) */
    .shift {
      animation: shift 0.3s infinite ease-in-out;
    }
    @keyframes shift {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-3px); }
    }

    /* 2. Text Blurring (Fuzzy Glitch) */
    .blur {
      animation: blur 0.3s infinite;
    }
    @keyframes blur {
      0%, 100% { filter: blur(0); }
      50% { filter: blur(2px); }
    }

    /* 3. Reversed Letter Order (Mirror Glitch) */
    .reverse span {
      display: inline-block;
      animation: reverse 0.5s infinite;
    }
    @keyframes reverse {
      0%, 100% { transform: scaleX(1); }
      50% { transform: scaleX(-1); }
    }

    /* 4. Text Pixelate */
    .pixelate {
      animation: pixelate 0.4s infinite;
    }
    @keyframes pixelate {
      0%, 100% { transform: scale(1); filter: none; }
      50% { transform: scale(1.1); filter: pixelate(4px); }
    }

    /* 5. Scrolling Digital Noise */
    .noise {
      position: relative;
      display: inline-block;
      animation: noise 1s linear infinite;
      background-image: url('data:image/png;base64,...'); /* Add noise texture here */
      background-size: 100% 100%;
      color: black;
    }
    @keyframes noise {
      0%, 100% { background-position: 0 0; }
      50% { background-position: 100% 0; }
    }

    /* 6. Random Character Swap (Character Shuffle) */
    .shuffle {
      display: inline-block;
      animation: shuffle 1s infinite;
      font-family: monospace;
    }
    @keyframes shuffle {
      0%, 100% { content: '/dygg'; }
      25% { content: '/dyyg'; }
      50% { content: '/dxyg'; }
      75% { content: '/dyfg'; }
    }

  </style>
</head>
<body>
    <h2 class="shift">/dygg</h2>
    <h2 class="blur">/dygg</h2>
    <h2 class="reverse"><span>d</span><span>y</span><span>g</span><span>g</span></h2>
    <h2 class="pixelate">/dygg</h2>
    <h2 class="noise">/dygg</h2>
    <h2 class="shuffle">/dygg</h2>
</body>
</html>
