<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🍋Loop</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'JetBrains Mono', monospace;
            background: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/floppyDisk.png') no-repeat center center/cover;
            color: black;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            padding: 20px;
        }
        .container {
            width: 90%;
            max-width: 800px;
            backdrop-filter: blur(3px);
        }
        .line {
            font-size: 2em;
            font-weight: 700;
            padding: 10px 0;
            border-top: 2px solid;
        }
        .line:last-child {
            border-bottom: 2px solid;
        }
        .icon {
            display: inline-block;
            width: 40px;
            height: 40px;
            background-color: black;
            clip-path: polygon(0% 0%, 100% 50%, 0% 100%);
            margin-left: 10px;
            vertical-align: middle;
        }
        .qr-code {
            display: inline-block;
            width: 50px;
            height: 50px;
            background: black;
            margin-left: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="line">{JoliciaType}</div>
    <div class="line">@marklO mono</div>
    <div class="line">(v.1)</div>
    <div class="line">7 <span class="icon"></span></div>
    <div class="line"><span class="qr-code"></span> weight</div>
</div>
</body>
</html>
