<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refraction</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #f8f8f8;
            text-align: center;
        }

        .header {
            font-size: 2rem;
            font-weight: bold;
            margin-top: 20px;
        }

        .header span {
            color: green;
            font-size: 1.5rem;
        }

        .sub-header {
            font-size: 1rem;
            color: gray;
            font-style: italic;
            margin: 5px 0 20px;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 8px;
            transition: transform 0.3s ease;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        .footer {
            margin: 20px;
            font-size: 1rem;
            color: gray;
        }

        .like-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: blue;
            color: white;
            padding: 10px 15px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            border: none;
        }

        .like-btn:active {
            background: darkblue;
        }
    </style>
</head>
<body>

    <div class="header">
        Refraction<span>*</span> <span style="color: blue; font-size: 1rem;">(Shape)(Color)</span>
    </div>
    <div class="sub-header">
        --- Some test exercises for form and color ---
    </div>

    <div class="gallery">
        <img src="https://via.placeholder.com/300" alt="Image 1">
        <img src="https://via.placeholder.com/300" alt="Image 2">
        <img src="https://via.placeholder.com/300" alt="Image 3">
        <img src="https://via.placeholder.com/300" alt="Image 4">
        <img src="https://via.placeholder.com/300" alt="Image 5">
        <img src="https://via.placeholder.com/300" alt="Image 6">
    </div>

    <div class="footer">
        Refraction (Test) (Shape)(Color)
    </div>

    <button class="like-btn" onclick="likeFunction()">👍</button>

    <script>
        function likeFunction() {
            alert("You liked this!");
        }
    </script>

</body>
</html>
