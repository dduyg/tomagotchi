<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sliding Animation Demo</title>
  <style>
    /* Base styles */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      color: #333;
    }

    h1 {
      text-align: center;
      margin: 20px 0;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    .animate-in {
      opacity: 0;
      transform: translateY(-96px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .animate-in.active {
      opacity: 1;
      transform: translateY(0);
    }

    .box {
      background-color: #fff;
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 20px;
      margin: 20px 0;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
  </style>
</head>
<body>
  <h1>Sliding Animation Demo</h1>
  <div class="container">
    <div class="box animate-in">Content Box 1</div>
    <div class="box animate-in">Content Box 2</div>
    <div class="box animate-in">Content Box 3</div>
    <div class="box animate-in">Content Box 4</div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const animatedElements = document.querySelectorAll('.animate-in');

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add('active');
            }
          });
        },
        { threshold: 0.1 } // Adjust for earlier or later triggering
      );

      animatedElements.forEach((el) => observer.observe(el));
    });
  </script>
</body>
</html>
