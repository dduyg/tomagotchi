<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: #1e1e1e; /* Dark Background */
            color: #ffffff; /* White text */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 800px;
            padding: 40px 20px;
        }

        /* Two Column Layout */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            border-top: 1px solid #5a5a5a; /* Line under heading */
            padding-top: 20px;
            margin-top: 10px;
        }

        .heading {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .label {
            font-size: 14px;
            font-weight: bold;
            color: #b5b5b5; /* Light gray */
            text-transform: uppercase;
        }

        .details a {
            color: #ffffff;
            text-decoration: none;
            font-size: 16px;
        }

        .details a:hover {
            color: #b5b5b5; /* Hover effect */
        }

        .details {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Title -->
        <div class="heading">Contact</div>
        <!-- Grid Layout -->
        <div class="grid">
            <!-- Left Column -->
            <div>
                <div class="label">Mail</div>
            </div>
            <div class="details">
                <a href="mailto:hello@itsshari.ee">hello@itsshari.ee</a>
            </div>

            <div>
                <div class="label">Social Medias</div>
            </div>
            <div class="details">
                <a href="https://instagram.com" target="_blank">Instagram</a>
                <a href="https://behance.net" target="_blank">Behance</a>
            </div>
        </div>
    </div>
</body>
</html>
