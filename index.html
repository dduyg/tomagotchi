<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 Not Found</title>
    <style>
        body {
            background-color: #2a2a2a;
            font-family: monospace;
            color: #f9a825;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            overflow: hidden;
        }

        h1 {
            font-size: 5rem;
            color: #ff3b6d;
        }
        p {
            font-size: 1.5rem;
            margin-top: 10px;
        }
.glitch {
    position: relative;
    font-size: 6rem;
    font-weight: bold;
    background: linear-gradient(to right, #4caf50, #8e44ad, #3498db, #e91e63, #ffeb3b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: pixelate 1s infinite;
}
.glitch::before,
.glitch::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    color: #f44336;
    opacity: 0.7;
    clip-path: polygon(0% 0%, 100% 0%, 100% 50%, 0% 50%);
    animation: vhsShift 0.5s infinite;
}
.glitch::after {
    color: #03a9f4;
    clip-path: polygon(0% 50%, 100% 50%, 100% 100%, 0% 100%);
    animation-delay: 0.2s;
}

@keyframes pixelate {
    0% {transform: scale(1);}
    50% {transform: scale(1.05);}
    100% {transform: scale(1);}
}
@keyframes vhsShift {
    0%, 100% {transform: translate(1px, -1px);}
    50% {transform: translate(-1px, 1px);}
}
    </style>
</head>
<body>    
    <div class="glitch" data-text="404">404</div>
    <p>We couldn't find the page you're looking for. It might have been moved, deleted, or never existed.</p>
</body>
</html>
