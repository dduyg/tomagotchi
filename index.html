<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 Not Found</title>
    <style>
        body {
            background-color: #F598FF;
            font-family: monospace;
            color: #a8a8a8;
            text-align: center;
            line-height: 1.5;
            margin: 0;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            overflow: hidden;
        }
        
        .glitch {
            position: relative;
            display: inline-block;
            color: #ff0066;
            font-size: 6rem;
        }
        .glitch:after {
            content: "notFound";
            position: absolute;
            top: 0;
            left: 0;
            background: #fff;
            color: #ff0066;
            clip: rect(0, 900px, 0, 0);
            animation: glitch-animation 1s infinite;
        }
        @keyframes glitch-animation {
            0% {clip: rect(45px, 9999px, 44px, 0); transform: skew(0.39deg);}
            10% {clip: rect(85px, 9999px, 87px, 0); transform: skew(0.44deg);}
            20% {clip: rect(35px, 9999px, 28px, 0); transform: skew(0.41deg);}
            30% {clip: rect(48px, 9999px, 48px, 0); transform: skew(0.42deg);}
            40% {clip: rect(12px, 9999px, 60px, 0); transform: skew(0.48deg);}
            50% {clip: rect(55px, 9999px, 68px, 0); transform: skew(0.39deg);}
            60% {clip: rect(23px, 9999px, 43px, 0); transform: skew(0.43deg);}
            70% {clip: rect(75px, 9999px, 36px, 0); transform: skew(0.40deg);}
            80% {clip: rect(32px, 9999px, 39px, 0); transform: skew(0.46deg);}
            90% {clip: rect(41px, 9999px, 77px, 0); transform: skew(0.45deg);}
            100% {clip: rect(80px, 9999px, 64px, 0); transform: skew(0.47deg);}
        }

        p {
            font-size: 1.4rem;
            margin-top: 50px;
            letter-spacing: 3px;
            font-weight: bold;
            animation: matrix 3s infinite linear;
        }
        @keyframes matrix {
            0% {opacity: 0.1; transform: translateY(-20px);}
            50% {opacity: 1; transform: translateY(0);}
            100% {opacity: 0.1; transform: translateY(20px);}
        }
    </style>
</head>
<body>    
    <div class="glitch">notFound</div>
    <p>System Error. Rebooting...</p>
</body>
</html>
