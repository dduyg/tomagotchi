<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            color: #f1f1f1;
            background: linear-gradient(135deg, #191970, #483D8B);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        main {
            text-align: center;
            animation: fadeIn 3s ease-in-out;
        }
        h1 {
            font-size: 10vw;
            text-transform: uppercase;
        }
        p {
            font-size: 1.5em;
            margin-top: -10px;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #32CD32;
            font-size: 1.2em;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border: 1px solid #32CD32;
            border-radius: 50px;
            transition: all 0.3s ease-in-out;
        }
        a:hover {
            color: #000;
            background-color: #32CD32;
            text-shadow: 0 0 10px #fff;
        }
        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }
    </style>
</head>
<body>
<main>
    <h1>404</h1>
    <p>Lost in the void of cyberspace</p>
    <a href="#">Return to Home</a>
</main>
</body>
</html>
