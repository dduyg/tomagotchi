<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 | Not Found</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #ff00c8, #00ffe5);
      color: #fff;
      font-family: 'Orbitron', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .logo {
      width: 120px;
      height: 120px;
      background: url('your-logo.png') no-repeat center center;
      background-size: contain;
      margin-bottom: 30px;
    }

    .glitch {
      font-size: 72px;
      position: relative;
      color: white;
    }

    .glitch::before,
    .glitch::after {
      content: '404';
      position: absolute;
      left: 0;
    }

    .glitch::before {
      color: #f0f;
      animation: glitch-left 1s infinite;
    }

    .glitch::after {
      color: #0ff;
      animation: glitch-right 1s infinite;
    }

    @keyframes glitch-left {
      0% { transform: translateX(0); }
      20% { transform: translateX(-2px); }
      40% { transform: translateX(-4px); }
      60% { transform: translateX(-2px); }
      80% { transform: translateX(-1px); }
      100% { transform: translateX(0); }
    }

    @keyframes glitch-right {
      0% { transform: translateX(0); }
      20% { transform: translateX(2px); }
      40% { transform: translateX(4px); }
      60% { transform: translateX(2px); }
      80% { transform: translateX(1px); }
      100% { transform: translateX(0); }
    }

    p {
      font-size: 20px;
      margin: 20px 0;
      text-align: center;
    }

    a {
      color: #fff;
      padding: 10px 20px;
      border: 2px solid #fff;
      text-decoration: none;
      transition: all 0.3s ease;
    }

    a:hover {
      background-color: rgba(255, 255, 255, 0.1);
    }

    .scanlines {
      pointer-events: none;
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.05),
        rgba(255,255,255,0.05) 1px,
        transparent 1px,
        transparent 2px
      );
      z-index: 2;
    }
  </style>
</head>
<body>
  <div class="logo"></div>
  <div class="glitch">404</div>
  <p>Whoa. You broke into the wrong subnet.</p>
  <a href="/">Return to Home</a>
  <div class="scanlines"></div>
</body>
</html>
