<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stacked Animation</title>
  <style>
    /* Base styles */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      color: #333;
      text-align: center;
      line-height: 1.5;
    }
    h1 {
      text-align: center;
      margin: 20px 0;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    /* Apply animation to all elements */
    * {
      opacity: 0;
      transform: translateY(-96px);
      transition: opacity 0.5s ease, transform 0.5s ease; /* Shortened duration */
    }

    /* Final animation state */
    *._active {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <h1>Stacked Animation</h1>
  <div class="container">
    <div>Elementum</div>
    <div>Elementum</div>
    <div>Elementum</div>
    <div>Elementum</div>
    <div>Elementum</div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const allElements = document.querySelectorAll('*');  // Target all elements

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              // Add the `_active` class with a staggered delay (reverse order)
              setTimeout(() => {
                entry.target.classList.add('_active');
              }, (allElements.length - Array.from(allElements).indexOf(entry.target)) * 100); // Reduced stagger delay
            }
          });
        },
        { threshold: 0.1 }
      );

      // Observe all elements on the page
      allElements.forEach((el) => {
        observer.observe(el);
      });
    });
  </script>
</body>
</html>
