<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mace</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&display=swap');

body {
    font-family: 'Roboto Mono', monospace;
    background-color: #F4F4F4;
    color: #222;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
    max-width: 800px;
}

/* HEADER STYLING */
header {
    text-align: center;
    margin-bottom: 20px;
}

.full-row {
    font-weight: bold;
    font-size: 12px;
    text-transform: uppercase;
    border-bottom: 1px solid black;
    padding-bottom: 5px;
    margin-bottom: 5px;
}

.header-columns {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: bold;
}

.column {
    flex: 1;
    text-align: center;
}

/* MAIN CONTENT */
h1 {
    font-size: 64px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
}

.highlight {
    border: 2px solid black;
    padding: 5px;
}

/* SS05 BOXED LETTER */
.boxed-o {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    margin-left: 5px;
    position: relative;
}

.ss05-label {
    font-size: 10px;
    background: white;
    padding: 2px 5px;
    border: 1px solid black;
    text-align: center;
    line-height: 1.2;
    margin-bottom: 2px;
}

.o-box {
    border: 2px solid black;
    padding: 10px;
    font-size: 64px;
    display: inline-block;
}

/* TAGLINE AND DESCRIPTION */
.tagline {
    font-size: 14px;
    margin: 10px 0;
    font-weight: bold;
}

.description {
    font-size: 14px;
    max-width: 600px;
    margin: 0 auto;
}

/* BADGE */
.badge {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 80px;
    height: 80px;
    background: #E54E26;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 14px;
    font-weight: bold;
}

.circle {
    font-size: 16px;
    font-weight: bold;
}

.text {
    font-size: 10px;
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="full-row">PART-NUMBER MRKL-V01-JLCTYP</div>
            <div class="header-columns">
                <div class="column">7 STYLE</div>
                <div class="column">LIGHT → HEAVY</div>
            </div>
        </header>

        <main>
            <h1>
                <span class="highlight">M</span>arkl 
                <span class="boxed-o">
                    <div class="ss05-label">o.<br>SS05</div>
                    <div class="o-box">o</div>
                </span>no
            </h1>
            <div class="tagline">NEW-2025-MONO</div>
            <p class="description">
                Non-proportional typeface designed for optimal readability at small sizes. 
                With its clean & structured letterforms.
            </p>
        </main>

        <div class="badge">
            <div class="circle">V.1</div>
            <div class="text">MARKL MONO</div>
        </div>
    </div>
</body>
</html>
