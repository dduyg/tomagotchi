<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 - Page Not Found</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            height: 100vh;
            background: linear-gradient(135deg, #ff6b6b, #d1a8e7);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            position: relative;
            z-index: 2;
        }
        .glitch {
            font-size: 5rem;
            position: relative;
            display: inline-block;
            color: #fff;
            text-transform: uppercase;
        }
        .glitch::before, .glitch::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            color: #00ffcc;
            text-shadow: 2px 2px 5px rgba(0, 255, 204, 0.7);
            animation: glitch 1s infinite;
        }
        .glitch::after {
            color: #ff00ff;
            animation: glitch2 1s infinite;
        }
        @keyframes glitch {
            0% { transform: translate(-2px, 0); }
            25% { transform: translate(2px, -2px); }
            50% { transform: translate(-2px, 2px); }
            75% { transform: translate(2px, 2px); }
            100% { transform: translate(0, 0); }
        }
        @keyframes glitch2 {
            0% { transform: translate(2px, 2px); }
            25% { transform: translate(-2px, -2px); }
            50% { transform: translate(2px, 2px); }
            75% { transform: translate(-2px, -2px); }
            100% { transform: translate(0, 0); }
        }
        p {
            font-size: 1.5rem;
            margin-top: 20px;
        }
        a {
            font-size: 1.25rem;
            color: #00ffcc;
            text-decoration: none;
            text-transform: uppercase;
            margin-top: 20px;
            display: inline-block;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }
        a:hover {
            color: #ff00ff;
            text-decoration: underline;
        }
        .background {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/7/72/Computer_Art_Grids.jpg');
            background-size: cover;
            filter: blur(8px);
        }
        .neon-text {
            text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 30px #ff00ff;
        }
    </style>
</head>
<body>
    <div class="background"></div>
    <div class="container">
        <div class="glitch" data-text="404 Not Found">404 Not Found</div>
        <p class="neon-text">We couldn't find the page you were looking for...</p>
        <a href="/">Go back to the homepage</a>
    </div>
</body>
</html>
