<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460, #53354a);
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 5rem;
            color: #ff0075;
            text-shadow: 0px 0px 10px #ff0075, 0px 0px 20px #ff0075;
        }

        p {
            font-size: 1.5rem;
            color: #ffffff;
            text-shadow: 0px 0px 5px #ffffff, 0px 0px 10px #ffffff;
        }

        .ascii-art {
            color: #0abdc6;
            font-size: 1.2rem;
            margin: 20px 0;
            text-shadow: 0px 0px 5px #0abdc6;
        }

        a {
            font-size: 1.2rem;
            color: #ff0075;
            text-decoration: none;
            border: 2px solid #ff0075;
            padding: 10px 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
            text-shadow: 0px 0px 5px #ff0075;
        }

        a:hover {
            background-color: #ff0075;
            color: #ffffff;
            text-shadow: none;
        }

        @keyframes glitch {
            0% { text-shadow: 2px 2px #ff0075, -2px -2px #0abdc6; }
            25% { text-shadow: -2px -2px #ff0075, 2px 2px #0abdc6; }
            50% { text-shadow: 2px -2px #ff0075, -2px 2px #0abdc6; }
            75% { text-shadow: -2px 2px #ff0075, 2px -2px #0abdc6; }
            100% { text-shadow: 2px 2px #ff0075, -2px -2px #0abdc6; }
        }

        h1 {
            animation: glitch 1s infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Oops! The page you're looking for doesn't exist.</p>
        <div class="ascii-art">
            <pre>
   ______      __  __            _      
  / ____/___  / /_/ /_  ___     (_)____ 
 / /   / __ \/ __/ __ \/ _ \   / / ___/
/ /___/ /_/ / /_/ / / /  __/  / (__  ) 
\____/\____/\__/_/ /_/\___/  /_/____/  
            </pre>
        </div>
        <a href="/">Return to Home</a>
    </div>
</body>
</html>
