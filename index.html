<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mace</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&display=swap');

body {
    font-family: 'Roboto Mono', monospace;
    background-color: #F4F4F4;
    color: #222;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
    max-width: 800px;
}

/* Header Styling */
header {
    text-align: center;
    margin-bottom: 20px;
}

.full-row {
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    border-bottom: 1px solid #000;
    padding-bottom: 5px;
    margin-bottom: 5px;
}

.two-columns {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    font-weight: bold;
}

.column {
    flex: 1;
    text-align: center;
}

/* Main Title */
h1 {
    font-size: 64px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
}

/* Box around 'M' */
.highlight {
    border: 2px solid black;
    padding: 5px;
}

/* SS05 Box */
.ss05-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    border: 1px solid black;
    padding: 5px;
}

.ss05-label {
    font-size: 12px;
    font-weight: bold;
    text-transform: uppercase;
    border-bottom: 1px solid black;
    width: 100%;
    text-align: center;
    padding-bottom: 3px;
}

.ss05-character {
    font-size: 64px;
    font-weight: bold;
    padding-top: 5px;
}

/* Tagline */
.tagline {
    font-size: 14px;
    margin: 10px 0;
    font-weight: bold;
}

/* Description */
.description {
    font-size: 14px;
    max-width: 600px;
    margin: 0 auto;
}

/* Badge */
.badge {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 80px;
    height: 80px;
    background: #E54E26;
    border-radius: 50%;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    color: white;
    font-size: 14px;
    font-weight: bold;
}

.circle {
    font-size: 16px;
    font-weight: bold;
}

.text {
    font-size: 10px;
}
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Header Section -->
        <header>
            <div class="full-row">PART-NUMBER MRKL-V01-JLCTYP</div>
            <div class="two-columns">
                <div class="column">7 STYLE</div>
                <div class="column">LIGHT → HEAVY</div>
            </div>
        </header>

        <!-- Main Content -->
        <main>
            <h1>
                <span class="highlight">M</span>arkl 
                
                <div class="ss05-box">
                    <div class="ss05-label">SS05</div>
                    <div class="ss05-character">o</div>
                </div>

                no
            </h1>
            <div class="tagline">NEW-2025-MONO</div>
            <p class="description">
                Non-proportional typeface designed for optimal readability at small sizes. 
                With its clean & structured letterforms.
            </p>
        </main>

        <!-- Badge -->
        <div class="badge">
            <div class="circle">V.1</div>
            <div class="text">MARKL MONO</div>
        </div>

    </div>
</body>
</html>
