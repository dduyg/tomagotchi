<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiltier - Display Serif</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background-color: #f8f8f3;
    font-family: 'Playfair Display', serif;
    text-align: center;
    color: black;
}

.container {
    position: relative;
    padding: 40px;
}

header {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    text-transform: uppercase;
    font-weight: bold;
}

.top-center {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
}

.title {
    font-size: 130px;
    font-weight: bold;
    text-transform: lowercase;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-top: 50px;
}

.letter {
    position: relative;
}

.rose img {
    position: absolute;
    left: 50%;
    top: -40px;
    transform: translateX(-50%);
    height: 120px;
}

.tagline {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    font-weight: bold;
    margin-top: 20px;
    border: 2px solid black;
    padding: 15px;
    width: 50%;
    margin-left: auto;
    margin-right: auto;
    border-radius: 40px;
}

.star {
    width: 30px;
    height: 30px;
    background: radial-gradient(circle, black 30%, transparent 50%);
    margin: 0 20px;
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <span class="top-left">14 STYLES</span>
            <span class="top-right">2 VARIABLE FONTS</span>
            <span class="top-center">JOLICIATYPE®</span>
        </header>

        <main>
            <h1 class="title">
                <span class="letter">K</span>
                <span class="letter">i</span>
                <span class="letter">l</span>
                <span class="letter rose">
                    t
                    <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/BLOBs/blob-16.gif" alt="🌹">
                </span>
                <span class="letter">i</span>
                <span class="letter">e</span>
                <span class="letter">r</span>
            </h1>

            <div class="tagline">
                <div class="star"></div>
                <p>DISPLAY SERIF</p>
                <div class="star"></div>
            </div>
        </main>
    </div>
</body>
</html>
