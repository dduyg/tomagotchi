<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 Not Found</title>
    <style>
        /* Global reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #F598FF;
            font-family: monospace;
            color: #a8a8a8;
            text-align: center;
            overflow: hidden;
            font-size: 1.25rem;
        }       
        main {
            max-width: 600px;
            margin: 0 auto;
            padding: 80px 0 20px;
        }

        .matrix-effect {
            margin-top: 50px;
            letter-spacing: 3px;
            font-weight: bold;
            animation: matrix 3s infinite linear;
        }
        @keyframes matrix {
            0% {
                opacity: 0.1;
                transform: translateY(-20px);
            }
            50% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0.1;
                transform: translateY(20px);
            }
        }
    </style>
</head>
<body>
<main>
    <h1>404</h1>
    <div class="matrix-effect">System Error. Rebooting...</div>
</main>
</body>
</html>
