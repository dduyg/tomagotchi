<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Engineer</title>
    <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

body {
    background-color: black;
    color: white;
    font-family: 'Orbitron', sans-serif;
    text-align: center;
    margin: 0;
    padding: 0;
}

.container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
}

header h1 {
    font-size: 48px;
    letter-spacing: 4px;
    margin-bottom: 20px;
}

.content {
    width: 80%;
}

.time {
    font-size: 40px;
}

.time-large {
    font-size: 80px;
    font-weight: bold;
}

.time-period {
    font-size: 20px;
    margin-left: 10px;
}

.description {
    font-size: 24px;
    margin: 20px 0;
}

.meta {
    font-size: 14px;
    opacity: 0.7;
}

.location {
    font-size: 16px;
    margin-top: 20px;
}

.footer {
    margin-top: 30px;
}

.footer button {
    background: none;
    border: 1px solid white;
    color: white;
    font-size: 18px;
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
}

.footer button:hover {
    background: white;
    color: black;
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>YINGER</h1>
        </header>
        <div class="content">
            <div class="time">
                <span class="time-large">01:05</span>
                <span class="time-period">
                    <input type="radio" checked> am
                    <input type="radio"> pm
                </span>
            </div>
            <p class="description">
                UI Engineer who dips his toes in Realtime 3D° Interaction° Perf°
            </p>
            <p class="meta">0360 × 0647 <br> ⬡043 FPS</p>
            <p class="location">FORT COLLINS, COLORADO → US OF A <br> DESIGN ENGINEER @HEX</p>
        </div>
        <div class="footer">
            <button>Gh</button>
            <button>Li</button>
            <button>X</button>
            <button>Email</button>
        </div>
    </div>
</body>
</html>
