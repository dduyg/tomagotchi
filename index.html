<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 - Page Not Found</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Share+Tech+Mono&display=swap');

  /* Seapunk color palette */
  :root {
    --sea-blue: #00f5ff;
    --neon-pink: #ff00d4;
    --black-bg: #0a0a23;
    --glitch-green: #00ff9c;
    --purple: #9b00ff;
  }

  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, var(--sea-blue), var(--purple));
    font-family: 'Share Tech Mono', monospace;
    color: var(--sea-blue);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
  }

  h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 6rem;
    margin: 0;
    position: relative;
    color: var(--neon-pink);
    text-shadow:
      0 0 5px var(--neon-pink),
      0 0 10px var(--neon-pink),
      0 0 20px var(--neon-pink),
      0 0 40px var(--neon-pink);
    animation: flicker 3s infinite alternate;
  }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.7; }
  }

  p {
    font-size: 1.5rem;
    max-width: 600px;
    text-align: center;
    margin: 20px 0 40px;
    color: var(--sea-blue);
    text-shadow:
      0 0 5px var(--sea-blue),
      0 0 10px var(--sea-blue);
  }

  a.home-link {
    display: inline-block;
    padding: 14px 30px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.3rem;
    color: var(--black-bg);
    background: var(--neon-pink);
    border-radius: 30px;
    text-decoration: none;
    box-shadow:
      0 0 10px var(--neon-pink),
      0 0 20px var(--neon-pink),
      0 0 40px var(--neon-pink);
    transition: background 0.3s ease, color 0.3s ease;
  }

  a.home-link:hover {
    background: var(--glitch-green);
    color: var(--black-bg);
    box-shadow:
      0 0 15px var(--glitch-green),
      0 0 30px var(--glitch-green),
      0 0 60px var(--glitch-green);
  }

  /* Glitch effect text */
  .glitch {
    position: relative;
    color: var(--neon-pink);
  }
  .glitch::before,
  .glitch::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    overflow: hidden;
    clip: rect(0, 900px, 0, 0);
  }
  .glitch::before {
    left: 2px;
    text-shadow: -2px 0 var(--glitch-green);
    animation: glitchTop 2s infinite linear alternate-reverse;
  }
  .glitch::after {
    left: -2px;
    text-shadow: -2px 0 var(--neon-pink);
    animation: glitchBottom 2s infinite linear alternate-reverse;
  }
  @keyframes glitchTop {
    0% {
      clip: rect(0, 900px, 0, 0);
    }
    10% {
      clip: rect(0, 900px, 20px, 0);
      transform: translate(-2px, -2px);
    }
    20% {
      clip: rect(10px, 900px, 40px, 0);
      transform: translate(2px, 0);
    }
    30% {
      clip: rect(5px, 900px, 30px, 0);
      transform: translate(-1px, 2px);
    }
    40% {
      clip: rect(0, 900px, 0, 0);
    }
    100% {
      clip: rect(0, 900px, 0, 0);
    }
  }
  @keyframes glitchBottom {
    0% {
      clip: rect(0, 900px, 0, 0);
    }
    10% {
      clip: rect(40px, 900px, 60px, 0);
      transform: translate(2px, 2px);
    }
    20% {
      clip: rect(50px, 900px, 80px, 0);
      transform: translate(-2px, 0);
    }
    30% {
      clip: rect(45px, 900px, 70px, 0);
      transform: translate(1px, -2px);
    }
    40% {
      clip: rect(0, 900px, 0, 0);
    }
    100% {
      clip: rect(0, 900px, 0, 0);
    }
  }
</style>
</head>
<body>
  <h1 class="glitch" data-text="404">404</h1>
  <p>Oops, looks like you’ve dived into uncharted data streams. This page is lost in the cyber ocean, but don’t worry — the coder tide can take you home.</p>
  <a href="/" class="home-link">Return to Safe Shore</a>
</body>
</html>
