<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 Not Found</title>
    <style>
        body {
            background-color: #F598FF;
            font-family: monospace;
            color: #a8a8a8;
            text-align: center;
            line-height: 1.5;
            margin: 0;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            overflow: hidden;
        }

        h1 {
            font-size: 6rem;
  animation: color-shift 0.5s infinite linear;
  text-shadow: 2px 0px #ff00ff, -2px 0px #00ff7f;
        }
        @keyframes color-shift {
  0%, 100% { transform: translateX(0); color: #ff77ff; }
  25% { transform: translateX(-5px); color: #ff007f; }
  50% { transform: translateX(5px); color: #7f00ff; }
  75% { transform: translateX(-5px); color: #00ff7f; }
}

        p {
            font-size: 1.4rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>    
    <h1>404</h1>
    <p>We couldn't find the page you're looking for. It might have been moved, deleted, or never existed.</p>
</body>
</html>
