<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Liminal🧊Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@450&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: #040205;
      color: white;
      font-family: "Manrope", sans-serif;
      overflow: hidden;
    }

    .bg-image {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
    }

    .index {
      display: flex;
      flex-direction: row;
      width: 100vw;
      height: 100vh;
      box-sizing: border-box;
      padding: 0;
      margin: 0;
      overflow: hidden;
      position: relative;
      z-index: 2;
    }

    .item {
      flex: 1 1 0;
      max-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
      cursor: pointer;
      background-color: transparent;
      position: relative;
      overflow: hidden;
      border-right: 1px dotted;
    }
    .item_inner {
      position: relative;
      z-index: 3;
      text-align: center;
    }
    .item_inner h3 {
      font-size: clamp(1rem, 2vw, 1.5rem);
      margin: 0 0 8px 0;
      line-height: 1.2;
    }
    .item_inner p {
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      margin: 0;
      overflow-wrap: break-word;
      line-height: 1.4;
    }

    .bg-fill {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
      transition: opacity 0.5s ease;
    }
    .bg-path {
      fill: #1203F6;
    }
  </style>
</head>
<body>
  <!-- Optional background image -->
  <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/dead-reckoning.gif" class="bg-image" alt="🔰" />

  <!-- Background fill (for solid color) -->
  <svg viewBox="0 0 100 100" preserveAspectRatio="none" class="bg-fill">
    <path d="M 0 0 H 0 Q 0 50 0 100 H 0 V 0 z" class="bg-path"></path>
  </svg>

  <nav class="index">
    <div class="item" data-bg="color">
      <div class="item_inner">
        <h3>Solid Color</h3>
        <p>Click for the original background color.</p>
      </div>
    </div>
    <div class="item" data-bg="image">
      <div class="item_inner">
        <h3>Use Image</h3>
        <p>Click to show the background image (GIF or PNG).</p>
      </div>
    </div>
    <div class="item">
      <div class="item_inner">
        <h3>Menu 3</h3>
        <p>Another menu option.</p>
      </div>
    </div>
    <div class="item">
      <div class="item_inner">
        <h3>Menu 4</h3>
        <p>And one more item here.</p>
      </div>
    </div>
  </nav>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    const index = document.querySelector(".index");
    const bgPath = document.querySelector(".bg-path");
    const bgImage = document.querySelector(".bg-image");
    const bgFill = document.querySelector(".bg-fill");
    let currentItem = null;
    let animation = null;

    function getItemDimensions(item) {
      const rect = item.getBoundingClientRect();
      const navRect = index.getBoundingClientRect();
      return {
        left: ((rect.left - navRect.left) / navRect.width) * 100,
        right: ((rect.right - navRect.left) / navRect.width) * 100,
      };
    }

    function createPath(left, right, curveStrength = 0) {
      return `M ${left} 0 H ${right} Q ${right + curveStrength} 50 ${right} 100 H ${left} V 0 Z`;
    }

    function animateHover(item) {
      if (animation) animation.kill();
      const { left, right } = getItemDimensions(item);
      const initialPath = createPath(left, left);
      const midPath = createPath(left, right, 10);
      const finalPath = createPath(left, right);

      animation = gsap.timeline()
        .set(bgPath, { attr: { d: initialPath } })
        .to(bgPath, { attr: { d: midPath }, duration: 0.2, ease: "power2.out" })
        .to(bgPath, { attr: { d: finalPath }, duration: 0.3, ease: "elastic.out(1, 0.3)" });
    }

    function animateTransition(fromItem, toItem) {
      if (animation) animation.kill();
      const fromDim = getItemDimensions(fromItem);
      const toDim = getItemDimensions(toItem);
      const direction = toDim.left > fromDim.left ? 1 : -1;

      const midPath = createPath(
        Math.min(fromDim.left, toDim.left),
        Math.max(fromDim.right, toDim.right),
        15 * direction
      );
      const finalPath = createPath(toDim.left, toDim.right);

      animation = gsap.timeline()
        .to(bgPath, { attr: { d: midPath }, duration: 0.2, ease: "power2.out" })
        .to(bgPath, { attr: { d: finalPath }, duration: 0.3, ease: "elastic.out(1, 0.3)" });
    }

    function animateHoverOut(item) {
      if (animation) animation.kill();
      const { left, right } = getItemDimensions(item);
      const initialPath = createPath(left, right);
      const midPath = createPath(left, right, 10);
      const finalPath = createPath(left, left);

      animation = gsap.timeline()
        .to(bgPath, { attr: { d: midPath }, duration: 0.2, ease: "power2.in" })
        .to(bgPath, { attr: { d: finalPath }, duration: 0.3, ease: "power2.inOut" });
    }

    index.addEventListener("mouseover", (e) => {
      const item = e.target.closest(".item");
      if (item && item !== currentItem) {
        if (currentItem) {
          animateTransition(currentItem, item);
        } else {
          animateHover(item);
        }
        currentItem = item;
      }
    });

    index.addEventListener("mouseleave", () => {
      if (currentItem) {
        animateHoverOut(currentItem);
        currentItem = null;
      }
    });

    // Handle click to toggle between background image or color
    document.querySelectorAll('.item').forEach(item => {
      item.addEventListener('click', () => {
        const bgType = item.getAttribute('data-bg');
        if (bgType === 'image') {
          bgImage.style.opacity = '1';
          bgFill.style.opacity = '0';
        } else if (bgType === 'color') {
          bgImage.style.opacity = '0';
          bgFill.style.opacity = '1';
        }
      });
    });
  </script>
</body>
</html>
