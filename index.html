<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Menu</title>
  <style>
    /* General styles */
    body {
      font-family: Arial, sans-serif;
      background: #010111; /* Matches --black in your example */
      color: #fff;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Menu styles */
    .menu {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      gap: 2rem;
    }

    .menu-link {
      position: relative;
      text-decoration: none;
      color: #fff;
      font-size: 1.5rem;
      text-transform: uppercase;
      transition: color 0.3s ease;
    }

    .menu-link:hover {
      color: #f27050; /* Matches --assertive */
    }

    /* Arrow animation */
    .menu-link::before {
      content: '→'; /* Arrow symbol */
      position: absolute;
      left: -2rem; /* Positioning the arrow */
      opacity: 0;
      transform: translateX(-20px);
      transition: all 0.3s ease;
    }

    .menu-link:hover::before {
      opacity: 1;
      transform: translateX(0);
    }
.menu-link::before {
  opacity: 0;
  transform: translateX(-20px);
  transition: opacity 0.3s ease, transform 0.3s ease;
}
  </style>
</head>
<body>
  <ul class="menu">
    <li><a href="#badass" class="menu-link">Badass</a></li>
    <li><a href="#cool" class="menu-link">Cool</a></li>
    <li><a href="#awesome" class="menu-link">Awesome</a></li>
  </ul>
</body>
</html>
