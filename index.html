<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in the Vapor</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Courier New", Courier, monospace;
            color: #fff;
            background: linear-gradient(135deg, #20002c, #cbb4d4);
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-attachment: fixed;
            overflow: hidden;
        }
        h1 {
            font-size: 3rem;
            margin: 0.5rem;
            text-shadow: 2px 2px 4px #000;
        }
        p {
            font-size: 1.2rem;
            margin: 0.5rem;
            text-shadow: 1px 1px 3px #000;
        }
        .links {
            margin-top: 2rem;
        }
        .links a {
            text-decoration: none;
            color: #00ffd0;
            margin: 0 1rem;
            font-size: 1.2rem;
            transition: color 0.3s ease;
        }
        .links a:hover {
            color: #ff00d0;
        }
        .glitch {
            position: absolute;
            top: -50px;
            left: -50px;
            width: 150%;
            height: 150%;
            z-index: -1;
            background: url('https://upload.wikimedia.org/wikipedia/commons/7/73/ASCII-Grid.png') repeat;
            animation: glitch 5s linear infinite;
            opacity: 0.3;
            mix-blend-mode: overlay;
        }
        @keyframes glitch {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-10px, 10px); }
            50% { transform: translate(10px, -10px); }
            75% { transform: translate(-5px, 5px); }
            100% { transform: translate(0, 0); }
        }
        .footer {
            position: absolute;
            bottom: 1rem;
            font-size: 0.9rem;
            color: #a0a0a0;
            text-shadow: 1px 1px 3px #000;
        }
    </style>
</head>
<body>
    <div class="glitch"></div>
    <h1>404 - Oops, You Tripped in the Matrix!</h1>
    <p>Looks like you've wandered into the void. Grab your neon shades and head back to reality.</p>
    <div class="links">
        <a href="/">Home</a>
        <a href="/about">About</a>
        <a href="/contact">Contact</a>
    </div>
    <div class="footer">
        <p>Made with retro vibes. Don’t press the big red button.</p>
    </div>
</body>
</html>
