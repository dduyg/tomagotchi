<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🗿Loop</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: "Trio Grotesk", sans-serif;
            background: #EDE8EC;
            color: #262626;
            overflow-y: auto;
        }
        main {
            max-width: 800px;
            width: 100%;
            margin: 15vh auto 0;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
        }
        .badge {
            display: inline-block;
            width: 45px;
            height: 45px;
            margin-right: 10px;
            border-radius: 50%;
            cursor: pointer;
        }
        .badge.forming-kin { background: url('memory01.svg') no-repeat center/100%; }
        .badge.forming-kin:hover, label[data-color="#f886ff"].active { background-color: #f886ff; }

        .badge.moi { background: url('memory02.svg') no-repeat center/100%; }
        .badge.moi:hover, label[data-color="#71c6ff"].active { background-color: #71c6ff; }

        .badge.cosmetic-healing { background: url('memory03.svg') no-repeat center/100%; }
        .badge.cosmetic-healing:hover, label[data-color="#8af38a"].active { background-color: #8af38a; }

        .badge.ai { background: url('memory04.svg') no-repeat center/100%; }
        .badge.ai:hover, label[data-color="#f2fc72"].active { background-color: #f2fc72; }

        .badge.living-tools { background: url('memory05.svg') no-repeat center/100%; }
        .badge.living-tools:hover, label[data-color="#c6aeff"].active { background-color: #c6aeff; }

        input { display: none; }
        label {
            display: flex;
            width: 100%;
            height: 50px;
            cursor: pointer;
            border: 3px solid;
            user-select: none;
            padding: 10px;
            transition: background 0.3s;
        }
        label div:first-child {
            width: 100%;
            line-height: 45px;
            font-size: 1.2em;
        }
        .cross {
            margin-right: 15px;
            margin-top: 3px;
        }
        .cross:before, .cross:after {
            content: '';
            border-top: 2px solid #3E474F;
            width: 15px;
            display: block;
            margin-top: 18px;
            transition: 0.3s;
        }
        .cross:after {
            transform: rotate(90deg);
            margin-top: -2px;
        }
        .content {
            font-size: 0.9em;
            margin: 10px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-in-out;
        }
        input:checked ~ .content {
            max-height: 400px;
            transition: max-height 1s;
        }
        input:checked ~ label .cross:before { transform: rotate(180deg); }
        input:checked ~ label .cross:after { transform: rotate(0deg); }

        /* Tooltip Fix */
        .tip {
            color: #f03768;
            cursor: help;
            position: relative;
            overflow: visible;
            font-family: monospace;
            font-size: 1.3em;
        }
        .tip:before, .tip:after {
            position: absolute;
            opacity: 0;
            z-index: -100;
            transition: .4s;
        }
        .tip:hover:before, .tip:hover:after {
            opacity: 1;
            z-index: 100;
        }

        /* Two-Column Layout */
        .content p {
            margin-bottom: 15px;
        }
        @media (min-width: 769px) {
            .content p {
                column-count: 2;
                column-gap: 20px;
            }
        }
        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: left;
            }
            header h1 {
                align-self: flex-start;
                margin-bottom: 40px;
            }
            header nav {
                align-self: flex-end;
                text-align: right;
            }
        }
    </style>
</head>
<body>

<main>
    <header>
        <h1>Memory Work</h1>
        <nav>
            <a href="#formingkin" class="badge forming-kin" data-target="tab-1" data-color="#f886ff"></a>
            <a href="#mothers-of-invention" class="badge moi" data-target="tab-2" data-color="#71c6ff"></a>
            <a href="#cosmetic-healing" class="badge cosmetic-healing" data-target="tab-3" data-color="#8af38a"></a>
            <a href="#ancestral-intelligence" class="badge ai" data-target="tab-4" data-color="#f2fc72"></a>
            <a href="#almanac" class="badge living-tools" data-target="tab-5" data-color="#c6aeff"></a>
        </nav>
    </header>

    <article id="formingkin">
        <input type="radio" id="tab-1" name="tabs">
        <label for="tab-1" data-color="#f886ff"><div>Forming Kin</div><div class="cross"></div></label>
        <div class="content">
            <p class="dropcap">A call for people to be with and of nature...</p>
            <p>Like mushrooms springing from disseminated spores...</p>
        </div>
    </article>

    <article id="mothers-of-invention">
        <input type="radio" id="tab-2" name="tabs">
        <label for="tab-2" data-color="#71c6ff"><div>Mothers of Invention</div><div class="cross"></div></label>
        <div class="content">
            <p class="dropcap">Referring to a loosely knit movement...</p>
            <p>In response to the clumsy and ineffectual Climate Imperative...</p>
        </div>
    </article>

</main>

<script>
    document.querySelectorAll('.badge').forEach(badge => {
        badge.addEventListener('click', function (e) {
            e.preventDefault();
            const targetId = this.getAttribute('data-target');
            const targetColor = this.getAttribute('data-color');

            document.getElementById(targetId).checked = true;

            document.querySelectorAll("label").forEach(label => label.classList.remove("active"));
            document.querySelector(`label[for="${targetId}"]`).classList.add("active");
        });
    });
</script>
</body>
</html>
