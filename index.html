<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markl Mono Typeface</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;600&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background-color: #f5f5f5;
    color: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    max-width: 800px;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    text-transform: uppercase;
    margin-bottom: 20px;
}

.header p {
    border: 1px solid black;
    padding: 5px 10px;
    display: inline-block;
}

.style-info span {
    font-weight: bold;
}

.title-section {
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 60px;
    font-weight: 600;
    gap: 20px;
    margin: 20px 0;
}

.markl {
    display: flex;
    align-items: center;
}

.box {
    border: 2px solid black;
    padding: 5px 10px;
    font-weight: bold;
}

.mono {
    display: flex;
    align-items: center;
}

.circle {
    display: inline-block;
    background-color: black;
    color: white;
    border-radius: 50%;
    width: 45px;
    height: 45px;
    text-align: center;
    line-height: 45px;
    font-weight: bold;
}

.subtext {
    font-size: 14px;
    margin-top: 20px;
}

.badge {
    position: absolute;
    top: 20px;
    right: 20px;
    background-color: #ff5722;
    color: white;
    font-weight: bold;
    padding: 10px 15px;
    border-radius: 50%;
    display: inline-block;
    font-size: 12px;
    text-transform: uppercase;
    text-align: center;
}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="part-number">
                <p>PART-NUMBER MRKL-V01-JLCTYP</p>
            </div>
            <div class="style-info">
                <p>7 STYLE <span>LIGHT → HEAVY</span></p>
            </div>
        </div>
        
        <div class="title-section">
            <div class="markl">
                <span class="box">M</span>arkl
            </div>
            <div class="mono">
                m<span class="circle">o</span>no
            </div>
        </div>

        <p class="subtext">non-proportional typeface designed for optimal readability at small sizes. With its clean & structured letterforms</p>
        
        <div class="badge">
            <span>V.1</span> MARKL MONO
        </div>
    </div>
</body>
</html>
