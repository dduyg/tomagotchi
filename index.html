<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Liminal🧊Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@452&display=swap" rel="stylesheet">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      font-family: "Manrope", sans-serif;
      overflow: hidden;
    }

    .nav-menu {
      display: flex;
      flex-direction: row;
      width: 100vw;
      height: 100vh;
      box-sizing: border-box;
      padding: 0;
      margin: 0;
      overflow: hidden;
    }

    .card-list_item {
      flex: 1 1 0; /* each item takes equal width */
      max-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
      cursor: pointer;
      background-color: transparent;
      position: relative;
      overflow: hidden;
      border: 1px solid;
    }

    .card-list_item-inner {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .card-list_bg-fill {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }
    .card-list_bg-path {
      fill: var(--base-color-neutral--white, #333);
    }
  </style>
</head>
<body>
  <nav class="nav-menu">
    <div class="card-list_item">
      <div class="card-list_item-inner">
        <h3>Menu 1</h3>
        <p>Description for Menu 1</p>
      </div>
    </div>
    <div class="card-list_item">
      <div class="card-list_item-inner">
        <h3>Menu 2</h3>
        <p>
          Description for Menu 2 with even longer text that will naturally wrap and the container will
          handle overflow gracefully. This ensures usability and readability across devices.  
        </p>
      </div>
    </div>
    <div class="card-list_item">
      <div class="card-list_item-inner">
        <h3>Menu 3</h3>
        <p>Description for Menu 3</p>
      </div>
    </div>
    <div class="card-list_item">
      <div class="card-list_item-inner">
        <h3>Menu 4</h3>
        <p>Description for Menu 4</p>
      </div>
    </div>
    <svg viewBox="0 0 100 100" preserveAspectRatio="none" class="card-list_bg-fill">
      <path d="M 0 0 H 0 Q 0 50 0 100 H 0 V 0 z" class="card-list_bg-path"></path>
    </svg>
  </nav>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    const navMenu = document.querySelector(".nav-menu");
    const bgPath = document.querySelector(".card-list_bg-path");
    let currentItem = null;
    let animation = null;

    function getItemDimensions(item) {
      const rect = item.getBoundingClientRect();
      const navRect = navMenu.getBoundingClientRect();
      return {
        left: ((rect.left - navRect.left) / navRect.width) * 100,
        right: ((rect.right - navRect.left) / navRect.width) * 100,
      };
    }

    function createPath(left, right, curveStrength = 0) {
      return `M ${left} 0 H ${right} Q ${right + curveStrength} 50 ${right} 100 H ${left} V 0 Z`;
    }

    function animateHover(item) {
      if (animation) animation.kill();

      const { left, right } = getItemDimensions(item);
      const initialPath = createPath(left, left);
      const midPath = createPath(left, right, 10);
      const finalPath = createPath(left, right);

      animation = gsap
        .timeline()
        .set(bgPath, { attr: { d: initialPath } })
        .to(bgPath, {
          attr: { d: midPath },
          duration: 0.2,
          ease: "power2.out",
        })
        .to(bgPath, {
          attr: { d: finalPath },
          duration: 0.3,
          ease: "elastic.out(1, 0.3)",
        });
    }

    function animateTransition(fromItem, toItem) {
      if (animation) animation.kill();

      const fromDim = getItemDimensions(fromItem);
      const toDim = getItemDimensions(toItem);
      const direction = toDim.left > fromDim.left ? 1 : -1;

      const midPath = createPath(
        Math.min(fromDim.left, toDim.left),
        Math.max(fromDim.right, toDim.right),
        15 * direction
      );
      const finalPath = createPath(toDim.left, toDim.right);

      animation = gsap
        .timeline()
        .to(bgPath, {
          attr: { d: midPath },
          duration: 0.2,
          ease: "power2.out",
        })
        .to(bgPath, {
          attr: { d: finalPath },
          duration: 0.3,
          ease: "elastic.out(1, 0.3)",
        });
    }

    function animateHoverOut(item) {
      if (animation) animation.kill();

      const { left, right } = getItemDimensions(item);
      const initialPath = createPath(left, right);
      const midPath = createPath(left, right, 10);
      const finalPath = createPath(left, left);

      animation = gsap
        .timeline()
        .to(bgPath, {
          attr: { d: midPath },
          duration: 0.2,
          ease: "power2.in",
        })
        .to(bgPath, {
          attr: { d: finalPath },
          duration: 0.3,
          ease: "power2.inOut",
        });
    }

    navMenu.addEventListener("mouseover", (e) => {
      const item = e.target.closest(".card-list_item");
      if (item && item !== currentItem) {
        if (currentItem) {
          animateTransition(currentItem, item);
        } else {
          animateHover(item);
        }
        currentItem = item;
      }
    });

    navMenu.addEventListener("mouseleave", () => {
      if (currentItem) {
        animateHoverOut(currentItem);
        currentItem = null;
      }
    });
  </script>
</body>
</html>
