<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #1c1c1c; /* Dark gray background */
            color: #ffffff; /* White text */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        main {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .contact-info {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            padding-top: 20px;
        }

        /* Add a border-top only to the first contact-info */
        .contact-info:first-of-type {
            border-top: 1px solid #5a5a5a; /* Line separator */
        }

        .label {
            font-size: 1rem;
            text-transform: uppercase;
            color: #d0d0d0; /* Light gray */
            font-weight: bold;
        }

        .details {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        a {
            color: #ffffff;
            text-decoration: none;
            font-size: 1rem;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <main>
        <h1>Contact</h1>
        <div class="contact-info">
            <div class="label">Mail</div>
            <div class="details">
                <a href="#">hello@itsshari.ee</a>
            </div>
        </div>
        <div class="contact-info">
            <div class="label">Social Medias</div>
            <div class="details">
                <a href="#">instagram</a>
                <a href="#">behance</a>
            </div>
        </div>
    </main>
</body>
</html>
