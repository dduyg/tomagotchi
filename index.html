<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404notfound</title>
    <style>
        body {
            font-family: "Alegreya Sans", sans-serif;
            background-color: darkgray;
            color: #353839;
            font-size: 1.4rem;
            line-height: 1.5;     
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            overflow: hidden;
        }

        h1 {
            font-size: 8rem;
            font-weight: bold;
            color: #ff00ff;
            text-shadow: 0px 0px 20px rgba(255, 0, 255, 0.7), 0px 0px 30px rgba(255, 0, 255, 0.6), 0px 0px 40px rgba(255, 0, 255, 0.5);
        }

        .message {
            font-size: 1.2rem;
            color: #ffffff;
            margin-top: 30px;
            animation: fadeIn 3s ease-in-out infinite;
        }
        @keyframes fadeIn {
            0% { opacity: 0; }
            50% { opacity: 1; }
            100% { opacity: 0; }
        }

        .vaporwave {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.15;
        }

        .vaporwave img {
            width: 150px;
            height: auto;
            filter: hue-rotate(180deg) brightness(1.5);
        }
    </style>
</head>
<body>
    <div class="vaporwave">
        <img src="https://media4.giphy.com/media/xULW8t4niLpdPz9GRW/giphy.gif" alt="Vaporwave Logo">
    </div>

    <h1>404</h1>
    <p class="message">Looks like you've stumbled upon a void in the digital matrix.</p>
</body>
</html>
