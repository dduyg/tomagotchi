<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 Not Found</title>
    <style>
        body {
            background-color: #F598FF;
            font-family: monospace;
            color: #a8a8a8;
            text-align: center;
            line-height: 1.5;
            margin: 0;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            overflow: hidden;
        }

        h1 {
            font-size: 6rem;
            position: relative;
            animation: static-noise 0.3s infinite;
        }
        @keyframes static-noise {
            0%, 100% { opacity: 1; }
            10% { opacity: 0.6; }
            20% { opacity: 1.2; }
            30% { opacity: 0.8; }
            40% { opacity: 1.1; }
            50% { opacity: 0.7; }
            60% { opacity: 1.3; }
            70% { opacity: 0.5; }
        } 

        p {
            font-size: 1.4rem;
            margin-top: 50px;
            letter-spacing: 3px;
            font-weight: bold;
            animation: matrix 3s infinite linear;
        }
        @keyframes matrix {
            0% {opacity: 0.1; transform: translateY(-20px);}
            50% {opacity: 1; transform: translateY(0);}
            100% {opacity: 0.1; transform: translateY(20px);}
        }

.scanline-glitch {
  background: repeating-linear-gradient(transparent, transparent 1px, rgba(255, 255, 255, 0.05) 1px, rgba(255, 255, 255, 0.1) 2px);
  animation: scanline-glitch 0.05s linear infinite;
  background-size: 100% 2px;
}
        @keyframes scanline-glitch {
  0% { background-position: 100% 0; }
  100% { background-position: 0 100%; }
}
    </style>
</head>
<body>    
    <h1>404</h1>
    <div class="scanline-glitch">Not Found</div>
    <p>System Error. Rebooting...</p>
</body>
</html>
