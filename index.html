<!DOCTYPE html>
<html lang="en">
<head>

    <title>LiminalLoop</title>
    <style>
        @font-face {
            font-family: 'GoodGlyphs No 1';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/GoodGlyphs-No1.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
        }
    @font-face {
  font-family: 'Canela';
  src: url('https://cdn.prod.website-files.com/646e1e78529cb4c123c9cafa/6489e7c271904b63c8539bb8_Canela-Thin.otf') format('opentype');
  font-weight: 100;
  font-style: normal;
}
@font-face {
  font-family: 'Canela';

  font-weight: 100;
  font-style: italic;
}
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        html {height: 100%;}
        body {
            font-family: 'Canela', sans-serif;
            background-color: #000;
            color: #ede3e0;
            padding-top: 70px;
            height: 100%;
            background-image: linear-gradient(#000, #8a93a8);
            background-repeat: no-repeat; 
            background-attachment: fixed;
            /* 
            background-image: linear-gradient(#000, #a0a2ca); 
            background-image: linear-gradient(#000, #7a1d29);
            background-image: linear-gradient(#000 50%, #fff);
            background-image: linear-gradient(#000 52%, gray);
            */
        }
        header {
            border-bottom: 1px #fff;
            padding: 100px 20px;
        }
        .title {
            max-width: 100%;
            letter-spacing: -2px;
            font-size: 72px;
            line-height: 100%;
        }
        a { 
            color: inherit;
            text-decoration: none;
            margin-left: 100px;
        }
        .symbol {
            margin-right: 20px;
            font-family: 'GoodGlyphs No 1', sans-serif;
            line-height: 72%;
        }
        @media screen and (max-width: 767px) { 
            header {
                padding-top: 40px;
                padding-bottom: 40px;
            }
            .title {
                font-size: 48px;
                margin-bottom: 30%;
            }
            a {margin-left: 40px;}
        }
    </style>
</head>

            <span class="superspan _3"> </span>
            <a href="#🚪"><span class="symbol">c </span> consumer goods</a>
            <br/>industries.<br/>
        </div>
    </header>

</html>
