<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(135deg, #ff0099, #493240, #9c27b0, #00bcd4);
            background-size: 400% 400%;
            animation: gradientShift 10s ease infinite;
            color: white;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        
        h1 {
            font-size: 5em;
            letter-spacing: 5px;
            text-shadow: 0px 0px 20px rgba(255, 255, 255, 0.5), 0px 0px 30px rgba(255, 255, 255, 0.3);
        }

        .logo {
            width: 100px;
            margin: 20px;
        }

        .links {
            display: flex;
            gap: 30px;
            font-size: 1.5em;
        }

        .links a {
            color: white;
            text-decoration: none;
            border: 1px solid white;
            padding: 10px;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .links a:hover {
            background-color: white;
            color: #9c27b0;
            border-color: #9c27b0;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

    </style>
</head>
<body>
    <div class="container">
        <!-- SVG Logo -->
        <svg class="logo" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
            <circle cx="50" cy="50" r="45" fill="none" stroke="white" stroke-width="5"/>
            <path d="M 50,50 L 30,90 L 70,90 Z" fill="white"/>
            <path d="M 50,50 L 70,10 L 30,10 Z" fill="none" stroke="white" stroke-width="5"/>
        </svg>

        <h1>404 Not Found</h1>
        <p>The page you are looking for doesn't exist. Don't worry, though, we've got more to explore!</p>

        <div class="links">
            <a href="/home">Home</a>
            <a href="/about">About Us</a>
            <a href="/contact">Contact</a>
            <a href="/services">Services</a>
        </div>
    </div>
</body>
</html>
