<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markl Mono Typeface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inconsolata:wght@300;400;700&display=swap');

        body {
            font-family: 'Inconsolata', monospace;
            background-color: #F4F4F4;
            color: #222;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: 50px auto;
            padding: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }

        .header-box {
            border: 1px solid #333;
            padding: 8px 12px;
            text-align: left;
        }

        .title {
            font-size: 70px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .title span {
            display: inline-block;
        }

        .boxed {
            border: 2px solid black;
            padding: 4px;
        }

        .highlight-box {
            display: inline-block;
            border: 2px solid black;
            padding: 5px;
            font-size: 12px;
        }

        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #FF5722;
            color: white;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            writing-mode: vertical-rl;
            text-align: center;
            transform: rotate(180deg);
        }

        .description {
            font-size: 14px;
            max-width: 600px;
            margin: 20px auto;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="header-box">
                <strong>PART-NUMBER</strong> MRKL-V01-JLCTYP <br>
                <strong>7 STYLE</strong> LIGHT → HEAVY
            </div>
            <div>NEW-2025-MONO</div>
        </div>

        <div class="title">
            <span class="boxed">M</span>arkl <span class="highlight-box">o.SS05</span> mono
        </div>

        <div class="description">
            Non-proportional typeface designed for optimal readability at small sizes. With its clean & structured letterforms.
        </div>

        <div class="badge">V.1 MARKL MONO</div>
    </div>

</body>
</html>
