<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 Not Found</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #ff6cc9, #01aaff);
            color: #fff;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            animation: glitch 3s infinite;
        }

        h1 {
            font-size: 7em;
            letter-spacing: 5px;
            text-shadow: 0 0 5px rgba(0,0,0,0.3), 0 0 10px rgba(0,0,0,0.3), 0 0 15px rgba(0,0,0,0.3);
            margin: 0;
            position: relative;
        }

        h1:before, h1:after {
            content: "404";
            position: absolute;
            top: 0;
            left: 0;
            font-size: 7em;
            color: #00ffcc;
            z-index: -1;
            animation: glitch-effect 2s infinite linear;
        }

        h1:after {
            left: 5px;
            text-shadow: -2px 0px 3px rgba(0,0,0,0.2);
        }

        p {
            font-size: 1.5em;
            color: #f0f0f0;
            margin-top: 20px;
            animation: neon 1.5s ease-in-out infinite;
        }

        a {
            color: #ff00ff;
            font-size: 1.2em;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            display: inline-block;
            margin-top: 30px;
            animation: neon 1.5s ease-in-out infinite;
        }

        a:hover {
            color: #fff;
            text-decoration: underline;
        }

        @keyframes glitch {
            0% {
                transform: translateX(2px) translateY(1px);
            }
            25% {
                transform: translateX(-2px) translateY(-2px);
            }
            50% {
                transform: translateX(2px) translateY(1px);
            }
            75% {
                transform: translateX(-2px) translateY(-1px);
            }
            100% {
                transform: translateX(2px) translateY(1px);
            }
        }

        @keyframes glitch-effect {
            0% {
                clip-path: inset(0 0 0 0);
            }
            50% {
                clip-path: inset(0 0 0 50%);
            }
            100% {
                clip-path: inset(0 0 0 0);
            }
        }

        @keyframes neon {
            0%, 100% {
                text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 15px #ff00ff, 0 0 20px #ff00ff;
            }
            50% {
                text-shadow: 0 0 5px #00ffcc, 0 0 10px #00ffcc, 0 0 15px #00ffcc, 0 0 20px #00ffcc;
            }
        }
    </style>
</head>
<body>
    <div>
        <h1>404</h1>
        <p>Page Not Found</p>
        <a href="/">Go back to Home</a>
    </div>
</body>
</html>
