<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #1c1c1c; /* Dark gray background */
            color: #ffffff; /* White text */
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        main {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        section {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two equal columns */
            gap: 1.5rem;
            padding-top: 1.5rem;
        }
        section:first-of-type {
            border-top: 1px solid currentColor;
        }

        .label {
            font-size: 1rem;
            text-transform: uppercase;
            color: #d0d0d0; /* Light gray */
            font-weight: bold;
        }
        .details {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        a {
            color: inherit;
            text-decoration: none;
            padding-bottom: 0.2ex;
            background-image: linear-gradient(#FEA481, #FEA481);
            background-size: 100% 0.3ex;
            background-repeat: no-repeat;
            background-position: left bottom;
            transition: background-position 0.36s ease-in-out;     
        }
        a:hover {
            background-position: left 58%;
        }
    </style>
</head>
<body>
    <main>
        <h1>Contact</h1>
        <section>
            <div class="label">Mail</div>
            <div class="details">
                <a href="#">hello@itsshari.ee</a>
            </div>
        </section>
        <section>
            <div class="label">Social Medias</div>
            <div class="details">
                <a href="#">instagram</a>
                <a href="#">behance</a>
            </div>
        </section>
    </main>
</body>
</html>
