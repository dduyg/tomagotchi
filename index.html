<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to bottom, #000428, #004e92);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        .error-title {
            font-size: 5rem;
            font-weight: bold;
            margin: 0;
        }

        .error-message {
            font-size: 1.5rem;
            margin: 20px 0;
        }

        .animation {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 20px;
        }

        .animation img {
            width: 100%;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .back-home {
            display: inline-block;
            padding: 10px 20px;
            font-size: 1rem;
            color: white;
            text-decoration: none;
            background: #ff6b6b;
            border-radius: 50px;
            transition: background 0.3s ease;
        }

        .back-home:hover {
            background: #d9534f;
        }

        footer {
            margin-top: 50px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="animation">
            <img src="https://via.placeholder.com/300" alt="Astronaut Illustration">
        </div>
        <h1 class="error-title">404</h1>
        <p class="error-message">Oops! The page you're looking for can't be found.</p>
        <a href="/" class="back-home">Go Back Home</a>
        <footer>
            © 2025 YourWebsiteName. All rights reserved.
        </footer>
    </div>
</body>
</html>
