<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found - Data Science Business</title>
    <style>
        /* Basic Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: linear-gradient(135deg, #ff77ff, #00bcd4);
            color: #fff;
            text-align: center;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        .neon-text {
            font-size: 72px;
            text-transform: uppercase;
            letter-spacing: 10px;
            animation: neon 1.5s infinite alternate;
            text-shadow: 0 0 5px rgba(255, 0, 255, 0.5), 0 0 10px rgba(255, 0, 255, 0.7),
                0 0 15px rgba(255, 0, 255, 0.9), 0 0 20px rgba(255, 0, 255, 1);
        }

        @keyframes neon {
            0% {
                text-shadow: 0 0 5px rgba(255, 0, 255, 0.5), 0 0 10px rgba(255, 0, 255, 0.7),
                    0 0 15px rgba(255, 0, 255, 0.9), 0 0 20px rgba(255, 0, 255, 1);
            }
            100% {
                text-shadow: 0 0 15px rgba(255, 0, 255, 0.7), 0 0 30px rgba(255, 0, 255, 0.9),
                    0 0 45px rgba(255, 0, 255, 1), 0 0 60px rgba(255, 0, 255, 1);
            }
        }

        .message {
            font-size: 36px;
            margin-top: 20px;
        }

        .code {
            font-size: 48px;
            font-weight: bold;
            margin-top: 30px;
            color: rgba(0, 255, 255, 0.8);
        }

        .button {
            background-color: #ff00ff;
            color: #fff;
            border: 2px solid #fff;
            padding: 15px 30px;
            font-size: 18px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 40px;
            display: inline-block;
            transition: all 0.3s ease;
        }

        .button:hover {
            background-color: #00bcd4;
            border-color: #00bcd4;
            color: #000;
        }

        .background-graphic {
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%) rotate(-15deg);
            width: 300px;
            height: 300px;
            background: linear-gradient(45deg, #ff00ff, #00bcd4);
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.6), 0 0 100px rgba(0, 255, 255, 0.6);
            animation: rotate-bg 10s infinite linear;
        }

        @keyframes rotate-bg {
            0% {
                transform: translateX(-50%) rotate(-15deg);
            }
            100% {
                transform: translateX(-50%) rotate(345deg);
            }
        }

    </style>
</head>
<body>
    <div class="background-graphic"></div>
    <h1 class="neon-text">404</h1>
    <div class="message">Oops! The page you're looking for isn't here.</div>
    <div class="code">Error Code: 404</div>
    <a href="/" class="button">Return to Homepage</a>
</body>
</html>
