<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Leeya's Homepage</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #ff77ff, #00b0ff);
            color: #fff;
            overflow-x: hidden;
        }

        header {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 0;
            text-align: center;
        }

        header h1 {
            font-size: 3rem;
            margin: 0;
            text-transform: uppercase;
            color: #ff5c8d;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }

        header p {
            font-size: 1.2rem;
            margin: 10px 0;
            color: #a2f0ff;
        }

        section {
            padding: 50px 20px;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
        }

        section h2 {
            font-size: 2.5rem;
            color: #ff5c8d;
            text-transform: uppercase;
            margin-bottom: 20px;
        }

        section p {
            font-size: 1.2rem;
            color: #a2f0ff;
            line-height: 1.5;
        }

        footer {
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 0;
            text-align: center;
            color: #a2f0ff;
        }

        footer a {
            color: #ff5c8d;
            text-decoration: none;
            font-weight: bold;
        }

        .neon-text {
            text-shadow: 0 0 5px #ff5c8d, 0 0 10px #ff5c8d, 0 0 20px #ff5c8d;
        }

        /* Add vaporwave grid effect */
        .vaporwave-grid {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/purty-wood.png') repeat;
            opacity: 0.2;
        }
    </style>
</head>
<body>
    <div class="vaporwave-grid"></div>
    <header>
        <h1>Leeya Data/Coding</h1>
        <p class="neon-text">Welcome to my personal page</p>
    </header>
    <section>
        <h2>Introduction</h2>
        <p>Hello! I'm Leeya, and I have a passion for data and coding. I'm always exploring new technologies and working on exciting projects. Feel free to explore and connect with me!</p>
    </section>
    <footer>
        <p>Stay in touch: <a href="mailto:leeya@example.com">Email me</a></p>
    </footer>
</body>
</html>
