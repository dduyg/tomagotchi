<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 – Lost in the Data Stream</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@600&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(145deg, #0f0f0f, #1a1a1a);
      color: #00ffe0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      overflow: hidden;
    }

    .logo {
      font-size: 2.5rem;
      text-shadow: 0 0 8px #00ffe0, 0 0 15px #00ffe0;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    .glitch {
      font-size: 6rem;
      position: relative;
      color: #00ffe0;
      text-shadow: 0 0 5px #00ffe0, 0 0 10px #00ffe0;
    }

    .glitch::before,
    .glitch::after {
      content: '404';
      position: absolute;
      left: 0;
      width: 100%;
      overflow: hidden;
      color: #ff00c8;
      clip: rect(0, 900px, 0, 0);
    }

    .glitch::before {
      animation: glitchTop 2s infinite linear;
    }

    .glitch::after {
      animation: glitchBottom 2s infinite linear;
    }

    @keyframes glitchTop {
      0% {
        clip: rect(0, 9999px, 0, 0);
      }
      5% {
        clip: rect(0, 9999px, 20px, 0);
        transform: translate(-3px, -3px);
      }
      10% {
        clip: rect(0, 9999px, 0, 0);
        transform: none;
      }
      100% {
        clip: rect(0, 9999px, 0, 0);
      }
    }

    @keyframes glitchBottom {
      0% {
        clip: rect(0, 9999px, 0, 0);
      }
      5% {
        clip: rect(60px, 9999px, 100px, 0);
        transform: translate(3px, 3px);
      }
      10% {
        clip: rect(0, 9999px, 0, 0);
        transform: none;
      }
      100% {
        clip: rect(0, 9999px, 0, 0);
      }
    }

    .message {
      font-size: 1.2rem;
      margin-top: 10px;
      color: #a0fdfa;
      text-align: center;
    }

    a.home-link {
      margin-top: 30px;
      padding: 10px 20px;
      border: 2px solid #00ffe0;
      text-decoration: none;
      color: #00ffe0;
      transition: background 0.3s, color 0.3s;
    }

    a.home-link:hover {
      background: #00ffe0;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="logo">[ CYBERDATA NODE ]</div>
  <div class="glitch">404</div>
  <div class="message">You’ve fallen out of the data stream.<br />The page you're looking for doesn't exist.</div>
  <a class="home-link" href="/">Reconnect to Home</a>
</body>
</html>
