<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal Loop</title>
  <style>
    body {
      padding: 0;
      margin: 0;
      background-color: #B8B9BE;
      color: #3A3A3C;
      line-height: 1.5;
      font-family: 'LabMono', monospace;
    }
    main {
      max-width: 800px;
      margin: 0 auto;
      padding: 2em;
    }
    h1 {
      margin-top: 5em;
    }
    u {
      text-decoration: none;
      position: relative;
    }
    u::before {
      content: '';
      position: absolute;
      top: -0.33em;
      left: 0;
      right: 0;
      height: 1.1px; /* Intermediate thickness */
      background-color: currentColor;
    }
  </style>
</head>
<body>
  <main>
    <h1>Conver<u>sations&nbsp;</u> with open minded people are one of my favourite things</h1>
  </main>
</body>
</html>
