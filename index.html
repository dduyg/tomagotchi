<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Side By Side</title>
  <style>
    /* Basic Styles */
    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      color: #242E2C;
    }
    a {
      text-decoration: none;
      color: currentColor;
    }
    a:hover {
      text-decoration: underline;
    }

    /* Header Bar */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #588467;
      color: #E2EFF3;
      height: 30px;
      padding: 0 8px;
      border-bottom: 1px solid currentColor;
    }
    .contact {
      display: none;
    }
    @media (min-width: 400px) {
      .contact {
        display: block;
      }
    }

    /* Centered Section */
    .center {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0 16px;
    }

    .links {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      text-align: center;
    }

    .button {
      display: block;
      text-transform: uppercase;
      background: #588467;
      color: #E2EFF3;
      padding: 10px 20px;
      border: none;
      cursor: pointer;
    }
    .button:hover {
      background: #456956;
    }

    /* Footer */
    .footer {
      position: absolute;
      bottom: 0;
      width: 100%;
      background: #588467;
      color: #E2EFF3;
      text-align: center;
      padding: 10px 0;
      border-top: 1px solid currentColor;
    }

    /* Placeholder for SVG or other visuals */
    .visual {
      width: 200px;
      height: 200px;
      background: #0D4C6D;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="https://goo.gl/maps/wz9djpb8TZW4rEor9" target="_blank">3701 N Ravenswood Ave, Chicago</a>
    <a href="mailto:hi@sideby.space?subject=Hey%20hello%20hi" class="contact">hi@sideby.space</a>
  </header>

  <main class="center">
    <div class="visual"></div>
    <div class="links">
      <a href="mailto:hi@sideby.space?subject=Hey%20hello%20hi" class="button">Stop by for a beer</a>
      <a href="https://front-of-house.notion.site/Side-By-Side-26ca3618b5784272b7dfe3517c4fc0fd" class="button">Learn more about us</a>
      <a href="https://www.instagram.com/sideby.space/" class="button">Check out the Instagram</a>
    </div>
  </main>

  <footer class="footer">
    <span>SIDE BY SIDE</span>
  </footer>
</body>
</html>
