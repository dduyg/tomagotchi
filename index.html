<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Continuous Scrolling Image Row</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f0f0f0;
    }

    .image-container {
      width: 100%; /* Full width */
      overflow: hidden; /* Hide overflow */
      background: #333;
    }

    .image-row {
      display: flex;
      animation: scroll-horizontal 6s linear infinite;
    }

    .image-row img {
      height: 200px; /* Fixed height */
      width: auto; /* Maintain aspect ratio */
      border: 2px solid white;
      box-sizing: border-box;
      margin: 0;
    }

    /* Keyframes for horizontal scrolling */
    @keyframes scroll-horizontal {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-100%);
      }
    }

    .image-row:hover {
      animation-play-state: paused; /* Pause on hover */
    }
  </style>
</head>
<body>
  <div class="image-container">
    <div class="image-row">
      <img src="https://picsum.photos/300/200?random=1" alt="Image 1">
      <img src="https://picsum.photos/300/200?random=2" alt="Image 2">
      <img src="https://picsum.photos/300/200?random=3" alt="Image 3">
      <img src="https://picsum.photos/300/200?random=4" alt="Image 4">
      <img src="https://picsum.photos/300/200?random=5" alt="Image 5">
    </div>
  </div>

  <script>
    const imageRow = document.querySelector('.image-row');

    // Duplicate the row for a seamless scrolling effect
    imageRow.innerHTML += imageRow.innerHTML;
  </script>
</body>
</html>
