<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        @font-face {
            font-family: 'HK Grotesk';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/HKGrotesk-Regular.woff2') format('woff2'),
                 url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/HKGrotesk-Regular.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'HK Grotesk';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/HKGrotesk-Bold.woff2') format('woff2'),
                 url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/HKGrotesk-Bold.woff') format('woff');
            font-weight: bold;
            font-style: normal;
        } 
        body {
            font-family: 'HK Grotesk', sans-serif;
            background-color: #DAE5E7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        main {
            text-align: center;
            font-size: 24px;
        }
        ul {
            padding: 0;
        }
        ul li {
            display: flex;
            align-items: center;
            padding-left: 1em;
            margin-top: 1.5em;
            position: relative;
    font-size: 1em;
    list-style: none;
}

ul li:before {
    content: "●";
    display: flex;
    align-items: center;
    justify-content: center;
    height: 2.625em;
    width: 2.625em;
    border-radius: 50%;
    border: 0.125em solid #fff;
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    left: -3.5em;
}
    </style>
</head>
<body>
    <main>
        <ul>
            <li>PIANO ENTHUSIAST</li>
            <li>PLANT LOVER</li>
            <li>ANALOG-FILM WASTER</li>
            <li>RETRO PATTERNS SPOTTER</li>
            <li>AVID TRAVELER</li>
            <li>MUSIC NOMAD</li>
        </ul>
    </main>
</body>
</html>
