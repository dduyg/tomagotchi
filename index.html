<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    body {
      background: #1b1b2f;
      font-family: 'Courier New', monospace;
      color: #f4b400;
      text-align: center;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    h1 {
      font-size: 6rem;
      letter-spacing: 0.5rem;
      margin: 0;
      animation: glitch 1s infinite linear alternate-reverse;
    }

    p {
      font-size: 1.5rem;
      letter-spacing: 0.2rem;
      margin-top: 1rem;
    }

    .glitch {
      position: relative;
      display: inline-block;
      font-size: 6rem;
      text-transform: uppercase;
      color: #f4b400;
    }

    .glitch:before,
    .glitch:after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      z-index: -1;
      color: #ff007f;
      animation: glitch-animation 1s infinite linear alternate-reverse;
    }

    .glitch:after {
      color: #00b7ff;
      left: 3px;
      top: 3px;
    }

    @keyframes glitch {
      0% {
        text-shadow: 3px 3px 0 #ff007f, -3px -3px 0 #00b7ff;
        transform: translate(0);
      }
      50% {
        text-shadow: 1px 0 0 #ff007f, -1px 0 0 #00b7ff;
        transform: translate(5px, -5px);
      }
      100% {
        text-shadow: 2px 2px 0 #ff007f, -2px -2px 0 #00b7ff;
        transform: translate(-5px, 5px);
      }
    }

    @keyframes glitch-animation {
      0% {
        transform: translateX(-2px) translateY(-2px);
        opacity: 0.8;
      }
      20% {
        transform: translateX(2px) translateY(2px);
        opacity: 0.9;
      }
      40% {
        transform: translateX(-3px) translateY(3px);
        opacity: 0.8;
      }
      60% {
        transform: translateX(3px) translateY(-3px);
        opacity: 1;
      }
      80% {
        transform: translateX(-1px) translateY(1px);
        opacity: 0.8;
      }
      100% {
        transform: translateX(2px) translateY(-2px);
        opacity: 0.7;
      }
    }

    .button {
      background: #ff007f;
      color: white;
      padding: 10px 20px;
      font-size: 1.2rem;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      text-transform: uppercase;
      text-decoration: none;
      margin-top: 2rem;
      display: inline-block;
      transition: background 0.3s ease;
    }

    .button:hover {
      background: #00b7ff;
    }

    .background-grid {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('https://media.giphy.com/media/1c2hxjuh5F1bc/giphy.gif');
      background-size: cover;
      z-index: -2;
    }
  </style>
</head>
<body>
  <div class="background-grid"></div>
  <div>
    <h1 class="glitch" data-text="404">404</h1>
    <p>Oops, looks like you’ve found a page that doesn’t exist!</p>
    <a href="/" class="button">Back to Home</a>
  </div>
</body>
</html>
