<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 - Page Not Found</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1f1f1f;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            text-align: center;
        }

        h1 {
            font-size: 6rem;
            color: #ff66cc;
            text-shadow: 0 0 10px #ff66cc, 0 0 30px #ff66cc;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.5rem;
            color: #a9a9a9;
            margin-bottom: 30px;
        }

        .logo {
            width: 120px;
            height: 120px;
            margin-bottom: 30px;
        }

        .links {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 20px;
        }

        .links a {
            color: #ff66cc;
            font-size: 1.2rem;
            text-decoration: none;
            padding: 10px 20px;
            border: 2px solid #ff66cc;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .links a:hover {
            background-color: #ff66cc;
            color: #1f1f1f;
        }

        /* SVG Styles for the Letter D Logo */
        .logo-svg {
            fill: #ff66cc;
        }

    </style>
</head>
<body>

    <!-- SVG Logo for the letter D -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" class="logo">
        <path d="M20 10 H80 C90 10 90 30 80 30 H60 C60 30 60 50 80 50 H90 C100 50 100 70 90 70 H80 C80 70 80 90 60 90 H20 C10 90 10 70 20 70 H40 C40 70 40 50 20 50 H10 C0 50 0 30 10 30 H20 C20 30 20 10 20 10 Z" class="logo-svg"/>
    </svg>

    <!-- 404 Error message -->
    <h1>404</h1>
    <p>Oops! Looks like you're lost in the void. The page you requested cannot be found.</p>

    <!-- Links Section -->
    <div class="links">
        <a href="/home">Home</a>
        <a href="/about">About Us</a>
        <a href="/contact">Contact</a>
        <a href="/services">Services</a>
    </div>

</body>
</html>
