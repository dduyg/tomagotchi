<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: #2e2b5f;
            color: #ff99cc;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            text-align: center;
            background: linear-gradient(45deg, #ff66b2, #00b0ff);
            overflow: hidden;
        }

        h1 {
            font-size: 100px;
            margin: 0;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.5), 0 0 25px #ff66b2, 0 0 50px #ff66b2;
        }

        h2 {
            font-size: 30px;
            font-weight: 300;
            margin: 20px 0;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .neon-text {
            color: #ffffff;
            font-size: 50px;
            font-weight: bold;
            text-transform: uppercase;
            text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 15px #ff00ff;
        }

        .vaporwave {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 200px;
            color: rgba(255, 255, 255, 0.1);
            font-family: 'Courier New', monospace;
            z-index: -1;
            animation: move 10s linear infinite;
        }

        @keyframes move {
            0% {
                transform: translate(-50%, -50%) rotate(0deg);
            }
            100% {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        .button {
            margin-top: 30px;
            padding: 15px 40px;
            background-color: #ff00ff;
            color: #fff;
            text-decoration: none;
            font-size: 20px;
            border-radius: 5px;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.5);
            transition: 0.3s;
        }

        .button:hover {
            background-color: #ff66b2;
            box-shadow: 0 0 25px rgba(255, 102, 178, 0.7);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-gap: 20px;
            margin-top: 30px;
            padding: 0 30px;
            max-width: 1200px;
            width: 100%;
        }

        .grid div {
            background-color: rgba(255, 255, 255, 0.2);
            height: 100px;
            border-radius: 15px;
            animation: fadeIn 3s infinite alternate;
        }

        @keyframes fadeIn {
            0% {
                opacity: 0.1;
                transform: scale(0.95);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

    </style>
</head>
<body>
    <div class="vaporwave">🌀</div>
    <h1 class="neon-text">404</h1>
    <h2>Whoops! We couldn't find that page.</h2>
    <p>It seems like you are lost in the void of the internet.</p>
    <a href="/" class="button">Back to Home</a>

    <div class="grid">
        <div></div>
        <div></div>
        <div></div>
        <div></div>
    </div>
</body>
</html>
