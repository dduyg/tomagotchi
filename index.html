<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            color: #ffffff;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
        }
        .container {
            padding: 20px;
            border: 2px solid #ffffff;
            background-color: rgba(0, 0, 0, 0.5);
            border-radius: 15px;
        }
        h1 {
            font-size: 4em;
            margin: 0;
            text-shadow: 3px 3px #ff33cc;
        }
        p {
            font-size: 1.5em;
            margin: 20px 0;
        }
        img {
            max-width: 100%;
            height: auto;
            border-radius: 15px;
        }
        a {
            color: #ff33cc;
            text-decoration: none;
            font-size: 1.2em;
            border: 2px solid #ff33cc;
            padding: 10px 20px;
            border-radius: 5px;
            transition: background-color 0.3s, color 0.3s;
        }
        a:hover {
            background-color: #ff33cc;
            color: #ffffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Oops! This page got lost in the neon lights.</p>
        <img src="https://www.example.com/vaporwave-image.jpg" alt="Vaporwave Image">
        <p><a href="/">Take me home</a></p>
    </div>
</body>
</html>
