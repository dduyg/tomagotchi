<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            font-family: 'Arial', sans-serif;
            background-color: #222;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            flex-direction: column;
            text-align: center;
        }

        .vaporwave-text {
            font-size: 1.5rem;
            animation: glitch 1s linear infinite;
        }
        @keyframes glitch {
            0% { transform: translateX(0); opacity: 1; }
            20% { transform: translateX(-5px); opacity: 0.7; }
            40% { transform: translateX(5px); opacity: 0.7; }
            60% { transform: translateX(-5px); opacity: 0.7; }
            80% { transform: translateX(5px); opacity: 0.7; }
            100% { transform: translateX(0); opacity: 1; }
        }

        .glitch-art {
            position: relative;
            margin-top: 30px;
            animation: glitch 1.5s infinite;
        }
        .glitch-art:before,
        .glitch-art:after {
            content: '404';
            position: absolute;
            top: 0;
            left: 0;
            color: #ff00f6;
            z-index: -1;
        }
        .glitch-art:after {
            left: 2px;
            top: 2px;
            animation: glitch 2s infinite;
        }
    </style>
</head>
<body>
    <div class="vaporwave-text">Welcome to the Void</div>
    <div class="glitch-art">404</div>
</body>
</html>
