<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Liminal🎚Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Cousine&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Danfo&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@455&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: none;
      background-color: #111;
      color: #e0e0e0;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
      font-family: "Cousine", monospace;
      letter-spacing: -0.03em;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: transparent url("http://assets.iceable.com/img/noise-transparent.png") repeat 0 0;
      background-size: 300px 300px;
      animation: noise-animation 0.3s steps(5) infinite;
      opacity: 1;
      will-change: transform;
      z-index: 100;
      pointer-events: none;
    }
    @keyframes noise-animation {
      0%   { transform: translate(0, 0); }
      10%  { transform: translate(-2%, -3%); }
      20%  { transform: translate(-4%, 2%); }
      30%  { transform: translate(2%, -4%); }
      40%  { transform: translate(-2%, 5%); }
      50%  { transform: translate(-4%, 2%); }
      60%  { transform: translate(3%, 0); }
      70%  { transform: translate(0, 3%); }
      80%  { transform: translate(-3%, 0); }
      90%  { transform: translate(2%, 2%); }
      100% { transform: translate(1%, 0); }
    }

    .layout { 
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 100%;
      height: 100vh;
      position: relative;
      z-index: 20;
      padding: 6rem 2rem;
      pointer-events: auto;     
    }
    .layout__middle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      font-size: 0.75rem;
      text-transform: uppercase;
    }
    .middle {
      text-align: right;
      transform: rotate3d(0, 0, 1, 90deg) translate3d(100%, 10px, 0);
      transform-origin: right;
      white-space: nowrap;
    }
    
    section {
      position: absolute;
      font-size: 0.75rem;
      line-height: 1;
      text-transform: uppercase;
    }
    section.top-left {
      top: 2rem;
      left: 2rem;
      text-align: left;
      font-family: "Cinzel", serif;
      z-index: 20;
    }
    section.top-right {
      top: 2rem;
      right: 2rem;
      text-align: right;
    }
    section.bottom-left {
      bottom: 2rem;
      left: 2rem;
      text-align: left;
      position: fixed;
    }
    section.bottom-right {
      bottom: 2rem;
      right: 2rem;
      text-align: right;
      position: fixed;
    }
    .statement {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      text-align: center;
      z-index: 1;
      max-width: 440px;
      mix-blend-mode: screen;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .statement h2 {
      font-family: "Danfo", serif;
      font-size: 1.25rem;
      letter-spacing: 0.2em;
      margin-top: 1rem;
      text-transform: uppercase;
    }
    
    .custom-cursor {
      position: fixed;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      mix-blend-mode: difference;
      z-index: 9999;
      transition: width 0.2s, height 0.2s;
      will-change: transform;
    }
    canvas {
      display: block;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw;
      height: 100vh;
      margin: 0 !important;
      padding: 0 !important;
      z-index: 2;
      pointer-events: none;
    }

    #colorPreset {
      position: absolute;
      top: 100%; /* right below the section */
      right: 0;
      z-index: 999;
      padding: 0.2em 0.5em;
      font-size: 1em;
      background: #222;
      color: #fff;
      border: 1px solid #555;
      border-radius: 0.3em;
      outline: none;
      display: none;
      box-shadow: 0 2px 12px rgba(0,0,0,0.16);
      margin-top: 0.5em;
    }
    #colorPreset:focus {
      border-color: #888;
    }
    section.top-right {
      cursor: pointer;
      transition: background 0.15s;
      position: absolute;
      top: 2rem;
      right: 2rem;
      text-align: right;
      z-index: 20;
      /* Ensure enough width for select */
      min-width: 180px;
    }
    section.top-right:hover {
      background: rgba(255,255,255,0.05);
    }
    .top-right-wrapper {
      position: relative;
      display: inline-block;
    }
  </style>
</head>
<body>
<div class="layout">
  <div class="layout__middle">
    <p>|</p>
    <p class="middle">Creation begins<br> in the void, ✶</p>
  </div>

  <section class="top-left">Override<br>Mission Parameters</section>
  <div class="top-right-wrapper">
    <section class="top-right" id="colorPresetToggle">Uncharted<br>Pulsating Signal</section>
    <select id="colorPreset">
      <option value="Dark Moody">Dark Moody</option>
      <option value="Crimson Heat">Crimson Heat</option>
      <option value="Ocean Calm">Ocean Calm</option>
      <option value="Sunset Glow">Sunset Glow</option>
      <option value="Monochrome">Monochrome</option>
      <option value="Ethereal Mist">Ethereal Mist</option>
      <option value="Golden Hour">Golden Hour</option>
      <option value="Neon Nights">Neon Nights</option>
      <option value="Electric Pulse">Electric Pulse</option>
      <option value="Molten Core">Molten Core</option>
    </select>
  </div>
  <section class="bottom-left">Core<br> Anomaly Drive<br> Status: Unknown</section>
  <section class="bottom-right">Alert<br>Dimensional Rift<br> Imminent</section>

  <div class="statement">
    <h2>NOT IN FORM, BUT IN INTENTION</h2>
  </div>
</div>

<script type="module" src="./script.js"></script>
<script>
const topRight = document.getElementById('colorPresetToggle');
const select = document.getElementById('colorPreset');

topRight.addEventListener('click', (e) => {
  // Toggle display
  if (select.style.display === 'none' || select.style.display === '') {
    select.style.display = 'block';
    select.focus();
  } else {
    select.style.display = 'none';
  }
});

// Hide select when it loses focus (and user didn't just click the section again)
select.addEventListener('blur', () => {
  setTimeout(() => { select.style.display = 'none'; }, 100);
});
</script>
</body>
</html>
