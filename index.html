<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7 New Glitch Text Effects</title>
    <style>
        body {
            background: #101010;
            color: #00ff99;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        h1 {
            margin: 20px 0;
            position: relative;
            display: inline-block;
            font-size: 2.5rem;
            color: #00ff99;
            text-transform: uppercase;
        }

        .glitch-effect {
            position: relative;
            display: inline-block;
            white-space: nowrap;
        }

        /* Effect 1: Pixelated Glitch */
        .glitch-effect.pixelated::before,
        .glitch-effect.pixelated::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            width: 100%;
            height: 100%;
            top: 0;
            color: #ff0055;
            transform: translate(3px, -3px) scale(1.1);
            opacity: 0.8;
            animation: pixelate 0.3s infinite alternate-reverse;
        }
        .glitch-effect.pixelated::after {
            color: #00ffff;
            transform: translate(-3px, 3px) scale(1.1);
        }

        /* Effect 2: Static Noise */
        .glitch-effect.static {
            background: linear-gradient(90deg, #00ff99, #ff0066, #00ffff);
            -webkit-background-clip: text;
            color: transparent;
            animation: static-noise 1.5s infinite linear;
        }

        /* Effect 3: Glowing Data Flow */
        .glitch-effect.glow {
            text-shadow: 0 0 10px #00ff99, 0 0 20px #00ffff, 0 0 30px #00ff99, 0 0 40px #ff0066;
            animation: glow-pulse 1s infinite alternate;
        }

        /* Effect 4: Barcode Glitch */
        .glitch-effect.barcode::before {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 5px;
            background: repeating-linear-gradient(
                90deg,
                #00ff99,
                #00ff99 10px,
                transparent 10px,
                transparent 20px
            );
            animation: barcode-scroll 1s infinite linear;
        }

        /* Effect 5: Fragmented Text */
        .glitch-effect.fragmented::before,
        .glitch-effect.fragmented::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            width: 100%;
            top: 0;
            color: #ff0000;
            clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
            animation: fragment-glitch 0.3s infinite alternate-reverse;
        }
        .glitch-effect.fragmented::after {
            color: #00ffff;
            clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%);
        }

        /* Effect 6: Data Matrix Overlay */
        .glitch-effect.matrix {
            background: url('https://i.imgur.com/N9bRzUu.gif');
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: matrix-scroll 2s infinite linear;
        }

        /* Effect 7: Cyber Shift */
        .glitch-effect.cyber-shift::before,
        .glitch-effect.cyber-shift::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            color: #ff0066;
            animation: cyber-shift 0.2s infinite alternate;
        }
        .glitch-effect.cyber-shift::after {
            color: #00ffff;
            animation-delay: 0.1s;
        }

        /* Keyframes */
        @keyframes pixelate {
            0%, 100% { transform: translate(3px, -3px) scale(1.1); }
            50% { transform: translate(-3px, 3px) scale(1); }
        }

        @keyframes static-noise {
            0% { background-position: 0% 0%; }
            100% { background-position: 100% 100%; }
        }

        @keyframes glow-pulse {
            0% { text-shadow: 0 0 5px #00ff99, 0 0 10px #00ffff; }
            100% { text-shadow: 0 0 15px #00ff99, 0 0 30px #ff0066; }
        }

        @keyframes barcode-scroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }

        @keyframes fragment-glitch {
            0%, 100% { clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%); }
            50% { clip-path: polygon(10% 0, 90% 0, 90% 50%, 10% 50%); }
        }

        @keyframes matrix-scroll {
            0% { background-position: 0 0; }
            100% { background-position: 0 -100%; }
        }

        @keyframes cyber-shift {
            0% { transform: translateX(-2px); }
            100% { transform: translateX(2px); }
        }
    </style>
</head>
<body>
    <h1 class="glitch-effect pixelated" data-text="Pixelated">Pixelated</h1>
    <h1 class="glitch-effect static" data-text="Static Noise">Static Noise</h1>
    <h1 class="glitch-effect glow" data-text="Glowing Flow">Glowing Flow</h1>
    <h1 class="glitch-effect barcode" data-text="Barcode Glitch">Barcode Glitch</h1>
    <h1 class="glitch-effect fragmented" data-text="Fragmented">Fragmented</h1>
    <h1 class="glitch-effect matrix" data-text="Data Matrix">Data Matrix</h1>
    <h1 class="glitch-effect cyber-shift" data-text="Cyber Shift">Cyber Shift</h1>
</body>
</html>
