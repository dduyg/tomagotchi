<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markl Mono Typeface</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        main {
            text-align: center;
            width: 80%;
            max-width: 800px;
        }

.top-info {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    text-transform: uppercase;
}

.headline {
    margin-top: 20px;
    font-size: 16px;
    font-weight: normal;
    color: #333;
}

.title {
    font-size: 60px;
    font-weight: bold;
    margin: 20px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 5px;
}

.markl-box, .mono-box {
    display: inline-block;
    border: 2px solid #000;
    padding: 5px 10px;
    font-size: 60px;
    font-weight: bold;
}

.description {
    font-size: 14px;
    color: #666;
    max-width: 600px;
    margin: 0 auto;
}

.badge {
    background-color: #ff5722;
    color: white;
    font-size: 12px;
    text-transform: uppercase;
    padding: 10px 15px;
    border-radius: 50px;
    display: inline-block;
    margin-top: 20px;
    font-weight: bold;
}
    </style>
</head>
<body>
    <main>
        <div class="top-info">
            <div class="part-number">
                <p>PART-NUMBER MRKL-V01-JLCTYP</p>
            </div>
            <div class="style-info">
                <p>7 STYLE <span>LIGHT → HEAVY</span></p>
            </div>
        </div>

        <h2 class="headline">NEW-2025-MONO</h2>

        <div class="title">
            <span class="markl-box">M</span>arkl <span class="mono-box">o</span>no
        </div>

        <p class="description">
            non-proportional typeface designed for optimal readability at small sizes. 
            With its clean & structured letterforms
        </p>

        <div class="badge">
            <span>V.1 MARKL MONO</span>
        </div>
    </main>
</body>
</html>
