<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 | Data Breach</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Share+Tech+Mono&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      color: #00fff7;
      font-family: 'Share Tech Mono', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .container {
      text-align: center;
      max-width: 700px;
      padding: 20px;
    }

    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 3rem;
      color: #ff00ff;
      letter-spacing: 2px;
      text-shadow: 0 0 5px #ff00ff, 0 0 15px #00fff7;
      margin-bottom: 30px;
    }

    .error-code {
      font-size: 6rem;
      color: #00fff7;
      text-shadow: 0 0 10px #00fff7, 0 0 20px #00fff7;
    }

    .message {
      font-size: 1.5rem;
      margin: 20px 0;
      color: #ffffffcc;
    }

    a.home-link {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 24px;
      font-size: 1rem;
      color: #0ff;
      background-color: transparent;
      border: 2px solid #0ff;
      text-decoration: none;
      border-radius: 5px;
      transition: all 0.3s ease;
    }

    a.home-link:hover {
      background-color: #0ff;
      color: #000;
      box-shadow: 0 0 15px #0ff;
    }

    .glitch {
      animation: glitch 1s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 0 red, -2px 0 blue; }
      20% { text-shadow: -2px 0 red, 2px 0 blue; }
      40% { text-shadow: 2px 2px red, -2px -2px blue; }
      60% { text-shadow: -2px 2px red, 2px -2px blue; }
      80% { text-shadow: 2px -2px red, -2px 2px blue; }
      100% { text-shadow: 0 0 red, 0 0 blue; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo glitch">DATA//BREACH</div>
    <div class="error-code">404</div>
    <div class="message">The page you're slicing through the net for doesn't exist.</div>
    <a href="/" class="home-link">Return to Mainframe</a>
  </div>
</body>
</html>
