<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiltier - Display Serif</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&display=swap');

body {
    margin: 0;
    padding: 0;
    font-family: 'Playfair Display', serif;
    background-color: #f8f7f2;
    text-align: center;
}

header {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    font-size: 14px;
    font-weight: bold;
}

.brand {
    font-size: 16px;
}

main {
    margin-top: 50px;
}

.logo-container {
    position: relative;
    display: inline-block;
}

.kiltier {
    font-size: 150px;
    font-weight: bold;
    color: #111;
    position: relative;
    display: inline-block;
    margin: 0;
}

.rose {
    position: absolute;
    top: -40px;
    left: 50%;
    transform: translateX(-50%);
    height: 150px;
}

.subtitle {
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 32px;
    font-weight: bold;
    margin-top: 20px;
    border: 2px solid #111;
    border-radius: 50px;
    padding: 10px 30px;
    display: inline-flex;
    gap: 20px;
}

.decorative {
    font-size: 40px;
}
    </style>
</head>
<body>
    <header>
        <span>14 STYLES</span>
        <span class="brand">JOLICIATYPE®</span>
        <span>2 VARIABLE FONTS</span>
    </header>

    <main>
        <div class="logo-container">
            <h1 class="kiltier">Kiltier</h1>
            <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/BLOBs/blob-16.gif" alt="🌹" class="rose">
        </div>
        <div class="subtitle">
            <div class="decorative">*</div>
            <span>DISPLAY SERIF</span>
            <div class="decorative">*</div>
        </div>
    </main>
</body>
</html>
