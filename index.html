<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
.glitch {
  position: relative;
  font-size: 4rem;
  font-weight: bold;
  color: white;
  text-transform: uppercase;
  overflow: hidden;
}

.glitch::before,
.glitch::after {
  content: '/dygg';
  position: absolute;
  top: 0;
  left: 0;
  color: white;
  background: transparent;
  clip-path: inset(0 0 50% 0);
}

.glitch::before {
  color: cyan;
  transform: translate(-2px, 2px);
  animation: glitch 2s infinite;
}

.glitch::after {
  color: magenta;
  transform: translate(2px, -2px);
  animation: glitch 2s infinite reverse;
}

@keyframes glitch {
  0% {
    clip-path: inset(10% 0 50% 0);
    transform: translate(2px, -2px);
  }
  50% {
    clip-path: inset(30% 0 20% 0);
    transform: translate(-2px, 2px);
  }
  100% {
    clip-path: inset(10% 0 50% 0);
    transform: translate(2px, -2px);
  }
}
    </style>
</head>
<body>
    <h2 class="glitch">/dygg</h2>
</body>
</html>
