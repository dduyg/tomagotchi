<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markl Mono Typeface</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400;700&display=swap');

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background-color: #f4f4f4;
    color: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    text-align: center;
}

.container {
    max-width: 800px;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 20px;
}

.part-number, .styles {
    border: 1px solid #222;
    padding: 5px 10px;
    display: inline-block;
}

.main-title {
    font-size: 64px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.highlight-box {
    display: inline-block;
    border: 2px solid #222;
    padding: 5px 10px;
    font-size: 70px;
    font-weight: 700;
}

.alt-style {
    font-size: 64px;
    font-weight: 700;
    letter-spacing: -2px;
}

.label-box {
    font-size: 14px;
    margin: 20px 0;
    font-weight: 600;
}

.sub-text {
    font-size: 14px;
    max-width: 600px;
    margin: 0 auto;
    line-height: 1.5;
}

.badge {
    position: absolute;
    top: 20px;
    right: 20px;
    background: #E74C3C;
    color: white;
    font-size: 14px;
    font-weight: bold;
    padding: 10px 15px;
    border-radius: 50%;
    text-align: center;
    border: 2px solid white;
}

.badge span {
    display: block;
    font-size: 12px;
}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="part-number">
                <p>PART-NUMBER MRKL-V01-JLCTYP</p>
            </div>
            <div class="styles">
                <p>7 STYLE <span>LIGHT → HEAVY</span></p>
            </div>
        </div>

        <div class="main-title">
            <span class="highlight-box">M</span>arkl <span class="alt-style">mono</span>
        </div>

        <div class="sub-text">
            <p>non-proportional typeface designed for optimal readability at small sizes. With its clean & structured letterforms</p>
        </div>

        <div class="label-box">NEW-2025-MONO</div>

        <div class="badge">
            <span>V.1</span> MARKL MONO
        </div>
    </div>
</body>
</html>
