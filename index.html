<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Liminal🎚Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Cousine&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Danfo&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@455&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: none;
      background-color: #111;
      color: #e0e0e0;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
      font-family: "Cousine", monospace;
      letter-spacing: -0.03em;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: transparent url("http://assets.iceable.com/img/noise-transparent.png") repeat 0 0;
      background-size: 300px 300px;
      animation: noise-animation 0.3s steps(5) infinite;
      opacity: 1;
      will-change: transform;
      z-index: 100;
      pointer-events: none;
    }
    @keyframes noise-animation {
      0%   { transform: translate(0, 0); }
      10%  { transform: translate(-2%, -3%); }
      20%  { transform: translate(-4%, 2%); }
      30%  { transform: translate(2%, -4%); }
      40%  { transform: translate(-2%, 5%); }
      50%  { transform: translate(-4%, 2%); }
      60%  { transform: translate(3%, 0); }
      70%  { transform: translate(0, 3%); }
      80%  { transform: translate(-3%, 0); }
      90%  { transform: translate(2%, 2%); }
      100% { transform: translate(1%, 0); }
    }

    .layout { 
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 100%;
      height: 100vh;
      position: relative;
      z-index: 20;
      padding: 6rem 2rem;
      pointer-events: auto;     
    }
    .layout__middle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      font-size: 0.75rem;
      text-transform: uppercase;
    }
    .middle {
      text-align: right;
      transform: rotate3d(0, 0, 1, 90deg) translate3d(100%, 10px, 0);
      transform-origin: right;
      white-space: nowrap;
    }
    
    section {
      position: absolute;
      font-size: 0.75rem;
      line-height: 1;
      text-transform: uppercase;
    }
    section.top-left {
      top: 2rem;
      left: 2rem;
      text-align: left;
      font-family: "Cinzel", serif;
      z-index: 20;
    }
    section.top-right {
      top: 2rem;
      right: 2rem;
      text-align: right;
    }
    section.bottom-left {
      bottom: 2rem;
      left: 2rem;
      text-align: left;
      position: fixed;
    }
    section.bottom-right {
      bottom: 2rem;
      right: 2rem;
      text-align: right;
      position: fixed;
    }
    .statement {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      text-align: center;
      z-index: 1;
      max-width: 440px;
      mix-blend-mode: screen;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .statement h2 {
      font-family: "Danfo", serif;
      font-size: 1.25rem;
      letter-spacing: 0.2em;
      margin-top: 1rem;
      text-transform: uppercase;
    }
    
    .custom-cursor {
      position: fixed;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      mix-blend-mode: difference;
      z-index: 9999;
      transition: width 0.2s, height 0.2s;
      will-change: transform;
    }
    canvas {
      display: block;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw;
      height: 100vh;
      margin: 0 !important;
      padding: 0 !important;
      z-index: 2;
      pointer-events: none;
    }

    section.top-right {
      cursor: pointer;
      user-select: none;
      font-family: inherit;
    }
    section.top-right .theme-trigger-link {
      color: #7ed6ff;
      text-decoration: underline dotted;
      cursor: pointer;
      font-weight: bold;
      background: none;
      border: none;
      padding: 0;
      font-size: inherit;
      font-family: inherit;
      outline: none;
      transition: color 0.2s;
      display: inline-block;
    }
    section.top-right .theme-trigger-link:hover,
    section.top-right .theme-trigger-link:focus {
      color: #fff;
      text-decoration: underline solid;
    }

    .custom-theme-dropdown {
      position: fixed;
      min-width: 180px;
      right: 2rem;
      background: rgba(18,20,25,0.98);
      border: 1px solid #23272f;
      border-radius: 0.7em;
      box-shadow: 0 6px 32px 0 rgba(10,12,20,0.19);
      z-index: 9999;
      margin-top: 0.5em;
      padding: 0.3em 0;
      font-family: "Cousine", monospace;
      font-size: 1.04em;
      animation: dropdownIn 0.13s cubic-bezier(.34,1.56,.64,1) 1;
      transition: opacity 0.13s;
      opacity: 1;
      user-select: none;
    }
    @keyframes dropdownIn {
      from { opacity: 0; transform: translateY(-0.5em) scale(0.96);}
      to   { opacity: 1; transform: translateY(0) scale(1);}
    }
    .custom-theme-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .custom-theme-list li {
      padding: 0.7em 1.2em 0.7em 1.1em;
      color: #e0e0e0;
      cursor: pointer;
      transition: background 0.13s, color 0.13s;
      border: none;
      background: none;
      font-family: inherit;
      font-size: 1em;
      outline: none;
      border-radius: 0.5em;
      margin: 0;
      display: block;
    }
    .custom-theme-list li[aria-selected="true"],
    .custom-theme-list li:hover,
    .custom-theme-list li:focus {
      background: #222e;
      color: #fff;
    }
    .custom-theme-list li:active {
      background: #333f;
      color: #7ed6ff;
    }
    @media (max-width: 600px) {
      .custom-theme-dropdown {
        right: 1rem;
        min-width: 135px;
        font-size: 0.97em;
      }
    }
  </style>
</head>
<body>
<div class="layout">
  <div class="layout__middle">
    <p>|</p>
    <p class="middle">Creation begins<br> in the void, ✶</p>
  </div>

  <section class="top-left">Override<br>Mission Parameters</section>
  <section class="top-right" id="theme-trigger-section">
    <span id="theme-trigger-text" class="theme-trigger-link" tabindex="0">
      Uncharted<br>Pulsating Signal
    </span>
  </section>
  <section class="bottom-left">Core<br> Anomaly Drive<br> Status: Unknown</section>
  <section class="bottom-right">Alert<br>Dimensional Rift<br> Imminent</section>

  <div class="statement">
    <h2>NOT IN FORM, BUT IN INTENTION</h2>
  </div>
</div>

  <script type="module" src="./script.js"></script>
  <script>
    const themes = [
      "Dark Moody",
      "Crimson Heat",
      "Ocean Calm",
      "Sunset Glow",
      "Monochrome",
      "Ethereal Mist",
      "Golden Hour",
      "Neon Nights",
      "Electric Pulse",
      "Molten Core"
    ];
    let dropdown = null;

    function createThemeDropdown(currentTheme, anchorRect) {
      const d = document.createElement("div");
      d.className = "custom-theme-dropdown";
      d.setAttribute("role", "listbox");
      d.tabIndex = -1;

      // Make dropdown a list of clickable items
      const ul = document.createElement("ul");
      ul.className = "custom-theme-list";
      themes.forEach((theme, idx) => {
        const li = document.createElement("li");
        li.textContent = theme;
        li.setAttribute("role", "option");
        if (theme === currentTheme) li.setAttribute("aria-selected", "true");
        li.tabIndex = 0;
        li.addEventListener("click", () => {
          if (window.setColorPreset) window.setColorPreset(theme);
          closeDropdown();
        });
        li.addEventListener("keydown", e => {
          if (e.key === "Enter" || e.key === " ") {
            li.click();
            e.preventDefault();
          }
          // Arrow navigation
          if (e.key === "ArrowDown" || e.key === "ArrowUp") {
            const items = Array.from(ul.querySelectorAll("li"));
            let next = e.key === "ArrowDown" ? idx + 1 : idx - 1;
            if (next < 0) next = items.length - 1;
            if (next >= items.length) next = 0;
            items[next].focus();
            e.preventDefault();
          }
          if (e.key === "Escape") {
            closeDropdown();
            e.preventDefault();
          }
        });
        ul.appendChild(li);
      });
      d.appendChild(ul);

      // Prevent dropdown click from bubbling
      d.addEventListener("mousedown", e => e.stopPropagation());
      d.addEventListener("touchstart", e => e.stopPropagation());

      // Position dropdown below the anchorRect (theme trigger)
      d.style.position = "fixed";
      const padding = 2;
      d.style.top = Math.round(anchorRect.bottom + padding) + "px";
      // Align right edge
      d.style.right = (window.innerWidth - anchorRect.right) + "px";
      return d;
    }

    function closeDropdown() {
      if (dropdown) {
        dropdown.remove();
        dropdown = null;
      }
    }

    document.addEventListener("DOMContentLoaded", function() {
      const trigger = document.getElementById("theme-trigger-text");
      trigger.addEventListener("click", function(e) {
        e.stopPropagation();
        if (dropdown) { closeDropdown(); return; }
        const currentTheme = window.getCurrentColorPreset ? window.getCurrentColorPreset() : "Crimson Heat";
        const rect = trigger.getBoundingClientRect();
        dropdown = createThemeDropdown(currentTheme, rect);
        document.body.appendChild(dropdown);
        // Focus first selected or first item
        setTimeout(() => {
          const selected = dropdown.querySelector('li[aria-selected="true"]');
          (selected || dropdown.querySelector('li')).focus();
        }, 1);
      });
      trigger.addEventListener("keydown", function(e) {
        if (e.key === "Enter" || e.key === " " || e.key === "Spacebar") {
          trigger.click();
          e.preventDefault();
        }
        // Down arrow opens and focuses list
        if ((e.key === "ArrowDown" || e.key === "ArrowUp") && !dropdown) {
          trigger.click();
          e.preventDefault();
        }
      });

      // Close dropdown on outside click/tap, scroll, or resize
      document.addEventListener("mousedown", closeDropdown);
      document.addEventListener("touchstart", closeDropdown);
      window.addEventListener("scroll", closeDropdown, true);
      window.addEventListener("resize", closeDropdown, true);
    });
  </script>
</body>
</html>
