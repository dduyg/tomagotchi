<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        /* General Reset */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Courier New', monospace;
        }

        /* Background Gradient */
        body {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4 50%, #fbc2eb);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Vaporwave Theme */
        .container {
            text-align: center;
            padding: 20px;
            animation: fadeIn 1.5s ease-in-out;
        }

        /* Witty ASCII Art */
        .ascii {
            font-family: monospace;
            color: #ff77e9;
            margin-top: 20px;
            white-space: pre-wrap;
            text-shadow: 1px 1px 0 #000;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <p>Oops, you seem to have wandered into the void of cyberspace...</p>
        <div class="ascii">
            { error: 404, message: "You're not supposed to see this." }
        </div>
    </div>
</body>
</html>
