<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #F8F8F8; /* Whitish background */
            color: #333;
            line-height: 1.6;
            padding: 0;
            margin: 0;
        }
        .gradient-overlay {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 1000px;
            height: 100%;
            background: linear-gradient(to bottom, #F8F8F8 10%, #C7F6C2 30%, #F8F8F8 90%);
            z-index: -1;
        }
        main {
            max-width: 800px;
            margin: 40% auto 0;
            width: 90%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .title {
            font-size: 2.5rem;
            color: #444;
        }
        .synth {
            font-size: 1.2rem;
            letter-spacing: 5px;
        }

        .work-list {
            list-style: none;
        }
        .work-item {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid currentColor;
            padding: 10px 0;
            font-size: 1.2rem;
        }
        .work-item a {
            text-decoration: none;
            color: #333;
            font-weight: bold;
            transition: color 0.3s;
        }
        .work-item a:hover {
            color: #888;
        }
    </style>
</head>
<body>
<div class="gradient-overlay"></div>

    <main>
        <header>
            <h1 class="title">Synthwave</h1>
            <div class="synth">•••</div>
        </header>

        <ul class="work-list">
            <li class="work-item">
                <a href="#">sharlee</a>
                <span>Branding</span>
            </li>
            <li class="work-item">
                <a href="#">act responsable</a>
                <span>Web Development</span>
            </li>
            <li class="work-item">
                <a href="#">dua lipa</a>
                <span>Portrait</span>
            </li>
            <li class="work-item">
                <a href="#">cocolyze</a>
                <span>UX/UI Design</span>
            </li>
            <li class="work-item">
                <a href="#">les indécis</a>
                <span>Branding</span>
            </li>
            <li class="work-item">
                <a href="#">game of the goose</a>
                <span>Game Design</span>
            </li>
        </ul>
    </main>
</body>
</html>
