<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vertical Tabs with Icons</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      display: flex;
      height: 100vh;
    }

    .content {
      flex: 1;
      padding: 40px;
      padding-right: 100px; /* space for tab buttons */
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .tabs {
      position: fixed;
      right: 0;
      top: 0;
      bottom: 0;
      width: 100px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      background-color: white;
      border-left: 2px solid black;
    }

    .tab-button {
      width: 100px;
      height: 60px;
      border: 1px solid black;
      border-left: none;
      border-radius: 30px 0 0 30px;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      margin-bottom: 5px;
      transition: background 0.3s;
    }

    .tab-button.active {
      background-color: #ddd;
    }

    .tab-button i {
      font-size: 20px;
    }
  </style>

  <!-- Font Awesome for Icons -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

  <div class="content">
    <div id="tab1" class="tab-content active">
      <p>Profile section content here section content...</p>
    </div>
    <div id="tab2" class="tab-content">
      <p>Tools section content here section content...</p>
    </div>
    <div id="tab3" class="tab-content">
      <p>Network section content here section content...</p>
    </div>
    <div id="tab4" class="tab-content">
      <p>Telegram section content here section content...</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-button active" onclick="switchTab('tab1', this)">
      <i class="fas fa-user"></i>
    </button>
    <button class="tab-button" onclick="switchTab('tab2', this)">
      <i class="fas fa-tools"></i>
    </button>
    <button class="tab-button" onclick="switchTab('tab3', this)">
      <i class="fas fa-globe"></i>
    </button>
    <button class="tab-button" onclick="switchTab('tab4', this)">
      <i class="fab fa-telegram-plane"></i>
    </button>
  </div>

  <script>
    function switchTab(tabId, btn) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');

      document.querySelectorAll('.tab-button').forEach(el => el.classList.remove('active'));
      btn.classList.add('active');
    }
  </script>
</body>
</html>
