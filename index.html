<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Liminal🏛Loop</title>
  <style>
    *, *:before, *:after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background-color: #aaa;
      color: black;
      padding: 2rem;
    }
    .links {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.25rem;
      font-weight: 400;
      font-size: 1rem;
    }
    .link {
      color:  #d9d9d0;
      text-decoration: none;
      transition: all 0.3s ease;
      position: relative;
      padding-left: 0;
    }
    .link::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      width: 0;
      height: 1px;
      background-color: #f5f5f0;
      transform: translateY(-50%);
      transition: width 0.3s ease, opacity 0.3s ease;
      opacity: 0;
    }
    .link:hover {
      color: #f5f5f0; 
      padding-left: 1.2rem;
    }
    .link:hover::before {
      width: 0.8rem;
      opacity: 1;
    }

    .coordinates {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      text-align: right;
      z-index: 10;
      font-size: 0.825rem;
      color: #d9d9d0;
    }
    @media (max-width: 768px) {
      .links { gap: 0.4rem; }
      .coordinates { font-size: 0.7rem; }
    }
  </style>
</head>
<body>

<div class="links">
  <a href="#" class="link">Visual Work</a>
  <a href="#" class="link">Bio</a>
  <a href="#" class="link">Journal</a>
</div>

<div class="coordinates">
  <p>34°05'24.0"N 118°24'39.6"W</p>
  <p>the space between thoughts</p>
</div>
</body>
</html>
