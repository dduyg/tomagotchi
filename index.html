<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refraction*</title>
    <style>
        /* Google Font */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap');

        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: #f5f5f5;
            text-align: center;
            padding: 20px;
        }

        /* Header Title */
        .title {
            font-size: 32px;
            font-weight: bold;
        }

        .title .star {
            color: green;
        }

        .subtitle {
            font-size: 18px;
            color: #555;
        }

        /* Grid Layout */
        .gallery {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .gallery img {
            width: 100%;
            height: auto;
            border-radius: 10px;
            transition: transform 0.3s ease-in-out;
        }

        .gallery img:hover {
            transform: scale(1.05);
        }

        /* Footer Section */
        .footer {
            margin-top: 30px;
            font-size: 14px;
            color: #777;
        }

        /* Like Button */
        .like-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: #007BFF;
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
        }

        .like-button.liked {
            background-color: red;
        }
    </style>
</head>
<body>

    <h1 class="title">Refraction<span class="star">*</span></h1>
    <p class="subtitle">(Shape)(Color)</p>
    <p style="color: #aaa; font-style: italic;">--- Some test exercises for form and color ---</p>

    <!-- Gallery Section -->
    <div class="gallery">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="Refraction Art 1">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="Refraction Art 2">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="Refraction Art 3">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="Refraction Art 4">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="Refraction Art 5">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="Refraction Art 6">
    </div>

    <!-- Footer -->
    <p class="footer">Refraction* (TEST) - Shape(Color)</p>

    <!-- Like Button -->
    <button class="like-button" onclick="toggleLike()">👍</button>

    <script>
        function toggleLike() {
            let button = document.querySelector('.like-button');
            button.classList.toggle('liked');
        }
    </script>

</body>
</html>
