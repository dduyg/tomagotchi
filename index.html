<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

body {
    background-color: black;
    color: white;
    font-family: 'Orbitron', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    text-align: center;
    max-width: 400px;
}

.logo {
    font-size: 48px;
    letter-spacing: 2px;
    text-transform: uppercase;
}

.local-time {
    font-size: 14px;
    margin-top: 10px;
    opacity: 0.7;
}

.time {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    margin: 10px 0;
}

.time-value {
    font-weight: bold;
}

.am-pm {
    font-size: 14px;
    margin-left: 10px;
}

.description {
    font-size: 18px;
    margin: 10px 0;
}

.metrics {
    font-size: 14px;
    opacity: 0.8;
}

.location {
    font-size: 14px;
    margin: 15px 0;
    opacity: 0.8;
}

footer {
    margin-top: 20px;
}

.button {
    background: none;
    border: 1px solid white;
    color: white;
    padding: 8px 15px;
    margin: 5px;
    cursor: pointer;
    font-size: 14px;
}

.button:hover {
    background: white;
    color: black;
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1 class="logo">YINGER</h1>
        </header>
        <section class="info">
            <p class="local-time">LOCAL TIME (UTC-6:00)</p>
            <div class="time">
                <span class="time-value">01:05</span>
                <span class="am-pm">
                    <input type="radio" checked> am
                    <input type="radio"> pm
                </span>
            </div>
            <p class="description">UI Engineer who dips his toes in Realtime 3D ° Interaction ° Perf</p>
            <p class="metrics">0360 × 0647 <br> 043 FPS</p>
            <p class="location">FORT COLLINS, COLORADO → US OF A <br> DESIGN ENGINEER @HEX</p>
        </section>
        <footer>
            <button class="button">Gh</button>
            <button class="button">Li</button>
            <button class="button">X</button>
            <button class="button">Email</button>
        </footer>
    </div>
</body>
</html>
