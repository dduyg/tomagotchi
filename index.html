<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glowing Border Input</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      background: #1e1e1e;
      font-family: "Montserrat", sans-serif;
      padding: 20px;
    }

    form {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input-field {
      position: relative;
      width: 250px;
    }

    .input-field input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: 1rem;
      padding: 5px 0;
      letter-spacing: 0.05em;
      font-family: inherit;
    }

    .input-field label {
      position: absolute;
      top: 0;
      left: 0;
      padding-bottom: 5px;
      color: #bababa;
      font-size: 0.85rem;
      text-transform: uppercase;
      pointer-events: none;
      transition: 0.3s ease;
      letter-spacing: 0.05em;
    }

    .input-field input:focus + label,
    .input-field input:not(:placeholder-shown) + label {
      top: -18px;
      font-size: 0.7rem;
    }

    .input-field .glow-line {
      position: absolute;
      bottom: 0;
      left: 0;
      height: 2px;
      width: 100%;
      background: #fff;
      overflow: hidden;
    }

    .input-field .glow-line::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(to right, #4287f5, #d91653, #0dd910, #ebe010, #4287f5);
      background-size: 250px;
      animation: glow 0.8s linear infinite;
      transition: 0.3s ease;
    }

    .input-field input:focus ~ .glow-line::before,
    .input-field input:not(:placeholder-shown) ~ .glow-line::before {
      left: 0;
    }

    @keyframes glow {
      0% {
        background-position-x: 0;
      }
      100% {
        background-position-x: 250px;
      }
    }
  </style>
</head>
<body>
  <form>
    <div class="input-field">
      <input type="text" id="firstName" placeholder=" " required />
      <label for="firstName">First Name</label>
      <div class="glow-line"></div>
    </div>
    <div class="input-field">
      <input type="text" id="lastName" placeholder=" " required />
      <label for="lastName">Last Name</label>
      <div class="glow-line"></div>
    </div>
  </form>
</body>
</html>
