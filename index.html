<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            color: #f1f1f1;
            background: linear-gradient(135deg, #191970, #483D8B);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .container {
            text-align: center;
            animation: fadeIn 3s ease-in-out;
        }
        h1 {
            font-size: 10vw;
            text-transform: uppercase;
            color: #FF69B4;
            text-shadow: 0 0 20px #FF69B4, 0 0 30px #FF69B4, 0 0 40px #FF69B4;
        }
        p {
            font-size: 1.5em;
            color: #87CEFA;
            margin-top: -10px;
            text-shadow: 0 0 5px #87CEFA;
        }
        a {
            display: inline-block;
            margin-top: 20px;
            text-decoration: none;
            color: #32CD32;
            font-size: 1.2em;
            background-color: rgba(255, 255, 255, 0.1);
            padding: 10px 20px;
            border: 1px solid #32CD32;
            border-radius: 5px;
            transition: all 0.3s ease-in-out;
        }
        a:hover {
            color: #000;
            background-color: #32CD32;
            text-shadow: 0 0 10px #fff;
        }
        .grid {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200vw;
            height: 200vh;
            background: radial-gradient(circle, transparent 20%, #191970 20%) 0 0 / 5% 5%;
            transform: translate(-50%, -50%) rotateX(75deg);
            animation: gridMove 15s linear infinite;
            opacity: 0.2;
        }
        @keyframes gridMove {
            from {
                background-position: 0 0;
            }
            to {
                background-position: 100% 100%;
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="container">
        <h1>404</h1>
        <p>Lost in the void of cyberspace</p>
        <a href="/">Return to Home</a>
    </div>
</body>
</html>
