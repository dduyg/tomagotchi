<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Marquees With Reversed Directions</title>
  <style>
* {
  box-sizing: border-box;
}
body {
  padding: 0;
  margin: 70px 0;
  background: #f0f0f0;
}

.marquee {
  position: relative;
  display: flex;
  gap: 10px;
  overflow: hidden;
}
.marquee + .marquee {
  margin-top: 25px;
}
.marquee-item {
  height: 150px;
  width: auto;
  border: 1px solid black;
}
  </style>
</head>
<body>
<section class="marquee" data-reversed="false">
  <img class="marquee-item" src="https://media0.giphy.com/media/l0O9xVx5v3YHYjGgM/giphy.gif?cid=6c09b95259qmwm2h16lqxtkw6ij63l8tz2okpwd99n0skxzi&ep=v1_internal_gif_by_id&rid=giphy.gif&ct=g" alt="■1">
  <img class="marquee-item" src="https://media1.giphy.com/media/cpO6VvIo0mW9q/giphy.gif?cid=6c09b95286oxtxj57s4ow6lly7n1t02itkc2hhf22lv7rl60&ep=v1_internal_gif_by_id&rid=giphy.gif&ct=g" alt="■2">
  <img class="marquee-item" src="https://media3.giphy.com/media/3o6EhE8pukIRNaPyOQ/giphy.gif?cid=6c09b952mqf2hor3oy2kvjyr828kgajq93j5avu6b7adp7bg&ep=v1_internal_gif_by_id&rid=giphy.gif&ct=g" alt="■3">
  <img class="marquee-item" src="https://media3.giphy.com/media/ldKjshoVdTNgblMuLs/giphy.gif?cid=6c09b952y6d2tskemo4o42hn1s33ia3omz5sah23yyc2vir4&ep=v1_internal_gif_by_id&rid=giphy.gif&ct=g" alt="■4">
  <img class="marquee-item" src="https://media0.giphy.com/media/LpBKayD38zvwKx1qz8/giphy.gif?cid=6c09b952id4zj1ktkq86i4jl7f7smjuk7bqnkhdhmz4p8app&ep=v1_internal_gif_by_id&rid=giphy.gif&ct=g" alt="■5">
  <img class="marquee-item" src="https://media0.giphy.com/media/5UB6zSb0ez6ru3pOhb/giphy.gif?cid=6c09b952rie1o9ot95434cqsrlw81g3o0vyo8lfdi73km5x8&ep=v1_internal_gif_by_id&rid=giphy.gif&ct=g" alt="■6">
  <img class="marquee-item" src="https://media2.giphy.com/media/uTmqqFKOMIP57Nr3gz/giphy.gif?cid=6c09b952o7jamvxzg3n1xnua98ekx49ph11e4m8us9j6whvb&ep=v1_internal_gif_by_id&rid=giphy.gif&ct=g" alt="■7">
</section>

<section class="marquee" data-reversed="true">
  <img class="marquee-item" src="https://media2.giphy.com/media/JDXuoS4eWlYAEHyL7G/giphy.gif?cid=6c09b9521gpczxl5dxvkbynyux5iij991cvx3rc9cux2of4l&ep=v1_internal_gif_by_id&rid=giphy.gif&ct=g" alt="■1">
  <img class="marquee-item" src="https://media4.giphy.com/media/a2vstZP9SvLA4/giphy.gif?cid=6c09b95246xibinsr727fgkg18fjkezpc1rc9847dp40cmn0&ep=v1_internal_gif_by_id&rid=giphy.gif&ct=g" alt="■2">
  <img class="marquee-item" src="https://media3.giphy.com/media/kesNMJU1kLFJdc7FcB/giphy.gif?cid=6c09b952103249g727b2uhcaczgotec8sb1a29ds0y36jrm5&ep=v1_internal_gif_by_id&rid=giphy.gif&ct=g" alt="■3">
  <img class="marquee-item" src="https://media1.giphy.com/media/VoVQ6zWVMjUuGUz8bu/giphy.gif?cid=6c09b952amdyvd0dtlgxc0di0ezm8cmfyglbs8p25my43l34&ep=v1_internal_gif_by_id&rid=giphy.gif&ct=g" alt="■4">
  <img class="marquee-item" src="https://media3.giphy.com/media/d3JtHt5NsKmvqcJa/giphy.gif?cid=6c09b9523rfgwfg782kwmqutjcn1s8tteaknmbnxib22wl98&ep=v1_internal_gif_by_id&rid=giphy.gif&ct=g" alt="■5">
  <img class="marquee-item" src="https://media1.giphy.com/media/l0MYGUj44SjMKnurm/giphy.gif?cid=6c09b952hipiyb4056xjt3mmz8lur87jy9ptf5gatt6x9ejz&ep=v1_internal_gif_by_id&rid=giphy.gif&ct=g" alt="■6">
  <img class="marquee-item" src="https://media3.giphy.com/media/lQO6mff5fnwzK/giphy.gif?cid=6c09b9522dgfx6huk59tkyy0jv8crauj943xbscy0p5v536z&ep=v1_internal_gif_by_id&rid=giphy.gif&ct=g" alt="■7">
</section>

  <script src='https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js'></script>
  <script>
    const marquees = document.querySelectorAll(".marquee");
    const mm = gsap.matchMedia();

    window.addEventListener("load", function () {
      mm.add(
        {
          isMobile: "(max-width: 699px)",
          isDesktop: "(min-width: 700px)"
        },
        (context) => {
          const { isMobile, isDesktop } = context.conditions;

          marquees.forEach((marquee) => {
            const marqueeItems = marquee.querySelectorAll(".marquee-item");
            const reversed =
              marquee.getAttribute("data-reversed") === "true" ? true : false;

            horizontalLoop(marqueeItems, {
              repeat: -1,
              paddingRight: isDesktop ? 40 : 20,
              speed: isDesktop ? 0.5 : 0.25,
              reversed
            });
          });
        }
      );
    });

    function horizontalLoop(items, config) {
      items = gsap.utils.toArray(items);
      config = config || {};
      let tl = gsap.timeline({
          repeat: config.repeat,
          paused: config.paused,
          defaults: { ease: "none" },
          onReverseComplete: () => tl.totalTime(tl.rawTime() + tl.duration() * 100)
        }),
        length = items.length,
        startX = items[0].offsetLeft,
        times = [],
        widths = [],
        xPercents = [],
        curIndex = 0,
        pixelsPerSecond = (config.speed || 1) * 100,
        snap = config.snap === false ? (v) => v : gsap.utils.snap(config.snap || 1),
        totalWidth,
        curX,
        distanceToStart,
        distanceToLoop,
        item,
        i;
      gsap.set(items, {
        xPercent: (i, el) => {
          let w = (widths[i] = parseFloat(gsap.getProperty(el, "width", "px")));
          xPercents[i] = snap(
            (parseFloat(gsap.getProperty(el, "x", "px")) / w) * 100 +
              gsap.getProperty(el, "xPercent")
          );
          return xPercents[i];
        }
      });
      gsap.set(items, { x: 0 });
      totalWidth =
        items[length - 1].offsetLeft +
        (xPercents[length - 1] / 100) * widths[length - 1] -
        startX +
        items[length - 1].offsetWidth *
          gsap.getProperty(items[length - 1], "scaleX") +
        (parseFloat(config.paddingRight) || 0);
      for (i = 0; i < length; i++) {
        item = items[i];
        curX = (xPercents[i] / 100) * widths[i];
        distanceToStart = item.offsetLeft + curX - startX;
        distanceToLoop =
          distanceToStart + widths[i] * gsap.getProperty(item, "scaleX");
        tl.to(
          item,
          {
            xPercent: snap(((curX - distanceToLoop) / widths[i]) * 100),
            duration: distanceToLoop / pixelsPerSecond
          },
          0
        )
          .fromTo(
            item,
            {
              xPercent: snap(
                ((curX - distanceToLoop + totalWidth) / widths[i]) * 100
              )
            },
            {
              xPercent: xPercents[i],
              duration:
                (curX - distanceToLoop + totalWidth - curX) / pixelsPerSecond,
              immediateRender: false
            },
            distanceToLoop / pixelsPerSecond
          )
          .add("label" + i, distanceToStart / pixelsPerSecond);
        times[i] = distanceToStart / pixelsPerSecond;
      }
      function toIndex(index, vars) {
        vars = vars || {};
        Math.abs(index - curIndex) > length / 2 &&
          (index += index > curIndex ? -length : length);
        let newIndex = gsap.utils.wrap(0, length, index),
          time = times[newIndex];
        if (time > tl.time() !== index > curIndex) {
          vars.modifiers = { time: gsap.utils.wrap(0, tl.duration()) };
          time += tl.duration() * (index > curIndex ? 1 : -1);
        }
        curIndex = newIndex;
        vars.overwrite = true;
        return tl.tweenTo(time, vars);
      }
      tl.next = (vars) => toIndex(curIndex + 1, vars);
      tl.previous = (vars) => toIndex(curIndex - 1, vars);
      tl.current = () => curIndex;
      tl.toIndex = (index, vars) => toIndex(index, vars);
      tl.times = times;
      tl.progress(1, true).progress(0, true);
      if (config.reversed) {
        tl.vars.onReverseComplete();
        tl.reverse();
      }
      return tl;
    }
  </script>
</body>
</html>
