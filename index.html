<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liminal➰️Loop</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    .content {
      flex: 1;
      padding: 40px;
      padding-right: 100px; /* leave space for tabs */
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .tabs {
      position: fixed;
      top: 0;
      right: 0;
      height: 100%;
      width: 100px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      border-left: 2px solid black;
      background: #fff;
    }

    .tab-button {
      width: 80px;
      height: 60px;
      border: 1px solid black;
      border-left: none;
      border-radius: 30px 0 0 30px;
      background: white;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .tab-button.active {
      background-color: #e0e0e0;
    }

    .tab-button i {
      font-size: 20px;
    }
  </style>
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</head>
<body>

  <div class="content">
    <div id="tab1" class="tab-content active">
      <p>Profile tab content goes here...</p>
    </div>
    <div id="tab2" class="tab-content">
      <p>Settings tab content goes here...</p>
    </div>
    <div id="tab3" class="tab-content">
      <p>Global tab content goes here...</p>
    </div>
    <div id="tab4" class="tab-content">
      <p>Telegram tab content goes here...</p>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-button active" onclick="switchTab('tab1', this)">
      <i class="fas fa-user"></i>
    </button>
    <button class="tab-button" onclick="switchTab('tab2', this)">
      <i class="fas fa-tools"></i>
    </button>
    <button class="tab-button" onclick="switchTab('tab3', this)">
      <i class="fas fa-globe"></i>
    </button>
    <button class="tab-button" onclick="switchTab('tab4', this)">
      <i class="fab fa-telegram-plane"></i>
    </button>
  </div>

  <script>
    function switchTab(tabId, clickedButton) {
      // Show the correct content
      document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
      });
      document.getElementById(tabId).classList.add('active');

      // Update active button
      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.classList.remove('active');
      });
      clickedButton.classList.add('active');
    }
  </script>
</body>
</html>
