<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UI Engineer</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: black;
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            overflow: hidden;
        }

        .header {
            font-size: 50px;
            font-weight: bold;
            text-transform: uppercase;
            padding: 20px;
        }

        .time {
            font-size: 60px;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .time span {
            margin: 0 10px;
        }

        .desc {
            font-size: 24px;
            max-width: 600px;
            margin: 20px auto;
            line-height: 1.5;
        }

        .location {
            margin-top: 30px;
            font-size: 18px;
            opacity: 0.7;
        }

        .buttons {
            margin-top: 30px;
        }

        .buttons button {
            background: none;
            color: white;
            border: 2px solid white;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-size: 16px;
            text-transform: uppercase;
        }

        .floating-cubes {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            height: 60%;
            background: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/BLOBs/blob-16.gif') no-repeat center;
            background-size: contain;
        }
    </style>
</head>
<body>

    <div class="header">Yinger</div>

    <div class="time">
        <span>01:05</span> 
        <span>○ am ○ pm</span>
    </div>

    <div class="desc">
        UI Engineer who dips his toes in Realtime 3D ° Interaction ° Perf
    </div>

    <div class="location">
        Fort Collins, Colorado → US of A<br>
        Design Engineer @ HEX
    </div>

    <div class="buttons">
        <button>Gh</button>
        <button>Li</button>
        <button>X</button>
        <button>Email</button>
    </div>

    <div class="floating-cubes"></div>

</body>
</html>
