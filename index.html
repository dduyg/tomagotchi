<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🧫Loop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f8f8f8;
            margin: 0;
            padding: 0;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            margin-top: 40px;
        }
        .title .star {
            color: #00ff1d;
            font-size: 35px;
        }
        .title .shape {
            color: #4a24cf;
            font-size: 15px;
            font-weight: normal;
        }
        .subtext {
            font-size: 12px;
            color: gray;
            font-style: italic;
            margin: 10px 0 40px;
        }

        .grid {
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: 1fr;
        }
        .grid img {
            width: 100%;
            height: auto;
        }

        .like-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: transparent;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }
        .like-button.liked {
            font-weight: bold;
            letter-spacing: 2px;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="grid">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-5.png" alt="Refraction Art">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-5.png" alt="Refraction Art">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-5.png" alt="Refraction Art">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-5.png" alt="Refraction Art">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-5.png" alt="Refraction Art">
    </div>

    <h1 class="title">Refraction<span class="star">*</span><span class="shape">(Shape)(Color)</span></h1>
    <p class="subtext">--- Some test exercises for form and color ---</p>

    <div class="grid">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="Refraction Art">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="Refraction Art">
    </div>

    <button class="like-button" onclick="toggleLike()">👍Refraction<sub>*</sub>(TEST) - Shape(Color)</button>
    <script>
        function toggleLike() {
            let button = document.querySelector('.like-button');
            button.classList.toggle('liked');
        }
    </script>
</body>
</html>
