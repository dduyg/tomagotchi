<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 | Lost in the Code</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #ff00c8, #00ffe7);
      background-size: 400% 400%;
      animation: gradientMove 10s ease infinite;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      overflow: hidden;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .glitch {
      font-size: 3rem;
      position: relative;
      color: white;
      text-align: center;
      top: 20vh;
      animation: glitch 1s infinite;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      right: 0;
    }

    .glitch::before {
      animation: glitchTop 1s infinite;
      color: #ff00c8;
      z-index: -1;
    }

    .glitch::after {
      animation: glitchBottom 1s infinite;
      color: #00ffe7;
      z-index: -2;
    }

    @keyframes glitch {
      0% { transform: none; }
      20% { transform: skew(-5deg); }
      40% { transform: skew(5deg); }
      60% { transform: skew(-3deg); }
      80% { transform: skew(3deg); }
      100% { transform: none; }
    }

    @keyframes glitchTop {
      0% { transform: translate(-2px, -2px); }
      50% { transform: translate(2px, -1px); }
      100% { transform: translate(-2px, -2px); }
    }

    @keyframes glitchBottom {
      0% { transform: translate(2px, 2px); }
      50% { transform: translate(-2px, 1px); }
      100% { transform: translate(2px, 2px); }
    }

    .message {
      text-align: center;
      margin-top: 5vh;
      font-size: 1rem;
      padding: 0 1rem;
    }

    .message p {
      max-width: 600px;
      margin: 0 auto;
    }

    a.button {
      display: inline-block;
      margin-top: 3rem;
      padding: 0.8rem 2rem;
      background: #111;
      color: #fff;
      text-decoration: none;
      border: 2px solid #fff;
      transition: background 0.3s;
    }

    a.button:hover {
      background: #ff00c8;
      border-color: #00ffe7;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="glitch" data-text="404: FILE NOT FOUND">404: FILE NOT FOUND</div>
  <div class="message">
    <p>You’ve stepped outside the grid.</p>
    <p>The data stream lost your request somewhere between the neon clouds and the ghost servers. But don’t worry—your code hasn’t crashed.</p>
    <p>Backtrack through the synthwave and reboot your journey.</p>
    <a href="/" class="button">Return to Home Base</a>
  </div>
</body>
</html>
