<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Liminal🏛Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond&display=swap" rel="stylesheet">
  <style>
    *, *:before, *:after { margin: 0; padding: 0; box-sizing: border-box; }    	  
    @font-face {
      font-family: 'BandeinsStrange';  
      src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/BandeinsStrangeVariable.woff2') format('woff2');
      font-weight: 1 1000; /* for variable font support */
      font-style: normal;
    }    
    body {
      overflow: hidden;
      height: 100vh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      color: #d9d9d0;
      font-family: 'BandeinsStrange', sans-serif;
      font-variation-settings: "wght" 500;
      padding: 2rem;
    }
    
    main {
      display: flex;
      flex-wrap: nowrap;
      border: 1px solid;
      width: 100%;
      box-sizing: border-box;
      margin-top: 15vh;
    }
    .content {
      box-sizing: border-box;
      padding: 15px;
      border: 1px solid;
      width: 50%;
      overflow-wrap: break-word;
    }

    .links {
      position: fixed;
      bottom: 2rem;
      left: 2rem;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.25rem;
      font-family: "EB Garamond", serif;
      font-weight: 400;
      font-size: 1rem;
    }
    .link {
      color: inherit;
      text-decoration: none;
      transition: all 0.3s ease;
      position: relative;
      padding-left: 0;
    }
    .link::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      width: 0;
      height: 5px;
      background-color: #f5f5f0;
      transform: translateY(-50%);
      transition: width 0.3s ease, opacity 0.3s ease;
      opacity: 0;
    }
    .link:hover {
      color: #f5f5f0; 
      padding-left: 1.2rem;
    }
    .link:hover::before {
      width: 0.8rem;
      opacity: 1;
    }

    .coordinates {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      text-align: right;
      z-index: 10;
      font-family: "EB Garamond", serif;
      font-size: 0.825rem;
    }
    @media (max-width: 768px) {
      .links { gap: 0.4rem; }
      .coordinates { font-size: 0.7rem; }
    }
  </style>
</head>
<body>
    
<main>  
  <div class="content">Content 1: Lorem ipsum dolor sit amet, consectetur adipiscing elit.</div>
  <div class="content">
    YOU CAN ALWAYS EDIT<br>
    a Bad PAGE,<br>
    BUT A BLANK PAGE<br>
    Cannot BE EDITED
  </div>    
</main>

<div class="links">
  <a href="#" class="link">Cupcake.exe</a>
  <a href="#" class="link">Bio</a>
  <a href="#" class="link">Journal</a>
</div>

<div class="coordinates">
  <p>34°05'24.0"N 118°24'39.6"W</p>
  <p>lost in the void</p>
</div>
</body>
</html>
