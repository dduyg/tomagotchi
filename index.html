<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menu Animation</title>
  <style>
    body {
      padding: 10%;
    }
    
    .menu ul {
      list-style: none;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .menu-item {
      text-decoration: none;
      color: black;
      position: relative;
      font-size: 18px;
    }

    /* Add the arrow with ::before */
    .menu-item::before {
      content: "→"; /* Arrow symbol */
      position: absolute;
      left: -30px; /* Position it to the left of the text */
      opacity: 0; /* Initially hidden */
      transform: translateX(-10px); /* Start slightly off */
      transition: all 0.3s ease; /* Smooth animation */
    }

    /* On hover or click, reveal the arrow */
    .menu-item:hover::before,
    .menu-item:focus::before {
      opacity: 1;
      transform: translateX(0); /* Bring it into view */
    }

    /* Optional: Style the active link (clicked) */
    .menu-item.active::before {
      opacity: 1;
      transform: translateX(0);
      color: blue; /* Change color of the arrow when active */
    }
  </style>
</head>
<body>
  <nav class="menu">
    <ul>
      <li><a href="#badass" class="menu-item">Badass</a></li>
      <li><a href="#awesome" class="menu-item">Awesome</a></li>
      <li><a href="#cool" class="menu-item">Cool</a></li>
    </ul>
  </nav>

  <script>
    // JavaScript for active state
    document.querySelectorAll('.menu-item').forEach(item => {
      item.addEventListener('click', (e) => {
        // Remove active class from all items
        document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
        // Add active class to clicked item
        e.target.classList.add('active');
      });
    });
  </script>
</body>
</html>
