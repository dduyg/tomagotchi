<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🍋Loop</title>
    <style>
        @font-face {
            font-family: 'Fliege Mono';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/FliegeMono.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Fliege Mono';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/FliegeMono-Medium.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
        }
@font-face {
  font-family: 'Triform';
  src: url('Triform.woff2') format('woff2');
  font-style: normal;
  font-weight: normal;
}
        @font-face {
            font-family: 'Laginchy';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Laginchy.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }       
        @font-face {
            font-family: 'Shinko Sans';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/ShinkoSans.woff2') format('woff2'),
                 url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/ShinkoSans.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Fliege Mono', monospace;
            background: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/floppyDisk.png') no-repeat center center/cover;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        main {
            width: 95%;
            max-width: 900px;
            backdrop-filter: blur(3px);
        }
        .component {
            font-size: 100%;
            font-weight: 700;
            padding: 10px 0;
            border-top: 2px solid white;
        }
        .component:last-child {
            border-bottom: 2px solid white;
        }
        /* 🪄Components styling */
        .component:nth-child(1) {font-family: 'Laginchy', serif;}
        .component:nth-child(2) {font-family: 'Fliege Mono', monospace;}
        .component:nth-child(3) {font-family: 'Shinko Sans', sans-serif;}
        .component:nth-child(4) {font-family: 'Cno', monospace;}
        .component:nth-child(5) {font-weight: 500;}

        /* 🪄➰️Aside elements styling */
        aside {display: inline;}
        .component:nth-child(2) {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0 5%;
        }
        .component:nth-child(2) aside {
            font-size: 0.6em;
            display: inline-block;
            text-align: right;
            font-family: 'no', monospace;
        }
        .component:nth-child(4) aside {font-family: 'Triform', monospace;}
    </style>
</head>
<body>
    <main>
        <!--1️⃣--><div class="component">{ Monocity }</div>
        <!--2️⃣--><div class="component">@floating lantern <aside>got introduced to<br>a lovely tool</aside></div>
        <!--3️⃣--><div class="component">V.1(Detective Searching Clues)</div>
        <!--4️⃣--><div class="component">0430 & <aside>Sad Moments</aside></div>
        <!--5️⃣--><div class="component">rested against the wall 'qr-code'</div>
    </main>
</body>
</html>
