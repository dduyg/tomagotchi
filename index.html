<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>LiminalLoop</title>
  <style>
body,
html {
  margin: 0;
  padding: 0;
  height: 100%;
  font-family: Arial, sans-serif;
  overflow: hidden;
}
.nav-menu {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  padding: 32px;
  height: 100vh;
  box-sizing: border-box;
  position: relative;
}
.card-list_item {
  position: relative;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  background-color: transparent;
  padding: 20px;
  z-index: 2;
}
.card-list_item-inner {
  position: relative;
  z-index: 2;
}
.card-list_bg-fill {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 1;
}
.card-list_bg-path {
  fill: var(--base-color-neutral--white, #333);
}
  </style>
</head>
<body>
<nav class="nav-menu">
  <div class="card-list_item">
    <div class="card-list_item-inner">
      <h3>Menu 1</h3>
      <p>Description for Menu 1</p>
    </div>
  </div>
  <div class="card-list_item">
    <div class="card-list_item-inner">
      <h3>Menu 2</h3>
      <p>Description for Menu 2</p>
    </div>
  </div>
  <div class="card-list_item">
    <div class="card-list_item-inner">
      <h3>Menu 3</h3>
      <p>Description for Menu 3</p>
    </div>
  </div>
  <div class="card-list_item">
    <div class="card-list_item-inner">
      <h3>Menu 4</h3>
      <p>Description for Menu 4</p>
    </div>
  </div>
  <svg viewBox="0 0 100 100" preserveAspectRatio="none" class="card-list_bg-fill">
    <path d="M 0 0 H 0 Q 0 50 0 100 H 0 V 0 z" class="card-list_bg-path"></path>
  </svg>
</nav>

  <script src='https://cdnjs.cloudflare.com/ajax/libs/gsap/3.11.4/gsap.min.js'></script>
  <script  src="./script.js"></script>
</body>
</html>
