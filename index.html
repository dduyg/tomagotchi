<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            background: linear-gradient(45deg, #ff0080, #00bcd4);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            position: relative;
            text-align: center;
        }
        .glitch {
            font-size: 4em;
            position: relative;
            display: inline-block;
            color: #fff;
            font-weight: bold;
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 
                0 0 10px rgba(255, 0, 128, 0.7),
                0 0 20px rgba(255, 0, 128, 0.7),
                0 0 30px rgba(255, 0, 128, 0.7),
                0 0 40px rgba(0, 188, 212, 0.7),
                0 0 50px rgba(0, 188, 212, 0.7);
        }
        .glitch:before,
        .glitch:after {
            content: "404 - Not Found";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: inherit;
            clip: rect(0, 900px, 0, 0);
            animation: glitch 2s infinite linear alternate-reverse;
        }
        .glitch:after {
            animation-delay: 0.5s;
            clip: rect(0, 0, 0, 900px);
            animation-duration: 2.5s;
        }
        @keyframes glitch {
            0% {
                transform: translate(0);
            }
            25% {
                transform: translate(-10px, 5px);
            }
            50% {
                transform: translate(10px, -5px);
            }
            75% {
                transform: translate(-10px, 10px);
            }
            100% {
                transform: translate(10px, -10px);
            }
        }
        .message {
            font-size: 1.5em;
            margin-top: 20px;
            color: #ffffff;
            text-shadow: 0 0 10px #ff00c3, 0 0 20px #ff00c3, 0 0 30px #ff00c3;
        }
        .home-link {
            font-size: 1.2em;
            margin-top: 20px;
            display: inline-block;
            text-decoration: none;
            color: #00bcd4;
            padding: 10px 20px;
            background-color: #ff0080;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .home-link:hover {
            background-color: #00bcd4;
            color: #ff0080;
            text-shadow: 0 0 10px #ff00c3, 0 0 20px #ff00c3;
        }
        .neon-border {
            border: 2px solid #00bcd4;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0, 188, 212, 0.8);
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="glitch">404 - Not Found</div>
        <p class="message">Oops! Looks like you've taken a wrong turn on the data highway.</p>
        <div class="neon-border">
            <a href="/" class="home-link">Back to Home</a>
        </div>
    </div>

</body>
</html>
