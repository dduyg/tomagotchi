<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 - Page Not Found</title>
    <style>
        /* Global reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #ff7af7, #f093fb);
            font-family: 'Courier New', Courier, monospace;
            color: #fff;
            text-align: center;
            overflow: hidden;
        }

        h1 {
            font-size: 8rem;
            text-shadow: 0 0 30px rgba(255, 0, 255, 0.8), 0 0 40px rgba(255, 0, 255, 0.6);
            margin-top: 100px;
            letter-spacing: 10px;
        }

        h2 {
            font-size: 3rem;
            color: #ffeb3b;
            text-shadow: 0 0 20px rgba(255, 255, 0, 0.5);
        }

        p {
            font-size: 1.2rem;
            color: #a8a8a8;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.7);
            margin-top: 20px;
        }

        .btn {
            background-color: #ff7af7;
            border: 2px solid #fff;
            color: #fff;
            font-size: 1.5rem;
            padding: 15px 30px;
            text-decoration: none;
            text-transform: uppercase;
            border-radius: 10px;
            margin-top: 30px;
            display: inline-block;
            letter-spacing: 2px;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background-color: #f093fb;
            border-color: #ff7af7;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
            transform: scale(1.1);
        }

        .vaporwave {
            font-size: 2.5rem;
            color: #ffeb3b;
            margin-top: 40px;
            font-family: 'Press Start 2P', cursive;
            letter-spacing: 5px;
        }

        .matrix-effect {
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 5px;
            color: #ff00ff;
            animation: matrix 3s infinite linear;
        }

        @keyframes matrix {
            0% {
                opacity: 0.1;
                transform: translateY(-20px);
            }
            50% {
                opacity: 1;
                transform: translateY(0);
            }
            100% {
                opacity: 0.1;
                transform: translateY(20px);
            }
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px;
        }

        footer {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
            color: #fff;
            letter-spacing: 2px;
        }

    </style>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>404</h1>
        <h2>Page Not Found</h2>
        <p>Sorry, the page you're looking for doesn't exist.</p>
        <a href="/" class="btn">Go Home</a>

        <div class="vaporwave">Welcome to the Retro Future</div>

        <div class="matrix-effect">
            <p>System Error. Rebooting...</p>
        </div>
    </div>

    <footer>
        <p>Data Science Corp. &copy; 2025</p>
    </footer>
</body>
</html>
