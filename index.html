<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiminalLoop</title>
  <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@300..800&display=swap" rel="stylesheet">
  <style>
    .hidden {
      opacity: 0; transform: translateY(50px); transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }
    .visible {
      opacity: 1; transform: translateY(0);
    }
    * {  /* General Reset */
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    @font-face {
      font-family: 'TheMachineGun';
      src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/TheMachineGun.woff2') format('woff2'),
           url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/TheMachineGun.woff') format('woff');
      font-weight: normal;
      font-style: normal;
      font-display: swap;
    }
    body {
      font-family: "Host Grotesk", sans-serif;
      background-color: #282c34;
      color: LemonChiffon;
      line-height: 1.6;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
    main {
      max-width: 800px;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      color: #FFCC00;
    }

main::-webkit-scrollbar {
    width: 1.3em;
}
main::-webkit-scrollbar-track {
    background: transparent;
}
main::-webkit-scrollbar-thumb,
main::-webkit-scrollbar-thumb:hover {

@-moz-document url-prefix() { /* Firefox scrollbar */
    main {
        scrollbar-color: #FFCC00 transparent; 
        scrollbar-width: thin;
    }
    main::-webkit-scrollbar-thumb {
        background-image: url('data:image/svg+xml;charset=utf8,%3Csvg%20fill%3D%22currentColor%22%20version%3D%221.1%22%20id%3D%22Capa_1%22%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20xmlns%3Axlink%3D%22http%3A%2F%2Fwww.w3.org%2F1999%2Fxlink%22%20viewBox%3D%220%200%20108.04%20108.04%22%20xml%3Aspace%3D%22preserve%22%20transform%3D%22matrix%28-1%2C%200%2C%200%2C%201%2C%200%2C%200%29%22%3E%3Cg%20id%3D%22SVGRepo_bgCarrier%22%20stroke-width%3D%220%22%3E%3C%2Fg%3E%3Cg%20id%3D%22SVGRepo_tracerCarrier%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3C%2Fg%3E%3Cg%20id%3D%22SVGRepo_iconCarrier%22%3E%3Cg%3E%3Cpath%20d%3D%22M108.04%2C5.493v29h-29v-29H108.04z%20M15.125%2C72.297C6.785%2C72.297%2C0%2C79.082%2C0%2C87.422c0%2C8.341%2C6.785%2C15.125%2C15.125%2C15.125%20S30.25%2C95.763%2C30.25%2C87.422C30.25%2C79.082%2C23.465%2C72.297%2C15.125%2C72.297z%20M91.038%2C50.777H81.54h-4.06H12.677v2.347h-0.052V68.29h5%20V55.776H77.48h4.06h14.483V54.61h0.015V39.445h-5V50.777z%22%3E%3C%2Fpath%3E%3C%2Fg%3E%3C%2Fg%3E%3C%2Fsvg%3E');
        background-size: contain;
        background-repeat: no-repeat;
        background-position: center center;
    }
}
    
    header {
      font-family: 'TheMachineGun', sans-serif;
    }
    section {
      padding: 50px 1.5rem;
      display: flex;
      justify-content: space-between;
      gap: 10px;
    }
    .birinci {
      flex: 0 0 60%;
    }
    .ikinci {
      flex: 0 0 40%;
    }
    @media (max-width: 768px) {
      section {
        flex-direction: column;
      }
      .birinci,
      .ikinci {
        flex: 0 0 100%;
      }
    }
  </style>
</head>
<body>
  <main>
      <section>
        <div class="birinci">
           <!-- the empty one -->
        </div>
        <div class="ikinci">
          <h3 style="font-size: 2.111rem; line-height: 2.111rem;">
            ▇▇ design services |
          </h3>
          <p style="text-align: justify; font-size: 0.778rem;">transform the few locations</p>    
        </div>
      </section>

      <section>
        <div class="birinci">
           <p>elementum n (genitive elementī); second declension. (chemistry, physics) one of four elements that composed the world. basic principle, rudiment.</p>
        </div>
        <div class="ikinci">
          <p>elementi (n class, plural elementi) element (simplest or essential part or principle of anything)</p>    
        </div>
      </section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const elements = document.querySelectorAll('main > *'); // Select all direct children of <main>

      // Add the hidden class to all elements
      elements.forEach(element => element.classList.add('hidden'));

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });

      elements.forEach(element => observer.observe(element));
    });
  </script>
</body>
</html>
