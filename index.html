<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 - Page Not Found</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #2f1c53;
            color: #f8f8f8;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            flex-direction: column;
            overflow: hidden;
        }

        h1 {
            font-size: 100px;
            font-weight: bold;
            color: #ff33cc;
            text-shadow: 3px 3px 5px rgba(0, 0, 0, 0.7);
            margin: 0;
        }

        p {
            font-size: 24px;
            color: #b3b3b3;
            margin-top: 10px;
            letter-spacing: 2px;
        }

        .vaporwave {
            font-size: 30px;
            margin-top: 20px;
            font-style: italic;
            color: #33ffcc;
            text-shadow: 2px 2px 3px rgba(0, 0, 0, 0.7);
        }

        .btn {
            margin-top: 30px;
            padding: 10px 30px;
            background-color: #ff33cc;
            border: none;
            border-radius: 30px;
            color: white;
            font-size: 20px;
            text-decoration: none;
            transition: 0.3s ease;
        }

        .btn:hover {
            background-color: #33ffcc;
            color: #2f1c53;
        }

        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.example.com/vaporwave-background.jpg') no-repeat center center fixed;
            background-size: cover;
            filter: blur(5px);
            z-index: -1;
        }

    </style>
</head>
<body>
    <div class="background"></div>
    <h1>404</h1>
    <p>Oops! Page not found.</p>
    <p class="vaporwave">Welcome to the Digital Abyss</p>
    <a href="/" class="btn">Go Home</a>
</body>
</html>
