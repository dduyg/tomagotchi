<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Seamless Scrolling Image Row</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background-color: #f0f0f0;
    }

    .image-container {
      width: 100%; /* Full width */
      overflow: hidden; /* Hide overflow */
      background: #333;
      position: relative;
    }

    .image-row {
      display: flex;
      animation: scroll-horizontal 20s linear infinite; /* Infinite scrolling */
    }

    .image-row img {
      height: 200px; /* Fixed height */
      width: auto; /* Maintain aspect ratio */
      border: 2px solid white;
      box-sizing: border-box;
    }

    /* Keyframes for smooth horizontal scrolling */
    @keyframes scroll-horizontal {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(-100%);
      }
    }

    .image-row:hover {
      animation-play-state: paused; /* Pause animation on hover */
    }
  </style>
</head>
<body>
  <div class="image-container">
    <div class="image-row">
      <img src="https://picsum.photos/300/200?random=1" alt="Image 1">
      <img src="https://picsum.photos/300/200?random=2" alt="Image 2">
      <img src="https://picsum.photos/300/200?random=3" alt="Image 3">
      <img src="https://picsum.photos/300/200?random=4" alt="Image 4">
      <img src="https://picsum.photos/300/200?random=5" alt="Image 5">
    </div>
  </div>

  <script>
    const imageRow = document.querySelector('.image-row');
    
    // Duplicate the image row for seamless looping
    imageRow.innerHTML += imageRow.innerHTML;

    // Adjust the width of the row dynamically to fit all images
    const images = document.querySelectorAll('.image-row img');
    const totalWidth = Array.from(images).reduce((sum, img) => sum + img.offsetWidth, 0);
    imageRow.style.width = `${totalWidth}px`;
  </script>
</body>
</html>
