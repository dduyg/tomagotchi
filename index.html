<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 - Lost in the Code</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #ff00cc, #3333ff);
      font-family: 'Press Start 2P', monospace;
      color: #fff;
      text-align: center;
      overflow: hidden;
    }

    .glitch {
      font-size: 3rem;
      position: relative;
      display: inline-block;
      margin-top: 15vh;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      width: 100%;
      overflow: hidden;
    }

    .glitch::before {
      animation: glitchTop 2s infinite linear;
      color: #0ff;
      z-index: -1;
    }

    .glitch::after {
      animation: glitchBottom 1.5s infinite linear;
      color: #f0f;
      z-index: -2;
    }

    @keyframes glitchTop {
      0% { clip: rect(0, 900px, 0, 0); }
      5% { clip: rect(0, 900px, 60px, 0); }
      10% { clip: rect(0, 900px, 0, 0); }
      15% { clip: rect(20px, 900px, 40px, 0); }
      100% { clip: rect(0, 900px, 0, 0); }
    }

    @keyframes glitchBottom {
      0% { clip: rect(0, 900px, 0, 0); }
      5% { clip: rect(60px, 900px, 90px, 0); }
      10% { clip: rect(0, 900px, 0, 0); }
      15% { clip: rect(30px, 900px, 50px, 0); }
      100% { clip: rect(0, 900px, 0, 0); }
    }

    .message {
      margin-top: 2rem;
      font-size: 1rem;
      max-width: 600px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.8;
    }

    .home-link {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      color: #fff;
      border: 2px solid #fff;
      text-decoration: none;
      text-transform: uppercase;
      transition: all 0.3s ease;
    }

    .home-link:hover {
      background: #fff;
      color: #000;
    }

    .scanlines {
      pointer-events: none;
      position: fixed;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.03),
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 2px
      );
      z-index: 999;
    }
  </style>
</head>
<body>
  <div class="glitch" data-text="404 ERROR">404 ERROR</div>
  <div class="message">
    <p>You didn’t break the internet… but you did break this page.</p>
    <p>Whatever you were looking for isn’t here – maybe it glitched into the void or was swallowed by the matrix.</p>
    <p>Reload your synths, realign your pixels, and head back home.</p>
  </div>
  <a class="home-link" href="/">Return Home</a>
  <div class="scanlines"></div>
</body>
</html>
