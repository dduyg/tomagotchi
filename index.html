<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #121212;
            font-family: 'Arial', sans-serif;
            color: #fff;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            background: linear-gradient(135deg, #ff00cc, #00b2ff);
        }

        h1 {
            font-size: 150px;
            letter-spacing: -10px;
            color: white;
            text-transform: uppercase;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.7);
            animation: glitch 1.5s infinite;
        }

        h2 {
            font-size: 40px;
            margin-top: 10px;
            color: #eee;
            letter-spacing: 2px;
            animation: glitchText 1.5s infinite;
        }

        .neon-text {
            color: #ff00cc;
            text-shadow: 0 0 5px #ff00cc, 0 0 10px #ff00cc, 0 0 20px #ff00cc, 0 0 40px #ff00cc, 0 0 80px #ff00cc;
        }

        @keyframes glitch {
            0% { transform: translate(2px, 0px); }
            10% { transform: translate(-2px, 2px); }
            20% { transform: translate(2px, -2px); }
            30% { transform: translate(-2px, 0px); }
            40% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 0px); }
            70% { transform: translate(-2px, 2px); }
            80% { transform: translate(2px, -2px); }
            90% { transform: translate(-2px, 0px); }
            100% { transform: translate(0px, 0px); }
        }

        @keyframes glitchText {
            0% { transform: translateX(0); }
            50% { transform: translateX(-5px); }
            100% { transform: translateX(0); }
        }

        .retro-button {
            background-color: #00b2ff;
            border: none;
            padding: 10px 20px;
            font-size: 18px;
            color: #fff;
            border-radius: 5px;
            text-decoration: none;
            box-shadow: 0 0 10px rgba(0, 178, 255, 0.6);
            transition: all 0.3s ease;
        }

        .retro-button:hover {
            background-color: #ff00cc;
            box-shadow: 0 0 20px rgba(255, 0, 204, 0.6);
        }

        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
    </style>
</head>
<body>
    <h1>404</h1>
    <h2>Page Not Found</h2>
    <p>You've ventured into unknown territory...</p>
    <a href="/" class="retro-button">Go Back Home</a>
    <div class="footer">404 error in the digital dreamscape</div>
</body>
</html>
