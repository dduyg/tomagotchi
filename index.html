<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refraction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f8f8f8;
            margin: 0;
            padding: 0;
        }

        .title {
            font-size: 22px;
            font-weight: bold;
            margin: 40px 0;
        }
        .title .star {
            color: #00ff1d;
            font-size: 28px;
        }
        .title .shape {
            color: #3007e1;
            font-size: 17px;
            font-weight: normal;
        }
        .subtext {
            font-size: 14px;
            color: gray;
            font-style: italic;
            margin-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        }
        .grid img {
            width: 100%;
            height: auto;
        }
        .like-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: blue;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>

    <div class="grid">
