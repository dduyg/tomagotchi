<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 - Page Not Found</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');

  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #ff00cc, #3333ff);
    color: #00ffea;
    font-family: 'VT323', monospace, monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    user-select: none;
  }

  .container {
    text-align: center;
    max-width: 600px;
    padding: 2rem;
    background: rgba(0, 0, 0, 0.6);
    border: 2px solid #00ffea;
    box-shadow:
      0 0 10px #00ffea,
      0 0 20px #ff00cc,
      0 0 30px #3333ff;
    position: relative;
  }

  h1 {
    font-size: 6rem;
    margin: 0 0 0.2rem 0;
    text-shadow:
      0 0 5px #ff00cc,
      0 0 10px #00ffea,
      0 0 20px #3333ff;
    animation: glitch 2s infinite;
  }

  p {
    font-size: 1.5rem;
    margin: 1rem 0 2rem 0;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-shadow: 0 0 8px #00ffea;
  }

  a {
    display: inline-block;
    color: #ff00cc;
    font-weight: bold;
    text-decoration: none;
    border: 2px solid #ff00cc;
    padding: 0.7rem 1.5rem;
    transition: all 0.3s ease;
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  a:hover {
    background: #ff00cc;
    color: #000;
    box-shadow:
      0 0 15px #ff00cc,
      0 0 30px #ff00cc;
  }

  /* Glitch effect */
  @keyframes glitch {
    0% {
      text-shadow:
        2px 0 #ff00cc,
        -2px 0 #00ffea;
    }
    20% {
      text-shadow:
        -2px 0 #ff00cc,
        2px 0 #00ffea;
    }
    40% {
      text-shadow:
        2px 0 #ff00cc,
        -2px 0 #00ffea;
    }
    60% {
      text-shadow:
        -2px 0 #ff00cc,
        2px 0 #00ffea;
    }
    80% {
      text-shadow:
        2px 0 #ff00cc,
        -2px 0 #00ffea;
    }
    100% {
      text-shadow:
        -2px 0 #ff00cc,
        2px 0 #00ffea;
    }
  }

  /* Flicker effect on text */
  @keyframes flicker {
    0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
      opacity: 1;
    }
    20%, 22%, 24%, 55% {
      opacity: 0.4;
    }
  }

  p {
    animation: flicker 3s infinite;
  }
</style>
</head>
<body>
  <div class="container">
    <h1>404</h1>
    <p>System glitch detected.<br />Data lost in the void.</p>
    <a href="/">Return to Home Base</a>
  </div>
</body>
</html>
