<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markl Mono Typeface</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');

body {
    font-family: 'Inter', sans-serif;
    background-color: #f3f3f3;
    text-align: center;
    padding: 50px;
    color: #222;
}

.container {
    max-width: 800px;
    margin: 0 auto;
}

.header {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    text-transform: uppercase;
    margin-bottom: 20px;
}

.part-number, .styles {
    background: #fff;
    padding: 8px 12px;
    border-radius: 5px;
    display: inline-block;
}

h1 {
    font-size: 60px;
    font-weight: bold;
    display: flex;
    justify-content: center;
    align-items: center;
}

.boxed {
    border: 2px solid black;
    padding: 5px 12px;
    margin-right: 5px;
}

.styled-o {
    position: relative;
    display: inline-block;
    margin-left: 10px;
}

.styled-o::after {
    content: 'o.SS05';
    position: absolute;
    top: -30px;
    left: 10px;
    font-size: 12px;
    background: #fff;
    padding: 3px 5px;
    border-radius: 4px;
}

.badge {
    background: #e74c3c;
    color: white;
    padding: 10px 15px;
    border-radius: 50%;
    font-weight: bold;
    display: inline-block;
    margin-top: 20px;
}

.description {
    font-size: 14px;
    margin-top: 30px;
    line-height: 1.5;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="part-number">PART-NUMBER MRKL-V01-JLCTYP</div>
            <div class="styles">7 STYLE <span>LIGHT → HEAVY</span></div>
        </div>

        <h1 class="title">
            <span class="boxed">M</span>arkl <span class="styled-o">mono</span>
        </h1>

        <div class="badge">V.1 MARKL MONO</div>

        <p class="description">
            Non-proportional typeface designed for optimal readability at small sizes. 
            With its clean & structured letterforms.
        </p>
    </div>
</body>
</html>
