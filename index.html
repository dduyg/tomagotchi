<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🩻Loop</title>
    <style>
        body {
            font-family: serif;
            background: linear-gradient(to bottom, #0f0f0f, #303030);
            color: white;
            text-align: center;
            padding: 40px;
        }
        .container {
            max-width: 800px;
            margin: auto;
        }
        .heading {
            font-size: 28px;
            font-weight: bold;
        }
        .subheading {
            font-size: 24px;
        }
        .services {
            margin-top: 20px;
        }
        .services div {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            gap: 10px;
        }
        .pixel-box {
            width: 20px;
            height: 20px;
            background: white;
            display: inline-block;
        }
        .footer {
            margin-top: 40px;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 10px;
        }
        .footer span {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 10px;
            margin: 5px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <p class="heading">We help businesses extract beauty from noise.</p>
        <p class="subheading">Orchidea<sup>&reg;</sup> is a full-service branding agency working with companies in the</p><div class="services">
        <div><span class="pixel-box"></span> beauty</div>
        <div><span class="pixel-box"></span> fashion</div>
        <div><span class="pixel-box"></span> consumer goods industries.</div>
    </div>
    
    <div class="footer">
        <span>brand strategy</span>
        <span>naming</span>
        <span>brand identity</span>
        <span>e-commerce</span>
        <span>packaging</span>
        <span>support</span>
    </div>
</div>

</body>
</html>
