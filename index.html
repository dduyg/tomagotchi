<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LiminalLoop</title>
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@300&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@351&display=swap" rel="stylesheet">
<style>
  body {
    margin: 0;
    background: #033301;
    color: #76726F;
    font-family: "Lexend", sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    user-select: none;
  }
  h1 {
    font-size: 10vw;
    font-family: "Unbounded", sans-serif;
    text-transform: uppercase;
    text-align: center;
  }

  /* Glitch background scanlines */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(255, 255, 255, 0.03),
      rgba(255, 255, 255, 0.03) 1px,
      transparent 2px,
      transparent 4px
    );
    z-index: 10;
    animation: scan 0.3s linear infinite;
  }
  @keyframes scan {
    0% {background-position: 0 0;}
    100% {background-position: 0 4px;}
  }

  p {
    max-width: 450px;
    margin: 0 1em 2em;
  }
</style>
</head>
<body>
  <h1>Lost in the Void</h1>
  <p>
    Özgürlük ve bağımsızlık benim karakterimdir.
    Milletimizin onurunu korumak, bağımsız yaşamakla mümkündür. 
    Hiçbir zorluk, inançla çalışan bir milleti yolundan döndüremez.
    Unutmayın, umut varsa mücadele vardır; mücadele varsa zafer kaçınılmazdır.
  </p>
</body>
</html>
