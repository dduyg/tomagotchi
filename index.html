<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Engineer</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');

body {
    margin: 0;
    padding: 0;
    background-color: black;
    color: white;
    font-family: 'Orbitron', sans-serif;
    text-align: center;
    position: relative;
    overflow: hidden;
}

.container {
    position: relative;
    z-index: 2;
}

header h1 {
    font-size: 48px;
    letter-spacing: 5px;
    margin-top: 20px;
}

.time-section {
    margin-top: 20px;
}

.time-section p {
    font-size: 14px;
    opacity: 0.7;
}

.time {
    font-size: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
}

.am-pm input {
    margin-left: 5px;
}

.content {
    margin-top: 20px;
}

.description {
    font-size: 20px;
    max-width: 80%;
    margin: 0 auto;
}

.stats {
    font-size: 14px;
    opacity: 0.7;
    margin-top: 10px;
}

.location {
    font-size: 14px;
    margin-top: 20px;
}

.buttons {
    margin-top: 30px;
}

.buttons button {
    background: transparent;
    border: 1px solid white;
    color: white;
    padding: 10px 20px;
    margin: 5px;
    cursor: pointer;
    font-size: 16px;
    font-family: 'Orbitron', sans-serif;
}

.buttons button:hover {
    background-color: white;
    color: black;
}

.background {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    background: url('https://source.unsplash.com/1600x900/?abstract,3d') center/cover no-repeat;
    opacity: 0.3;
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>YINGER</h1>
        </header>

        <div class="time-section">
            <p>LOCAL TIME (UTC-6:00)</p>
            <div class="time">
                <span>01:05</span>
                <div class="am-pm">
                    <input type="radio" name="ampm" checked> am
                    <input type="radio" name="ampm"> pm
                </div>
            </div>
        </div>

        <main class="content">
            <p class="description">
                UI Engineer who dips his toes in Realtime 3D ° Interaction ° Perf
            </p>
            <p class="stats">
                0360 × 0647 <br> 4043 FPS
            </p>
            <p class="location">
                FORT COLLINS, COLORADO → US OF A <br>
                DESIGN ENGINEER @HEX
            </p>
        </main>

        <footer class="buttons">
            <button>Gh</button>
            <button>Li</button>
            <button>X</button>
            <button>Email</button>
        </footer>

        <div class="background">
            <div class="cubes"></div>
        </div>
    </div>
</body>
</html>
