<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 Not Found</title>
    <style>
        body {
            background-color: #2a2a2a;
            font-family: monospace;
            color: #f9a825;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            overflow: hidden;
        }

        h1 {
            font-size: 5rem;
            color: #ff3b6d;
        }
        p {
            font-size: 1.5rem;
            margin-top: 10px;
        }
.glitch {
    position: relative;
    font-size: 6rem;
    font-weight: bold;
    color: #f50057;
    text-shadow: 0px 0px 10px #6200ea, 0px 0px 20px #2962ff;
    animation: neonGlow 1.5s ease-in-out infinite;
}
.glitch::before,
.glitch::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    color: #00bfa5;
    opacity: 0.8;
    animation: gridShift 1s infinite;
}
.glitch::after {
    color: #ff6f00;
    animation-delay: 0.2s;
}

@keyframes neonGlow {
    0%, 100% {text-shadow: 0px 0px 10px #6200ea, 0px 0px 20px #2962ff;}
    50% {text-shadow: 0px 0px 15px #ff4081, 0px 0px 30px #ffab40;}
}
@keyframes gridShift {
    0% {transform: translate(-2px, -2px);}
    50% {transform: translate(2px, 2px);}
    100% {transform: translate(0, 0);}
}
    </style>
</head>
<body>    
    <div class="glitch" data-text="404">404</div>
    <p>We couldn't find the page you're looking for. It might have been moved, deleted, or never existed.</p>
</body>
</html>
