<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pure CSS Tabs with Smooth Transition</title>
    <style>
        /* Global Reset */
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            font-family: 'Open Sans', sans-serif;
            background-color: #C2EABA;
            padding-top: 50px;
            line-height: 1.4;
            font-size: 1.4em;
            display: flex;
            justify-content: center;
        }

        .tabs {
            position: relative;
            max-width: 650px;
            width: 100%;
        }

        /* Use flexbox for evenly spaced labels */
        .tabLabels {
            display: flex;
            justify-content: space-between;
            border-bottom: 2px solid #ddd;
            padding-bottom: 5px;
        }

        .tab label {
            flex: 1; /* Distributes space evenly */
            text-align: center;
            cursor: pointer;
            color: #333;
            text-transform: uppercase;
            padding: 10px 0;
            transition: color 0.3s ease, border-bottom 0.3s ease;
        }

        .tab input[type="radio"] {
            display: none;
        }

        .tabContent {
            position: absolute;
            top: 50px;
            left: 0;
            right: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease-in-out, visibility 0.4s;
            padding-top: 20px;
        }

        input[type="radio"]:checked + label {
            border-bottom: 2px solid #1d1d1d;
            color: #1d1d1d;
        }

        input[type="radio"]:checked + label + .tabContent {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body>

<div class="tabs">
    <div class="tabLabels">
        <div class="tab">
            <input type="radio" name="tabgroup" id="tab-1" checked>
            <label for="tab-1">Tab 1</label>
            <div class="tabContent">
                <h4>Tab heading 1</h4>
                <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit.</p>
            </div>
        </div>
        <div class="tab">
            <input type="radio" name="tabgroup" id="tab-2">
            <label for="tab-2">Tab 2</label>
            <div class="tabContent">
                <h4>Tab heading 2</h4>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
            </div>
        </div>
        <div class="tab">
            <input type="radio" name="tabgroup" id="tab-3">
            <label for="tab-3">Tab 3</label>
            <div class="tabContent">
                <h4>Tab heading 3</h4>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit.</p>
            </div>
        </div>
        <div class="tab">
            <input type="radio" name="tabgroup" id="tab-4">
            <label for="tab-4">Tab 4</label>
            <div class="tabContent">
                <h4>Tab heading 4</h4>
                <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit.</p>
            </div>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        let tabs = document.querySelectorAll(".tabContent");
        let maxHeight = 0;

        tabs.forEach(tab => {
            let height = tab.offsetHeight;
            if (height > maxHeight) {
                maxHeight = height;
            }
            tab.style.position = "absolute";
        });

        document.querySelector(".tabs").style.minHeight = (maxHeight + 50) + "px";
    });
</script>
</body>
</html>
