<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery Filter Tabs</title>
  <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
  <style>
    #portfolio {
      padding: 40px;
      margin: 0 auto;
    }
    .gallery-title {
      font-size: 36px;
      color: #db584e;
      text-align: center;
      font-weight: 700;
      padding: 40px 20px 60px;
    }
    .filter-button {
      font-size: 18px;
      border: 1px solid #db584e;
      border-radius: 5px;
      text-align: center;
      color: #db584e;
      margin-bottom: 30px;
    }
    .filter-button:hover {
      font-size: 18px;
      border: 1px solid #db584e;
      border-radius: 5px;
      text-align: center;
      color: #ffffff;
      background-color: #db584e;
    }
    .btn-default:active .filter-button:active {
      background-color: #db584e;
      color: white;
    }
    .port-image {
      width: 100%;
    }
    .gallery_product {
      margin-bottom: 30px;
    }
  </style>
</head>
<body>
    <section id="portfolio">
        <div class="container">
            <div class="gallery col-lg-12 col-md-12 col-sm-12 col-xs-12 mx-auto">
                <h1 class="gallery-title">Portfolio Gallery</h1>
            </div>
            <div>
                <button class="btn btn-default filter-button" data-filter="all">All</button>
                <button class="btn btn-default filter-button" data-filter="nature">Nature</button>
                <button class="btn btn-default filter-button" data-filter="people">People</button>
                <button class="btn btn-default filter-button" data-filter="cars">Cars</button>
                <button class="btn btn-default filter-button" data-filter="buildings">Buildings</button>
            </div>
            <div class="row">
                <div class="gallery_product col-md-4 filter center nature">
                    <img src="https://via.placeholder.com/365">
                </div>

                <div class="gallery_product col-md-4 filter people">
                    <img src="https://via.placeholder.com/365">
                </div>

                <div class="gallery_product col-md-4 filter nature">
                    <img src="https://via.placeholder.com/365">
                </div>

                <div class="gallery_product col-md-4 filter cars">
                    <img src="https://via.placeholder.com/365">
                </div>

                <div class="gallery_product col-md-4 filter buildings">
                    <img src="https://via.placeholder.com/365">
                </div>

                <div class="gallery_product col-md-4 filter cars">
                    <img src="https://via.placeholder.com/365">
                </div>

                <div class="gallery_product col-md-4 filter buildings">
                    <img src="https://via.placeholder.com/365">
                </div>

                <div class="gallery_product col-md-4 filter cars">
                    <img src="https://via.placeholder.com/365">
                </div>

                <div class="gallery_product col-md-4 filter cars">
                    <img src="https://via.placeholder.com/365">
                </div>

                <div class="gallery_product col-md-4 filter nature">
                    <img src="https://via.placeholder.com/365">
                </div>

                <div class="gallery_product col-md-4 filter buildings">
                    <img src="https://via.placeholder.com/365">
                </div>

                <div class="gallery_product col-md-4 filter people">
                    <img src="https://via.placeholder.com/365">
                </div>
            </div>
        </div>
</section>
    <script>
        $(document).ready(function(){

$(".filter-button").click(function(){
    var value = $(this).attr('data-filter');
    
    if(value == "all")
    {
        //$('.filter').removeClass('hidden');
        $('.filter').show('1000');
    }
    else
    {
//            $('.filter[filter-item="'+value+'"]').removeClass('hidden');
//            $(".filter").not('.filter[filter-item="'+value+'"]').addClass('hidden');
        $(".filter").not('.'+value).hide('3000');
        $('.filter').filter('.'+value).show('3000');
        
    }
});

if ($(".filter-button").removeClass("active")) {
$(this).removeClass("active");
}
$(this).addClass("active");

});
    </script>
</body>
</html>
