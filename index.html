<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Staggered Sliding Animation</title>
  <style>
    /* Base styles */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f4f4f4;
      color: #333;
    }

    h1 {
      text-align: center;
      margin: 20px 0;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }

    /* Initial animation state */
    .animate-in {
      opacity: 0;
      transform: translateY(-96px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    /* Final state */
    .animate-in.active {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <h1>Staggered Sliding Animation</h1>
  <div class="container">
    <div class="box animate-in">Content Box 1</div>
    <div class="box animate-in">Content Box 2</div>
    <div class="box animate-in">Content Box 3</div>
    <div class="box animate-in">Content Box 4</div>
    <div class="box animate-in">Content Box 5</div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const animatedElements = document.querySelectorAll('.animate-in');

      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              // Add the `active` class with a staggered delay
              setTimeout(() => {
                entry.target.classList.add('active');
              }, entry.target.dataset.index * 200); // 200ms delay per index
            }
          });
        },
        { threshold: 0.1 }
      );

      // Assign a unique index to each element for staggering
      animatedElements.forEach((el, index) => {
        el.dataset.index = index;
        observer.observe(el);
      });
    });
  </script>
</body>
</html>
