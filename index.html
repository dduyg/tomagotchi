<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 | Lost in the Code</title>
  <style>
    body {
      margin: 0;
      background: linear-gradient(135deg, #2e003e, #0f0c29);
      color: #00ffe0;
      font-family: 'Press Start 2P', monospace;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .glitch-container {
      text-align: center;
    }

    .glitch {
      font-size: 3rem;
      position: relative;
      color: #00ffe0;
      animation: flicker 2s infinite;
    }

    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      width: 100%;
      overflow: hidden;
    }

    .glitch::before {
      top: -2px;
      color: #ff00c8;
      z-index: -1;
      animation: glitchTop 2s infinite linear;
    }

    .glitch::after {
      top: 2px;
      color: #00f0ff;
      z-index: -2;
      animation: glitchBottom 1.5s infinite linear;
    }

    @keyframes glitchTop {
      0% { clip: rect(0, 9999px, 0, 0); }
      10% { clip: rect(0, 9999px, 10px, 0); }
      20% { clip: rect(5px, 9999px, 15px, 0); }
      30% { clip: rect(10px, 9999px, 20px, 0); }
      100% { clip: rect(0, 9999px, 0, 0); }
    }

    @keyframes glitchBottom {
      0% { clip: rect(10px, 9999px, 10px, 0); }
      15% { clip: rect(20px, 9999px, 25px, 0); }
      30% { clip: rect(5px, 9999px, 10px, 0); }
      100% { clip: rect(10px, 9999px, 10px, 0); }
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.8; }
      52% { opacity: 0.5; }
      54% { opacity: 1; }
    }

    .message {
      margin-top: 1.5rem;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #ffffffcc;
    }

    a {
      display: inline-block;
      margin-top: 2rem;
      text-decoration: none;
      color: #ff00c8;
      background: #00ffe0;
      padding: 10px 20px;
      border-radius: 5px;
      font-size: 0.8rem;
      transition: background 0.3s ease;
    }

    a:hover {
      background: #ff00c8;
      color: #0f0c29;
    }
  </style>
</head>
<body>
  <div class="glitch-container">
    <div class="glitch" data-text="404: SIGNAL LOST">404: SIGNAL LOST</div>
    <div class="message">
      You've glitched out of the mainframe.<br>
      The page you're looking for doesn't exist — or it's been consumed by the void.<br>
      Return to reality and try again.
    </div>
    <a href="/">Return to Home</a>
  </div>
</body>
</html>
