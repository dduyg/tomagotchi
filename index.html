<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 Not Found</title>
    <style>
        body {
            background-color: #2a2a2a;
            font-family: monospace;
            color: #f9a825;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            overflow: hidden;
        }

        h1 {
            font-size: 5rem;
            color: #ff3b6d;
        }
        p {
            font-size: 1.5rem;
            margin-top: 10px;
        }
.glitch {
    position: relative;
    font-size: 6rem;
    font-weight: bold;
    color: #e1bee7;
    text-shadow: 1px 1px #80cbc4, -1px -1px #f48fb1;
    animation: flicker 1.5s infinite;
}
.glitch::before,
.glitch::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    z-index: -1;
    color: #ffcc80;
    opacity: 0.9;
    animation: holographicShift 2s infinite;
}
.glitch::after {
    color: #81d4fa;
    animation-delay: 0.3s;
}

@keyframes flicker {
    0%, 100% {opacity: 1;}
    50% {opacity: 0.6;}
}
@keyframes holographicShift {
    0% {transform: translate(-1px, 1px);}
    25% {transform: translate(1px, -1px);}
    50% {transform: translate(-3px, 3px);}
    75% {transform: translate(3px, -3px);}
    100% {transform: translate(0, 0);}
}
    </style>
</head>
<body>    
    <div class="glitch" data-text="404">404</div>
    <p>We couldn't find the page you're looking for. It might have been moved, deleted, or never existed.</p>
</body>
</html>
