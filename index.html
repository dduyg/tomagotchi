<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deadpool Easter Egg</title>
    <style>
        .deadpools-easter-egg {
            opacity: 0;
            transition: opacity 0.5s;
        }
        .deadpools-easter-egg.visible {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="deadpools-easter-egg">
        🦸‍♂️ Surprise! Deadpool is here!
    </div>

    <script>
        // Look at right end, at the bottom //
        const dpsegg = document.querySelector('.deadpools-easter-egg');

        setTimeout(() => {
            dpsegg.classList.add('visible');
        }, 60000);
    </script>
</body>
</html>
