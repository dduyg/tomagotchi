<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        /* General Reset */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Courier New', Courier, monospace;
        }
        body {
            background: linear-gradient(135deg, #ff8a80, #6a1b9a);
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            flex-direction: column;
            overflow: hidden;
        }
        /* Vaporwave Design */
        .container {
            position: relative;
            z-index: 10;
        }
        h1 {
            font-size: 5rem;
            text-shadow: 0px 0px 10px #f50057, 0px 0px 20px #2979ff;
        }
        p {
            font-size: 1.5rem;
            text-shadow: 0px 0px 5px #f50057;
        }
        .links {
            margin-top: 2rem;
        }
        .links a {
            text-decoration: none;
            color: #fff;
            font-size: 1.2rem;
            margin: 0 1rem;
            border: 2px solid #fff;
            padding: 0.5rem 1rem;
            transition: 0.3s ease;
            text-shadow: 0px 0px 5px #2979ff;
        }
        .links a:hover {
            background-color: #fff;
            color: #6a1b9a;
        }
        /* Floating Grid Effects */
        .grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.05);
            background-image: repeating-linear-gradient( 
                to right, 
                rgba(255, 255, 255, 0.05) 0px, 
                rgba(255, 255, 255, 0.05) 1px, 
                transparent 1px, 
                transparent 50px
            ), 
            repeating-linear-gradient(
                to bottom, 
                rgba(255, 255, 255, 0.05) 0px, 
                rgba(255, 255, 255, 0.05) 1px, 
                transparent 1px, 
                transparent 50px
            );
        }
        /* SVG Logo */
        .logo {
            margin-bottom: 2rem;
        }
        svg {
            width: 100px;
            height: 100px;
            fill: #fff;
            filter: drop-shadow(0px 0px 5px #2979ff);
        }
    </style>
</head>
<body>
    <div class="grid"></div>
    <div class="container">
        <div class="logo">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="40" />
                <path d="M30 70 L50 20 L70 70 Z" fill="#f50057" />
            </svg>
        </div>
        <h1>404</h1>
        <p>Oops! The page you're looking for has drifted away.</p>
        <div class="links">
            <a href="/">Home</a>
            <a href="/about">About</a>
            <a href="/services">Services</a>
            <a href="/contact">Contact</a>
        </div>
    </div>
</body>
</html>
