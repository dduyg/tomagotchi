<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background: #0f0f0f;
            color: #00ffcc;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        header {
            padding: 20px;
            text-align: center;
            background: #1a1a1a;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        header h1 {
            margin: 0;
            font-size: 2.5em;
            text-transform: uppercase;
            color: #ff00ff;
        }
        
        section {
            padding: 50px;
            max-width: 1000px;
            margin: 50px auto;
            text-align: center;
        }
        .showcase {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            padding: 30px;
        }
        .item {
            background: #1a1a1a;
            border: 2px solid #00ffcc;
            border-radius: 10px;
            padding: 20px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .item:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <header>
        <h1>CyberpunkPortfolio</h1>
    </header>
    <section class="showcase">
        <h2>Showcase</h2>
        <div class="item">
            <h3>Project 1</h3>
            <p>Description of your project or work. Add links if needed.</p>
        </div>
        <div class="item">
            <h3>Project 2</h3>
            <p>Description of your project or work. Add links if needed.</p>
        </div>
        <div class="item">
            <h3>Project 3</h3>
            <p>Description of your project or work. Add links if needed.</p>
        </div>
    </section>
</body>
</html>
