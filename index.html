<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: #1e1e2f;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        h1 {
            font-size: 100px;
            color: #ff00cc;
            text-shadow: 0 0 10px #ff00cc, 0 0 20px #ff00cc, 0 0 30px #ff00cc, 0 0 40px #ff00cc;
            margin: 0;
        }

        h2 {
            font-size: 24px;
            color: #fff;
            margin-top: 10px;
        }

        p {
            font-size: 16px;
            margin-top: 20px;
            color: #ff9f00;
        }

        .buttons {
            margin-top: 30px;
        }

        .button {
            background-color: #ff00cc;
            color: #1e1e2f;
            border: none;
            padding: 10px 30px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 5px;
            text-decoration: none;
            margin: 10px;
            transition: background-color 0.3s ease;
        }

        .button:hover {
            background-color: #ff9f00;
        }

        .neon-grid {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/hexagons.png');
            opacity: 0.1;
        }

        .neon-lines {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            height: 100%;
            width: 100%;
            border-top: 2px solid #ff00cc;
            border-left: 2px solid #ff00cc;
            animation: neonLinesAnimation 1.5s infinite linear;
        }

        @keyframes neonLinesAnimation {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .rainbow {
            background: linear-gradient(45deg, #ff00cc, #ff9f00, #1aff00, #00d9ff, #ff00cc);
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
        }

        @keyframes gradient {
            0% { background-position: 400% 0; }
            50% { background-position: 0 100%; }
            100% { background-position: 400% 0; }
        }

    </style>
</head>
<body class="rainbow">
    <div class="neon-grid"></div>
    <div class="neon-lines"></div>

    <h1>404</h1>
    <h2>Oops! Page Not Found</h2>
    <p>Looks like you've stumbled upon a void in the digital matrix.</p>

    <div class="buttons">
        <a href="/" class="button">Back to Home</a>
        <a href="/contact" class="button">Contact Us</a>
    </div>
</body>
</html>
