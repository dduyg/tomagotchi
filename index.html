<!DOCTYPE html><html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        body {
            font-family: serif;
            background: linear-gradient(to bottom, #000, #333);
            color: white;
            text-align: center;
            padding: 50px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .heading {
            font-size: 24px;
            font-weight: bold;
        }
        .subtext {
            font-size: 20px;
            margin-top: 20px;
        }
        .industries {
            margin-top: 20px;
            text-align: left;
            display: inline-block;
        }
        .industries div {
            display: flex;
            align-items: center;
        }
        .industries .icon {
            width: 20px;
            height: 20px;
            background: white;
            display: inline-block;
            margin-right: 10px;
        }
        .nav {
            margin-top: 40px;
            padding: 10px;
            background: rgba(255, 255, 255, 0.2);
            display: inline-block;
            border-radius: 20px;
        }
        .nav span {
            margin: 0 10px;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="heading">We help businesses extract beauty from noise.</div>
        <div class="subtext">Orchidea® is a full-service branding agency working with companies in the</div>
        <div class="industries">
            <div><span class="icon"></span> beauty</div>
            <div><span class="icon"></span> fashion</div>
            <div><span class="icon"></span> consumer goods industries.</div>
        </div>
        <div class="nav">
            <span>brand strategy</span>
            <span>naming</span>
            <span>brand identity</span>
            <span>e-commerce</span>
            <span>packaging</span>
            <span>support</span>
        </div>
    </div>
</body>
</html>
