<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProfilePage</title>
    <style>
        @font-face {
            font-family: 'HK Grotesk';
            src: url("https://cdn.glitch.me/605e2a51-d45f-4d87-a285-9410ad350515%2FHKGrotesk-Regular.otf?v=1603136326027") format("opentype");
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'HK Grotesk';
            src: url("https://cdn.glitch.me/605e2a51-d45f-4d87-a285-9410ad350515%2FHKGrotesk-Bold.otf?v=1603136323437") format("opentype");
            font-weight: bold;
            font-style: normal;
        }
        
        body {
            font-family: 'HK Grotesk', sans-serif;
            background-color: #d8e9ed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        main {
            text-align: center;
            font-size: 24px;
            line-height: 2;
        }
        ul {
            list-style-type: none;
            padding: 0;
        }
        li::before {
            content: '○ ';
        }
    </style>
</head>
<body>
    <main>
        <ul>
            <li>PIANO ENTHUSIAST</li>
            <li>PLANT LOVER</li>
            <li>ANALOG-FILM WASTER</li>
            <li>RETRO PATTERNS SPOTTER</li>
            <li>AVID TRAVELER</li>
            <li>MUSIC NOMAD</li>
        </ul>
    </main>
</body>
</html>
