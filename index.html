<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiminalLoop🩻</title>
  <link href="https://fonts.googleapis.com/css2?family=Genos:wght@100..900&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Genos", sans-serif;
      background: #0d0d0d;
      color: white;
    }
    header {
      position: sticky;
      top: 0;
      left: 0;
      padding: 10px;
      z-index: 1000;
    }
    nav {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: 5px;
      max-width: 100%;
    }
    nav a {
      color: #ff0066;
      text-decoration: none;
      font-size: 12px;
      padding: 5px 10px;
      border: 1px solid #ff0066;
      border-radius: 50%;
      transition: all 0.3s ease;
    }
    nav a:hover {
      background: #ff0066;
      color: #fff;
      border-color: #fff;
    }
    section {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 2em;
    }

    #scanGlitch {
      background: #0f0f0f;
    }
    .scan-glitch {
      font-size: 5rem;
      text-transform: uppercase;
      position: relative;
      color: #fff;
    }
    .scan-glitch:before, .scan-glitch:after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      color: #ff0055;
      overflow: hidden;
      clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
      animation: scan-glitch 2s infinite;
    }
    .scan-glitch:after {
      color: #00ffff;
      clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%);
      animation: scan-glitch 2s infinite reverse;
    }
    @keyframes scan-glitch {
      0% { transform: translate(0, 0); }
      20% { transform: translate(-5px, -5px); }
      40% { transform: translate(5px, -5px); }
      60% { transform: translate(-5px, 5px); }
      80% { transform: translate(5px, 5px); }
      100% { transform: translate(0, 0); }
    }
  
    #pixelGlitch {
      background: #222;
      padding: 0 20px;
    }
    .glitch-pixels {
      font-size: 3rem;
      position: relative;
      text-transform: uppercase;
      color: #fff;
    }
    .glitch-pixels span {
      display: inline-block;
      animation: glitch-pixels 1s infinite steps(2, start);
    }
    .glitch-pixels span:nth-child(2) { color: #ff22ff; animation-delay: 0.2s; }
    .glitch-pixels span:nth-child(3) { color: #22ffcc; animation-delay: 0.4s; }
    @keyframes glitch-pixels {
      0%, 100% { transform: translate(0); }
      25% { transform: translate(5px, -5px); }
      50% { transform: translate(-5px, 5px); }
      75% { transform: translate(3px, -3px); }
    }
    
    #flickerGlitch {
      background: #101010;
    }
    #flickerGlitch h1 {
      font-size: 3rem;
      animation: flicker 1.5s infinite alternate;
      color: #ff00ff;
    }
    @keyframes flicker {
      0%, 100% { text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff; }
      50% { text-shadow: 0 0 20px #ff00ff, 0 0 40px #00ffff; }
    }
    
    #staticNoise {
      background: black;
    }
    #staticNoise h1 {
      font-size: 5rem;
      position: relative;
      text-transform: uppercase;
      animation: static-noise 1s infinite;
    }
    @keyframes static-noise {
      0% { clip-path: polygon(0 0, 100% 0, 100% 10%, 0 10%); }
      20% { clip-path: polygon(0 20%, 100% 20%, 100% 30%, 0 30%); }
      40% { clip-path: polygon(0 40%, 100% 40%, 100% 50%, 0 50%); }
      60% { clip-path: polygon(0 60%, 100% 60%, 100% 70%, 0 70%); }
      80% { clip-path: polygon(0 80%, 100% 80%, 100% 90%, 0 90%); }
      100% { clip-path: polygon(0 90%, 100% 90%, 100% 100%, 0 100%); }
    }

    #shadowTrail {
      background: #1a1a1a;
    }
    .shadow-trail {
      font-size: 5rem;
      text-transform: uppercase;
      position: relative;
      animation: shadow-trail 1.5s infinite;
    }
    .shadow-trail::before, .shadow-trail::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      color: #ff00ff;
      z-index: -1;
      transform: translate(-5px, -5px);
      animation: shadow-trail 1.5s infinite;
    }
    .shadow-trail::after {
      color: #00ffff;
      transform: translate(5px, 5px);
    }
    @keyframes shadow-trail {
      0%, 100% { opacity: 0.5; transform: translate(0, 0); }
      50% { opacity: 1; transform: translate(10px, -10px); }
    }

    #doubleLayer h1 {
      font-size: 6rem;
      text-transform: uppercase;
      position: relative;
    }
    #doubleLayer h1::before {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 2px;
      color: #ff00ff;
      z-index: -1;
      animation: layer-glitch 1s infinite;
    }
    #doubleLayer h1::after {
      content: attr(data-text);
      position: absolute;
      top: 2px;
      left: -2px;
      color: #00ffff;
      z-index: -1;
      animation: layer-glitch 1s infinite reverse;
    }
    @keyframes layer-glitch {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-2px, 2px); }
    }

    #neonFlicker {
      background: black;
    }
    #neonFlicker h1 {
      font-size: 5rem;
      color: #fff;
      text-transform: uppercase;
      text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 40px #00ffff, 0 0 80px #00ffff, 0 0 90px #00ffff;
      animation: neon-flicker 2s infinite alternate;
    }
    @keyframes neon-flicker {
      0%, 100% { text-shadow: 0 0 5px #ff00ff, 0 0 10px #00ffff; }
      50% { text-shadow: 0 0 30px #ff00ff, 0 0 60px #00ffff; }
    }

    #blurGlitch {
      background: #101010;
    }
    .blur-glitch {
      font-size: 3rem;
      position: relative;
      text-transform: uppercase;
      animation: blur-glitch 2s infinite;
    }
    .blur-glitch::before, .blur-glitch::after {
      content: attr(data-text);
      position: absolute;
      top: 0;
      left: 0;
      z-index: -1;
    }
    .blur-glitch::before {
      color: #ff00ff;
      clip-path: polygon(0 0, 100% 0, 100% 50%, 0 50%);
      animation: blur-glitch 2s infinite;
    }
    .blur-glitch::after {
      color: #00ffff;
      clip-path: polygon(0 50%, 100% 50%, 100% 100%, 0 100%);
      animation: blur-glitch 2s infinite reverse;
    }
    @keyframes blur-glitch {
      0% { transform: translate(0); filter: blur(0); }
      50% { transform: translate(5px); filter: blur(3px); }
      100% { transform: translate(-5px); filter: blur(0); }
    }

    #staggerGlitch {
      background: #000;
    }
    .stagger-glitch {
      font-size: 4rem;
      color: #2962ff;
      position: relative;
      text-transform: uppercase;
    }
    .stagger-glitch span {
      display: inline-block;
      animation: stagger-glitch 2s infinite;
    }
    .stagger-glitch span:nth-child(2) { color: #f50057; animation-delay: 0.2s; }
    .stagger-glitch span:nth-child(3) { color: #6200ea; animation-delay: 0.4s; }
    @keyframes stagger-glitch {
      0%, 100% { transform: translate(0); }
      50% { transform: translate(10px, -10px); }
    }
  </style>
</head>
<body>
<header>
  <nav>
    <a href="#scanGlitch">⊖</a>
    <a href="#pixelGlitch">⊙</a>
    <a href="#flickerGlitch">⊕</a>
    <a href="#staticNoise">⊘</a>
    <a href="#shadowTrail">⊚</a>
    <a href="#doubleLayer">⊜</a>
    <a href="#neonFlicker">⊛</a>
    <a href="#blurGlitch">⊝</a>
    <a href="#staggerGlitch">⊚</a>
  </nav>
</header>

<section id="scanGlitch">
  <h1 class="scan-glitch" data-text="Arrays">Arrays</h1>
</section>
<section id="pixelGlitch">
  <h1 class="glitch-pixels">
    <span>AMETHYST</span>
    <span>AMETHYST</span>
    <span>AMETHYST</span>
  </h1>
</section>
<section id="flickerGlitch">
  <h1>Stimulation</h1>
</section>
<section id="staticNoise">
  <h1>Sclitch</h1>
</section>
<section id="shadowTrail">
  <h1 class="shadow-trail" data-text="Trail">Trail</h1>
</section>
<section id="doubleLayer">
  <h1 data-text="Layer">Layer</h1>
</section>
<section id="neonFlicker">
  <h1>Kanit</h1>
</section>
<section id="blurGlitch">
  <h1 class="blur-glitch" data-text="Chemicals">Chemicals</h1>
</section>
<section id="staggerGlitch">
  <h1 class="stagger-glitch">
    <span>Stagger</span>
    <span>Stagger</span>
    <span>Stagger</span>
  </h1>
</section>
</body>
</html>
