<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal Loop</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-color: #333;
    }

    .image-container {
      width: 100%;
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column; /* Stack rows vertically */
      gap: 20px; /* Space between rows */
    }

    .image-row {
      display: flex;
      animation: scroll-row 16s linear infinite;
    }

    .image-container:hover .image-row {
      animation-play-state: paused; /* Pause animation on hover */
    }

    .image-row a {
      display: block; /* Make links clickable */
    }

    .image-row img {
      height: 200px; /* Set consistent height for images */
      width: auto; /* Maintain aspect ratio */
      margin-right: 10px; /* Spacing between images */
      border: 1px solid black;
      box-sizing: border-box;
      transition: opacity 0.3s; /* Smooth hover transition */
    }

    /* Hover Effects */
    .image-container:hover img {
      opacity: 0.5; /* Dim all images when container is hovered */
    }

    .image-row img:hover {
      opacity: 1; /* Highlight image on individual hover */
    }

    @keyframes scroll-row {
      0% {
        transform: translateX(0);
      }
      100% {
        transform: translateX(-50%);
      }
    }
  </style>
</head>
<body>
  <div class="image-container">
    <!-- First Image Row -->
    <div class="image-row">
      <a href="#">
        <img src="https://media0.giphy.com/media/l0O9xVx5v3YHYjGgM/giphy.gif" alt="■1">
      </a>
      <a href="#">
        <img src="https://media1.giphy.com/media/cpO6VvIo0mW9q/giphy.gif" alt="■2">
      </a>
      <a href="#">
        <img src="https://media3.giphy.com/media/3o6EhE8pukIRNaPyOQ/giphy.gif" alt="■3">
      </a>
      <a href="#">
        <img src="https://media3.giphy.com/media/ldKjshoVdTNgblMuLs/giphy.gif" alt="■4">
      </a>
      <a href="#">
        <img src="https://media0.giphy.com/media/LpBKayD38zvwKx1qz8/giphy.gif" alt="■5">
      </a>
    </div>

    <!-- Second Image Row -->
    <div class="image-row">
      <a href="#">
        <img src="https://media3.giphy.com/media/WNViO9zKMeOBG2pkW4/giphy.gif" alt="▲1">
      </a>
      <a href="#">
        <img src="https://media4.giphy.com/media/l41JU9pUyosHzWyuA/giphy.gif" alt="▲2">
      </a>
      <a href="#">
        <img src="https://media3.giphy.com/media/xT9IgIc0lryrxvqVGM/giphy.gif" alt="▲3">
      </a>
      <a href="#">
        <img src="https://media2.giphy.com/media/xT9IgMuvj2A0EvxEGY/giphy.gif" alt="▲4">
      </a>
      <a href="#">
        <img src="https://media4.giphy.com/media/l0HlQrS3UPsDXCHok/giphy.gif" alt="▲5">
      </a>
    </div>
  </div>
  
  <script>
    const imageRows = document.querySelectorAll('.image-row');

    // Clone each image row to create seamless loops
    imageRows.forEach(imageRow => {
      imageRow.innerHTML += imageRow.innerHTML;
    });
  </script>
</body>
</html>
