<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiminalLoop🩻</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
      color: white;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 10px 20px;
      z-index: 1000;
    }
    nav {
      display: flex;
      justify-content: space-around;
    }
    nav a {
      color: inherit;
      text-decoration: none;
      padding: 10px 15px;
    }
    nav a:hover {
      background: #555;
      border-radius: 5px;
    }
    section {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-size: 2em;
    }

    #RGBsplit {
      background: #000;
    }
  #RGBsplit h1 {
    font-size: 5rem;
    position: relative;
    color: #fff;
    text-transform: uppercase;
  }
  #RGBsplit h1::before, #RGBsplit h1::after {
    content: attr(data-text);
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    color: #ff0000; /* Red */
    z-index: -1;
  }
  #RGBsplit h1::after {
    color: #00ffea; /* Cyan */
    transform: translate(4px, -4px);
  }
  #RGBsplit h1::before {
    transform: translate(-4px, 4px);
  }
    
    #section2 {
      background: #3498db;
    }
    #section3 {
      background: #e74c3c;
    }
    #section4 {
      background: #9b59b6;
    }
  </style>
</head>
<body>
<header>
  <nav>
    <a href="#RGBsplit">■</a>
    <a href="#section2">Se2</a>
    <a href="#section3">Se3</a>
    <a href="#section4">Se4</a>
  </nav>
</header>

<section id="RGBsplit">
    <h1 data-text="Glitch">Glitch</h1>
</section>
<section id="section2">
  Section 2
</section>
<section id="section3">
  Section 3
</section>
<section id="section4">
  Section 4
</section>
</body>
</html>
