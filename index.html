<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Glygg</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: white;
      color: black;
      padding: 20px;
      margin: 0;
      text-align: center;
    }
    h2 {
      font-size: 4rem;
      font-weight: bold;
    }   

    /* 1. Distorted Vertical Wave */
    .wave {
      animation: wave 0.2s infinite ease-in-out;
    }
    @keyframes wave {
      0%, 100% { transform: scaleY(1); }
      25% { transform: scaleY(1.2); }
      50% { transform: scaleY(0.8); }
    }
    
    /* 2. Text Distortion */
    .distort span {
      display: inline-block;
      animation: distort 0.3s infinite;
    }
    @keyframes distort {
      0%, 100% { transform: scale(1, 1); }
      50% { transform: scale(1.2, 0.8); }
    }

    /* 3. Split Displacement */
    .split {
      position: relative;
      overflow: hidden;
    }
    .split::before,
    .split::after {
      content: '/dygg';
      position: absolute;
      top: 0;
      left: 0;
    }
    .split::before {
      clip-path: inset(0 0 50% 0);
      transform: translateX(-2px);
      animation: slice 0.3s infinite;
    }
    .split::after {
      clip-path: inset(50% 0 0 0);
      transform: translateX(2px);
      animation: slice 0.3s infinite reverse;
    }
    @keyframes slice {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(5px); }
    }

    /* 4. CRT Style */
    .crt {
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 95%,
        black 95%,
        black 96%
      );
      animation: flicker 0.2s infinite;
    }
  </style>
</head>
<body>
  <h2 class="wave">/dygg</h2>
  <h2 class="distort"><span>d</span><span>y</span><span>g</span><span>g</span></h2>
  <h2 class="split">/dygg</h2>
  <h2 class="crt">/dygg</h2>
</body>
</html>
