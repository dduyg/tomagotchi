<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiltier Display Serif</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #f8f8f2;
            font-family: 'Playfair Display', serif;
            text-align: center;
        }

        .container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            margin: auto;
            padding: 50px 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .title {
            font-size: 140px;
            font-weight: bold;
            position: relative;
            display: inline-block;
        }

        .rose {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            height: 180px;
        }

        .subtitle-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border: 2px solid black;
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
            text-transform: uppercase;
            margin-top: -40px;
            position: relative;
        }

        .decorations {
            position: absolute;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            width: calc(100% - 20px);
        }

        .decorations span {
            font-size: 40px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <span>14 Styles</span>
            <span>JOLICIATYPE®</span>
            <span>2 Variable Fonts</span>
        </div>

        <div class="title">
            Kiltier
            <img src="https://upload.wikimedia.org/wikipedia/commons/4/40/Rose_Single_Flower.jpg" alt="Rose" class="rose">
        </div>

        <div class="subtitle-box">
            <div class="decorations">
                <span>✺</span>
                <span>✺</span>
            </div>
            DISPLAY SERIF
        </div>
    </div>
</body>
</html>
