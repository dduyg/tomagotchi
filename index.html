<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiminalLoop</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Courier New', monospace;
      background: #feca57;
      color: white;
    }
    main {
      max-width: 900px;
      margin: 0 auto;
      padding: 4em 1em;
    }

    p {text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);}

    .glitch {
      font-size: 2rem;
      position: relative;
      color: #fff;
    }
    .glitch::before,
    .glitch::after {
      content: attr(data-text);
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      overflow: hidden;
      background: none;
      clip: rect(0, 900px, 0, 0);
    }
    .glitch::before {
      animation: glitch 3s infinite linear;
      color: #ff6b6b;
    }
    .glitch::after {
      animation: glitch 2.5s infinite linear reverse;
      color: #1dd1a1;
    }
    @keyframes glitch {
      0% {clip: rect(0, 900px, 0, 0);}
      25% {clip: rect(20px, 900px, 60px, 0);}
      50% {clip: rect(40px, 900px, 80px, 0);}
      75% {clip: rect(60px, 900px, 100px, 0);}
      100% {clip: rect(0, 900px, 0, 0);}
    }
  </style>
</head>
<body>
<main>
  <h1 class="glitch" data-text="404">404</h1>
  <p>Oops, you took a wrong turn into the void. The page you're looking for doesn't exist. Maybe it never did.</p>
</main>
</body>
</html>
