<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        /* Hide Scrollbars */
        html {
            scrollbar-width: none;
        }
        ::-webkit-scrollbar {
            display: none;
        }     
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Slide-in animation */
        .slide-in {
            opacity: 0;
            transform: translateY(-96px);
            animation: slideIn 0.6s cubic-bezier(0.25, 0.8, 0.25, 1) forwards;
        }
        @keyframes slideIn {
            0% {opacity: 0; transform: translateY(-96px);}
            100% {opacity: 1; transform: translateY(0);}
        }

        @font-face {
            font-family: 'Adieu';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Adieu.woff2') format('woff2'),
                 url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Adieu.woff') format('woff');
            font-weight: 400;
            font-style: normal;
            font-display: swap;       
        }
        body {
            font-family: 'Adieu', sans-serif;
            background: #f3f2f9;
            color: #606887;
            line-height: 1.6;
            padding: 0;
            margin: 0;
        }
        .gradient-overlay {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 1000px;
            height: 100%;
            background: linear-gradient(to bottom, #f3f2f9 10%, #BDEED1 30%, #f3f2f9 90%);
            z-index: -1;
        }
        main {
            max-width: 800px;
            margin: 40% auto 0;
            width: 90%;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
        }
        header div {
            font-size: 1.25rem;
            font-weight: bold;
        }

        .work-list {
            list-style: none;
        }
        .work-item {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid currentColor;
            padding: 10px 0;
        }
        .bir {
            font-size: 1rem;
            font-weight: bold;
        }
        .iki {
            font-size: 0.9rem;
        }

        footer {
            text-align: center;
            margin-top: 120px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
<div class="gradient-overlay"></div>

    <main>
        <header>
            <h2>Tensor Tapes</h2>
            <div>⛜⛠</div>
        </header>

        <ul class="work-list">
            <li class="work-item">
                <span class="bir">simulacra</span>
                <span class="iki">Escalator</span>
            </li>
            <li class="work-item">
                <span class="bir">pastel ghost</span>
                <span class="iki">Ethereality</span>
            </li>
            <li class="work-item">
                <span class="bir">serotonin</span>
                <span class="iki">Fractal 16-Bit</span>
            </li>
            <li class="work-item">
                <span class="bir">data decay</span>
                <span class="iki">Frequency</span>
            </li>
            <li class="work-item">
                <span class="bir">submerged</span>
                <span class="iki">Distortion Glare</span>
            </li>
            <li class="work-item">
                <span class="bir">oscillation</span>
                <span class="iki">Wavelength</span>
            </li>
            <li class="work-item">
                <span class="bir">celestial consumerism</span>
                <span class="iki">Reboot</span>
            </li>
            <li class="work-item">
                <span class="bir">static</span>
                <span class="iki">Disintegration</span>
            </li> 
        </ul>    

        <footer>
            <p>Oceanic Modem Waves</p>
        </footer>
    </main>

    <script>
        // Create an array with the elements to animate (header, work-item, footer, etc.)
        const elementsToAnimate = [
            'header',
            '.work-item',
            'footer'
        ];

        // Get all elements based on the selectors in the array
        const elements = elementsToAnimate.flatMap(selector => {
            return Array.from(document.querySelectorAll(selector));
        });

        // Apply the slide-in animation with staggered delays
        elements.forEach((el, index) => {
            el.style.animationDelay = `${index * 0.1}s`; // Adjust delay between elements (0.1s)
            el.classList.add('slide-in');
        });
    </script>
</body>
</html>
