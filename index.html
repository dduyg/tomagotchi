<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=Rock+Salt&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Hubot+Sans:wght@200..900&display=swap" rel="stylesheet">
    <style>
        html { /* Hide only page's main scrollbar */
            scrollbar-width: none; /* Firefox */
            -ms-overflow-style: none; /* Internet Explorer 10+ */
        }
        html::-webkit-scrollbar {
            display: none; /* Chrome, Safari, and Edge */
        }
        * {   /* General Reset */
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Hubot Sans", sans-serif;
            background: #f3f2f9;
            color: #606887;
            line-height: 1.6;
            padding: 0;
            margin: 0;
        }
        .gradient-overlay {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 1000px;
            height: 100%;
            background: linear-gradient(to bottom, #f3f2f9 10%, #BDEED1 30%, #f3f2f9 90%);
            z-index: -1;
        }

        main {
            max-width: 800px;
            margin: 40% auto 0;
            width: 90%;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            margin-bottom: 10px;
            font-family: "Rock Salt", sans-serif;
        }
        header div {
            font-size: 1.31rem;
        }
        .work-list {
            list-style: none;
        }
        .work-item {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid currentColor;
            padding: 10px 0; /* padding: 1.5rem 0; →original style of inspired layout */
            font-size: 1.1rem;
        }
        footer {
            text-align: center;
            margin-top: 110px;
            font-size: 0.7rem;
        }
     
        .noise {  /* Original unchanged noise code */
            position: fixed;
            z-index: 9999;
            top: -300%;
            left: -150%;
            height: 600%;
            width: 600%;
            -webkit-animation: grain 7s steps(10) infinite;
            animation: grain 7s steps(10) infinite;
            background-image: url('noise.png');
            background-size: 200px;
            background-repeat: repeat;
            opacity: .25;
            pointer-events: none;
        }
        @-webkit-keyframes grain {
            0%,to{transform:translate(0)}
            10%{transform:translate(-5%,-10%)}
            20%{transform:translate(-15%,5%)}
            30%{transform:translate(7%,-25%)}
            40%{transform:translate(-5%,25%)}
            50%{transform:translate(-15%,10%)}
            60%{transform:translate(15%)}
            70%{transform:translateY(15%)}
            80%{transform:translate(3%,35%)}
            90%{transform:translate(-10%,10%)}
        }
        @keyframes grain {
            0%,to{transform:translate(0)}
            10%{transform:translate(-5%,-10%)}
            20%{transform:translate(-15%,5%)}
            30%{transform:translate(7%,-25%)}
            40%{transform:translate(-5%,25%)}
            50%{transform:translate(-15%,10%)}
            60%{transform:translate(15%)}
            70%{transform:translateY(15%)}
            80%{transform:translate(3%,35%)}
            90%{transform:translate(-10%,10%)}
        }
    </style>
</head>
<body>
<div class="gradient-overlay"></div>

    <main>
        <header>
            <h2>When the Phone Rings</h2>
            <div>⬟⬠</div>
        </header>

        <ul class="work-list">
            <li class="work-item">
                <span>simulacra</span>
                <span>Escalator</span>
            </li>
            <li class="work-item">
                <span>pastel ghost</span>
                <span>Ethereality</span>
            </li>
            <li class="work-item">
                <span>serotonin</span>
                <span>Fractal 16-Bit</span>
            </li>
            <li class="work-item">
                <span>submerged</span>
                <span>Disintegration</span>
            </li>
            <li class="work-item">
                <span>data decay</span>
                <span>Tensor Tapes</span>
            </li>
            <li class="work-item">
                <span>celestial consumerism</span>
                <span>Reboot</span>
            </li> 
        </ul>    

        <footer>
            <p><b>⛜⛠&nbsp;&nbsp;</b> Oceanic Modem Waves</p>
        </footer>
    </main>
    <div class="noise"></div>


</body>
</html>
