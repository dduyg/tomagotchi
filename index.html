<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>  
  <title>Vaporwave YouTube Embed</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #ff00cc, #3333ff);
      font-family: 'Press Start 2P', cursive;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .video-container {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border: 4px double #00f0ff;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 0 25px #00f0ff, 0 0 50px #ff00cc;
      max-width: 800px;
      width: 100%;
    }

    h2 {
      text-align: center;
      color: #00f0ff;
      text-shadow: 2px 2px #ff00cc;
      margin-bottom: 20px;
      font-size: 18px;
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 12px;
      border: 3px solid #ff00cc;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>

  <div class="video-container">
    <h2>Vaporwave Vibes</h2>
    <div class="video-wrapper">
      <iframe 
        src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
        title="Vaporwave Video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</body>
</html>
