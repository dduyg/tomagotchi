<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 - Page Not Found</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  /* Colors & glitch palette */
  :root {
    --neon-cyan: #00fff7;
    --neon-pink: #ff00d6;
    --neon-purple: #9b00ff;
    --dark-bg: #0b0f19;
    --glitch-shadow1: #00fff7;
    --glitch-shadow2: #ff00d6;
  }

  body {
    margin: 0;
    height: 100vh;
    background: var(--dark-bg);
    color: var(--neon-cyan);
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    text-align: center;
    overflow: hidden;
  }

  h1 {
    font-size: 8rem;
    position: relative;
    letter-spacing: 0.15em;
    margin: 0;
    animation: glitch 1.5s infinite;
  }

  h1::before,
  h1::after {
    content: '404';
    position: absolute;
    left: 0;
  }

  h1::before {
    text-shadow: -2px 0 var(--glitch-shadow1);
    clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
    animation: glitchTop 1.5s infinite;
  }

  h1::after {
    text-shadow: 2px 0 var(--glitch-shadow2);
    clip-path: polygon(0 66%, 100% 66%, 100% 100%, 0 100%);
    animation: glitchBottom 1.5s infinite;
  }

  @keyframes glitch {
    0% {
      transform: translate(0);
    }
    20% {
      transform: translate(-2px, 2px);
    }
    40% {
      transform: translate(-2px, -2px);
    }
    60% {
      transform: translate(2px, 2px);
    }
    80% {
      transform: translate(2px, -2px);
    }
    100% {
      transform: translate(0);
    }
  }

  @keyframes glitchTop {
    0%, 100% {
      clip-path: polygon(0 0, 100% 0, 100% 33%, 0 33%);
      transform: translate(0);
    }
    50% {
      clip-path: polygon(0 0, 100% 0, 100% 25%, 0 25%);
      transform: translate(-3px, -3px);
    }
  }

  @keyframes glitchBottom {
    0%, 100% {
      clip-path: polygon(0 66%, 100% 66%, 100% 100%, 0 100%);
      transform: translate(0);
    }
    50% {
      clip-path: polygon(0 70%, 100% 70%, 100% 100%, 0 100%);
      transform: translate(3px, 3px);
    }
  }

  p {
    font-size: 1.4rem;
    margin: 20px 0 40px;
    color: var(--neon-pink);
    max-width: 500px;
  }

  a.home-link {
    font-family: 'Share Tech Mono', monospace;
    font-size: 1.6rem;
    color: var(--neon-cyan);
    text-decoration: none;
    border: 2px solid var(--neon-cyan);
    padding: 12px 24px;
    border-radius: 6px;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
  }

  a.home-link:hover {
    background: var(--neon-pink);
    color: var(--dark-bg);
    border-color: var(--neon-pink);
    box-shadow:
      0 0 10px var(--neon-pink),
      0 0 20px var(--neon-pink),
      0 0 30px var(--neon-pink);
  }

  /* Subtle background glitch effect */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      repeating-linear-gradient(
        45deg,
        transparent,
        transparent 2px,
        rgba(0, 255, 247, 0.07) 3px,
        transparent 4px
      );
    pointer-events: none;
    animation: glitchBackground 3s infinite linear;
    mix-blend-mode: screen;
  }

  @keyframes glitchBackground {
    0% { background-position: 0 0; }
    100% { background-position: 200px 200px; }
  }
</style>
</head>
<body>
  <h1>404</h1>
  <p>Looks like the code broke through the ocean’s edge. This page got lost in the cyber waves.</p>
  <a href="/" class="home-link">Return Home</a>
</body>
</html>
