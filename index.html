<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal Loop</title>
  <style>
    body {
      font-family: Georgia, serif;
      background-color: #3A3A3C;
      color: #B8B9BE;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    h1 {
      margin-top: 35px;
    }
    u {
      text-decoration: none;
      position: relative;
    }
    u::before {
      content: '';
      position: absolute;
      top: -0.33em;
      left: 0;
      right: 0;
      height: 1.1px; /* Intermediate thickness */
      background-color: currentColor;
    }



/* Default Navigation for smaller screens */
nav {
  position: absolute;
  top: 0;
  left: 0;
  display: table;
  width: 100%;
  box-sizing: border-box;
  padding: 0.75rem 1rem;
}

.home-badge {
  display: table-cell;
  vertical-align: middle;
  width: 25%;
  cursor: pointer;
}

#badge {
  display: inline-block;
  width: 4.5rem;
}

#menu {
  display: none; /* Hide this by default for smaller screens */
}

#dropdown-menu {
  display: table-cell;
  vertical-align: middle;
  width: 75%;
  text-align: right;
  letter-spacing: 1px;
  color: var(--color-light-main);
  font-family: var(--mono-font);
}

.dropdown-btn {
  position: relative;
  display: inline-block;
  font-size: 1em;
  margin-right: 1rem;
  letter-spacing: 3px;
  cursor: pointer;
}

.dropdown-btn::before {
  content: '';
  display: inline-block;
  width: 0.75em;
  height: 0.75em;
  border-radius: 50%;
  background-color: black;
  margin-right: 0.5em;
  animation: rotate 1.5s ease-in-out infinite;
}

@keyframes rotate {
  0% { transform: rotateX(0deg); }
  100% { transform: rotateX(360deg); }
}

.dropdown-btn:hover::before,
.dropdown-btn:focus::before,
.dropdown-btn:active::before {
  animation: none;
}

.dropdown-content {
  position: absolute;
  top: 5rem;
  right: 2rem;
  width: 85%;
  max-width: 550px;
  visibility: hidden;
  overflow: hidden;
  z-index: 11;
}

.dropdown-content .item {
  position: relative;
  left: 100%;
  transition: 0.5s;
  transition-delay: calc(60ms * var(--delay));
  display: block;
  border: solid var(--color-main);
  border-width: 2px 1px 1px 2px;
  border-radius: 50%;
  box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
  padding: .5rem 1rem;
  margin-bottom: .5rem;
  background: #7B7B7B;
  text-align: center;
  text-decoration: none;
  text-transform: uppercase;
  font-size: 2.475em;
}

.dropdown-content .item.active {
  color: #232b2b;
}

.dropdown-content .item.active::before {
  content: '';
  display: inline-block;
  width: 0.6em;
  height: 0.6em;
  border-radius: 50%;
  background-color: var(--color-main);
  margin-right: 0.3em;
  animation: rotate 1.5s ease-in-out infinite;
}

.dropdown-btn:focus + .dropdown-content .item {
  left: 0;
}

.dropdown-btn:focus + .dropdown-content {
  visibility: visible;
}

.dropdown-content .item:hover {
  background: #969696;
}

/* Navigation for screens with a min-width of 30em */
@media screen and (min-width: 30em) {
  nav {
    padding: 0.75rem 4rem;
  }

  #menu {
    display: table-cell;
    vertical-align: middle;
    width: 75%;
    text-align: right;
    letter-spacing: 1px;
    color: var(--color-light-main);
    font-family: var(--mono-font);
  }

  #menu .item {
    display: inline-block;
    font-size: 1.1em;
    margin-right: 2rem;
  }

  #dropdown-menu {
    display: none; /* Hide the dropdown menu for larger screens */
  }

  .logo-item {
    display: inline; /* Show the logo-item inside the home-badge for larger screens */
  }
}

/* Hide logo-item by default */
.logo-item {
  display: none;
}
  </style>
</head>
<body>
  <nav>
  <a class="home-badge" href="{{ site.baseurl }}/">
    <img id="badge" src="{{ site.baseurl }}/assets/images/badge.gif">
    <div class="logo-item">dduyg</div>  
  </a>
  <div id="menu">
    <a class="item {% if page.url == '/' %}active{% endif %}" href="{{ site.baseurl }}/">Home</a>
    <a class="item {% if page.url contains '/posts/' %}active{% endif %}" href="{{ site.baseurl }}/posts">Posts</a>
    <a class="item {% if page.url == '/about.html' %}active{% endif %}" href="{{ site.baseurl }}/about">About</a>
    <a class="item {% if page.url contains '/works/' %}active{% endif %}" href="{{ site.baseurl }}/works">Works</a>
    <a class="item {% if page.url == '/contact.html' %}active{% endif %}" href="{{ site.baseurl }}/contact">Contact</a>
  </div>
  <div id="dropdown-menu">
    <a href="#" class="dropdown-btn" tabindex="0" aria-haspopup="menu">dduyg</a>
    <div class="dropdown-content">
      <a class="item {% if page.url == '/' %}active{% endif %}" style="--delay: 1;" href="{{ site.baseurl }}/">Home</a>
      <a class="item {% if page.url contains '/posts/' %}active{% endif %}" style="--delay: 2;" href="{{ site.baseurl }}/posts">Posts</a>
      <a class="item {% if page.url == '/about.html' %}active{% endif %}" style="--delay: 3;" href="{{ site.baseurl }}/about">About</a>
      <a class="item {% if page.url contains '/works/' %}active{% endif %}" style="--delay: 4;" href="{{ site.baseurl }}/works">Works</a>
      <a class="item {% if page.url == '/contact.html' %}active{% endif %}" style="--delay: 5;" href="{{ site.baseurl }}/contact">Contact</a>
    </div>
  </div>
  </nav>
  
    <h1>Convolu<u>tional&nbsp;</u> Neural Networks</h1>
</body>
</html>
