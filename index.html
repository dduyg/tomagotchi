<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Full Page Sections</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      scroll-behavior: smooth;
      font-family: Arial, sans-serif;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background-color: #333;
      color: white;
      z-index: 1000;
      text-align: center;
      padding: 10px 0;
    }
    header nav a {
      color: white;
      text-decoration: none;
      margin: 0 15px;
      font-size: 18px;
    }
    header nav a:hover {
      text-decoration: underline;
    }
    .section {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-size: 2rem;
    } 
    #section1 {
      background-color: #1abc9c;
    }
    #section2 {
      background-color: #3498db;
    }
    #section3 {
      background-color: #9b59b6;
    }
    #section4 {
      background-color: #e74c3c;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="#section1">Section 1</a>
      <a href="#section2">Section 2</a>
      <a href="#section3">Section 3</a>
      <a href="#section4">Section 4</a>
    </nav>
  </header>
  
  <section id="section1">
    Welcome to Section 1
  </section>
  <section id="section2">
    Welcome to Section 2
  </section>
  <section id="section3">
    Welcome to Section 3
  </section>
  <section id="section4">
    Welcome to Section 4
  </section>
</body>
</html>
