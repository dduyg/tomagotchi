<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
@font-face {           
    font-family: 'Whyte Inktrap Light';       
    src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/WhyteInktrap-Light.woff') format('woff');
    font-weight: 300;
    font-style: normal;
}
@font-face {    
    font-family: 'Test Domaine Text';     
    src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/test-domaine-text-light.woff2') format('woff2');    
    font-weight: 300;
    font-style: normal;
}
@font-face {
  font-family: 'Vanosky Thin';
  src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/VanoskyThin.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
}
@font-face {
  font-family: 'Vanosky';
  src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/VanoskyRegular.woff2') format('woff2');
  font-weight: normal;
  font-style: normal;
}       
@font-face {
    font-family: 'Astralyz';
    src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Astralyz.woff2') format('woff2');
    font-weight: normal;
    font-style: normal;
}

*,
*:after,
*:before {
	box-sizing: border-box;
}

body {
	font-family: 'Test Domaine Text', sans-serif;
	background-color: #FFF;
}

.text-box {
	position: relative;
	display: flex;
	align-items: center;
	justify-content: center;
}

h1 {
	font-size: 8vw;
	font-family: 'Astralyz', sans-serif;
	font-weight: 900;
	background-color: #000;
	color: #fff;
	display: block;
	padding: .5em;
}

h1:nth-child(2) {
	position: absolute;
	background-color: #fff;
	color: #000;
	clip-path: inset(-1% -1% 50% -1%); // Added the negative values to prevent icky "bleed" in Chrome
}

p {
	font-size: 2vw;
	margin-top: 1em;
	text-align: center;
}

.container {
	position: absolute;
	top: 0;
	left: 0;
	right: 0;
	bottom: 0;
	width: 100%;
	display: flex;
	align-items: center;
	justify-content: center;
	flex-direction: column;
}  
    </style>
</head>
<body>
<div class="container">
	<div class="text-box">
		<h1>VIEWCOMPLETE</h1>
		<h1>VIEWCOMPLETE</h1>
	</div>
	<p>Step by step, day by day. There is no one giant step that does it. It's a lot of little steps.</p>
</div>
</body>
</html>
