<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>  
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Fade-in animation */
        .fade-in {
            opacity: 0;
            animation: fadeIn 1s ease-in forwards; /* Fade in over 1s, with ease-in */
        }
        @keyframes fadeIn { 
            from { opacity: 0; }
            to { opacity: 1; }
        }

        body {
            font-family: sans-serif;
            background: #F8F8F8;
            color: #888;
            line-height: 1.6;
            padding: 0;
            margin: 0;
        }
        main {
            max-width: 800px;
            margin: 40% auto 0;
            width: 90%;
        }

        header {
            margin-bottom: 10px;
        }

        .work-list {
            list-style: none;
        }
        .work-item {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid currentColor;
            padding: 10px 0;
            font-size: 1.2rem;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>
    <main>
        <header>When the Phone Rings</header>

        <ul class="work-list">
            <li class="work-item fade-in"> <span>sharlee</span> <span>Branding</span> </li>
            <li class="work-item fade-in"> <span>dua lipa</span> <span>Portrait</span> </li>
            <li class="work-item fade-in"> <span>cocolyze</span> <span>UX/UI Design</span> </li>
            <li class="work-item fade-in"> <span>les indécis</span> <span>Branding</span> </li>
            <li class="work-item fade-in"> <span>game of the goose</span> <span>Game Design</span> </li>
        </ul>

        <footer>
            <p>&copy;Synthwave Inc.</p>
        </footer>
    </main>

    <script>
        // Create an array with the elements to animate
        const elementsToAnimate = [
            'header',
            '.work-item',
            'footer'
        ];

        // Get all elements based on the selectors in the array
        const elements = elementsToAnimate.flatMap(selector => {
            return Array.from(document.querySelectorAll(selector));
        });

        // Apply the fade-in animation with staggered delays
        elements.forEach((el, index) => {
            el.style.animationDelay = `${index * 0.2}s`;
            el.classList.add('fade-in');
        });
    </script>
</body>
</html>
