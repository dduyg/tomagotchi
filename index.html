<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .glitch {
            position: relative;
            font-size: 4rem;
            font-weight: bold;
            text-transform: uppercase;
            line-height: 1;
        }

        .glitch span {
            position: absolute;
            top: 0;
            left: 0;
            color: #fff;
            background: #000;
            overflow: hidden;
            clip: rect(0, 900px, 0, 0);
        }

        .glitch span:nth-child(1) {
            text-shadow: 2px 2px #f00;
            animation: glitch 1.5s infinite linear alternate-reverse;
        }

        .glitch span:nth-child(2) {
            text-shadow: -2px -2px #0ff;
            animation: glitch 1.5s infinite linear alternate-reverse;
            animation-delay: 0.2s;
        }

        @keyframes glitch {
            0% {
                clip: rect(10px, 9999px, 60px, 0);
                transform: translate(2px, -2px);
            }
            20% {
                clip: rect(30px, 9999px, 70px, 0);
                transform: translate(-2px, 2px);
            }
            40% {
                clip: rect(20px, 9999px, 60px, 0);
                transform: translate(-4px, 0);
            }
            60% {
                clip: rect(40px, 9999px, 80px, 0);
                transform: translate(4px, -4px);
            }
            80% {
                clip: rect(15px, 9999px, 50px, 0);
                transform: translate(-1px, 1px);
            }
            100% {
                clip: rect(5px, 9999px, 55px, 0);
                transform: translate(0, 0);
            }
        }
    </style>
</head>
<body>
    <h2 class="glitch">/dygg<span aria-hidden="true">/dygg</span><span aria-hidden="true">/dygg</span></h2>
</body>
</html>
