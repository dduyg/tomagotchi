<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaplan Martin</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #ffffff;
            color: #000000;
            text-align: center;
        }

        .container {
            width: 80%;
            margin: 0 auto;
            padding-top: 50px;
        }

        .title {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .section {
            margin: 20px 0;
            padding-top: 10px; /* Adds spacing above the border */
            border-top: 2px solid #000;
        }

        .year {
            font-size: 18px;
        }

        .content {
            font-size: 16px;
            margin: 20px 0;
        }

        .image-container {
            margin-top: 30px;
        }

        .image-container img {
            width: 100%;
            max-width: 600px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">Kaplan Martin</div>
        <div class="section">
            <div class="year">2024</div>
        </div>
        <div class="section">
            <div class="content">
                LANGUAGE, DESIGN, TECHNOLOGY<br>
                COLD RICE (DEVELOPMENT)
            </div>
        </div>
        <div class="section image-container">
            <img src="your-image-path.jpg" alt="Centered Logo Image">
        </div>
    </div>
</body>
</html>
