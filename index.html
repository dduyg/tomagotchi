<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🧫Loop</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100vh;
            display: flex;
            flex-direction: column;
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f8f8f8;
        }
        .container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        header {
            height: 35vh;
            display: flex;
            overflow: hidden;
        }
        .header-grid {
            display: flex;
            flex: 1;
        }
        .header-grid img {
            height: 100%;
            flex: 1;
            object-fit: cover;
        }
        main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        footer {
            height: 35vh;
            display: flex;
            overflow: hidden;
        }
        .footer-grid {
            display: flex;
            flex: 1;
        }
        .footer-grid img {
            height: 100%;
            flex: 1;
            object-fit: cover;
        }
        .title {
            font-size: 20px;
            font-weight: bold;
        }
        .title .star {
            color: #00ff1d;
            font-size: 35px;
        }
        .title .shape {
            color: #4a24cf;
            font-size: 15px;
            font-weight: normal;
        }
        .subtext {
            font-size: 12px;
            color: gray;
            font-style: italic;
            margin-top: 10px;
        }
        .like-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: transparent;
            border: none;
            font-size: 14px;
            cursor: pointer;
        }
        .like-button.liked {
            font-weight: bold;
            letter-spacing: 2px;
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="header-grid">
                <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-5.png" alt="🔘">
                <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-5.png" alt="🔘">
                <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-5.png" alt="🔘">
                <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-5.png" alt="🔘">
            </div>
        </header>

        <main>
            <h1 class="title">Refraction<span class="star">*</span><span class="shape">(Shape)(Color)</span></h1>
            <p class="subtext">--- Some test exercises for form and color ---</p>
        </main>

        <footer>
            <div class="footer-grid">
                <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="🔘">
                <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/register-6.png" alt="🔘">
            </div>
        </footer>
    </div>

    <button class="like-button" onclick="toggleLike()">🧫Refraction<sub>*</sub>(TEST) - Shape(Color)</button>
    <script>
        function toggleLike() {
            let button = document.querySelector('.like-button');
            button.classList.toggle('liked');
        }
    </script>
</body>
</html>
