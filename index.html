<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>LiminalLoop</title>
  <style>
@font-face {
  font-family: "PPSupplyMono";
  src: url("https://assets.codepen.io/7558/PPSupplyMono-Regular.ttf")
    format("truetype");
  font-weight: normal;
  font-style: normal;
}

:root {
  --font-primary: "PPSupplyMono", "Courier New", monospace;
  --text-color: rgba(245, 245, 245, 0.9);
  --warm-off-black: #1a1917;
  --warm-off-white: #f8f5f2;
}
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #0a0a0a;
  font-family: var(--font-primary);
  width: 100vw;
  height: 100vh;
  overflow-x: hidden;
  font-size: 11px;
  color: var(--text-color);
  line-height: 1.2;
  margin: 0;
  padding: 0;
}

.main-nav a {
  color: var(--text-color);
  text-decoration: none;
  font-size: 12px;
  text-transform: uppercase;
  display: block;
  position: relative;
  padding-left: 8px;
  transition: color 0.2s ease;
}

.nav-hover-square {
  position: absolute;
  top: 50%;
  left: 0;
  width: 4px;
  height: 4px;
  background: var(--text-color);
  transform: translateY(-50%) scaleX(0);
  transform-origin: left center;
}
  </style>
</head>
<body>
    <nav class="main-nav">
        <div>
          <a href="#">JOURNEY</a>
          <div class="nav-hover-square"></div>
        </div>
        <div>
          <a href="#">ABOUT</a>
          <div class="nav-hover-square"></div>
        </div>
        <div>
          <a href="#">SOUND</a>
          <div class="nav-hover-square"></div>
        </div>
    </nav>
</body>
</html>
