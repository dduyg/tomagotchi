<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 Not Found</title>
    <style>
        body {
            background-color: #2a2a2a;
            font-family: monospace;
            color: #f9a825;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            overflow: hidden;
        }

        h1 {
            font-size: 5rem;
            color: #ff3b6d;
        }
        p {
            font-size: 1.5rem;
            margin-top: 10px;
        }
        .glitch {
            position: relative;
            display: inline-block;
            color: #ff0066;
            font-size: 6rem;
            font-weight: bold;
        }
        .glitch:after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            background: #fff;
            color: #ff0066;
            clip: rect(0, 900px, 0, 0);
            animation: glitch-animation 1s infinite;
        }
        @keyframes glitch-animation {
            0% {clip: rect(45px, 9999px, 44px, 0); transform: skew(0.39deg);}
            10% {clip: rect(85px, 9999px, 87px, 0); transform: skew(0.44deg);}
            20% {clip: rect(35px, 9999px, 28px, 0); transform: skew(0.41deg);}
            30% {clip: rect(48px, 9999px, 48px, 0); transform: skew(0.42deg);}
            40% {clip: rect(12px, 9999px, 60px, 0); transform: skew(0.48deg);}
            50% {clip: rect(55px, 9999px, 68px, 0); transform: skew(0.39deg);}
            60% {clip: rect(23px, 9999px, 43px, 0); transform: skew(0.43deg);}
            70% {clip: rect(75px, 9999px, 36px, 0); transform: skew(0.40deg);}
            80% {clip: rect(32px, 9999px, 39px, 0); transform: skew(0.46deg);}
            90% {clip: rect(41px, 9999px, 77px, 0); transform: skew(0.45deg);}
            100% {clip: rect(80px, 9999px, 64px, 0); transform: skew(0.47deg);}
        }
    </style>
</head>
<body>    
    <div class="glitch" data-text="404">404</div>
    <p>We couldn't find the page you're looking for. It might have been moved, deleted, or never existed.</p>
</body>
</html>
