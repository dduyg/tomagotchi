<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liminal🎎Loop</title>
  <style>
    /* Reset and base styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    @font-face {
      font-family: 'Enfonix';
      src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Enfonix.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }

    body.parallax {
      font-family: 'Enfonix', sans-serif;
      background-image: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/pygmalionartistry.gif');
      background-attachment: fixed;
      background-position: center center;
      background-repeat: no-repeat;
      background-size: cover;
      color: #fff;
      padding: 2rem;
    }

    h1 {
      text-align: center;
      margin-bottom: 2rem;
      text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    .container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 1.5rem;
    }

    .component {
      background: rgba(255, 255, 255, 0.1);
      padding: 2rem;
      border-radius: 1rem;
      width: 250px;
      text-align: center;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .component:hover {
      animation: hoverPop 0.5s ease forwards;
      cursor: pointer;
    }

    @keyframes hoverPop {
      0% {
        transform: scale(1);
        text-shadow: none;
      }
      100% {
        transform: scale(1.05);
        text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
      }
    }
  </style>
</head>
<body class="parallax">
  <h1>Hover Animations & Parallax Effect</h1>
  <div class="container">
    <div class="component">Component 1</div>
    <div class="component">Component 2</div>
    <div class="component">Component 3</div>
    <div class="component">Component 4</div>
    <div class="component">Component 5</div>
  </div>

  <script>
    // Parallax scrolling background effect
    window.addEventListener('scroll', function () {
      const offset = window.pageYOffset;
      document.body.style.backgroundPositionY = offset * 0.5 + 'px';
    });
  </script>
</body>
</html>
