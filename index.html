<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Not Found</title>
    <style>
        /* Background and overall styling */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
            background: linear-gradient(to right, #ff0066, #ff00cc, #6600cc, #0099ff);
            background-size: 400% 400%;
            animation: gradientAnimation 10s ease infinite;
            color: #fff;
            text-align: center;
            overflow: hidden;
            height: 100vh;
        }

        @keyframes gradientAnimation {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 80px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: #ff99cc;
            text-shadow: 0 0 10px #ff66cc, 0 0 20px #ff66cc, 0 0 30px #ff99cc, 0 0 40px #ff66cc;
            margin-top: 100px;
            animation: glitch 1s infinite;
        }

        h2 {
            font-size: 40px;
            color: #ffccff;
            margin-top: -20px;
            text-shadow: 0 0 10px #ffccff, 0 0 20px #ff66cc, 0 0 30px #ff99cc;
        }

        .glitch {
            position: relative;
            display: inline-block;
        }

        .glitch:after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            color: #ff66cc;
            background: rgba(0,0,0,0.7);
            clip: rect(0, 900px, 0, 0);
            animation: glitch-animation 1s infinite;
        }

        @keyframes glitch-animation {
            0% { transform: translate(0, 0); }
            25% { transform: translate(-5px, -5px); }
            50% { transform: translate(5px, 5px); }
            75% { transform: translate(-5px, -5px); }
            100% { transform: translate(0, 0); }
        }

        .vaporwave-icon {
            font-size: 150px;
            margin-top: 50px;
            text-shadow: 0 0 10px #ff00cc, 0 0 20px #ff00cc, 0 0 30px #ff0066;
            animation: rotateIcon 6s linear infinite;
        }

        @keyframes rotateIcon {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .home-link {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background-color: #ff66cc;
            color: white;
            font-size: 18px;
            text-decoration: none;
            border-radius: 50px;
            box-shadow: 0 0 10px #ff66cc;
            transition: all 0.3s ease;
        }

        .home-link:hover {
            background-color: #ff00cc;
            box-shadow: 0 0 20px #ff00cc;
        }

    </style>
</head>
<body>
    <h1 class="glitch" data-text="404">404</h1>
    <h2>Oops, Page Not Found</h2>
    <div class="vaporwave-icon">🌴</div>
    <a href="/" class="home-link">Go Back Home</a>
</body>
</html>
