<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Page</title>
    <style>
        /* General Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #121212; /* Dark background color */
            color: #ffffff; /* White text */
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        .container {
            max-width: 800px;
            margin: 50px auto; /* Center the content */
            padding: 0 20px;
        }

        .title {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .border-line {
            width: 100%;
            height: 1px;
            background-color: #666; /* Border color */
            margin-bottom: 30px;
        }

        .contact-section {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two equal columns */
            gap: 10px;
            align-items: start;
        }

        .contact-section .label {
            font-weight: bold;
            color: #ccc; /* Lighter label color */
        }

        .contact-section .info {
            color: #ffffff; /* White text */
        }

        .info a {
            text-decoration: none;
            color: #ffffff; /* White text for links */
            display: block;
            margin-bottom: 5px;
            transition: color 0.3s ease;
        }

        .info a:hover {
            color: #999; /* Lighter gray on hover */
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Title Section -->
        <div class="title">CONTACT</div>
        <div class="border-line"></div>

        <!-- Contact Details Section -->
        <div class="contact-section">
            <!-- Left Column: Labels -->
            <div class="label">MAIL</div>
            <div class="info">
                <a href="mailto:hello@itsshari.ee">↗ hello@itsshari.ee</a>
            </div>

            <div class="label">SOCIAL MEDIAS</div>
            <div class="info">
                <a href="https://instagram.com" target="_blank">↗ instagram</a>
                <a href="https://behance.net" target="_blank">↗ behance</a>
            </div>
        </div>
    </div>
</body>
</html>
