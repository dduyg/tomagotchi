<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 - Page Not Found</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

  /* Vaporwave color palette */
  :root {
    --bg-color: #0f0c29;
    --gradient-start: #302b63;
    --gradient-end: #24243e;
    --accent-pink: #ff6ec7;
    --accent-cyan: #00ffe7;
    --text-color: #ffffff;
    --glitch-red: #ff00c8;
    --glitch-cyan: #00fff9;
  }

  body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, var(--gradient-start), var(--gradient-end));
    color: var(--text-color);
    font-family: 'Press Start 2P', cursive, monospace;
    display: flex;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    overflow: hidden;
  }

  .glitch {
    position: relative;
    font-size: 4rem;
    color: var(--accent-pink);
    animation: glitchAnim 2s infinite;
    user-select: none;
  }
  .glitch::before,
  .glitch::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
  }
  .glitch::before {
    animation: glitchAnimBefore 2s infinite;
    color: var(--glitch-cyan);
    clip-path: polygon(0 2%, 100% 2%, 100% 33%, 0 33%);
    left: 2px;
    top: -2px;
    opacity: 0.8;
  }
  .glitch::after {
    animation: glitchAnimAfter 2s infinite;
    color: var(--glitch-red);
    clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
    left: -2px;
    top: 2px;
    opacity: 0.8;
  }

  @keyframes glitchAnim {
    0% {
      text-shadow: 2px 0 var(--glitch-red), -2px 0 var(--glitch-cyan);
    }
    20% {
      text-shadow: -2px 0 var(--glitch-red), 2px 0 var(--glitch-cyan);
    }
    40% {
      text-shadow: 2px 0 var(--glitch-red), -2px 0 var(--glitch-cyan);
    }
    60% {
      text-shadow: -2px 0 var(--glitch-red), 2px 0 var(--glitch-cyan);
    }
    80%, 100% {
      text-shadow: 2px 0 var(--glitch-red), -2px 0 var(--glitch-cyan);
    }
  }

  @keyframes glitchAnimBefore {
    0%, 100% {
      clip-path: polygon(0 2%, 100% 2%, 100% 33%, 0 33%);
      transform: translate(0);
    }
    50% {
      clip-path: polygon(0 10%, 100% 10%, 100% 20%, 0 20%);
      transform: translate(2px, -2px);
    }
  }
  @keyframes glitchAnimAfter {
    0%, 100% {
      clip-path: polygon(0 65%, 100% 65%, 100% 100%, 0 100%);
      transform: translate(0);
    }
    50% {
      clip-path: polygon(0 75%, 100% 75%, 100% 85%, 0 85%);
      transform: translate(-2px, 2px);
    }
  }

  .subtitle {
    font-size: 1.25rem;
    margin-top: 1rem;
    max-width: 600px;
    text-align: center;
    line-height: 1.4;
    color: var(--accent-cyan);
    text-shadow: 0 0 8px var(--accent-cyan);
  }

  .home-link {
    margin-top: 3rem;
    font-size: 1rem;
    text-decoration: none;
    color: var(--accent-pink);
    border: 2px solid var(--accent-pink);
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    transition: background-color 0.3s ease, color 0.3s ease;
  }
  .home-link:hover {
    background-color: var(--accent-pink);
    color: var(--bg-color);
  }

  /* Background scanlines for glitch effect */
  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    pointer-events: none;
    background-image:
      repeating-linear-gradient(
        0deg,
        rgba(255,255,255,0.03) 0,
        rgba(255,255,255,0.03) 1px,
        transparent 1px,
        transparent 3px
      );
    z-index: 0;
  }
</style>
</head>
<body>
  <div>
    <h1 class="glitch" data-text="404 ERROR">404 ERROR</h1>
    <p class="subtitle">
      Oops, looks like the data stream you requested got corrupted.<br />
      The code you’re trying to reach is lost in the glitchwaves of cyberspace.<br />
      Try navigating back before the system overloads.
    </p>
    <a href="/" class="home-link" aria-label="Go back to homepage">Return to Home</a>
  </div>
</body>
</html>
