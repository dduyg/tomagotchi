<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slide In Animation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
    }
    main {
      max-width: 800px;
      margin: 50px auto;
      padding: 20px;
    }

    .hidden {
      opacity: 0;
      transform: translateY(50px);
      transition: opacity 0.8s ease-out, transform 0.8s ease-out;
    }
    .visible {
      opacity: 1;
      transform: translateY(0);
    }

    section {
      margin: 50px 0;
      padding: 20px;
      background-color: #f4f4f4;
      border: 1px solid #ddd;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <main>
    <section class="hidden">Welcome to the sliding animation demo!</section>
    <section class="hidden">Scroll down to see elements slide in.</section>
    <section class="hidden">This effect is created with CSS and JavaScript.</section>
    <section class="hidden">You can easily customize this for your site.</section>
  </main>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const elements = document.querySelectorAll('.hidden');

      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
            observer.unobserve(entry.target);
          }
        });
      }, { threshold: 0.1 });

      elements.forEach(element => observer.observe(element));
    });
  </script>
</body>
</html>
