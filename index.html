<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body {
            background: linear-gradient(135deg, #ff77ff, #00ffff);
            font-family: 'Courier New', Courier, monospace;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-size: cover;
        }

        h1 {
            font-size: 80px;
            font-weight: bold;
            text-transform: uppercase;
            color: #ff00ff;
            letter-spacing: 5px;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.5);
            animation: neonGlow 1.5s ease-in-out infinite alternate;
        }

        p {
            font-size: 20px;
            color: #00ffff;
            margin-top: -20px;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5);
        }

        a {
            color: #ff00ff;
            font-size: 18px;
            text-decoration: none;
            letter-spacing: 2px;
            margin-top: 20px;
            display: inline-block;
            border: 2px solid #ff00ff;
            padding: 10px 20px;
            transition: all 0.3s ease;
        }

        a:hover {
            background-color: #ff00ff;
            color: black;
        }

        .glitch {
            position: relative;
            display: inline-block;
            color: #ff00ff;
        }

        .glitch:before {
            content: "404";
            position: absolute;
            top: 0;
            left: 0;
            background: rgba(255, 255, 255, 0.1);
            color: #00ffff;
            z-index: -1;
            animation: glitch-anim 1.5s infinite;
        }

        @keyframes neonGlow {
            0% {
                text-shadow: 0 0 5px #ff00ff, 0 0 10px #ff00ff, 0 0 15px #ff00ff, 0 0 20px #ff00ff, 0 0 25px #ff00ff;
            }
            100% {
                text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff, 0 0 30px #ff00ff, 0 0 40px #ff00ff, 0 0 50px #ff00ff;
            }
        }

        @keyframes glitch-anim {
            0% {
                transform: translate(2px, 2px);
            }
            20% {
                transform: translate(-2px, -2px);
            }
            40% {
                transform: translate(2px, -2px);
            }
            60% {
                transform: translate(-2px, 2px);
            }
            80% {
                transform: translate(2px, 2px);
            }
            100% {
                transform: translate(0, 0);
            }
        }
    </style>
</head>
<body>
    <div class="content">
        <h1 class="glitch">404</h1>
        <p>Oops! It looks like this page doesn't exist.</p>
        <a href="/">Back to Home</a>
    </div>
</body>
</html>
