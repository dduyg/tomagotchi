<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Liminal Loop</title>
    <style>
        @font-face {
            font-family: 'Sporting Grotesque';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Sporting_Grotesque-Regular.woff2') format('woff2'),
                 url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Sporting_Grotesque-Regular.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Sporting Grotesque';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Sporting_Grotesque-Bold.woff2') format('woff2'),
                 url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Sporting_Grotesque-Bold.woff') format('woff');
            font-weight: 700;
            font-style: normal;
        }
        @font-face {
            font-family: 'HK Grotesk';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/HKGrotesk-Regular.woff2') format('woff2'),
                 url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/HKGrotesk-Regular.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'HK Grotesk';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/HKGrotesk-Bold.woff2') format('woff2'),
                 url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/HKGrotesk-Bold.woff') format('woff');
            font-weight: bold;
            font-style: normal;
        }
        :root {
            --base_fsize: clamp(1.125rem,4vw,1.4375rem);
            --small_fsize: clamp(1rem,3.25vw,1.125rem);
            --base_lheight: 1.4736842105;
        }
        body {
            margin: 0;
            padding: 0;
            background: #8BA8A4;
            color: #1F208B;
        }
        main {
            margin: 40% auto 0;
            padding: 1rem;
            max-width: 48rem;
        }
        header {
            margin-bottom: 100px;
            font-family: 'HK Grotesk', sans-serif;
        }
        
        section {
           display: flex;
           font-size: var(--small_fsize);
           line-height: 1.3888888889;
           opacity: .6;
           font-family: 'Sporting Grotesque', sans-serif;
       }
       .flex-auto {
           flex:1 1 auto;
       }
       footer {
           font-family: 'Sporting Grotesque', sans-serif;
           font-weight: 700;
       }
    </style>
</head>
<body>
<main>
    <header>
        A deep dive into the world of Laika, a girl lost in space...</p>
    </header>

    <section>
        <div class="flex-auto">
            <span>Identities, </span><span>.txt</span>
        </div>
        <span>Sep 10, 2024</span>
    </section>

    <footer>
        <p>ghost_distortion.exe</p>
        <p>ghosttype.mp4</p>
    </footer>
</main>
</body>
</html>
