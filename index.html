<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Liminal🎚Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Cousine&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Danfo&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@455&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: none;
      background-color: #111;
      color: #e0e0e0;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
      font-family: "Cousine", monospace;
      letter-spacing: -0.03em;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: transparent url("http://assets.iceable.com/img/noise-transparent.png") repeat 0 0;
      background-size: 300px 300px;
      animation: noise-animation 0.3s steps(5) infinite;
      opacity: 1;
      will-change: transform;
      z-index: 100;
      pointer-events: none;
    }
    @keyframes noise-animation {
      0%   { transform: translate(0, 0); }
      10%  { transform: translate(-2%, -3%); }
      20%  { transform: translate(-4%, 2%); }
      30%  { transform: translate(2%, -4%); }
      40%  { transform: translate(-2%, 5%); }
      50%  { transform: translate(-4%, 2%); }
      60%  { transform: translate(3%, 0); }
      70%  { transform: translate(0, 3%); }
      80%  { transform: translate(-3%, 0); }
      90%  { transform: translate(2%, 2%); }
      100% { transform: translate(1%, 0); }
    }

    .layout { 
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 100%;
      height: 100vh;
      position: relative;
      z-index: 20;
      padding: 6rem 2rem;
      pointer-events: auto;     
    }
    .layout__middle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      font-size: 0.75rem;
      text-transform: uppercase;
    }
    .middle {
      text-align: right;
      transform: rotate3d(0, 0, 1, 90deg) translate3d(100%, 10px, 0);
      transform-origin: right;
      white-space: nowrap;
    }
    
    section {
      position: absolute;
      font-size: 0.75rem;
      line-height: 1;
      text-transform: uppercase;
    }
    section.top-left {
      top: 2rem;
      left: 2rem;
      text-align: left;
      font-family: "Cinzel", serif;
      z-index: 20;
    }
    section.top-right {
      top: 2rem;
      right: 2rem;
      text-align: right;
    }
    section.bottom-left {
      bottom: 2rem;
      left: 2rem;
      text-align: left;
      position: fixed;
    }
    section.bottom-right {
      bottom: 2rem;
      right: 2rem;
      text-align: right;
      position: fixed;
    }
    .statement {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      text-align: center;
      z-index: 1;
      max-width: 440px;
      mix-blend-mode: screen;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .statement h2 {
      font-family: "Danfo", serif;
      font-size: 1.25rem;
      letter-spacing: 0.2em;
      margin-top: 1rem;
      text-transform: uppercase;
    }
    
    .custom-cursor {
      position: fixed;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      mix-blend-mode: difference;
      z-index: 9999;
      transition: width 0.2s, height 0.2s;
      will-change: transform;
    }
    canvas {
      display: block;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw;
      height: 100vh;
      margin: 0 !important;
      padding: 0 !important;
      z-index: 2;
      pointer-events: none;
    }
      
    section.top-right {
      cursor: pointer;
      transition: color 0.2s;
      user-select: none;
    }
    section.top-right .theme-trigger-link {
      color: #7ed6ff;
      text-decoration: underline dotted;
      cursor: pointer;
      font-weight: bold;
      background: none;
      border: none;
      padding: 0;
      font-size: inherit;
      font-family: inherit;
      outline: none;
      transition: color 0.2s;
    }
    section.top-right .theme-trigger-link:hover,
    section.top-right .theme-trigger-link:focus {
      color: #fff;
      text-decoration: underline solid;
    }

    .custom-theme-dropdown {
      position: absolute;
      top: calc(2rem + 2.1em); /* below the .top-right section */
      right: 2rem;
      min-width: 180px;
      background: rgba(18, 20, 25, 0.99);
      border: 1px solid #222c;
      border-radius: 0.6em;
      box-shadow: 0 6px 32px 0 rgba(10,12,20,0.19);
      z-index: 500;
      padding: 0.25em 0;
      font-family: "Cousine", monospace;
      font-size: 1em;
      animation: dropdownIn 0.13s cubic-bezier(.34,1.56,.64,1) 1;
    }
    @keyframes dropdownIn {
      from { opacity: 0; transform: translateY(-0.5em) scale(0.96);}
      to   { opacity: 1; transform: translateY(0) scale(1);}
    }
    .custom-theme-dropdown select {
      display: block;
      width: 100%;
      background: none;
      color: #fff;
      border: none;
      font-size: 1em;
      font-family: inherit;
      padding: 0.7em 1.2em 0.7em 0.8em;
      outline: none;
      cursor: pointer;
      appearance: none;
      box-shadow: none;
      border-radius: 0.5em;
    }
    .custom-theme-dropdown select:focus {
      background: #222b;
    }
    .custom-theme-dropdown option {
      color: #222;
      background: #e0e0e0;
      font-family: inherit;
    }
    @media (max-width: 600px) {
      .custom-theme-dropdown {
        right: 1rem;
        min-width: 130px;
        font-size: 0.95em;
      }
    }
  </style>
</head>
<body>
<div class="layout">
  <div class="layout__middle">
    <p>|</p>
    <p class="middle">Creation begins<br> in the void, ✶</p>
  </div>

  <section class="top-left">Override<br>Mission Parameters</section>
  <section class="top-right" id="theme-trigger-section">
    <span id="theme-trigger-text" class="theme-trigger-link" tabindex="0">
      Uncharted<br>Pulsating Signal
    </span>
  </section>
  <section class="bottom-left">Core<br> Anomaly Drive<br> Status: Unknown</section>
  <section class="bottom-right">Alert<br>Dimensional Rift<br> Imminent</section>

  <div class="statement">
    <h2>NOT IN FORM, BUT IN INTENTION</h2>
  </div>
</div>

  <script type="module" src="./script.js"></script>
  <script>
    // DROPDOWN LOGIC (no dependencies, runs after script.js)
    const themes = [
      "Dark Moody",
      "Crimson Heat",
      "Ocean Calm",
      "Sunset Glow",
      "Monochrome",
      "Ethereal Mist",
      "Golden Hour",
      "Neon Nights",
      "Electric Pulse",
      "Molten Core"
    ];
    let dropdown = null;

    function createThemeDropdown(currentTheme) {
      const d = document.createElement("div");
      d.className = "custom-theme-dropdown";
      d.style.display = "block";
      d.tabIndex = -1;

      const s = document.createElement("select");
      for (let theme of themes) {
        const o = document.createElement("option");
        o.value = theme;
        o.textContent = theme;
        if (theme === currentTheme) o.selected = true;
        s.appendChild(o);
      }
      d.appendChild(s);

      // Select handler
      s.addEventListener("change", e => {
        // Update the theme using script.js logic
        if (window.setColorPreset) {
          window.setColorPreset(e.target.value);
        }
        closeDropdown();
      });

      // Prevent click from bubbling to document
      d.addEventListener("mousedown", e => e.stopPropagation());
      d.addEventListener("touchstart", e => e.stopPropagation());

      // Keyboard close
      s.addEventListener("blur", closeDropdown);

      return d;
    }

    function closeDropdown() {
      if (dropdown) {
        dropdown.remove();
        dropdown = null;
      }
    }

    document.addEventListener("DOMContentLoaded", function() {
      const trigger = document.getElementById("theme-trigger-text");
      const triggerSection = document.getElementById("theme-trigger-section");

      trigger.addEventListener("click", function(e) {
        e.stopPropagation();
        if (dropdown) { closeDropdown(); return; }
        // Get current theme from global param (set in script.js)
        const currentTheme = window.getCurrentColorPreset ? window.getCurrentColorPreset() : "Crimson Heat";
        dropdown = createThemeDropdown(currentTheme);

        // Insert dropdown in DOM right after triggerSection
        triggerSection.parentNode.appendChild(dropdown);

        // Position below .top-right
        const rect = trigger.getBoundingClientRect();
        dropdown.style.position = "fixed";
        dropdown.style.top = Math.round(rect.bottom + 2) + "px";
        dropdown.style.right = (window.innerWidth - rect.right) + "px";
        dropdown.querySelector("select").focus();
      });

      // Keyboard support for trigger
      trigger.addEventListener("keydown", function(e) {
        if (e.key === "Enter" || e.key === " " || e.key === "Spacebar") {
          trigger.click();
          e.preventDefault();
        }
      });

      // Click outside closes dropdown
      document.addEventListener("mousedown", closeDropdown);
      document.addEventListener("touchstart", closeDropdown);
      window.addEventListener("scroll", closeDropdown, true);
      window.addEventListener("resize", closeDropdown, true);
    });
  </script>
</body>
</html>
