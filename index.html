<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Liminal🧊Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@450&display=swap" rel="stylesheet" />
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      background-color: #040205;
      color: white;
      font-family: "Manrope", sans-serif;
      overflow: hidden;
    }

    .index {
      display: flex;
      width: 100vw;
      height: 100vh;
    }

    .item {
      flex: 1 1 0;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      box-sizing: border-box;
      cursor: pointer;
      border-right: 1px dotted #B504F3;
      transition: background 0.5s ease;
      overflow: hidden;
    }

    .item_inner {
      position: relative;
      z-index: 2;
      text-align: center;
    }

    .item_inner h3 {
      font-size: clamp(1rem, 2vw, 1.5rem);
      margin: 0 0 8px;
    }

    .item_inner p {
      font-size: clamp(0.8rem, 1.5vw, 1rem);
      margin: 0;
      line-height: 1.4;
    }

    .item::before {
      content: "";
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      opacity: 0;
      z-index: 1;
      transition: opacity 0.5s ease;
    }

    .item.show-image::before {
      opacity: 1;
    }

    .item.show-color {
      background-color: #1203F6;
    }

    .item:not(.show-image):not(.show-color)::before {
      background: none;
    }
  </style>
</head>
<body>
  <nav class="index">
    <div class="item" data-bg="none">
      <div class="item_inner">
        <h3>Transparent</h3>
        <p>No background</p>
      </div>
    </div>
    <div class="item" data-bg="image" data-bg-src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/dead-reckoning.gif">
      <div class="item_inner">
        <h3>Use Image</h3>
        <p>Hover for animated background</p>
      </div>
    </div>
    <div class="item" data-bg="color">
      <div class="item_inner">
        <h3>Solid Color</h3>
        <p>Hover for solid background</p>
      </div>
    </div>
    <div class="item" data-bg="image" data-bg-src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/dead-reckoning.gif">
      <div class="item_inner">
        <h3>Static Image</h3>
        <p>Hover for PNG background</p>
      </div>
    </div>
  </nav>

  <script>
    const items = document.querySelectorAll(".item");

    items.forEach(item => {
      const bgType = item.dataset.bg;
      const bgSrc = item.dataset.bgSrc;

      item.addEventListener("mouseenter", () => {
        items.forEach(i => {
          i.classList.remove("show-image", "show-color");
          i.style.setProperty('--hover-bg', '');
        });

        if (bgType === "image" && bgSrc) {
          item.classList.add("show-image");
          item.style.setProperty('--hover-bg', `url(${bgSrc})`);
          item.querySelector("::before")?.style?.setProperty("background-image", `url(${bgSrc})`);
          item.style.setProperty('--bg-img', `url(${bgSrc})`);
          item.style.setProperty('--bg-src', bgSrc);
          item.style.setProperty('--bg-opacity', 1);
          item.style.setProperty('--bg-color', 'transparent');
          item.querySelector("::before")?.style?.setProperty("background-image", `url(${bgSrc})`);
          item.style.setProperty('--hover-bg', `url(${bgSrc})`);
          item.style.backgroundImage = `url(${bgSrc})`;
        } else if (bgType === "color") {
          item.classList.add("show-color");
        }
      });

      item.addEventListener("mouseleave", () => {
        item.classList.remove("show-image", "show-color");
        item.style.backgroundImage = 'none';
      });
    });
  </script>
</body>
</html>
