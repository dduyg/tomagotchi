<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🎮Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Narrow:wght@505&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Ribes Black';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Ribes-Black.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body, html {
            font-family: "Archivo Narrow", sans-serif;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .video-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #5a5a5a; /* from Semantic UI_/techfolios  */
            background: rgba(255, 255, 255, 0.1);
            min-width: 70%;
            max-width: 450px;
            padding: 2%;
            border-radius: 10px;
        }

        h1 {
            font-family: 'Ribes Black', sans-serif;
            font-size: 2.5em;
            margin-bottom: 40px;
        }
        p {
            font-size: 1.2em;
        }

        .specs {
            margin-top: 30px;
        }       
        .specs .btn {
            display: inline-block;
            margin: 5px;
            padding: 5px 10px;
            font-size: 14px; 
            border: 1px solid #AA8BAB;
            color: #AA8BAB;
            text-decoration: none;
            border-radius: 50px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .specs .btn:hover {
            background: white;
        }
    </style>
</head>
<body>
    <div class="video-container">
        <video autoplay loop muted playsinline>
            <source src="wouldyousong.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <div class="content">
        <h1>Faded Echoes</h1>
        <p>Aşk şarabı içmesi hoştur şaşkın<br>
           Şarap peşinden koşmak boştur şaşkın<br>
           Bir o yana bir bu yana yatma şaşkın<br>
           Tenhalarda menhalarda bitmiş aşkın
        </p>
        <footer class="specs">
            <a href="#🎞" class="btn">▀▄</a>
            <a href="#🎞" class="btn">⬊043 FPS</a>
            <a href="#🎞" class="btn">0360 x 0647</a>
        </footer>
    </div>
</body>
</html>
