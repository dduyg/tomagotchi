<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Liminal🪢Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Reddit+Mono&display=swap" rel="stylesheet">
    <style>
        body {
            background: #e6e6e6;
            position: relative;
            margin: 0;
            padding: 0;
            font-family: "Wix Madefor Display", sans-serif;
        }
        body::before {
            content: "";
            position: fixed;
            top: 50%;
            left: 50%;
            width: 100vw;
            height: 100vh;
            background: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/BLOBs/blob-14.gif') no-repeat center center;
            background-size: contain;
            transform: translate(-50%, -50%);
            opacity: 0.5;
            z-index: -1;
        }

        .content {
            text-align: center;
            padding: 50px;
        }
        h1 {
            font-size: 3em;
            margin-bottom: 20px;
            font-family: "Reddit Mono", monospace;
        }
        p {
            font-size: 1.5em;
            margin-top: 0;
        }
    </style>
</head>
<body>
    <div class="content">
        <h1>Helical</h1>
        <p>Your journey begins here. Explore our content and discover amazing things!</p>
    </div>
</body>
</html>
