<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Glitch Text Effects</title>
    <style>
        body {
            background: #0b0b0b;
            color: #00ff99;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        h1 {
            margin: 20px 0;
            position: relative;
            font-size: 2rem;
            color: #00ff99;
            text-transform: uppercase;
        }

        .glitch-effect {
            position: relative;
            display: inline-block;
            text-shadow: none;
        }

        /* Effect 1: Matrix Trail */
        .glitch-effect.matrix::before {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            color: #00ff99;
            animation: matrix-trail 1s infinite alternate;
            text-shadow: 0 0 8px #00ff99;
        }
        @keyframes matrix-trail {
            0%, 100% { clip-path: inset(0% 0% 20% 0%); }
            50% { clip-path: inset(80% 0% 0% 0%); }
        }

        /* Effect 2: Glitch Flicker */
        .glitch-effect.flicker::before,
        .glitch-effect.flicker::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            color: #ff003c;
            animation: flicker-color 0.2s infinite;
        }
        .glitch-effect.flicker::after {
            color: #00aaff;
            animation-delay: 0.1s;
        }
        @keyframes flicker-color {
            0%, 100% { opacity: 1; transform: translate(0, 0); }
            50% { opacity: 0.4; transform: translate(-2px, 2px); }
        }

        /* Effect 3: Binary Shift */
        .glitch-effect.binary::before,
        .glitch-effect.binary::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            color: #00ff99;
            opacity: 0.8;
            animation: binary-shift 0.5s infinite;
        }
        .glitch-effect.binary::after {
            color: #ff33ff;
            animation-delay: 0.25s;
        }
        @keyframes binary-shift {
            0%, 100% { transform: translateX(0); opacity: 1; }
            50% { transform: translateX(5px); opacity: 0.5; }
        }

        /* Effect 4: Text Decoder */
        .glitch-effect.decoder::before {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            animation: decoder 1.5s infinite;
            background: linear-gradient(90deg, transparent, #ff66cc, #66ccff, transparent);
            -webkit-background-clip: text;
            color: transparent;
        }
        @keyframes decoder {
            0%, 100% { letter-spacing: 5px; opacity: 0; }
            50% { letter-spacing: normal; opacity: 1; }
        }

        /* Effect 5: Pixel Break */
        .glitch-effect.pixel::before {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            color: #00ffcc;
            animation: pixel-break 1s infinite alternate;
        }
        .glitch-effect.pixel::after {
            content: attr(data-text);
            position: absolute;
            top: 0;
            left: 0;
            color: #ff66ff;
            animation: pixel-break 1s infinite alternate-reverse;
        }
        @keyframes pixel-break {
            0% { transform: scale(1) translateX(0); }
            50% { transform: scale(1.1) translateX(-3px); }
            100% { transform: scale(1) translateX(3px); }
        }

        /* Effect 6: Vertical Scan */
        .glitch-effect.scan::before {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            color: #66ff99;
            animation: scan 0.8s infinite alternate;
        }
        .glitch-effect.scan::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            color: #ff9933;
            animation: scan 0.8s infinite alternate-reverse;
        }
        @keyframes scan {
            0% { clip-path: inset(0% 0% 90% 0%); }
            100% { clip-path: inset(90% 0% 0% 0%); }
        }
    </style>
</head>
<body>
    <h1 class="glitch-effect matrix" data-text="Matrix Trail">Matrix Trail</h1>
    <h1 class="glitch-effect flicker" data-text="Glitch Flicker">Glitch Flicker</h1>
    <h1 class="glitch-effect binary" data-text="Binary Shift">Binary Shift</h1>
    <h1 class="glitch-effect decoder" data-text="Text Decoder">Text Decoder</h1>
    <h1 class="glitch-effect pixel" data-text="Pixel Break">Pixel Break</h1>
    <h1 class="glitch-effect scan" data-text="Vertical Scan">Vertical Scan</h1>
</body>
</html>
