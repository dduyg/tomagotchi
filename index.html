<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        /* General Reset */
        body, html {
            margin: 0;
            padding: 59px;
            font-family: 'Courier New', Courier, monospace;
            background: #736efe;
            color: #ffffff;
        }

        .shares {
            position: absolute;
            font-size: 5rem;
            animation: glitch 1s infinite alternate;
        }
        @keyframes glitch {
            0% { transform: translate(-50%, -50%) skew(2deg, -2deg); }
            50% { transform: translate(-52%, -48%) skew(-2deg, 2deg); }
            100% { transform: translate(-50%, -50%) skew(1deg, -1deg); }
        }
    </style>
</head>
<body>
    <div class="shares">404</div>
</body>
</html>
