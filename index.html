<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive ASCII Fountain</title>
    <style>
        body {
            background-color: #fff;
            color: #000;
            font-family: monospace;
            text-align: center;
            white-space: pre;
            overflow: hidden;
        }
        .ascii-art {
            display: inline-block;
            text-align: left;
            position: relative;
            user-select: none;
        }
    </style>
</head>
<body>

<div class="ascii-art" id="ascii-container"></div>

<script>
    function generateFountain(rows, cols) {
        let fountain = [];
        let center = Math.floor(cols / 2);

        for (let i = 0; i < rows; i++) {
            let line = "";
            for (let j = 0; j < cols; j++) {
                let distance = Math.abs(j - center);
                if (distance <= i) {
                    line += (Math.random() > 0.6) ? "V" : " ";
                } else {
                    line += " ";
                }
            }
            fountain.push(line);
        }

        return fountain;
    }

    function displayFountain(fountain) {
        let container = document.getElementById("ascii-container");
        container.innerHTML = "";
        
        fountain.forEach((line, rowIndex) => {
            let div = document.createElement("div");
            div.textContent = line;
            div.style.position = "relative";
            div.dataset.originalX = 0;
            div.dataset.originalY = 0;
            container.appendChild(div);
        });

        addHoverEffect();
    }

    function addHoverEffect() {
        let lines = document.querySelectorAll(".ascii-art div");

        document.addEventListener("mousemove", (event) => {
            let centerX = window.innerWidth / 2;
            let centerY = window.innerHeight / 2;
            
            lines.forEach((line, index) => {
                let offsetX = (event.clientX - centerX) * 0.002 * index;
                let offsetY = (event.clientY - centerY) * 0.002 * index;
                line.style.transform = `translate(${offsetX}px, ${offsetY}px)`;
            });
        });

        document.addEventListener("mouseleave", () => {
            lines.forEach(line => {
                line.style.transform = `translate(0px, 0px)`;
            });
        });
    }

    let fountainData = generateFountain(20, 50);
    displayFountain(fountainData);

</script>

</body>
</html>
