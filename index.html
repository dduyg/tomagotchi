<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refraction - Shape and Color</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f8f8;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .header img {
            width: 150px;
            height: auto;
            margin: 5px;
        }
        .title {
            font-size: 24px;
            font-weight: bold;
            margin: 20px 0;
        }
        .title .highlight {
            color: green;
            font-size: 26px;
        }
        .sub-title {
            color: gray;
            font-style: italic;
            font-size: 14px;
        }
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
        }
        .gallery img {
            width: 250px;
            height: auto;
            margin: 10px;
            border-radius: 10px;
        }
        .footer {
            margin: 30px;
        }
        .like-button {
            background-color: blue;
            color: white;
            padding: 10px 15px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="header">
        <img src="image1.jpg" alt="Refraction Image">
        <img src="image2.jpg" alt="Refraction Image">
        <img src="image3.jpg" alt="Refraction Image">
        <img src="image4.jpg" alt="Refraction Image">
        <img src="image5.jpg" alt="Refraction Image">
    </div>

    <div class="title">
        Refraction <span class="highlight">*</span> 
        <span style="color: blue;">(Shape)</span>
        <span style="color: purple;">(Color)</span>
    </div>
    
    <div class="sub-title">
        --- Some test exercises for form and color ---
    </div>

    <div class="gallery">
        <img src="image6.jpg" alt="Refraction Shape">
        <img src="image7.jpg" alt="Refraction Shape">
    </div>

    <div class="footer">
        <div class="like-button">👍</div>
    </div>

</body>
</html>
