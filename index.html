<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Markl Mono Typeface</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f4f4f4;
            font-family: 'IBM Plex Mono', monospace;
            color: #222;
            text-align: center;
            padding: 50px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #e64a19;
            color: white;
            font-size: 14px;
            font-weight: bold;
            padding: 10px 15px;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-transform: uppercase;
        }

        .title {
            font-size: 60px;
            font-weight: 600;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 40px 0;
        }

        .title span {
            font-weight: 300;
            background: #ddd;
            padding: 5px 10px;
            border-radius: 4px;
        }

        .subtitle {
            font-size: 16px;
            color: #666;
            margin-bottom: 20px;
        }

        .info-box {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        .info-box div {
            padding: 10px;
            border: 1px solid #999;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="badge">V.1 Markl Mono</div>
        
        <div class="info-box">
            <div>PART-NUMBER MRKL-V01-JLCTYP</div>
            <div>7 STYLE | LIGHT → HEAVY</div>
        </div>

        <div class="subtitle">NEW-2025-MONO</div>

        <div class="title">
            <span>M</span>arkl <span>o.SS05</span> mono
        </div>

        <p class="subtitle">Non-proportional typeface designed for optimal readability at small sizes. With its clean & structured letterforms</p>
    </div>

</body>
</html>
