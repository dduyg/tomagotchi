<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Page Full-Height Sections</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: Arial, sans-serif;
    }
    header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: #333;
      color: white;
      padding: 10px 20px;
      z-index: 1000;
    }
    nav {
      display: flex;
      justify-content: space-around;
    }
    nav a {
      color: white;
      text-decoration: none;
      padding: 10px 15px;
    }
    nav a:hover {
      background: #555;
      border-radius: 5px;
    }
    .section {
      height: 100vh; /* Full viewport height */
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 2em;
      color: white;
    }
    #section1 {
      background: #1abc9c;
    }
    #section2 {
      background: #3498db;
    }
    #section3 {
      background: #e74c3c;
    }
    #section4 {
      background: #9b59b6;
    }
  </style>
</head>
<body>

<header>
  <nav>
    <a href="#section1">Section 1</a>
    <a href="#section2">Section 2</a>
    <a href="#section3">Section 3</a>
    <a href="#section4">Section 4</a>
  </nav>
</header>

<div id="section1" class="section">
  Section 1
</div>
<div id="section2" class="section">
  Section 2
</div>
<div id="section3" class="section">
  Section 3
</div>
<div id="section4" class="section">
  Section 4
</div>

</body>
</html>
