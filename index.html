<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Me</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@200;400;600&display=swap');

body {
    font-family: 'Source Code Pro', monospace;
    background-color: #f5f5f5;
    color: #333;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    font-size: 14px;
    margin-bottom: 20px;
}

.box {
    border: 1px solid #333;
    padding: 5px 10px;
}

.tagline {
    font-size: 16px;
    font-weight: bold;
    margin-bottom: 10px;
}

.title {
    font-size: 48px;
    font-weight: bold;
}

.highlight {
    display: inline-block;
    border: 1px solid #333;
    padding: 5px;
    font-size: 48px;
}

.feature {
    display: inline-block;
    border: 1px solid #333;
    padding: 5px;
    font-size: 14px;
}

.description {
    font-size: 14px;
    margin-top: 20px;
}

.badge {
    background-color: #ff5722;
    color: white;
    font-weight: bold;
    padding: 10px;
    border-radius: 50%;
    display: inline-block;
    margin-top: 20px;
}
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="box">PART-NUMBER MRKL-V01-JLCTYP</div>
            <div class="box">7 STYLE &nbsp; LIGHT → HEAVY</div>
        </div>

        <h2 class="tagline">NEW-2025-MONO</h2>

        <div class="title">
            <span class="highlight">M</span>arkl <span class="feature">o.SS05</span> mono
        </div>

        <p class="description">
            non-proportional typeface designed for optimal readability at small sizes. 
            With its clean & structured letterforms
        </p>

        <div class="badge">V.1 MARKL MONO</div>
    </div>
</body>
</html>
