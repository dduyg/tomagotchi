<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Liminal🎚Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Cousine&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Danfo&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@455&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: none;
      background-color: #111;
      color: #e0e0e0;
      text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.8);
      font-family: "Cousine", monospace;
      letter-spacing: -0.03em;
      position: relative;
    }
    body::before {
      content: "";
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: transparent url("http://assets.iceable.com/img/noise-transparent.png") repeat 0 0;
      background-size: 300px 300px;
      animation: noise-animation 0.3s steps(5) infinite;
      opacity: 1;
      will-change: transform;
      z-index: 100;
      pointer-events: none;
    }
    @keyframes noise-animation {
      0%   { transform: translate(0, 0); }
      10%  { transform: translate(-2%, -3%); }
      20%  { transform: translate(-4%, 2%); }
      30%  { transform: translate(2%, -4%); }
      40%  { transform: translate(-2%, 5%); }
      50%  { transform: translate(-4%, 2%); }
      60%  { transform: translate(3%, 0); }
      70%  { transform: translate(0, 3%); }
      80%  { transform: translate(-3%, 0); }
      90%  { transform: translate(2%, 2%); }
      100% { transform: translate(1%, 0); }
    }

    .layout { 
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      width: 100%;
      height: 100vh;
      position: relative;
      z-index: 20;
      padding: 6rem 2rem;
      pointer-events: auto;     
    }
    .layout__middle {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      font-size: 0.75rem;
      text-transform: uppercase;
    }
    .middle {
      text-align: right;
      transform: rotate3d(0, 0, 1, 90deg) translate3d(100%, 10px, 0);
      transform-origin: right;
      white-space: nowrap;
    }
    
    section {
      position: absolute;
      font-size: 0.75rem;
      line-height: 1;
      text-transform: uppercase;
    }
    section.top-left {
      top: 2rem;
      left: 2rem;
      text-align: left;
      font-family: "Cinzel", serif;
      z-index: 20;
    }
    section.top-right {
      top: 2rem;
      right: 2rem;
      text-align: right;
    }
    section.bottom-left {
      bottom: 2rem;
      left: 2rem;
      text-align: left;
      position: fixed;
    }
    section.bottom-right {
      bottom: 2rem;
      right: 2rem;
      text-align: right;
      position: fixed;
    }
    .statement {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      text-align: center;
      z-index: 1;
      max-width: 440px;
      mix-blend-mode: screen;
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }
    .statement h2 {
      font-family: "Danfo", serif;
      font-size: 1.25rem;
      letter-spacing: 0.2em;
      margin-top: 1rem;
      text-transform: uppercase;
    }
    
    .custom-cursor {
      position: fixed;
      width: 15px;
      height: 15px;
      border-radius: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
      mix-blend-mode: difference;
      z-index: 9999;
      transition: width 0.2s, height 0.2s;
      will-change: transform;
    }
    canvas {
      display: block;
      position: fixed !important;
      top: 0 !important;
      left: 0 !important;
      width: 100vw;
      height: 100vh;
      margin: 0 !important;
      padding: 0 !important;
      z-index: 2;
      pointer-events: none;
    }

    section.top-right {
      cursor: pointer;
      transition: color 0.2s;
      user-select: none;
    }
    section.top-right .theme-trigger-link {
      color: #7ed6ff;
      text-decoration: underline dotted;
      cursor: pointer;
      font-weight: bold;
      background: none;
      border: none;
      padding: 0;
      font-size: inherit;
      font-family: inherit;
      outline: none;
      transition: color 0.2s;
      display: inline-block;
    }
    section.top-right .theme-trigger-link:hover,
    section.top-right .theme-trigger-link:focus {
      color: #fff;
      text-decoration: underline solid;
    }

    .custom-theme-dropdown {
      position: fixed;
      min-width: 170px;
      background: rgba(15,18,22,0.99);
      border: 1px solid #222c;
      border-radius: 0.6em;
      box-shadow: 0 6px 32px 0 rgba(10,12,20,0.19);
      z-index: 501;
      padding: 0.3em 0;
      font-family: "Cousine", monospace;
      font-size: 1em;
      animation: dropdownIn 0.13s cubic-bezier(.34,1.56,.64,1) 1;
      color: #fff;
    }
    @keyframes dropdownIn {
      from { opacity: 0; transform: translateY(-0.5em) scale(0.96);}
      to   { opacity: 1; transform: translateY(0) scale(1);}
    }
    .custom-theme-dropdown ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .custom-theme-dropdown li {
      padding: 0.6em 1.2em 0.6em 0.8em;
      cursor: pointer;
      transition: background 0.12s;
      border-radius: 0.4em;
      font-size: 1em;
      white-space: nowrap;
      user-select: none;
    }
    .custom-theme-dropdown li.selected,
    .custom-theme-dropdown li:hover,
    .custom-theme-dropdown li:focus {
      background: #222d;
      color: #7ed6ff;
      outline: none;
    }
    .custom-theme-dropdown li.selected {
      font-weight: bold;
    }
    .custom-theme-dropdown li:active {
      background: #111;
    }
    @media (max-width: 600px) {
      .custom-theme-dropdown {
        min-width: 130px;
        font-size: 0.97em;
      }
    }
    /* Hide scrollbars for dropdown on mobile/desktop */
    .custom-theme-dropdown ul {
      max-height: 70vh;
      overflow-y: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .custom-theme-dropdown ul::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body>
<div class="layout">
  <div class="layout__middle">
    <p>|</p>
    <p class="middle">Creation begins<br> in the void, ✶</p>
  </div>

  <section class="top-left">Override<br>Mission Parameters</section>
  <section class="top-right" id="theme-trigger-section">
    <span id="theme-trigger-text" class="theme-trigger-link" tabindex="0">
      Uncharted<br>Pulsating Signal
    </span>
  </section>
  <section class="bottom-left">Core<br> Anomaly Drive<br> Status: Unknown</section>
  <section class="bottom-right">Alert<br>Dimensional Rift<br> Imminent</section>

  <div class="statement">
    <h2>NOT IN FORM, BUT IN INTENTION</h2>
  </div>
</div>

  <script type="module" src="./script.js"></script>
  <script>
    // Custom dropdown logic for both desktop and mobile
    const themes = [
      "Dark Moody",
      "Crimson Heat",
      "Ocean Calm",
      "Sunset Glow",
      "Monochrome",
      "Ethereal Mist",
      "Golden Hour",
      "Neon Nights",
      "Electric Pulse",
      "Molten Core"
    ];
    let dropdown = null;

    function createThemeDropdown(currentTheme) {
      const d = document.createElement("div");
      d.className = "custom-theme-dropdown";

      const ul = document.createElement("ul");
      themes.forEach(theme => {
        const li = document.createElement("li");
        li.textContent = theme;
        li.setAttribute("tabindex", "0");
        if (theme === currentTheme) li.classList.add("selected");
        li.addEventListener("click", () => {
          if (window.setColorPreset) {
            window.setColorPreset(theme);
          }
          closeDropdown();
        });
        li.addEventListener("keydown", e => {
          if (e.key === "Enter" || e.key === " " || e.key === "Spacebar") {
            li.click();
            e.preventDefault();
          }
        });
        ul.appendChild(li);
      });
      d.appendChild(ul);

      // Prevent click from bubbling to document
      d.addEventListener("mousedown", e => e.stopPropagation());
      d.addEventListener("touchstart", e => e.stopPropagation());

      // Focus first li for accessibility
      setTimeout(() => {
        const selected = ul.querySelector('.selected') || ul.firstChild;
        if (selected) selected.focus();
      }, 0);

      return d;
    }

    function closeDropdown() {
      if (dropdown) {
        dropdown.remove();
        dropdown = null;
      }
    }

    document.addEventListener("DOMContentLoaded", function() {
      const trigger = document.getElementById("theme-trigger-text");
      const triggerSection = document.getElementById("theme-trigger-section");

      trigger.addEventListener("click", function(e) {
        e.stopPropagation();
        if (dropdown) { closeDropdown(); return; }
        const currentTheme = window.getCurrentColorPreset ? window.getCurrentColorPreset() : "Crimson Heat";
        dropdown = createThemeDropdown(currentTheme);

        // Insert dropdown in DOM right after triggerSection
        triggerSection.parentNode.appendChild(dropdown);

        // Position below .top-right
        const rect = trigger.getBoundingClientRect();
        dropdown.style.top = Math.round(rect.bottom + 2) + "px";
        dropdown.style.right = (window.innerWidth - rect.right) + "px";
      });

      // Keyboard support for trigger
      trigger.addEventListener("keydown", function(e) {
        if (e.key === "Enter" || e.key === " " || e.key === "Spacebar") {
          trigger.click();
          e.preventDefault();
        }
      });

      // Click/touch outside closes dropdown
      document.addEventListener("mousedown", closeDropdown);
      document.addEventListener("touchstart", closeDropdown);
      window.addEventListener("scroll", closeDropdown, true);
      window.addEventListener("resize", closeDropdown, true);
    });
  </script>
</body>
</html>
