<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiltier Display Serif</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&display=swap');

body {
    background-color: #f8f8f2;
    text-align: center;
    font-family: 'Playfair Display', serif;
    margin: 0;
    padding: 0;
}

header {
    display: flex;
    justify-content: space-between;
    padding: 20px;
    font-size: 14px;
    font-weight: bold;
}

.title-container {
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

.title {
    font-size: 140px;
    font-weight: bold;
    letter-spacing: -5px;
    color: #111;
}

.rose {
    position: relative;
    display: inline-block;
}

.rose img {
    height: 100px; 
    position: absolute;
    top: -50px;
    left: -10px;
}

.subtitle-container {
    display: flex;
    justify-content: center;
    align-items: center;
    border: 2px solid black;
    padding: 10px 20px;
    width: 400px;
    margin: 20px auto;
    border-radius: 50px;
}

.subtitle-container h2 {
    font-size: 30px;
    margin: 0 20px;
}

.icon {
    font-size: 30px;
}
    </style>
</head>
<body>
    <header>
        <span>14 STYLES</span>
        <span>JOLICIATYPE®</span>
        <span>2 VARIABLE FONTS</span>
    </header>
    
    <main>
        <div class="title-container">
            <h1 class="title">Kil<span class="rose"><img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/06/BLOBs/blob-16.gif" alt="Rose"></span>tier</h1>
        </div>
        <div class="subtitle-container">
            <div class="icon">*</div>
            <h2>DISPLAY SERIF</h2>
            <div class="icon">*</div>
        </div>
    </main>
</body>
</html>
