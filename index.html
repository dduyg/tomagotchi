<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🗿Loop</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        
        @font-face {
            font-family: "Trio Grotesk";
            src: url("https://c-p.rmcdn1.net/hosted-fonts/webtype-fallback/Trio Grotesk/Rubik-Regular.woff2") format("woff2");
        }
        @font-face {
            font-family: "Trio Grotesk";
            src: url("https://c-p.rmcdn1.net/hosted-fonts/webtype-fallback/Trio Grotesk/Rubik-Medium.woff2") format("woff2");
            font-weight: 500;
        }

        body {
            font-family: "Trio Grotesk", sans-serif;
            background: #EDE8EC;
            color: #262626;
            overflow-x: hidden;
        }

        main {
            max-width: 800px;
            width: 100%;
            margin: 15vh auto 0;
            padding: 0 15px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
        }

        .badge {
            display: inline-block;
            width: 45px;
            height: 45px;
            margin-right: 10px;
            border-radius: 50%;
            cursor: pointer;
        }

        .badge:hover, .badge.active {
            background-color: var(--hover-color);
        }

        .badge.forming-kin { background-image: url('memory01.svg'); --hover-color: #f886ff; }
        .badge.moi { background-image: url('memory02.svg'); --hover-color: #71c6ff; }
        .badge.cosmetic-healing { background-image: url('memory03.svg'); --hover-color: #8af38a; }
        .badge.ai { background-image: url('memory04.svg'); --hover-color: #f2fc72; }
        .badge.living-tools { background-image: url('memory05.svg'); --hover-color: #c6aeff; }

        input { display: none; }

        label {
            display: flex;
            width: 100%;
            height: 50px;
            cursor: pointer;
            border: 3px solid;
            user-select: none;
            background: #EDE8EC;
        }

        input:checked + label {
            background-color: var(--hover-color);
        }

        .cross {
            margin-right: 15px;
            margin-top: 3px;
        }

        .cross:before, .cross:after {
            content: '';
            border-top: 2px solid #3E474F;
            width: 15px;
            display: block;
            margin-top: 18px;
            transition: 0.3s;
        }

        .cross:after { transform: rotate(90deg); margin-top: -2px; }
        input:checked + label .cross:before { transform: rotate(180deg); }
        input:checked + label .cross:after { transform: rotate(0deg); }

        .content {
            box-sizing: border-box;
            font-size: 0.9em;
            margin: 10px 10px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s;
            display: flex;
            flex-wrap: wrap;
        }

        input:checked ~ .content {
            max-height: 500px;
            transition: max-height 1s;
        }

        .content p {
            flex: 1;
            padding: 5px;
        }

        @media (min-width: 768px) {
            .content p { width: 50%; }
        }

        .tip {
            color: #f03768;
            cursor: help;
            position: relative;
            font-family: monospace;
            font-size: 1.3em;
        }

        .tip:hover:after {
            content: attr(data-tip);
            background: #3E474F;
            color: white;
            width: 150px;
            padding: 10px;
            font-size: 0.8em;
            position: absolute;
            bottom: 150%;
            left: -50%;
            opacity: 1;
            z-index: 100;
        }

        .dropcap::first-letter {
            font-size: 50px;
            line-height: 45px;
            font-family: Gallique, serif;
            float: left;
            margin-right: 5px;
        }

        @media (max-width: 768px) {
            header {
                flex-direction: column;
                text-align: left;
            }
        }
    </style>
</head>
<body>

<main>
  <header>
      <h1>Memory Work</h1>
      <nav>
        <div class="badge forming-kin" onclick="openAccordion('tab-1', this)"></div>
        <div class="badge moi" onclick="openAccordion('tab-2', this)"></div>
        <div class="badge cosmetic-healing" onclick="openAccordion('tab-3', this)"></div>
        <div class="badge ai" onclick="openAccordion('tab-4', this)"></div>
        <div class="badge living-tools" onclick="openAccordion('tab-5', this)"></div>
      </nav>
  </header>

  <article>
    <input type="radio" id="tab-1" name="tabs">
    <label for="tab-1"><div>Forming Kin</div><div class="cross"></div></label>
    <div class="content">
        <p class="dropcap">A call for people to be with nature...</p>
        <p>Like mushrooms springing from disseminated spores...</p>
    </div>
  </article>

  <article>
    <input type="radio" id="tab-2" name="tabs">
    <label for="tab-2"><div>Mothers of Invention</div><div class="cross"></div></label>
    <div class="content">
        <p class="dropcap">Referring to a loosely knit movement...</p>
        <p>In response to the clumsy Climate Imperative...</p>
    </div>
  </article>

  <article>
    <input type="radio" id="info-tab" name="tabs">
    <label for="info-tab"><div>About</div><div class="cross"></div></label>
    <div class="questions">
        <input type="radio" id="question-1" name="question">
        <label for="question-1"><div>Memory Work</div> <div class="cross"></div></label>
        <div class="content">
            <p class="dropcap">Memory Work is a research-based future scenario...</p>
            <p>History is written by the privileged...</p>
        </div>
    </div>
  </article>
</main>

<script>
    function openAccordion(id, badge) {
        document.getElementById(id).checked = true;
        document.querySelectorAll('.badge').forEach(el => el.classList.remove('active'));
        badge.classList.add('active');
    }
</script>
</body>
</html>
