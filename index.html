<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Columns</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: gray;
            margin: 0;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .details {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .row {
            display: flex;
            gap: 10px;
            align-items: flex-start;
        }

        .property {
            font-weight: bold;
            width: 150px; /* Set a fixed width for alignment */
        }

        .info {
            flex: 1;
        }

        .summary h3 {
            margin-top: 0;
        }

        @media screen and (min-width: 30em) {
            .container {
                flex-direction: row;
                gap: 20px;
            }

            .details {
                flex: 1;
                display: flex;
                flex-direction: column;
            }

            .summary {
                flex: 1;
            }

            .details, .summary {
                max-width: 50%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="details">
            <div class="row">
                <div class="property">CATEGORY:</div>
                <div class="info">Branding, Design, Web Development</div>
            </div>
            <div class="row">
                <div class="property">YEAR:</div>
                <div class="info">2024</div>
            </div>
            <div class="row">
                <div class="property">CLIENT:</div>
                <div class="info">LiminalLoop</div>
            </div>
        </div>
        <div class="summary">
            <h3>Summary</h3>
            <p>ACT Responsable is a French association created to identify and collect the best communications campaigns around the world in order to raise awareness on social and environmental issues...</p>
        </div>
    </div>
</body>
</html>
