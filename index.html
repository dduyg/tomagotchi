<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        @font-face {
            font-family: 'HK Grotesk';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/HKGrotesk-Regular.woff2') format('woff2'),
                 url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/HKGrotesk-Regular.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'HK Grotesk';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/HKGrotesk-Bold.woff2') format('woff2'),
                 url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/HKGrotesk-Bold.woff') format('woff');
            font-weight: bold;
            font-style: normal;
        } 
        body {
            font-family: 'HK Grotesk', sans-serif;
            background-color: #DAE5E7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        main {
            font-size: 1.5em;
            padding: 1rem;
        }
        ul {
            padding-left: 3.125em;
        }    
        ul li {  
            position: relative;
            margin-top: 0.375em;
            padding-left: 0.3em;
        }
        ul li:before {
            content: '';
            height: 1em;
            width: 1em;
            border-radius: 50%;
            border: 2px solid black;
            position: absolute;
            left: -1.1em;
        }      
    </style>
</head>
<body>
    <main>
        <ul>
            <li>PIANO ENTHUSIAST</li>
            <li>PLANT LOVER</li>
            <li>ANALOG-FILM WASTER</li>
            <li>RETRO PATTERNS SPOTTER</li>
            <li>AVID TRAVELER</li>
            <li>MUSIC NOMAD</li>
        </ul>
    </main>
</body>
</html>
