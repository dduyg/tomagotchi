<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Liminūüíźalūü•üLoop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: flex-end;
      margin: 0;
    }

    .tabs-container {
      display: flex;
      flex-direction: row-reverse;
      height: 100vh;
      width: 100%;
    }

    .tab-icons {
      display: flex;
      flex-direction: column;
      justify-content: center;
      border-left: 2px solid black;
    }

    .tab-icons button {
      background: none;
      border: none;
      padding: 20px;
      cursor: pointer;
      border-bottom: 1px solid #000;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 60px;
    }

    .tab-icons button.active {
      background-color: #eee;
    }

    .tab-content {
      flex: 1;
      padding: 40px;
    }

    .tab-content > div {
      display: none;
    }

    .tab-content > div.active {
      display: block;
    }
  </style>
</head>
<body>

<div class="tabs-container">
  <div class="tab-icons">
    <button class="tab-btn active" onclick="openTab(0)">ūüĎ§</button>
    <button class="tab-btn" onclick="openTab(1)">ūüõ†ÔłŹ</button>
    <button class="tab-btn" onclick="openTab(2)">ūüĆź</button>
    <button class="tab-btn" onclick="openTab(3)">‚úąÔłŹ</button>
  </div>
  <div class="tab-content">
    <div class="tab active">Here is content for tab 1</div>
    <div class="tab">Here is content for tab 2</div>
    <div class="tab">Here is content for tab 3</div>
    <div class="tab">Here is content for tab 4</div>
  </div>
</div>

<script>
  function openTab(index) {
    const tabs = document.querySelectorAll('.tab');
    const buttons = document.querySelectorAll('.tab-btn');
    tabs.forEach(tab => tab.classList.remove('active'));
    buttons.forEach(btn => btn.classList.remove('active'));
    tabs[index].classList.add('active');
    buttons[index].classList.add('active');
  }
</script>
</body>
</html>
