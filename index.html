<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error 404 - Page Not Found</title>
  <style>
    body {
      background: linear-gradient(135deg, #ff77ff, #00c8ff, #ffccff);
      font-family: 'Arial', sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #fff;
      text-align: center;
    }

    h1 {
      font-size: 6rem;
      margin: 0;
      color: #fff;
      text-shadow: 0px 0px 5px rgba(255, 255, 255, 0.6), 0px 0px 10px rgba(255, 255, 255, 0.6);
    }

    p {
      font-size: 1.5rem;
      margin-top: 1rem;
      text-shadow: 0px 0px 5px rgba(255, 255, 255, 0.4), 0px 0px 10px rgba(255, 255, 255, 0.4);
    }

    .vaporwave-icons {
      font-size: 3rem;
      margin-top: 20px;
    }

    .vaporwave-icons i {
      margin: 0 10px;
      animation: blink 1s infinite alternate;
    }

    @keyframes blink {
      0% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .back-button {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 30px;
      background-color: #ff77ff;
      border: none;
      color: #fff;
      font-size: 1.2rem;
      text-decoration: none;
      border-radius: 5px;
      transition: background-color 0.3s;
    }

    .back-button:hover {
      background-color: #ff3399;
    }

    .glitch {
      color: #00c8ff;
      font-size: 2rem;
      text-shadow: 2px 2px 5px #ff77ff, -2px -2px 5px #00c8ff;
      animation: glitch 1s infinite alternate;
    }

    @keyframes glitch {
      0% {
        text-shadow: 2px 2px 5px #ff77ff, -2px -2px 5px #00c8ff;
      }
      100% {
        text-shadow: -2px -2px 5px #ff77ff, 2px 2px 5px #00c8ff;
      }
    }

  </style>
</head>
<body>
  <div>
    <h1>404</h1>
    <p>Oops! Looks like this page is lost in cyberspace...</p>
    <div class="vaporwave-icons">
      <i class="fas fa-cassette-tape"></i>
      <i class="fas fa-robot"></i>
      <i class="fas fa-disco-ball"></i>
    </div>
    <p class="glitch">Error 404 - Page Not Found</p>
    <a href="/" class="back-button">Take Me Home</a>
  </div>

  <!-- Load Font Awesome for icons -->
  <script src="https://kit.fontawesome.com/a076d05399.js" crossorigin="anonymous"></script>
</body>
</html>
