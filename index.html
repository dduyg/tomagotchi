<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>LiminalLoop</title>  
    <style>  
        * {  
            margin: 0;  
            padding: 0;  
            box-sizing: border-box;  
            outline: none;  
            -webkit-tap-highlight-color: transparent;  
        }  
        body {  
            font-family: "PT Sans Narrow", sans-serif;  
            margin: 0;  
            padding-bottom: 25px;  
            background-color: #e7e5e5;  
            color: #000;  
        }  
  
        section {  
            display: flex;  
            justify-content: center;  
            align-items: center;  
            padding: 80px 0 30px;  
            position: relative;  
        }  
        section .content {  
            position: relative;  
            width: 100%;  
            max-width: 600px; 
            display: flex;  
            flex-direction: column;  
            justify-content: center;  
            align-items: center;  
            text-align: center;  
            padding: 30px 5%;  
        }  
        section .content::after {  
            content: "";  
            position: absolute;  
            top: 0;  
            left: 0;  
            width: 100%;  
            height: 100%;  
            background: url('https://media2.giphy.com/media/sdyvSTjNtlO8/giphy.gif') no-repeat center center; 
            opacity: 0.3; 
            z-index: -1;  
        }  
        .content h4 {  
            font-size: 16px;  
            font-weight: normal;  
            padding: 25px 0 30px;  
        }  
        .content h2 {   
            font-size: 45px;  
            font-weight: 550;  
            line-height: 1;  
            padding: 30px 0 10px; 
        }  
        .content p {  
            font-size: 0.85rem;  
            padding: 15px 0 70px; 
        }
    </style>  
</head>  
<body>  
    <section>  
        <div class="content">  
            <h4>WE LOVE HEARING <em>your Dreams.</em> TELL US.<br>( CONTACT US )</h4>  
            <h2>THAT’S NOT WATER, <br>THOSE ARE TEARS OF <em>Happy</em> <em>Clients</em>.</h2>  
            <p>Let’s get this party started, get in touch.</p>  
        </div>  
    </section>
</body>  
</html>
