<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Vaporwave World</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            color: #ffffff;
            background: linear-gradient(135deg, #ff9e9e, #9e9eff);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            text-align: center;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h1 {
            font-size: 3rem;
            margin-top: 20vh;
            text-shadow: 2px 2px 5px #ff69b4;
        }

        p {
            font-size: 1.2rem;
            margin: 20px auto;
            max-width: 600px;
            line-height: 1.5;
            text-shadow: 1px 1px 3px #8a2be2;
        }

        .neon-button {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            font-size: 1rem;
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #fff;
            border-radius: 30px;
            text-decoration: none;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-shadow: 2px 2px 5px #000;
        }

        .neon-button:hover {
            background: #ff69b4;
            border-color: #ff69b4;
            color: #000;
            box-shadow: 0 0 20px #ff69b4, 0 0 40px #ff69b4, 0 0 60px #ff69b4;
        }
    </style>
</head>
<body>
    <h1>Welcome to My Vaporwave World</h1>
    <p>
        Step into a dreamy, retro-futuristic world where the vibes are chill, the colors are neon, and everything feels like an 80s synthwave track. 
        Explore and immerse yourself in this unique space I've created.
    </p>
    <a href="#explore" class="neon-button">Explore More</a>
</body>
</html>
