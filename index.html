<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Glowing🪄Border</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat&display=swap" rel="stylesheet"/>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      display: grid;
      place-items: center;
      min-height: 100vh;
      width: 100%;
      background: #1e1e1e;
      font-family: "Montserrat", sans-serif;
    }

    .form-container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .input-field {
      width: 250px;
      position: relative;
    }

    .input-field input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: 1.1rem;
      padding: 0 0 5px;
      letter-spacing: 0.1em;
      font-family: "Montserrat", sans-serif;
    }

    .input-field label {
      position: absolute;
      left: 0;
      top: 0;
      padding-bottom: 5px;
      color: #bababa;
      letter-spacing: 0.1em;
      font-size: 0.9rem;
      pointer-events: none;
      text-transform: uppercase;
      transition: 0.3s ease;
    }

    .input-field input:focus + label,
    .input-field input:not(:placeholder-shown) + label {
      top: -16px;
      font-size: 0.7em;
    }

    .input-field i {
      position: absolute;
      left: 0;
      bottom: 0;
      height: 2px;
      width: 100%;
      background: #fff;
      overflow: hidden;
    }

    .input-field i::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      left: -100%;
      background: linear-gradient(to right, #4287f5, #d91653, #0dd910, #ebe010, #4287f5);
      background-size: 250px;
      animation: anim 0.6s linear infinite;
      transition: 0.4s;
    }

    .input-field input:focus ~ i::before,
    .input-field input:not(:placeholder-shown) ~ i::before {
      left: 0;
    }

    @keyframes anim {
      from {
        background-position-x: 0;
      }
      to {
        background-position-x: 250px;
      }
    }
  </style>
</head>
<body>
  <div class="form-container">
    <div class="input-field">
      <input type="text" id="first-name" placeholder=" " />
      <label for="first-name">First Name</label>
      <i></i>
    </div>
    <div class="input-field">
      <input type="text" id="last-name" placeholder=" " />
      <label for="last-name">Last Name</label>
      <i></i>
    </div>
  </div>
</body>
</html>
