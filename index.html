<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        /* General Reset */
        body, html {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            width: 100%;
            height: 100%;
            font-family: 'Courier New', Courier, monospace;
            background: linear-gradient(135deg, #ff6ec7, #736efe);
            color: #ffffff;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .glitch {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 10rem;
            text-shadow: 
                2px 2px #ff6ec7, 
                -2px -2px #736efe;
            animation: glitch 1s infinite alternate;
            opacity: 0.1;
            z-index: 0;
        }

        @keyframes glitch {
            0% { transform: translate(-50%, -50%) skew(2deg, -2deg); }
            50% { transform: translate(-52%, -48%) skew(-2deg, 2deg); }
            100% { transform: translate(-50%, -50%) skew(1deg, -1deg); }
        }
    </style>
</head>
<body>
    <div class="glitch">404</div>
</body>
</html>
