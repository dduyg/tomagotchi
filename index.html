<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>LiminalLoop</title>
  <style>
@font-face {
  font-family: "PPSupplyMono";
  src: url("https://assets.codepen.io/7558/PPSupplyMono-Regular.ttf")
    format("truetype");
  font-weight: normal;
  font-style: normal;
}
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  background: #fafafa;
  font-family: "PPSupplyMono", "Courier New", monospace;
  width: 100vw;
  min-height: 100vh;
  overflow-x: hidden;
  text-transform: uppercase;
  font-size: 12px;
  color: #1a1a1a;
}

.container {
  width: 100vw;
  padding: 2rem;
  position: relative;
}

.header {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 1rem;
  padding-bottom: 2rem;
  margin-bottom: 2rem;
  font-size: 12px;
  color: #1a1a1a;
}

.header-content {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 1rem;
  grid-column: 1 / -1;
}

.header-content > div:nth-child(1) {
  grid-column: 1 / 4;
}

.header-content > div:nth-child(2) {
  grid-column: 4 / 6;
}

.header-content > div:nth-child(3) {
  grid-column: 6 / 9;
}

.header-content > div:nth-child(4) {
  grid-column: 9 / 13;
}

.header-content p {
  margin: 0;
}

.header-content span {
  display: inline;
}

/* Email hover effect */
a {
  position: relative;
  cursor: pointer;
  color: #1a1a1a;
  padding: 0;
  display: inline-block;
  z-index: 1;
  text-decoration: none;
  font-size: 12px;
  opacity: 1;
  transition: color 0.3s ease;
  font-weight: 700;
}
a::after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  width: 0;
  height: 100%;
  background-color: #1a1a1a;
  z-index: -1;
  transition: width 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
}
a:hover::after {
  width: 100%;
}
a:hover {
  color: #fafafa;
  mix-blend-mode: difference;
  opacity: 1;
}

.footer {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  font-size: 10px;
  color: #666;
  z-index: 1000;
}

.sessions-svg {
  width: 100%;
  margin-bottom: 4rem;
}
.sessions-svg img {
  width: 100%;
  height: auto;
  display: block;
  filter: invert(1);
}

.debug-grid-toggle {
  position: fixed;
  top: 2rem;
  right: 2rem;
  display: grid;
  grid-template-columns: repeat(3, 4px);
  grid-template-rows: repeat(3, 4px);
  gap: 1px;
  z-index: 1000;
  cursor: pointer;
  padding: 4px;
  transition: transform 0.1s ease;
}
.debug-square {
  background: #1a1a1a;
  width: 4px;
  height: 4px;
  transition: all 0.2s ease;
}
.debug-grid-toggle.active .debug-square {
  background: red;
}

.portfolio-grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 1rem;
  position: relative;
}

.debug-overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.3s ease;
  z-index: 100;
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 1rem;
}
.debug-overlay.active {
  opacity: 1;
}
.debug-column {
  background: rgba(255, 0, 0, 0.2);
  border: 1px solid red;
  min-height: 2000px;
  position: relative;
}
.debug-column::before {
  content: attr(data-col);
  position: absolute;
  top: 8px;
  left: 8px;
  font-size: 10px;
  color: red;
  background: white;
  padding: 2px 4px;
}

.grid-item {
  position: relative;
  margin-bottom: 20vh;
}

.grid-item-01 {
  grid-column: 1 / 3;
}

.grid-item-03 {
  grid-column: 5 / 7;
}

.grid-item-05 {
  grid-column: 11 / 13;
}

.grid-item-06 {
  grid-column: 1 / 3;
}

.grid-item-09 {
  grid-column: 7 / 12;
}

.grid-item-11 {
  grid-column: 1 / 3;
}

.grid-item-13 {
  grid-column: 5 / 7;
}

.grid-item-17 {
  grid-column: 1 / 3;
}

.grid-item-20 {
  grid-column: 9 / 12;
  grid-row: 3 / 5;
}

.image-box {
  aspect-ratio: 4 / 5;
  background: #000;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}

.image-box img {
  width: 100%;
  height: 100%;
  -o-object-fit: cover;
     object-fit: cover;
  filter: grayscale(100%) contrast(1.2);
  transition: filter 0.1s ease-out;
}

.threejs-canvas {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  pointer-events: none;
}

.image-number {
  position: absolute;
  top: 8px;
  left: 8px;
  font-size: 10px;
  color: #fff;
  z-index: 5;
}

.image-title {
  margin-top: 8px;
  font-size: 10px;
  color: #1a1a1a;
  transform: translateX(0px);
  will-change: transform, color;
  position: relative;
  display: inline-block;
  transition: color 0.2s cubic-bezier(0.23, 1, 0.32, 1),
    transform 0.2s cubic-bezier(0.23, 1, 0.32, 1);
}

.image-title::before {
  content: "•";
  position: absolute;
  left: -12px;
  top: 0;
  opacity: var(--before-opacity, 0);
  transform: translateX(var(--before-x, -8px));
  color: #666;
  transition: opacity 0.2s cubic-bezier(0.23, 1, 0.32, 1),
    transform 0.2s cubic-bezier(0.23, 1, 0.32, 1);
}

.tp-dfwv {
  position: fixed !important;
  top: 80px !important;
  right: 20px !important;
  z-index: 2000 !important;
  width: 280px !important;
  opacity: 0 !important;
  visibility: hidden !important;
  transition: opacity 0.3s ease, visibility 0.3s ease !important;
  text-transform: none !important;
}

.tp-dfwv * {
  text-transform: none !important;
}

.tp-dfwv.visible {
  opacity: 1 !important;
  visibility: visible !important;
}

@media (max-width: 768px) {
  .container {
    padding: 1rem;
  }

  .portfolio-grid {
    grid-template-columns: repeat(6, 1fr);
  }

  .grid-item-01 {
    grid-column: 1 / 3;
  }

  .grid-item-03 {
    grid-column: 3 / 5;
  }

  .grid-item-05 {
    grid-column: 5 / 7;
  }

  .grid-item-06 {
    grid-column: 1 / 3;
  }

  .grid-item-09 {
    grid-column: 3 / 7;
  }

  .grid-item-11 {
    grid-column: 1 / 3;
  }

  .grid-item-13 {
    grid-column: 3 / 5;
  }

  .grid-item-17 {
    grid-column: 5 / 7;
  }

  .grid-item-20 {
    grid-column: 1 / 4;
    grid-row: span 1;
  }

  .tp-dfwv {
    width: 240px !important;
    right: 10px !important;
  }
}
  </style>
</head>
