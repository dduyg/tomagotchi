<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiminalLoop</title>
  <style>
    body {
      margin: 0;
      padding: 5em 1em;
      background: #c5c6f9;
      color: black;
      -webkit-tap-highlight-color: transparent;
    }

    nav {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
    }

    nav ul li {
      display: block;
      font-family: 'Georgia', serif;
      font-size: 3.5rem;
      line-height: 1;
      letter-spacing: -0.1em;
      text-transform: uppercase;
      margin: -0.24em 0;
      padding-right: 1.1em;
      overflow: hidden;
      transition: transform 1s cubic-bezier(0.165, 0.875, 0.02, 1);
    }

    nav ul a {
      outline: 0;
      text-decoration: none;
      touch-action: manipulation;
      display: block;
    }

    nav ul a .holder {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding-left: 2em; /* Adjust for padding from SVG */
      transition: transform 1s cubic-bezier(0.165, 0.875, 0.02, 1);
    }

    nav ul a .holder::before {
      content: "";
      display: inline-block;
      width: 40px;
      height: 40px;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zY3JpcHQyZHZkIj4gPHBhdGggZD0iTTEwMTAyIDYxLjFsLTQuMS0yLjIgMjcuMy0yNi40aC0uN3YtM2g1MzQuOExZIn0iPjwvcGF0aD4gPC9zdmc+');
      background-size: contain;
      background-repeat: no-repeat;
    }

    nav ul a:hover .holder {
      transform: translateX(1em);
    }

    nav ul a:hover .holder::before {
      transform: translateX(-100%);
    }
  </style>
</head>
<body>
  <nav>
    <ul>
      <li>
        <a href="#home">
          <div class="holder">
            Home
          </div>
        </a>
      </li>
      <li>
        <a href="#badass">
          <div class="holder">
            Badass
          </div>
        </a>
      </li>
      <li>
        <a href="#photo">
          <div class="holder">
            Photo
          </div>
        </a>
      </li>
      <li>
        <a href="#film">
          <div class="holder">
            Film
          </div>
        </a>
      </li>
      <li>
        <a href="#blog">
          <div class="holder">
            Blog
          </div>
        </a>
      </li>
      <li>
        <a href="#contact">
          <div class="holder">
            Contact
          </div>
        </a>
      </li>   
    </ul>
  </nav>
</body>
</html>
