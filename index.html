<head>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&family=JetBrains+Mono:ital@0;1&display=swap");
    *, *::after, *::before {box-sizing: border-box;}
    :root {
      --color--foreground--100: rgb(10, 10, 10);
      --color--background--100: rgb(255, 255, 200);
      --color--accent: rgb(255, 223, 0);
      --font-primary: "Inter", sans-serif;
      --font-secondary: "JetBrains Mono", monospace;
      --blendmode-effect: difference;
      --bg-blur: 0px;
    }

    body {
      margin: 0;
      font-family: var(--font-primary);
      background-color: var(--color--background--100);
      color: var(--color--foreground--100);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-weight: 400;
      position: relative;
      overflow: hidden;
      font-size: 1.1rem;
      z-index: 10;
    }
    body::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 100%;
      background-image: repeating-linear-gradient(transparent, transparent 2px, #0000002d 4px);
      background-size: auto 100%;
      pointer-events: none;
      z-index: -1;
    }

    a {
      text-decoration: none;
      color: var(--color--foreground--100);
    }

    .grid-container {
      display: flex;
      flex-direction: column;
      gap: 0;
      width: 90%;
      position: relative;
      counter-reset: item 0;
    }
    .grid-container::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--color--background--100);
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='4' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.5;
      z-index: 100;
      pointer-events: none;
      mix-blend-mode: overlay;
    }

    .list__item {
      cursor: pointer;
      width: 100%;
      display: grid;
      grid-column-gap: 2rem;
      padding: 0;
      justify-content: space-around;
      align-items: center;
      justify-items: flex-start;
      grid-template-columns: 40px 1fr 1fr 1fr 1fr;
    }
    .list__item::before {
      content: counter(item, decimal-leading-zero);
      counter-increment: item;
      padding: 4px 0;
      line-height: 0.8;
    }
    .list__item:hover .hover-effect--bg::after {
      transform: scaleX(1);
    }

    .hover-effect {
      font-family: var(--font-secondary);
      position: relative;
      white-space: nowrap;
      text-decoration: none;
      color: var(--color--foreground--100);
      z-index: 1;
    }
    .hover-effect--bg {
      transition: background-color 0.3s ease;
    }
    .hover-effect--bg::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--color--accent);
      transition: transform 0.3s ease;
      transform: scaleX(0);
      transform-origin: left;
      z-index: -1;
      mix-blend-mode: var(--blendmode-effect);
      backdrop-filter: blur(var(--bg-blur));
      -webkit-backdrop-filter: blur(var(--bg-blur));
    }

    .fixed-grid {
      position: fixed;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      padding: 1rem;
    }
    .fixed-item {
      font-family: var(--font-secondary);
      color: var(--color--foreground--100);
      font-size: 0.9rem;
      padding: 8px;
      pointer-events: auto;
    }
    .square {
      background-color: var(--color--foreground--100);
      width: 8px;
      height: 8px;
    }

    .top-left {
      grid-column: 1 / 2;
      grid-row: 1 / 2;
      align-self: start;
      justify-self: start;
    }
    .top-right {
      grid-column: 2 / 3;
      grid-row: 1 / 2;
      align-self: start;
      justify-self: end;
    }
    .bottom-left {
      grid-column: 1 / 2;
      grid-row: 2 / 3;
      align-self: end;
      justify-self: start;
    }
    .bottom-right {
      grid-column: 2 / 3;
      grid-row: 2 / 3;
      align-self: end;
      justify-self: end;
    }

    .blinking { animation: blink 1s steps(1) infinite; }
    @keyframes blink { 50% {opacity: 0;} }
    @-webkit-keyframes blink { 50% {opacity: 0;} }
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
<script src="https://unpkg.com/split-type"></script>
<script>
  // config.js
  const CONFIG = {
    lettersAndSymbols: [
      "a","b","c","d","e","f","g","h","i","j","k","l","m",
      "n","o","p","q","r","s","t","u","v","w","x","y","z",
      "!","@","#","$","%","^","&","*","-","_","+","=",";",
      ":","<",">",","
    ],
    timeZone: "Europe/Zagreb",
    timeUpdateInterval: 1000
  };

  // textAnimator.js
  class TextAnimator {
    #originalChars;
    #splitter;

    constructor(textElement) {
      if (!textElement || !(textElement instanceof HTMLElement)) {
        throw new Error("Invalid text element provided.");
      }
      this.textElement = textElement;
      this.#originalChars = [];
      this.#splitText();
    }

    #splitText() {
      this.#splitter = new SplitType(this.textElement, { types: "words, chars" });
      this.#originalChars = this.#splitter.chars.map(char => char.innerHTML);
    }

    animate() {
      this.reset();
      this.#animateChars();
      this.#animateTextElement();
    }

    #animateChars() {
      this.#splitter.chars.forEach((char, position) => {
        const initialHTML = char.innerHTML;
        gsap.fromTo(
          char,
          { opacity: 0 },
          {
            duration: 0.03,
            onComplete: () => gsap.set(char, { innerHTML: initialHTML, delay: 0.1 }),
            repeat: 2,
            repeatRefresh: true,
            repeatDelay: 0.05,
            delay: (position + 1) * 0.06,
            innerHTML: () => this.#getRandomChar(),
            opacity: 1
          }
        );
      });
    }

    #animateTextElement() {
      gsap.fromTo(this.textElement, { "--anim": 0 }, {
        duration: 1,
        ease: "expo",
        "--anim": 1
      });
    }

    #getRandomChar() {
      return CONFIG.lettersAndSymbols[
        Math.floor(Math.random() * CONFIG.lettersAndSymbols.length)
      ];
    }

    animateBack() {
      gsap.killTweensOf(this.textElement);
      gsap.to(this.textElement, { duration: 0.6, ease: "power4", "--anim": 0 });
    }

    reset() {
      this.#splitter.chars.forEach((char, index) => {
        gsap.killTweensOf(char);
        char.innerHTML = this.#originalChars[index];
      });
      gsap.killTweensOf(this.textElement);
      gsap.set(this.textElement, { "--anim": 0 });
    }
  }

  // animationManager.js
  class AnimationManager {
    constructor() {
      this.animators = new Map();
    }

    initializeAnimations() {
      document.querySelectorAll(".list__item").forEach(item => {
        const animators = Array.from(item.querySelectorAll(".hover-effect"))
          .map(col => new TextAnimator(col));
        this.animators.set(item, animators);
        this.#addEventListeners(item);
      });
    }

    #addEventListeners(item) {
      const animators = this.animators.get(item);
      const handleMouseEnter = this.#debounce(() => {
        animators.forEach(animator => animator.animate());
      }, 50);

      const handleMouseLeave = this.#debounce(() => {
        animators.forEach(animator => animator.animateBack());
      }, 50);

      item.addEventListener("mouseenter", handleMouseEnter);
      item.addEventListener("mouseleave", handleMouseLeave);
    }

    #debounce(func, wait) {
      let timeout;
      return function(...args) {
        clearTimeout(timeout);
        timeout = setTimeout(() => func(...args), wait);
      };
    }
  }

  // timeDisplay.js
  class TimeDisplay {
    constructor(elementId) {
      this.element = document.getElementById(elementId);
      if (!this.element) {
        throw new Error(`Element with id '${elementId}' not found.`);
      }
    }

    start() {
      this.updateDisplay();
      setInterval(() => this.updateDisplay(), CONFIG.timeUpdateInterval);
    }

    updateDisplay() {
      const { hours, minutes, dayPeriod } = this.#getCurrentTime();
      this.element.innerHTML = `${hours}<span class="blinking">:</span>${minutes} ${dayPeriod}`;
    }

    #getCurrentTime() {
      const now = new Date();
      const options = {
        timeZone: CONFIG.timeZone,
        hour12: true,
        hour: "numeric",
        minute: "numeric",
        second: "numeric"
      };
      const formatter = new Intl.DateTimeFormat("en-US", options);
      const parts = formatter.formatToParts(now);
      return {
        hours: parts.find(p => p.type === "hour").value,
        minutes: parts.find(p => p.type === "minute").value,
        dayPeriod: parts.find(p => p.type === "dayPeriod").value
      };
    }
  }

  // main.js
  document.addEventListener("DOMContentLoaded", () => {
    const animationManager = new AnimationManager();
    animationManager.initializeAnimations();

    const timeDisplay = new TimeDisplay("current-time");
    timeDisplay.start();
  });
</script>
