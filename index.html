<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refraction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f8f8f8;
            margin: 0;
            padding: 0;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 20px;
        }

        .header {
            font-size: 24px;
            font-weight: bold;
            margin-top: 20px;
        }

        .header .star {
            color: green;
            font-size: 28px;
        }

        .subtext {
            font-size: 14px;
            color: gray;
            font-style: italic;
            margin-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 10px;
            margin-top: 20px;
        }

        .grid img {
            width: 100%;
            height: auto;
            border-radius: 5px;
        }

        .like-button {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: blue;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="grid">
        <img src="image1.jpg" alt="Refraction Art">
        <img src="image2.jpg" alt="Refraction Art">
        <img src="image3.jpg" alt="Refraction Art">
        <img src="image4.jpg" alt="Refraction Art">
        <img src="image5.jpg" alt="Refraction Art">
        <img src="image6.jpg" alt="Refraction Art">
    </div>

    <h1 class="header">Refraction <span class="star">*</span> <span style="color: blue;">(Shape)(Color)</span></h1>
    <p class="subtext">--- Some test exercises for form and color ---</p>

    <div class="grid">
        <img src="image7.jpg" alt="Refraction Art">
        <img src="image8.jpg" alt="Refraction Art">
    </div>
</div>

<button class="like-button">👍</button>

</body>
</html>
