<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiminalLoop</title>
  <style>
    @font-face {
      font-family: 'Grotta';
      src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Grotta-Regular.woff2') format('woff2');
      font-style: normal;
      font-weight: normal;
      font-display: swap;
    }
    body {
      font-family: 'Grotta', sans-serif;
      background: linear-gradient(120deg, #6a11cb, #2575fc);
      color: white;
      text-align: center;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    main {
      max-width: 600px;
      padding: 0 20px;
    }
    
    h1 {
      font-size: 8rem;
      margin: 0;
      position: relative;
      animation: glitch 2s infinite;
    }
    @keyframes glitch {
      0% {transform: translate(0);}
      20% {transform: translate(-2px, -2px);}
      40% {transform: translate(2px, 2px);}
      60% {transform: translate(-2px, 2px);}
      80% {transform: translate(2px, -2px);}
      100% {transform: translate(0);}
    }
    h1::before,
    h1::after {
      content: "404";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: inherit;
      overflow: hidden;
      clip-path: inset(0 0 50% 0);
      animation: glitch-lines 2s infinite;
    }
    h1::after {
      clip-path: inset(50% 0 0 0);
      animation-delay: 1s;
    }
    @keyframes glitch-lines {
      0%, 100% {transform: translateX(0);}
      50% {transform: translateX(-10px);}
    }

    p {
      font-size: 1.5rem;
      margin: 10px 0 20px;
    }

    a {
      text-decoration: none;
      font-size: 1.2rem;
      padding: 10px 20px;
      background: white;
      color: #2575fc;
      border-radius: 25px;
      transition: 0.3s ease;
    }
    a:hover {
      background: #2575fc;
      color: white;
      transform: scale(1.1);
    }
  </style>
</head>
<body>
<main>
  <h1>404</h1>
  <p>Oops! The page you're looking for doesn't exist.</p>
  <a href="#">Go Back Home</a>
</main>
</body>
</html>
