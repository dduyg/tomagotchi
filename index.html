<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liminal🥟Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=PT+Sans+Narrow&display=swap" rel="stylesheet">
  <style>
    body {
      margin: 0;
      font-family: "PT Sans Narrow", sans-serif;
      background: #FEEBE4; 
      color: #532DDC;
      height: 100vh;
      overflow: hidden;
    }

    .tab-container {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100%;
    }

    .tab-content-area {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .tab-content {
      display: none;
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      padding: 40px;
      opacity: 0;
      transform: translateX(-30px);
      transition: opacity 0.3s ease, transform 0.3s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .tab-content.active {
      display: flex;
      animation: fadeInLeft 0.6s ease forwards;
    }

    @keyframes fadeInLeft {
      from {
        opacity: 0;
        transform: translateX(-30px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .tab-buttons {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: #f9f9f9;
      border-left: 1px solid #ccc;
      padding: 10px 0;
    }

    .tab-button {
      width: 60px;
      height: 60px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-bottom: 1px solid #ccc;
      cursor: pointer;
      background: white;
      transition: background 0.3s;
      font-size: 24px;
    }

    .tab-button.active {
      background: #ddd;
    }
  </style>
</head>
<body>
  <div class="tab-container">
    <div class="tab-content-area">
      <div class="tab-content active" id="content1">Profile section content goes here.</div>
      <div class="tab-content" id="content2">Settings section content goes here.</div>
      <div class="tab-content" id="content3">Web section content goes here.</div>
      <div class="tab-content" id="content4">Message section content goes here.</div>
    </div>

    <div class="tab-buttons">
      <div class="tab-button active" data-target="content1">👤</div>
      <div class="tab-button" data-target="content2">🛠️</div>
      <div class="tab-button" data-target="content3">🌐</div>
      <div class="tab-button" data-target="content4">✈️</div>
    </div>
  </div>

  <script>
    const buttons = document.querySelectorAll('.tab-button');
    const contents = document.querySelectorAll('.tab-content');

    buttons.forEach(button => {
      button.addEventListener('click', () => {
        buttons.forEach(btn => btn.classList.remove('active'));
        contents.forEach(content => {
          content.classList.remove('active');
          content.style.display = 'none';
        });

        button.classList.add('active');
        const target = document.getElementById(button.dataset.target);
        target.style.display = 'flex'; // needed to trigger animation
        setTimeout(() => {
          target.classList.add('active');
        }, 10); // slight delay ensures animation works
      });
    });
  </script>
</body>
</html>
