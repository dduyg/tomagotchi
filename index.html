<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My Vaporwave World</title>
    <style>
        /* General Reset */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
        }

        /* Vaporwave Background */
        body {
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #fff;
            text-align: center;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Welcome Section */
        .welcome {
            margin-top: 20vh;
        }

        .welcome h1 {
            font-size: 3.5rem;
            color: #ffeaa7;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.6);
        }

        .welcome p {
            font-size: 1.2rem;
            color: #dfe6e9;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.6);
        }

        /* Aesthetic Elements */
        .neon-bar {
            width: 80%;
            height: 10px;
            margin: 20px auto;
            background: linear-gradient(to right, #ff9a9e, #fad0c4, #fbc2eb, #a18cd1);
            border-radius: 10px;
            animation: moveBar 5s ease infinite;
        }

        @keyframes moveBar {
            0% { transform: translateX(-10%); }
            50% { transform: translateX(10%); }
            100% { transform: translateX(-10%); }
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #b2bec3;
        }
    </style>
</head>
<body>
    <div class="welcome">
        <h1>Welcome to My Vaporwave World</h1>
        <p>Immerse yourself in a dreamy digital escape.<br>Scroll through for a serene experience.</p>
    </div>
    <div class="neon-bar"></div>
    <footer class="footer">
        <p>Designed with a Vaporwave vibe. <br>&copy; 2024 Your Name</p>
    </footer>
</body>
</html>
