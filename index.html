<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Liminal🗻Loop</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: white;
    }

    .grid {
      display: grid;
      grid-template-rows: repeat(10, 60px);
      position: relative;
      padding-left: 50px;
      border-left: 3px solid #eee;
      border-right: 3px solid #eee;
      height: 100vh;
      background-image: linear-gradient(to bottom, #eee 1px, transparent 1px);
      background-size: 100% 60px;
    }

    .content {
      position: absolute;
      left: 100px;
      top: 0;
    }

    .char {
      font-size: 250px;
      font-weight: bold;
      line-height: 1;
    }

    .labels {
      position: absolute;
      right: 20px;
      top: 0;
      font-size: 15px;
      font-family: monospace;
      color: white;
    }

    .label {
      position: absolute;
      right: 0;
      background: black;
      padding: 5px 25px;
    }
    .label-top { top: 0; }
    .label-530 { top: 120px; }
    .label-baseline { top: 300px; }
    .label-neg150 { top: 390px; }
  </style>
</head>
<body>
  <div class="grid">
    <div class="labels">
      <div class="label label-top">710</div>
      <div class="label label-530">530</div>
      <div class="label label-baseline">0</div>
      <div class="label label-neg150">-150</div>
    </div>
    <div class="content">
      <span class="char">d</span>
      <span class="char" style="font-size: 100px; vertical-align: top;">.</span>
    </div>
  </div>
</body>
</html>
