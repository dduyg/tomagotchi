<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Liminal Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../fonts.css">
    <style>
        @font-face {
            font-family: 'Neue Machina';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/NeueMachina-Medium.woff') format('woff');
            font-weight: normal;
            font-style: normal;
        }        
        :root {
            --base_fsize: clamp(1.125rem,4vw,1.4375rem);
            --small_fsize: clamp(1rem,3.25vw,1.125rem);
            --base_lheight: 1.4736842105;
        }
        body {
            margin: 0;
            padding: 0;
            font-family: 'Neue Machina', sans-serif;
            background: #8BA8A4;
            color: #1F208B;
        }
        main {
            margin: auto;
            padding: 0 1rem;
            max-width: 48rem;
            width: 100%;
        }
        header {
            margin-bottom: 100px;
            font-family: 'Pitch Medium', monospace;
        }
        
        section {
           display: flex;
           font-family: Fantasque, monospace;
           font-size: var(--small_fsize);
           line-height: 1.3888888889;
           opacity: .6;
       }
       .flex-auto {
           flex:1 1 auto;
       }  
    </style>
</head>
<body>
    <main>
        <header>
            <p>A deep dive into the world of Laika, a girl lost in space...</p>
        </header>

        <section>
            <div class="flex-auto">
                <span>design, </span><span>resources</span>
            </div>
            <span class>Sep 10, 2024</span>
        </section>

        <footer>
            <p>ghost_distortion.exe</p>
            <p>ghosttype.mp4</p>
        </footer>
    </main>
</body>
</html>
