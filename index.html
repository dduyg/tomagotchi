<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glitch Image Effect</title>
    <style>
        /* Basic styles for the page */
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* Glitch image container */
        .glitch-img {
            position: relative;
            display: inline-block;
            overflow: hidden;
        }

        /* Base image styles */
        .glitch-img img {
            width: 300px;
            height: auto;
            position: absolute;
            top: 0;
            left: 0;
            animation: glitch-shift 0.8s infinite;
        }

        /* Second layer (Red) */
        .glitch-img img:nth-child(2) {
            filter: hue-rotate(90deg);
            clip-path: inset(0 15px 0 0);
        }

        /* Third layer (Blue) */
        .glitch-img img:nth-child(3) {
            filter: hue-rotate(180deg);
            clip-path: inset(15px 0 0 0);
        }

        /* Glitch animation */
        @keyframes glitch-shift {
            0% {
                transform: translate(0, 0);
            }
            50% {
                transform: translate(-5px, 5px);
            }
            100% {
                transform: translate(5px, -5px);
            }
        }
    </style>
</head>
<body>
    <div class="glitch-img">
        <img src="https://media4.giphy.com/media/xULW8t4niLpdPz9GRW/giphy.gif" alt="Glitch Layer 1">
        <img src="https://media4.giphy.com/media/xULW8t4niLpdPz9GRW/giphy.gif" alt="Glitch Layer 2">
        <img src="https://media4.giphy.com/media/xULW8t4niLpdPz9GRW/giphy.gif" alt="Glitch Layer 3">
    </div>
</body>
</html>
