<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiminalLoop</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background-color: #f0f0f0;
      color: black;
    }

    .circle {
      width: 35px;
      height: 35px;
      border-radius: 50%;
      box-shadow: 
        0 0 0 3px black, /* Simulates the border */
        2px 0 0 2px black; /* Simulates the right-side border-like shadow */
    }
  </style>
</head>
<body>
  <div class="circle"></div>
</body>
</html>
