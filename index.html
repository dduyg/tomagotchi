<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
        /* Global reset */
        body, h3, video {
            margin: 0;
            padding: 0;
        }
        body {
            background: linear-gradient(to left, #243b55, #7289da);
            color: white;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            overflow: hidden;
        }
        .container {
            border: 3px solid #00ffcc;
            border-radius: 15px;
            padding: 20px;
            width: 80%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.7);
            transition: all 0.3s ease;
        }
        video {
            width: 100%;
            height: auto;
        }
        h3 {
            margin-top: 20px;
            font-size: 1.6rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #00ffcc;
            text-shadow: 0 0 5px #ff2a68, 0 0 10px #ff2a68, 0 0 15px #ff2a68;
        }
        h3:after {
            content: "";
            display: block;
            height: 2px;
            width: 50%;
            background: #ff2a68;
            margin: 10px auto;
            box-shadow: 0 0 10px #ff2a68, 0 0 20px #ff2a68, 0 0 30px #ff2a68;
        }
    </style>
</head>
<body>
    <div class="container">
        <video controls>
            <source src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/04/FadedEchoes.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
        <h3>Chillwave Dreams</h3>
    </div>
</body>
</html>
