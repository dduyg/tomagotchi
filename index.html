<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🎽Loop</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        main {
            text-align: center;
            width: 90%;
            max-width: 800px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .header .box {
            border: 1px solid #333;
            padding: 5px 10px;
        }

.headline {
    margin-top: 20px;
    font-size: 16px;
    font-weight: normal;
    color: #333;
}

.title {
    font-size: 60px;
    font-weight: bold;
    margin: 20px 0;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 5px;
}

.markl-box, .mono-box {
    display: inline-block;
    border: 2px solid #000;
    padding: 5px 10px;
    font-size: 60px;
    font-weight: bold;
}

.description {
    font-size: 14px;
    color: #666;
    max-width: 600px;
    margin: 0 auto;
}

       .badge {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #FF5722;
            color: white;
            border-radius: 50%;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            writing-mode: vertical-rl;
            text-align: center;
            transform: rotate(180deg);
        }
    </style>
</head>
<body>
    <main>
        <div class="header">
            <div class="box">PART-NUMBER MRKL-V01-JLCTYP</div>
            <div class="box">7 STYLE &nbsp; LIGHT → HEAVY</div>
        </div>

        <h2 class="headline">NEW-2025-MONO</h2>

        <div class="title">
            <span class="markl-box">M</span>arkl <span class="mono-box">o</span>no
        </div>

        <p class="description">
            non-proportional typeface designed for optimal readability at small sizes. 
            With its clean & structured letterforms
        </p>

    <div class="badge">V.1 MARKL MONO</div>
    </main>
</body>
</html>
