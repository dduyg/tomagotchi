<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vaporwave Grid</title>
  <style>
    body {
      margin: 0;
      font-family: 'Courier New', Courier, monospace;
      background: linear-gradient(135deg, #ff71ce, #01cdfe, #05ffa1, #b967ff, #fffb96);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      width: 80%;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 20px;
      text-align: center;
    }

    .button {
      padding: 20px;
      font-size: 16px;
      font-weight: bold;
      color: #fff;
      background: rgba(255, 255, 255, 0.2);
      border: 2px solid #fff;
      border-radius: 10px;
      text-decoration: none;
      text-transform: uppercase;
      transition: transform 0.3s, background 0.3s, box-shadow 0.3s;
      backdrop-filter: blur(5px);
    }

    .button:hover {
      transform: scale(1.1);
      background: rgba(255, 255, 255, 0.4);
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.6);
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 40px;
      text-align: center;
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
    }
  </style>
</head>
<body>
  <div>
    <h1>Vaporwave Grid</h1>
    <div class="container">
      <a href="https://example1.com" class="button">Link 1</a>
      <a href="https://example2.com" class="button">Link 2</a>
      <a href="https://example3.com" class="button">Link 3</a>
      <a href="https://example4.com" class="button">Link 4</a>
      <a href="https://example5.com" class="button">Link 5</a>
      <a href="https://example6.com" class="button">Link 6</a>
    </div>
  </div>
</body>
</html>
