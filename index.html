<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found</title>
  <style>
    body {
      margin: 0;
      font-family: 'Courier New', Courier, monospace;
      background: linear-gradient(135deg, #ff7ac2, #3b0066);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
      background-size: cover;
      flex-direction: column;
    }

    .links {
      display: flex;
      gap: 20px;
      margin-top: 30px;
    }
    .links a {
      color: #ff7ac2;
      font-size: 1.2em;
      text-decoration: none;
      text-transform: uppercase;
      letter-spacing: 2px;
      transition: color 0.3s ease, transform 0.3s ease;
    }
    .links a:hover {
      color: #fff;
      transform: scale(1.1);
    }

    .logo {
      margin-bottom: 20px;
    }
    svg {
      width: 150px;
      height: 150px;
    }
  </style>
</head>
<body>
  <div class="logo">
    <!-- SVG Logo representing a creative letter "D" -->
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <path d="M30 10 C40 10, 50 30, 40 40 C30 50, 30 70, 50 70 C70 70, 80 50, 60 40 C50 30, 60 10, 50 10 C40 10, 30 10, 30 10 Z" fill="#ff7ac2" />
    </svg>
  </div>

  <h2>Oops! The page you're looking for is not here.</h2>

  <div class="links">
    <a href="/">Home</a>
    <a href="/about">About</a>
    <a href="/contact">Contact</a>
    <a href="/blog">Blog</a>
  </div>
</body>
</html>
