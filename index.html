<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>
@import url("https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap");
@keyframes squareMove {
  0%, 10.5% {
    left: 0;
    top: 0;
  }
  12.5%, 23% {
    left: 2rem;
    top: 0;
  }
  25%, 35.5% {
    left: 4rem;
    top: 0;
  }
  37.5%, 48% {
    left: 4rem;
    top: 2rem;
  }
  50%, 60.5% {
    left: 4rem;
    top: 4rem;
  }
  62.5%, 73% {
    left: 2rem;
    top: 4rem;
  }
  75%, 85.5% {
    left: 0;
    top: 4rem;
  }
  87.5%, 98% {
    left: 0;
    top: 2rem;
  }
  100% {
    left: 0;
    top: 0;
  }
}
@keyframes hueRotation {
  from {
    filter: hue-rotate(0deg);
  }
  to {
    filter: hue-rotate(360deg);
  }
}

body {
  font-size: 16px;
  display: flex;
  padding: 0;
  margin: 0;
  align-items: center;
  flex-direction: column;
  min-height: 100vh;
  font-family: "Comic Neue", cursive;
  background-color: #0d1117;
}

main {
  display: flex;
  margin: 5rem;
  transform: scale(0.8);
}

.square-container {
  position: relative;
  width: 6rem;
  height: 6rem;
  transform: rotate(45deg);
  animation: hueRotation 10s linear infinite both;
}
.square-container:nth-of-type(2) {
  background-color: #0d1117;
  transform: rotate(45deg) translate(-5px, 5px);
}
.square-container .square {
  position: absolute;
  top: 0;
  left: 0;
  background-color: black;
  width: 1.5rem;
  height: 1.5rem;
  animation: squareMove 10s ease-in-out infinite both;
  background-image: linear-gradient(45deg, #affc41 40%, #1dd3b0 60%);
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}
.square-container .square:nth-of-type(0) {
  animation-delay: 0s;
}
.square-container .square:nth-of-type(1) {
  animation-delay: -1.4285714286s;
}
.square-container .square:nth-of-type(2) {
  animation-delay: -2.8571428571s;
}
.square-container .square:nth-of-type(3) {
  animation-delay: -4.2857142857s;
}
.square-container .square:nth-of-type(4) {
  animation-delay: -5.7142857143s;
}
.square-container .square:nth-of-type(5) {
  animation-delay: -7.1428571429s;
}
.square-container .square:nth-of-type(6) {
  animation-delay: -8.5714285714s;
}
.square-container .square:nth-of-type(7) {
  animation-delay: -10s;
}
    </style>
</head>
<body>
<main>
	<div class="square-container">
		<div class="square"></div>
		<div class="square"></div>
		<div class="square"></div>
		<div class="square"></div>
		<div class="square"></div>
		<div class="square"></div>
		<div class="square"></div>
	</div>
	<div class="square-container">
		<div class="square"></div>
		<div class="square"></div>
		<div class="square"></div>
		<div class="square"></div>
		<div class="square"></div>
		<div class="square"></div>
		<div class="square"></div>
	</div>
</main>
</body>
</html>
