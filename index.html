<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 - Page Not Found</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=VT323&display=swap');

  html, body {
    margin: 0; padding: 0;
    height: 100%;
    background: linear-gradient(135deg, #00ffc8, #ff00ea);
    font-family: 'Orbitron', monospace, sans-serif;
    color: #00ffea;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
    user-select: none;
  }

  body::before {
    content: "";
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;
    background:
      radial-gradient(circle at 20% 30%, #00ffea55, transparent 40%),
      radial-gradient(circle at 80% 70%, #ff00ea55, transparent 40%);
    animation: pulse 6s infinite alternate;
    z-index: 0;
  }

  @keyframes pulse {
    0% { filter: brightness(0.7); }
    100% { filter: brightness(1.1); }
  }

  main {
    position: relative;
    z-index: 1;
    text-align: center;
    max-width: 500px;
    background: rgba(0,0,0,0.4);
    border: 2px solid #00ffea;
    border-radius: 16px;
    padding: 40px 30px;
    box-shadow: 0 0 30px #ff00ea88, 0 0 50px #00ffea88;
  }

  h1 {
    font-size: 5rem;
    margin: 0 0 10px;
    text-shadow:
      0 0 8px #00ffea,
      0 0 16px #00ffea,
      0 0 24px #ff00ea;
    letter-spacing: 4px;
  }

  p {
    font-family: 'VT323', monospace;
    font-size: 1.4rem;
    margin: 20px 0 40px;
    color: #00ffea;
    text-shadow: 0 0 5px #00ffea99;
  }

  a.home-link {
    display: inline-block;
    text-decoration: none;
    color: #ff00ea;
    font-weight: bold;
    font-size: 1.2rem;
    border: 2px solid #ff00ea;
    padding: 12px 28px;
    border-radius: 30px;
    transition: 
      background-color 0.3s ease,
      color 0.3s ease,
      box-shadow 0.3s ease;
    box-shadow: 0 0 10px #ff00eaaa;
  }

  a.home-link:hover,
  a.home-link:focus {
    background-color: #ff00ea;
    color: #000;
    box-shadow: 0 0 25px #ff00eaee;
  }

  /* Glitch effect on "404" */
  h1.glitch {
    position: relative;
    color: #00ffea;
  }
  h1.glitch::before,
  h1.glitch::after {
    content: attr(data-text);
    position: absolute;
    left: 0; top: 0;
    width: 100%; height: 100%;
    opacity: 0.8;
    clip-path: polygon(0 0, 100% 0, 100% 45%, 0 45%);
  }
  h1.glitch::before {
    left: 2px;
    text-shadow: -2px 0 #ff00ea;
    animation: glitchTop 2s infinite linear alternate-reverse;
  }
  h1.glitch::after {
    left: -2px;
    top: 2px;
    text-shadow: -2px 0 #00ffea;
    clip-path: polygon(0 55%, 100% 55%, 100% 100%, 0 100%);
    animation: glitchBottom 3s infinite linear alternate-reverse;
  }

  @keyframes glitchTop {
    0% { transform: translate(0, 0); }
    20% { transform: translate(-3px, 2px); }
    40% { transform: translate(-2px, -2px); }
    60% { transform: translate(3px, 0); }
    80% { transform: translate(2px, 2px); }
    100% { transform: translate(0, 0); }
  }

  @keyframes glitchBottom {
    0% { transform: translate(0, 0); }
    20% { transform: translate(3px, -2px); }
    40% { transform: translate(2px, 2px); }
    60% { transform: translate(-3px, 0); }
    80% { transform: translate(-2px, -2px); }
    100% { transform: translate(0, 0); }
  }

</style>
</head>
<body>
<main>
  <h1 class="glitch" data-text="404">404</h1>
  <p>Oops, looks like the data stream hit a dead zone.<br />
  This page is lost in the cyber waves — but the code never lies.</p>
  <a href="/" class="home-link" aria-label="Go back to homepage">Dive back home</a>
</main>
</body>
</html>
