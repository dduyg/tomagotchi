<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 Not Found | CyberCoder</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap');

    body {
      margin: 0;
      background: #0f0f0f;
      color: #0ff;
      font-family: 'Orbitron', monospace;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }

    .logo {
      font-size: 2.5rem;
      color: #f0f;
      text-shadow: 0 0 10px #f0f, 0 0 20px #0ff;
      letter-spacing: 3px;
      margin-bottom: 30px;
    }

    .glitch {
      font-size: 6rem;
      position: relative;
      color: #0ff;
      text-shadow: 0 0 2px #0ff, 0 0 5px #00f;
      animation: flicker 2s infinite;
    }

    .glitch::before,
    .glitch::after {
      content: '404';
      position: absolute;
      left: 0;
      width: 100%;
      opacity: 0.6;
    }

    .glitch::before {
      animation: glitchTop 2s infinite;
      color: #f0f;
      top: -3px;
    }

    .glitch::after {
      animation: glitchBottom 2s infinite;
      color: #0ff;
      top: 3px;
    }

    @keyframes glitchTop {
      0%, 100% { left: 0; }
      20% { left: -2px; }
      40% { left: 2px; }
      60% { left: -1px; }
      80% { left: 1px; }
    }

    @keyframes glitchBottom {
      0%, 100% { left: 0; }
      25% { left: 2px; }
      50% { left: -2px; }
      75% { left: 1px; }
    }

    @keyframes flicker {
      0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
        opacity: 1;
      }
      20%, 22%, 24%, 55% {
        opacity: 0.4;
      }
    }

    .message {
      margin-top: 10px;
      font-size: 1.5rem;
      color: #ccc;
    }

    .home-link {
      margin-top: 30px;
      text-decoration: none;
      padding: 12px 24px;
      background: #111;
      color: #0ff;
      border: 1px solid #0ff;
      border-radius: 6px;
      transition: background 0.3s, color 0.3s;
    }

    .home-link:hover {
      background: #0ff;
      color: #000;
    }
  </style>
</head>
<body>
  <div class="logo">CYBER<span style="color:#0ff;">CODER</span></div>
  <div class="glitch">404</div>
  <div class="message">Page not found in this dimension.</div>
  <a href="/" class="home-link">Back to Home</a>
</body>
</html>
