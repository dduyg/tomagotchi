<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More Glitch Text Effects</title>
    <style>
        body {
            background: #0d0d0d;
            color: #00ff99;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            margin: 20px 0;
            position: relative;
            font-size: 2rem;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .glitch-effect {
            position: relative;
            display: inline-block;
            color: #00ff99;
        }

        /* Barcode Glitch */
        .glitch-effect.barcode::before {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 5px;
            background: repeating-linear-gradient(
                90deg,
                #00ff99,
                #00ff99 10px,
                transparent 10px,
                transparent 20px
            );
            animation: barcode-scroll 1s infinite linear;
        }
        @keyframes barcode-scroll {
            0% { transform: translateY(0); }
            100% { transform: translateY(10px); }
        }    

        /* Horizontal Split */
        .glitch-effect.one::before,
        .glitch-effect.one::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            width: 100%;
            height: 100%;
            top: 0;
            color: #00ffff;
            clip-path: inset(50% 0 0 0);
            animation: glitch 0.3s infinite linear alternate-reverse;
        }
        .glitch-effect.one::after {
            color: #ff0066;
            clip-path: inset(0 0 50% 0);
        } 

        /* Vertical Scan */
        .glitch-effect.scan::before {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            color: #66ff99;
            animation: scan 0.8s infinite alternate;
        }
        .glitch-effect.scan::after {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            color: #ff9933;
            animation: scan 0.8s infinite alternate-reverse;
        }
        @keyframes scan {
            0% { clip-path: inset(0% 0% 90% 0%); }
            100% { clip-path: inset(90% 0% 0% 0%); }
        }

        /* Typing Effect */
        .glitch-effect.five {
            overflow: hidden;
            white-space: nowrap;
            animation: typing 2s steps(15, end) infinite, blink 0.5s step-end infinite;
        }
        @keyframes typing {
            from { width: 0; }
            to { width: 100%; }
        }
        @keyframes blink {
            50% { border-right: 2px solid #00ff99; }
        }

        /* Text Warp */
        .glitch-effect.seven {
            display: inline-block;
            position: relative;
            color: #00ff99;
            animation: text-warp 2s infinite;
        }
        .glitch-effect.seven::before {
            content: attr(data-text);
            position: absolute;
            left: 0;
            top: 0;
            color: #ff00ff;
            animation: text-warp-before 2s infinite;
        }
        @keyframes text-warp {
            0% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(-10deg) scale(1.1); }
            100% { transform: rotate(0deg) scale(1); }
        }
        @keyframes text-warp-before {
            0% { transform: translate(-2px, -2px); }
            50% { transform: translate(2px, 2px); }
            100% { transform: translate(-2px, -2px); }
        }
    </style>
</head>
<body>
    <h1 class="glitch-effect barcode" data-text="Barcode Glitch">Barcode Glitch</h1>
    <h1 class="glitch-effect one" data-text="Effect 1">Effect 1</h1>
    <h1 class="glitch-effect scan" data-text="Vertical Scan">Vertical Scan</h1>
    <h1 class="glitch-effect five" data-text="Typing Effect">Typing Effect</h1>
    <h1 class="glitch-effect seven" data-text="Text Warp">Text Warp</h1>
</body>
</html>
