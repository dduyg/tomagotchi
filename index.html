<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Crying Face ASCII Art</title>
  <style>
    body {
      font-family: 'Courier New', monospace;
      background-color: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .ascii-container {
      background-color: #1e1e1e;
      color: #f8f8f2;
      border-radius: 8px;
      padding: 20px;
      width: fit-content;
      max-width: 90%;
      position: relative;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .copy-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 4px;
      padding: 6px 12px;
      cursor: pointer;
      font-size: 12px;
    }

    .copy-btn:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div class="ascii-container">
    <button class="copy-btn" onclick="copyAscii()">Copy</button>
    <pre id="ascii-art">(╥_╥)    
  /(    )\    
 /  |  |  \</pre>
  </div>

  <script>
    function copyAscii() {
      const text = document.getElementById('ascii-art').innerText;
      navigator.clipboard.writeText(text)
        .then(() => alert('Copied to clipboard!'))
        .catch(() => alert('Copy failed.'));
    }
  </script>
</body>
</html>
