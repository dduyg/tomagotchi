<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal🕶Loop</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        @font-face {
            font-family: 'Monor';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Monor.woff2') format('woff2');
            font-weight: normal;
            font-style: normal;
        }
        @font-face {
            font-family: 'Monor';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Monor-bold.woff2') format('woff2');
            font-weight: bold;
            font-style: normal;
        }
        * {  
            margin: 0;  
            padding: 0;  
            box-sizing: border-box;  
        }
        body {
            font-family: 'Monor', serif;
            background-color: white;
            color: black;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .title {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: normal;
            text-transform: lowercase;
            letter-spacing: 2px;
        }
        footer {
            position: absolute;
            bottom: 15vh;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 750px;
            border-top: 2px solid;
            padding-top: 10px;
        }
        footer span {
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div class="title">MONÓLITA</div> 
    <footer>
        <span>no added sugar</span>
        <span>// V0.1</span>
    </footer>
</body>
</html>
