<!DOCTYPE html>  
<html lang="en">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>  
  <title>Liminal🥟Loop</title>  
  <style>  
    body {  
      margin: 0;  
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;  
      height: 100vh;  
      overflow: hidden;  
      background: #f4e6f5; /* soft pastel pink */  
      color: #3a2e5a; /* deep muted purple for text */  
    }  
  
    .tab-container {  
      display: flex;  
      flex-direction: row;  
      width: 100%;  
      height: 100%;  
      box-shadow: inset 0 0 20px #d8c9e8; /* subtle purple glow */  
    }  
  
    .tab-content-area {  
      flex: 1;  
      display: flex;  
      align-items: center;  
      justify-content: center;  
      position: relative;  
      overflow: hidden;  
      background: #ede4f7; /* pale lavender */  
      color: #3a2e5a;  
      border-radius: 0 15px 15px 0;  
      padding: 30px;  
      font-weight: 500;  
      font-size: 1.15rem;  
      box-shadow: inset 0 0 20px #cbb9e4;  
    }  
  
    .tab-content {  
      display: none;  
      position: absolute;  
      top: 0;  
      left: 0;  
      right: 0;  
      bottom: 0;  
      padding: 40px;  
      background: #f7f1fa; /* very light lilac/off-white */  
      opacity: 0;  
      transform: translateX(-30px);  
      transition: opacity 0.3s ease, transform 0.3s ease;  
      display: flex;  
      align-items: center;  
      justify-content: center;  
      font-size: 1.1rem;  
      color: #4a3c71; /* dusty violet */  
      border-radius: 12px;  
      box-shadow: 0 4px 20px rgba(73, 60, 113, 0.15);  
    }  
  
    .tab-content.active {  
      display: flex;  
      animation: fadeInLeft 0.6s ease forwards;  
    }  
  
    @keyframes fadeInLeft {  
      from {  
        opacity: 0;  
        transform: translateX(-30px);  
      }  
      to {  
        opacity: 1;  
        transform: translateX(0);  
      }  
    }  
  
    .tab-buttons {  
      display: flex;  
      flex-direction: column;  
      justify-content: center;  
      align-items: center;  
      background: #d6c3f7; /* muted lavender purple */  
      border-left: 2px solid #b09be8;  
      padding: 10px 0;  
      border-radius: 15px 0 0 15px;  
      box-shadow: inset 5px 0 10px #b09be8;  
    }  
  
    .tab-button {  
      width: 60px;  
      height: 60px;  
      display: flex;  
      justify-content: center;  
      align-items: center;  
      border-bottom: 2px solid #b09be8;  
      cursor: pointer;  
      background: #cbbcf3; /* lighter lavender */  
      transition: background 0.3s, color 0.3s;  
      font-size: 28px;  
      color: #5e4b99; /* deep muted purple */  
      border-radius: 10px 10px 0 0;  
      user-select: none;  
      box-shadow: 0 3px 8px rgba(80, 68, 126, 0.3);  
    }  
  
    .tab-button:hover {  
      background: #a594d9; /* deeper lavender */  
      color: #fff;  
      box-shadow: 0 0 12px #7c6abf;  
    }  
  
    .tab-button.active {  
      background: #7c6abf; /* rich violet */  
      color: #f4e6f5; /* pale pink text */  
      box-shadow: 0 0 20px #7c6abf;  
    }  
  </style>  
</head>  
<body>  
  <div class="tab-container">  
    <div class="tab-content-area">  
      <div class="tab-content active" id="content1">Profile section content goes here.</div>  
      <div class="tab-content" id="content2">Settings section content goes here.</div>  
      <div class="tab-content" id="content3">Web section content goes here.</div>  
      <div class="tab-content" id="content4">Message section content goes here.</div>  
    </div>  
  
    <div class="tab-buttons">  
      <div class="tab-button active" data-target="content1">👩‍💼</div>  
      <div class="tab-button" data-target="content2">⚙️</div>  
      <div class="tab-button" data-target="content3">🌐</div>  
      <div class="tab-button" data-target="content4">✉️</div>  
    </div>  
  </div>  
  
  <script>  
    const buttons = document.querySelectorAll('.tab-button');  
    const contents = document.querySelectorAll('.tab-content');  
  
    buttons.forEach(button => {  
      button.addEventListener('click', () => {  
        buttons.forEach(btn => btn.classList.remove('active'));  
        contents.forEach(content => {  
          content.classList.remove('active');  
          content.style.display = 'none';  
        });  
  
        button.classList.add('active');  
        const target = document.getElementById(button.dataset.target);  
        target.style.display = 'flex'; // needed to trigger animation  
        setTimeout(() => {  
          target.classList.add('active');  
        }, 10); // slight delay ensures animation works  
      });  
    });  
  </script>  
</body>  
</html>
