<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liminal Loop</title>
    <style>
        body {
            background: linear-gradient(135deg, #1b1b1b, #3d3d5c);
            color: white;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 1rem;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            background-size: cover;
            flex-direction: column;
        }
        
        .links {
            display: flex;
            gap: 20px;
            margin-top: 30px;
        }
        .links a {
            color: #00ffff;
            font-size: 1.2em;
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: color 0.3s ease, transform 0.3s ease;
        }
        .links a:hover {
            color: #ff00ff;
            transform: scale(1.1);
        }

        .logo {
            width: 120px;
            height: auto;
            margin-bottom: 20px;
            animation: rotateLogo 4s infinite linear;
        }
        @keyframes rotateLogo {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        svg circle,
        svg path {
            fill: #ffcc00; /* Default fill color */
            transition: fill 0.3s ease;
        }

        svg circle:hover,
        svg path:hover {
            fill: #ff00ff; /* Hover color */
        }
    </style>
</head>
<body>
    <svg class="logo" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="10"></circle>
        <path d="M14.31 8l5.74 9.94M9.69 8h11.48M7.38 12l5.74-9.94"></path>
    </svg>

    <p>Oops! The page you're looking for doesn't exist.</p>
    
    <div class="links">
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
        <a href="#">Blog</a>
    </div>
</body>
</html>
