<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mace</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;700&display=swap');

body {
    font-family: 'Roboto Mono', monospace;
    background-color: #F4F4F4;
    color: #222;
    margin: 0;
    padding: 0;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container {
    text-align: center;
    width: 90%;
    max-width: 800px;
    position: relative;
}

header {
    text-transform: uppercase;
    max-width: 400px;
    margin-bottom: 20px;
}
.head-object {
    font-size: 12px;
    border: 1px solid;
    padding: 5px;
}
.objects {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    border: 1px solid;
    border-top: none;
}
.objects .detail {
    width: 48%;
    padding: 5px;
}
.objects .detail:first-child {
    border-right: 1px solid;
}        

h1 {
    font-size: 60px;
    display: flex;
    justify-content: center;
    align-items: center;
}

.highlight {
    position: relative;
    display: inline-flex;
    flex-direction: column;
    align-items: center;
}
.annotation {
    display: flex;
    flex-direction: column;
    align-items: center;
    border: 1px solid;
    position: relative;
}
.annotation span:first-child {
    font-size: 10px;
    padding: 2px 5px;
    border-bottom: 1px solid;
    width: 100%;
    text-align: center;
}
.annotation span:last-child {
    font-size: 60px;
    line-height: 1;
}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="head-object">lost-in-the-virtual-ætherwaves</div>
            <div class="objects">
                <div class="detail">PART-NUMBER</div>
                <div class="detail">LIGHT → HEAVY</div>
            </div>
        </header>

            <h1>
                Markl<span class="highlight">
                    <span class="annotation">
                        <span>ss05</span>
                        <span>o</span>
                    </span>
                </span>no
            </h1>
    </div>
</body>
</html>
