<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Glitch</title>
<style>
  body {
    background: #222;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    font-family: monospace;
  }
  h1 {
    font-size: 5rem;
    position: relative;
    text-transform: uppercase;
    color: #fff;
  }
  h1 span {
    display: inline-block;
    animation: glitch-pixels 1s infinite steps(2, start);
  }
  h1 span:nth-child(2) { color: #ff22ff; animation-delay: 0.2s; }
  h1 span:nth-child(3) { color: #22ffcc; animation-delay: 0.4s; }

  @keyframes glitch-pixels {
    0%, 100% { transform: translate(0); }
    25% { transform: translate(5px, -5px); }
    50% { transform: translate(-5px, 5px); }
    75% { transform: translate(3px, -3px); }
  }
</style>
</head>
<body>
  <h1>
    <span>PIXEL</span>
    <span>PIXEL</span>
    <span>PIXEL</span>
  </h1>
</body>
</html>
