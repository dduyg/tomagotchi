<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <link href="https://fonts.googleapis.com/css2?family=Didact+Gothic&display=swap" rel="stylesheet">
    <style>
        * {  /* General Reset */
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        @font-face {
            font-family: 'Yarikha';
            src: url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Yarikha.woff2') format('woff2'),
                 url('https://raw.githubusercontent.com/dduyg/LiminalLoop/main/fonts/Yarikha.woff') format('woff');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }
        body {
            background-color: #f3f2f9;
            color: #606887;
            font-family: 'Yarikha', sans-serif;
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        main {
            max-width: 800px;
            width: 90%;
        }

        h1 {
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        section {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Two equal columns */
            padding-top: 20px;
            gap: 2.5rem 25px;
        }
        section:first-of-type {
            border-top: 2px solid currentColor;
        }
        .label {
            font-weight: bold;
            letter-spacing: 1px;
            align-self: start; /* Aligns labels at the top */
        }
        .details {
            font-family: "Didact Gothic", sans-serif;
            display: flex;
            flex-direction: column;
            gap: 10px 0;
            align-items: flex-start; /* Aligns details content to the left */
        }

        a {
            color: inherit;
            text-decoration: none;
            padding-bottom: 2px;
            display: inline-block;
            position: relative;
        }
        a::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 3px;
            background-color: currentColor;
            transform: scaleX(0);
            transition: transform 0.6s;
        }
        a:hover::before {
            transform: scaleX(1);
        }
        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }
            section {
                grid-template-columns: 1fr 2fr; /* second column takes up more space */
            }
            section:first-of-type {
                border-top: 1.5px solid currentColor;
            }
            a::before {
                height: 1.5px;
            }
          }       

        .noise {
            position: fixed;
            z-index: 9999;
            top: -300%;
            left: -150%;
            height: 600%;
            width: 600%;
            -webkit-animation: grain 7s steps(10) infinite;
            animation: grain 7s steps(10) infinite;
            background-image: url('noise.png');
            background-size: 200px;
            background-repeat: repeat;
            opacity: .25;
            pointer-events: none;
        }
        @-webkit-keyframes grain {
            0%,to{transform:translate(0)}
            10%{transform:translate(-5%,-10%)}
            20%{transform:translate(-15%,5%)}
            30%{transform:translate(7%,-25%)}
            40%{transform:translate(-5%,25%)}
            50%{transform:translate(-15%,10%)}
            60%{transform:translate(15%)}
            70%{transform:translateY(15%)}
            80%{transform:translate(3%,35%)}
            90%{transform:translate(-10%,10%)}
        }
        @keyframes grain {
            0%,to{transform:translate(0)}
            10%{transform:translate(-5%,-10%)}
            20%{transform:translate(-15%,5%)}
            30%{transform:translate(7%,-25%)}
            40%{transform:translate(-5%,25%)}
            50%{transform:translate(-15%,10%)}
            60%{transform:translate(15%)}
            70%{transform:translateY(15%)}
            80%{transform:translate(3%,35%)}
            90%{transform:translate(-10%,10%)}
        }
        body.dark .noise {opacity:.2}
        
    </style>
</head>
<body>
    <main>
        <h1>Send a Byte</h1>
        <section>
            <div class="label">Envelope</div>
            <div class="details">
                <a href="#">wavelength@holo.meltdown</a>
            </div>
        </section>
        <section>
            <div class="label">Social Subspace</div>
            <div class="details">
                <a href="#">↗ pixelmessage</a>
                <a href="#">↗ neongrid</a>
                <a href="#">↗ datarepository</a>
            </div>
        </section>
    </main> 
<div class="noise"></div>
</body>
</html>
