<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>  
  <title>VaporEmbed</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #3333ff;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    .video-container {
      padding: 30px;
      max-width: 800px;
      width: 100%;
    }

    h2 {
      text-align: center;
      color: #00f0ff;
      margin-bottom: 20px;
      font-size: 18px;
    }

    .video-wrapper {
      position: relative;
      padding-bottom: 56.25%;
      height: 0;
      overflow: hidden;
      border-radius: 12px;
      border: 3px dashed;
    }

    .video-wrapper iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
    }
  </style>
</head>
<body>

  <div class="video-container">
    <h2>Vaporwave Vibes</h2>
    <div class="video-wrapper">
      <iframe 
        src="https://www.youtube.com/embed/5u1KuoGMOPo" 
        title="Vaporwave Video"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
        allowfullscreen>
      </iframe>
    </div>
  </div>
</body>
</html>
