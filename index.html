<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>LiminalLoop</title>  
    <link href="https://fonts.googleapis.com/css2?family=PT+Sans+Narrow&display=swap" rel="stylesheet">  
    <style>  
        * {  
            margin: 0;  
            padding: 0;  
            box-sizing: border-box;  
            outline: none;  
            -webkit-tap-highlight-color: transparent;  
        }  
        body {  
            font-family: "PT Sans Narrow", sans-serif;  
            margin: 0;  
            padding-bottom: 25px;  
            background-color: #e7e5e5;  
            color: #000;  
        }  
  
        aside {  
            display: flex;  
            justify-content: center;  
            align-items: center;  
            padding: 80px 0 30px;  
            position: relative;  
        }  
        aside .content {  
            position: relative;  
            width: 100%;  
            max-width: 600px; 
            display: flex;  
            flex-direction: column;  
            justify-content: center;  
            align-items: center;  
            text-align: center;  
            padding: 30px 5%;  
        }  
        aside .content::after {  
            content: "";  
            position: absolute;  
            top: 0;  
            left: 0;  
            width: 100%;  
            height: 100%;  
            background: url('https://media2.giphy.com/media/sdyvSTjNtlO8/giphy.gif') no-repeat center center; 
            opacity: 0.3; 
            z-index: -1;  
        }  
        .content h4 {  
            font-size: 16px;  
            font-weight: normal;  
            padding: 25px 0 30px;  
        }  
        .content h2 {   
            font-size: 45px;  
            font-weight: 550;  
            line-height: 1;  
            padding: 30px 0 10px; 
        }  
        .content p {  
            font-size: 0.85rem;  
            padding: 15px 0 70px; 
        }  
  
        a {  
            color: inherit;  
            text-decoration: none;  
        }  
        .footer-img {  
            margin-top: 10px;  
            width: 100%;  
            height: auto;  
        }  
        footer {  
            display: flex;  
            justify-content: space-between;  
            align-items: flex-start;  
            gap: 15px;  
            font-size: 14px;  
            margin: 20px;  
        }  
        footer nav {  
            display: flex;  
            justify-content: space-between;  
            gap: 10px 30px;  
        }  
        footer nav a {  
            text-transform: uppercase;  
        }
        @media (max-width: 768px) {  
            footer, footer nav {  
                flex-direction: column;  
            }  
        }  
    </style>  
</head>  
<body>  
    <aside>  
        <div class="content">  
            <h4>WE LOVE HEARING <em>your Dreams.</em> TELL US.<br>( CONTACT US )</h4>  
            <h2>THAT’S NOT WATER, <br>THOSE ARE TEARS OF <em>Happy</em> <em>Clients</em>.</h2>  
            <p>Let’s get this party started, get in touch.</p>  
        </div>  
    </aside>  
  
    <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/refs/heads/main/fonts/3Dfonts/cube-font.png" class="footer-img">  
    <footer>  
        <p>© duygudağdelen Lab 2025 — The Hague</p>  
        <nav>  
            <a href="#🌐"><strong>Contact</strong></a>  
            <a href="#🌐"><strong>Give Support</strong></a>  
            <a href="#🌐">Instagram</a>  
            <a href="#🌐">GitHub</a>  
            <a href="#🌐">ko-fi</a>  
            <a href="#🌐">medium</a>  
            <a href="#🌐">inprnt</a>  
            <a href="#🌐">behance</a>  
        </nav>  
    </footer>  
</body>  
</html>
