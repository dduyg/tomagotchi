<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>404 - Page Not Found</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron&display=swap');

  body {
    margin: 0;
    background: linear-gradient(135deg, #1de9b6 0%, #2979ff 100%);
    color: #00ffea;
    font-family: 'Orbitron', monospace, monospace;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    text-align: center;
  }

  h1 {
    font-size: 6rem;
    margin: 0;
    text-shadow: 0 0 20px #00ffea, 0 0 40px #00ffd8, 0 0 80px #00ffd8;
  }

  p {
    font-size: 1.5rem;
    margin: 1rem 0 3rem;
    max-width: 600px;
    line-height: 1.4;
    text-shadow: 0 0 10px #00ffea;
  }

  a {
    color: #ff41f4;
    font-weight: bold;
    font-size: 1.25rem;
    text-decoration: none;
    border: 2px solid #ff41f4;
    padding: 0.75rem 1.5rem;
    border-radius: 8px;
    transition: all 0.3s ease;
    box-shadow: 0 0 10px #ff41f4;
  }

  a:hover {
    background: #ff41f4;
    color: #1a1a1a;
    box-shadow: 0 0 30px #ff41f4;
  }

  /* Data-coder style glitch effect */
  @keyframes glitch {
    0% {
      clip: rect(42px, 9999px, 44px, 0);
      transform: skew(0.5deg);
    }
    5% {
      clip: rect(10px, 9999px, 15px, 0);
      transform: skew(0.8deg);
    }
    10% {
      clip: rect(85px, 9999px, 90px, 0);
      transform: skew(0.3deg);
    }
    15% {
      clip: rect(42px, 9999px, 44px, 0);
      transform: skew(0.5deg);
    }
    20% {
      clip: rect(10px, 9999px, 15px, 0);
      transform: skew(0.8deg);
    }
    25% {
      clip: rect(85px, 9999px, 90px, 0);
      transform: skew(0.3deg);
    }
    30% {
      clip: rect(42px, 9999px, 44px, 0);
      transform: skew(0.5deg);
    }
    100% {
      clip: rect(42px, 9999px, 44px, 0);
      transform: skew(0.5deg);
    }
  }

  .glitch {
    position: relative;
    display: inline-block;
    color: #00ffea;
  }

  .glitch::before,
  .glitch::after {
    content: attr(data-text);
    position: absolute;
    left: 0;
    top: 0;
    width: 100%;
    overflow: hidden;
    color: #ff41f4;
    clip: rect(0, 900px, 0, 0);
  }

  .glitch::before {
    animation: glitch 2s infinite linear alternate-reverse;
    left: 2px;
    text-shadow: -2px 0 #ff41f4;
  }

  .glitch::after {
    animation: glitch 1.5s infinite linear alternate;
    left: -2px;
    text-shadow: 2px 0 #00ffea;
  }
</style>
</head>
<body>
  <h1 class="glitch" data-text="404">404</h1>
  <p>Looks like you’ve stumbled into the digital void. This page has been lost in the data streams, but don’t worry — your code’s still solid.</p>
  <a href="/">Return to Basecamp</a>
</body>
</html>
