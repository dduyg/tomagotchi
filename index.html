<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 Not Found</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Courier New', Courier, monospace;
            background-color: #1e1e2f;
            color: #f0f0f0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .neon-lines {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            height: 100%;
            width: 100%;
            border-top: 2px solid #ff00cc;
            border-left: 2px solid #ff00cc;
            animation: neonLinesAnimation 1.5s infinite linear;
        }
        @keyframes neonLinesAnimation {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .rainbow {
            background: #00d9ff;
            background-size: 400% 400%;
            animation: gradient 10s ease infinite;
        }
        @keyframes gradient {
            0% { background-position: 400% 0; }
            50% { background-position: 0 100%; }
            100% { background-position: 400% 0; }
        }
    </style>
</head>
<body class="rainbow">
    <div class="neon-lines"></div>

    <h1>404</h1>
    <p>Looks like you've stumbled upon a void in the digital matrix.</p>      
</body>
</html>
