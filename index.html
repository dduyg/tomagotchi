<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MonóDisplay</title>
    <style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400&display=swap');

body {
    font-family: 'Orbitron', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    background-color: white;
    text-align: center;
}

.container {
    text-align: center;
    position: relative;
}

.title {
    font-size: 4rem;
    font-weight: normal;
    text-transform: lowercase;
    letter-spacing: 3px;
    color: #121212;
}

.bottom-section {
    margin-top: 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 400px;
    margin-left: auto;
    margin-right: auto;
    position: relative;
}

.bottom-section::before {
    content: "";
    position: absolute;
    top: -10px;
    width: 100%;
    height: 1px;
    background-color: black;
}

.left, .right {
    font-size: 0.9rem;
    color: #121212;
}
    </style>
</head>
<body>
    <div class="container">
        <h1 class="title">monólita</h1>
        <div class="bottom-section">
            <span class="left">FONTE DISPLAY</span>
            <span class="right">V0.1</span>
        </div>
    </div>
</body>
</html>
