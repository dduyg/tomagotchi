<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced ASCII Fountain</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: monospace;
            text-align: center;
            overflow: hidden;
        }
        canvas {
            display: block;
            margin: auto;
        }
    </style>
</head>
<body>

<canvas id="asciiCanvas"></canvas>

<script>
    const canvas = document.getElementById("asciiCanvas");
    const ctx = canvas.getContext("2d");

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    const particles = [];
    const gravity = 0.1;
    const characters = ["V", "Y", "W"];

    class Particle {
        constructor(x, y, speedX, speedY) {
            this.x = x;
            this.y = y;
            this.speedX = speedX;
            this.speedY = speedY;
            this.char = characters[Math.floor(Math.random() * characters.length)];
            this.alpha = 1;
        }

        update() {
            this.speedY += gravity;
            this.x += this.speedX;
            this.y += this.speedY;
            this.alpha -= 0.005; // Fading effect
        }

        draw() {
            ctx.globalAlpha = this.alpha;
            ctx.fillText(this.char, this.x, this.y);
            ctx.globalAlpha = 1;
        }
    }

    function createFountain() {
        for (let i = 0; i < 5; i++) { // Particle spawn rate
            const x = canvas.width / 2 + (Math.random() * 20 - 10);
            const y = canvas.height - 50;
            const speedX = Math.random() * 2 - 1;
            const speedY = Math.random() * -4 - 2;
            particles.push(new Particle(x, y, speedX, speedY));
        }
    }

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.font = "16px monospace";
        ctx.fillStyle = "white";

        createFountain();

        for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.update();
            p.draw();

            if (p.alpha <= 0) {
                particles.splice(i, 1);
            }
        }

        requestAnimationFrame(animate);
    }

    animate();
</script>
</body>
</html>
