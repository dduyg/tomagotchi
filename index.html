<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>404 Not Found</title>
    <style>
        body {
            background-color: #F598FF;
            font-family: monospace;
            color: #a8a8a8;
            text-align: center;
            line-height: 1.5;
            margin: 0;
            padding: 0 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            overflow: hidden;
        }

        h1 {
            font-size: 6rem;
            position: relative;
            animation: static-noise 0.3s infinite;
        }
        @keyframes static-noise {
            0%, 100% { opacity: 1; }
            10% { opacity: 0.6; }
            20% { opacity: 1.2; }
            30% { opacity: 0.8; }
            40% { opacity: 1.1; }
            50% { opacity: 0.7; }
            60% { opacity: 1.3; }
            70% { opacity: 0.5; }
        } 

        p {
            font-size: 1.4rem;
            margin-top: 50px;
            letter-spacing: 3px;
            font-weight: bold;
            animation: matrix 3s infinite linear;
        }
        @keyframes matrix {
            0% {opacity: 0.1; transform: translateY(-20px);}
            50% {opacity: 1; transform: translateY(0);}
            100% {opacity: 0.1; transform: translateY(20px);}
        }

.digital-corruption {
  font-size: 1.5rem;
  animation: digital-corruption 1s infinite;
  transition: all 0.2s ease-in-out;
}
@keyframes digital-corruption {
  0% { opacity: 1; transform: scale(1); }
  30% { opacity: 0.5; transform: scale(1.1); }
  60% { opacity: 0.3; transform: scale(1.2); }
  100% { opacity: 1; transform: scale(1); }
}
        
.text-glitch {
  font-size: 1.5rem;
  display: inline-block;
  animation: text-break 2s infinite;
  text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}     
@keyframes text-break {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
  100% { transform: translateX(0); }
}
    </style>
</head>
<body>    
    <h1>404</h1>
    <div class="digital-corruption">Not Found</div>
    <div class="text-glitch">Not Found</div>
    <p>System Error. Rebooting...</p>
</body>
</html>
