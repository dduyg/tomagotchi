<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f4f4f9;
            color: #333;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            padding: 20px;
        }
        .error-code {
            font-size: 72px;
            font-weight: bold;
            color: #555;
        }
        .message {
            font-size: 18px;
            margin: 20px 0;
        }
        .illustration {
            margin: 20px 0;
        }
        .illustration img {
            width: 100%;
            max-width: 400px;
        }
        a {
            text-decoration: none;
            color: #007bff;
            font-weight: bold;
        }
        a:hover {
            text-decoration: underline;
        }
        .button {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff;
            color: #fff;
            border-radius: 5px;
            text-decoration: none;
        }
        .button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-code">404</div>
        <div class="message">
            Oops! The page you're looking for is not here. 
            <br>It seems you've hit a null hypothesis!
        </div>
        <div class="illustration">
            <img src="https://via.placeholder.com/400x250?text=404+Data+Lost" alt="404 illustration">
        </div>
        <p>
            Don’t worry, the data isn’t completely lost. 
            <br><a href="/">Return to the dashboard</a> or explore our <a href="/services">services</a>.
        </p>
        <a class="button" href="/">Go Home</a>
    </div>
</body>
</html>
