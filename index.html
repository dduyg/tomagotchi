<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Custom Marquee</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f0f0f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .marquee-container {
      width: 80%;
      overflow: hidden;
      border: 2px solid #ddd;
      background: #fff;
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 150px;
    }

    .marquee-track {
      display: flex;
      gap: 20px;
      position: absolute;
      white-space: nowrap;
      animation: marquee-animation linear infinite;
    }

    .marquee-item {
      flex-shrink: 0;
      height: 100%;
      width: auto;
    }

    /* Animation Keyframes */
    @keyframes marquee-animation {
      from {
        transform: translateX(0%);
      }
      to {
        transform: translateX(-100%);
      }
    }
  </style>
</head>
<body>
  <!-- Marquee Container -->
  <div class="marquee-container" data-speed="10">
    <div class="marquee-track">
      <img class="marquee-item" src="https://via.placeholder.com/150/FF0000/FFFFFF" alt="Item 1">
      <img class="marquee-item" src="https://via.placeholder.com/150/00FF00/FFFFFF" alt="Item 2">
      <img class="marquee-item" src="https://via.placeholder.com/150/0000FF/FFFFFF" alt="Item 3">
      <img class="marquee-item" src="https://via.placeholder.com/150/FFFF00/FFFFFF" alt="Item 4">
    </div>
  </div>

  <script>
    // Custom Marquee Implementation
    document.addEventListener('DOMContentLoaded', () => {
      const marqueeContainer = document.querySelector('.marquee-container');
      const marqueeTrack = document.querySelector('.marquee-track');
      const speed = parseInt(marqueeContainer.dataset.speed, 10) || 10; // Speed in seconds

      // Clone the marquee content to create a seamless loop
      marqueeTrack.innerHTML += marqueeTrack.innerHTML;

      // Calculate the width of the track and apply animation
      const trackWidth = marqueeTrack.scrollWidth / 2; // Only the original width matters
      marqueeTrack.style.animationDuration = `${trackWidth / speed}s`;

      // Reverse direction if needed
      const reversed = marqueeContainer.dataset.reversed === 'true';
      if (reversed) {
        marqueeTrack.style.animationDirection = 'reverse';
      }
    });
  </script>
</body>
</html>
