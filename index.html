<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Liminal🔩Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Modak&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box;}
    @import url("https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Mrs+Saint+Delafield&display=swap");
    :root {
      --primary-font: "PP Neue Montreal", sans-serif;
      --secondary-font: "Space Mono", mono;
      --tetriary-font: "Mrs Saint Delafield", serif;
      --primary-color: #e0e0e0;
      --secondary-color: rgba(255, 255, 255, 0.5);
      --quote-size: 8vw;
      --author-size: 0.75rem;
      --cursor-size: 20px;
      --ghost-color: #000000;
      --eye-glow-color: #ffff00;
    }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      cursor: none;
      background-color: #111;
      letter-spacing: -0.03em;
      position: relative;
      color: var(--primary-color);
    }
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 20%;
      background: linear-gradient(to bottom, #222, transparent);
      pointer-events: none;
      z-index: 2;
    }
    body::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(34, 34, 34, 0.85) 70%);
      pointer-events: none;
      z-index: 3;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
    }
    .content {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 20;
      padding: 20px;
      text-align: center;
      color: var(--primary-color);
      pointer-events: none;
    }

    .container {
      max-width: 90%;
      overflow: hidden;
    }
    .title {
      font-family: "Modak", sans-serif;
      font-size: var(--quote-size);
      line-height: 0.9;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 5vh;
      opacity: 1;
      text-transform: uppercase;
      color: var(--primary-color);
    }
    .description {
      font-family: var(--secondary-font);
      font-size: var(--author-size);
      opacity: 1;
      margin-top: 2vh;
      text-transform: uppercase;
    }
    .message {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(-5deg);
      font-family: var(--tetriary-font);
      font-size: 7vw;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      z-index: 30;
      width: 80%;
      max-width: 600px;
      line-height: 1.5;
    }

    .custom-cursor {
      position: fixed;
      width: var(--cursor-size);
      height: var(--cursor-size);
      border-radius: 50%;
      background-color: var(--secondary-color);
      transform: translate(-50%, -50%);
      pointer-events: none;
      mix-blend-mode: difference;
      z-index: 9999;
      transition: width 0.2s, height 0.2s;
      will-change: transform;
    }

    .info {
      position: fixed;
      bottom: 10px;
      left: 10px;
      color: white;
      font-family: monospace;
      font-size: 12px;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 5px 10px;
      border-radius: 3px;
      pointer-events: none;
      z-index: 10;
    }

    .profile-card {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      max-width: 300px;
      width: 100%;
      position: fixed;
      bottom: 16px;
      left: 16px;
      z-index: 999;
      color: var(--primary-color);
      line-height: inherit;
    }
    .profile-image {
      flex-shrink: 0;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      object-fit: cover;
    }
    .profile-info {
      display: flex;
      flex-direction: column;
      gap: 2px;
      color: var(--primary-color);
    }
    .profile-name {
      font-size: 14px;
      font-weight: 500;
    }
    .profile-url {
      font-size: 12px;
      color: #71717a;
    }
    .profile-url a {
      text-decoration: none;
      color: inherit;
    }
    .profile-url a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div class="content">
    <div class="container">
      <div class="title">Emptiness<br />breeds<br />creation</div>
      <div class="description">when silence speaks, genius listens</div>
    </div>
  </div>
  <div class="message">
    "Design is the quiet rebellion against the mundane"
  </div>

  <div class="custom-cursor"></div>

  <div class="profile-card">
    <img class="profile-image" src="https://raw.githubusercontent.com/dduyg/dduyg.github.io/refs/heads/main/assets/images/dduyg.png" alt="Profile Image" />
    <div class="profile-info">
      <p class="profile-name">Duygu Dağdelen</p>
      <p class="profile-url">
        <a href="https://glitch.com/@dduyg" target="_blank">@dduyg</a>
      </p>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
