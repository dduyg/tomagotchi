<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to My World</title>
    <style>
        /* General Reset */
        body, html {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        /* Background and Layout */
        body {
            background: linear-gradient(135deg, #ff8f8f, #6a82fb);
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Vaporwave Grid Overlay */
        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: repeating-linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0.2) 0px,
                rgba(255, 255, 255, 0.2) 1px,
                transparent 1px,
                transparent 20px
            ),
            repeating-linear-gradient(
                to right,
                rgba(255, 255, 255, 0.2) 0px,
                rgba(255, 255, 255, 0.2) 1px,
                transparent 1px,
                transparent 20px
            );
        }

        /* Main Section */
        .content {
            z-index: 2;
            text-align: center;
            max-width: 800px;
            padding: 20px;
        }

        .welcome-title {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px #000000;
        }

        .welcome-text {
            font-size: 1.2em;
            line-height: 1.6;
            text-shadow: 1px 1px #000000;
        }

        /* Floating Elements */
        .floating {
            position: absolute;
            animation: float 6s ease-in-out infinite;
        }

        .circle {
            width: 150px;
            height: 150px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        .circle1 {
            top: 10%;
            left: 20%;
            animation-delay: 0s;
        }

        .circle2 {
            top: 50%;
            right: 10%;
            animation-delay: 1.5s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        /* Footer */
        footer {
            position: absolute;
            bottom: 10px;
            font-size: 0.9em;
            color: rgba(255, 255, 255, 0.6);
            z-index: 2;
        }
    </style>
</head>
<body>
    <!-- Grid Overlay -->
    <div class="grid-overlay"></div>

    <!-- Main Content -->
    <div class="content">
        <h1 class="welcome-title">Welcome to My Vaporwave World</h1>
        <p class="welcome-text">
            Dive into the aesthetic vibes and let your mind wander. 
            This is my space where creativity meets nostalgia in a surreal mix of neon lights and retro-futuristic dreams.
        </p>
    </div>

    <!-- Floating Elements -->
    <div class="floating circle circle1"></div>
    <div class="floating circle circle2"></div>

    <!-- Footer -->
    <footer>
        &copy; 2024 My Vaporwave World | Designed with aesthetic vibes.
    </footer>
</body>
</html>
