<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Host+Grotesk:wght@300..800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: "Host Grotesk", sans-serif;
      margin: 0;
      padding: 30% 5% 40%;
      background-color: LemonChiffon;
      color: black;
    }
    main {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
    }
    h2 { font-weight: normal; }

    .split {
      position: relative;
      overflow: hidden;
    }
    .split::before,
    .split::after {
      content: 'monochrome';
      position: absolute;
      top: 0;
      left: 0;
    }
    .split::before {clip-path: inset(0 0 50% 0); transform: translateX(-2px); animation: slice 1.2s infinite;}
    .split::after {clip-path: inset(50% 0 0 0); transform: translateX(2px); animation: slice 1.2s infinite reverse;}
    @keyframes slice { 0%, 100% {transform: translateX(0);} 50% {transform: translateX(5px);} }
  </style>
</head>
<body>
  <main>
    <section>
      <h2 class="split">monochrome</h2>
    </section>
  </main>
</body>
</html>
