<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal Loop</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #333;
    }

    .image-container {
      width: 100%;
      overflow: hidden;
      position: relative;
      display: flex;
      margin: 20px 0; /* Space between marqueeRow */
    }
    
    .marqueeRow {
      display: flex;
      animation: marquee-loop 16s linear infinite;
    }
    @keyframes marquee-loop {
      0% {transform: translateX(0);}
      100% {transform: translateX(-50%);}
    }

    .image-container:hover .marqueeRow {
      animation-play-state: paused; /* Pause animation on hover */
    }

    .marqueeRow a {
      display: block; /* Make links clickable */
    }

    .marqueeRow img {
      height: 200px; /* Set consistent height for images */
      width: auto; /* Maintain aspect ratio */
      margin-right: 10px; /* Spacing between images */
      border: 1px solid black;
      box-sizing: border-box;
      transition: opacity 0.3s; /* Smooth hover transition */
    }

    /* Hover Effects */
    .image-container:hover img {
      opacity: 0.5; /* Dim all images when container is hovered */
    }

    .marqueeRow img:hover {
      opacity: 1; /* Highlight image on individual hover */
    }
  </style>
</head>
<body>
  <!-- First Scrolling Image Row -->
  <div class="image-container">
    <div class="marqueeRow">
      <a href="#"><img src="https://picsum.photos/300/200?random=1" alt="Image 1"></a>
      <a href="#"><img src="https://picsum.photos/300/200?random=2" alt="Image 2"></a>
      <a href="#"><img src="https://picsum.photos/300/200?random=3" alt="Image 3"></a>
      <a href="#"><img src="https://picsum.photos/300/200?random=4" alt="Image 4"></a>
      <a href="#"><img src="https://picsum.photos/300/200?random=5" alt="Image 5"></a>
      <a href="#"><img src="https://picsum.photos/300/200?random=6" alt="Image 6"></a>
      <a href="#"><img src="https://picsum.photos/300/200?random=7" alt="Image 7"></a>
      <a href="#"><img src="https://picsum.photos/300/200?random=8" alt="Image 8"></a>
      <a href="#"><img src="https://picsum.photos/300/200?random=9" alt="Image 9"></a>
      <a href="#"><img src="https://picsum.photos/300/200?random=10" alt="Image 10"></a>
    </div>
  </div>
  
  <script>
    const marqueeRows = document.querySelectorAll('.marqueeRow');

    // Clone each marqueeRow to create seamless loops
    marqueeRows.forEach(row => {
      row.innerHTML += row.innerHTML;
    });
  </script>
</body>
</html>
