<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Lost in the Code</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Courier New', Courier, monospace;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb, #a1c4fd);
      background-size: 300% 300%;
      animation: gradientShift 10s ease infinite;
      color: #fff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      text-align: center;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 5rem;
      margin: 0;
      text-shadow: 0 0 10px #ff6ec7, 0 0 20px #ff6ec7;
    }

    p {
      font-size: 1.5rem;
      line-height: 1.6;
      text-shadow: 0 0 5px #ffffff;
    }

    a {
      color: #00eaff;
      text-decoration: none;
      font-weight: bold;
      text-shadow: 0 0 5px #00eaff, 0 0 10px #00eaff;
      transition: color 0.3s ease, text-shadow 0.3s ease;
    }

    a:hover {
      color: #ff6ec7;
      text-shadow: 0 0 10px #ff6ec7, 0 0 20px #ff6ec7;
    }

    .glitch {
      position: relative;
      display: inline-block;
      animation: glitch 1s infinite;
    }

    @keyframes glitch {
      0% { text-shadow: 2px 2px #ff6ec7, -2px -2px #00eaff; }
      50% { text-shadow: -2px -2px #ff6ec7, 2px 2px #00eaff; }
      100% { text-shadow: 2px 2px #ff6ec7, -2px -2px #00eaff; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 class="glitch">404</h1>
    <p>Uh-oh! Looks like you're lost in the code.</p>
    <p>But don't worry, every great coder has been here before.</p>
    <a href="/">Take me home</a>
  </div>
</body>
</html>
