
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Shader Ripple Effect</title>
  <style>
    body {
      margin: 0;
      overflow: hidden;
    }
    canvas {
      display: block;
    }
    .dg.ac {
      display: none !important; /* Hide dat.GUI */
    }
    #stats {
      display: none !important; /* Hide Stats panel */
    }
  </style>
</head>
<body>
  <script type="module">
    import * as THREE from 'https://cdn.skypack.dev/three@0.136.0';
    import { OrbitControls } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/controls/OrbitControls';
    import Stats from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/libs/stats.module';
    import { GUI } from 'https://cdn.skypack.dev/three@0.136.0/examples/jsm/libs/lil-gui.module.min.js';

    let scene, camera, renderer, controls, stats;
    let uniforms;

    init();
    animate();

    function init() {
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
      camera.position.z = 2;

      renderer = new THREE.WebGLRenderer();
      renderer.setSize(window.innerWidth, window.innerHeight);
      document.body.appendChild(renderer.domElement);

      const geometry = new THREE.PlaneGeometry(2, 2);
      uniforms = {
        u_time: { value: 0.0 },
        u_mouse: { value: new THREE.Vector2() },
        u_resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
      };

      const material = new THREE.ShaderMaterial({
        uniforms: uniforms,
        vertexShader: `
          void main() {
            gl_Position = vec4(position, 1.0);
          }
        `,
        fragmentShader: `
          precision highp float;
          uniform vec2 u_resolution;
          uniform float u_time;
          uniform vec2 u_mouse;
          void main() {
            vec2 st = gl_FragCoord.xy / u_resolution;
            vec2 ripple = u_mouse / u_resolution;
            float dist = distance(st, ripple);
            float alpha = 0.5 + 0.5 * sin(10.0 * dist - u_time * 5.0);
            float color = smoothstep(0.01, 0.02, alpha);
            gl_FragColor = vec4(vec3(color), 1.0);
          }
        `
      });

      const mesh = new THREE.Mesh(geometry, material);
      scene.add(mesh);

      controls = new OrbitControls(camera, renderer.domElement);

      stats = new Stats();
      stats.dom.id = 'stats';
      document.body.appendChild(stats.dom);

      const gui = new GUI();
      gui.domElement.style.display = "none"; // Keep GUI logic, but hide the panel

      window.addEventListener('resize', onWindowResize, false);
      window.addEventListener('mousemove', onMouseMove, false);
    }

    function onWindowResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      uniforms.u_resolution.value.set(window.innerWidth, window.innerHeight);
    }

    function onMouseMove(event) {
      uniforms.u_mouse.value.set(event.clientX, window.innerHeight - event.clientY);
    }

    function animate() {
      requestAnimationFrame(animate);
      uniforms.u_time.value += 0.01;
      renderer.render(scene, camera);
      controls.update();
      stats.update();
    }
  </script>
</body>
</html>
