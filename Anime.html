<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sliding Animation Effect</title>
  <style>
    /* CSS Styles */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #282c34;
      color: white;
      overflow-x: hidden;
    }

    .slide-in {
      opacity: 0; /* Start invisible */
      transform: translateY(50px); /* Move down */
      transition: all 0.6s ease-out; /* Smooth transition */
    }

    .slide-in.visible {
      opacity: 1; /* Fade in */
      transform: translateY(0); /* Move into position */
    }

    section {
      margin: 50px 0;
      padding: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
    }  
  </style>
</head>
<body>
  <!-- HTML Content -->
  <header>
    <h1 class="slide-in">Welcome to My Website</h1>
  </header>
  <main>
    <section class="content-section slide-in">
      <p>Content slides into view when scrolled.</p>
    </section>
    <section class="content-section slide-in">
      <p>Another content section with animation.</p>
    </section>
    <section class="content-section slide-in">
      <p>Keep scrolling to see more animations.</p>
    </section>
  </main>

  <script>
    // JavaScript for Animation
    document.addEventListener("DOMContentLoaded", () => {
      const slideInElements = document.querySelectorAll(".slide-in");

      const handleScroll = () => {
        slideInElements.forEach(el => {
          const rect = el.getBoundingClientRect();
          if (rect.top < window.innerHeight && rect.bottom > 0) {
            el.classList.add("visible");
          } else {
            el.classList.remove("visible");
          }
        });
      };

      // Trigger on scroll
      window.addEventListener("scroll", handleScroll);

      // Initial trigger for elements already in view
      handleScroll();
    });
  </script>
</body>
</html>
