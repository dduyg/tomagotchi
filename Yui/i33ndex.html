<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Horizontal Slider Replication</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Reset and base styles */
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #111;
      color: #fff;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      width: 100vw;
      overflow: hidden;
    }
    body {
      min-height: 100vh;
      min-width: 100vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    /* Slider container */
    .slider-container {
      width: 768px;
      height: 1032px;
      overflow: hidden;
      position: relative;
      background: #111;
      box-shadow: 0 0 24px 0 #000c;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slider {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(.77,0,.18,1);
    }

    .slide {
      min-width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      background: #111;
      position: relative;
    }

    .slide-image {
      width: 100%;
      height: 78%;
      object-fit: cover;
      display: block;
      background: #111;
      user-select: none;
      pointer-events: none;
    }

    .slide-content {
      width: 100%;
      box-sizing: border-box;
      padding: 0 0 0 24px;
      margin-top: 0;
      margin-bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .slide-label {
      display: flex;
      align-items: center;
      font-family: 'JetBrains Mono', 'Fira Mono', monospace, Arial;
      font-size: 2.1rem;
      letter-spacing: 0.07em;
      font-weight: 400;
      margin-bottom: 18px;
      margin-top: 0;
      padding: 0;
      height: 34px;
      box-sizing: border-box;
    }
    .slide-label .icon {
      width: 25px;
      height: 25px;
      background: #111;
      border-radius: 3px;
      display: inline-block;
      margin-right: 10px;
      box-sizing: border-box;
    }
    .slide-label.sdk {
      background: #e9ff38;
      color: #111;
      padding-left: 10px;
      padding-right: 54px;
      height: 34px;
      border-radius: 2px;
    }
    .slide-label.sdk .icon {
      background: #111;
    }
    .slide-label.ai {
      background: #6a81ff;
      color: #111;
      padding-left: 10px;
      padding-right: 54px;
      height: 34px;
      border-radius: 2px;
    }
    .slide-label.ai .icon {
      background: #111;
    }
    .slide-label.lake {
      background: #ff4800;
      color: #111;
      padding-left: 10px;
      padding-right: 54px;
      height: 34px;
      border-radius: 2px;
    }
    .slide-label.lake .icon {
      background: #111;
    }

    .slide-desc-container {
      border-left: 4px solid #fff;
      padding-left: 16px;
      margin-left: 0;
      box-sizing: border-box;
      max-width: 98%;
    }
    .slide-desc {
      font-size: 2.1rem;
      font-weight: 400;
      line-height: 1.23;
      color: #fff;
      margin: 0;
      letter-spacing: 0.02em;
    }

    /* Slider navigation dots */
    .slider-dots {
      position: absolute;
      right: 24px;
      top: calc(80%);
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .slider-dot {
      width: 22px;
      height: 22px;
      border-radius: 4px;
      background: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      border: none;
      outline: none;
      transition: box-shadow 0.2s;
      box-shadow: none;
      position: relative;
    }
    .slider-dot.active {
      box-shadow: 0 0 0 4px #fff5;
    }
    .slider-dot .dot-color {
      width: 16px;
      height: 16px;
      border-radius: 3px;
      display: inline-block;
    }
    .slider-dot.sdk .dot-color {
      background: #e9ff38;
    }
    .slider-dot.ai .dot-color {
      background: #6a81ff;
    }
    .slider-dot.lake .dot-color {
      background: #ff4800;
    }

    /* Navigation arrows (optional, for desktop) */
    .slider-arrows {
      position: absolute;
      width: 100%;
      top: 50%;
      left: 0;
      transform: translateY(-50%);
      display: flex;
      justify-content: space-between;
      pointer-events: none;
      z-index: 2;
    }
    .slider-arrow {
      width: 50px;
      height: 80px;
      background: rgba(20,20,20,0.5);
      border: none;
      color: #fff;
      font-size: 2.6rem;
      cursor: pointer;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      transition: background 0.2s;
      opacity: 0.7;
      user-select: none;
    }
    .slider-arrow:active {
      background: rgba(80,80,80,0.2);
    }
    @media (max-width: 800px) {
      .slider-container {
        width: 100vw;
        height: 100vw;
        max-width: 100vw;
        max-height: 130vw;
      }
      .slider {
        width: 100vw;
        height: 100vw;
      }
    }
    @media (max-width: 500px) {
      .slider-container {
        width: 100vw;
        height: 175vw;
        max-width: 100vw;
        max-height: 175vw;
      }
      .slide-content .slide-label, .slide-desc {
        font-size: 1.1rem;
      }
      .slide-label {
        height: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="slider-container" id="slider-container">
    <div class="slider" id="slider">
      <!-- Slide 1 -->
      <div class="slide">
        <img src="image1" alt="Apps & SDK slide" class="slide-image" draggable="false">
        <div class="slide-content">
          <div class="slide-label sdk">
            <span class="icon"></span>
            APPS &nbsp; &nbsp; SDK
          </div>
          <div class="slide-desc-container">
            <div class="slide-desc">
              Content applications that enable custom workflows at scale, from creation to distribution.
            </div>
          </div>
        </div>
      </div>
      <!-- Slide 2 -->
      <div class="slide">
        <img src="image2" alt="Compute + AI slide" class="slide-image" draggable="false">
        <div class="slide-content">
          <div class="slide-label ai">
            <span class="icon"></span>
            COMPUTE &nbsp; + &nbsp; AI
          </div>
          <div class="slide-desc-container">
            <div class="slide-desc">
              Serverless functions and agent actions, powering your content operations for humans and AI.
            </div>
          </div>
        </div>
      </div>
      <!-- Slide 3 -->
      <div class="slide">
        <img src="image3" alt="Content Lake slide" class="slide-image" draggable="false">
        <div class="slide-content">
          <div class="slide-label lake">
            <span class="icon"></span>
            CONTENT &nbsp; LAKE
          </div>
          <div class="slide-desc-container">
            <div class="slide-desc">
              The database optimized for content queries, authoring and delivery.
            </div>
          </div>
        </div>
      </div>
    </div>
    <!-- Slider navigation dots -->
    <div class="slider-dots">
      <button class="slider-dot sdk active" data-index="0" aria-label="Go to slide 1"><span class="dot-color"></span></button>
      <button class="slider-dot ai" data-index="1" aria-label="Go to slide 2"><span class="dot-color"></span></button>
      <button class="slider-dot lake" data-index="2" aria-label="Go to slide 3"><span class="dot-color"></span></button>
    </div>
    <!-- Optional: Arrows for desktop -->
    <div class="slider-arrows">
      <button class="slider-arrow" id="arrow-left" aria-label="Previous slide">&#8592;</button>
      <button class="slider-arrow" id="arrow-right" aria-label="Next slide">&#8594;</button>
    </div>
  </div>
  <script>
    // Responsive initial slider
    const slider = document.getElementById('slider');
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.slider-dot');
    const arrowLeft = document.getElementById('arrow-left');
    const arrowRight = document.getElementById('arrow-right');
    let currentIndex = 0;
    const totalSlides = slides.length;

    function goToSlide(idx) {
      currentIndex = (idx + totalSlides) % totalSlides;
      slider.style.transform = `translateX(-${currentIndex * 100}%)`;
      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === currentIndex);
      });
    }
    // Dots navigation
    dots.forEach((dot, i) => {
      dot.addEventListener('click', () => {
        goToSlide(i);
      });
    });
    // Arrow navigation
    arrowLeft.addEventListener('click', () => {
      goToSlide(currentIndex - 1);
    });
    arrowRight.addEventListener('click', () => {
      goToSlide(currentIndex + 1);
    });
    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') goToSlide(currentIndex - 1);
      if (e.key === 'ArrowRight') goToSlide(currentIndex + 1);
    });

    // Touch/swipe navigation
    let startX = null;
    slider.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
    });
    slider.addEventListener('touchmove', (e) => {
      if (startX !== null) {
        let diff = e.touches[0].clientX - startX;
        if (Math.abs(diff) > 50) {
          if (diff > 0) goToSlide(currentIndex - 1);
          else goToSlide(currentIndex + 1);
          startX = null;
        }
      }
    });
    slider.addEventListener('touchend', () => {
      startX = null;
    });

    // Ensure first slide is shown
    goToSlide(0);

    // Prevent image drag
    document.querySelectorAll('img').forEach(img => img.addEventListener('dragstart', e => e.preventDefault()));
  </script>
</body>
</html>
