<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SVG Layered Grid Recreation</title>
  <style>
    body {
      background: #111;
      min-height: 100vh;
      margin: 0;
      display: flex;
      flex-direction: row;
      gap: 16px;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 0;
    }
    .svg-container {
      background: #111;
      padding: 12px;
      border-radius: 14px;
    }
    svg {
      display: block;
      background: transparent;
      border-radius: 12px;
      box-shadow: 0 0 8px #0007;
      width: 350px;
      height: 350px;
      max-width: 90vw;
      max-height: 90vw;
    }
  </style>
</head>
<body>
  <div class="svg-container">
    <!-- SVG 1 -->
    <svg viewBox="0 0 350 350">
      <defs>
        <!-- Dotted grid pattern -->
        <pattern id="dot" width="10" height="10" patternUnits="userSpaceOnUse">
          <circle cx="1.2" cy="1.2" r="1" fill="#aaa" opacity="0.15"/>
        </pattern>
        <!-- Grid lines pattern -->
        <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 0 0 L 20 0 M 0 0 L 0 20" stroke="#fff" stroke-width="1" opacity="0.45"/>
        </pattern>
        <!-- Square outline pattern -->
        <pattern id="square" width="12" height="12" patternUnits="userSpaceOnUse">
          <rect x="1" y="1" width="10" height="10" fill="none" stroke="#fff" opacity="0.2" stroke-width="1"/>
        </pattern>
      </defs>
      <!-- Back dotted grid (top layer, faded) -->
      <g opacity="0.22">
        <rect x="45" y="10" width="260" height="260"
              transform="rotate(25 175 140)"
              fill="url(#dot)" />
      </g>
      <!-- Middle grid lines -->
      <g>
        <rect x="50" y="50" width="250" height="250"
              transform="rotate(35 175 175)"
              fill="none" stroke="none" />
        <g transform="rotate(35 175 175)">
          <rect x="50" y="50" width="250" height="250" fill="url(#grid)" />
        </g>
      </g>
      <!-- Foreground dotted grid (bottom layer, faded) -->
      <g opacity="0.22">
        <rect x="45" y="80" width="260" height="260"
              transform="rotate(25 175 210)"
              fill="url(#square)" />
      </g>
      <!-- Blue squares (centered) -->
      <g>
        <rect x="160" y="90" width="30" height="30" fill="#5a8cff" opacity="0.85" />
        <rect x="90" y="170" width="30" height="30" fill="#5a8cff" opacity="0.85" />
        <rect x="230" y="170" width="30" height="30" fill="#5a8cff" opacity="0.85" />
        <rect x="160" y="245" width="30" height="30" fill="#5a8cff" opacity="0.85" />
      </g>
    </svg>
  </div>
  <div class="svg-container">
    <!-- SVG 2 -->
    <svg viewBox="0 0 350 350">
      <defs>
        <pattern id="dot2" width="10" height="10" patternUnits="userSpaceOnUse">
          <circle cx="1.2" cy="1.2" r="1" fill="#fff" opacity="0.15"/>
        </pattern>
        <pattern id="grid2" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 0 0 L 20 0 M 0 0 L 0 20" stroke="#fff" stroke-width="1" opacity="0.45"/>
        </pattern>
        <pattern id="square2" width="12" height="12" patternUnits="userSpaceOnUse">
          <rect x="1" y="1" width="10" height="10" fill="none" stroke="#fff" opacity="0.2" stroke-width="1"/>
        </pattern>
      </defs>
      <!-- Top dotted grid (with yellow squares) -->
      <g>
        <rect x="45" y="10" width="260" height="260"
              transform="rotate(25 175 140)"
              fill="url(#dot2)" />
        <!-- Yellow squares -->
        <rect x="90" y="35" width="105" height="80" fill="#f4ff3a" opacity="0.92"
              transform="rotate(25 175 140)" />
        <rect x="200" y="80" width="90" height="37" fill="#f4ff3a" opacity="0.95"
              transform="rotate(25 175 140)" />
        <rect x="200" y="120" width="50" height="50" fill="#f4ff3a" opacity="0.92"
              transform="rotate(25 175 140)" />
      </g>
      <!-- Middle grid lines -->
      <g>
        <rect x="50" y="50" width="250" height="250"
              transform="rotate(35 175 175)"
              fill="none" stroke="none" />
        <g transform="rotate(35 175 175)">
          <rect x="50" y="50" width="250" height="250" fill="url(#grid2)" />
        </g>
      </g>
      <!-- Foreground dotted grid (bottom layer, faded) -->
      <g opacity="0.22">
        <rect x="45" y="80" width="260" height="260"
              transform="rotate(25 175 210)"
              fill="url(#square2)" />
      </g>
    </svg>
  </div>
  <div class="svg-container">
    <!-- SVG 3 -->
    <svg viewBox="0 0 350 350">
      <defs>
        <pattern id="dot3" width="10" height="10" patternUnits="userSpaceOnUse">
          <circle cx="1.2" cy="1.2" r="1" fill="#fff" opacity="0.15"/>
        </pattern>
        <pattern id="grid3" width="20" height="20" patternUnits="userSpaceOnUse">
          <path d="M 0 0 L 20 0 M 0 0 L 0 20" stroke="#fff" stroke-width="1" opacity="0.45"/>
        </pattern>
        <pattern id="square3" width="12" height="12" patternUnits="userSpaceOnUse">
          <rect x="1" y="1" width="10" height="10" fill="none" stroke="#fff" opacity="0.2" stroke-width="1"/>
        </pattern>
        <!-- Red eye placeholder raster (simulate with vector radial gradient) -->
        <radialGradient id="eye" cx="50%" cy="50%" r="60%" fx="60%" fy="60%">
          <stop offset="0%" stop-color="#fff" stop-opacity="0.45"/>
          <stop offset="55%" stop-color="#f00" stop-opacity="0.95"/>
          <stop offset="90%" stop-color="#a00" stop-opacity="0.9"/>
          <stop offset="100%" stop-color="#111" stop-opacity="0.6"/>
        </radialGradient>
      </defs>
      <!-- Top dotted grid -->
      <g opacity="0.22">
        <rect x="45" y="10" width="260" height="260"
              transform="rotate(25 175 140)"
              fill="url(#dot3)" />
      </g>
      <!-- Middle grid lines -->
      <g>
        <g transform="rotate(35 175 175)">
          <rect x="50" y="50" width="250" height="250" fill="url(#grid3)" />
        </g>
      </g>
      <!-- Foreground dotted grid (bottom layer) -->
      <g opacity="0.34">
        <rect x="45" y="80" width="260" height="260"
              transform="rotate(25 175 210)"
              fill="url(#square3)" />
      </g>
      <!-- Orange squares -->
      <g>
        <rect x="80" y="210" width="35" height="35" fill="#ff7a1a" opacity="0.95" />
        <rect x="120" y="240" width="55" height="55" fill="#ff7a1a" opacity="0.95" />
      </g>
      <!-- Red "eye" -->
      <g>
        <rect x="180" y="195" width="80" height="65" fill="url(#eye)" opacity="1"/>
      </g>
    </svg>
  </div>
</body>
</html>
