<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Slide</title>
  <style>
    body {
      background: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slide-label-anim {
      position: relative;
      display: inline-flex;
      align-items: center;
      font-family: 'JetBrains Mono', 'Fira Mono', monospace, Arial, sans-serif;
      font-size: 2.2rem;
      letter-spacing: 0.07em;
      font-weight: 400;
      height: 48px;
      overflow: visible;
      margin: 0 0 0 0;
      background: transparent;
      z-index: 0;
      user-select: none;
    }
    .slide-label-anim .icon {
      width: 30px;
      height: 30px;
      min-width: 30px;
      min-height: 30px;
      margin-right: 18px;
      border-radius: 2.5px;
      display: inline-block;
      background: #111;
      z-index: 2;
      border: none;
    }
    .slide-label-anim .icon.sdk { background: #111; }
    .slide-label-anim .icon.ai { background: #111; }
    .slide-label-anim .icon.lake { background: #111; }

    /* Animated background */
    .slide-label-anim .bg {
      position: absolute;
      left: 0; top: 50%;
      transform: translateY(-50%);
      height: 38px;
      border-radius: 2px;
      z-index: 1;
      width: 0%;
      transition: width 0.7s cubic-bezier(.77,0,.18,1);
      will-change: width;
      pointer-events: none;
    }
    .slide-label-anim.sdk .bg {
      background: #e9ff38;
    }
    .slide-label-anim.ai .bg {
      background: #6a81ff;
    }
    .slide-label-anim.lake .bg {
      background: #ff4800;
    }

    .slide-label-anim .text {
      position: relative;
      z-index: 2;
      color: #111;
      padding: 0 1.5em 0 0;
      transition: color 0.2s;
      background: transparent;
    }
    .slide-label-anim .text.sdk {
      color: #111;
    }
    .slide-label-anim .text.ai {
      color: #111;
    }
    .slide-label-anim .text.lake {
      color: #111;
    }

    .slide-label-anim:not(.active) .bg {
      width: 0%;
      transition: none;
    }
    .slide-label-anim:not(.active) .text {
      color: #fff;
      transition: color 0.2s;
    }
    .slide-label-anim:not(.active) .icon {
      background: var(--color, #fff);
      transition: background 0.2s;
    }

    /* Active state: animate to 100% */
    .slide-label-anim.active .bg {
      width: 100%;
      transition: width 0.7s cubic-bezier(.77,0,.18,1);
    }
    .slide-label-anim.active .text {
      color: #111;
      transition: color 0.2s 0.2s;
    }
    .slide-label-anim.active .icon.sdk {
      background: #111;
    }
    .slide-label-anim.active .icon.ai {
      background: #111;
    }
    .slide-label-anim.active .icon.lake {
      background: #111;
    }

    /* Demo controls */
    .demo-controls {
      display: flex;
      gap: 1em;
      justify-content: center;
      margin-top: 48px;
    }
    .demo-controls button {
      padding: 6px 20px;
      background: #222;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    .demo-controls button.active {
      background: #555;
      color: #fff;
    }
  </style>
</head>
<body>
  <!-- Example for COMPUTE + AI -->
  <div style="width: 80vw; max-width: 800px;">
    <div class="slide-label-anim ai active" id="demo-label">
      <span class="bg"></span>
      <span class="icon ai"></span>
      <span class="text ai">COMPUTE&nbsp;&nbsp;+&nbsp;&nbsp;AI</span>
    </div>
    <div class="demo-controls">
      <button onclick="setLabelAnim(0)">0%</button>
      <button onclick="setLabelAnim(1)">50%</button>
      <button onclick="setLabelAnim(2)">100%</button>
    </div>
  </div>
  <script>
    // Animation progress: 0 (no bar), 1 (partial), 2 (full)
    function setLabelAnim(stage) {
      const label = document.getElementById('demo-label');
      const bg = label.querySelector('.bg');
      const text = label.querySelector('.text');
      const icon = label.querySelector('.icon');
      const buttons = document.querySelectorAll('.demo-controls button');
      buttons.forEach((b, i) => b.classList.toggle('active', i === stage));
      label.classList.add('active');
      if (stage === 0) {
        bg.style.width = '0%';
        text.style.color = '#fff';
        icon.style.background = '#6a81ff';
      } else if (stage === 1) {
        bg.style.width = '50%';
        text.style.color = '#fff';
        icon.style.background = '#6a81ff';
      } else {
        bg.style.width = '100%';
        setTimeout(() => {
          text.style.color = '#111';
          icon.style.background = '#111';
        }, 400);
      }
    }
    // on load, animate in (demo)
    setLabelAnim(0);
    setTimeout(() => setLabelAnim(1), 400);
    setTimeout(() => setLabelAnim(2), 900);
  </script>
</body>
</html>
