<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal🍡Loop</title>
  <link href="https://fonts.googleapis.com/css?family=Playfair+Display:400,700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; outline: none; -webkit-tap-highlight-color: transparent; }
    html, body {
      background: #0c0c0c;
      color: white;
      font-family: 'Playfair Display', serif;
      min-height: 100vh;
      width: 100vw;
      overflow-x: hidden;
    }
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background: url('https://cdn.jsdelivr.net/gh/dduyg/LiminalLoop/06/MountFujiLoading.png') center/cover no-repeat;
      filter: brightness(0.35) contrast(1.2);
      opacity: 0.6;
      z-index: 0;
      pointer-events: none;
    }
    .page-wrapper {
      position: relative;
      padding: 10px;
      display: flex;
      flex-direction: row;
      min-height: 100vh;
      z-index: 1;
    }
    header {
      flex: 0 0 270px;
      padding: 40px 50px 0 36px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      font-size: 2.3rem;
      line-height: 0.95;
      text-align: left;
      white-space: pre-line;
      user-select: none;
    }
    
    main {
      flex: 1 1 0;
      padding-top: 45px;
      position: relative;
      min-width: 0;
      display: flex;
      flex-direction: column;
      z-index: 2;
    }
    nav {
      display: flex;
      justify-content: space-between;        
      align-items: flex-end;
      gap: 20px;
      border-bottom: 2px solid;
      padding: 0 5px 4px;
      margin-bottom: 12px;
    }
    nav .title {
      font-size: 2rem;
    }
    nav .links {
      display: flex;
      justify-content: space-between;
      gap: 16px;   
      font-size: 0.9rem;
    }
    nav .link {
      color: #999;
      text-decoration: none;
      transition: color 0.5s;
      cursor: pointer;
      border: none;
      background: transparent;
    }
    nav .link:hover { opacity: 0.3; }
    
    .index {
      margin-top: 50px;
      overflow-y: auto;
      padding-left: 10%;
      padding-bottom: 32px;
      max-height: calc(100vh - 80px);
      
      display: flex;
      flex-direction: column;
      gap: 34px;
      counter-reset: works;
    }
    .item {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 12px;
    }
    .item::before {
      font-size: 1.16rem;
      min-width: 18px;
      text-align: right;
      opacity: 0.8;
      margin-right: 16px;
      margin-top: 6px;
      display: inline-block;
      user-select: none;
      content: counter(works);
      counter-increment: works;
    }

    .content {
      display: flex;
      flex-direction: column;
    }
    .name {
      font-size: 2.15rem;
      white-space: pre-line;
      line-height: 1.0;
      margin: 0;
      letter-spacing: 0.01em;
    }
    .type {
      font-size: 1.03rem;
      margin-top: 2px;
      opacity: 0.95;
      letter-spacing: 0.03em;
    }
    
    footer {
      position: fixed;
      left: 3px;
      bottom: 1%;   
      writing-mode: vertical-lr;
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      z-index: 5;
      user-select: none;
    }
    footer span { font-size: 1.4em; }

    @media (max-width: 768px) {
      .page-wrapper { flex-direction: column; }
      header {
        flex: none;
        width: 100%;
        padding-left: 12px;
        font-size: 1.7rem;
      }
      main {
        flex: none;
        width: 100%;
        padding-top: 30px;
      }
      nav .title { font-size: 1.6rem; }
      .index {
        padding: 0 8px;
        max-width: 100vw;
      }
      .name { font-size: 1.25rem; }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    <header>A soft black<br>&nbsp;&nbsp;&nbsp;&nbsp;mimicking<br>old CRT shadows</header>
    <main>
      <nav>
        <span class="title">INDEX</span>
        <div class="links">
          <button class="link">All</button>
          <button class="link">Product</button>
          <button class="link">Project</button>
          <button class="link">Post</button>
        </div>
      </nav>
  
      <div class="index">
        <div class="item">
          <div class="content">
            <div class="name">the tilt of the scales</div>
            <div class="type">Commission</div>
          </div>
        </div>
        <div class="item">
          <div class="content">
            <div class="name">ENigmatic Recollection</div>
            <div class="type">Commission</div>
          </div>
        </div>
        <div class="item">
          <div class="content">
            <div class="name">Liberty</div>
            <div class="type">Commission</div>
          </div>
        </div>
        <!-- Add more rows as needed -->
      </div>
    </main>
  </div>
<footer><span>(</span> 8-Bit Zen Garden <span>)</span></footer>
</body>
</html>
