<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SOROJECTS</title>
  <meta name="viewport" content="width=700, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Oswald:wght@400;700&display=swap');
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
}

body {
  min-height: 100vh;
  background: #0a0a0a url('https://cdn.sanity.io/images/b1mwlimg/production/bf6ecae27d43dd3573799600490e9210a69f500f-3000x1278.png') no-repeat center center fixed;
  background-size: cover;
  color: #fff;
  font-family: 'EB Garamond', serif;
  letter-spacing: 0.02em;
  position: relative;
  z-index: 1;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  z-index: 0;
  top: 0; left: 0; right: 0; bottom: 0;
  background: inherit;
  filter: brightness(0.35) contrast(1.2);
  opacity: 0.8;
  pointer-events: none;
}

.page-wrapper {
  position: relative;
  z-index: 1;
  width: 100vw;
  min-height: 100vh;
}

.project-list {
      margin-top: 1.5rem;
      padding-left: 1rem;
      list-style: none;
      counter-reset: project-num;
    }
    .project-list li {
      counter-increment: project-num;
      margin-bottom: 1.6rem;
      font-size: 1.65rem;
      line-height: 1.08;
      font-family: inherit;
      position: relative;
      padding-left: 2.8rem;
      max-width: 34rem;
    }
    .project-list li::before {
      content: counter(project-num);
      position: absolute;
      left: 0;
      top: 0;
      font-size: 1.25rem;
      font-family: inherit;
      color: #bcbcbc;
      font-weight: 400;
      letter-spacing: 0.03em;
    }
    .project-title {
      font-weight: 400;
      font-size: 1.1em;
      display: block;
      margin-bottom: 0.1em;
      font-family: inherit;
    }
    .project-type {
      font-size: 1rem;
      color: #bcbcbc;
      font-family: inherit;
      font-weight: 400;
      margin-top: 0;
      margin-bottom: 0;
    }
    @media (max-width: 700px) {
      .project-list {
        margin-top: 0.8rem;
        padding-left: 0.3rem;
      }
      .project-list li {
        font-size: 1.05rem;
        padding-left: 1.4rem;
      }
      .project-list li::before {
        font-size: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="page-wrapper">
    
      <ol class="project-list">
        <li>
          <span class="project-title">the tilt of the scales</span>
          <span class="project-type">Commission</span>
        </li>
        <li>
          <span class="project-title">ENigmatic Recollection</span>
          <span class="project-type">Commission</span>
        </li>
        <li>
          <span class="project-title">Q&I |</span>
          <span class="project-type">Commission</span>
        </li>
        <li>
          <span class="project-title">BRAVERY</span>
          <span class="project-type">Commission</span>
        </li>
      </ol>

  </div>
</body>
</html>
