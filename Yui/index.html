<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SOROJECTS</title>
  <meta name="viewport" content="width=700, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
@import url('https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;700&family=Oswald:wght@400;700&display=swap');
html, body {
  height: 100%;
  margin: 0;
  padding: 0;
}
body {
  min-height: 100vh;
  background: #0a0a0a;
  color: white;
  font-family: 'EB Garamond', serif;
  letter-spacing: 0.02em;
  position: relative;
  z-index: 1;
  overflow-x: hidden;
}
body::before {
  content: '';
  position: fixed;
  z-index: 0;
  top: 0; left: 0; right: 0; bottom: 0;
  background: inherit;
  filter: brightness(0.35) contrast(1.2);
  opacity: 0.8;
  pointer-events: none;
}
.page-wrapper {
  position: relative;
  z-index: 1;
  width: 100vw;
  min-height: 100vh;
}

.projects-list {
  width: 100%;
  max-width: 700px;
  margin: 50px auto 0 auto;
  padding: 0 32px;
  z-index: 2;
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 34px;
}

.project-entry {
  display: flex;
  flex-direction: row;
  align-items: flex-start;
  gap: 12px;
}

.project-num {
  font-size: 1.16rem;
  margin-right: 16px;
  min-width: 18px;
  text-align: right;
  opacity: 0.8;
  margin-top: 6px;
}

.project-info {
  display: flex;
  flex-direction: column;
}

.project-title {
  font-size: 2.15rem;
  white-space: pre-line;
  line-height: 1.0;
  margin: 0;
  letter-spacing: 0.01em;
}

.project-type {
  font-size: 1.03rem;
  margin-top: 2px;
  opacity: 0.95;
  letter-spacing: 0.03em;
}

@media (max-width: 900px) {
  .projects-title {
    font-size: 2.2rem;
  }
  .projects-list {
    padding: 0 8px;
    max-width: 100vw;
  }
  .project-title {
    font-size: 1.25rem;
  }
}
  </style>
</head>
<body>
  <main class="page-wrapper">
    
    <div class="projects-list">
      <div class="project-entry">
        <div class="project-num">1</div>
        <div class="project-info">
          <div class="project-title">the tilt of the scales</div>
          <div class="project-type">Commission</div>
        </div>
      </div>
      <div class="project-entry">
        <div class="project-num">2</div>
        <div class="project-info">
          <div class="project-title">ENigmatic Recollection</div>
          <div class="project-type">Commission</div>
        </div>
      </div>
      <div class="project-entry">
        <div class="project-num">3</div>
        <div class="project-info">
          <div class="project-title">Liberty</div>
          <div class="project-type">Commission</div>
        </div>
      </div>
      <div class="project-entry">
        <div class="project-num">4</div>
        <div class="project-info">
          <div class="project-title">Realize</div>
          <div class="project-type">Commission</div>
        </div>
      </div>
      <div class="project-entry">
        <div class="project-num">5</div>
        <div class="project-info">
          <div class="project-title">Igniters</div>
          <div class="project-type">Commission</div>
        </div>
      </div>  
    </div>
    
  </main>
</body>
</html>
