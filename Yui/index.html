<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Slide Label - Compute + AI</title>
  <style>
    body {
      background: #111;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 40px;
    }

    .label-outer {
      position: relative;
      width: 760px;
      height: 44px;
      display: flex;
      align-items: center;
      margin-top: 40px;
    }

    /* The background "grow" bar */
    .label-bg-bar {
      position: absolute;
      left: 0; top: 0; bottom: 0;
      height: 100%;
      width: 0%;
      background-color: #6a81ff;
      border-radius: 2px;
      z-index: 0;
      transition: width 600ms cubic-bezier(.77,0,.18,1);
      will-change: width;
      /* Animation for demo, remove if triggering via JS */
      /* animation: grow-bar 0.7s cubic-bezier(.77,0,.18,1) forwards; */
    }
    @keyframes grow-bar {
      0% { width: 0%;}
      100% { width: 100%;}
    }

    /* Label content */
    .label-content {
      position: relative;
      display: flex;
      align-items: center;
      padding-left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
    }

    /* Colored square */
    .label-square {
      position: relative;
      width: 22px; height: 22px;
      background: #111;
      border-radius: 2px;
      margin-right: 15px;
      margin-left: 6px;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      /* The colored dot inside */
    }
    .label-dot {
      width: 13px; height: 13px;
      background: #6a81ff;
      border-radius: 2px;
      display: block;
    }

    /* Text */
    .label-text {
      font-family: 'JetBrains Mono', 'Fira Mono', 'Menlo', 'Consolas', monospace;
      font-size: 2.1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #111;
      padding-left: 10px;
      z-index: 2;
      /* Animate color on bar grow */
      transition: color 400ms cubic-bezier(.77,0,.18,1);
      line-height: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      font-weight: 400;
      user-select: none;
    }
    .label-outer:not(.active) .label-text {
      color: #fff;
      transition: color 100ms cubic-bezier(.77,0,.18,1);
    }

    /* Initial state: only square and text appear, no bar */
    .label-outer:not(.active) .label-bg-bar {
      width: 0%;
    }
    .label-outer:not(.active) .label-text {
      color: #fff;
    }
    /* When active, bar grows and text color flips */
    .label-outer.active .label-bg-bar {
      width: 100%;
      transition: width 600ms cubic-bezier(.77,0,.18,1);
    }
    .label-outer.active .label-text {
      color: #111;
      transition: color 400ms cubic-bezier(.77,0,.18,1) 230ms;
    }

    /* Responsive */
    @media (max-width: 800px) {
      .label-outer {
        width: 96vw;
        min-width: 0;
      }
      .label-text {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="label-outer" id="animatedLabel">
    <div class="label-bg-bar"></div>
    <div class="label-content">
      <span class="label-square"><span class="label-dot"></span></span>
      <span class="label-text">COMPUTE&nbsp;&nbsp;+&nbsp;&nbsp;AI</span>
    </div>
  </div>

  <script>
    // Animation: add .active after a short delay to trigger bar grow
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        document.getElementById('animatedLabel').classList.add('active');
      }, 200); // slight delay for effect
    });
    // To replay animation on click (for demo)
    document.getElementById('animatedLabel').addEventListener('click', function() {
      this.classList.remove('active');
      void this.offsetWidth; // force reflow
      setTimeout(() => this.classList.add('active'), 10);
    });
  </script>
</body>
</html>
