<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Label</title>
  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: monospace;
      padding: 40px;
    }

    .label-wrapper {
      width: 500px; /* Fixed width for both label and description */
    }

    .label {
      position: relative;
      padding: 1rem 1rem 1rem 2rem;
      font-size: 14px;
      text-transform: uppercase;
      overflow: hidden;
      background-color: transparent;
    }

    .label::before {
      content: "";
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      background-color: #ff5500;
      z-index: 2;
      transition: background-color 1.5s ease;
    }

    .label::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 0%;
      height: 100%;
      background-color: #ff5500;
      z-index: 1;
      transition: width 1.5s ease;
    }

    .label.animate::after {
      width: 100%;
    }

    .label.animate::before {
      background-color: #000; /* Square turns black immediately on animation start */
    }

    .label span {
      position: relative;
      z-index: 3;
      letter-spacing: 2px;
    }

    .description {
      border-left: 2px solid white;
      padding-left: 1rem;
      font-size: 18px;
      line-height: 1.5;
      max-width: 100%; /* Now matches label */
    }
  </style>
</head>
<body>

  <div class="label-wrapper">
    <div class="label" id="label1">
      <span>Content&nbsp;&nbsp;Lake</span>
    </div>
    <div class="description">
      The database optimized for content queries, authoring and delivery.
    </div>
  </div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      // Trigger both background and square color transitions at the same time
      setTimeout(() => {
        document.getElementById("label1").classList.add("animate");
      }, 500);
    });
  </script>

</body>
</html>
