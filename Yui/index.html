<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Compute + AI</title>
  <style>
    body {
      background-color: #fff;
      padding: 2rem;
    }

    .label {
      position: relative;
      display: inline-block;
      font-family: monospace;
      font-size: 13px;
      text-transform: uppercase;
      line-height: 1;
      color: white; /* Set text color to contrast background */
      padding: 5px 10px;
      z-index: 1;
    }

    .label::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      height: 100%;
      width: 11px;
      background-color: #556bfc;
      z-index: -1;
      border-radius: 3px;
      transition: width 1s ease-in-out;
      animation: expandBar 1s ease-in-out 2s forwards;
    }

    @keyframes expandBar {
      to {
        width: 100%;
      }
    }

    @media (min-width: 1024px) {
      .label {
        text-align: right;
        display: block;
      }
    }
  </style>
</head>
<body>
  <h3 class="label">Compute + AI</h3>
</body>
</html>
