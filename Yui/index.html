<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Compute + AI</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #111;
      color: #ccc;
    }

    .container {
      min-width: 85%;
      flex-shrink: 0;
      scroll-snap-align: center;
      display: flex;
      flex-direction: column;
    }

    .content-wrapper {
      position: relative;
      height: 100%;
      max-width: 80vw;
    }

    .headline-button {
      position: relative;
      display: flex;
      width: 100%;
      align-items: center;
      overflow: hidden;
      padding: 1rem 0;
      margin-bottom: 3rem;
      background: none;
      border: none;
      cursor: pointer;
    }

    .dot {
      width: 11px;
      height: 11px;
      background-color: #556bfc;
      position: absolute;
      left: 0;
      opacity: 1;
    }

    .headline {
      position: relative;
      z-index: 10;
      flex-shrink: 0;
      padding-left: 20px;
      font-family: monospace;
      font-size: 13px;
      text-transform: uppercase;
      line-height: 11px;
      transition: color 600ms ease-in-out;
    }

    @media (min-width: 1024px) {
      .headline {
        text-align: right;
      }

      .separator-line {
        display: block;
      }
    }

    .separator-line {
      margin-left: 3rem;
      display: none;
      height: 1px;
      width: 100%;
      background-color: #797979;
    }

    .description-container {
      position: relative;
      border-left: 2px solid #666;
      padding-left: 4rem;
    }

    .timeline-bar {
      position: absolute;
      left: -2px;
      top: 0;
      height: 100%;
      width: 2px;
      background-color: white;
      transform-origin: bottom;
      transform: scaleY(1);
      transition: none;
    }

    @media (min-width: 1024px) {
      .timeline-bar {
        opacity: 0;
      }
    }

    .description {
      font-size: 15px;
      line-height: 1.5;
      color: #999;
      transition: all 600ms ease-in-out;
    }

    @media (min-width: 1024px) {
      .description {
        transform: translateY(2rem);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="content-wrapper">
      <button class="headline-button">
        <div class="dot"></div>
        <h3 class="headline">Compute + AI</h3>
        <div class="separator-line"></div>
      </button>
      <div class="description-container">
        <div class="timeline-bar"></div>
        <p class="description">
          Serverless functions and agent actions, powering your content operations for humans and AI.
        </p>
      </div>
    </div>
  </div>

</body>
</html>
