<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LiminalLoop</title>
  <style>
    /* Reset and box-sizing */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html {
      line-height: 1;
      -webkit-user-drag: none;
      -webkit-tap-highlight-color: rgba(0,0,0,0);
    }
    body {
      background: #f3f3f3;
      color: #222;
      font-family: system-ui, sans-serif;
    }
    main {
      display: block;
      width: 100%;
      min-height: 100vh;
      background: var(--c-bg, #f3f3f3);
      position: relative;
    }
    .page {
      display: block;
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.09);
    }
    .page.page-projects {
      background: #fff;
      padding: 40px 24px;
      border-radius: 20px;
      box-shadow: 0 3px 24px rgba(0,0,0,0.07), 0 1.5px 8px rgba(0,0,0,0.04);
      overflow: hidden;
    }
    .pageHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
    }
    .pageHeader .title {
      display: flex;
      align-items: center;
      font-size: 2.1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }
    .pageHeader .label {
      background: #e4e4e7;
      color: #7a7a7a;
      border-radius: 6px;
      padding: 2px 8px;
      font-size: 1rem;
      margin-right: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .pageHeader .name {
      color: #222;
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    .filter {
      display: flex;
      gap: 10px;
    }
    .filter_item {
      padding: 6px 16px;
      background: #f3f3f3;
      border-radius: 5px;
      cursor: pointer;
      font-size: 1rem;
      color: #555;
      transition: background 0.18s, color 0.18s;
    }
    .filter_item.on, .filter_item:hover {
      background: #222;
      color: #fff;
    }
    .projects {
      display: flex;
      flex-direction: column;
      gap: 32px;
    }
    .projects_image {
      width: 100%;
      margin-bottom: 18px;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .projects_image img {
      display: block;
      width: 100%;
      max-width: 440px;
      height: auto;
      border-radius: 10px;
      margin: 0 auto;
    }
    .projects_text {
      font-size: 1.16rem;
      color: #444;
      line-height: 1.6;
      margin-bottom: 16px;
      margin-top: 0px;
    }
    .projects_notice {
      background: #fbe9e7;
      color: #c62828;
      font-size: 1rem;
      padding: 12px 16px;
      border-radius: 8px;
      margin: 20px 0 0 0;
      text-align: left;
      line-height: 1.4;
      font-family: inherit;
    }
    /* Japanese font for .jp */
    .f-jp {
      font-family: "Noto Sans JP", "Yu Gothic", "Meiryo", sans-serif;
    }
    /* Responsive design */
    @media (max-width: 700px) {
      .page,
      .page.page-projects {
        padding: 21px 6px;
        border-radius: 10px;
      }
      .pageHeader .title {
        font-size: 1.3rem;
      }
      .pageHeader .label {
        font-size: 0.82rem;
      }
      .projects_image img {
        max-width: 100%;
      }
      .projects {
        gap: 18px;
      }
    }
  </style>
</head>
<body> 
  <main id="PageWrapper" data-page="wrapper">
    <div class="page page-projects" data-page="container" data-page-namespace="project-index">
      <div class="pageHeader">
        <h1 class="title">
          <div class="label">B</div>
          <div class="name">Projects</div>
        </h1>
        <div class="filter">
          <div class="filter_item on">All</div>
          <div class="filter_item">Art</div>
          <div class="filter_item">Code</div>
        </div>
      </div>
      <div class="projects" data-scroll="area">
        <div class="projects_image">
          <img src="https://cdn.sanity.io/images/b1mwlimg/production/4f1802ebf1f40985bdce89534a34e095ce5b2c8f-2500x3568.jpg?auto=format&q=80&w=840" width="440" height="627" loading="lazy" alt="Project Image" />
        </div>
        <div class="projects_text">
          <p>This is an example project description. You can add more details about your project here.</p>
        </div>
        <div class="projects_notice">
          <p>modification of the content<br>
          of this site is prohibited.</p>
          <p class="jp f-jp">当サイトのコンテンツを無断で<br>複製、転載、改変することをを固く禁じます。</p>
        </div>
      </div>
    </div>
  </main>
</body>
</html>
