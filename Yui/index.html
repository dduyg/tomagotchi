<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Progress Bar Label Example</title>
  <style>
    body {
      background: #111;
      color: #fff;
      font-family: 'JetBrains Mono', 'Fira Mono', monospace, Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
    }

    .slide-label-container {
      margin: 64px;
      width: 900px;
      max-width: 97vw;
      background: none;
      padding: 0;
      /* just for visual alignment, remove if embedding in a slide */
    }

    .slide-label-progress {
      position: relative;
      display: inline-block;
      /* width will be controlled via progress bar */
      height: 48px;
      vertical-align: middle;
      overflow: visible;
    }
    .slide-label-progress-bar {
      position: absolute;
      left: 0;
      top: 0;
      height: 100%;
      background: #6a81ff;
      border-radius: 2px;
      z-index: 1;
      width: 0%;
      transition: width 0.85s cubic-bezier(.86,0,.07,1);
      /* for demo, can be longer or shorter for effect */
    }
    .slide-label-content {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      font-size: 2.2rem;
      height: 48px;
      padding-left: 12px;
      padding-right: 56px;
      letter-spacing: 0.07em;
      font-weight: 400;
      color: #111;
      /* ensure text sits above progress bar */
      mix-blend-mode: normal;
      /* Use color: #fff for initial/empty state */
    }
    .slide-label-progress.initial .slide-label-content {
      color: #fff;
      /* Text is white before progress bar animates */
    }
    .slide-label-progress .icon {
      width: 32px;
      height: 32px;
      margin-right: 16px;
      border-radius: 3px;
      background: #6a81ff;
      display: inline-block;
      flex-shrink: 0;
      box-sizing: border-box;
    }

    /* For the demo only: buttons */
    .demo-controls {
      margin-top: 24px;
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }
    .demo-controls button {
      background: #222;
      color: #fff;
      border: none;
      font-size: 1.2rem;
      padding: 9px 22px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .demo-controls button:active {
      background: #444;
    }

    @media (max-width: 800px) {
      .slide-label-container {
        width: 99vw;
        max-width: 99vw;
      }
    }
    @media (max-width: 500px) {
      .slide-label-content {
        font-size: 1.1rem;
        height: 30px;
        padding-left: 7px;
        padding-right: 24px;
      }
      .slide-label-progress-bar {
        border-radius: 1.5px;
      }
      .slide-label-progress .icon {
        width: 18px;
        height: 18px;
        margin-right: 7px;
      }
      .slide-label-container {
        margin: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="slide-label-container">
    <!-- Progress label with initial (empty bar) -->
    <div class="slide-label-progress initial" id="slideLabel">
      <div class="slide-label-progress-bar" id="slideLabelBar"></div>
      <div class="slide-label-content">
        <span class="icon"></span>
        COMPUTE &nbsp; + &nbsp; AI
      </div>
    </div>
  </div>

  <!-- Demo controls for effect -->
  <div class="demo-controls">
    <button onclick="setProgress(0)">Start (0%)</button>
    <button onclick="setProgress(0.45)">Middle (45%)</button>
    <button onclick="setProgress(1)">Finished (100%)</button>
  </div>

  <script>
    // Animate the label bar like a progress bar
    const bar = document.getElementById('slideLabelBar');
    const label = document.getElementById('slideLabel');

    // Set the progress: 0 (start), 0.45 (mid), 1 (finished)
    function setProgress(p) {
      if (p <= 0) {
        bar.style.width = '0%';
        label.classList.add('initial');
      } else {
        label.classList.remove('initial');
        bar.style.width = (p * 100) + '%';
      }
      // At 100%, ensure bar stretches all the way (for edge case)
      if (p >= 1) {
        bar.style.width = '100%';
      }
    }
    // For demo: show start, animate to full after short delay
    setProgress(0);
    setTimeout(() => setProgress(1), 1100);

    // Optionally: expose setProgress to window for demo
    window.setProgress = setProgress;
  </script>
</body>
</html>
