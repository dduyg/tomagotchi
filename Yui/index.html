<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizontal Slider</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #111111;
      color: #fff;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    body {
      width: 100vw;
      height: 100vh;
      box-sizing: border-box;
      overflow: hidden;
    }

    .slider-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slider {
      display: flex;
      flex-direction: row;
      transition: transform 0.6s cubic-bezier(.77,0,.18,1);
      will-change: transform;
      height: 100vh;
      width: 100vw;
    }

    .slide {
      min-width: 100vw;
      height: 100vh;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      background: #111;
      position: relative;
      padding: 0;
      overflow: hidden;
    }

    .slide-img {
      width: 100vw;
      height: 55vh;
      object-fit: cover;
      object-position: top center;
      background: #111;
      display: block;
    }

    .slide-content {
      width: 100vw;
      box-sizing: border-box;
      padding: 0 0 0 2vw;
      position: relative;
      margin-top: 4vh;
    }

    .slide-label {
      display: flex;
      align-items: center;
      font-size: 1.5rem;
      letter-spacing: 0.04em;
      font-weight: 400;
      margin-bottom: 1.2rem;
      width: max-content;
      padding: 0;
    }

    .slide-label-square {
      width: 1.3em;
      height: 1.3em;
      margin-right: 0.4em;
      display: inline-block;
      background: #222;
      border-radius: 0.1em;
    }

    .slide-label.apps {
      background: #e6ff22;
      color: #111;
      padding: 0.1em 0.5em 0.1em 0.3em;
      border-radius: 0.1em;
      font-weight: 400;
    }
    .slide-label.apps .slide-label-square { background: #111; }

    .slide-label.compute {
      background: #5b6fff;
      color: #111;
      padding: 0.1em 0.5em 0.1em 0.3em;
      border-radius: 0.1em;
      font-weight: 400;
    }
    .slide-label.compute .slide-label-square { background: #111; }

    .slide-label.lake {
      background: #ff4700;
      color: #111;
      padding: 0.1em 0.5em 0.1em 0.3em;
      border-radius: 0.1em;
      font-weight: 400;
    }
    .slide-label.lake .slide-label-square { background: #111; }

    .slide-desc {
      margin-top: 0.2em;
      font-size: 2rem;
      font-weight: 400;
      line-height: 1.28;
      color: #fff;
      border-left: 4px solid #bbb;
      padding-left: 1.2em;
      max-width: 92vw;
      letter-spacing: 0.01em;
      box-sizing: border-box;
      margin-bottom: 0;
    }

    /* Colored side dots for indicators on the right */
    .slide-indicators {
      position: absolute;
      right: 2vw;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 2rem;
      z-index: 12;
    }
    .indicator-dot {
      width: 1.1em;
      height: 1.1em;
      border-radius: 0.2em;
      margin-bottom: 0.2em;
      opacity: 0.6;
      cursor: pointer;
      transition: opacity .23s;
      border: none;
      outline: none;
      background: transparent;
      position: relative;
      z-index: 2;
    }
    .indicator-dot.active { opacity: 1; }

    .indicator-dot.apps { background: #e6ff22; }
    .indicator-dot.compute { background: #5b6fff; }
    .indicator-dot.lake { background: #ff4700; }

    /* Navigation arrows */
    .slider-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 2.8em;
      height: 2.8em;
      background: rgba(20,20,20,0.4);
      border: none;
      color: #fff;
      border-radius: 50%;
      font-size: 2.2em;
      z-index: 11;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background .2s;
      outline: none;
    }
    .slider-arrow:hover {
      background: rgba(255,255,255,0.15);
    }
    .slider-arrow.left {
      left: 1vw;
    }
    .slider-arrow.right {
      right: 1vw;
    }

    @media (max-width: 700px) {
      .slide-desc { font-size: 1.2rem; padding-left: .7em; }
      .slide-label { font-size: 1.1rem; }
      .slide-content { padding-left: 1vw; }
    }
    @media (max-width: 480px) {
      .slide-desc { font-size: 1rem; }
      .slide-label { font-size: 1rem; }
      .slide-content { margin-top: 2vh; }
    }
  </style>
</head>
<body>
<div class="slider-container">
  <button class="slider-arrow left" id="arrowLeft" aria-label="Previous Slide">&#8592;</button>
  <div class="slider" id="slider">
    <!-- Slide 1 -->
    <div class="slide">
      <img src="image1" alt="Apps & SDK" class="slide-img" draggable="false">
      <div class="slide-content">
        <div class="slide-label apps">
          <span class="slide-label-square"></span>
          APPS &nbsp; &nbsp;SDK
        </div>
        <div class="slide-desc">
          Content applications that enable custom workflows at scale, from creation to distribution.
        </div>
      </div>
    </div>
    <!-- Slide 2 -->
    <div class="slide">
      <img src="image2" alt="Compute + AI" class="slide-img" draggable="false">
      <div class="slide-content">
        <div class="slide-label compute">
          <span class="slide-label-square"></span>
          COMPUTE &nbsp; + &nbsp;AI
        </div>
        <div class="slide-desc">
          Serverless functions and agent actions, powering your content operations for humans and AI.
        </div>
      </div>
    </div>
    <!-- Slide 3 -->
    <div class="slide">
      <img src="image3" alt="Content Lake" class="slide-img" draggable="false">
      <div class="slide-content">
        <div class="slide-label lake">
          <span class="slide-label-square"></span>
          CONTENT &nbsp; LAKE
        </div>
        <div class="slide-desc">
          The database optimized for content queries, authoring and delivery.
        </div>
      </div>
    </div>
  </div>
  <button class="slider-arrow right" id="arrowRight" aria-label="Next Slide">&#8594;</button>
  <!-- Indicators -->
  <div class="slide-indicators">
    <button class="indicator-dot apps active" aria-label="Apps & SDK"></button>
    <button class="indicator-dot compute" aria-label="Compute + AI"></button>
    <button class="indicator-dot lake" aria-label="Content Lake"></button>
  </div>
</div>
<script>
  const slider = document.getElementById('slider');
  const indicators = document.querySelectorAll('.indicator-dot');
  const leftArrow = document.getElementById('arrowLeft');
  const rightArrow = document.getElementById('arrowRight');
  const slidesCount = 3;
  let currentSlide = 0;
  let sliding = false;

  function setSlide(idx, animate=true) {
    if (sliding || idx === currentSlide) return;
    if (idx < 0) idx = 0;
    if (idx > slidesCount - 1) idx = slidesCount - 1;
    sliding = true;
    slider.style.transition = animate ? 'transform 0.6s cubic-bezier(.77,0,.18,1)' : 'none';
    slider.style.transform = `translateX(${-idx * 100}vw)`;
    indicators.forEach((dot, i) => {
      dot.classList.toggle('active', i === idx);
    });
    setTimeout(() => { sliding = false; }, animate ? 600 : 0);
    currentSlide = idx;
  }

  leftArrow.addEventListener('click', () => {
    setSlide(currentSlide - 1);
  });
  rightArrow.addEventListener('click', () => {
    setSlide(currentSlide + 1);
  });
  indicators.forEach((dot, idx) => {
    dot.addEventListener('click', () => setSlide(idx));
  });

  // Keyboard navigation
  window.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft') setSlide(currentSlide - 1);
    if (e.key === 'ArrowRight') setSlide(currentSlide + 1);
  });

  // Touch/drag swipe support
  let startX = 0, dx = 0, dragging = false;
  slider.addEventListener('touchstart', function(e) {
    if (sliding) return;
    dragging = true;
    dx = 0;
    startX = e.touches[0].clientX;
    slider.style.transition = 'none';
  });
  slider.addEventListener('touchmove', function(e) {
    if (!dragging) return;
    dx = e.touches[0].clientX - startX;
    slider.style.transform = `translateX(${-currentSlide * window.innerWidth + dx}px)`;
  });
  slider.addEventListener('touchend', function(e) {
    if (!dragging) return;
    dragging = false;
    if (Math.abs(dx) > 60) {
      if (dx < 0 && currentSlide < slidesCount-1) setSlide(currentSlide + 1);
      else if (dx > 0 && currentSlide > 0) setSlide(currentSlide - 1);
      else setSlide(currentSlide);
    } else {
      setSlide(currentSlide);
    }
  });

  // Prevent image drag
  document.querySelectorAll('.slide-img').forEach(img => {
    img.addEventListener('dragstart', e => e.preventDefault());
  });

  // Resize support
  window.addEventListener('resize', function() {
    slider.style.transition = 'none';
    slider.style.transform = `translateX(${-currentSlide * window.innerWidth}px)`;
    setTimeout(() => {
      slider.style.transition = '';
    }, 50);
  });

  // Initial position
  setSlide(0, false);
</script>
</body>
</html>
