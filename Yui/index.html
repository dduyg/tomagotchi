<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Compute + AI</title>
  <style>
    body {
      font-family: monospace;
      margin: 40px;
    }

    .container {
      position: relative;
      display: flex;
      align-items: center;
    }

    .indicator {
      width: 11px;
      height: 11px;
      background-color: #556bfc;
      position: absolute;
      left: 0;
      opacity: 1;
    }

    .heading {
      position: relative;
      z-index: 10;
      flex-shrink: 0;
      padding-left: 20px;
      font-size: 13px;
      text-transform: uppercase;
      line-height: 11px;
      transition: color 600ms ease-in-out;
      text-align: left;
    }

    /* Optional: Align text right on large screens (≥1024px) */
    @media (min-width: 1024px) {
      .heading {
        text-align: right;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="indicator"></div>
    <h3 class="heading">Compute + AI</h3>
  </div>
</body>
</html>
