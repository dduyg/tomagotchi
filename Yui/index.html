<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizontal Slider</title>
  <style>
    html, body {
      background: #111;
      color: #fff;
      margin: 0;
      padding: 0;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      min-height: 100vh;
      min-width: 100vw;
    }
    .slider-container {
      width: 480px;
      height: 850px;
      position: relative;
      overflow: hidden;
      background: #111;
      border-radius: 0;
      box-shadow: 0 0 32px rgba(0,0,0,0.35);
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
    }

    .slider-track {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100%;
      transition: transform 0.6s cubic-bezier(.6,.11,.3,1.01);
    }
    .slide {
      width: 480px;
      min-width: 480px;
      height: 100%;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      box-sizing: border-box;
      padding: 0;
      background: #111;
    }
    .slide-img {
      width: 100%;
      height: 480px;
      object-fit: cover;
      margin-top: 0;
      background: #111;
    }
    .slide-content {
      width: 100%;
      box-sizing: border-box;
      padding: 36px 0 0 0;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: flex-start;
    }
    .slide-label {
      display: flex;
      align-items: center;
      font-family: 'Inter', 'Helvetica Neue', Arial, sans-serif;
      font-size: 1.45em;
      letter-spacing: 0.06em;
      font-weight: 400;
      padding-left: 8px;
      margin-bottom: 18px;
    }
    .slide-label .label-square {
      width: 22px;
      height: 22px;
      background: #000;
      margin-right: 8px;
      border-radius: 2px;
      display: inline-block;
    }
    .slide-label.apps {
      background: #eaff1a;
      color: #111;
      padding: 6px 0 6px 0;
      margin-left: 0;
      width: 95%;
    }
    .slide-label.compute {
      background: #5267ff;
      color: #111;
      padding: 6px 0 6px 0;
      margin-left: 0;
      width: 95%;
    }
    .slide-label.lake {
      background: #ff4c0a;
      color: #111;
      padding: 6px 0 6px 0;
      margin-left: 0;
      width: 95%;
    }
    .slide-desc {
      font-size: 1.6em;
      font-weight: 400;
      margin: 0 0 0 0;
      padding: 18px 32px 0 22px;
      line-height: 1.26;
      border-left: 4px solid #fff;
      color: #fff;
      letter-spacing: -0.01em;
      min-height: 110px;
      box-sizing: border-box;
    }
    .slide-desc strong {
      color: inherit;
    }
    /* Slide indicator dots */
    .slider-indicators {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 14px;
      z-index: 9;
    }
    .slider-dot {
      width: 14px;
      height: 14px;
      border-radius: 100%;
      border: 2px solid #fff;
      background: transparent;
      cursor: pointer;
      transition: background 0.25s, border-color 0.25s;
    }
    .slider-dot.active {
      background: #eaff1a;
      border-color: #eaff1a;
    }
    .slider-dot.dot-blue.active {
      background: #5267ff;
      border-color: #5267ff;
    }
    .slider-dot.dot-orange.active {
      background: #ff4c0a;
      border-color: #ff4c0a;
    }

    /* Arrow buttons */
    .slider-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 36px;
      height: 72px;
      background: rgba(0,0,0,0.24);
      color: #fff;
      border: none;
      outline: none;
      cursor: pointer;
      z-index: 10;
      font-size: 2.2em;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      transition: background 0.2s;
      opacity: 0.7;
    }
    .slider-arrow:hover {
      background: rgba(50,50,50,0.55);
      opacity: 1;
    }
    .slider-arrow.left {
      left: 0;
      border-top-left-radius: 0;
      border-bottom-left-radius: 0;
    }
    .slider-arrow.right {
      right: 0;
      border-top-right-radius: 0;
      border-bottom-right-radius: 0;
    }

    /* Hide arrows on mobile small screens */
    @media (max-width: 600px) {
      .slider-arrow {
        display: none;
      }
      .slider-container {
        width: 100vw;
        max-width: 100vw;
        min-width: 100vw;
        height: 100vh;
      }
      .slide, .slide-img {
        width: 100vw;
        min-width: 100vw;
      }
    }
    /* Hide scrollbar for the track */
    .slider-track {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .slider-track::-webkit-scrollbar {
      display: none;
    }
  </style>
</head>
<body>
  <div class="slider-container">
    <button class="slider-arrow left" aria-label="Previous Slide" tabindex="0">&#10094;</button>
    <button class="slider-arrow right" aria-label="Next Slide" tabindex="0">&#10095;</button>
    <div class="slider-track" id="sliderTrack">
      <!-- Slide 1 -->
      <div class="slide">
        <img class="slide-img" src="image1" alt="APPS & SDK visual" />
        <div class="slide-content">
          <div class="slide-label apps">
            <span class="label-square"></span>
            APPS &nbsp; &nbsp;SDK
          </div>
          <div class="slide-desc">
            Content applications that enable custom workflows at scale, from creation to distribution.
          </div>
        </div>
      </div>
      <!-- Slide 2 -->
      <div class="slide">
        <img class="slide-img" src="image2" alt="COMPUTE + AI visual" />
        <div class="slide-content">
          <div class="slide-label compute" style="background:#5267ff;">
            <span class="label-square"></span>
            COMPUTE &nbsp; + &nbsp;AI
          </div>
          <div class="slide-desc">
            Serverless functions and agent actions, powering your content operations for humans and AI.
          </div>
        </div>
      </div>
      <!-- Slide 3 -->
      <div class="slide">
        <img class="slide-img" src="image3" alt="CONTENT LAKE visual" />
        <div class="slide-content">
          <div class="slide-label lake" style="background:#ff4c0a;">
            <span class="label-square"></span>
            CONTENT &nbsp; LAKE
          </div>
          <div class="slide-desc">
            The database optimized for content queries, authoring and delivery.
          </div>
        </div>
      </div>
    </div>
    <div class="slider-indicators">
      <div class="slider-dot dot-yellow active"></div>
      <div class="slider-dot dot-blue"></div>
      <div class="slider-dot dot-orange"></div>
    </div>
  </div>
  <script>
    // Slider logic
    const track = document.getElementById('sliderTrack');
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.slider-dot');
    const leftArrow = document.querySelector('.slider-arrow.left');
    const rightArrow = document.querySelector('.slider-arrow.right');
    let current = 0;
    const slideCount = slides.length;

    function goToSlide(idx) {
      current = (idx + slideCount) % slideCount;
      track.style.transform = `translateX(${-current * 480}px)`;
      dots.forEach(dot => dot.classList.remove('active', 'dot-yellow', 'dot-blue', 'dot-orange'));
      if (current === 0) {
        dots[0].classList.add('active', 'dot-yellow');
      } else if (current === 1) {
        dots[1].classList.add('active', 'dot-blue');
      } else if (current === 2) {
        dots[2].classList.add('active', 'dot-orange');
      }
    }

    leftArrow.addEventListener('click', () => goToSlide(current - 1));
    rightArrow.addEventListener('click', () => goToSlide(current + 1));
    dots.forEach((dot, idx) => {
      dot.addEventListener('click', () => goToSlide(idx));
    });

    // Keyboard navigation
    document.addEventListener('keydown', (e) => {
      if (e.key === "ArrowLeft") goToSlide(current - 1);
      if (e.key === "ArrowRight") goToSlide(current + 1);
    });

    // Touch events for mobile swipe
    let touchStartX = null;
    let touchEndX = null;
    track.addEventListener('touchstart', function(e) {
      if (e.touches.length === 1) {
        touchStartX = e.touches[0].clientX;
      }
    });
    track.addEventListener('touchmove', function(e) {
      if (e.touches.length === 1) {
        touchEndX = e.touches[0].clientX;
      }
    });
    track.addEventListener('touchend', function(e) {
      if (touchStartX !== null && touchEndX !== null) {
        const dx = touchEndX - touchStartX;
        if (Math.abs(dx) > 60) {
          if (dx < 0) goToSlide(current + 1);
          else goToSlide(current - 1);
        }
      }
      touchStartX = null;
      touchEndX = null;
    });

    // Set initial
    goToSlide(0);

    // Responsive fix for width
    function updateSliderWidth() {
      const w = Math.min(window.innerWidth, 480);
      track.style.transition = "none";
      track.style.transform = `translateX(${-current * w}px)`;
      slides.forEach(slide => {
        slide.style.width = w + "px";
        slide.style.minWidth = w + "px";
      });
      setTimeout(() => {
        track.style.transition = "";
      }, 100);
    }
    window.addEventListener('resize', updateSliderWidth);

    // Call once for initial setup
    updateSliderWidth();
  </script>
</body>
</html>
