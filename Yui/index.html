<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Animated Label (No JS)</title>
  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: monospace;
      padding: 40px;
    }

    .label-wrapper {
      width: 500px;
    }

    .label {
      position: relative;
      padding: 1rem 1rem 1rem 2rem;
      font-size: 14px;
      text-transform: uppercase;
      overflow: hidden;
      background-color: transparent;
      animation: backgroundGrow 1.5s ease forwards;
    }

    .label::before {
      content: "";
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      background-color: #ff5500;
      z-index: 2;
      animation: squareToBlack 1.5s ease forwards;
    }

    .label::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 0%;
      height: 100%;
      background-color: #ff5500;
      z-index: 1;
      animation: bgFill 1.5s ease forwards;
    }

    .label span {
      position: relative;
      z-index: 3;
      letter-spacing: 2px;
    }

    .description {
      border-left: 2px solid white;
      padding-left: 1rem;
      font-size: 18px;
      line-height: 1.5;
    }

    /* Keyframes */
    @keyframes bgFill {
      to {
        width: 100%;
      }
    }

    @keyframes squareToBlack {
      0% {
        background-color: #ff5500;
      }
      100% {
        background-color: #000;
      }
    }
  </style>
</head>
<body>

  <div class="label-wrapper">
    <div class="label">
      <span>Content&nbsp;&nbsp;Lake</span>
    </div>
    <div class="description">
      The database optimized for content queries, authoring and delivery.
    </div>
  </div>

</body>
</html>
