
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>COMPUTE + AI</title>
  <style>
    html, body {
      background: #111;
      margin: 0;
      padding: 0;
      color: #fff;
      font-family: 'JetBrains Mono', 'Fira Mono', monospace, Arial, sans-serif;
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: flex-start;
    }
    body {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      min-width: 100vw;
    }

    .slide-label-anim-container {
      position: relative;
      width: 90vw;
      max-width: 1000px;
      margin-top: 80px;
    }

    .slide-label-anim {
      display: inline-flex;
      align-items: center;
      font-family: 'JetBrains Mono', 'Fira Mono', monospace, Arial;
      font-size: 2.3rem;
      letter-spacing: 0.07em;
      font-weight: 400;
      position: relative;
      z-index: 1;
      height: 48px;
      padding-left: 8px;
      padding-right: 36px;
      /* "background" will be animated via pseudo-element */
      color: #111;
      /* Text color animates from white to black as background grows */
      transition: color 0.35s cubic-bezier(.77,0,.18,1);
    }
    .slide-label-anim .icon {
      width: 28px;
      height: 28px;
      background: #111;
      border-radius: 2px;
      margin-right: 14px;
      display: inline-block;
      box-sizing: border-box;
      z-index: 2;
      position: relative;
      transition: background 0.3s;
    }

    /* Animated background effect */
    .slide-label-anim-bg {
      position: absolute;
      left: 0;
      top: 0;
      height: 48px;
      border-radius: 2px;
      background: #6a81ff;
      z-index: 0;
      transition: width 0.7s cubic-bezier(.77,0,.18,1);
      width: 0;
    }

    /* Animation triggers */
    .is-animating .slide-label-anim-bg {
      width: 100%;
    }
    .is-animating .slide-label-anim {
      color: #111;
    }

    /* Initial state: only the blue square */
    .slide-label-anim-bg {
      width: 0;
      transition: width 0.7s cubic-bezier(.77,0,.18,1);
    }
    /* Responsive */
    @media (max-width: 600px) {
      .slide-label-anim-container {
        width: 98vw;
      }
      .slide-label-anim {
        font-size: 1.25rem;
        height: 32px;
        padding-left: 6px;
        padding-right: 10px;
      }
      .slide-label-anim-bg {
        height: 32px;
      }
      .slide-label-anim .icon {
        width: 18px;
        height: 18px;
        margin-right: 7px;
        border-radius: 2.5px;
      }
    }
  </style>
</head>
<body>
  <div class="slide-label-anim-container" id="label-anim-container">
    <div class="slide-label-anim-bg"></div>
    <div class="slide-label-anim">
      <span class="icon" style="background: #6a81ff;"></span>
      COMPUTE &nbsp; + &nbsp; AI
    </div>
  </div>
  <script>
    // Animation logic: grow the label background from 0% to 100%
    window.addEventListener('DOMContentLoaded', () => {
      const container = document.getElementById('label-anim-container');
      // Start in initial state (0% width)
      setTimeout(() => {
        // Add class to trigger CSS transition
        container.classList.add('is-animating');
      }, 300); // Small delay to simulate the screenshots' staged effect
    });
  </script>
</body>
</html>
