<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cstem</title>
  <style>
    body {
      margin: 0;
      background-color: #000;
      font-family: Arial, sans-serif;
      color: white;
    }

    .container {
      padding: 40px;
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
    }

    .stack-section {
      display: flex;
      flex-direction: column;
      gap: 40px;
      margin-bottom: 60px;
    }

    .card {
      border-left: 2px solid #444;
      padding: 20px 20px 20px 40px;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      left: 10px;
      top: 24px;
      width: 12px;
      height: 12px;
      background-color: currentColor;
    }

    .title {
      font-size: 14px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }

    .description {
      font-size: 15px;
      line-height: 1.5;
      color: #ccc;
    }

    .card.apps::before {
      color: #cdea19;
    }
    .card.compute::before {
      color: #556bfc;
    }
    .card.content::before {
      color: #ff5500;
    }
  </style>
</head>
<body>
  <section class="container">
  
      <div class="stack-section">
        <div class="card apps">
          <div class="title">Apps & SDK</div>
          <div class="description">
            Content applications that enable custom workflows at scale, from creation to distribution.
          </div>
        </div>
        <div class="card compute">
          <div class="title">Compute + AI</div>
          <div class="description">
            Serverless functions and agent actions, powering your content operations for humans and AI.
          </div>
        </div>
        <div class="card content">
          <div class="title">Content Lake</div>
          <div class="description">
            The database optimized for content queries, authoring and delivery.
          </div>
        </div>
      </div>

  </section>
</body>
</html>
