<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal🎊Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans+Mono&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
      color: #000;
      font-family: "Spline Sans Mono", monospace;
      width: 100vw;
      overflow: hidden;
    }
    body {
      min-height: 100vh;
      min-width: 100vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .container {
      width: 768px;
      height: 1032px;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #slider {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(.77,0,.18,1);
    }
    .slide {
      min-width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      position: relative;
    }
    .slide img {
      width: 100%;
      height: 60%;
      object-fit: contain;
      display: block;
      user-select: none;
      pointer-events: none;
      margin-bottom: 0.5rem;
    }
    .slide-content {
      flex: 1 0 auto;
      width: 100%;
      box-sizing: border-box;
      padding: 0 24px;
      margin-top: 0;
      margin-bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      gap: 0.5rem;
    }
    /* Label base */
    .label {
      width: 100%;
      position: relative;
      padding: 0.5rem 0.5rem 0.5rem 2.5rem;
      font-size: 13px;
      text-transform: uppercase;
      line-height: 11px;
      background-color: transparent;
      overflow: visible;
      box-sizing: border-box;
    }
    /* Slide-specific label colors */
    .label.slide1::before, .label.slide1::after {
      background-color: #cdea19;
    }
    .label.slide2::before, .label.slide2::after {
      background-color: #556bfc;
    }
    .label.slide3::before, .label.slide3::after {
      background-color: #ff5500;
    }
    /* Animations only if .animate class is present */
    .label.animate::before {
      animation: squareToBlack 0.6s ease forwards;
      animation-delay: 0.2s;
    }
    .label.animate::after {
      animation: bgFill 0.8s ease forwards;
      animation-delay: 0.4s;
    }
    .label::before {
      content: "";
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      width: 11px;
      height: 11px;
      z-index: 2;
      /* background-color set by slideX class */
    }
    .label::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 0%;
      height: 100%;
      z-index: 1;
      /* background-color set by slideX class */
    }
    .label span {
      position: relative;
      z-index: 3;
      width: 100%;
      display: block;
    }
    .description {
      border-left: 2px solid #ccc;
      padding-left: 1rem;
      font-size: 15px;
      line-height: 1.5;
      color: #555;
      width: 100%;
      box-sizing: border-box;
    }
    @keyframes bgFill {
      to { width: 100%; }
    }
    @keyframes squareToBlack {
      0% { background-color: inherit; }
      100% { background-color: #141414; }
    }
    @media (max-width: 768px) {
      .container {
        width: 100vw;
        height: 100vw;
        max-width: 100vw;
        max-height: 130vw;
      }
      #slider {
        width: 100vw;
        height: 100vw;
      }
      .slide img {
        height: 45vw;
      }
      .slide-content {
        padding: 0 8vw;
        gap: 0.5rem;
        overflow-y: auto;
        max-height: 35vw;
      }
      .description {
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="slider">
      <!-- Slide 1 -->
      <div class="slide">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/BLOBs/blob-06.png" alt="🍋#cdea19" draggable="false">
        <div class="slide-content">
          <div class="label slide1"><span>Encrypted Data Pipelines</span></div>
          <div class="description">Design secure, blockchain-based data workflows for transparent and tamper-proof analytics.</div>    
        </div>
      </div>
      <!-- Slide 2 -->
      <div class="slide">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/BLOBs/blob-08.png" alt="🫐#556bfc" draggable="false">
        <div class="slide-content">
          <div class="label slide2"><span>Cyber Threat Analysis</span></div>
          <div class="description">Track anomalies and detect intrusions across neon-lit data highways.</div>      
        </div>
      </div>
      <!-- Slide 3 -->
      <div class="slide">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/BLOBs/blob-07.png" alt="🍊" draggable="false">
        <div class="slide-content">
          <div class="label slide3"><span>Content Lake</span></div>
          <div class="description">The database optimized for content queries, authoring and delivery.</div>
        </div>
      </div>
    </div>
  </div>
  <script>
    // Responsive initial slider
    const slider = document.getElementById('slider');
    const slides = document.querySelectorAll('.slide');
    let currentIndex = 0;
    const totalSlides = slides.length;

    // Animation trigger for label in visible slide
    function triggerLabelAnimation(idx) {
      slides.forEach((slide, i) => {
        const lbl = slide.querySelector('.label');
        if (lbl) {
          lbl.classList.remove('animate');
          // Force reflow for restarting animation
          void lbl.offsetWidth;
          if (i === idx) {
            lbl.classList.add('animate');
          }
        }
      });
    }

    function goToSlide(idx) {
      currentIndex = (idx + totalSlides) % totalSlides;
      slider.style.transform = `translateX(-${currentIndex * 100}%)`;
      triggerLabelAnimation(currentIndex);
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') goToSlide(currentIndex - 1);
      if (e.key === 'ArrowRight') goToSlide(currentIndex + 1);
    });

    // Touch/swipe navigation
    let startX = null;
    slider.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
    });
    slider.addEventListener('touchmove', (e) => {
      if (startX !== null) {
        let diff = e.touches[0].clientX - startX;
        if (Math.abs(diff) > 50) {
          if (diff > 0) goToSlide(currentIndex - 1);
          else goToSlide(currentIndex + 1);
          startX = null;
        }
      }
    });
    slider.addEventListener('touchend', () => {
      startX = null;
    });

    // Ensure first slide is shown and animation triggers
    goToSlide(0);

    // Prevent image drag
    document.querySelectorAll('img').forEach(img => img.addEventListener('dragstart', e => e.preventDefault()));
  </script>
</body>
</html>
