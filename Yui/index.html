<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Compute + AI</title>
  <style>
    .label {
      position: relative;
      display: inline-block;
      padding-left: 20px;
      font-family: monospace;
      font-size: 13px;
      text-transform: uppercase;
      line-height: 11px;
      transition: color 600ms ease-in-out;
      margin: 0;
      z-index: 10;
    }

    .label::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      height: 11px;
      width: 11px;
      background-color: #556bfc;
      opacity: 1;
      transition: width 1s ease-in-out;
      animation: expandBar 1s ease-in-out 2s forwards;
      /* ^ animation: name duration easing delay fill-mode */
    }

    @keyframes expandBar {
      to {
        width: 100%;
      }
    }

    @media (min-width: 1024px) {
      .label {
        text-align: right;
        display: block;
      }
    }
  </style>
</head>
<body>
  <h3 class="label">Compute + AI</h3>
</body>
</html>
