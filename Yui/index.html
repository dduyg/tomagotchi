<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SVG Layered Illustrations</title>
  <style>
    body {
      background: #111;
      display: flex;
      flex-direction: row;
      gap: 24px;
      align-items: flex-start;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
    }
    .svg-container {
      box-shadow: 0 4px 32px rgba(0,0,0,0.7);
      border-radius: 12px;
      overflow: hidden;
      background: #111;
    }
  </style>
</head>
<body>
  <div class="svg-container">
    <!-- Image 1 SVG -->
    <svg width="380" height="380" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
      <!-- Top dotted grid -->
      <g opacity="0.3">
        <g>
          <g transform="rotate(30 210 110)">
            <g>
              <g>
                <!-- Dots pattern -->
                <defs>
                  <pattern id="dotPattern1" width="10" height="10" patternUnits="userSpaceOnUse">
                    <circle cx="2.5" cy="2.5" r="1.2" fill="#fff"/>
                  </pattern>
                </defs>
                <rect x="40" y="10" width="340" height="170" fill="url(#dotPattern1)" transform="rotate(30 210 110)" />
              </g>
            </g>
          </g>
        </g>
      </g>
      <!-- Middle grid lines -->
      <g>
        <g transform="rotate(30 210 210)">
          <!-- Grid lines horizontal -->
          <g stroke="#fff" stroke-width="1" opacity="0.7">
            <!-- Horizontal -->
            <g>
              <!-- 17 lines -->
              <line x1="60" y1="60" x2="360" y2="60"/>
              <line x1="60" y1="80" x2="360" y2="80"/>
              <line x1="60" y1="100" x2="360" y2="100"/>
              <line x1="60" y1="120" x2="360" y2="120"/>
              <line x1="60" y1="140" x2="360" y2="140"/>
              <line x1="60" y1="160" x2="360" y2="160"/>
              <line x1="60" y1="180" x2="360" y2="180"/>
              <line x1="60" y1="200" x2="360" y2="200"/>
              <line x1="60" y1="220" x2="360" y2="220"/>
              <line x1="60" y1="240" x2="360" y2="240"/>
              <line x1="60" y1="260" x2="360" y2="260"/>
              <line x1="60" y1="280" x2="360" y2="280"/>
              <line x1="60" y1="300" x2="360" y2="300"/>
              <line x1="60" y1="320" x2="360" y2="320"/>
              <line x1="60" y1="340" x2="360" y2="340"/>
              <line x1="60" y1="360" x2="360" y2="360"/>
              <line x1="60" y1="380" x2="360" y2="380"/>
            </g>
            <!-- Vertical -->
            <g>
              <line x1="60" y1="60" x2="60" y2="380"/>
              <line x1="80" y1="60" x2="80" y2="380"/>
              <line x1="100" y1="60" x2="100" y2="380"/>
              <line x1="120" y1="60" x2="120" y2="380"/>
              <line x1="140" y1="60" x2="140" y2="380"/>
              <line x1="160" y1="60" x2="160" y2="380"/>
              <line x1="180" y1="60" x2="180" y2="380"/>
              <line x1="200" y1="60" x2="200" y2="380"/>
              <line x1="220" y1="60" x2="220" y2="380"/>
              <line x1="240" y1="60" x2="240" y2="380"/>
              <line x1="260" y1="60" x2="260" y2="380"/>
              <line x1="280" y1="60" x2="280" y2="380"/>
              <line x1="300" y1="60" x2="300" y2="380"/>
              <line x1="320" y1="60" x2="320" y2="380"/>
              <line x1="340" y1="60" x2="340" y2="380"/>
              <line x1="360" y1="60" x2="360" y2="380"/>
              <line x1="380" y1="60" x2="380" y2="380"/>
            </g>
          </g>
        </g>
      </g>
      <!-- Blue squares -->
      <g>
        <g transform="rotate(30 210 210)">
          <rect x="195" y="85" width="30" height="30" fill="#5fa0ff" opacity="0.8"/>
          <rect x="130" y="165" width="30" height="30" fill="#5fa0ff" opacity="0.8"/>
          <rect x="260" y="165" width="30" height="30" fill="#5fa0ff" opacity="0.8"/>
          <rect x="195" y="245" width="30" height="30" fill="#5fa0ff" opacity="0.8"/>
        </g>
      </g>
      <!-- Bottom dotted grid -->
      <g opacity="0.2">
        <g>
          <g transform="rotate(30 210 310)">
            <g>
              <defs>
                <pattern id="dotPattern2" width="10" height="10" patternUnits="userSpaceOnUse">
                  <rect x="2.5" y="2.5" width="2" height="2" fill="#fff" opacity="0.7"/>
                </pattern>
              </defs>
              <rect x="40" y="200" width="340" height="170" fill="url(#dotPattern2)" transform="rotate(30 210 310)" />
            </g>
          </g>
        </g>
      </g>
    </svg>
  </div>

              <line x1="60" y1="380" x2="360" y2="380"/>
            </g>
            <!-- Vertical -->
            <g>
              <line x1="60" y1="60" x2="60" y2="380"/>

              <line x1="100" y1="60" x2="100" y2="380"/>
              <line x1="120" y1="60" x2="120" y2="380"/>

              <line x1="160" y1="60" x2="160" y2="380"/>
              <line x1="180" y1="60" x2="180" y2="380"/>
              <line x1="200" y1="60" x2="200" y2="380"/>
              <line x1="220" y1="60" x2="220" y2="380"/>
              <line x1="240" y1="60" x2="240" y2="380"/>
              <line x1="260" y1="60" x2="260" y2="380"/>
              <line x1="280" y1="60" x2="280" y2="380"/>
              <line x1="300" y1="60" x2="300" y2="380"/>
              <line x1="320" y1="60" x2="320" y2="380"/>
              <line x1="340" y1="60" x2="340" y2="380"/>
              <line x1="360" y1="60" x2="360" y2="380"/>
              <line x1="380" y1="60" x2="380" y2="380"/>
            </g>
          </g>
        </g>
      </g>
      <!-- Bottom dotted grid -->
      <g opacity="0.2">
        <g>
          <g transform="rotate(30 210 310)">
            <defs>
              <pattern id="dotPattern4" width="10" height="10" patternUnits="userSpaceOnUse">
                <rect x="2.5" y="2.5" width="2" height="2" fill="#fff" opacity="0.7"/>
              </pattern>
            </defs>
            <rect x="40" y="200" width="340" height="170" fill="url(#dotPattern4)" transform="rotate(30 210 310)" />
          </g>
        </g>
      </g>
    </svg>
  </div>
  <div class="svg-container">
    <!-- Image 3 SVG -->
    <svg width="380" height="380" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg">
      <!-- Top dotted grid -->

              <line x1="360" y1="60" x2="360" y2="380"/>
              <line x1="380" y1="60" x2="380" y2="380"/>
            </g>
          </g>
        </g>
      </g>
      <!-- Bottom dotted grid -->
      <g opacity="0.25">
        <g>
          <g transform="rotate(30 210 310)">
            <defs>
              <pattern id="dotPattern6" width="10" height="10" patternUnits="userSpaceOnUse">
                <rect x="2.5" y="2.5" width="2" height="2" fill="#fff" opacity="0.7"/>
              </pattern>
            </defs>
            <rect x="40" y="200" width="340" height="170" fill="url(#dotPattern6)" transform="rotate(30 210 310)" />
          </g>

      </g>
      <!-- Orange squares -->
      <g>
        <g transform="rotate(30 210 310)">
          <rect x="170" y="220" width="60" height="60" fill="#ff7a2b" opacity="0.95"/>
          <rect x="250" y="220" width="30" height="30" fill="#ff7a2b" opacity="0.95"/>
        </g>
      </g>
      <!-- Red photo-like square (simulate with gradient) -->
      <g>
        <g transform="rotate(30 210 310)">
          <defs>
            <linearGradient id="redGradient" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0%" stop-color="#f00" stop-opacity="1"/>

</body>
