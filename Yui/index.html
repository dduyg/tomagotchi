<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Compute + AI</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: sans-serif;
      background-color: #111;
      color: #ccc;
    }

    .block-wrapper {
      margin-bottom: 3rem;
      width: 100%;
    }

    .cta-button {
      position: relative;
      display: flex;
      align-items: center;
      width: 100%;
      overflow: hidden;
      padding: 1rem 0;
      background: none;
      border: none;
      cursor: pointer;
    }

    .dot {
      width: 11px;
      height: 11px;
      background-color: #556bfc;
      position: absolute;
      left: 0;
      opacity: 1;
    }

    .headline {
      position: relative;
      z-index: 10;
      flex-shrink: 0;
      padding-left: 20px;
      font-family: monospace;
      font-size: 13px;
      text-transform: uppercase;
      line-height: 11px;
      transition: color 600ms ease-in-out;
    }

    .line {
      display: none;
      margin-left: 3rem;
      height: 1px;
      width: 100%;
      background-color: #797979;
    }

    @media (min-width: 1024px) {
      .line {
        display: block;
      }

      .headline {
        text-align: right;
        width: 100%;
      }
    }

    .content-container {
      position: relative;
      border-left: 2px solid #666;
      padding-left: 4rem;
    }

    @media (min-width: 1024px) {
      .content-container {
        width: 33.333%;
        border-left: none;
      }
    }

    .vertical-line {
      position: absolute;
      left: -2px;
      top: 0;
      width: 2px;
      height: 100%;
      background-color: white;
      transform-origin: bottom;
      transform: scaleY(1);
      transition: none;
    }

    @media (min-width: 1024px) {
      .vertical-line {
        opacity: 0;
      }
    }

    .description {
      font-size: 15px;
      line-height: 1.5;
      color: #999;
      transition: all 600ms ease-in-out;
    }

    @media (min-width: 1024px) {
      .description {
        transform: translateY(2rem);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <div class="block-wrapper">
    <button class="cta-button">
      <div class="dot"></div>
      <h3 class="headline">Compute + AI</h3>
      <div class="line"></div>
    </button>
    <div class="content-container">
      <div class="vertical-line"></div>
      <p class="description">
        Serverless functions and agent actions, powering your content operations for humans and AI.
      </p>
    </div>
  </div>

</body>
</html>
