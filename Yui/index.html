<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Horizontal Slider Replica</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap');
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #111;
      font-family: 'IBM Plex Mono', monospace;
      color: #fff;
      overflow: hidden;
    }
    .slider-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: #111;
    }
    .slider-track {
      display: flex;
      flex-direction: row;
      width: 300vw;
      height: 100vh;
      transition: transform 0.8s cubic-bezier(.86,0,.07,1);
    }
    .slide {
      width: 100vw;
      height: 100vh;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      background: #111;
      position: relative;
    }
    .slide-img {
      width: 100vw;
      height: 60vh;
      object-fit: cover;
      display: block;
      user-select: none;
      pointer-events: none;
      margin-bottom: 0;
    }
    .slide-label-bar {
      display: flex;
      align-items: center;
      margin-top: 20px;
      margin-left: 20px;
      height: 38px;
    }
    .slide-label-square {
      width: 24px;
      height: 24px;
      background: #111;
      border-radius: 2px;
      margin-right: 10px;
      border: none;
      flex-shrink: 0;
      display: inline-block;
    }
    .slide-label-text {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 1.45rem;
      font-weight: 400;
      letter-spacing: 0.05em;
      margin-right: 12px;
    }
    .slide-label-bar--apps {
      background: #E4FF26;
      color: #111;
      padding: 0 18px 0 8px;
      border-radius: 2px;
      min-width: 260px;
    }
    .slide-label-bar--compute {
      background: #5D6DFF;
      color: #111;
      padding: 0 18px 0 8px;
      border-radius: 2px;
      min-width: 285px;
    }
    .slide-label-bar--lake {
      background: #FF4A1C;
      color: #111;
      padding: 0 18px 0 8px;
      border-radius: 2px;
      min-width: 240px;
    }
    .slide-description {
      margin-top: 32px;
      margin-left: 32px;
      margin-right: 32px;
      max-width: 700px;
      font-size: 2rem;
      line-height: 1.25;
      font-weight: 400;
      border-left: 4px solid #fff;
      padding-left: 24px;
      letter-spacing: 0.01em;
      box-sizing: border-box;
    }
    /* Color for descriptions' left border for each slide */
    .slide--apps .slide-description {
      border-color: #E4FF26;
      color: #fff;
    }
    .slide--compute .slide-description {
      border-color: #5D6DFF;
      color: #fff;
    }
    .slide--lake .slide-description {
      border-color: #FF4A1C;
      color: #fff;
    }
    /* Colored edge cues */
    .edge-cue {
      position: absolute;
      top: 60vh;
      width: 18px;
      height: 18px;
      border-radius: 2px;
    }
    .edge-cue--right {
      right: 18px;
    }
    .edge-cue--left {
      left: 18px;
    }
    .edge-cue--apps { background: #E4FF26; }
    .edge-cue--compute { background: #5D6DFF; }
    .edge-cue--lake { background: #FF4A1C; }
    /* Navigation dots */
    .slider-dots {
      position: absolute;
      bottom: 38px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 18px;
    }
    .slider-dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
      background: #222;
      border: 2px solid #333;
      cursor: pointer;
      transition: background 0.2s, border-color 0.2s;
    }
    .slider-dot.active {
      background: #fff;
      border-color: #fff;
    }
    /* Arrows */
    .slider-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 52px;
      height: 52px;
      background: rgba(30,30,30,0.7);
      color: #fff;
      border: none;
      border-radius: 50%;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 2rem;
      transition: background 0.18s;
      user-select: none;
    }
    .slider-arrow:active {
      background: rgba(80,80,80,0.9);
    }
    .slider-arrow--left {
      left: 24px;
    }
    .slider-arrow--right {
      right: 24px;
    }
    @media (max-width: 700px) {
      .slide-description {
        font-size: 1.1rem;
        padding-left: 12px;
        margin-top: 18px;
        margin-left: 12px;
        margin-right: 12px;
      }
      .slide-label-bar {
        margin-top: 12px;
        margin-left: 8px;
        height: 29px;
      }
      .slide-label-text {
        font-size: 1.0rem;
      }
      .slide-img {
        height: 40vh;
      }
      .slider-arrow {
        width: 36px; height: 36px; font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="slider-container">
    <button class="slider-arrow slider-arrow--left" id="arrowLeft" aria-label="Previous slide" style="display:none;">&#8592;</button>
    <div class="slider-track" id="sliderTrack">
      <!-- Slide 1 -->
      <div class="slide slide--apps">
        <img src="image1" alt="Apps & SDK Slide" class="slide-img" draggable="false">
        <div class="slide-label-bar slide-label-bar--apps">
          <span class="slide-label-square"></span>
          <span class="slide-label-text">APPS &nbsp; &nbsp;SDK</span>
        </div>
        <div class="slide-description">
          Content applications that enable custom workflows at scale, from creation to distribution.
        </div>
        <div class="edge-cue edge-cue--right edge-cue--compute"></div>
      </div>
      <!-- Slide 2 -->
      <div class="slide slide--compute">
        <img src="image2" alt="Compute + AI Slide" class="slide-img" draggable="false">
        <div class="slide-label-bar slide-label-bar--compute">
          <span class="slide-label-square"></span>
          <span class="slide-label-text">COMPUTE  +  AI</span>
        </div>
        <div class="slide-description">
          Serverless functions and agent actions, powering your content operations for humans and AI.
        </div>
        <div class="edge-cue edge-cue--left edge-cue--apps"></div>
        <div class="edge-cue edge-cue--right edge-cue--lake"></div>
      </div>
      <!-- Slide 3 -->
      <div class="slide slide--lake">
        <img src="image3" alt="Content Lake Slide" class="slide-img" draggable="false">
        <div class="slide-label-bar slide-label-bar--lake">
          <span class="slide-label-square"></span>
          <span class="slide-label-text">CONTENT &nbsp;&nbsp;LAKE</span>
        </div>
        <div class="slide-description">
          The database optimized for content queries, authoring and delivery.
        </div>
        <div class="edge-cue edge-cue--left edge-cue--compute"></div>
      </div>
    </div>
    <button class="slider-arrow slider-arrow--right" id="arrowRight" aria-label="Next slide">&#8594;</button>
    <div class="slider-dots" id="sliderDots">
      <span class="slider-dot active" data-slide="0"></span>
      <span class="slider-dot" data-slide="1"></span>
      <span class="slider-dot" data-slide="2"></span>
    </div>
  </div>
  <script>
    const slides = 3;
    let current = 0;
    const sliderTrack = document.getElementById('sliderTrack');
    const dots = document.querySelectorAll('.slider-dot');
    const arrowLeft = document.getElementById('arrowLeft');
    const arrowRight = document.getElementById('arrowRight');

    function updateSlider(newIndex) {
      if(newIndex < 0 || newIndex >= slides) return;
      sliderTrack.style.transform = `translateX(-${newIndex * 100}vw)`;
      current = newIndex;
      // Update dots
      dots.forEach((dot, i) => dot.classList.toggle('active', i === current));
      // Hide/show arrows
      arrowLeft.style.display = current === 0 ? 'none' : '';
      arrowRight.style.display = current === slides - 1 ? 'none' : '';
    }
    arrowLeft.addEventListener('click', () => updateSlider(current - 1));
    arrowRight.addEventListener('click', () => updateSlider(current + 1));
    dots.forEach(dot => dot.addEventListener('click', e => {
      updateSlider(Number(dot.dataset.slide));
    }));

    // Touch & swipe support
    let startX = null;
    sliderTrack.addEventListener('touchstart', e => {
      if(e.touches.length === 1) startX = e.touches[0].clientX;
    });
    sliderTrack.addEventListener('touchmove', e => {
      // Prevent scroll while swiping
      if(startX !== null) e.preventDefault();
    }, {passive: false});
    sliderTrack.addEventListener('touchend', e => {
      if(startX === null) return;
      const endX = e.changedTouches[0].clientX;
      if(endX - startX > 50) updateSlider(current - 1);
      else if(startX - endX > 50) updateSlider(current + 1);
      startX = null;
    });

    // Keyboard navigation
    window.addEventListener('keydown', e => {
      if(e.key === 'ArrowLeft') updateSlider(current - 1);
      if(e.key === 'ArrowRight') updateSlider(current + 1);
    });

    // Initial state
    updateSlider(0);
  </script>
</body>
</html>
