<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizontal Slider</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      color: #fff;
      font-family: 'Inter', Arial, Helvetica, sans-serif;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .slider-outer {
      width: 480px;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background: #111;
      box-sizing: border-box;
    }
    .slider {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(0.6,0,0.2,1);
      will-change: transform;
    }
    .slide {
      min-width: 100%;
      height: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      position: relative;
      padding-top: 32px;
      background: #111;
    }
    .slide-canvas {
      width: 100%;
      height: 350px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      margin-bottom: 24px;
    }
    /* Title bar */
    .slide-title-bar {
      display: flex;
      align-items: center;
      margin: 0 0 0 0;
      font-size: 1.5rem;
      font-family: 'Inter', Arial, Helvetica, sans-serif;
      font-weight: 400;
      letter-spacing: 0.04em;
      line-height: 1.2;
      margin-top: 32px;
    }
    .slide-title-bar .color-block {
      width: 30px;
      height: 30px;
      background: #000;
      margin-right: 16px;
      border-radius: 2px;
      display: inline-block;
    }
    .slide-title-bar .title-text {
      padding: 3px 0 0 0;
      font-size: 1.1rem;
      font-family: inherit;
      font-weight: 400;
      letter-spacing: 0.08em;
    }
    .slide-title-bar .bar {
      height: 30px;
      margin-left: 0.5rem;
      display: inline-block;
      vertical-align: middle;
      border-radius: 2px;
    }

    /* Description */
    .slide-description {
      max-width: 98%;
      margin: 32px 0 0 0;
      font-size: 1.5rem;
      line-height: 1.25;
      font-family: 'Inter', Arial, Helvetica, sans-serif;
      font-weight: 400;
      border-left: 4px solid #888;
      padding-left: 16px;
      color: #fff;
    }

    /* Navigation dots */
    .slider-nav {
      position: absolute;
      left: 50%;
      bottom: 30px;
      transform: translateX(-50%);
      display: flex;
      gap: 18px;
      z-index: 10;
    }
    .slider-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #444;
      border: none;
      outline: none;
      opacity: 0.65;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .slider-dot.active {
      opacity: 1;
      background: #fff;
    }

    /* Arrow buttons */
    .slider-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 34px;
      color: #fff;
      background: rgba(20,20,20,0.7);
      border: none;
      width: 50px;
      height: 80px;
      cursor: pointer;
      z-index: 10;
      border-radius: 0 6px 6px 0;
      transition: background 0.2s;
      opacity: 0.8;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slider-arrow.right {
      right: 0;
      left: unset;
      border-radius: 6px 0 0 6px;
    }
    .slider-arrow.left {
      left: 0;
      border-radius: 0 6px 6px 0;
    }
    .slider-arrow:active {
      background: rgba(40,40,40,0.93);
    }
    @media (max-width: 500px) {
      .slider-outer {
        width: 100vw;
      }
      .slide-description {
        font-size: 1.1rem;
      }
    }
  </style>
</head>
<body>

        </div>

                      <line x1="55" y1="100" x2="315" y2="100" stroke="#fff" stroke-width="0.7"/>
                      <line x1="55" y1="120" x2="315" y2="120" stroke="#fff" stroke-width="0.7"/>
                      <line x1="55" y1="140" x2="315" y2="140" stroke="#fff" stroke-width="0.7"/>
                      <line x1="55" y1="160" x2="315" y2="160" stroke="#fff" stroke-width="0.7"/>
                      <line x1="55" y1="180" x2="315" y2="180" stroke="#fff" stroke-width="0.7"/>
                      <line x1="55" y1="200" x2="315" y2="200" stroke="#fff" stroke-width="0.7"/>
                      <line x1="55" y1="220" x2="315" y2="220" stroke="#fff" stroke-width="0.7"/>
                      <line x1="55" y1="240" x2="315" y2="240" stroke="#fff" stroke-width="0.7"/>
                      <line x1="55" y1="260" x2="315" y2="260" stroke="#fff" stroke-width="0.7"/>
                    </g>
                  </g>
                </g>
              </g>
            </g>
            <!-- Foreground blue shapes -->
            <g>
              <rect x="140" y="115" width="30" height="30" fill="#5275ff"/>
              <rect x="200" y="115" width="30" height="30" fill="#5275ff"/>
              <rect x="140" y="175" width="30" height="30" fill="#5275ff"/>
              <rect x="200" y="175" width="30" height="30" fill="#5275ff"/>
              <rect x="170" y="145" width="30" height="30" fill="#5275ff"/>
            </g>
          </svg>
        </div>
        <div class="slide-title-bar">
          <span class="color-block" style="background:#000"></span>

        <div class="slide-description">
          Serverless functions and agent actions, powering your content operations for humans and AI.
        </div>
      </div>
      <!-- Slide 3 -->
      <div class="slide">
        <div class="slide-canvas">
          <!-- SVG illustration for CONTENT LAKE (orange/red) -->
          <svg width="370" height="320" viewBox="0 0 370 320" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Dotted grid layer -->
            <g>
              <defs>
                <pattern id="dots3" x="0" y="0" width="16" height="16" patternUnits="userSpaceOnUse">
                  <circle cx="2" cy="2" r="1.2" fill="#fff" opacity="0.15"/>
                </pattern>
              </defs>
              <rect x="25" y="25" width="320" height="270" fill="url(#dots3)"/>
            </g>
            <!-- Middle grid layer -->
            <g>
              <g opacity="0.18">
                <g>
                  <rect x="55" y="60" width="260" height="200" fill="none" stroke="#fff" stroke-width="1"/>
                  <!-- grid lines -->
                  <g>
                    <g>
                      <!-- vertical lines -->
                      <line x1="75" y1="60" x2="75" y2="260" stroke="#fff" stroke-width="0.7"/>
                      <line x1="95" y1="60" x2="95" y2="260" stroke="#fff" stroke-width="0.7"/>
                      <line x1="115" y1="60" x2="115" y2="260" stroke="#fff" stroke-width="0.7"/>
                      <line x1="135" y1="60" x2="135" y2="260" stroke="#fff" stroke-width="0.7"/>

                      <line x1="175" y1="60" x2="175" y2="260" stroke="#fff" stroke-width="0.7"/>
                      <line x1="195" y1="60" x2="195" y2="260" stroke="#fff" stroke-width="0.7"/>

    <!-- Navigation -->
    <button class="slider-arrow left" id="slide-left" aria-label="Previous Slide">&#8592;</button>
    <button class="slider-arrow right" id="slide-right" aria-label="Next Slide">&#8594;</button>
    <div class="slider-nav" id="slider-nav">
      <button class="slider-dot active" data-slide="0" aria-label="Go to slide 1"></button>
      <button class="slider-dot" data-slide="1" aria-label="Go to slide 2"></button>
      <button class="slider-dot" data-slide="2" aria-label="Go to slide 3"></button>
    </div>
  </div>
  <script>
    const slider = document.getElementById('slider');
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.slider-dot');
    const btnLeft = document.getElementById('slide-left');
    const btnRight = document.getElementById('slide-right');
    let current = 0;
    let sliding = false;
    const slideCount = slides.length;

    function goToSlide(idx, animate=true) {
      if (sliding) return;
      if (idx < 0) idx = 0;
      if (idx >= slideCount) idx = slideCount - 1;
      sliding = true;
      slider.style.transition = animate ? 'transform 0.5s cubic-bezier(0.6,0,0.2,1)' : 'none';
      slider.style.transform = `translateX(-${idx*100}%)`;
      dots.forEach((d, i) => d.classList.toggle('active', i===idx));
      current = idx;
      setTimeout(()=>{ sliding = false; }, 500);
    }
    btnLeft.onclick = () => goToSlide(current-1);
    btnRight.onclick = () => goToSlide(current+1);

    dots.forEach((dot, idx) => {
      dot.onclick = () => goToSlide(idx);
    });

    // Touch/drag events for mobile
    let startX = null, lastX = null, dragging = false;
    slider.addEventListener('touchstart', function(e) {
      if (e.touches.length !== 1) return;
      startX = e.touches[0].clientX;
      lastX = startX;
      dragging = true;
      slider.style.transition = 'none';
    });
    slider.addEventListener('touchmove', function(e) {
      if (!dragging) return;
      let dx = e.touches[0].clientX - startX;
      slider.style.transform = `translateX(${-current*100 + dx/slider.offsetWidth*100}%)`;
      lastX = e.touches[0].clientX;
    });
    slider.addEventListener('touchend', function(e) {
      if (!dragging) return;
      dragging = false;
      let dx = lastX - startX;
      if (Math.abs(dx) > 55) {
        goToSlide(current + (dx < 0 ? 1 : -1));
      } else {
        goToSlide(current);
      }
    });

    // Keyboard navigation
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowLeft') goToSlide(current-1);
      if (e.key === 'ArrowRight') goToSlide(current+1);
    });

    // Set initial
    goToSlide(0, false);

    // Prevent double tap zoom on iOS
    let lastTouch = 0;
    document.addEventListener('touchend', function(e) {
      let now = Date.now();
      if (now - lastTouch <= 300) e.preventDefault();
      lastTouch = now;
    }, {passive: false});
  </script>
</body>
</html>
