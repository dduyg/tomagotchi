<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Horizontal Slider</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #111;
      font-family: 'Inter', 'Arial', sans-serif;
      color: #fff;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
    }

    .slider-container {
      position: relative;
      width: 400px;
      height: 700px;
      max-width: 100vw;
      max-height: 95vh;
      overflow: hidden;
      background: #111;
      border-radius: 16px;
      box-shadow: 0 0 24px #090909bb;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .slider {
      display: flex;
      transition: transform 0.5s cubic-bezier(.87,-0.41,.19,1.44);
      height: 100%;
    }

    .slide {
      min-width: 400px;
      max-width: 400px;
      height: 100%;
      box-sizing: border-box;
      padding-bottom: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: start;
      background: #111;
      position: relative;
    }

    .slide-img {
      width: 100%;
      height: 420px;
      object-fit: contain;
      margin-top: 0;
      border-radius: 0 0 0 0;
      background: #111;
      box-shadow: none;
      user-select: none;
    }

    .slide-label-bar {
      display: flex;
      align-items: center;
      margin-top: 30px;
      margin-bottom: 16px;
      font-size: 1.5rem;
      font-family: 'JetBrains Mono', 'Fira Mono', 'Menlo', monospace;
      font-weight: 500;
      letter-spacing: 0.06em;
      padding: 0;
      height: 40px;
      line-height: 40px;
    }

    .slide-label-bar .dot {
      display: inline-block;
      width: 20px;
      height: 20px;
      margin-right: 12px;
      border-radius: 2px;
      background: #111;
      border: 0;
      vertical-align: middle;
    }

    .slide-label-bar .label-text {
      letter-spacing: 0.04em;
      font-size: 1.13rem;
      font-family: inherit;
      font-weight: 500;
    }

    .slide-label-bar.apps   { background: #e4ff29; color: #111; padding: 0 0 0 8px; }
    .slide-label-bar.apps .dot { background: #111; }
    .slide-label-bar.compute { background: #5366ff; color: #111; padding: 0 0 0 8px;}
    .slide-label-bar.compute .dot { background: #111; }
    .slide-label-bar.lake   { background: #ff5500; color: #111; padding: 0 0 0 8px;}
    .slide-label-bar.lake .dot { background: #111; }

    .slide-desc {
      margin: 0 0 0 0;
      padding: 0 36px 0 24px;
      font-size: 1.45rem;
      font-weight: 400;
      color: #fff;
      letter-spacing: 0.01em;
      line-height: 1.3;
      border-left: 4px solid #fff;
      min-height: 120px;
      display: flex;
      align-items: center;
    }

    /* Border color for each slide */
    .slide.apps .slide-desc    { border-color: #e4ff29; }
    .slide.compute .slide-desc { border-color: #5366ff; }
    .slide.lake .slide-desc    { border-color: #ff5500; }

    /* Slider navigation arrows */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 2;
      width: 44px;
      height: 44px;
      background: rgba(30,30,30,0.75);
      border: none;
      color: #fff;
      font-size: 2.2rem;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.22s;
      opacity: 0.93;
      user-select: none;
    }

    .arrow:hover {
      background: #fff;
      color: #111;
    }

    .arrow.left  { left: 12px; }
    .arrow.right { right: 12px; }

    /* Dots navigation */
    .slider-dots {
      margin: 0;
      padding: 0;
      position: absolute;
      bottom: 22px;
      left: 0; right: 0;
      display: flex;
      justify-content: center;
      gap: 15px;
      z-index: 3;
    }
    .slider-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #333;
      opacity: 0.55;
      border: 2px solid #555;
      transition: background 0.25s, border 0.25s, opacity 0.22s;
      cursor: pointer;
    }
    .slider-dot.active {
      opacity: 1;
      background: #fff;
      border: 2.5px solid #e4ff29;
      box-shadow: 0 0 8px #e4ff29;
    }

    @media (max-width: 500px) {
      .slider-container, .slide {
        width: 98vw !important;
        min-width: 98vw !important;
        max-width: 98vw !important;
      }
      .slide {
        padding: 0;
      }
      .slide-desc {
        font-size: 1.08rem;
        padding: 0 12px 0 12px;
      }
      .slide-label-bar {
        font-size: 1.07rem;
      }
    }
  </style>
</head>
<body>
  <div class="slider-container" id="sliderContainer">
    <button class="arrow left" id="arrowLeft" aria-label="Previous">&#8592;</button>
    <div class="slider" id="slider">
      <!-- Slide 1 -->
      <div class="slide apps">
        <img src="image1" alt="Apps & SDK graphic" class="slide-img" draggable="false">
        <div class="slide-label-bar apps">
          <span class="dot"></span>
          <span class="label-text">APPS & SDK</span>
        </div>
        <div class="slide-desc">
          Content applications that enable custom workflows at scale, from creation to distribution.
        </div>
      </div>
      <!-- Slide 2 -->
      <div class="slide compute">
        <img src="image2" alt="Compute + AI graphic" class="slide-img" draggable="false">
        <div class="slide-label-bar compute">
          <span class="dot"></span>
          <span class="label-text">COMPUTE + AI</span>
        </div>
        <div class="slide-desc">
          Serverless functions and agent actions, powering your content operations for humans and AI.
        </div>
      </div>
      <!-- Slide 3 -->
      <div class="slide lake">
        <img src="image3" alt="Content Lake graphic" class="slide-img" draggable="false">
        <div class="slide-label-bar lake">
          <span class="dot"></span>
          <span class="label-text">CONTENT LAKE</span>
        </div>
        <div class="slide-desc">
          The database optimized for content queries, authoring and delivery.
        </div>
      </div>
    </div>
    <button class="arrow right" id="arrowRight" aria-label="Next">&#8594;</button>
    <div class="slider-dots" id="sliderDots">
      <span class="slider-dot active"></span>
      <span class="slider-dot"></span>
      <span class="slider-dot"></span>
    </div>
  </div>

  <script>
    // Slider logic
    const slider = document.getElementById('slider');
    const slides = document.querySelectorAll('.slide');
    const dots = document.querySelectorAll('.slider-dot');
    const leftArrow = document.getElementById('arrowLeft');
    const rightArrow = document.getElementById('arrowRight');
    let current = 0;

    function updateSlider() {
      slider.style.transform = `translateX(-${current * 400}px)`;
      dots.forEach((dot, i) => {
        dot.classList.toggle('active', i === current);
      });
    }

    rightArrow.onclick = () => {
      current = (current + 1) % slides.length;
      updateSlider();
    };
    leftArrow.onclick = () => {
      current = (current - 1 + slides.length) % slides.length;
      updateSlider();
    };
    dots.forEach((dot, i) => {
      dot.onclick = () => {
        current = i;
        updateSlider();
      };
    });

    // Touch swipe support
    let startX = null;
    slider.addEventListener('touchstart', e => {
      startX = e.touches[0].clientX;
    });
    slider.addEventListener('touchend', e => {
      if (startX === null) return;
      let endX = e.changedTouches[0].clientX;
      if (endX - startX > 50) leftArrow.onclick();
      else if (startX - endX > 50) rightArrow.onclick();
      startX = null;
    });

    // Keyboard arrow support
    document.addEventListener('keydown', e => {
      if (e.key === "ArrowLeft") leftArrow.onclick();
      if (e.key === "ArrowRight") rightArrow.onclick();
    });

    // Responsive slide width
    function adjustSliderWidth() {
      let w = Math.min(window.innerWidth, 400);
      slides.forEach(slide => {
        slide.style.minWidth = w + 'px';
        slide.style.maxWidth = w + 'px';
      });
      slider.style.transform = `translateX(-${current * w}px)`;
    }
    window.addEventListener('resize', adjustSliderWidth);
    adjustSliderWidth();
  </script>
</body>
</html>
