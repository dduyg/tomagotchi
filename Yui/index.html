<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Compute + AI</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
    }

    .label {
      position: relative;
      display: inline-block;
      padding-left: 20px;
      font-family: monospace;
      font-size: 13px;
      text-transform: uppercase;
      line-height: 11px;
      transition: color 600ms ease-in-out;
      margin: 0;
      z-index: 10;
      overflow: hidden;
      color: white; /* optional: color on top of the expanding background */
    }

    .label::before {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 11px;
      height: 11px;
      background-color: #556bfc;
      z-index: -1;
      opacity: 1;
      transition: all 1s ease-in-out 2s; /* 2s delay before growing */
    }

    .label.animate::before {
      width: 100%;
      height: 100%;
    }

    @media (min-width: 1024px) {
      .label {
        text-align: right;
        display: block;
      }
    }
  </style>
</head>
<body>
  <h3 class="label" id="animatedLabel">Compute + AI</h3>

  <script>
    // Add the class after page load to trigger the transition
    window.addEventListener("DOMContentLoaded", () => {
      const label = document.getElementById("animatedLabel");
      setTimeout(() => {
        label.classList.add("animate");
      }, 10); // slight delay to ensure transition starts
    });
  </script>
</body>
</html>
