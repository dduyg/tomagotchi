<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Horizontal Slider Replica</title>
  <meta name="viewport" content="width=768, initial-scale=1, maximum-scale=1, user-scalable=no">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&display=swap');

    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #101010;
      font-family: 'Roboto Mono', monospace;
      color: #fff;
      overflow: hidden;
    }

    .slider-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: stretch;
      justify-content: center;
      position: relative;
      overflow: hidden;
      background: #101010;
    }

    .slider-track {
      display: flex;
      height: 100%;
      transition: transform 0.6s cubic-bezier(.45,.05,.55,.95);
      will-change: transform;
    }

    .slider-slide {
      min-width: 100vw;
      height: 100vh;
      box-sizing: border-box;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      position: relative;
      background: #101010;
    }

    .slide-img {
      width: 100vw;
      height: 60vh;
      object-fit: cover;
      display: block;
      margin: 0 auto;
      background: #222;
    }

    .content-block {
      margin: 0 auto;
      width: 92vw;
      max-width: 700px;
      margin-top: 1.5rem;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    .label-row {
      display: flex;
      align-items: center;
      margin-bottom: 1.2rem;
      font-size: 1.65rem;
      letter-spacing: 0.04em;
      font-family: 'Roboto Mono', monospace;
      font-weight: 400;
      text-transform: none;
      height: 2.5rem;
    }
    .label-square {
      width: 1.25em;
      height: 1.25em;
      display: inline-block;
      margin-right: 0.5em;
      border-radius: 2px;
      background: currentColor;
      vertical-align: middle;
      box-shadow: 0 1px 4px #0004;
    }
    .label-yellow { color: #e6ff2f; }
    .label-blue { color: #595cff; }
    .label-orange { color: #ff4d00; }

    .label-bg {
      position: absolute;
      left: 0; top: 0;
      height: 2.2em;
      width: 100%;
      z-index: -1;
      border-radius: 2px;
      opacity: 1;
    }
    .label-bg-yellow { background: #e6ff2f; }
    .label-bg-blue { background: #595cff; }
    .label-bg-orange { background: #ff4d00; }

    .slide-desc {
      font-size: 2rem;
      font-family: 'Roboto Mono', monospace;
      margin: 0;
      margin-bottom: 0;
      line-height: 1.35;
      padding-left: 1.1rem;
      border-left: 4px solid #fff;
      font-weight: 400;
      letter-spacing: 0.01em;
      color: #fff;
      max-width: 98vw;
      text-align: left;
    }

    /* Navigation dots */
    .slider-nav {
      position: absolute;
      right: 2vw;
      top: 47vh;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      z-index: 20;
    }
    .slider-dot {
      width: 1.25rem;
      height: 1.25rem;
      border-radius: 3px;
      background: #222;
      border: none;
      cursor: pointer;
      transition: outline 0.2s, box-shadow 0.2s;
      outline: 3px solid transparent;
      box-shadow: 0 0 0 0 #0000;
      position: relative;
      border: 0;
      padding: 0;
    }
    .slider-dot.yellow { background: #e6ff2f; }
    .slider-dot.blue { background: #595cff; }
    .slider-dot.orange { background: #ff4d00; }
    .slider-dot.active {
      outline: 3px solid #fff;
      box-shadow: 0 0 0 4px #0008;
    }

    /* Arrows (optional) */
    .slider-arrows {
      position: absolute;
      left: 2vw;
      top: 47vh;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      z-index: 20;
    }
    .slider-arrow {
      background: #181818;
      color: #fff;
      border: none;
      width: 2.7rem;
      height: 2.7rem;
      border-radius: 50%;
      font-size: 2rem;
      box-shadow: 0 2px 12px #0006;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.88;
    }
    .slider-arrow:disabled {
      opacity: 0.4;
      cursor: default;
      background: #222;
    }

    /* Hide scrollbars on mobile/desktop */
    ::-webkit-scrollbar { display: none; }
    body, html { -ms-overflow-style: none; scrollbar-width: none; }

    @media (max-width: 800px) {
      .slide-desc { font-size: 1.2rem; }
      .label-row { font-size: 1rem; }
      .slider-dot, .slider-dot.active {
        width: 1rem; height: 1rem;
        border-radius: 2px;
      }
      .slider-arrow { width: 2rem; height: 2rem; font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div class="slider-container">
    <div class="slider-track" id="sliderTrack">
      <!-- Slide 1 -->
      <div class="slider-slide" aria-label="Slide 1">
        <img class="slide-img" src="image1" alt="Apps & SDK illustration">
        <div class="content-block">
          <div class="label-row label-yellow">
            <span class="label-bg label-bg-yellow"></span>
            <span class="label-square label-yellow"></span>
            APPS &nbsp; &nbsp;SDK
          </div>
          <div class="slide-desc">
            Content applications that enable custom workflows at scale, from creation to distribution.
          </div>
        </div>
      </div>
      <!-- Slide 2 -->
      <div class="slider-slide" aria-label="Slide 2">
        <img class="slide-img" src="image2" alt="Compute + AI illustration">
        <div class="content-block">
          <div class="label-row label-blue">
            <span class="label-bg label-bg-blue"></span>
            <span class="label-square label-blue"></span>
            COMPUTE &nbsp;+&nbsp; AI
          </div>
          <div class="slide-desc">
            Serverless functions and agent actions, powering your content operations for humans and AI.
          </div>
        </div>
      </div>
      <!-- Slide 3 -->
      <div class="slider-slide" aria-label="Slide 3">
        <img class="slide-img" src="image3" alt="Content Lake illustration">
        <div class="content-block">
          <div class="label-row label-orange">
            <span class="label-bg label-bg-orange"></span>
            <span class="label-square label-orange"></span>
            CONTENT &nbsp; LAKE
          </div>
          <div class="slide-desc">
            The database optimized for content queries, authoring and delivery.
          </div>
        </div>
      </div>
    </div>
    <!-- Navigation Dots -->
    <div class="slider-nav">
      <button class="slider-dot yellow active" aria-label="Go to slide 1"></button>
      <button class="slider-dot blue" aria-label="Go to slide 2"></button>
      <button class="slider-dot orange" aria-label="Go to slide 3"></button>
    </div>
    <!-- Arrow Nav (optional, for keyboard/desktop) -->
    <div class="slider-arrows">
      <button class="slider-arrow" id="arrowPrev" aria-label="Previous slide" disabled>&#8593;</button>
      <button class="slider-arrow" id="arrowNext" aria-label="Next slide">&#8595;</button>
    </div>
  </div>
  <script>
    // Slider logic
    const track = document.getElementById('sliderTrack');
    const dots = document.querySelectorAll('.slider-dot');
    const slides = document.querySelectorAll('.slider-slide');
    const arrowPrev = document.getElementById('arrowPrev');
    const arrowNext = document.getElementById('arrowNext');
    let current = 0;
    const slideCount = slides.length;

    function gotoSlide(idx) {
      current = Math.max(0, Math.min(idx, slideCount-1));
      track.style.transform = `translateX(-${current*100}vw)`;
      dots.forEach((dot,i)=>dot.classList.toggle('active',i===current));
      arrowPrev.disabled = current === 0;
      arrowNext.disabled = current === slideCount-1;
    }

    // Dot navigation
    dots.forEach((dot,i)=>{
      dot.addEventListener('click',()=>gotoSlide(i));
    });

    // Arrow navigation
    arrowPrev.addEventListener('click', ()=>gotoSlide(current-1));
    arrowNext.addEventListener('click', ()=>gotoSlide(current+1));

    // Keyboard navigation
    window.addEventListener('keydown', e=>{
      if(e.key==='ArrowLeft' || e.key==='ArrowUp') gotoSlide(current-1);
      if(e.key==='ArrowRight' || e.key==='ArrowDown') gotoSlide(current+1);
    });

    // Touch navigation
    let startX = 0, deltaX = 0;
    track.addEventListener('touchstart', e=>{
      startX = e.touches[0].clientX;
      deltaX = 0;
    });
    track.addEventListener('touchmove', e=>{
      deltaX = e.touches[0].clientX - startX;
    });
    track.addEventListener('touchend', ()=>{
      if(Math.abs(deltaX)>40){
        if(deltaX<0) gotoSlide(current+1);
        else gotoSlide(current-1);
      }
      deltaX=0;
    });

    // Initial state
    gotoSlide(0);
  </script>
</body>
</html>
