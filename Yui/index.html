<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>The Content Operating System</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui, sans-serif;
      background-color: #000;
      color: #fff;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 3rem 1.5rem;
    }

    h1 {
      font-size: 50px;
      line-height: 1.05;
      letter-spacing: -0.04em;
      margin-bottom: 2rem;
      text-align: left;
    }

    p {
      font-size: 24px;
      line-height: 1.4;
      max-width: 700px;
      margin-bottom: 2rem;
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .actions a,
    .actions button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.75rem 1.5rem;
      font-size: 16px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      border-radius: 4px;
      transition: background 0.3s;
    }

    .primary {
      background-color: #007bff;
      color: #fff;
    }

    .primary:hover {
      background-color: #0056b3;
    }

    .brand {
      background-color: #28a745;
      color: #fff;
    }

    .brand:hover {
      background-color: #1e7e34;
    }

    .outline {
      border: 2px solid #ccc;
      background: transparent;
      color: #ccc;
    }

    .outline:hover {
      border-color: #fff;
      color: #fff;
    }

    .command-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }

    svg {
      width: 1em;
      height: 1em;
      fill: currentColor;
    }

    @media (min-width: 768px) {
      h1 {
        font-size: 72px;
        text-align: center;
      }

      .actions {
        flex-direction: row;
      }
    }

    @media (min-width: 1200px) {
      h1 {
        font-size: 96px;
      }

      p {
        font-size: 32px;
      }
    }
  </style>
</head>
<body>

  <section class="container">
    <h1>The Content Operating System</h1>
    <p>
      A fully customizable all-code backend for AI, automations, and applications to author and render content.
    </p>
    <div class="actions">
      <a class="primary" href="/get-started">Start Building</a>
      <a class="brand" href="/demo-request-homepage">Watch demo</a>
      <button class="outline command-btn" onclick="copyCommand()">
        <span>npm create sanity@latest</span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 18H8V7h11v16z"/>
        </svg>
      </button>
    </div>
  </section>

  <script>
    function copyCommand() {
      const command = 'npm create sanity@latest';
      navigator.clipboard.writeText(command).then(() => {
        alert('Command copied to clipboard!');
      }, (err) => {
        alert('Failed to copy: ' + err);
      });
    }
  </script>

</body>
</html>
