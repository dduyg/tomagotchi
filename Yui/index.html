<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Label Animation</title>
  <style>
    body {
      background-color: #111;
      color: #fff;
      font-family: monospace;
      padding: 40px;
    }

    .label-wrapper {
      width: 500px; /* Shared width */
    }

    .label {
      position: relative;
      padding: 1rem 1rem 1rem 2rem;
      font-size: 14px;
      text-transform: uppercase;
      overflow: hidden;
      background-color: transparent;
      animation: bgExpand 1.5s ease forwards;
    }

    .label::before {
      content: "";
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      width: 12px;
      height: 12px;
      background-color: #000; /* final color is black */
      z-index: 2;
      animation: squareColor 0s linear forwards;
    }

    .label::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: #ff5500;
      z-index: 1;
      transform: scaleX(0);
      transform-origin: left;
      animation: fillBg 1.5s ease forwards;
    }

    .label span {
      position: relative;
      z-index: 3;
      letter-spacing: 2px;
    }

    .description {
      border-left: 2px solid white;
      padding-left: 1rem;
      font-size: 18px;
      line-height: 1.5;
      max-width: 100%;
    }

    /* Animations */
    @keyframes fillBg {
      from { transform: scaleX(0); }
      to { transform: scaleX(1); }
    }
    @keyframes squareColor {
      from { background-color: #ff5500; }
      to { background-color: #000; }
    }
    /* Add delay if you want them to stagger */
    .label::before {
      animation-delay: 5s;
    }
    .label::after {
      animation-delay: 5s;
    }
  </style>
</head>
<body>

  <div class="label-wrapper">
    <div class="label">
      <span>Content&nbsp;&nbsp;Lake</span>
    </div>
    <div class="description">
      The database optimized for content queries, authoring and delivery.
    </div>
  </div>

</body>
</html>
