<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal🎊Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans+Mono&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
      color: #000;
      font-family: "Spline Sans Mono", monospace;
      width: 100vw;
      overflow: hidden;
      box-sizing: border-box;
    }
    body {
      min-height: 100vh;
      min-width: 100vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .slider-container {
      width: 768px;
      height: 1032px;
      max-width: 95vw;
      max-height: 95vh;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 6px 24px rgba(0,0,0,0.07);
    }
    .slider {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(.77,0,.18,1);
    }
    .slide {
      min-width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      position: relative;
    }
    .slide img {
      width: 100%;
      height: auto;
      max-height: 65vh;
      display: block;
      object-fit: contain;
      margin-bottom: 32px;
      user-select: none;
      pointer-events: none;
      background: #f7f7f7;
      border-radius: 12px 12px 0 0;
    }
    .slide-content {
      width: 100%;
      box-sizing: border-box;
      padding: 0 32px 0 32px;
      margin-top: 0;
      margin-bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      min-height: 220px;
      gap: 14px;
    }
    .label {
      position: relative;
      width: 100%;
      padding: 18px 18px 18px 42px;
      font-size: 14.5px;
      text-transform: uppercase;
      line-height: 1.2;  
      overflow: hidden;
      background-color: transparent;
      box-sizing: border-box;
      font-weight: 600;
      letter-spacing: 1.5px;
    }
    .label::before {
      content: "";
      position: absolute;
      left: 18px;
      top: 50%;
      transform: translateY(-50%);
      width: 18px;
      height: 18px;
      background-color: #ff5500;
      z-index: 2;
      border-radius: 4px;
      animation: squareToBlack 0.6s ease forwards;
      animation-delay: 0.2s;
    }
    .label::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 0%;
      height: 100%;
      background-color: #ff5500;
      z-index: 1;
      animation: bgFill 0.8s ease forwards;
      animation-delay: 0.4s;
      border-radius: 4px;
    }
    .label span {
      position: relative;
      z-index: 3;
      width: 100%;
      display: block;
    }
    .description {
      border-left: 2px solid #ff5500;
      padding-left: 1.5rem;
      font-size: 16px;
      line-height: 1.6;
      color: #444;
      margin-top: 10px;
      margin-bottom: 10px;
      min-height: 80px;
      background: #faf9f6;
      border-radius: 0 0 10px 10px;
    }
    @keyframes bgFill {
      to { width: 100%; }
    }
    @keyframes squareToBlack {
      0% { background-color: #ff5500; }
      100% { background-color: #141414; }
    }
    @media (max-width: 900px) {
      .slider-container {
        width: 98vw;
        height: auto;
        max-width: 100vw;
        max-height: 100vh;
        min-height: 600px;
        border-radius: 12px;
      }
      .slide img {
        max-height: 36vh;
        margin-bottom: 16px;
      }
      .slide-content {
        padding: 0 10vw 0 10vw;
        min-height: 160px;
      }
      .label {
        padding: 12px 12px 12px 32px;
        font-size: 13px;
      }
    }
    @media (max-width: 600px) {
      .slider-container {
        width: 100vw;
        height: auto;
        min-height: 400px;
        border-radius: 0;
      }
      .slide img {
        max-height: 22vh;
        margin-bottom: 10px;
      }
      .slide-content {
        padding: 0 5vw 0 5vw;
        min-height: 120px;
      }
      .label {
        padding: 8px 8px 8px 18px;
        font-size: 12px;
      }
      .description {
        font-size: 14px;
        min-height: 50px;
        padding-left: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="slider-container" id="slider-container">
    <div class="slider" id="slider">
      <!-- Slide 1 -->
      <div class="slide">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/BLOBs/blob-06.png" alt="🍋#cdea19" draggable="false">
        <div class="slide-content">
          <div class="label"><span>APPS &nbsp; &nbsp; SDK</span></div>
          <div class="description">Content applications that enable custom workflows at scale, from creation to distribution.</div>    
        </div>
      </div>
      <!-- Slide 2 -->
      <div class="slide">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/BLOBs/blob-08.png" alt="🫐#556bfc" draggable="false">
        <div class="slide-content">
          <div class="label"><span>COMPUTE &nbsp; + &nbsp; AI</span></div>
          <div class="description">Serverless functions and agent actions, powering your content operations for humans and AI.</div>      
        </div>
      </div>
      <!-- Slide 3 -->
      <div class="slide">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/BLOBs/blob-07.png" alt="🍊" draggable="false">
        <div class="slide-content">
          <div class="label"><span>Content &nbsp; Lake</span></div>
          <div class="description">The database optimized for content queries, authoring and delivery.</div>
        </div>
      </div>
    </div>
  </div>
  <script>
    // Responsive initial slider
    const slider = document.getElementById('slider');
    const slides = document.querySelectorAll('.slide');
    let currentIndex = 0;
    const totalSlides = slides.length;

    function goToSlide(idx) {
      currentIndex = (idx + totalSlides) % totalSlides;
      slider.style.transform = `translateX(-${currentIndex * 100}%)`;
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') goToSlide(currentIndex - 1);
      if (e.key === 'ArrowRight') goToSlide(currentIndex + 1);
    });

    // Touch/swipe navigation
    let startX = null;
    slider.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
    });
    slider.addEventListener('touchmove', (e) => {
      if (startX !== null) {
        let diff = e.touches[0].clientX - startX;
        if (Math.abs(diff) > 50) {
          if (diff > 0) goToSlide(currentIndex - 1);
          else goToSlide(currentIndex + 1);
          startX = null;
        }
      }
    });
    slider.addEventListener('touchend', () => {
      startX = null;
    });

    // Ensure first slide is shown
    goToSlide(0);

    // Prevent image drag
    document.querySelectorAll('img').forEach(img => img.addEventListener('dragstart', e => e.preventDefault()));
  </script>
</body>
</html>
