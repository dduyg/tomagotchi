<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Field Background</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: white;
      overflow: hidden;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100%;
      text-align: center;
      background-color: rgba(255,255,255,0.7); /* Light overlay for text contrast */
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <canvas id="fieldCanvas"></canvas>

  <div class="content">
    <h1>Stylized Field Background</h1>
    <p>Background generated using canvas to replicate a field-like pattern.</p>
  </div>

  <script>
    const canvas = document.getElementById("fieldCanvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      drawFieldPattern();
    }

    function drawFieldPattern() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#000";
      const cols = 80;
      const rows = 40;

      for (let i = 0; i < cols; i++) {
        for (let j = 0; j < rows; j++) {
          const x = (canvas.width / cols) * i;
          const y = (canvas.height / rows) * j;

          // Create a mirrored parabolic field-like curve
          const centerX = canvas.width / 2;
          const centerY = canvas.height / 2;
          const dx = x - centerX;
          const dy = y - centerY;
          const dist = Math.sqrt(dx * dx + dy * dy);

          const angle = Math.atan2(dy, dx);
          const wave = Math.sin((dist / 30) - (angle * 5));

          // Density control (more in center)
          const intensity = Math.exp(-dist * 0.002);

          if (Math.random() < intensity * 0.6 + wave * 0.2) {
            ctx.font = "10px monospace";
            ctx.fillText(
              pickChar(),
              x + (Math.random() - 0.5) * 2,
              y + (Math.random() - 0.5) * 2
            );
          }
        }
      }
    }

    function pickChar() {
      const chars = ["v", "V", "l", "i", "I", "s", "S", ".", ":", "|", "Y", "E", "M"];
      return chars[Math.floor(Math.random() * chars.length)];
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();
  </script>
</body>
</html>
