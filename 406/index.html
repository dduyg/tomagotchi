<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal🎊Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans+Mono&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
      color: #000;
      font-family: "Spline Sans Mono", monospace;
      width: 100vw;
      min-width: 100vw;
      box-sizing: border-box;
      overflow-x: hidden;
    }
    body {
      min-height: 100vh;
      min-width: 100vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .slider-container {
      width: 768px;
      max-width: 100vw;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
      background: #f9f9f9;
    }
    .slider {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(.77,0,.18,1);
    }
    .slide {
      min-width: 100%;
      box-sizing: border-box;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      position: relative;
      height: 100vh;
      background: #fff;
      overflow: visible;
    }
    .slide img {
      display: block;
      width: 100%;
      max-height: 450px;
      object-fit: contain;
      user-select: none;
      pointer-events: none;
      margin: 0 auto;
      background: #f9f9f9;
    }
    .slide-content {
      width: 100%;
      box-sizing: border-box;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      flex: 1 1 auto;
    }
    .label {
      width: 100%;
      position: relative;
      padding: 1rem 1.5rem;
      font-size: 13px;
      text-transform: uppercase;
      line-height: 1.2;
      overflow: hidden;
      background-color: transparent;
      box-sizing: border-box;
      margin-bottom: 0.5rem;
      letter-spacing: 0.5px;
    }
    .label::before {
      content: "";
      position: absolute;
      left: 1.5rem;
      top: 50%;
      transform: translateY(-50%);
      width: 11px;
      height: 11px;
      background-color: #ff5500;
      z-index: 2;
      animation: squareToBlack 0.6s ease forwards;
      animation-delay: 0.2s;
      border-radius: 2px;
    }
    .label::after {
      content: "";
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, #ff5500 0 60px, transparent 60px 100%);
      z-index: 1;
      opacity: 0.07;
      animation: none;
    }
    .label span {
      position: relative;
      z-index: 3;
      width: 100%;
      display: block;
    }
    .description {
      border-left: 2px solid #ff5500;
      padding: 1rem 1.5rem;
      font-size: 16px;
      color: #222;
      background: #f8f8f8;
      margin-bottom: 1rem;
      margin-top: 0;
      min-height: 96px;
      line-height: 1.6;
      box-sizing: border-box;
      width: 100%;
      word-break: break-word;
    }
    /* Keyframes */
    @keyframes bgFill {
      to { width: 100%; }
    }
    @keyframes squareToBlack {
      0% { background-color: #ff5500; }
      100% { background-color: #141414; }
    }

    @media (max-width: 768px) {
      .slider-container {
        width: 100vw;
        min-height: 100vh;
        height: auto;
        padding: 0;
      }
      .slider {
        width: 100vw;
      }
      .slide {
        min-width: 100vw;
        height: auto;
        padding-bottom: 2rem;
      }
      .slide img {
        max-height: 50vw;
      }
      .slide-content {
        padding: 0;
      }
      .label, .description {
        padding-left: 1rem;
        padding-right: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="slider-container" id="slider-container">
    <div class="slider" id="slider">
      <!-- Slide 1 -->
      <div class="slide">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/BLOBs/blob-06.png" alt="🍋#cdea19" draggable="false">
        <div class="slide-content">
          <div class="label"><span>APPS &nbsp; &nbsp; SDK</span></div>
          <div class="description">Content applications that enable custom workflows at scale, from creation to distribution.</div>    
        </div>
      </div>
      <!-- Slide 2 -->
      <div class="slide">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/BLOBs/blob-08.png" alt="🫐#556bfc" draggable="false">
        <div class="slide-content">
          <div class="label"><span>COMPUTE &nbsp; + &nbsp; AI</span></div>
          <div class="description">Serverless functions and agent actions, powering your content operations for humans and AI.</div>      
        </div>
      </div>
      <!-- Slide 3 -->
      <div class="slide">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/BLOBs/blob-07.png" alt="🍊" draggable="false">
        <div class="slide-content">
          <div class="label"><span>Content &nbsp; Lake</span></div>
          <div class="description">The database optimized for content queries, authoring and delivery.</div>
        </div>
      </div>
    </div>
  </div>
  <script>
    // Responsive initial slider
    const slider = document.getElementById('slider');
    const slides = document.querySelectorAll('.slide');
    let currentIndex = 0;
    const totalSlides = slides.length;

    function goToSlide(idx) {
      currentIndex = (idx + totalSlides) % totalSlides;
      slider.style.transform = `translateX(-${currentIndex * 100}%)`;
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') goToSlide(currentIndex - 1);
      if (e.key === 'ArrowRight') goToSlide(currentIndex + 1);
    });

    // Touch/swipe navigation
    let startX = null;
    slider.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
    });
    slider.addEventListener('touchmove', (e) => {
      if (startX !== null) {
        let diff = e.touches[0].clientX - startX;
        if (Math.abs(diff) > 50) {
          if (diff > 0) goToSlide(currentIndex - 1);
          else goToSlide(currentIndex + 1);
          startX = null;
        }
      }
    });
    slider.addEventListener('touchend', () => {
      startX = null;
    });

    // Ensure first slide is shown
    goToSlide(0);

    // Prevent image drag
    document.querySelectorAll('img').forEach(img => img.addEventListener('dragstart', e => e.preventDefault()));
  </script>
</body>
</html>
