<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>slide in slide out</title>
  <style>
body {
	display: flex;
	justify-content: center;
}

.wrapper {
	display: flex;
	justify-content: center;
	align-items: center;
	width: 100vw; /* Full viewport width */
	height: 100vh;
	position: relative;
	overflow: hidden; /* Hide car when it's outside the wrapper */
	background-color: white;
}

#logo {
	position: absolute;
	z-index: 1;
	width: 96vw;
	left: 50%;
	top: 50%;
	transform: translate(-50%, -50%);
}

#blob {
	width: 28vw;
	position: absolute;
	z-index: 2;
	top: 50%;
	left: 0;
	transform: translateY(-50%);
	animation: slide-blob 5s ease-out forwards;
}

	  @keyframes slide-blob {
	0% { 
	
		left: -60vh; /* Start off screen to the left */ 
	}
	100% {
		left: 80%; /* end on 80% of the wrapper/logo */
		transform: translate(-50%, -50%);
	}
}
  </style>
</head>
<body>
 <div class="wrapper">	
    <img id="logo" src="https://cdn.jsdelivr.net/gh/dduyg/LiminalLoop@main/06/helloWorld.gif" alt="👋🏻">
    <img id="blob" src="https://cdn.jsdelivr.net/gh/dduyg/LiminalLoop@main/06/BLOBs/blob-05.png" alt="🔮">
 </div>  
</body>
</html>
