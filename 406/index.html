<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LiminalLoop</title>
    <style>     
        @font-face {
            font-family: 'ABC Camera';
            src: url('./ABCCamera-Regular.woff2') format('woff2'); 
            font-weight: 400;
            font-style: normal;
        }
        body {
            background-image: linear-gradient(to left, #b0a8b9, #b497b4, #bd84a5, #c7708d, #cb5c6c, #ca5e62, #c86058, #c5634f);
            font-family: 'ABC Camera', sans-serif;
            color: #fff;
            text-align: center;
            padding: 50px;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            position: relative;
        }
        h1 {
            font-size: 72px;
            margin-bottom: 20px;
        }
        p {
            font-size: 24px;
            margin-bottom: 40px;
        }
        a {
            display: inline-block;
            padding: 15px 30px;
            font-size: 18px;
            color: #000;
            background-color: #fff;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        a:hover {
            background-color: #f0f0f0;
        }
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="stars"></div>
    <h1>404</h1>
    <p>Oops! You've entered a dimension that doesn’t exist.</p>
    <p>It's a cyber world out there, and you're lost in the pixelated void!</p>
    <a href="/">Go Back to Homepage</a>
</body>
</html>
