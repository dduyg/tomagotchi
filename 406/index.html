<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>With Stardust</title>
  <style>
    @font-face {
      font-family: 'ABC Camera';
      src: url('https://cdn.jsdelivr.net/gh/dduyg/LiminalLoop@main/fonts/ABCCamera-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: white;
      font-family: 'ABC Camera', sans-serif;
    }

    .layout-content {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: center;
      align-items: center;
      color: black;
      font-size: 2rem;
    }

    .layout-gradients {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .stardust-overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity: 0.5;
      pointer-events: none;
      z-index: 1;
    }

    .gradient {
      position: absolute;
      width: 40vw;
      height: 40vw;
      border-radius: 50%;
      opacity: 0.6;
      filter: blur(150px);
      mix-blend-mode: screen;
      animation: float 20s infinite ease-in-out alternate;
      z-index: 0;
    }

    @media (max-width: 600px) {
      .gradient {
        width: 60vw;
        height: 60vw;
        filter: blur(100px);
      }
    }

    @keyframes float {
      0% { transform: translateY(0px) translateX(0px); }
      100% { transform: translateY(-5vh) translateX(5vw); }
    }

    .gradient-1  { background: radial-gradient(circle, #948aa5 0%, transparent 50%); top: 20vh; left: 0vw; }
    .gradient-2  { background: radial-gradient(circle, #948aa5 0%, transparent 50%); top: 5vh; right: 0vw; }
    .gradient-3  { background: radial-gradient(circle, #91c9bf 0%, transparent 50%); bottom: 40vh; left: 20vw; }
    .gradient-4  { background: radial-gradient(circle, #f06423 0%, transparent 50%); bottom: 5vh; right: 10vw; }
    .gradient-5  { background: radial-gradient(circle, #948aa5 0%, transparent 50%); bottom: 0vh; left: -30vw; }
    .gradient-6  { background: radial-gradient(circle, #fffe96 0%, transparent 50%); top: -10vh; left: -5vw; }
    .gradient-7  { background: radial-gradient(circle, #f06423 0%, transparent 50%); bottom: -30vh; left: 0vw; }
    .gradient-8  { background: radial-gradient(circle, #91c9bf 0%, transparent 50%); bottom: -40vh; right: -30vw; }
    .gradient-9  { background: radial-gradient(circle, #948aa5 0%, transparent 50%); top: -35vh; left: -25vw; }
    .gradient-10 { background: radial-gradient(circle, #f06423 0%, transparent 50%); top: 10vh; left: -25vw; }
    .gradient-11 { background: radial-gradient(circle, #f06423 0%, transparent 50%); top: -35vh; left: 25vw; }
    .gradient-12 { background: radial-gradient(circle, #91c9bf 0%, transparent 50%); top: 0vh; right: -20vw; }
    .gradient-13 { background: radial-gradient(circle, #666 0%, transparent 50%); bottom: -25vh; right: -20vw; }
    .gradient-14 { background: radial-gradient(circle, #fffe96 0%, transparent 50%); bottom: 5vh; left: 15vw; }
    .gradient-15 { background: radial-gradient(circle, #fffe96 0%, transparent 50%); top: 30vh; right: -10vw; }
  </style>
</head>
<body>
  <div class="layout-content">
    Hello Gradient World
    <div class="layout-gradients">
      <div class="stardust-overlay"></div>

      <div class="gradient gradient-1"></div>
      <div class="gradient gradient-2"></div>
      <div class="gradient gradient-3"></div>
      <div class="gradient gradient-4"></div>
      <div class="gradient gradient-5"></div>
      <div class="gradient gradient-6"></div>
      <div class="gradient gradient-7"></div>
      <div class="gradient gradient-8"></div>
      <div class="gradient gradient-9"></div>
      <div class="gradient gradient-10"></div>
      <div class="gradient gradient-11"></div>
      <div class="gradient gradient-12"></div>
      <div class="gradient gradient-13"></div>
      <div class="gradient gradient-14"></div>
      <div class="gradient gradient-15"></div>
    </div>
  </div>
</body>
</html>
