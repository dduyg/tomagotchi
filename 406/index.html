<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ASCII-Style Field Background</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background: #fff;
      font-family: monospace;
    }

    canvas {
      position: fixed;
      top: 0;
      left: 0;
      z-index: -1;
    }

    .content {
      position: relative;
      z-index: 1;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      text-align: center;
      background-color: rgba(255, 255, 255, 0.0); /* Fully transparent for now */
    }
  </style>
</head>
<body>
  <canvas id="bg-canvas"></canvas>

  <div class="content">
    <h1>ASCII Field Style Background</h1>
    <p>This background mimics the mirrored vector field pattern.</p>
  </div>

  <script>
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');

    function drawPattern() {
      const w = canvas.width = window.innerWidth;
      const h = canvas.height = window.innerHeight;
      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = '#000';
      ctx.font = '8px monospace';

      const cols = 100;
      const rows = 60;
      const centerX = w / 2;
      const centerY = h / 4;

      function drawField(yOffset = 0, flip = 1) {
        for (let i = 0; i < cols; i++) {
          for (let j = 0; j < rows / 2; j++) {
            const x = (w / cols) * i;
            const y = (h / rows) * j;

            const dx = x - centerX;
            const dy = y - centerY;
            const dist = Math.sqrt(dx * dx + dy * dy);

            const density = Math.exp(-dist * 0.02);
            const curve = Math.sin(dx * 0.01) * 20;

            if (Math.random() < density * 0.8) {
              const char = pickChar();
              ctx.fillText(char, x, flip * (y + curve) + yOffset);
            }
          }
        }
      }

      function pickChar() {
        const chars = ['v', 'V', 'l', '|', 'i', ':', '.', 'Y', 'E', 'M', 'S'];
        return chars[Math.floor(Math.random() * chars.length)];
      }

      // Top half
      drawField(h * 0.25, 1);

      // Bottom mirror
      drawField(h * 0.75, -1);
    }

    window.addEventListener('resize', drawPattern);
    drawPattern();
  </script>
</body>
</html>
