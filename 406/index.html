<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>With Stardust</title>
  <style>
    @font-face {
      font-family: 'ABC Camera';
      src: url('https://cdn.jsdelivr.net/gh/dduyg/LiminalLoop@main/fonts/ABCCamera-Regular.woff2') format('woff2');
      font-weight: 400;
      font-style: normal;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: white;
      font-family: 'ABC Camera', sans-serif;
    }

    .layout-content {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 2;
      color: black;
      font-size: 2rem;
      text-align: center;
    }

    .layout-gradients {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .stardust-overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('https://www.transparenttextures.com/patterns/stardust.png');
      opacity: 0.5;
      pointer-events: none;
      z-index: 1;
    }

    .gradient {
      position: absolute;
      width: 40vw;
      height: 40vw;
      max-width: 500px;
      max-height: 500px;
      border-radius: 50%;
      filter: blur(15vw);
      mix-blend-mode: screen;
      animation: fade 8s ease-in-out infinite;
      z-index: 0;
    }

    @keyframes fade {
      0%, 100% { opacity: 0.1; }
      50%      { opacity: 0.6; }
    }

    /* Add staggered delays for organic motion */
    .gradient-1  { background: radial-gradient(circle, #948aa5 0%, transparent 50%); left: 5vw; top: 20vh; animation-delay: 0s; }
    .gradient-2  { background: radial-gradient(circle, #948aa5 0%, transparent 50%); right: 5vw; top: 10vh; animation-delay: 1s; }
    .gradient-3  { background: radial-gradient(circle, #91c9bf 0%, transparent 50%); left: 15vw; bottom: 25vh; animation-delay: 2s; }
    .gradient-4  { background: radial-gradient(circle, #f06423 0%, transparent 50%); right: 10vw; bottom: 10vh; animation-delay: 3s; }
    .gradient-5  { background: radial-gradient(circle, #948aa5 0%, transparent 50%); left: 5vw; bottom: 5vh; animation-delay: 4s; }
    .gradient-6  { background: radial-gradient(circle, #fffe96 0%, transparent 50%); left: 5vw; top: 5vh; animation-delay: 5s; }
    .gradient-7  { background: radial-gradient(circle, #f06423 0%, transparent 50%); left: 10vw; bottom: 10vh; animation-delay: 6s; }
    .gradient-8  { background: radial-gradient(circle, #91c9bf 0%, transparent 50%); right: 10vw; bottom: 15vh; animation-delay: 7s; }
    .gradient-9  { background: radial-gradient(circle, #948aa5 0%, transparent 50%); left: 10vw; top: 10vh; animation-delay: 1.5s; }
    .gradient-10 { background: radial-gradient(circle, #f06423 0%, transparent 50%); left: 15vw; top: 25vh; animation-delay: 2.5s; }
    .gradient-11 { background: radial-gradient(circle, #f06423 0%, transparent 50%); left: 25vw; top: 5vh; animation-delay: 3.5s; }
    .gradient-12 { background: radial-gradient(circle, #91c9bf 0%, transparent 50%); right: 5vw; top: 15vh; animation-delay: 4.5s; }
    .gradient-13 { background: radial-gradient(circle, #666 0%, transparent 50%); right: 10vw; bottom: 5vh; animation-delay: 5.5s; }
    .gradient-14 { background: radial-gradient(circle, #fffe96 0%, transparent 50%); left: 20vw; bottom: 10vh; animation-delay: 6.5s; }
    .gradient-15 { background: radial-gradient(circle, #fffe96 0%, transparent 50%); right: 15vw; top: 30vh; animation-delay: 7.5s; }
  </style>
</head>
<body>
  <div class="layout-content">
    Hello Gradient World
    <div class="layout-gradients">
      <div class="stardust-overlay"></div>

      <div class="gradient gradient-1"></div>
      <div class="gradient gradient-2"></div>
      <div class="gradient gradient-3"></div>
      <div class="gradient gradient-4"></div>
      <div class="gradient gradient-5"></div>
      <div class="gradient gradient-6"></div>
      <div class="gradient gradient-7"></div>
      <div class="gradient gradient-8"></div>
      <div class="gradient gradient-9"></div>
      <div class="gradient gradient-10"></div>
      <div class="gradient gradient-11"></div>
      <div class="gradient gradient-12"></div>
      <div class="gradient gradient-13"></div>
      <div class="gradient gradient-14"></div>
      <div class="gradient gradient-15"></div>
    </div>
  </div>
</body>
</html>
