<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gradient Background</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
      background: white;
    }

    .layout-content {
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      color: black;
      font-size: 2rem;
    }

    .layout-gradients {
      position: absolute;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
      top: 0;
      left: 0;
      z-index: 0;
    }

    .gradient {
      position: absolute;
      width: 500px;
      height: 500px;
      border-radius: 50%;
      opacity: 0.6;
      filter: blur(150px);
      mix-blend-mode: screen;
      animation: float 20s infinite ease-in-out alternate;
    }

    @keyframes float {
      0% { transform: translateY(0px) translateX(0px); }
      100% { transform: translateY(-100px) translateX(100px); }
    }

    .gradient-1  { background: radial-gradient(circle, #948aa5 0%, transparent 50%); left: 0%; top: 20%; }
    .gradient-2  { background: radial-gradient(circle, #948aa5 0%, transparent 50%); right: 0; top: 5%; }
    .gradient-3  { background: radial-gradient(circle, #91c9bf 0%, transparent 50%); left: 20%; bottom: 40%; }
    .gradient-4  { background: radial-gradient(circle, #f06423 0%, transparent 50%); right: 10%; bottom: 5%; }
    .gradient-5  { background: radial-gradient(circle, #948aa5 0%, transparent 50%); left: -30%; bottom: 0%; }
    .gradient-6  { background: radial-gradient(circle, #fffe96 0%, transparent 50%); left: -5%; top: -10%; }
    .gradient-7  { background: radial-gradient(circle, #f06423 0%, transparent 50%); left: 0%; bottom: -30%; }
    .gradient-8  { background: radial-gradient(circle, #91c9bf 0%, transparent 50%); right: -30%; bottom: -40%; }
    .gradient-9  { background: radial-gradient(circle, #948aa5 0%, transparent 50%); left: -25%; top: -35%; }
    .gradient-10 { background: radial-gradient(circle, #f06423 0%, transparent 50%); left: -25%; top: 10%; }
    .gradient-11 { background: radial-gradient(circle, #f06423 0%, transparent 50%); left: 25%; top: -35%; }
    .gradient-12 { background: radial-gradient(circle, #91c9bf 0%, transparent 50%); right: -20%; top: 0%; }
    .gradient-13 { background: radial-gradient(circle, #666 0%, transparent 50%); right: -20%; bottom: -25%; }
    .gradient-14 { background: radial-gradient(circle, #fffe96 0%, transparent 50%); left: 15%; bottom: 5%; }
    .gradient-15 { background: radial-gradient(circle, #fffe96 0%, transparent 50%); right: -10%; top: 30%; }

    Hello Gradient World

      <div class="gradient gradient-1"></div>
