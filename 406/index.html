<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Liminal🎊Loop</title>
  <link href="https://fonts.googleapis.com/css2?family=Spline+Sans+Mono&display=swap" rel="stylesheet">
  <style>
    html, body {
      height: 100%;
      margin: 0;
      padding: 0;
      background: #141414;
      color: #fff;
      font-family: "Spline Sans Mono", monospace;
      width: 100vw;
      overflow: hidden;
    }
    body {
      min-height: 100vh;
      min-width: 100vw;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .slider-container {
      width: 420px;
      max-width: 98vw;
      height: 700px;
      max-height: 98vh;
      overflow: hidden;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #141414;
      box-shadow: 0 2px 32px #000c;
      border-radius: 18px;
    }
    .slider {
      display: flex;
      flex-direction: row;
      width: 100%;
      height: 100%;
      transition: transform 0.5s cubic-bezier(.77,0,.18,1);
    }
    .slide {
      min-width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      position: relative;
      background: #141414;
    }
    .slide img {
      width: 100%;
      height: 340px;
      object-fit: contain;
      display: block;
      background: #141414;
      margin-bottom: 0;
      margin-top: 24px;
      border-radius: 12px;
      box-shadow: 0 2px 28px #000d;
      user-select: none;
      pointer-events: none;
    }
    .slide-content {
      width: 100%;
      box-sizing: border-box;
      padding: 0 0 0 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: stretch;
      justify-content: flex-start;
      gap: 0;
    }
    .label {
      width: 100%;
      display: flex;
      align-items: center;
      background: #ff5500;
      color: #141414;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 0.8rem 0 0.8rem 1.8rem;
      margin: 30px 0 0 0;
      position: relative;
      border-radius: 3px;
    }
    .label .icon {
      display: inline-block;
      width: 17px;
      height: 17px;
      background: #141414;
      margin-right: 16px;
      border-radius: 2px;
      flex-shrink: 0;
    }
    .label span {
      position: relative;
      z-index: 3;
      font-weight: 500;
      font-size: 18px;
      letter-spacing: 1.2px;
    }
    .description {
      border-left: 3px solid #ff5500;
      padding-left: 1.1rem;
      font-size: 22px;
      font-weight: 400;
      line-height: 1.3;
      color: #fff;
      margin-top: 18px;
      margin-bottom: 0;
      word-break: break-word;
    }
    @media (max-width: 520px) {
      .slider-container {
        width: 98vw;
        height: 95vw;
        min-height: 350px;
        max-height: 110vw;
        border-radius: 0;
      }
      .slide img {
        height: 38vw;
        min-height: 120px;
        margin-top: 10vw;
      }
      .label {
        font-size: 14px;
        padding: 0.7rem 0 0.7rem 1.2rem;
      }
      .label .icon {
        width: 12px;
        height: 12px;
        margin-right: 10px;
      }
      .description {
        font-size: 16px;
        padding-left: 0.9rem;
        margin-top: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="slider-container" id="slider-container">
    <div class="slider" id="slider">
      <!-- Slide 1 -->
      <div class="slide">
        <img src="https://raw.githubusercontent.com/dduyg/LiminalLoop/main/06/BLOBs/blob-06.png" alt="🍋#cdea19" draggable="false">
        <div class="slide-content">
          <div class="label"><span class="icon"></span><span>CONTENT LAKE</span></div>
          <div class="description">The database optimized for content queries, authoring and delivery.</div>
        </div>
      </div>
      <!-- Add more slides here following the above structure -->
    </div>
  </div>
  <script>
    // Responsive initial slider
    const slider = document.getElementById('slider');
    const slides = document.querySelectorAll('.slide');
    let currentIndex = 0;
    const totalSlides = slides.length;

    function goToSlide(idx) {
      currentIndex = (idx + totalSlides) % totalSlides;
      slider.style.transform = `translateX(-${currentIndex * 100}%)`;
    }

    // Keyboard navigation
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') goToSlide(currentIndex - 1);
      if (e.key === 'ArrowRight') goToSlide(currentIndex + 1);
    });

    // Touch/swipe navigation
    let startX = null;
    slider.addEventListener('touchstart', (e) => {
      startX = e.touches[0].clientX;
    });
    slider.addEventListener('touchmove', (e) => {
      if (startX !== null) {
        let diff = e.touches[0].clientX - startX;
        if (Math.abs(diff) > 50) {
          if (diff > 0) goToSlide(currentIndex - 1);
          else goToSlide(currentIndex + 1);
          startX = null;
        }
      }
    });
    slider.addEventListener('touchend', () => {
      startX = null;
    });

    // Ensure first slide is shown
    goToSlide(0);

    // Prevent image drag
    document.querySelectorAll('img').forEach(img => img.addEventListener('dragstart', e => e.preventDefault()));
  </script>
</body>
</html>
